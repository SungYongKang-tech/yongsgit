<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- OG -->
  <meta property="og:title" content="KOEN 탁구" />
  <meta property="og:description" content="남동발전 KOEN 탁구동호회 전용 웹사이트입니다!" />
  <meta property="og:image" content="https://sensational-tulumba-65e97e.netlify.app/pingpong_main/koen_pingpong.jpg" />
  <meta property="og:type" content="website" />

  <title>KOEN 탁구</title>

  <style>
    :root{
      --bg1:#eef4ff;
      --bg2:#f8fbff;
      --card:#ffffff;
      --text:#14213d;
      --muted:#5b6475;
      --line:#e4eaf3;
      --shadow:0 10px 28px rgba(19,33,68,.10);
      --radius:22px;

      --teal:#00695c;
      --blue:#1565c0;
      --cyan:#00838f;
      --purple:#6a1b9a;
      --pink:#ad1457;
      --orange:#ef6c00;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      font-family:"Pretendard","Segoe UI","Noto Sans KR",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #dce9ff 0%, transparent 35%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height:100%;
    }

    body{
      display:flex;
      justify-content:center;
      padding:18px 14px 30px;
    }

    .app-shell{
      width:100%;
      max-width:420px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, #0d47a1 0%, #1976d2 55%, #42a5f5 100%);
      border-radius:28px;
      padding:22px 18px 18px;
      color:#fff;
      box-shadow:0 18px 38px rgba(13,71,161,.22);
      margin-bottom:16px;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      right:-40px;
      top:-40px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
    }

    .hero::after{
      content:"";
      position:absolute;
      width:120px;
      height:120px;
      left:-28px;
      bottom:-36px;
      border-radius:50%;
      background:rgba(255,255,255,.10);
    }

    .hero-top{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo-badge{
      flex:0 0 58px;
      width:58px;
      height:58px;
      border-radius:18px;
      background:rgba(255,255,255,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
    }

    .hero-text h1{
      margin:0;
      font-size:26px;
      line-height:1.15;
      font-weight:800;
      letter-spacing:-0.3px;
    }

    .hero-text p{
      margin:6px 0 0;
      font-size:13px;
      line-height:1.5;
      color:rgba(255,255,255,.92);
    }

    .thumb-card{
      position:relative;
      z-index:1;
      margin-top:16px;
      background:rgba(255,255,255,.12);
      border-radius:22px;
      padding:10px;
      backdrop-filter: blur(6px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .thumbnail{
      display:block;
      width:100%;
      border-radius:16px;
      aspect-ratio: 16 / 10;
      object-fit:cover;
      box-shadow:0 8px 18px rgba(0,0,0,.15);
    }

    .section-title{
      margin:18px 4px 12px;
      font-size:15px;
      font-weight:800;
      color:#1d2a44;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .menu-card{
      display:flex;
      align-items:center;
      gap:14px;
      text-decoration:none;
      background:var(--card);
      border-radius:20px;
      padding:14px 15px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      color:var(--text);
    }

    .menu-card:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(19,33,68,.12);
      filter:brightness(1.01);
    }

    .menu-card:active{
      transform:scale(.985);
    }

    .menu-card:focus-visible{
      outline:none;
      box-shadow:
        0 0 0 3px rgba(21,101,192,.18),
        0 12px 28px rgba(19,33,68,.12);
    }

    .icon-wrap{
      width:50px;
      height:50px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:23px;
      flex-shrink:0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .menu-text{
      flex:1;
      min-width:0;
    }

    .menu-text strong{
      display:block;
      font-size:18px;
      font-weight:800;
      margin-bottom:4px;
      letter-spacing:-0.2px;
    }

    .menu-text span{
      display:block;
      font-size:12.5px;
      color:var(--muted);
      line-height:1.45;
    }

    .arrow{
      color:#8a94a6;
      font-size:20px;
      font-weight:700;
      flex-shrink:0;
    }

    .teal{ background:linear-gradient(135deg, #00796b, #00695c); }
    .blue{ background:linear-gradient(135deg, #1e88e5, #1565c0); }
    .cyan{ background:linear-gradient(135deg, #0097a7, #00838f); }
    .purple{ background:linear-gradient(135deg, #7b1fa2, #6a1b9a); }
    .pink{ background:linear-gradient(135deg, #c2185b, #ad1457); }
    .orange{ background:linear-gradient(135deg, #fb8c00, #ef6c00); }

    .footer-note{
      margin-top:16px;
      text-align:center;
      font-size:12px;
      color:#7b8495;
      padding-bottom:10px;
    }

    @media (min-width: 700px){
      .app-shell{
        max-width:860px;
      }

      .menu-grid{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>

<body>

    <div class="section-title">메뉴 바로가기</div>

    <section class="menu-grid">

  <a class="menu-card"

</a>

</section>

  </main>
</body>
</html>
