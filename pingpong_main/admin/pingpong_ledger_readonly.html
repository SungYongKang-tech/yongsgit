<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>탁구동호회비 관리대장(readonly)</title>

<!-- XLSX / html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb; --card:#fff;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444; --gray:#6b7280;
  --border:#d0d7e2;
  --stickTop: 56px; /* JS에서 헤더높이로 갱신됨 */
}
*{ box-sizing:border-box; }
body{
  margin:0; background:var(--bg);
  font-family:"Pretendard","Noto Sans KR",system-ui,sans-serif; color:var(--ink);
  overflow-x:hidden;
  overflow-y:auto;
}

/* ✅ NAV HEADER */
header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  position:sticky; top:0; z-index:50;
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 12px;
}
.header-title{
  font-size:18px;
  font-weight:900;
  text-align:center;
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.navbtn{
  appearance:none;
  border:1px solid #e5e7eb;
  background:#fff;
  color:var(--ink);
  padding:8px 10px;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
  white-space:nowrap;
}
.navbtn.primary{
  background:var(--accent);
  color:#fff;
  border-color:transparent;
}

/* SUMMARY */
.summary{
  display:flex; gap:10px; padding:12px; flex-wrap:wrap;
}
.card{
  flex:1; min-width:140px; background:#fff; padding:14px; text-align:center;
  border-radius:10px; border:1px solid #e5e7eb; box-shadow:0 2px 10px rgba(0,0,0,.03);
  font-size:14px; font-weight:700;
}

/* ✅ CONTROLS (필터/버튼 분리 + 버튼 크기/색상 통일) */
.controls{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.controls .filters{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:8px;
}
.controls .actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

/* ✅ 필터 공통(입력창/셀렉트) */
.controls input,
.controls select{
  width:100%;
  font-size:14px;
  padding:10px;
  border-radius:8px;
  border:1px solid #d8deea;
  background:#fff;
  height:40px;           /* ✅ 높이 통일 */
  line-height:20px;
}

/* ✅ 버튼 공통(크기/정렬/색 덮어쓰기 방지) */
.controls .actions button{
  width:auto;
  flex:1 1 140px;
  font-size:14px;
  padding:10px 12px;
  border-radius:8px;
  border:0;
  cursor:pointer;
  font-weight:900;
  height:40px;           /* ✅ 높이 통일 */
  line-height:20px;
  display:flex;          /* ✅ 텍스트 가운데 정렬 */
  align-items:center;
  justify-content:center;
  white-space:nowrap;
  color:#fff !important; /* ✅ 글씨색 강제 */
  opacity:1 !important;
  background:#9ca3af;    /* (혹시 클래스 누락 시 대비) */
}

/* 작은 화면에서 필터 칸수 조절 */
@media (max-width: 520px){
  .controls .filters{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 360px){
  .controls .filters{ grid-template-columns: 1fr; }
}

/* ✅ 버튼 색상(항상 동일하게) */
.controls .actions button.blue{ background:#2563eb !important; }
.controls .actions button.green{ background:#059669 !important; }
.controls .actions button.red{ background:#dc2626 !important; }
.controls .actions button.gray{ background:var(--gray) !important; }

/* PASTE */
.paste{ padding:10px; display:flex; gap:8px; flex-direction:column; }
.paste textarea{
  width:100%; min-height:90px; border:1px solid #ccd2dd;
  border-radius:8px; padding:10px; resize:vertical;
}

/* TABLE */
.wrap{
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  display:block;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

/* ✅ 표 제목행을 화면 상단(헤더 바로 아래)에 고정 */
thead{
  position: sticky;
  top: var(--stickTop);
  z-index: 40;
  background:#f3f5fb;
}
thead th{
  background:#f3f5fb;
  padding:8px;
  font-size:13px;
  border-bottom:1px solid var(--border);
  text-align:center;
  white-space:nowrap;
}
/* 상단 둥근모서리 */
thead tr:first-child th:first-child{ border-top-left-radius:10px; }
thead tr:first-child th:last-child { border-top-right-radius:10px; }

tbody td, tfoot td{
  border-top:1px solid #eef2f7; border-right:1px solid var(--border);
  padding:0;
}
tbody tr:last-child td{ border-bottom:1px solid var(--border); }
tbody td:last-child, thead th:last-child, tfoot td:last-child{ border-right:none; }

.cell{
  width:100%; min-height:28px; padding:4px 6px;
  font-size:14px; outline:none; background:#fff; line-height:18px;
}
.cell:focus{ background:#eaf1ff; outline:2px solid #8db4ff; }

.dateCell{ text-align:center; white-space:nowrap; }
.descCell{ white-space:pre-wrap; word-break:break-word; }
.numCell{ text-align:right; white-space:nowrap; }

/* INPUT ROW */
tfoot td{ background:#f7fbff; }
.addInput{
  width:100%; border:none; padding:8px 6px; font-size:14px;
  background:#f7fbff;
}
.addInput:focus{ outline:2px solid #8db4ff; background:#eef6ff; }

/* MOBILE OPTIMIZE */
@media (max-width: 600px){
  thead th:nth-child(1){ width:18%; }
  thead th:nth-child(2){ width:55%; }
  thead th:nth-child(3){ width:10%; }
  thead th:nth-child(4){ width:10%; }
  thead th:nth-child(5){ width:7%; }
  .cell{ padding:4px 4px; font-size:13px; }
  .numCell{ font-size:12.5px; padding-right:3px; }
}

/* DELETE BUTTON */
.delBtnSmall{
  background:#f2f2f2; color:#555; border:1px solid #d0d0d0;
  padding:0; width:20px; height:20px; font-size:12px; line-height:20px;
  border-radius:4px; text-align:center; cursor:pointer;
}
</style>
</head>

<body>

<!-- ✅ 네비게이션 헤더 -->
<header>
  <div class="header-inner">
    <button class="navbtn" onclick="location.href='/pingpong_main/admin.html'">← 관리자</button>
    <div class="header-title">탁구동호회비 관리대장(readonly)</div>
    
  </div>
</header>

<!-- SUMMARY -->
<div class="summary">
  <div class="card">총입금<br><span id="sumIn">0</span></div>
  <div class="card">총출금<br><span id="sumOut">0</span></div>
  <div class="card">현재잔액<br><span id="sumBal">0</span></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <input id="search" placeholder="검색 (내역/금액/날짜)" oninput="render()">
  <select id="yearFilter" onchange="render()"><option value="">전체 연도</option></select>
  <select id="monthFilter" onchange="render()"><option value="">전체 월</option></select>
  <button class="gray" onclick="sortByDate()">정렬(일자↑)</button>
  <button class="green" onclick="downloadExcel()">엑셀</button>
  <button class="green" onclick="saveImage()">이미지</button>
  <button class="blue" onclick="scrollToBottom()">맨 아래</button>
</div>

<!-- TABLE -->
<div class="wrap">
  <table id="ledgerTable">
    <thead>
      <tr>
        <th>일자</th>
        <th>내역</th>
        <th>입금</th>
        <th>출금</th>
        <th>잔액</th>
      </tr>
    </thead>
    <tbody id="ledger-body"></tbody>
  </table>
</div>

<script>
/* Firebase 초기화 */
firebase.initializeApp({
  apiKey: "AIzaSyBmVXt2ze1iJmmA_YI-sgH3tJmSvZomkOo",
  authDomain: "ionic6-3b7b2.firebaseapp.com",
  databaseURL: "https://ionic6-3b7b2-default-rtdb.firebaseio.com",
  projectId: "ionic6-3b7b2",
  storageBucket: "ionic6-3b7b2.appspot.com",
  messagingSenderId: "306251113324",
  appId: "1:306251113324:web:5c34044f4a7679b1c18949"
});
const db = firebase.database();

/* GLOBAL */
let ledger = {};
let sortMode = false;

const el = id => document.getElementById(id);
const toNum = v => Number(String(v||0).replace(/[^\d.-]/g,""));
const comma = n => toNum(n).toLocaleString();

/* 날짜 표시 */
function displayDate(d){
  if(!d) return "";
  const [y,m,dd] = d.split("-");
  return `${y.slice(2)}.${m}.${dd}`;
}

/* ✅ sticky top 계산(네비 헤더 높이 반영) */
function updateStickyTop(){
  const h = document.querySelector("header")?.offsetHeight || 0;
  document.documentElement.style.setProperty("--stickTop", h+"px");
}
window.addEventListener("load", updateStickyTop);
window.addEventListener("resize", updateStickyTop);
window.addEventListener("orientationchange", updateStickyTop);

/* Firebase listener (READ ONLY) */
db.ref("ledger").on("value", snap=>{
  ledger = snap.val() || {};
  render();
});

/* 정렬 */
function sortByDate(){ sortMode = true; render(); }

/* 렌더링 */
function render(){
  const all = Object.entries(ledger);

  // 잔액 계산용 원본 순서(입력순)
  const master = all.slice().sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0));
  let gBal = 0;
  const globalBal = {};
  master.forEach(([k,r])=>{
    gBal += toNum(r.income) - toNum(r.expense);
    globalBal[k] = gBal;
  });

  // 검색 / 필터
  let arr = all;
  const q = el("search").value.toLowerCase();
  if(q){
    arr = arr.filter(([k,r])=>{
      return `${displayDate(r.date)} ${r.desc||""} ${r.income||0} ${r.expense||0}`
        .toLowerCase().includes(q);
    });
  }

  const y = el("yearFilter").value;
  const m = el("monthFilter").value;
  if(y) arr = arr.filter(([k,r])=>(r.date||"").startsWith(y));
  if(m) arr = arr.filter(([k,r])=>(r.date||"").startsWith(m));

  // 정렬
  if(sortMode){
    arr.sort((a,b)=>(a[1].date||"").localeCompare(b[1].date||""));
  } else {
    arr.sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0));
  }

  // 합계(필터 기준)
  let sumIn=0, sumOut=0;
  arr.forEach(([_,r])=>{
    sumIn+=toNum(r.income);
    sumOut+=toNum(r.expense);
  });
  el("sumIn").textContent = comma(sumIn);
  el("sumOut").textContent = comma(sumOut);

  const lastKey = arr.length ? arr[arr.length-1][0] : null;
  el("sumBal").textContent = lastKey ? comma(globalBal[lastKey]) : "0";

  // 출력
  let html="";
  arr.forEach(([key,r])=>{
    html += `
      <tr>
        <td class="dateCell">${displayDate(r.date)}</td>
        <td class="descCell">${r.desc||""}</td>
        <td class="numCell">${comma(r.income)}</td>
        <td class="numCell">${comma(r.expense)}</td>
        <td class="numCell">${comma(globalBal[key]||0)}</td>
      </tr>`;
  });
  el("ledger-body").innerHTML = html;

  // 연/월 필터 옵션 생성
  const vals = Object.values(ledger);
  const years=[...new Set(vals.map(r=>(r.date||"").slice(0,4)).filter(Boolean))].sort();
  const months=[...new Set(vals.map(r=>(r.date||"").slice(0,7)).filter(Boolean))].sort();

  el("yearFilter").innerHTML = `<option value="">전체 연도</option>` +
    years.map(v=>`<option value="${v}">${v}</option>`).join("");

  el("monthFilter").innerHTML = `<option value="">전체 월</option>` +
    months.map(v=>`<option value="${v}">${v}</option>`).join("");
}

/* 엑셀 다운로드 */
function downloadExcel(){
  const arr = Object.entries(ledger).sort((a,b)=>(a[1].date||"").localeCompare(b[1].date||""));
  let bal=0;
  const rows = arr.map(([k,r])=>{
    bal += toNum(r.income) - toNum(r.expense);
    return {
      일자:displayDate(r.date),
      내역:r.desc || "",
      입금:toNum(r.income),
      출금:toNum(r.expense),
      잔액:bal
    };
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, "ledger");
  XLSX.writeFile(wb, "ledger-readonly.xlsx");
}

/* 이미지 저장 */
function saveImage(){
  html2canvas(document.getElementById("ledgerTable"), {scale:2, backgroundColor:"#ffffff"})
    .then(c=>{
      const a=document.createElement("a");
      a.download="ledger.png";
      a.href=c.toDataURL();
      a.click();
    });
}

function scrollToBottom(){
  window.scrollTo({ top: document.body.scrollHeight, behavior:"smooth" });
}
</script>
</body>
</html>
