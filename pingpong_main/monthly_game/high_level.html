<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상위부수 경기 진행</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }
    .wrap { max-width: 1280px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 16px;
    }
    .title-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1, h2, h3, h4 { margin: 0; }
    .sub {
      color: #64748b;
      font-size: 14px;
      margin-top: 6px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .tab-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
    }
    .tab-btn.active {
      background: #111827;
      color: white;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }
    button:disabled { background: #d1d5db; cursor: not-allowed; }
    button.gray { background: #64748b; }
    button.orange { background: #ea580c; }
    input[type="number"] {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      width: 100px;
      font-size: 14px;
    }
    .player-chip {
      display: inline-block;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 7px 10px;
      margin: 4px;
      font-weight: 700;
      font-size: 14px;
    }
    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .group-box {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
      margin-bottom: 16px;
    }
    .group-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }
    th { background: #f1f5f9; }
    .match-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
    }
    .match-head {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .match-body {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .vs { color: #94a3b8; font-size: 12px; }
    .tournament-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .winner-box {
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      color: #b45309;
      padding: 40px;
      background: #fff7ed;
      border-radius: 14px;
      border: 2px dashed #fbbf24;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title-line">
        <div>
          <h1>상위부수 경기 진행</h1>
          <div class="sub">조별리그 결과에 따라 순위별 토너먼트가 자동 생성됩니다.</div>
        </div>
        <div class="row">
          <label>조 수 <input type="number" id="groupCount" min="2" value="2" /></label>
          <button onclick="generateTournament()">대진표 생성</button>
          <button class="gray" onclick="goBack()">돌아가기</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>참가자 명단</h2>
      <div id="playerPreview" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="league">1. 조별리그</button>
        <button class="tab-btn" data-tab="tournament">2. 토너먼트</button>
        <button class="tab-btn" data-tab="winner">3. 최종 우승</button>
      </div>

      <div class="tab-panel active" id="tab-league">
        <div id="groupsArea"></div>
      </div>

      <div class="tab-panel" id="tab-tournament">
        <div id="rankTournamentArea"></div>
      </div>

      <div class="tab-panel" id="tab-winner">
        <div id="finalWinnerArea" class="winner-box">아직 결정되지 않음</div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "monthly_game_high_payload";
    let players = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    let state = {
      groups: [],
      rankStages: [],
      finalStage: []
    };

    function goBack() { history.back(); }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderPreview() {
      const box = document.getElementById("playerPreview");
      if(players.length === 0) box.innerHTML = "참가자가 없습니다.";
      else box.innerHTML = players.map(p => `<span class="player-chip">${p.name}(${p.level})</span>`).join("");
    }

    function snakeGroups(list, groupCount) {
      const sorted = [...list].sort((a, b) => a.level - b.level || a.name.localeCompare(b.name, "ko"));
      const groups = Array.from({ length: groupCount }, (_, i) => ({
        name: String.fromCharCode(65 + i) + "조",
        players: [],
        matches: []
      }));

      let idx = 0;
      let dir = 1;
      sorted.forEach((p, order) => {
        groups[idx].players.push({
          ...p,
          id: `P_${order}_${Math.random().toString(36).substr(2, 5)}`
        });
        if (dir === 1) {
          if (idx === groupCount - 1) dir = -1; else idx++;
        } else {
          if (idx === 0) dir = 1; else idx--;
        }
      });
      return groups;
    }

    function buildRoundRobinMatches(group) {
      const matches = [];
      for (let i = 0; i < group.players.length; i++) {
        for (let j = i + 1; j < group.players.length; j++) {
          matches.push({ p1: group.players[i], p2: group.players[j], winnerId: null });
        }
      }
      return matches;
    }

    function calcTable(group) {
      const rows = group.players.map(p => ({ id: p.id, name: p.name, win: 0, loss: 0, level: p.level }));
      group.matches.forEach(m => {
        if (!m.winnerId) return;
        const w = rows.find(r => r.id === m.winnerId);
        const l = rows.find(r => r.id === (m.winnerId === m.p1.id ? m.p2.id : m.p1.id));
        if (w && l) { w.win++; l.loss++; }
      });
      return rows.sort((a, b) => b.win - a.win || a.loss - b.loss || a.level - b.level);
    }

    function buildKnockout(list, title) {
      const shuffled = shuffle(list);
      const matches = [];
      for (let i = 0; i < shuffled.length; i += 2) {
        const p1 = shuffled[i] || null;
        const p2 = shuffled[i + 1] || null;
        matches.push({ p1, p2, winnerId: (p1 && !p2) ? p1.id : null });
      }
      let rName = matches.length === 1 ? "결승" : matches.length === 2 ? "준결승" : "1라운드";
      return [{ title: `${title} ${rName}`, matches }];
    }

    function proceedStandaloneRounds(rounds, titleBase) {
      const current = rounds[rounds.length - 1];
      if (!current || !current.matches.every(m => m.winnerId)) return false;

      const winners = current.matches.map(m => [m.p1, m.p2].find(p => p && p.id === m.winnerId)).filter(Boolean);
      if (winners.length <= 1) return false;

      const nextMatches = [];
      for (let i = 0; i < winners.length; i += 2) {
        const p1 = winners[i] || null;
        const p2 = winners[i + 1] || null;
        nextMatches.push({ p1, p2, winnerId: (p1 && !p2) ? p1.id : null });
      }
      let rName = nextMatches.length === 1 ? "결승" : nextMatches.length === 2 ? "준결승" : "다음 라운드";
      rounds.push({ title: `${titleBase} ${rName}`, matches: nextMatches });
      return true;
    }

    function generateTournament() {
      const cnt = Math.max(2, Number(document.getElementById("groupCount").value));
      state.groups = snakeGroups(players, cnt);
      state.groups.forEach(g => g.matches = buildRoundRobinMatches(g));
      state.rankStages = [];
      state.finalStage = [];
      renderGroups();
      renderRankTournaments();
      renderFinalWinner();
    }

    function setGroupWinner(gi, mi, wid) {
      state.groups[gi].matches[mi].winnerId = wid;
      renderGroups();
      syncRankTournaments();
    }

    function syncRankTournaments() {
      const tables = state.groups.map(calcTable);
      const maxRank = Math.max(...tables.map(t => t.length));
      const newStages = [];
      for (let r = 0; r < maxRank; r++) {
        const pList = [];
        tables.forEach((t, gIdx) => {
          if (t[r]) pList.push({ ...t[r], groupName: state.groups[gIdx].name });
        });
        if (pList.length >= 2) {
          newStages.push({ rank: r + 1, rounds: buildKnockout(pList, `${r + 1}위`) });
        }
      }
      state.rankStages = newStages;
      syncFinalStage();
      renderRankTournaments();
    }

    function setRankWinner(si, ri, mi, wid) {
      const stage = state.rankStages[si];
      stage.rounds[ri].matches[mi].winnerId = wid;
      // 다음 라운드 진행 가능한지 체크
      while(proceedStandaloneRounds(stage.rounds, `${stage.rank}위`));
      
      syncFinalStage();
      renderRankTournaments();
      renderFinalWinner();
    }

    function syncFinalStage() {
      const rankWinners = state.rankStages.map(s => {
        const last = s.rounds[s.rounds.length - 1];
        if (last.matches.length === 1 && last.matches[0].winnerId) {
          return [last.matches[0].p1, last.matches[0].p2].find(p => p.id === last.matches[0].winnerId);
        }
        return null;
      }).filter(Boolean);

      if (rankWinners.length >= 2) {
        // 기존 진행상황 유지를 위해 새로 빌드할 때 주의가 필요하지만, 여기서는 단순화하여 새로 생성
        if (state.finalStage.length === 0) {
            state.finalStage = buildKnockout(rankWinners, "최종 우승전");
        }
      } else {
        state.finalStage = [];
      }
    }

    function setFinalWinner(ri, mi, wid) {
      state.finalStage[ri].matches[mi].winnerId = wid;
      while(proceedStandaloneRounds(state.finalStage, "최종"));
      renderRankTournaments();
      renderFinalWinner();
    }

    function renderGroups() {
      const box = document.getElementById("groupsArea");
      if (!state.groups.length) return box.innerHTML = "<p>대진표를 생성해주세요.</p>";
      
      box.innerHTML = `<div class="group-grid">${state.groups.map((g, gi) => {
        const table = calcTable(g);
        return `
          <div class="group-box">
            <h3>${g.name}</h3>
            <table>
              <tr><th>순위</th><th>이름</th><th>승</th><th>패</th></tr>
              ${table.map((r, i) => `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.win}</td><td>${r.loss}</td></tr>`).join("")}
            </table>
            ${g.matches.map((m, mi) => `
              <div class="match-card">
                <div class="match-body">
                  <span style="${m.winnerId === m.p1.id ? 'color:blue':''}">${m.p1.name}</span>
                  <span class="vs">VS</span>
                  <span style="${m.winnerId === m.p2.id ? 'color:orange':''}">${m.p2.name}</span>
                </div>
                <div class="row">
                  <button onclick="setGroupWinner(${gi},${mi},'${m.p1.id}')">승</button>
                  <button class="orange" onclick="setGroupWinner(${gi},${mi},'${m.p2.id}')">승</button>
                  <button class="gray" onclick="setGroupWinner(${gi},${mi},null)">초기화</button>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }).join("")}</div>`;
    }

    function renderRankTournaments() {
      const box = document.getElementById("rankTournamentArea");
      if (!state.rankStages.length) return box.innerHTML = "<p>조별리그 결과가 나오면 토너먼트가 생성됩니다.</p>";

      let html = `<div class="tournament-grid">`;
      state.rankStages.forEach((s, si) => {
        html += `<div class="group-box"><h3>${s.rank}위 토너먼트</h3>`;
        s.rounds.forEach((rd, ri) => {
          html += `<p><b>${rd.title}</b></p>`;
          rd.matches.forEach((m, mi) => {
            html += `
              <div class="match-card">
                <div class="match-body">
                  <span>${m.p1 ? m.p1.name : "?"}</span>
                  <span class="vs">VS</span>
                  <span>${m.p2 ? m.p2.name : "?"}</span>
                </div>
                <div class="row">
                  <button ${!m.p1?'disabled':''} onclick="setRankWinner(${si},${ri},${mi},'${m.p1?m.p1.id:''}')">승</button>
                  <button class="orange" ${!m.p2?'disabled':''} onclick="setRankWinner(${si},${ri},${mi},'${m.p2?m.p2.id:''}')">승</button>
                </div>
              </div>`;
          });
        });
        html += `</div>`;
      });

      if (state.finalStage.length) {
        html += `<div class="group-box"><h3>최종 왕중왕전</h3>`;
        state.finalStage.forEach((rd, ri) => {
          html += `<p><b>${rd.title}</b></p>`;
          rd.matches.forEach((m, mi) => {
            html += `
              <div class="match-card">
                <div class="match-body">
                  <span>${m.p1 ? m.p1.name : "?"}</span>
                  <span class="vs">VS</span>
                  <span>${m.p2 ? m.p2.name : "?"}</span>
                </div>
                <div class="row">
                  <button ${!m.p1?'disabled':''} onclick="setFinalWinner(${ri},${mi},'${m.p1?m.p1.id:''}')">승</button>
                  <button class="orange" ${!m.p2?'disabled':''} onclick="setFinalWinner(${ri},${mi},'${m.p2?m.p2.id:''}')">승</button>
                </div>
              </div>`;
          });
        });
        html += `</div>`;
      }
      box.innerHTML = html + `</div>`;
    }

    function renderFinalWinner() {
      const box = document.getElementById("finalWinnerArea");
      if (state.finalStage.length > 0) {
        const lastRound = state.finalStage[state.finalStage.length - 1];
        const match = lastRound.matches[0];
        if (match && match.winnerId) {
          const w = [match.p1, match.p2].find(p => p.id === match.winnerId);
          box.innerHTML = `🏆 최종 우승: ${w.name} 🏆`;
          return;
        }
      }
      box.textContent = "진행 중...";
    }

    // 탭 전환 로직
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    renderPreview();
  </script>
</body>
</html>
