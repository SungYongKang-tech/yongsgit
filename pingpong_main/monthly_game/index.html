<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월례회 게임 생성기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      text-align: center;
      font-size: 28px;
    }
    .sub {
      margin: 8px 0 0;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    input[type="text"], input[type="number"] {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    #newName { width: 120px; }
    #newLevel { width: 80px; }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: #2563eb;
    }
    button.gray { background: #64748b; }
    button.green { background: #059669; }
    button.orange { background: #ea580c; }
    button.red { background: #dc2626; }
    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .player {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      background: white;
      user-select: none;
    }
    .player.selected {
      border: 2px solid #2563eb;
      background: #dbeafe;
    }
    .lv1to6 { background: #e8f5e9; }
    .lv7to9 { background: #e3f2fd; }
    .lv10to12 { background: #fff8e1; }
    .lv13to15 { background: #fce4ec; }
    .lv16to20 { background: #eeeeee; }
    .new-player {
      background: #fff59d !important;
      border: 2px solid #d4b106;
    }
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .bucket {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      min-height: 180px;
    }
    .bucket h3 {
      margin: 0 0 12px;
      text-align: center;
      font-size: 18px;
    }
    .list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 8px 10px;
      font-weight: 700;
      font-size: 14px;
    }
    .chip button {
      background: #ef4444;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 12px;
    }
    .note {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: #64748b;
    }
    @media (max-width: 800px) {
      .columns { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>월례회 게임 생성기</h1>
      <div class="sub">선수 선택 → 상위부수 / 하위부수 분류 → 각 페이지에서 조별리그 + 토너먼트 진행</div>
    </div>

    <div class="card">
      <h2>선수 추가</h2>
      <div class="row">
        <input type="text" id="newName" placeholder="이름" />
        <input type="number" id="newLevel" placeholder="부수" min="1" max="20" />
        <button onclick="addPlayer()">선수 추가</button>
        <button class="gray" onclick="removeAddedPlayers()">추가 선수 삭제</button>
      </div>
    </div>

    <div class="card">
      <h2>참석자 목록</h2>
      <div class="player-list" id="playerList"></div>
      <div class="row" style="margin-top:12px;">
        <button onclick="addSelectedToHigh()">상위부수로 넣기</button>
        <button class="orange" onclick="addSelectedToLow()">하위부수로 넣기</button>
        <button class="gray" onclick="clearSelection()">선택 해제</button>
        <button class="red" onclick="resetAll()">전체 초기화</button>
      </div>
      <div class="note">선수를 클릭해서 선택한 뒤 상위부수 또는 하위부수에 넣으세요.</div>
    </div>

    <div class="columns">
      <div class="card bucket">
        <h3>상위부수 참가자</h3>
        <div class="list" id="highList"></div>
        <div class="row" style="margin-top:12px;">
          <button class="green" onclick="startLevelGame('high')">상위부수 경기로 이동</button>
          <button class="gray" onclick="clearBucket('high')">비우기</button>
        </div>
      </div>

      <div class="card bucket">
        <h3>하위부수 참가자</h3>
        <div class="list" id="lowList"></div>
        <div class="row" style="margin-top:12px;">
          <button class="green" onclick="startLevelGame('low')">하위부수 경기로 이동</button>
          <button class="gray" onclick="clearBucket('low')">비우기</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, auth } from "../firebase.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
    import { signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

    async function requireAuth() {
      const user = auth.currentUser;
      if (user) return user;
      await signInAnonymously(auth);
      return new Promise((resolve) => {
        const unsub = onAuthStateChanged(auth, (u) => {
          if (u) {
            unsub();
            resolve(u);
          }
        });
      });
    }

    let allPlayers = [];
    let selected = [];
    let highPlayers = [];
    let lowPlayers = [];

    function playerColorClass(level) {
      if (level <= 6) return "lv1to6";
      if (level <= 9) return "lv7to9";
      if (level <= 12) return "lv10to12";
      if (level <= 15) return "lv13to15";
      return "lv16to20";
    }

    function saveLocalState() {
      const addedPlayers = allPlayers
        .filter(p => p.new)
        .map(p => ({ name: p.name, level: p.level, new: true }));
      localStorage.setItem("monthly_game_addedPlayers", JSON.stringify(addedPlayers));
      localStorage.setItem("monthly_game_high_payload", JSON.stringify(highPlayers));
      localStorage.setItem("monthly_game_low_payload", JSON.stringify(lowPlayers));
    }

    function loadLocalState() {
      highPlayers = JSON.parse(localStorage.getItem("monthly_game_high_payload") || "[]");
      lowPlayers = JSON.parse(localStorage.getItem("monthly_game_low_payload") || "[]");
    }

    async function loadPlayers() {
      try {
        await requireAuth();
        const snap = await get(ref(db, "members"));
        const basePlayers = snap.exists()
          ? Object.entries(snap.val()).map(([id, p]) => ({
              id,
              name: (p?.name ?? "").trim(),
              level: Number(p?.bu ?? 0),
              new: false
            })).filter(p => p.name && p.level > 0)
          : [];

        const added = JSON.parse(localStorage.getItem("monthly_game_addedPlayers") || "[]");
        const addedPlayers = added.map((p, i) => ({
          id: `added_${i}_${p.name}`,
          name: p.name,
          level: Number(p.level),
          new: true
        }));

        allPlayers = [...basePlayers, ...addedPlayers];
        loadLocalState();
        renderPlayers();
        renderBuckets();
      } catch (error) {
        console.error(error);
        alert("선수 목록을 불러오지 못했습니다.");
      }
    }

    function renderPlayers() {
      const box = document.getElementById("playerList");
      box.innerHTML = "";
      allPlayers.forEach((p, i) => {
        const el = document.createElement("span");
        el.className = `player ${playerColorClass(p.level)} ${p.new ? "new-player" : ""}`;
        if (selected.includes(i)) el.classList.add("selected");
        el.textContent = `${p.name}(${p.level})`;
        el.onclick = () => toggleSelect(i);
        box.appendChild(el);
      });
    }

    function renderBuckets() {
      renderBucket("highList", highPlayers, "high");
      renderBucket("lowList", lowPlayers, "low");
    }

    function renderBucket(id, arr, type) {
      const box = document.getElementById(id);
      box.innerHTML = "";
      arr.forEach((p, idx) => {
        const chip = document.createElement("div");
        chip.className = "chip";

        const text = document.createElement("span");
        text.textContent = `${p.name}(${p.level})`;

        const btn = document.createElement("button");
        btn.textContent = "×";
        btn.onclick = () => removeFromBucket(type, idx);

        chip.appendChild(text);
        chip.appendChild(btn);
        box.appendChild(chip);
      });
    }

    function toggleSelect(i) {
      if (selected.includes(i)) selected = selected.filter(v => v !== i);
      else selected.push(i);
      renderPlayers();
    }

    function clearSelection() {
      selected = [];
      renderPlayers();
    }

    function existsInBucket(arr, player) {
      return arr.some(p => p.name === player.name && Number(p.level) === Number(player.level));
    }

    function addSelectedToHigh() {
      const picked = selected.map(i => allPlayers[i]).filter(Boolean);
      picked.forEach(p => {
        if (!existsInBucket(highPlayers, p) && !existsInBucket(lowPlayers, p)) {
          highPlayers.push({ name: p.name, level: p.level });
        }
      });
      clearSelection();
      saveLocalState();
      renderBuckets();
    }

    function addSelectedToLow() {
      const picked = selected.map(i => allPlayers[i]).filter(Boolean);
      picked.forEach(p => {
        if (!existsInBucket(lowPlayers, p) && !existsInBucket(highPlayers, p)) {
          lowPlayers.push({ name: p.name, level: p.level });
        }
      });
      clearSelection();
      saveLocalState();
      renderBuckets();
    }

    function clearBucket(type) {
      if (type === "high") highPlayers = [];
      else lowPlayers = [];
      saveLocalState();
      renderBuckets();
    }

    function removeFromBucket(type, idx) {
      if (type === "high") highPlayers.splice(idx, 1);
      else lowPlayers.splice(idx, 1);
      saveLocalState();
      renderBuckets();
    }

    function addPlayer() {
      const nameEl = document.getElementById("newName");
      const levelEl = document.getElementById("newLevel");
      const name = nameEl.value.trim();
      const level = Number(levelEl.value);

      if (!name || !level || level < 1 || level > 20) {
        alert("이름과 부수를 올바르게 입력해주세요.");
        return;
      }

      allPlayers.push({
        id: `added_${Date.now()}`,
        name,
        level,
        new: true
      });

      nameEl.value = "";
      levelEl.value = "";
      saveLocalState();
      renderPlayers();
    }

    function removeAddedPlayers() {
      allPlayers = allPlayers.filter(p => !p.new);
      selected = [];
      localStorage.removeItem("monthly_game_addedPlayers");
      renderPlayers();
    }

    function resetAll() {
      selected = [];
      highPlayers = [];
      lowPlayers = [];
      saveLocalState();
      renderPlayers();
      renderBuckets();
    }

    function startLevelGame(type) {
      const players = type === "high" ? highPlayers : lowPlayers;
      if (players.length < 2) {
        alert("최소 2명 이상 넣어주세요.");
        return;
      }
      const key = type === "high" ? "monthly_game_high_payload" : "monthly_game_low_payload";
      localStorage.setItem(key, JSON.stringify(players));
      window.location.href = type === "high" ? "./high_level.html" : "./low_level.html";
    }

    window.addPlayer = addPlayer;
    window.removeAddedPlayers = removeAddedPlayers;
    window.addSelectedToHigh = addSelectedToHigh;
    window.addSelectedToLow = addSelectedToLow;
    window.clearSelection = clearSelection;
    window.clearBucket = clearBucket;
    window.removeFromBucket = removeFromBucket;
    window.resetAll = resetAll;
    window.startLevelGame = startLevelGame;

    loadPlayers();
  </script>
</body>
</html>
