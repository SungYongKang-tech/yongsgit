<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>남동발전 탁구 동호회 기술학습</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
:root{
  --main:#2563eb;
  --soft:#eff6ff;
  --border:#e5e7eb;
  --text:#0f172a;
  --muted:#64748b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Pretendard",system-ui,sans-serif;
  background:#f5f7fb;
  color:var(--text);
}

/* ✅ 상단 헤더 */
header{
  position:sticky;
  top:0;
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:14px 12px;
  text-align:center;
  font-weight:800;
  font-size:18px;
  z-index:10;
}

/* ✅ 컨테이너 */
.container{
  max-width:720px;
  margin:auto;
  padding:14px;
}

/* ✅ 안내문 카드 */
.note{
  background:var(--soft);
  border:1px solid #bfdbfe;
  border-radius:12px;
  padding:14px;
  font-size:14px;
  margin-bottom:18px;
}

/* ✅ 섹션 */
.section{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
}

.section h2{
  margin:0 0 12px;
  font-size:16px;
  font-weight:800;
}

/* ✅ 버튼형 리스트 */
.list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#f8fafc;
  padding:12px 14px;
  border-radius:10px;
  text-decoration:none;
  color:var(--text);
  font-weight:600;
  font-size:14px;
  border:1px solid var(--border);
  transition:.15s;
}

.item:hover{
  background:#eef2ff;
}

.item span{
  color:var(--muted);
  font-weight:500;
}

/* ✅ 푸터 */
footer{
  text-align:center;
  font-size:12px;
  padding:16px;
  color:var(--muted);
}
</style>
</head>
