<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Makeup Lesson Manager</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
  margin:0;background:#f5f5f7;
}
header{
  background:#fff;padding:16px;font-size:1.1rem;font-weight:800;
  border-bottom:1px solid #ddd;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
header .right { display:flex; gap:8px; align-items:center; }
.small-btn{
  padding:8px 10px; border:none; border-radius:10px; cursor:pointer;
  background:#111827; color:#fff; font-weight:800; font-size:.9rem;
}
.small-btn.alt{ background:#2563eb; }
.small-badge{
  font-size:.85rem; color:#64748b; font-weight:800;
}

table{width:100%;border-collapse:collapse;background:#fff;margin-top:10px;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;}
td.selectable{cursor:pointer;}
td.selected{background:#2563eb;color:white;}
td.editable{cursor:pointer;}
td.editing{outline:3px solid #16a34a; outline-offset:-3px;}

.btn{
  width:100%;padding:12px;margin-top:12px;background:#2563eb;color:white;
  border:none;font-size:1rem;border-radius:8px;cursor:pointer;font-weight:800;
}

.list{padding:16px;}
.group-box{
  background:#fff;
  padding:10px 12px;
  margin-bottom:10px;
  border-radius:10px;
  border-left:5px solid #2563eb;
  box-shadow:0 2px 5px rgba(0,0,0,0.04);
}
.group-title{
  display:flex;justify-content:space-between;align-items:center;
  font-weight:bold;margin-bottom:6px; gap:10px;
}
.schedule-box{padding:10px;}
input{
  width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:8px;
}
.schedule-table td{
  height:32px;
  padding:6px 4px;
}

/* Popup */
.popup-bg{
  position:fixed;left:0;right:0;top:0;bottom:0;
  background:rgba(0,0,0,0.35);display:none;
}
.popup{
  background:#fff;
  position:absolute;
  left:0; right:0; bottom:0;
  padding:20px;
  border-radius:20px 20px 0 0;
  animation:slideUp .25s ease-out;
  max-height:78vh; overflow:auto;
}
@keyframes slideUp{
  from {transform:translateY(100%);}
  to {transform:translateY(0);}
}
</style>
</head>

<body>

<header>
  <div>레슨 시간표</div>
</header>

<div style="padding:12px;">
  <table>
    <thead>
      <tr id="headRow">
        <th>시간</th>
      </tr>
    </thead>
    <tbody id="lessonBody"></tbody>
  </table>

  <button class="btn" onclick="openMakeupPopup()">보강 대상자 생성</button>
</div>

<header>보강 대상자</header>
<div class="list" id="makeupList"></div>

<header>보강 스케쥴</header>
<div class="schedule-box">
  <button class="btn" style="background:#16a34a;" onclick="openSchedulePopup()">보강 스케쥴 생성</button>
  <div id="scheduleArea" style="margin-top:16px;"></div>
</div>

<!-- 보강 대상자 생성 팝업 -->
<div id="makeupPopup" class="popup-bg">
  <div class="popup">
    <h3>레슨 미실시 날짜 & 사유 입력</h3>
    <input type="date" id="makeupDate">
    <input id="makeupReason" placeholder="사유 입력">

    <button class="btn" onclick="createMakeupTargets()">생성</button>
    <button class="btn" style="background:#6b7280;margin-top:12px;" onclick="closeMakeupPopup()">취소</button>
  </div>
</div>

<!-- 스케줄 생성 팝업 -->
<div id="schedulePopup" class="popup-bg">
  <div class="popup">
    <h3>보강 스케쥴 설정</h3>
    <input type="date" id="scheduleDate">

    <label>시작 시간</label>
    <input id="startTime" type="time" value="11:25">

    <label>교시 수 (15분 단위)</label>
    <input id="periodCount" type="number" value="5" min="1">

    <button class="btn" onclick="generateSchedule()">스케쥴 생성</button>
    <button class="btn" style="background:#6b7280;" onclick="closeSchedulePopup()">취소</button>
  </div>
</div>

<!-- 이름 선택 팝업 (스케쥴 배정용) -->
<div id="assignPopup" class="popup-bg">
  <div class="popup">
    <h3>보강 대상자 선택</h3>
    <div id="candidateList"></div>

    <button class="btn" style="background:#ef4444;margin-top:12px;" onclick="deleteSlot()">삭제</button>
    <button class="btn" style="background:#6b7280;margin-top:12px;" onclick="cancelAssign()">취소</button>
  </div>
</div>

<script type="module">
import { db, auth } from "../firebase.js";
import { ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
import { signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

/* =========================
   PATH
========================= */
const PATH = {
  schedule: "lesson/schedule",
  overridesRoot: "lesson/overrides",
  makeupGroups: "lesson/makeupGroups",
  scheduleList: "lesson/makeupScheduleList",
};

const STUDENT_PATHS = ["lesson/students", "lesson/coaches"];

const DAYS_ALL = ["mon","tue","wed","thu","fri"];
const dayLabel = { mon:"월", tue:"화", wed:"수", thu:"목", fri:"금" };

const $ = (id)=>document.getElementById(id);

function getWeekKey(date = new Date()){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,"0")}`;
}
const weekKey = getWeekKey();
function pathWeek(wk){ return `${PATH.overridesRoot}/${wk}`; }

function getKoreanDay(dateStr){
  const days=["일","월","화","수","목","금","토"];
  return days[new Date(dateStr).getDay()];
}

/* =========================
   상태 변수
========================= */
let students = {};          // (students + coaches) 합친 최종
let studentsA = {};         // lesson/students 원본
let studentsB = {};         // lesson/coaches  원본

let templateAssign = {};
let overridesWeek = {};

let selectedCells = [];
let makeupGroups = [];
let scheduleList = [];
let clickedSchedule = null;

/* =========================
   students 합치기 + 별칭맵
========================= */
let studentKeyByAlias = {}; // alias -> realKey

function mergeStudents(){
  // ✅ 둘 다 합쳐서 하나로 (coaches가 students를 덮어써도 무방)
  students = { ...(studentsA||{}), ...(studentsB||{}) };
  window.__students = students; // ✅ 콘솔 디버그용
  rebuildStudentAliasMap();
}

function rebuildStudentAliasMap(){
  studentKeyByAlias = {};
  const obj = students || {};
  for (const [key, v] of Object.entries(obj)){
    if(!v) continue;
    const candidates = [
      key,
      v.uid, v.id, v.authUid, v.realUid, v.firebaseUid,
      v.code, v.short, v.shortCode, v.shortId, v.memberId
    ].filter(Boolean);

    for (const a of candidates){
      studentKeyByAlias[String(a)] = key;
    }
  }
}

function normalizeStudentKey(uid){
  if(!uid) return "";
  if(students?.[uid]) return uid;
  return studentKeyByAlias?.[uid] || "";
}

function studentName(uid){
  const key = normalizeStudentKey(uid);
  const o = key ? (students?.[key] || {}) : {};
  return (o.name || o.displayName || o.nm || o.fullName || "").trim();
}

function looksLikeUid(s){
  return typeof s === "string" && /^[A-Za-z0-9_-]{8,40}$/.test(s);
}

async function fixStoredMakeupNames(){
  let changed = false;
  (makeupGroups || []).forEach(g=>{
    (g.names || []).forEach(n=>{
      const real = studentName(n.uid);
      if(real && (!n.name || looksLikeUid(n.name))){
        n.name = real;
        changed = true;
      }
    });
  });
  if(changed) await saveMakeupGroups();
}

/* =========================
   schedule -> templateAssign
========================= */
function normalizeTimes(scheduleObj){
  const slots = scheduleObj?.slots || {};
  const all = []
    .concat(slots.morning || [])
    .concat(slots.lunch || [])
    .concat(slots.evening || []);
  return all.filter(t => (t?.time || "").trim());
}
function buildTemplateAssignFromSchedule(scheduleObj){
  const items = normalizeTimes(scheduleObj);
  const out = {};
  for(const t of items){
    const time = (t.time || "").trim();
    if(!time) continue;
    if(!out[time]) out[time] = { mon:"", tue:"", wed:"", thu:"", fri:"" };
    const a = t.assign || {};
    out[time].mon = a.mon || "";
    out[time].tue = a.tue || "";
    out[time].wed = a.wed || "";
    out[time].thu = a.thu || "";
    out[time].fri = a.fri || "";
  }
  return out;
}

function getBaseUid(time, day){ return (templateAssign?.[time]?.[day] ?? ""); }
function getOverrideUid(time, day){
  return (overridesWeek?.[time] && Object.prototype.hasOwnProperty.call(overridesWeek[time], day))
    ? overridesWeek[time][day]
    : undefined;
}
function getFinalUid(time, day){
  const o = getOverrideUid(time, day);
  if(o !== undefined) return o;
  return getBaseUid(time, day);
}
function buildViewDays(times){
  const hasFriAny = times.some(time=>{
    const v = getFinalUid(time, "fri");
    return v !== "" && v !== null && v !== undefined;
  });
  return hasFriAny ? DAYS_ALL.slice() : ["mon","tue","wed","thu"];
}

/* =========================
   Firebase 저장
========================= */
function saveMakeupGroups(){ return set(ref(db, PATH.makeupGroups), makeupGroups); }
function saveScheduleList(){ return set(ref(db, PATH.scheduleList), scheduleList); }

/* =========================
   렌더: 시간표
========================= */
function renderLessonTable(){
  const body = $("lessonBody");
  body.innerHTML = "";

  const times = Object.keys(templateAssign || {}).sort((a,b)=>a.localeCompare(b));
  const viewDays = buildViewDays(times);

  const headRow = $("headRow");
  if(headRow){
    headRow.innerHTML = `<th>시간</th>` + viewDays.map(d => `<th>${dayLabel[d] || d}</th>`).join("");
  }

  if(times.length === 0){
    body.innerHTML = `<tr><td colspan="${1 + viewDays.length}" style="color:#64748b;font-weight:800;">시간표 데이터 없음</td></tr>`;
    return;
  }

  times.forEach(time=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${time}</td>`;

    viewDays.forEach(day=>{
      const uid = getFinalUid(time, day);
      const td = document.createElement("td");
      td.className = "selectable";

      if(uid === "__absent__"){
        td.innerHTML = `<span style="color:#ef4444;font-weight:900;">불참</span>`;
        td.style.cursor = "not-allowed";
        td.onclick = ()=> alert("불참으로 표시된 칸은 선택할 수 없습니다.");
        tr.appendChild(td);
        return;
      }

      if(!uid){
        td.innerHTML = `<span style="color:#94a3b8;font-weight:800;">-</span>`;
        td.onclick = ()=> alert("빈 칸은 선택할 수 없습니다.");
        tr.appendChild(td);
        return;
      }

      const nm = studentName(uid);
      td.innerText = nm || `(미등록:${uid})`;
      td.onclick = ()=> toggleSelect(time, day, uid, td);

      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

function toggleSelect(time, day, uid, td){
  const key = `${time}_${day}_${uid}`;
  if(selectedCells.includes(key)){
    selectedCells = selectedCells.filter(x=>x!==key);
    td.classList.remove("selected");
  }else{
    selectedCells.push(key);
    td.classList.add("selected");
  }
}

/* =========================
   보강 대상자 생성
========================= */
window.openMakeupPopup = ()=> $("makeupPopup").style.display="block";
window.closeMakeupPopup = ()=> $("makeupPopup").style.display="none";

window.createMakeupTargets = async ()=>{
  const date = $("makeupDate").value;
  const reason = $("makeupReason").value;

  if(!date || !reason) return alert("날짜와 사유를 입력하세요.");
  if(selectedCells.length===0) return alert("먼저 시간표에서 보강 대상 셀을 선택하세요.");

  const newGroup = { date, reason, names: [] };

  selectedCells.forEach(key=>{
    const rawUid = key.substring(key.lastIndexOf("_")+1);
    const fixedKey = normalizeStudentKey(rawUid) || rawUid;
    newGroup.names.push({ uid: fixedKey, name:"", done:false });
  });

  const uniq = new Map();
  newGroup.names.forEach(x=>uniq.set(x.uid, x));
  newGroup.names = Array.from(uniq.values());

  makeupGroups.push(newGroup);
  await saveMakeupGroups();

  selectedCells = [];
  document.querySelectorAll(".selected").forEach(td=>td.classList.remove("selected"));

  closeMakeupPopup();
};

/* =========================
   보강 대상자 리스트
========================= */
function renderMakeupList(){
  const box = $("makeupList");
  box.innerHTML = "";

  if(!makeupGroups || makeupGroups.length === 0){
    box.innerHTML = "<div style='color:#666;'>보강 대상자 없음</div>";
    return;
  }

  makeupGroups.forEach((group, idx)=>{
    const div = document.createElement("div");
    div.className = "group-box";

    let html = `
      <div class="group-title">
        <span>${group.date} (${getKoreanDay(group.date)}) / ${group.reason}</span>
        <button onclick="deleteGroup(${idx})"
          style="background:#ef4444;padding:4px 8px;border:none;color:#fff;border-radius:6px;font-size:0.8rem;">
          삭제
        </button>
      </div>
    `;

    (group.names || []).forEach((n, i)=>{
      const displayName = (studentName(n.uid) || n.name || `⚠️미등록(${n.uid})`);

      const state = n.done
        ? "<span style='color:green;font-weight:bold;'>(보강완료)</span>"
        : "<span style='color:#999'>(보강예정)</span>";

      const btnLabel = n.done ? "보강완료 취소" : "빈타임 보강완료";

      html += `
        <div style="margin-bottom:6px;">
          - <span style="font-weight:${n.done ? 'bold' : 'normal'}">${displayName}</span>
            ${state}
          <button onclick="completeWithoutSchedule(${idx}, ${i})"
            style="margin-left:8px;padding:4px 6px;border-radius:6px;border:1px solid #ccc;">
            ${btnLabel}
          </button>
          <button onclick="openChangeTargetPopup(${idx}, ${i})"
            style="margin-left:6px;padding:4px 6px;border-radius:6px;border:1px solid #2563eb;color:#2563eb;">
            변경
          </button>
        </div>
      `;
    });

    div.innerHTML = html;
    box.appendChild(div);
  });
}

window.deleteGroup = async (idx)=>{
  if(!confirm("삭제하시겠습니까?")) return;
  makeupGroups.splice(idx,1);
  await saveMakeupGroups();
};
window.completeWithoutSchedule = async (groupIndex, nameIndex)=>{
  makeupGroups[groupIndex].names[nameIndex].done = !makeupGroups[groupIndex].names[nameIndex].done;
  await saveMakeupGroups();
};

window.openChangeTargetPopup = async (groupIndex, nameIndex)=>{
  const current = makeupGroups[groupIndex].names[nameIndex];
  const currentShown = (studentName(current.uid) || current.name || current.uid);
  const newName = prompt(`현재 이름: ${currentShown}\n새로운 이름을 입력하세요.`, currentShown);
  if(!newName) return;
  current.name = newName.trim();
  await saveMakeupGroups();
};

/* =========================
   스케줄(당신 코드 그대로)
========================= */
window.openSchedulePopup = ()=> $("schedulePopup").style.display="block";
window.closeSchedulePopup = ()=> $("schedulePopup").style.display="none";

window.generateSchedule = async ()=>{
  const date = $("scheduleDate").value;
  const period = parseInt($("periodCount").value);
  const startTime = $("startTime").value;

  if(!date || !period || !startTime) return alert("모든 값을 입력하세요.");

  let baseDate = new Date(`${date}T${startTime}:00`);
  if(isNaN(baseDate.getTime())) return alert("시간 형식이 잘못되었습니다.");

  let schedule = { date, slots: [] };

  for(let i=0;i<period;i++){
    let hh = baseDate.getHours();
    let mm = baseDate.getMinutes();
    let timeText = `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;

    schedule.slots.push({ time: timeText, uid:"", name:"", done:false, groupDate:null });
    baseDate.setMinutes(baseDate.getMinutes() + 15);
  }

  scheduleList.push(schedule);
  await saveScheduleList();
  closeSchedulePopup();
};

function renderScheduleList(){
  const box = $("scheduleArea");
  box.innerHTML = "";

  (scheduleList||[]).forEach((sc, idx)=>{
    const wrap = document.createElement("div");
    wrap.style="margin-bottom:12px;background:#fff;padding:10px;border-radius:10px;box-shadow:0 3px 8px rgba(0,0,0,.05);";

    wrap.innerHTML = `
      <div style="display:flex;justify-content:space-between;">
        <h3>${sc.date} (${getKoreanDay(sc.date)})<br>보강 스케쥴</h3>
        <div>
          <button onclick="toggleScheduleView(${idx})"
           style="background:#2563eb;color:#fff;padding:6px 10px;border:none;border-radius:6px;margin-right:6px;">
           보기/숨기기
          </button>
          <button onclick="removeSchedule(${idx})"
           style="background:#ef4444;color:#fff;padding:6px 10px;border:none;border-radius:6px;">
           닫기
          </button>
        </div>
      </div>
      <div id="scheduleTable_${idx}"></div>
    `;
    box.appendChild(wrap);
    renderScheduleTable(idx);
  });
}
window.toggleScheduleView = (idx)=>{
  const box = document.getElementById(`scheduleTable_${idx}`);
  box.style.display = box.style.display==="none" ? "block" : "none";
};
window.removeSchedule = async (idx)=>{
  if(!confirm("삭제하시겠습니까?")) return;
  scheduleList.splice(idx,1);
  await saveScheduleList();
};

function renderScheduleTable(idx){
  const sc = scheduleList[idx];
  const container = document.getElementById(`scheduleTable_${idx}`);

  let html = `
    <table class="schedule-table">
      <tr><th>시간</th><th>보강자</th><th>상태</th></tr>
  `;

  (sc.slots||[]).forEach((slot,sidx)=>{
    const btnLabel = slot.done ? "보강완료" : "보강예정";
    const btnColor = slot.done ? "background:green;color:white;" : "background:#2563eb;color:white;";

    html += `
      <tr>
        <td>${slot.time}</td>
        <td onclick="openAssignPopupSchedule(${idx}, ${sidx})" style="cursor:pointer;">
          ${slot.name || ""}
        </td>
        <td>
          <button onclick="markDoneSchedule(${idx}, ${sidx})"
            style="padding:6px 10px;border-radius:6px;border:none;${btnColor}">
            ${btnLabel}
          </button>
        </td>
      </tr>
    `;
  });

  html += "</table>";
  container.innerHTML = html;
}

window.markDoneSchedule = async (sIdx, slotIdx)=>{
  const slot = scheduleList[sIdx].slots[slotIdx];
  if(!slot.uid) return alert("먼저 이름을 배정하세요.");

  slot.done = true;

  makeupGroups.forEach(g=>{
    if(g.date === slot.groupDate){
      g.names.forEach(n=>{ if(n.uid===slot.uid) n.done=true; });
    }
  });

  await saveMakeupGroups();
  await saveScheduleList();
};

window.openAssignPopupSchedule = (sIdx, slotIdx)=>{
  clickedSchedule = { sIdx, slotIdx };

  const list = $("candidateList");
  list.innerHTML = "";
  list.style.display = "grid";
  list.style.gridTemplateColumns = "repeat(auto-fill, minmax(80px, 1fr))";
  list.style.gap = "4px";
  list.style.padding = "4px";

  makeupGroups.forEach(group=>{
    const title = document.createElement("div");
    title.innerText = `${group.date} (${getKoreanDay(group.date)}) / ${group.reason}`;
    title.style = `grid-column: 1 / -1;font-weight:bold;font-size:0.75rem;margin:4px 0 2px 0;`;
    list.appendChild(title);

    (group.names||[]).forEach(n=>{
      const div = document.createElement("div");
      const displayName = (studentName(n.uid) || n.name || n.uid);
      div.innerText = displayName;
      div.style = `
        padding: 2px 0;border: 1px solid #ddd;border-radius: 6px;text-align: center;
        font-size: 0.8rem;background: #fff;cursor: pointer;min-height: 26px;
        display:flex;align-items:center;justify-content:center;
      `;
      div.onclick = ()=> assignToSchedule(sIdx, slotIdx, n.uid, displayName, group.date);
      list.appendChild(div);
    });
  });

  $("assignPopup").style.display="block";
};

function assignToSchedule(sIdx, slotIdx, uid, name, groupDate){
  const slot = scheduleList[sIdx].slots[slotIdx];
  slot.uid = uid;
  slot.name = name;
  slot.done = false;
  slot.groupDate = groupDate;
  saveScheduleList();
  $("assignPopup").style.display="none";
}

window.deleteSlot = async ()=>{
  if(clickedSchedule){
    const slot = scheduleList[clickedSchedule.sIdx].slots[clickedSchedule.slotIdx];
    slot.uid=""; slot.name=""; slot.done=false; slot.groupDate=null;
    await saveScheduleList();
  }
  $("assignPopup").style.display="none";
};
window.cancelAssign = ()=> $("assignPopup").style.display="none";

/* =========================
   init
========================= */
(async function init(){
  try{
    await signInAnonymously(auth);

    onValue(ref(db, PATH.schedule), (snap)=>{
      const scheduleObj = snap.exists() ? (snap.val() || null) : null;
      templateAssign = scheduleObj ? buildTemplateAssignFromSchedule(scheduleObj) : {};
      renderLessonTable();
    });

    onValue(ref(db, pathWeek(weekKey)), (snap)=>{
      overridesWeek = snap.exists() ? (snap.val() || {}) : {};
      renderLessonTable();
    });

    onValue(ref(db, PATH.makeupGroups), (snap)=>{
      makeupGroups = snap.val() || [];
      renderMakeupList();
    });

    onValue(ref(db, PATH.scheduleList), (snap)=>{
      scheduleList = snap.val() || [];
      renderScheduleList();
    });

    // ✅ students + coaches 둘 다 listen → merge
    onValue(ref(db, STUDENT_PATHS[0]), async (s)=>{
      studentsA = s.exists() ? (s.val() || {}) : {};
      mergeStudents();
      await fixStoredMakeupNames();
      renderLessonTable(); renderMakeupList(); renderScheduleList();
    });

    onValue(ref(db, STUDENT_PATHS[1]), async (s)=>{
      studentsB = s.exists() ? (s.val() || {}) : {};
      mergeStudents();
      await fixStoredMakeupNames();
      renderLessonTable(); renderMakeupList(); renderScheduleList();
    });

  }catch(e){
    console.error(e);
    alert("Firebase 연결 오류(콘솔 확인)");
  }
})();
</script>

</body>
</html>
