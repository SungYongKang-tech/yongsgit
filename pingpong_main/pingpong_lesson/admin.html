<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOEN 탁구 레슨 관리자</title>

  <!-- ✅ 관리자 인증 없으면 접근 차단 -->
  <script>
  // ✅ 인증 통일: index.html에서 저장하는 SESSION_KEY 기준
  const SESSION_KEY = "koen_pingpong_admin_ok";
  const MAX_AGE_MS = 12 * 60 * 60 * 1000; // 12시간

  const ts = Number(localStorage.getItem(SESSION_KEY) || 0);
  const ok = ts > 0 && (Date.now() - ts) <= MAX_AGE_MS;

  if (!ok) {
    // 만료/미인증이면 키 정리 후 이동
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem("koenAdminAuth"); // (구버전 호환 키도 같이 정리)
    alert("관리자 인증이 필요합니다. (인증이 만료되었습니다)");
    location.href = "./index.html";
  } else {
    // 구버전 호환: 혹시 다른 페이지가 koenAdminAuth를 보면 통과하도록
    localStorage.setItem("koenAdminAuth", "ok");
  }
</script>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --bd:#e6e8ef;
      --txt:#0f172a;
      --mut:#64748b;
      --accent:#2563eb;
      --ok:#16a34a;
      --danger:#ef4444;
      --shadow:0 10px 28px rgba(0,0,0,.08);
      --r:14px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      background:var(--bg);
      color:var(--txt);
      padding:16px;
    }
    .wrap{max-width:1000px;margin:0 auto}
    header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:20px}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}
    a{color:inherit;text-decoration:none}

    .card{
      background:var(--card);
      border:1px solid var(--bd);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }
    .mut{color:var(--mut);font-size:13px;line-height:1.5}
    .btn{
      padding:8px 12px;
      border-radius:10px;
      border:1px solid rgba(37,99,235,.25);
      background:#fff;
      font-weight:800;
      cursor:pointer;
      font-size:13px;
    }
    .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
    .btn.ok{background:var(--ok);color:#fff;border-color:transparent}
    .btn.danger{background:var(--danger);color:#fff;border-color:transparent}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .input, textarea, select{
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      border:1px solid var(--bd);
      font-size:13px;
      outline:none;
      background:#fff;
    }

    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .chip{
      border:1px solid var(--bd);
      background:#fff;
      border-radius:999px;
      padding:7px 10px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      user-select:none;
    }
    .chip:hover{filter:brightness(0.98)}
    .chip small{font-weight:900;color:var(--mut);margin-left:6px}

    table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
      overflow:hidden;
      border-radius:12px
    }
    th,td{border:1px solid var(--bd);padding:6px;text-align:center}
    th{background:#f1f3f9;font-weight:900}
    td select{
      padding:6px 8px;
      border-radius:10px;
      font-size:12px;
    }
    .time-input{
      width:100%;
      min-width:92px;
      padding:6px 8px;
      border-radius:10px;
      border:1px solid var(--bd);
      font-size:12px;
      text-align:center;
      outline:none;
      background:#fff;
    }

    .backdrop{
      position:fixed;inset:0;background:rgba(15,23,42,.42);
      display:none;align-items:center;justify-content:center;padding:16px;
      z-index:9999;
    }
    .backdrop.show{display:flex}
    .modal{
      width:min(920px, 100%);
      background:#fff;border:1px solid var(--bd);
      border-radius:16px;box-shadow:0 18px 60px rgba(0,0,0,.25);
      overflow:hidden;
    }
    .modal-hd{
      padding:12px 14px;border-bottom:1px solid var(--bd);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      background:#fff;
    }
    .modal-hd .title{font-weight:900}
    .modal-bd{padding:12px 14px}
    .grid{
      display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;
      max-height:55vh;overflow:auto;padding-right:4px;
    }
    .mbtn{
      border:1px solid var(--bd);
      background:#fff;
      border-radius:999px;
      padding:7px 10px;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
    .mbtn.on{
      background:rgba(37,99,235,.10);
      border-color:rgba(37,99,235,.25);
      color:var(--accent);
    }

    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      background:#111827;color:#fff;padding:10px 12px;border-radius:999px;
      box-shadow:0 10px 28px rgba(0,0,0,.22);
      opacity:0;pointer-events:none;transition:.18s;
      font-weight:900;font-size:13px;z-index:10000
    }
    .toast.show{opacity:1}

    .slotCard{
      border:1px solid var(--bd);
      border-radius:14px;
      background:#fff;
      padding:12px;
      margin-top:10px;
    }
    .slotHd{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      margin-bottom:8px;
    }
    .slotHd .ttl{font-weight:900}
    .mini{font-size:12px;color:var(--mut)}
    .sTable{width:100%;border-collapse:collapse;font-size:12px;overflow:hidden;border-radius:12px}
    .sTable th,.sTable td{border:1px solid var(--bd);padding:6px;text-align:center}
    .sTable th{background:#f1f3f9;font-weight:900}
    .del-mini{
      padding:6px 10px;
      border-radius:10px;
      border:none;
      font-weight:900;
      cursor:pointer;
      font-size:12px;
      background:var(--danger);
      color:#fff;
    }
  </style>
</head>

<body>
<div class="wrap">

  <header>
    <h1>🏓 레슨 관리자</h1>
    <div class="top-actions">
      <a class="btn" href="./index.html">← 레슨 메인</a>
      <a class="btn" href="../index.html">← 탁구 메인</a>
      <button class="btn" id="refreshBtn" type="button">새로고침</button>

      <!-- ✅ 로그아웃(인증 해제) -->
      <button class="btn danger" id="logoutBtn" type="button">로그아웃</button>
    </div>
  </header>

  <div class="card">
    <div class="mut">
      상태: <b id="statusText">연결 준비중…</b>
    </div>
  </div>

  <!-- 레슨자 선택 -->
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div>
        <div style="font-weight:900">👥 레슨자 선택</div>
        <div class="mut">[회원에서 선택]을 눌러 전체 회원에서 레슨자를 지정합니다. (칩 클릭 → 해제)</div>
      </div>
      <div class="row">
        <button class="btn primary" id="openPickerBtn" type="button">회원에서 선택</button>
      </div>
    </div>

    <div class="chips" id="coachChips"></div>
  </div>

  <!-- 시간표 -->
  <div class="card">
    <div style="font-weight:900;margin-bottom:6px">📅 레슨 시간표 (아침/점심/저녁)</div>
    <div class="mut" style="margin-bottom:10px">
      각 구분(아침/점심/저녁)에서 타임을 여러 개 추가할 수 있습니다. 시간표에는 등급 표시 없음.
    </div>

    <div id="scheduleWrap"></div>

    <div class="row" style="margin-top:12px;justify-content:flex-end">
      <button class="btn primary" id="saveScheduleBtn" type="button">시간표 저장</button>
    </div>
  </div>

  <!-- 안내문 -->
  <div class="card">
    <div style="font-weight:900;margin-bottom:6px">📄 신규회원 안내문</div>
    <textarea id="guideText" rows="7" class="input" placeholder="안내문 내용을 임시저장 하세요"></textarea>
    <div class="row" style="justify-content:flex-end">
      <button id="saveGuideBtn" class="btn primary" type="button">안내문 저장</button>
    </div>
  </div>

  <!-- 대기자 -->
  <div class="card">
    <div style="font-weight:900;margin-bottom:6px">⏳ 레슨 대기자 관리</div>
    <div class="row">
      <input id="waitingName" class="input" placeholder="이름 입력" style="max-width:260px">
      <button id="addWaitingBtn" class="btn ok" type="button">추가</button>
    </div>
    <div id="waitingList" class="mut" style="margin-top:8px;line-height:1.9"></div>
  </div>

</div>

<!-- 회원 선택 모달 -->
<div class="backdrop" id="pickerBack">
  <div class="modal">
    <div class="modal-hd">
      <div class="title">회원에서 레슨자 선택</div>
      <button class="btn" id="closePickerBtn" type="button">닫기</button>
    </div>
    <div class="modal-bd">
      <input id="memberSearch" class="input" placeholder="검색: 이름 입력 (예: 성용)" />
      <div class="mut">버튼을 누르면 레슨자 등록/해제됩니다.</div>
      <div class="grid" id="memberGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ✅ 로그아웃 처리(인증 해제) -->
<script>
  document.addEventListener("DOMContentLoaded", ()=>{
    const SESSION_KEY = "koen_pingpong_admin_ok";

    const btn = document.getElementById("logoutBtn");
    if(btn){
      btn.addEventListener("click", ()=>{
        localStorage.removeItem("koenAdminAuth");
        localStorage.removeItem(SESSION_KEY);
        location.href = "./index.html";
      });
    }

    const refreshBtn = document.getElementById("refreshBtn");
    if(refreshBtn){
      refreshBtn.addEventListener("click", ()=>location.reload());
    }
  });
</script>

<!-- ✅ 실제 로직은 admin.js -->
<script type="module" src="./admin.js"></script>
</body>
</html>
