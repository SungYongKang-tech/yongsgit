<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:title" content="KOEN 탁구 레슨" />
  <meta property="og:description" content="KOEN 탁구 레슨 안내 및 신청 페이지" />
  <meta property="og:image" content="https://sensational-tulumba-65e97e.netlify.app/pingpong_main/pingpong_lesson/sinyubin.jpg" />
  <meta property="og:type" content="website" />

  <title>KOEN 탁구 레슨</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 24px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #0d47a1;
      font-size: 24px;
      margin: 10px 0;
      text-align: center;
    }

    .thumbnail {
      width: 100%;
      max-width: 320px;
      border-radius: 10px;
      margin-bottom: 18px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .link-button {
      display: block;
      padding: 14px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      color: white;
      transition: transform 0.1s ease, filter 0.15s ease;
      border: 0;
      cursor: pointer;
    }

    .link-button:hover { filter: brightness(1.05); }
    .link-button:active { transform: scale(0.97); }

    .btn-blue    { background-color: #1976d2; }
    .btn-green   { background-color: #388e3c; }
    .btn-purple  { background-color: #7b1fa2; }
    .btn-orange  { background-color: #f57c00; }
    .btn-red     { background-color: #d32f2f; }
    .btn-teal    { background-color: #00796b; }

    .waiting-box{
      margin-top:30px;
      width:100%;
      max-width:360px;
      background:#ffffff;
      border-radius:10px;
      padding:14px;
      box-shadow:0 4px 8px rgba(0,0,0,0.05);
      font-size:14px;
    }

    .waiting-box h3{
      margin:0 0 8px 0;
      font-size:15px;
      color:#444;
    }

    .waiting-list{
      line-height:1.7;
      color:#333;
      white-space: pre-line; /* ✅ 줄바꿈 유지 */
    }

    /* ✅ 관리자 비번 모달 */
    .modalBack{
      position:fixed; inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:16px;
    }
    .modal{
      width:100%;
      max-width:380px;
      background:#fff;
      border-radius:14px;
      padding:16px;
      box-shadow:0 18px 50px rgba(0,0,0,.18);
    }
    .modal h3{
      margin:0 0 10px 0;
      font-size:16px;
      color:#111;
    }
    .modal .row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
    }
    .modal input{
      flex:1;
      padding:12px 12px;
      font-size:15px;
      border:1px solid #d7dbe3;
      border-radius:12px;
      outline:none;
    }
    .mBtn{
      padding:12px 12px;
      font-size:14px;
      font-weight:800;
      border-radius:12px;
      border:1px solid rgba(13,71,161,.18);
      background:#0d47a1;
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
    }
    .mBtn.gray{
      background:#eef2f7;
      color:#111;
      border:1px solid #d7dbe3;
    }
    .hint{
      margin-top:8px;
      font-size:13px;
      color:#666;
    }

    @media (max-width: 480px) {
      h1 { font-size: 20px; }
      .link-button { font-size: 15px; padding: 12px; }
    }
  </style>
</head>

<body>

  <h1>🏓 KOEN 탁구 레슨</h1>

  <img
    src="https://sensational-tulumba-65e97e.netlify.app/pingpong_main/pingpong_lesson/sinyubin.jpg"
    alt="KOEN 탁구 레슨"
    class="thumbnail"
  />

  <div class="button-container">
    <button class="link-button btn-purple" id="openAdminBtn" type="button">
      🔐 레슨 관리자 페이지
    </button>

    <a class="link-button btn-blue" href="./new-member-guide.html">
      📄 신규회원 탁구 레슨 안내문
    </a>

    <a class="link-button btn-green" href="./lesson-schedule.html">
      📅 탁구 레슨 시간표
    </a>

    <a class="link-button btn-red" href="./makeup_lesson.html">
      🔁 레슨 보강 일정관리
    </a>

    <a class="link-button btn-orange" href="./lesson-fee.html">
      💳 레슨비 입금확인
    </a>

    <a class="link-button btn-teal" href="./pingpong-skil.html">
      ▶️ 탁구기술 영상
    </a>

  </div>

  <!-- 🔽 대기자 목록 텍스트 표시 -->
  <div class="waiting-box">
    <h3>⏳ 현재 레슨 대기자</h3>
    <div id="waitingTextList" class="waiting-list">
      불러오는 중...
    </div>
  </div>

  <div style="margin-top:20px;">
    <a href="../index.html">← KOEN 탁구 메인으로 돌아가기</a>
  </div>

  <!-- ✅ 관리자 비밀번호 모달 -->
  <div class="modalBack" id="adminModalBack" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
      <h3 id="adminModalTitle">🔐 관리자 비밀번호 입력</h3>

      <div class="row">
        <input
          id="adminPassInput"
          type="password"
          placeholder="4자리 비밀번호"
          inputmode="numeric"
          autocomplete="current-password"
        />
      </div>

      <div class="row" style="justify-content:flex-end;">
        <button class="mBtn gray" type="button" id="adminCancelBtn">취소</button>
        <button class="mBtn" type="button" id="adminGoBtn">확인</button>
      </div>

      <div class="hint">※ 비밀번호가 맞으면 관리자 페이지로 이동합니다.</div>
    </div>
  </div>

  <!-- Firebase 대기자 불러오기 + 관리자 인증 처리 -->
  <script type="module">
    // ✅ pingpong_main/firebase.js 사용
    import { db } from "../firebase.js";

    // ✅ 10.12.4 통일
    import { ref, onValue, get } from
      "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    /* ==========================
       ✅ 대기자 표시
    ========================== */
    const waitingRef = ref(db, "lesson/waiting");

    onValue(waitingRef, (snap) => {
      const data = snap.val() || {};
      const listEl = document.getElementById("waitingTextList");

      const names = Object.values(data)
        .map(v => (v?.name || "").trim())
        .filter(Boolean);

      if (names.length === 0) {
        listEl.textContent = "현재 대기자가 없습니다.";
        return;
      }

      const lines = names.map((name, idx) => `${idx + 1}. ${name}`);
      listEl.textContent = lines.join("\n");
    });

    /* ==========================
       ✅ 관리자 페이지 진입 보호 (평문 비교)
       - admin.js가 저장하는 config/adminPasswordPlain 을 그대로 사용
       - 성공 시:
         1) koenAdminAuth="ok" (기존 admin.html guard용)
         2) koen_pingpong_admin_ok=Date.now() (레슨/통합 세션용)
    ========================== */
    const $ = (id) => document.getElementById(id);

    const ADMIN_PW_PATH = "config/adminPasswordPlain";
    const SESSION_KEY = "koen_pingpong_admin_ok";

    function only4Digits(v){
      return (v || "").replace(/\D/g, "").slice(0, 4);
    }

    const adminModalBack = $("adminModalBack");
    const adminPassInput = $("adminPassInput");

    function openModal(){
      adminModalBack.style.display = "flex";
      adminPassInput.value = "";
      setTimeout(() => adminPassInput.focus(), 50);
    }
    function closeModal(){
      adminModalBack.style.display = "none";
      adminPassInput.value = "";
    }

    $("openAdminBtn").addEventListener("click", openModal);
    $("adminCancelBtn").addEventListener("click", closeModal);

    adminModalBack.addEventListener("click", (e)=>{
      if (e.target === adminModalBack) closeModal();
    });

    adminPassInput.addEventListener("keydown", (e)=>{
      if (e.key === "Enter") $("adminGoBtn").click();
      if (e.key === "Escape") closeModal();
    });

    $("adminGoBtn").addEventListener("click", async ()=>{
      const pass = only4Digits(adminPassInput.value);
      adminPassInput.value = pass;

      if (pass.length !== 4) {
        alert("비밀번호는 4자리 숫자여야 합니다.");
        adminPassInput.focus();
        return;
      }

      try{
        const snap = await get(ref(db, ADMIN_PW_PATH));
        const savedPw = String(snap.val() || "").trim();

        if (!savedPw) {
          alert("관리자 비밀번호가 설정되어 있지 않습니다.\n관리자 페이지에서 먼저 설정해 주세요.");
          return;
        }

        if (pass !== savedPw) {
          alert("비밀번호가 일치하지 않습니다.");
          adminPassInput.focus();
          return;
        }

        // ✅ 기존 관리자 페이지 guard 호환
        localStorage.setItem("koenAdminAuth", "ok");

        // ✅ 통합 세션(레슨 관리자/다른 페이지에서 사용 가능)
        localStorage.setItem(SESSION_KEY, String(Date.now()));

        closeModal();
        location.href = "./admin.html";
      }catch(err){
        console.error(err);
        alert("관리자 인증 중 오류가 발생했습니다. (권한/연결/경로 확인)");
      }
    });
  </script>

</body>
</html>
