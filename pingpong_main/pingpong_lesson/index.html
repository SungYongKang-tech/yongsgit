<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:title" content="KOEN 탁구 레슨" />
  <meta property="og:description" content="KOEN 탁구 레슨 안내 및 신청 페이지" />
  <meta property="og:image" content="https://sensational-tulumba-65e97e.netlify.app/pingpong_main/pingpong_lesson/sinyubin.jpg" />
  <meta property="og:type" content="website" />

  <title>KOEN 탁구 레슨</title>

  <style>
    :root{
      --bg1:#eef4ff;
      --bg2:#f8fbff;
      --card:#ffffff;
      --text:#14213d;
      --muted:#657084;
      --line:#e4eaf3;
      --shadow:0 10px 28px rgba(19,33,68,.10);
      --radius:22px;

      --blue:#1976d2;
      --green:#388e3c;
      --purple:#7b1fa2;
      --orange:#f57c00;
      --red:#d32f2f;
      --teal:#00796b;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      font-family:"Pretendard","Segoe UI","Noto Sans KR",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #dce9ff 0%, transparent 35%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height:100%;
    }

    body{
      display:flex;
      justify-content:center;
      padding:18px 14px 34px;
    }

    .app-shell{
      width:100%;
      max-width:430px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, #0d47a1 0%, #1976d2 60%, #42a5f5 100%);
      border-radius:28px;
      padding:22px 18px 18px;
      color:#fff;
      box-shadow:0 18px 38px rgba(13,71,161,.22);
      margin-bottom:16px;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      right:-48px;
      top:-45px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
    }

    .hero::after{
      content:"";
      position:absolute;
      width:110px;
      height:110px;
      left:-25px;
      bottom:-34px;
      border-radius:50%;
      background:rgba(255,255,255,.10);
    }

    .hero-top{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .hero-badge{
      width:58px;
      height:58px;
      border-radius:18px;
      background:rgba(255,255,255,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
      flex-shrink:0;
    }

    .hero-text h1{
      margin:0;
      font-size:25px;
      font-weight:800;
      line-height:1.15;
      letter-spacing:-0.3px;
    }

    .hero-text p{
      margin:6px 0 0;
      font-size:13px;
      line-height:1.5;
      color:rgba(255,255,255,.92);
    }

    .thumb-card{
      position:relative;
      z-index:1;
      margin-top:16px;
      padding:10px;
      border-radius:22px;
      background:rgba(255,255,255,.12);
      backdrop-filter: blur(6px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .thumbnail{
      width:100%;
      display:block;
      border-radius:16px;
      aspect-ratio:16 / 10;
      object-fit:cover;
      box-shadow:0 8px 18px rgba(0,0,0,.16);
    }

    .section-title{
      margin:18px 4px 12px;
      font-size:15px;
      font-weight:800;
      color:#1d2a44;
    }

    .menu-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .menu-card,
    .menu-button{
      width:100%;
      display:flex;
      align-items:center;
      gap:14px;
      text-decoration:none;
      background:var(--card);
      border-radius:20px;
      padding:14px 15px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
      color:var(--text);
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
    }

    .menu-button{
      cursor:pointer;
      border:1px solid var(--line);
    }

    .menu-card:hover,
    .menu-button:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(19,33,68,.12);
      filter:brightness(1.01);
    }

    .menu-card:active,
    .menu-button:active{
      transform:scale(.985);
    }

    .menu-card:focus-visible,
    .menu-button:focus-visible{
      outline:none;
      box-shadow:
        0 0 0 3px rgba(21,101,192,.18),
        0 12px 28px rgba(19,33,68,.12);
    }

    .icon-wrap{
      width:50px;
      height:50px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:22px;
      flex-shrink:0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .menu-text{
      flex:1;
      min-width:0;
      text-align:left;
    }

    .menu-text strong{
      display:block;
      font-size:16px;
      font-weight:800;
      margin-bottom:4px;
      letter-spacing:-0.2px;
    }

    .menu-text span{
      display:block;
      font-size:12.5px;
      color:var(--muted);
      line-height:1.45;
    }

    .arrow{
      color:#8a94a6;
      font-size:20px;
      font-weight:700;
      flex-shrink:0;
    }

    .purple{ background:linear-gradient(135deg, #8e24aa, #7b1fa2); }
    .blue{ background:linear-gradient(135deg, #1e88e5, #1976d2); }
    .green{ background:linear-gradient(135deg, #43a047, #388e3c); }
    .red{ background:linear-gradient(135deg, #e53935, #d32f2f); }
    .orange{ background:linear-gradient(135deg, #fb8c00, #f57c00); }
    .teal{ background:linear-gradient(135deg, #00897b, #00796b); }

    .waiting-box{
      margin-top:16px;
      background:#fff;
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    .waiting-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .waiting-head h3{
      margin:0;
      font-size:16px;
      font-weight:800;
      color:#1d2a44;
    }

    .count-badge{
      min-width:32px;
      height:32px;
      padding:0 10px;
      border-radius:999px;
      background:#edf4ff;
      color:#1565c0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:800;
      border:1px solid #dbe8ff;
    }

    .waiting-list{
      line-height:1.8;
      color:#2b3445;
      white-space:pre-line;
      font-size:14px;
      background:#f8fbff;
      border:1px solid #edf2f8;
      border-radius:16px;
      padding:12px 14px;
    }

    .back-link-wrap{
      margin-top:16px;
      text-align:center;
    }

    .back-link{
      display:inline-block;
      text-decoration:none;
      color:#0d47a1;
      font-size:14px;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      background:#eef4ff;
      border:1px solid #dbe8ff;
    }

    /* ✅ 관리자 비번 모달 */
    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(9,18,39,.42);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:16px;
      backdrop-filter: blur(2px);
    }

    .modal{
      width:100%;
      max-width:380px;
      background:#fff;
      border-radius:20px;
      padding:18px;
      box-shadow:0 22px 55px rgba(0,0,0,.22);
      border:1px solid #eef2f7;
    }

    .modal h3{
      margin:0 0 10px 0;
      font-size:17px;
      color:#111827;
    }

    .modal .row{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
    }

    .modal input{
      flex:1;
      padding:13px 14px;
      font-size:15px;
      border:1px solid #d7dbe3;
      border-radius:14px;
      outline:none;
    }

    .modal input:focus{
      border-color:#90caf9;
      box-shadow:0 0 0 3px rgba(25,118,210,.12);
    }

    .mBtn{
      padding:12px 14px;
      font-size:14px;
      font-weight:800;
      border-radius:14px;
      border:1px solid rgba(13,71,161,.18);
      background:#0d47a1;
      color:#fff;
      cursor:pointer;
      white-space:nowrap;
    }

    .mBtn.gray{
      background:#eef2f7;
      color:#111;
      border:1px solid #d7dbe3;
    }

    .hint{
      margin-top:9px;
      font-size:13px;
      color:#667085;
      line-height:1.5;
    }

    @media (max-width:480px){
      body{ padding:14px 12px 28px; }
      .hero-text h1{ font-size:22px; }
      .menu-text strong{ font-size:15px; }
      .menu-text span{ font-size:12px; }
      .icon-wrap{
        width:46px;
        height:46px;
        font-size:20px;
      }
    }
  </style>
</head>

<body>

  <main class="app-shell">

    <section class="hero">
      <div class="hero-top">
        <div class="hero-badge">🏓</div>
        <div class="hero-text">
          <h1>KOEN 탁구 레슨</h1>
          <p>레슨 안내, 시간표, 보강일정 등 레슨관련 정보확인</p>
        </div>
      </div>

      <div class="thumb-card">
        <img
          src="https://sensational-tulumba-65e97e.netlify.app/pingpong_main/pingpong_lesson/sinyubin.jpg"
          alt="KOEN 탁구 레슨"
          class="thumbnail"
        />
      </div>
    </section>

    <div class="section-title">레슨 메뉴</div>

   <section class="menu-list">

  <button class="menu-button" id="openAdminBtn" type="button">
    <div class="icon-wrap purple">🔐</div>
    <div class="menu-text">
      <strong>레슨 관리자 페이지</strong>
    </div>
    <div class="arrow">›</div>
  </button>

  <a class="menu-card" href="./new-member-guide.html">
    <div class="icon-wrap blue">📄</div>
    <div class="menu-text">
      <strong>신규회원 탁구 레슨 안내문</strong>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="menu-card" href="./lesson-schedule.html">
    <div class="icon-wrap green">📅</div>
    <div class="menu-text">
      <strong>탁구 레슨 시간표</strong>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="menu-card" href="./makeup_lesson.html">
    <div class="icon-wrap red">🔁</div>
    <div class="menu-text">
      <strong>레슨 보강 일정관리</strong>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="menu-card" href="./lesson-fee.html">
    <div class="icon-wrap orange">💳</div>
    <div class="menu-text">
      <strong>레슨비 입금확인</strong>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="menu-card" href="./pingpong-skil.html">
    <div class="icon-wrap teal">▶️</div>
    <div class="menu-text">
      <strong>탁구기술 영상</strong>
    </div>
    <div class="arrow">›</div>
  </a>

</section>

    <section class="waiting-box">
      <div class="waiting-head">
        <h3>⏳ 현재 레슨 대기자</h3>
        <div class="count-badge" id="waitingCount">0명</div>
      </div>
      <div id="waitingTextList" class="waiting-list">불러오는 중...</div>
    </section>

    <div class="back-link-wrap">
      <a class="back-link" href="../index.html">← KOEN 탁구 메인으로</a>
    </div>

  </main>

  <!-- ✅ 관리자 비밀번호 모달 -->
  <div class="modalBack" id="adminModalBack" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
      <h3 id="adminModalTitle">🔐 관리자 비밀번호 입력</h3>

      <div class="row">
        <input
          id="adminPassInput"
          type="password"
          placeholder="4자리 비밀번호"
          inputmode="numeric"
          autocomplete="current-password"
        />
      </div>

      <div class="row" style="justify-content:flex-end;">
        <button class="mBtn gray" type="button" id="adminCancelBtn">취소</button>
        <button class="mBtn" type="button" id="adminGoBtn">확인</button>
      </div>

      <div class="hint">※ 비밀번호가 맞으면 관리자 페이지로 이동합니다.</div>
    </div>
  </div>

  <!-- Firebase 대기자 불러오기 + 관리자 인증 처리 -->
  <script type="module">
    import { db } from "../firebase.js";
    import { ref, onValue, get } from
      "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    /* ==========================
       ✅ 대기자 표시
    ========================== */
    const waitingRef = ref(db, "lesson/waiting");

    onValue(waitingRef, (snap) => {
      const data = snap.val() || {};
      const listEl = document.getElementById("waitingTextList");
      const countEl = document.getElementById("waitingCount");

      const names = Object.values(data)
        .map(v => (v?.name || "").trim())
        .filter(Boolean);

      countEl.textContent = `${names.length}명`;

      if (names.length === 0) {
        listEl.textContent = "현재 대기자가 없습니다.";
        return;
      }

      const lines = names.map((name, idx) => `${idx + 1}. ${name}`);
      listEl.textContent = lines.join("\n");
    });

    /* ==========================
       ✅ 관리자 페이지 진입 보호
    ========================== */
    const $ = (id) => document.getElementById(id);

    const ADMIN_PW_PATH = "config/adminPasswordPlain";
    const SESSION_KEY = "koen_pingpong_admin_ok";

    function only4Digits(v){
      return (v || "").replace(/\D/g, "").slice(0, 4);
    }

    const adminModalBack = $("adminModalBack");
    const adminPassInput = $("adminPassInput");

    function openModal(){
      adminModalBack.style.display = "flex";
      adminPassInput.value = "";
      setTimeout(() => adminPassInput.focus(), 50);
    }

    function closeModal(){
      adminModalBack.style.display = "none";
      adminPassInput.value = "";
    }

    $("openAdminBtn").addEventListener("click", openModal);
    $("adminCancelBtn").addEventListener("click", closeModal);

    adminModalBack.addEventListener("click", (e)=>{
      if (e.target === adminModalBack) closeModal();
    });

    adminPassInput.addEventListener("keydown", (e)=>{
      if (e.key === "Enter") $("adminGoBtn").click();
      if (e.key === "Escape") closeModal();
    });

    $("adminGoBtn").addEventListener("click", async ()=>{
      const pass = only4Digits(adminPassInput.value);
      adminPassInput.value = pass;

      if (pass.length !== 4) {
        alert("비밀번호는 4자리 숫자여야 합니다.");
        adminPassInput.focus();
        return;
      }

      try{
        const snap = await get(ref(db, ADMIN_PW_PATH));
        const savedPw = String(snap.val() || "").trim();

        if (!savedPw) {
          alert("관리자 비밀번호가 설정되어 있지 않습니다.\n관리자 페이지에서 먼저 설정해 주세요.");
          return;
        }

        if (pass !== savedPw) {
          alert("비밀번호가 일치하지 않습니다.");
          adminPassInput.focus();
          return;
        }

        localStorage.setItem("koenAdminAuth", "ok");
        localStorage.setItem(SESSION_KEY, String(Date.now()));

        closeModal();
        location.href = "./admin.html";
      }catch(err){
        console.error(err);
        alert("관리자 인증 중 오류가 발생했습니다. (권한/연결/경로 확인)");
      }
    });
  </script>

</body>
</html>
