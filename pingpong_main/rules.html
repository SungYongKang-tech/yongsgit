<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탁구규정</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#10203a;
      --sub:#5b6b84;
      --line:#dbe3f0;
      --primary:#1f5eff;
      --primary-soft:#eaf1ff;
      --accent:#ffb703;
      --shadow:0 10px 30px rgba(19, 39, 75, 0.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:18px 14px 40px;
    }

    .hero{
      background:linear-gradient(135deg, #1f5eff, #4f7dff);
      color:#fff;
      border-radius:24px;
      padding:22px 18px 14px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .title{
      font-size:28px;
      font-weight:800;
      margin:0 0 8px;
      letter-spacing:-0.4px;
    }

    .desc{
      margin:0;
      font-size:14px;
      opacity:.92;
      word-break:keep-all;
    }

    .chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:14px;
    }

    .hero-chip{
      background:rgba(255,255,255,0.16);
      border:1px solid rgba(255,255,255,0.22);
      color:#fff;
      padding:7px 10px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
    }

    .search-card{
      background:var(--card);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }

    .search-label{
      display:block;
      font-size:13px;
      font-weight:700;
      color:var(--sub);
      margin-bottom:8px;
    }

    .search-input{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 14px;
      font-size:16px;
      outline:none;
      transition:.2s;
      background:#fff;
    }

    .search-input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(31,94,255,.10);
    }

    .quick-nav{
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:4px;
      margin-top:12px;
      scrollbar-width:none;
    }
    .quick-nav::-webkit-scrollbar{display:none}

    .quick-btn{
      white-space:nowrap;
      border:none;
      background:var(--primary-soft);
      color:var(--primary);
      padding:10px 12px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }

    .section-title{
      font-size:18px;
      font-weight:800;
      margin:18px 4px 10px;
      letter-spacing:-0.2px;
    }

    .rule-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .rule-card{
      background:var(--card);
      border-radius:20px;
      box-shadow:var(--shadow);
      border:1px solid #eef2f8;
      overflow:hidden;
    }

    .rule-head{
      width:100%;
      border:none;
      background:#fff;
      cursor:pointer;
      text-align:left;
      padding:16px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .rule-head-left{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
    }

    .badge{
      flex:0 0 auto;
      background:var(--primary-soft);
      color:var(--primary);
      font-size:12px;
      font-weight:800;
      border-radius:999px;
      padding:7px 10px;
      margin-top:2px;
    }

    .rule-title-wrap{
      min-width:0;
    }

    .rule-title{
      font-size:18px;
      font-weight:800;
      margin:0 0 4px;
      color:var(--text);
    }

    .rule-summary{
      margin:0;
      color:var(--sub);
      font-size:14px;
      word-break:keep-all;
    }

    .arrow{
      flex:0 0 auto;
      width:32px;
      height:32px;
      border-radius:999px;
      background:#f2f6fd;
      display:grid;
      place-items:center;
      font-size:16px;
      color:#4666a8;
      transition:transform .2s ease;
    }

    .rule-card.open .arrow{
      transform:rotate(180deg);
    }

    .rule-body{
      display:none;
      padding:0 16px 16px;
      border-top:1px solid #edf2fa;
      background:#fff;
    }

    .rule-card.open .rule-body{
      display:block;
    }

    .rule-box{
      margin-top:14px;
      background:#f8fbff;
      border:1px solid #e4eefc;
      border-radius:16px;
      padding:14px;
    }

    .rule-box-title{
      margin:0 0 10px;
      font-size:14px;
      font-weight:800;
      color:#2c4c8f;
    }

    .bullet{
      margin:0;
      padding-left:18px;
    }

    .bullet li{
      margin:8px 0;
      color:#19304f;
      word-break:keep-all;
    }

    .source{
      margin-top:12px;
      font-size:12px;
      color:#6a7a93;
      font-weight:700;
    }

    .empty{
      background:#fff;
      border:1px dashed var(--line);
      border-radius:18px;
      padding:28px 16px;
      text-align:center;
      color:var(--sub);
      font-weight:700;
    }

    .footer{
      margin-top:20px;
      background:#fff;
      border-radius:18px;
      padding:16px;
      border:1px solid #edf2fa;
      color:#5f6f87;
      font-size:13px;
      line-height:1.6;
    }

    .footer strong{
      color:#274372;
    }

    .highlight{
      color:#1f5eff;
      font-weight:800;
    }

    @media (max-width: 480px){
      .wrap{padding:14px 10px 28px}
      .hero{padding:18px 14px 14px;border-radius:20px}
      .title{font-size:24px}
      .rule-title{font-size:17px}
      .rule-head{padding:14px}
      .rule-body{padding:0 14px 14px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1 class="title">🏓 탁구규정</h1>
          <p class="desc">
            아마추어 실전 경기에서 자주 보는 규정만 쉽게 정리했습니다.
            국제경기 운영 규정은 빼고, 실제 경기 진행에 필요한 핵심만 넣었습니다.
          </p>
        </div>
      </div>

      
    </section>

    <section class="search-card">
      <label class="search-label" for="searchInput">규정 검색</label>
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="예: 에지, 서브, 렛, 복식, 11점, 네트"
      />

      <div class="quick-nav" id="quickNav">
        <button class="quick-btn" data-go="game">경기 방식</button>
        <button class="quick-btn" data-go="service">서비스</button>
        <button class="quick-btn" data-go="let">렛</button>
        <button class="quick-btn" data-go="point">실점/득점</button>
        <button class="quick-btn" data-go="order">복식 순서</button>
        <button class="quick-btn" data-go="faq">자주 묻는 판정</button>
      </div>
    </section>

    <h2 class="section-title">실전용 규정 정리</h2>
    <section id="ruleList" class="rule-list"></section>

    <section class="footer">
      <strong>안내</strong><br>
      이 페이지는 ITTF 2025 규정 번역본 중 아마추어 경기에서 자주 쓰는 규정만 쉽게 재구성한 안내 페이지입니다.<br>
      <span class="highlight">출처: ITTF Statutes 2025 / 대한탁구협회 심판위원회(KTTA URC) 번역본 참고</span><br>
      국제경기 운영, 광고, 복장, 심판 조직 등은 제외했습니다.
    </section>
  </div>

  <script src="./rules-data.js"></script>
  <script>
    const ruleList = document.getElementById("ruleList");
    const searchInput = document.getElementById("searchInput");
    const quickNav = document.getElementById("quickNav");

    const rules = Array.isArray(window.RULES_DATA) ? window.RULES_DATA : [];

    function createRuleCard(rule) {
      const article = document.createElement("article");
      article.className = "rule-card";
      article.id = rule.id;

      article.innerHTML = `
        <button class="rule-head" type="button" aria-expanded="false">
          <div class="rule-head-left">
            <div class="badge">${escapeHtml(rule.badge || "규정")}</div>
            <div class="rule-title-wrap">
              <h3 class="rule-title">${escapeHtml(rule.title)}</h3>
              <p class="rule-summary">${escapeHtml(rule.summary || "")}</p>
            </div>
          </div>
          <div class="arrow">⌄</div>
        </button>

        <div class="rule-body">
          <div class="rule-box">
            <h4 class="rule-box-title">핵심 내용</h4>
            <ul class="bullet">
              ${(rule.items || []).map(item => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
          </div>

          ${(rule.tips && rule.tips.length) ? `
            <div class="rule-box">
              <h4 class="rule-box-title">실전 팁</h4>
              <ul class="bullet">
                ${rule.tips.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
              </ul>
            </div>
          ` : ""}

          <div class="source">근거: ${escapeHtml(rule.source || "-")}</div>
        </div>
      `;

      const head = article.querySelector(".rule-head");
      head.addEventListener("click", () => {
        const isOpen = article.classList.contains("open");
        article.classList.toggle("open", !isOpen);
        head.setAttribute("aria-expanded", String(!isOpen));
      });

      return article;
    }

    function renderRules(keyword = "") {
      const q = keyword.trim().toLowerCase();

      const filtered = rules.filter(rule => {
        if (!q) return true;

        const pool = [
          rule.badge,
          rule.title,
          rule.summary,
          rule.source,
          ...(rule.keywords || []),
          ...(rule.items || []),
          ...(rule.tips || [])
        ]
          .join(" ")
          .toLowerCase();

        return pool.includes(q);
      });

      ruleList.innerHTML = "";

      if (!filtered.length) {
        ruleList.innerHTML = `<div class="empty">검색 결과가 없습니다.<br>다른 단어로 다시 검색해보세요.</div>`;
        return;
      }

      filtered.forEach(rule => {
        ruleList.appendChild(createRuleCard(rule));
      });
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    searchInput.addEventListener("input", (e) => {
      renderRules(e.target.value);
    });

    quickNav.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-go]");
      if (!btn) return;

      const id = btn.dataset.go;
      const target = document.getElementById(id);

      if (!target) return;

      const head = target.querySelector(".rule-head");
      if (!target.classList.contains("open")) {
        target.classList.add("open");
        head?.setAttribute("aria-expanded", "true");
      }

      target.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    renderRules();
  </script>
</body>
</html>
