<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🏓 관리자모드</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
  --ink:#0f172a; --muted:#64748b; --card:#fff; --bg:#f5f7fb;
  --primary:#0d47a1; --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08); --gray:#9ca3af;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Pretendard","Noto Sans KR",sans-serif;
  font-weight:600;
  color:var(--ink);
  background:var(--bg);
}
header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  position:sticky; top:0; z-index:10;
}
.header-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:14px 0;
}
h1{
  margin:4px 0 10px;
  font-size:clamp(20px,4vw,24px);
  color:var(--primary);
  font-weight:700;
}
.btn{
  border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;
  font-size:14px;background:#fff;cursor:pointer;font-weight:600;
  transition:.15s;
  text-decoration:none;
  color:inherit;
}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.warn{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.card{
  background:var(--card);border:1px solid #e5e7eb;border-radius:12px;
  padding:14px;box-shadow:var(--shadow);margin:10px 0;
}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ✅ wrap */
.wrap{
  max-width:960px;
  margin:0 auto;
  padding:12px;
}

.toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:18px;
  background:#111827;color:#fff;padding:10px 14px;border-radius:12px;
  opacity:0;transition:.25s;font-weight:600;
}
.toast.show{opacity:1}

@media(max-width:640px){
  .btn{font-size:13px;padding:5px 8px;}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1 id="pageHeader">🏓 관리자모드</h1>
    <div class="row" style="justify-content:center;">
      <a class="btn" href="index.html">← 경기결과 입력</a>
      <a class="btn primary" href="monthly-report.html">📊 월간 리포트</a>
      <a href="https://sensational-tulumba-65e97e.netlify.app/pingpong/pingpong_rank/koen_vs_lh/" class="btn ok">🤝 KOEN vs LH</a>
    </div>
  </div>
</header>

<main class="wrap">

  <!-- ✅ 제목 설정 (유지) -->
  <section class="card">
    <h3>사이트 제목 설정</h3>
    <div class="row">
      <input id="siteTitle" type="text" placeholder="예: 진주탁구클럽"
        style="flex:1; min-width:220px; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px;"/>
      <button id="saveTitle" class="btn primary">저장</button>
    </div>
    <small style="color:var(--muted)">이 제목은 경기결과/월간리포트/관리자모드 전체에 반영됩니다.</small>
  </section>

  <!-- ✅ 데이터 관리 (이번달) -->
  <section class="card">
    <h3>데이터 관리 (이번달)</h3>
    <div class="row">
      <button id="deleteCurrentMonth" class="btn warn">🗑 이번달 전적 전체 삭제</button>
    </div>
    <small style="color:var(--danger);font-weight:600;">
      ⚠️ 주의: 이 기능은 현재 월의 모든 경기 결과를 삭제합니다.<br>
      삭제 비밀번호가 일치해야 실행됩니다.
    </small>
  </section>

  <!-- ✅ 데이터 관리 (지난달) -->
  <section class="card">
    <h3>데이터 관리 (지난달)</h3>
    <div class="row">
      <button id="deletePrevMonth" class="btn warn">🗑 지난달 전적 전체 삭제</button>
    </div>
    <small style="color:var(--danger);font-weight:600;">
      ⚠️ 주의: 이 기능은 <b>지난달</b>의 모든 경기 결과를 삭제합니다.<br>
      삭제 비밀번호가 일치해야 실행됩니다.
    </small>
  </section>

</main>

<div id="toast" class="toast">저장되었습니다</div>

<script type="module">
  // ✅ /pingpong_main/firebase.js 를 공통으로 사용
  // 현재 파일이 /pingpong_main/admin/admin.html 이라면 "../firebase.js" 가 맞습니다.
  import { db } from "../firebase.js";

  import {
    ref, set, remove, onValue, get
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

  const $ = (s)=>document.querySelector(s);
  const toast = (m="저장되었습니다")=>{
    const t=$("#toast");
    t.textContent=m;
    t.classList.add("show");
    clearTimeout(toast._t);
    toast._t=setTimeout(()=>t.classList.remove("show"),1500);
  };

  // ===== 제목 관리 =====
  const titleRef = ref(db, "config/title");
  const cachedTitle = localStorage.getItem("siteTitle");
  if (cachedTitle) {
    document.title = `🏓 ${cachedTitle} 관리자모드`;
    $("#pageHeader").textContent = `🏓 ${cachedTitle} 관리자모드`;
  }

  onValue(titleRef, (s)=>{
    const val = s.val() ?? "PingPong Club";
    localStorage.setItem("siteTitle", val);
    document.title = `🏓 ${val} 관리자모드`;
    $("#pageHeader").textContent = `🏓 ${val} 관리자모드`;
    $("#siteTitle").value = val;
  });

  $("#saveTitle").onclick = async()=>{
    const title = $("#siteTitle").value.trim();
    if (!title) return toast("제목을 입력하세요");
    await set(titleRef, title);
    localStorage.setItem("siteTitle", title);
    toast("제목 변경 완료");
  };

  // ===== 월 키 =====
  const monthKey = (d)=> `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;

  // ✅ 삭제 비밀번호 확인
  async function requireDeletePassword(){
    const pwSnap = await get(ref(db, "config/deletePassword"));
    const savedPw = pwSnap.exists() ? String(pwSnap.val()) : "7910";

    const input = prompt("삭제 비밀번호를 입력하세요.");
    if (input === null) return null;           // 취소
    if (input.trim() !== savedPw.trim()) return false;
    return true;
  }

  // ✅ 월 기준 삭제
  async function deleteMatchesByMonth(targetMonth){
    const ok = await requireDeletePassword();
    if (ok === null) return; // 취소
    if (ok === false) { alert("❌ 비밀번호가 올바르지 않습니다."); return; }

    const matchesRef = ref(db, "matches");
    const snapshot = await get(matchesRef);
    const data = snapshot.val() || {};

    let count = 0;
    const tasks = [];

    for (const [id, match] of Object.entries(data)) {
      if (match && match.monthKey === targetMonth) {
        tasks.push(remove(ref(db, `matches/${id}`)));
        count++;
      }
    }

    await Promise.all(tasks);

    // 월간리포트도 같이 삭제
    await remove(ref(db, `monthlyReports/${targetMonth}`));

    toast(`✅ ${targetMonth} 전적 ${count}건 + 리포트 삭제 완료`);
  }

  // ✅ 이번달 전적 전체 삭제
  document.getElementById("deleteCurrentMonth").addEventListener("click", async()=>{
    if (!confirm("⚠️ 정말 이번달 경기결과를 전부 삭제하시겠습니까?\n(삭제 후 복구 불가)")) return;
    const now = new Date();
    const thisMonth = monthKey(now);
    try{
      await deleteMatchesByMonth(thisMonth);
    }catch(err){
      console.error(err);
      alert("⚠️ 삭제 중 오류가 발생했습니다.");
    }
  });

  // ✅ 지난달 전적 전체 삭제
  document.getElementById("deletePrevMonth").addEventListener("click", async()=>{
    if (!confirm("⚠️ 정말 지난달 경기결과를 전부 삭제하시겠습니까?\n(삭제 후 복구 불가)")) return;
    const now = new Date();
    const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const prevMonth = monthKey(prev);
    try{
      await deleteMatchesByMonth(prevMonth);
    }catch(err){
      console.error(err);
      alert("⚠️ 삭제 중 오류가 발생했습니다.");
    }
  });

</script>
</body>
</html>
