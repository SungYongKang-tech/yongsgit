<script type="module">
/* =========================
   Chart.js safe wrapper
========================= */
function safeChart(canvasEl, config){
  if (!canvasEl) return null;
  if (!window._charts) window._charts = {};
  const id = canvasEl.id;
  if (window._charts[id]) window._charts[id].destroy();
  window._charts[id] = new Chart(canvasEl, config);
  return window._charts[id];
}

/* =========================
   ✅ Firebase
========================= */
import { db } from "../firebase.js";
import { ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

/* =========================
   Utils
========================= */
const $ = (s)=>document.querySelector(s);
const fmt1 = n => (Math.round(n*10)/10).toFixed(1);
const pad2 = n => String(n).padStart(2,'0');
const KST = (ts)=> new Date(new Date(ts).toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
const yyyymm = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
const shortMonth = (m) => `'${m.slice(2)}`;
const POINT_WIN = 2, POINT_LOSE = -1;

/* =========================
   Query Param
========================= */
const params = new URLSearchParams(location.search);
const playerName = (params.get('name') || '').trim();

/* =========================
   Data holders
========================= */
let playerLevels = {};      // {name: bu}

let months = [];            // 올해 월들(월마감 있는 달)
let perMonthAll = {};       // {YYYY-MM:{total,win,lose,rate}} 월마감

// 상세(이번달)
let oppMapSingle = {};
let partnerMapDouble = {};
let thisMonthDoublePoints = 0;

let sumAllTotal=0, sumAllWin=0, sumAllLose=0; // 올해 누적(월마감)
let sumSglTotal=0, sumSglWin=0, sumSglLose=0; // 이번달 단식
let sumDblTotal=0, sumDblWin=0, sumDblLose=0; // 이번달 복식

/* =========================
   ✅ members에서 name-bu 맵핑
========================= */
async function loadMembers(){
  const snap = await get(ref(db,'members'));
  if (!snap.exists()) return;
  const data = snap.val() || {};
  Object.values(data).forEach(p=>{
    if (!p?.name) return;
    playerLevels[String(p.name).trim()] = Number(p.bu ?? 99);
  });
}

/* =========================
   ✅ (자동) 월마감 저장: 월말/익월1일에 페이지 열리면 자동 저장
   - matches 읽기만
   - monthlyReports/YYYY-MM/players/uid 에 저장
   - monthlyReports/YYYY-MM/meta/closed 로 중복 방지
========================= */
function kstNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
}
function ymd(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function lastDayOfMonthKST(d){
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}

async function loadMembersByName(){
  const snap = await get(ref(db,'members'));
  const byName = {};
  if (!snap.exists()) return byName;

  const data = snap.val() || {};
  Object.entries(data).forEach(([uid, p])=>{
    if(!p?.name) return;
    const name = String(p.name).trim();
    byName[name] = { uid, name, bu: Number(p.bu ?? 99) };
  });
  return byName;
}

async function autoMonthCloseIfNeeded(){
  const now = kstNow();
  const today = now.getDate();
  const lastDay = lastDayOfMonthKST(now);

  // 월말(말일) 또는 익월 1일에만 실행
  const shouldRun = (today === lastDay) || (today === 1);
  if (!shouldRun) return;

  // ✅ targetMonth 결정: 1일이면 "지난달"을 마감해야 함
  const target = new Date(now);
  if (today === 1) target.setMonth(target.getMonth() - 1);
  const month = yyyymm(target);

  // ✅ 잠금 체크도 targetMonth 기준
  const lockSnap = await get(ref(db, `monthlyReports/${month}/meta/closed`));
  if (lockSnap.exists() && lockSnap.val() === true) return;

  // matches 가져오기
  const mSnap = await get(ref(db,'matches'));
  if (!mSnap.exists()) return;

  const allMatches = Object.values(mSnap.val() || {});
  if (!allMatches.length) return;

  // ✅ targetMonth의 경기만 집계 (monthKey가 있으면 그걸 우선 사용)
  const targetMatches = allMatches.filter(m=>{
    const mk = String(m?.monthKey || "").trim();
    if (mk) return mk === month;

    // monthKey가 없다면 playedAt/ts 같은 시간 필드가 있는 경우로 보정(있을 때만)
    const ts = m?.playedAt ?? m?.ts ?? m?.createdAt ?? null;
    if (!ts) return true; // (안전 fallback) 기존처럼 전부 집계하되, 가능하면 monthKey를 넣는 걸 추천
    return yyyymm(KST(ts)) === month;
  });

  if (!targetMatches.length) return;

  const membersByName = await loadMembersByName();

  // 선수별 집계
  const agg = {}; // uid -> {uid,name,bu,total,win,lose}

  for (const m of targetMatches){
    if (!['A','B'].includes(m?.winnerSide)) continue;

    const sideA = (m.namesA || []).map(s=>String(s).trim());
    const sideB = (m.namesB || []).map(s=>String(s).trim());
    const winA  = (m.winnerSide === 'A');

    for (const name of sideA){
      const info = membersByName[name];
      if(!info) continue;
      if(!agg[info.uid]) agg[info.uid] = { ...info, total:0, win:0, lose:0 };
      agg[info.uid].total++;
      if(winA) agg[info.uid].win++; else agg[info.uid].lose++;
    }

    for (const name of sideB){
      const info = membersByName[name];
      if(!info) continue;
      if(!agg[info.uid]) agg[info.uid] = { ...info, total:0, win:0, lose:0 };
      agg[info.uid].total++;
      if(!winA) agg[info.uid].win++; else agg[info.uid].lose++;
    }
  }

  const nowMs = Date.now();
  const updates = {};

  Object.values(agg).forEach(p=>{
    const rate = p.total ? Math.round((p.win/p.total)*1000)/10 : 0;
    updates[`monthlyReports/${month}/players/${p.uid}`] = {
      uid: p.uid,
      name: p.name,
      bu: p.bu,
      total: p.total,
      win: p.win,
      lose: p.lose,
      rate,
      updatedAt: nowMs
    };
  });

  updates[`monthlyReports/${month}/meta`] = {
    month,
    closed: true,
    closedAt: nowMs,
    closedDate: ymd(now),      // 실행일(1일/말일)
    source: "matches-auto",
    matchCount: targetMatches.length // ✅ 디버깅용
  };

  await update(ref(db), updates);
  console.log("[월마감 자동저장 완료]", month, "players:", Object.keys(agg).length, "matches:", targetMatches.length);
}

/* =========================
   1) 월마감 데이터: 올해(YYYY)만 로드해서 월별/전체 누적 구성
========================= */
async function loadMonthlyReportsThisYear(){
  const snap = await get(ref(db, "monthlyReports"));
  if (!snap.exists()) return;

  const reports = snap.val() || {};
  const year = String(kstNow().getFullYear()); // ✅ KST 기준 연도

  Object.keys(reports).forEach((m)=>{
    if (!/^\d{4}-\d{2}$/.test(m)) return;
    if (!m.startsWith(year + "-")) return; // ✅ 올해만

    const playersObj = reports[m]?.players || null;
    if (!playersObj) return;

    const arr = Object.values(playersObj);
    const row = arr.find(r => String(r?.name || '').trim() === playerName);
    if (!row) return;

    const win  = Number(row.win ?? row.wins ?? 0);
    const lose = Number(row.lose ?? row.losses ?? 0);
    const total = Number(row.total ?? (win + lose));
    const rate  = total ? (win/total*100) : 0;

    perMonthAll[m] = { total, win, lose, rate };
    months.push(m);

    sumAllTotal += total; sumAllWin += win; sumAllLose += lose;
  });

  months = [...new Set(months)].sort();
}

/* =========================
   2) 상세 분석: matches(이번달만 존재) → 이번달 상대/파트너 집계
========================= */
async function loadMatchesThisMonthDetails(){
  const snap = await get(ref(db,'matches'));
  if (!snap.exists()) return;
  const data = Object.values(snap.val() || {});
  const curMonth = yyyymm(kstNow());

  const myMatches = data.filter(m=>{
    const names = [...(m.namesA||[]), ...(m.namesB||[])].map(s=>String(s).trim());
    if (!names.includes(playerName)) return false;

    // monthKey가 있다면 이번달만
    const mk = String(m?.monthKey || "").trim();
    if (mk && mk !== curMonth) return false;

    return true;
  });

  myMatches.forEach(m=>{
    if (!['A','B'].includes(m?.winnerSide)) return;

    const sideA = (m.namesA || []).map(s=>String(s).trim());
    const sideB = (m.namesB || []).map(s=>String(s).trim());
    const mode  = m.mode || 'single';
    const winA  = (m.winnerSide === 'A');
    const iAmA  = sideA.includes(playerName);
    const iAmB  = sideB.includes(playerName);
    const iWon  = (winA && iAmA) || (!winA && iAmB);

    if (mode === 'single'){
      sumSglTotal++;
      if (iWon) sumSglWin++; else sumSglLose++;

      const opp = iAmA ? sideB[0] : sideA[0];
      if (opp){
        if (!oppMapSingle[opp]) oppMapSingle[opp] = { win:0, lose:0 };
        if (iWon) oppMapSingle[opp].win++; else oppMapSingle[opp].lose++;
      }
    } else if (mode === 'double'){
      sumDblTotal++;
      if (iWon) sumDblWin++; else sumDblLose++;

      const pts = iWon ? POINT_WIN : POINT_LOSE;
      thisMonthDoublePoints += pts;

      let partner = null;
      if (iAmA) partner = sideA.find(n => n !== playerName);
      else if (iAmB) partner = sideB.find(n => n !== playerName);

      if (partner){
        if (!partnerMapDouble[partner]) partnerMapDouble[partner] = { win:0, lose:0, points:0 };
        if (iWon) partnerMapDouble[partner].win++; else partnerMapDouble[partner].lose++;
        partnerMapDouble[partner].points += pts;
      }
    }
  });
}

/* =========================
   Render - Profile
========================= */
function renderProfile(){
  const name = playerName;
  const lvl  = playerLevels[name] ?? '-';
  const team = 'KOEN';

  const allRate  = sumAllTotal ? fmt1(sumAllWin/sumAllTotal*100) : '0.0';
  const sglRate  = sumSglTotal ? fmt1(sumSglWin/sumSglTotal*100) : '0.0';
  const dblRate  = sumDblTotal ? fmt1(sumDblWin/sumDblTotal*100) : '0.0';

  let mostWinOpponentRaw='', mostWinOpponent='-';
  for (const [op,v] of Object.entries(oppMapSingle)){
    if (!mostWinOpponentRaw || v.win > (oppMapSingle[mostWinOpponentRaw]?.win ?? -1)){
      mostWinOpponentRaw = op;
      mostWinOpponent = `${op} (${v.win}승)`;
    }
  }

  let mostLoseOpponentRaw='', mostLoseOpponent='-';
  for (const [op,v] of Object.entries(oppMapSingle)){
    if (!mostLoseOpponentRaw || v.lose > (oppMapSingle[mostLoseOpponentRaw]?.lose ?? -1)){
      mostLoseOpponentRaw = op;
      mostLoseOpponent = `${op} (${v.lose}패)`;
    }
  }

  let bestPartnerRaw='', bestPartner='-';
  for (const [pt,v] of Object.entries(partnerMapDouble)){
    if (!bestPartnerRaw || v.win > (partnerMapDouble[bestPartnerRaw]?.win ?? -1)){
      bestPartnerRaw = pt;
      bestPartner = `${pt} (${v.win}승)`;
    }
  }

  let worstPartnerRaw='', worstPartner='-';
  for (const [pt,v] of Object.entries(partnerMapDouble)){
    if (!worstPartnerRaw || v.lose > (partnerMapDouble[worstPartnerRaw]?.lose ?? -1)){
      worstPartnerRaw = pt;
      worstPartner = `${pt} (${v.lose}패)`;
    }
  }

  $('#pf_name').textContent = name || '선수';
  $('#pf_meta').textContent = `${team} · ${lvl}부`;

  const linkOrDash = (raw, text, color) => raw
    ? `<a href="player.html?name=${encodeURIComponent(raw)}" style="color:${color}; font-weight:900; text-decoration:none;">${text}</a>`
    : `<b style="color:#475569;">-</b>`;

  $('#pf_stats').innerHTML = `
    <div style="font-size:16px; line-height:1.8; margin-bottom:18px;">
      <div style="font-weight:900; color:#1e3a8a; margin-bottom:6px; font-size:18px;">📌 올해 누적(월마감 기준)</div>
      <div>✅ 총 경기수 : <b style="color:#0f172a; font-size:17px;">${sumAllTotal}</b></div>
      <div>✅ 전체 전적 : <b style="color:#0f172a; font-size:17px;">${sumAllWin}승 ${sumAllLose}패 (${allRate}%)</b></div>
    </div>

    <div style="font-size:16px; line-height:1.8; margin-bottom:18px;">
      <div style="font-weight:900; color:#1e3a8a; margin-bottom:6px; font-size:18px;">📌 이번달 단식 / 복식(상세)</div>
      <div>🎯 단식 전적 : <b style="color:#0f172a; font-size:17px;">${sumSglWin}승 ${sumSglLose}패 (${sglRate}%)</b></div>
      <div>🫂 복식 전적 : <b style="color:#0f172a; font-size:17px;">${sumDblWin}승 ${sumDblLose}패 (${dblRate}%)</b></div>
    </div>

    <div style="font-size:16px; line-height:1.8;">
      <div style="font-weight:900; color:#1e3a8a; margin-bottom:8px; font-size:18px;">📌 이번달 상대·파트너 분석</div>
      <div><span style="color:#1e3a8a; font-weight:800;">🏅 단식 가장 많이 이긴 상대 :</span>
        ${linkOrDash(mostWinOpponentRaw, mostWinOpponent, "#0f6a00")}
      </div>
      <div><span style="color:#1e3a8a; font-weight:800;">⚠️ 단식 가장 많이 진 상대 :</span>
        ${linkOrDash(mostLoseOpponentRaw, mostLoseOpponent, "#d45500")}
      </div>
      <div style="height:10px;"></div>
      <div><span style="color:#1e3a8a; font-weight:800;">🤝 가장 잘 맞는 복식 파트너 :</span>
        ${linkOrDash(bestPartnerRaw, bestPartner, "#0f6a00")}
      </div>
      <div><span style="color:#1e3a8a; font-weight:800;">😅 가장 잘 안 맞는 복식 파트너 :</span>
        ${linkOrDash(worstPartnerRaw, worstPartner, "#d45500")}
      </div>
    </div>
  `;
}

/* =========================
   Render - Month cards
========================= */
function renderMonthCards(){
  const box = $('#monthList');
  box.innerHTML = '';
  const sortedMonths = months.slice().sort();

  if (!sortedMonths.length){
    box.innerHTML = `<div class="dim">올해 월마감 데이터가 없습니다.</div>`;
    return;
  }

  sortedMonths.forEach(m=>{
    const a = perMonthAll[m] || { total:0, win:0, lose:0, rate:0 };

    box.insertAdjacentHTML('beforeend', `
      <div class="month-card">
        <div class="month-head">
          <div class="m">${shortMonth(m)}</div>
        </div>
        <div class="month-row" style="margin:0;">
          <div class="month-stats">
            전체 ${a.total}경기, ${a.win}승, ${a.lose}패, 승률 ${fmt1(a.rate)}%
          </div>
        </div>
      </div>
    `);
  });
}

/* =========================
   Render - Details
========================= */
function renderDetails(){
  const oppBox = $('#opponentSingles');
  oppBox.innerHTML = '';
  const oppArr = Object.entries(oppMapSingle)
    .map(([name,v])=>({
      name, win:v.win, lose:v.lose, total:(v.win+v.lose),
      rate: (v.win+v.lose) ? (v.win/(v.win+v.lose)*100) : 0
    }))
    .sort((a,b)=> b.total - a.total)
    .slice(0,8);

  if (!oppArr.length){
    oppBox.innerHTML = `<div class="dim">이번달 단식 기록이 없습니다.</div>`;
  } else {
    oppArr.forEach(o=>{
      const lvl = playerLevels[o.name] ?? '-';
      oppBox.insertAdjacentHTML('beforeend', `
        <div class="item item-inline">
          <span class="tag">상대</span>
          <span>
            <a href="player.html?name=${encodeURIComponent(o.name)}" style="color:#1e40af; font-weight:900; text-decoration:none;">
              ${o.name}(${lvl})
            </a>
            &nbsp;&nbsp;&nbsp;${o.win}승 ${o.lose}패&nbsp;&nbsp;&nbsp;${fmt1(o.rate)}%
          </span>
        </div>
      `);
    });
  }

  const ptnBox = $('#partnerDoubles');
  ptnBox.innerHTML = '';
  const ptnArr = Object.entries(partnerMapDouble)
    .map(([name,v])=>({
      name, win:v.win, lose:v.lose, total:(v.win+v.lose),
      points: v.points ?? 0,
      rate: (v.win+v.lose) ? (v.win/(v.win+v.lose)*100) : 0
    }))
    .sort((a,b)=> b.total - a.total)
    .slice(0,8);

  if (!ptnArr.length){
    ptnBox.innerHTML = `<div class="dim">이번달 복식 기록이 없습니다.</div>`;
  } else {
    ptnArr.forEach(p=>{
      const lvl = playerLevels[p.name] ?? '-';
      ptnBox.insertAdjacentHTML('beforeend', `
        <div class="item item-inline">
          <span class="tag">파트너</span>
          <span>
            <a href="player.html?name=${encodeURIComponent(p.name)}" style="color:#1e40af; font-weight:900; text-decoration:none;">
              ${p.name}(${lvl})
            </a>
            &nbsp;&nbsp;&nbsp;${p.win}승 ${p.lose}패&nbsp;&nbsp;&nbsp;${fmt1(p.rate)}%
          </span>
        </div>
      `);
    });
  }
}

/* =========================
   Charts (지연 로딩)
========================= */
let chartsLoaded = false;
function buildCharts(){
  if (chartsLoaded) return;
  chartsLoaded = true;
  $('#canvasBox').style.display = 'block';

  const ms = months.slice().sort();

  safeChart(document.getElementById('chartRate'), {
    type:'line',
    data:{ labels: ms.map(shortMonth), datasets:[{ label:'월별 승률(올해, 월마감%)', data: ms.map(m=>perMonthAll[m]?.rate ?? 0), tension:.2 }]},
    options:{ responsive:true }
  });

  safeChart(document.getElementById('chartGames'), {
    type:'bar',
    data:{ labels: ms.map(shortMonth), datasets:[{ label:'월별 경기수(올해, 월마감)', data: ms.map(m=>perMonthAll[m]?.total ?? 0) }]},
    options:{ responsive:true }
  });

  safeChart(document.getElementById('chartModePie'), {
    type:'doughnut',
    data:{ labels:['단식(이번달)','복식(이번달)'], datasets:[{ data:[sumSglTotal, sumDblTotal] }]},
    options:{ responsive:true }
  });

  const oppArr = Object.entries(oppMapSingle).map(([name,v])=>({
    name, total:(v.win+v.lose),
    rate:(v.win+v.lose)?(v.win/(v.win+v.lose)*100):0
  })).sort((a,b)=>b.total-a.total).slice(0,8);

  safeChart(document.getElementById('chartOpp'), {
    type:'bar',
    data:{ labels: oppArr.map(o=>o.name), datasets:[{ label:'단식 상대별 승률(이번달%)', data: oppArr.map(o=>o.rate) }]},
    options:{ responsive:true }
  });

  const ptnArr = Object.entries(partnerMapDouble).map(([name,v])=>({
    name, total:(v.win+v.lose),
    rate:(v.win+v.lose)?(v.win/(v.win+v.lose)*100):0
  })).sort((a,b)=>b.total-a.total).slice(0,8);

  safeChart(document.getElementById('chartPartner'), {
    type:'bar',
    data:{ labels: ptnArr.map(o=>o.name), datasets:[{ label:'복식 파트너별 승률(이번달%)', data: ptnArr.map(o=>o.rate) }]},
    options:{ responsive:true }
  });

  safeChart(document.getElementById('chartPoints'), {
    type:'line',
    data:{ labels:['이번달'], datasets:[{ label:'복식 승점(이번달)', data:[thisMonthDoublePoints], tension:.2 }]},
    options:{ responsive:true }
  });
}
