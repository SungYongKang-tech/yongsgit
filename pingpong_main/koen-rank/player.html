<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb; --card:#ffffff;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 10px 30px rgba(2,6,23,.08);
}
*{box-sizing:border-box}
body{
  margin:0; font-family:"Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink); font-weight:600;
}
header{
  background:#fff; border-bottom:1px solid #e5e7eb;
  text-align:center; padding:14px 0; position:sticky; top:0; z-index:10;
}
h1{margin:4px 0 10px; color:var(--accent); font-size:clamp(18px,4vw,24px); font-weight:900;}
.btn{border:1px solid #d1d5db; border-radius:10px; padding:7px 12px; font-size:14px;
  background:#fff; cursor:pointer; font-weight:800; transition:.15s;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.row{display:flex;justify-content:center;gap:8px;margin-bottom:10px; flex-wrap:wrap;}
.wrap{max-width:1080px; margin:0 auto; padding:16px}
.grid{display:grid; gap:14px; grid-template-columns: repeat(12, 1fr);}
.card{background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:16px;}
.card h3{margin:0 0 10px; font-size:18px; color:#1e3a8a; font-weight:900;}
.hr{height:1px; background:#eef2f7; margin:12px 0}
.dim{color:var(--muted); font-weight:800; font-size:13px}
.big{font-size:16px; line-height:1.9; color:#334155; font-weight:800;}
.pill{
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 10px; border-radius:999px;
  background:#eef2ff; color:#3730a3; font-size:12px; font-weight:900;
}
.pill.ok{background:#dcfce7;color:#166534}
.pill.bad{background:#fee2e2;color:#991b1b}

.list{display:grid; gap:8px;}
.item{
  border:1px solid #e5e7eb; padding:10px 12px; border-radius:14px;
  background:#fff;
}
.item .top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.item .name{font-weight:900; color:#0f172a;}
.item .meta{font-size:13px; color:#475569; font-weight:800;}
.item .stat{font-size:14px; font-weight:900; color:#111827;}
.two-col{
  display:grid; gap:12px; grid-template-columns:repeat(12,1fr);
}
.col6{grid-column:span 6;}
@media (max-width:900px){ .col6{grid-column:span 12;} }

.note{
  margin-top:10px; font-size:12.5px; color:#64748b; font-weight:800; text-align:right;
}
.warn{
  background:#fff7ed; border:1px solid #fed7aa; color:#9a3412;
  padding:10px 12px; border-radius:12px; font-weight:900; font-size:13px;
}
</style>
</head>
<body>

<header>
  <h1 id="pageHeader">🏓 개인 성적</h1>
  <div class="row">
    <a href="index.html" class="btn primary">결과입력</a>
    <a href="monthly-report.html" class="btn primary">통합전적</a>
    <a href="monthly-report2.html" class="btn primary">단/복식전적</a>

</header>

<main class="wrap">

<section class="grid">
  <div class="card" style="grid-column:span 12;">

      <div>

        <div id="pf_meta" style="font-size:14px; color:#475569; margin-top:4px; font-weight:900;">-</div>
      </div>
    </div>
    <div class="hr"></div>
    <div id="pf_stats" class="big"></div>
    <div id="errBox" style="display:none; margin-top:10px;" class="warn"></div>
  </div>
</section>

<!-- 1) 전체 누적(지난달까지) -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column:span 12;">
    <h3>📌 전체 누적 (2026-01 ~ 지난달 · 월마감)</h3>
    <div id="allSummary" class="big"></div>
    <div class="note">* 전체 누적은 monthlyReports(월마감) 기준입니다.</div>
  </div>
</section>

<!-- 2) 이번달 단식/복식 -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column:span 12;">
    <h3>📌 이번달 성적 (실시간)</h3>
    <div id="thisMonthSummary" class="big"></div>
    <div class="note">* 이번달은 matches(실시간) 기준입니다.</div>
  </div>
</section>

<!-- 3) 전체 vs 이번달 상대/파트너 요약 -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column:span 12;">
    <h3>🏅 상대·파트너 요약</h3>

    <div class="two-col">
      <div class="col6">
        <div class="pill">전체(2026-01~지난달)</div>
        <div id="allBestWorst" style="margin-top:10px;" class="big"></div>
      </div>
      <div class="col6">
        <div class="pill">이번달</div>
        <div id="thisBestWorst" style="margin-top:10px;" class="big"></div>
      </div>
    </div>

    <div class="note">* 단식: 상대 / 복식: 파트너 기준입니다.</div>
  </div>
</section>

<!-- 4) 상세분석(지난달까지) -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column:span 12;">
    <h3>🔎 상세 분석 (지난달까지 · 단식 상대별)</h3>

    <div class="two-col">
      <div class="col6">
        <div class="pill ok">많이 이긴 상대 TOP 10</div>
        <div id="topWinOpp" class="list" style="margin-top:10px;"></div>
      </div>
      <div class="col6">
        <div class="pill bad">많이 진 상대 TOP 10</div>
        <div id="topLoseOpp" class="list" style="margin-top:10px;"></div>
      </div>
    </div>

    <div class="note">* 집계 범위: 2026-01 ~ 지난달</div>
  </div>
</section>

</main>

<script type="module">
/* =========================
   Firebase
========================= */
import { db } from "../firebase.js";
import {
  ref, get, query, orderByChild, equalTo
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

/* =========================
   Utils
========================= */
const $ = (s)=>document.querySelector(s);
const pad2 = n => String(n).padStart(2,'0');
const fmt1 = n => (Math.round(n*10)/10).toFixed(1);

function kstNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
}
function yyyymm(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
}
function monthAdd(ym, delta){
  const [y,m] = ym.split("-").map(Number);
  const d = new Date(y, m-1, 1);
  d.setMonth(d.getMonth()+delta);
  return yyyymm(d);
}
function monthRange(fromYm, toYm){ // inclusive
  const out = [];
  let cur = fromYm;
  while(true){
    out.push(cur);
    if(cur === toYm) break;
    cur = monthAdd(cur, 1);
    if(out.length>600) break; // 안전장치
  }
  return out;
}
function safeName(s){ return String(s??"").trim(); }
function winRate(win, total){ return total ? (win/total*100) : 0; }

function showErr(msg){
  const box = $("#errBox");
  box.style.display = "block";
  box.textContent = msg;
}

/* =========================
   Query Param
========================= */
const params = new URLSearchParams(location.search);
const playerName = safeName(params.get("name") || "");

/* =========================
   Data holders
========================= */
const START_MONTH = "2026-01";

let playerLevels = {}; // name -> bu

// 1) 전체누적(월마감) : 2026-01~지난달
let allTotal=0, allWin=0, allLose=0;

// 2) 이번달 실시간 : 단식/복식
let tmSglT=0, tmSglW=0, tmSglL=0;
let tmDblT=0, tmDblW=0, tmDblL=0;

// 3) 상대/파트너 집계
// 지난달까지(전체)
let allOppSingles = {};   // opp -> {win,lose}
let allPartnerDoubles = {}; // partner -> {win,lose}
// 이번달
let tmOppSingles = {};
let tmPartnerDoubles = {};

/* =========================
   Load members (bu)
========================= */
async function loadMembers(){
  const snap = await get(ref(db,"members"));
  if(!snap.exists()) return;
  const data = snap.val() || {};
  Object.values(data).forEach(p=>{
    const nm = safeName(p?.name);
    if(!nm) return;
    playerLevels[nm] = Number(p?.bu ?? 99);
  });
}

/* =========================
   1) monthlyReports에서 2026-01~지난달 합산
========================= */
async function loadAllSummaryByMonthlyReports(){
  const now = kstNow();
  const curMonth = yyyymm(now);
  const lastMonth = monthAdd(curMonth, -1);

  if(lastMonth < START_MONTH){
    allTotal=allWin=allLose=0;
    return { curMonth, lastMonth };
  }

  const snap = await get(ref(db,"monthlyReports"));
  if(!snap.exists()){
    allTotal=allWin=allLose=0;
    return { curMonth, lastMonth };
  }

  const reports = snap.val() || {};
  const months = monthRange(START_MONTH, lastMonth);

  allTotal=allWin=allLose=0;

  months.forEach(m=>{
    const playersObj = reports[m]?.players;
    if(!playersObj) return;

    const row = Object.values(playersObj).find(r=> safeName(r?.name) === playerName);
    if(!row) return;

    const w = Number(row.win ?? row.wins ?? 0);
    const l = Number(row.lose ?? row.losses ?? 0);
    const t = Number(row.total ?? (w+l));

    allTotal += t;
    allWin   += w;
    allLose  += l;
  });

  return { curMonth, lastMonth };
}

/* =========================
   matches 읽기 유틸(월단위)
========================= */
async function fetchMatchesByMonth(monthKey){
  const q = query(ref(db,"matches"), orderByChild("monthKey"), equalTo(monthKey));
  const snap = await get(q);
  if(!snap.exists()) return [];
  return Object.values(snap.val() || {});
}

/* =========================
   (공통) matches 집계: 상대/파트너 + 이번달 단/복식
========================= */
function applyMatchToMaps(m, scope){
  // scope: "ALL" (지난달까지) or "TM" (이번달)
  if (!m || !["A","B"].includes(m?.winnerSide)) return;

  const mode = safeName(m?.mode) || "single";
  const A = (m.namesA || []).map(safeName).filter(Boolean);
  const B = (m.namesB || []).map(safeName).filter(Boolean);

  const inA = A.includes(playerName);
  const inB = B.includes(playerName);
  if(!inA && !inB) return;

  const winA = (m.winnerSide === "A");
  const iWon = (winA && inA) || (!winA && inB);

  const oppMap = (scope==="ALL") ? allOppSingles : tmOppSingles;
  const ptnMap = (scope==="ALL") ? allPartnerDoubles : tmPartnerDoubles;

  if(mode === "single"){
    // 이번달 단식 집계도 같이
    if(scope==="TM"){
      tmSglT++;
      if(iWon) tmSglW++; else tmSglL++;
    }

    const opp = inA ? (B[0]||"") : (A[0]||"");
    if(!opp) return;

    if(!oppMap[opp]) oppMap[opp] = { win:0, lose:0 };
    if(iWon) oppMap[opp].win++; else oppMap[opp].lose++;

  }else if(mode === "double"){
    if(scope==="TM"){
      tmDblT++;
      if(iWon) tmDblW++; else tmDblL++;
    }

    let partner = "";
    if(inA) partner = A.find(n=>n!==playerName) || "";
    if(inB) partner = B.find(n=>n!==playerName) || "";
    if(!partner) return;

    if(!ptnMap[partner]) ptnMap[partner] = { win:0, lose:0 };
    if(iWon) ptnMap[partner].win++; else ptnMap[partner].lose++;
  }
}

/* =========================
   3) 지난달까지 상대/파트너 집계 (월별로 필요한 달만)
========================= */
async function loadAllOpponentPartnerFromMatches(lastMonth){
  // 월별로 쿼리해서 누적(전체 matches 통째로 금지)
  allOppSingles = {};
  allPartnerDoubles = {};

  if(lastMonth < START_MONTH) return;

  const months = monthRange(START_MONTH, lastMonth);
  for(const m of months){
    const arr = await fetchMatchesByMonth(m);
    arr.forEach(x=>applyMatchToMaps(x, "ALL"));
  }
}

/* =========================
   2) 이번달 단/복식 + 이번달 상대/파트너
========================= */
async function loadThisMonthRealtime(curMonth){
  tmSglT=tmSglW=tmSglL=0;
  tmDblT=tmDblW=tmDblL=0;
  tmOppSingles = {};
  tmPartnerDoubles = {};

  const arr = await fetchMatchesByMonth(curMonth);
  arr.forEach(x=>applyMatchToMaps(x, "TM"));
}

/* =========================
   Helpers: best/worst extraction
========================= */
function pickMostWin(mapObj){
  let best = null;
  for(const [name,v] of Object.entries(mapObj)){
    if(!best || v.win > best.win) best = { name, ...v };
  }
  return best;
}
function pickMostLose(mapObj){
  let worst = null;
  for(const [name,v] of Object.entries(mapObj)){
    if(!worst || v.lose > worst.lose) worst = { name, ...v };
  }
  return worst;
}
function pickPartnerBest(mapObj){
  // “가장 잘 맞는 파트너” = 승이 가장 많은 파트너 (동률이면 승률)
  let best = null;
  for(const [name,v] of Object.entries(mapObj)){
    const total = v.win+v.lose;
    const rate = total ? v.win/total : 0;
    if(!best) best = { name, ...v, rate };
    else{
      const bTotal = best.win+best.lose;
      const bRate = bTotal ? best.win/bTotal : 0;
      if(v.win > best.win || (v.win===best.win && rate>bRate)) best = { name, ...v, rate };
    }
  }
  return best;
}
function pickPartnerWorst(mapObj){
  // “가장 안 맞는 파트너” = 패가 가장 많은 파트너 (동률이면 승률 낮은 쪽)
  let worst = null;
  for(const [name,v] of Object.entries(mapObj)){
    const total = v.win+v.lose;
    const rate = total ? v.win/total : 0;
    if(!worst) worst = { name, ...v, rate };
    else{
      const wTotal = worst.win+worst.lose;
      const wRate = wTotal ? worst.win/wTotal : 0;
      if(v.lose > worst.lose || (v.lose===worst.lose && rate<wRate)) worst = { name, ...v, rate };
    }
  }
  return worst;
}

/* =========================
   Render
========================= */
function renderHeader(){
  if(!playerName){
    showErr("URL에 ?name=선수이름 이 없습니다. 예) player.html?name=강성용");
  }
  const lvl = playerLevels[playerName] ?? "-";
  $("#pf_name").textContent = playerName || "선수";
  $("#pf_meta").textContent = `KOEN · ${lvl}부`;
}

function renderAllSummary(lastMonth){
  const rate = allTotal ? fmt1(allWin/allTotal*100) : "0.0";
  $("#allSummary").innerHTML = `
    <div>🗓️ 기간 : <b>${START_MONTH}</b> ~ <b>${lastMonth}</b></div>
    <div>✅ 총 경기수 : <b style="font-size:18px;color:#0f172a;">${allTotal}</b></div>
    <div>✅ 전체 전적 : <b style="font-size:18px;color:#0f172a;">${allWin}승 ${allLose}패</b> (승률 <b>${rate}%</b>)</div>
  `;
}

function renderThisMonthSummary(curMonth){
  const sRate = tmSglT ? fmt1(tmSglW/tmSglT*100) : "0.0";
  const dRate = tmDblT ? fmt1(tmDblW/tmDblT*100) : "0.0";
  $("#thisMonthSummary").innerHTML = `
    <div>🗓️ 이번달 : <b>${curMonth}</b></div>
    <div>🎯 단식 : <b style="font-size:18px;color:#0f172a;">${tmSglW}승 ${tmSglL}패</b> (총 ${tmSglT}경기, 승률 <b>${sRate}%</b>)</div>
    <div>🫂 복식 : <b style="font-size:18px;color:#0f172a;">${tmDblW}승 ${tmDblL}패</b> (총 ${tmDblT}경기, 승률 <b>${dRate}%</b>)</div>
  `;
}

function linkPlayer(nm, text, color="#1e40af"){
  const lvl = playerLevels[nm] ?? "-";
  return `<a href="player.html?name=${encodeURIComponent(nm)}" style="color:${color}; font-weight:900; text-decoration:none;">${text || (nm+"("+lvl+")")}</a>`;
}

function renderBestWorst(){
  // 전체(지난달까지)
  const aBestOpp = pickMostWin(allOppSingles);
  const aWorstOpp = pickMostLose(allOppSingles);
  const aBestPtn = pickPartnerBest(allPartnerDoubles);
  const aWorstPtn = pickPartnerWorst(allPartnerDoubles);

  const fmtOpp = (x, goodColor, badColor)=>{
    if(!x) return `<b style="color:#64748b;">-</b>`;
    const total = x.win + x.lose;
    const rate = fmt1(winRate(x.win, total));
    const color = (x.win >= x.lose) ? goodColor : badColor;
    return `${linkPlayer(x.name, `${x.name}(${playerLevels[x.name]??"-"})`, color)} — <b>${x.win}승 ${x.lose}패</b> (${rate}%)`;
  };
  const fmtPtn = (x, goodColor, badColor)=>{
    if(!x) return `<b style="color:#64748b;">-</b>`;
    const total = x.win + x.lose;
    const rate = fmt1(winRate(x.win, total));
    const color = (x.win >= x.lose) ? goodColor : badColor;
    return `${linkPlayer(x.name, `${x.name}(${playerLevels[x.name]??"-"})`, color)} — <b>${x.win}승 ${x.lose}패</b> (${rate}%)`;
  };

  $("#allBestWorst").innerHTML = `
    <div>🏅 단식 가장 많이 이긴 상대 : ${fmtOpp(aBestOpp, "#0f6a00", "#d45500")}</div>
    <div>⚠️ 단식 가장 많이 진 상대 : ${fmtOpp(aWorstOpp, "#0f6a00", "#d45500")}</div>
    <div style="height:8px;"></div>
    <div>🤝 복식 가장 잘 맞는 파트너 : ${fmtPtn(aBestPtn, "#0f6a00", "#d45500")}</div>
    <div>😅 복식 가장 안 맞는 파트너 : ${fmtPtn(aWorstPtn, "#0f6a00", "#d45500")}</div>
  `;

  // 이번달
  const tBestOpp = pickMostWin(tmOppSingles);
  const tWorstOpp = pickMostLose(tmOppSingles);
  const tBestPtn = pickPartnerBest(tmPartnerDoubles);
  const tWorstPtn = pickPartnerWorst(tmPartnerDoubles);

  $("#thisBestWorst").innerHTML = `
    <div>🏅 단식 가장 많이 이긴 상대 : ${fmtOpp(tBestOpp, "#0f6a00", "#d45500")}</div>
    <div>⚠️ 단식 가장 많이 진 상대 : ${fmtOpp(tWorstOpp, "#0f6a00", "#d45500")}</div>
    <div style="height:8px;"></div>
    <div>🤝 복식 가장 잘 맞는 파트너 : ${fmtPtn(tBestPtn, "#0f6a00", "#d45500")}</div>
    <div>😅 복식 가장 안 맞는 파트너 : ${fmtPtn(tWorstPtn, "#0f6a00", "#d45500")}</div>
  `;
}

function renderTop10(){
  // 지난달까지 단식 상대맵으로 TOP10 만들기
  const entries = Object.entries(allOppSingles).map(([name,v])=>{
    const win = Number(v.win||0), lose = Number(v.lose||0);
    const total = win+lose;
    const rate = winRate(win,total);
    return { name, win, lose, total, rate };
  });

  const topWin = entries
    .slice()
    .sort((a,b)=> b.win - a.win || b.total - a.total || a.name.localeCompare(b.name,"ko"))
    .slice(0,10);

  const topLose = entries
    .slice()
    .sort((a,b)=> b.lose - a.lose || b.total - a.total || a.name.localeCompare(b.name,"ko"))
    .slice(0,10);

  const boxW = $("#topWinOpp");
  const boxL = $("#topLoseOpp");
  boxW.innerHTML = "";
  boxL.innerHTML = "";

  if(!topWin.length){
    boxW.innerHTML = `<div class="dim">데이터가 없습니다.</div>`;
  }else{
    topWin.forEach((x, i)=>{
      const lvl = playerLevels[x.name] ?? "-";
      boxW.insertAdjacentHTML("beforeend", `
        <div class="item">
          <div class="top">
            <div class="name">${i+1}. ${linkPlayer(x.name, `${x.name}(${lvl})`, "#0f6a00")}</div>
            <div class="stat">${x.win}승 ${x.lose}패</div>
          </div>
          <div class="meta">총 ${x.total}경기 · 승률 ${fmt1(x.rate)}%</div>
        </div>
      `);
    });
  }

  if(!topLose.length){
    boxL.innerHTML = `<div class="dim">데이터가 없습니다.</div>`;
  }else{
    topLose.forEach((x, i)=>{
      const lvl = playerLevels[x.name] ?? "-";
      boxL.insertAdjacentHTML("beforeend", `
        <div class="item">
          <div class="top">
            <div class="name">${i+1}. ${linkPlayer(x.name, `${x.name}(${lvl})`, "#d45500")}</div>
            <div class="stat">${x.win}승 ${x.lose}패</div>
          </div>
          <div class="meta">총 ${x.total}경기 · 승률 ${fmt1(x.rate)}%</div>
        </div>
      `);
    });
  }
}

/* =========================
   Bootstrap
========================= */
try{
  if(!playerName){
    renderHeader();
    throw new Error("name 파라미터가 없습니다.");
  }

  await loadMembers();
  renderHeader();

  // 1) 월마감 기반 전체 누적
  const { curMonth, lastMonth } = await loadAllSummaryByMonthlyReports();

  // 3) 지난달까지 상대/파트너 (matches 월별로 쿼리)
  await loadAllOpponentPartnerFromMatches(lastMonth);

  // 2) 이번달 실시간(단/복식 + 상대/파트너)
  await loadThisMonthRealtime(curMonth);

  // Render
  renderAllSummary(lastMonth);
  renderThisMonthSummary(curMonth);
  renderBestWorst();
  renderTop10();

  // 프로필 상단에 한 줄 요약도 같이
  const grandRate = allTotal ? fmt1(allWin/allTotal*100) : "0.0";
  $("#pf_stats").innerHTML = `
    <div>✅ 전체 누적(지난달까지): <b style="color:#0f172a;">${allTotal}</b>경기 · <b style="color:#0f172a;">${allWin}승 ${allLose}패</b> (${grandRate}%)</div>
    <div>✅ 이번달: 단식 <b style="color:#0f172a;">${tmSglW}승 ${tmSglL}패</b> · 복식 <b style="color:#0f172a;">${tmDblW}승 ${tmDblL}패</b></div>
  `;

}catch(e){
  showErr("오류: " + (e?.message || String(e)));
  console.log(e);
}
</script>
