<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🏓 개인 탁구 성적</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb; --card:#ffffff;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 10px 30px rgba(2,6,23,.08);
}
*{box-sizing:border-box}
body{
  margin:0; font-family:"Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink); font-weight:600;
}
header{
  background:#fff; border-bottom:1px solid #e5e7eb;
  text-align:center; padding:14px 0; position:sticky; top:0; z-index:10;
}
h1{margin:4px 0 10px; color:var(--accent); font-size:clamp(18px,4vw,24px); font-weight:700;}
.btn{border:1px solid #d1d5db; border-radius:8px; padding:6px 10px; font-size:14px;
  background:#fff; cursor:pointer; font-weight:600; transition:.15s;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.row{display:flex;justify-content:center;gap:8px;margin-bottom:10px; flex-wrap:wrap;}
.wrap{max-width:1080px; margin:0 auto; padding:16px}
.grid{display:grid; gap:14px; grid-template-columns: repeat(12, 1fr);}
.card{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:16px;}
.card h3{margin:0 0 8px; font-size:18px; color:#1e3a8a}
.hr{height:1px; background:#eef2f7; margin:12px 0}
.dim{color:#64748b; font-weight:700; font-size:13px}
.block-title{font-size:16px; font-weight:900; color:#0f172a; margin-bottom:8px}
.list{display:grid; gap:8px;}
.item{
  border:1px solid #e5e7eb; padding:10px 12px; border-radius:12px;
  display:flex; align-items:center; justify-content:flex-start; gap:8px;
  background:#fff;
}
.tag{font-size:12px; background:#e2efff; color:#1e40af; padding:4px 8px; border-radius:999px; font-weight:800}
.note{font-size:12.5px; color:#475569; margin-top:6px; text-align:right}

.month-card{border-radius: 14px;background: #ffffff;padding: 14px 16px;box-shadow: 0 4px 14px rgba(0,0,0,0.06);border: 1px solid #e5e7eb;}
.month-head{display:flex;justify-content: space-between;align-items:center;margin-bottom: 10px;}
.month-head .m{font-size: 18px;font-weight: 900;color:#1e3a8a;}
.month-stats{font-size:15px;font-weight:700;color:#0f172a;line-height:1.4;}
.btn-xl{
  display:inline-flex; align-items:center; gap:8px; padding:12px 16px; border-radius:12px; border:1px solid #c7d2fe;
  background:linear-gradient(180deg,#fff, #f3f5ff 75%); color:#1e3a8a; font-size:15px; font-weight:900; cursor:pointer;
}
.canvas-box{background:#fff; border:1px dashed #dbe3ff; border-radius:12px; padding:12px; display:none;}
.canvas-grid{display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
@media (max-width:900px){ .canvas-grid{grid-template-columns: 1fr} }
</style>
</head>
<body>

<header>
  <h1 id="pageHeader">🏓 개인 성적</h1>
  <div class="row">
    <button id="adminBtn" class="btn">⚙관리자모드</button>
    <a href="index.html" class="btn primary">결과입력</a>
    <a href="monthly-report.html" class="btn primary">통합전적</a>
    <a href="monthly-report2.html" class="btn primary">단/복식전적</a>
  </div>
</header>

<main class="wrap">

<!-- ✅ 프로필 카드 -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column: span 12;">
    <div style="display:flex; align-items:center; gap:16px;">
      <div style="width:52px; height:52px; border-radius:50%; background:#e0e7ff; display:flex; align-items:center;
        justify-content:center; font-size:22px; font-weight:900; color:#1e3a8a;">🏓</div>
      <div>
        <div id="pf_name" style="font-size:22px; font-weight:900;">이름</div>
        <div id="pf_meta" style="font-size:14px; color:#475569; margin-top:4px;">소속 · 부수</div>
      </div>
    </div>
    <div class="hr"></div>
    <div id="pf_stats" style="font-size:15px; color:#334155; font-weight:700; line-height:1.7;"></div>
  </div>
</section>

<!-- 월별 카드 -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column: span 12;">
    <h3>📅 월별 통합 기록 (월마감 기준 · 올해)</h3>
    <div id="monthList" class="list"></div>
    <div class="note">* 진행중인 이번달은 월마감 목록에서 제외됩니다.</div>
  </div>
</section>

<!-- 상세 분석 -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column: span 12;">
    <h3>🔎 상세 분석 (이번달 · 실시간)</h3>
    <div class="grid" style="grid-template-columns:repeat(12,1fr); gap:12px;">
      <div class="card" style="grid-column: span 12;">
        <div class="block-title">단식 — 상대별 전적 TOP</div>
        <div id="opponentSingles" class="list"></div>
      </div>
      <div class="card" style="grid-column: span 12;">
        <div class="block-title">복식 — 파트너별 전적 TOP</div>
        <div id="partnerDoubles" class="list"></div>
      </div>
    </div>
    <div class="note">* 이번달 상세는 matches에서 이번달만 읽어서 계산합니다.</div>
  </div>
</section>

<!-- 그래프(지연 로딩) -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column: span 12;">
    <h3>📊 시각화</h3>
    <button class="btn-xl" id="btnLoadCharts">📈 그래프 열기</button>
    <div class="canvas-box" id="canvasBox" style="margin-top:12px;">
      <div class="canvas-grid">
        <canvas id="chartRate"></canvas>
        <canvas id="chartGames"></canvas>
        <canvas id="chartModePie"></canvas>
        <canvas id="chartOpp"></canvas>
        <canvas id="chartPartner"></canvas>
        <canvas id="chartPoints"></canvas>
      </div>
    </div>
    <div class="note">* 버튼을 눌러 그래프를 로드합니다.</div>
  </div>
</section>

</main>

<script type="module">
/* =========================
   Chart.js safe wrapper
========================= */
function safeChart(canvasEl, config){
  if (!canvasEl) return null;
  if (!window._charts) window._charts = {};
  const id = canvasEl.id;
  if (window._charts[id]) window._charts[id].destroy();
  window._charts[id] = new Chart(canvasEl, config);
  return window._charts[id];
}

/* =========================
   ✅ Firebase
========================= */
import { db } from "../firebase.js";
import {
  ref, get,
  query, orderByChild, equalTo
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

/* =========================
   Utils
========================= */
const $ = (s)=>document.querySelector(s);
const fmt1 = n => (Math.round(n*10)/10).toFixed(1);
const pad2 = n => String(n).padStart(2,'0');
const KST = (ts)=> new Date(new Date(ts).toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
const yyyymm = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
const shortMonth = (m) => `'${m.slice(2)}`;
const POINT_WIN = 2, POINT_LOSE = -1;

function kstNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
}

/* =========================
   Query Param
========================= */
const params = new URLSearchParams(location.search);
const playerName = (params.get('name') || '').trim();

/* =========================
   Data holders
========================= */
let playerLevels = {};      // {name: bu}

// 월마감(올해)
let months = [];
let perMonthAll = {};       // {YYYY-MM:{total,win,lose,rate}}
let sumAllTotal=0, sumAllWin=0, sumAllLose=0; // ✅ 올해 누적(월마감 합)

// 이번달 상세(실시간)
let oppMapSingle = {};
let partnerMapDouble = {};
let thisMonthDoublePoints = 0;

let sumSglTotal=0, sumSglWin=0, sumSglLose=0;
let sumDblTotal=0, sumDblWin=0, sumDblLose=0;

/* =========================
   ✅ members에서 name-bu 맵핑
========================= */
async function loadMembers(){
  const snap = await get(ref(db,'members'));
  if (!snap.exists()) return;
  const data = snap.val() || {};
  Object.values(data).forEach(p=>{
    if (!p?.name) return;
    playerLevels[String(p.name).trim()] = Number(p.bu ?? 99);
  });
}

/* =========================
   ✅ 올해 월마감 로드 + 합계 계산(중요)
========================= */
async function loadMonthlyReportsThisYear(){
  const snap = await get(ref(db, "monthlyReports"));
  if (!snap.exists()) {
    months = [];
    perMonthAll = {};
    sumAllTotal = sumAllWin = sumAllLose = 0;
    return;
  }

  const reports = snap.val() || {};
  const now = kstNow();
  const year = String(now.getFullYear());
  const curMonth = yyyymm(now); // 진행중 달

  months = [];
  perMonthAll = {};

  Object.keys(reports).forEach((m)=>{
    if (!/^\d{4}-\d{2}$/.test(m)) return;
    if (!m.startsWith(year + "-")) return;
    if (m === curMonth) return; // 진행중 달 제외

    const playersObj = reports[m]?.players || null;
    if (!playersObj) return;

    const arr = Object.values(playersObj);
    const row = arr.find(r => String(r?.name || '').trim() === playerName);
    if (!row) return;

    const win  = Number(row.win ?? row.wins ?? 0);
    const lose = Number(row.lose ?? row.losses ?? 0);
    const total = Number(row.total ?? (win + lose));
    const rate  = total ? (win/total*100) : 0;

    perMonthAll[m] = { total, win, lose, rate };
    months.push(m);
  });

  months = [...new Set(months)].sort();

  // ✅ 여기서 “올해 누적(월마감)” 합계를 반드시 계산
  sumAllTotal = 0; sumAllWin = 0; sumAllLose = 0;
  months.forEach(m=>{
    const a = perMonthAll[m];
    if(!a) return;
    sumAllTotal += Number(a.total||0);
    sumAllWin   += Number(a.win||0);
    sumAllLose  += Number(a.lose||0);
  });
}

/* =========================
   ✅ 이번달 상세: matches를 이번달만 쿼리로 읽음(빠름)
========================= */
async function loadMatchesThisMonthDetails(){
  oppMapSingle = {};
  partnerMapDouble = {};
  thisMonthDoublePoints = 0;

  sumSglTotal=0; sumSglWin=0; sumSglLose=0;
  sumDblTotal=0; sumDblWin=0; sumDblLose=0;

  const curMonth = yyyymm(kstNow());

  // ✅ monthKey = "YYYY-MM" 로 저장돼 있다는 전제
  const q = query(ref(db,'matches'), orderByChild("monthKey"), equalTo(curMonth));
  const snap = await get(q);
  if (!snap.exists()) return;

  const data = Object.values(snap.val() || {});
  const myMatches = data.filter(m=>{
    const names = [...(m.namesA||[]), ...(m.namesB||[])].map(s=>String(s).trim());
    return names.includes(playerName);
  });

  myMatches.forEach(m=>{
    if (!['A','B'].includes(m?.winnerSide)) return;

    const sideA = (m.namesA || []).map(s=>String(s).trim());
    const sideB = (m.namesB || []).map(s=>String(s).trim());
    const mode  = m.mode || 'single';
    const winA  = (m.winnerSide === 'A');
    const iAmA  = sideA.includes(playerName);
    const iAmB  = sideB.includes(playerName);
    const iWon  = (winA && iAmA) || (!winA && iAmB);

    if (mode === 'single'){
      sumSglTotal++;
      if (iWon) sumSglWin++; else sumSglLose++;

      const opp = iAmA ? sideB[0] : sideA[0];
      if (opp){
        if (!oppMapSingle[opp]) oppMapSingle[opp] = { win:0, lose:0 };
        if (iWon) oppMapSingle[opp].win++; else oppMapSingle[opp].lose++;
      }
    } else if (mode === 'double'){
      sumDblTotal++;
      if (iWon) sumDblWin++; else sumDblLose++;

      const pts = iWon ? POINT_WIN : POINT_LOSE;
      thisMonthDoublePoints += pts;

      let partner = null;
      if (iAmA) partner = sideA.find(n => n !== playerName);
      else if (iAmB) partner = sideB.find(n => n !== playerName);

      if (partner){
        if (!partnerMapDouble[partner]) partnerMapDouble[partner] = { win:0, lose:0, points:0 };
        if (iWon) partnerMapDouble[partner].win++; else partnerMapDouble[partner].lose++;
        partnerMapDouble[partner].points += pts;
      }
    }
  });
}

/* =========================
   Render - Profile (중요: 총 경기수/전체 전적)
========================= */
function renderProfile(){
  const name = playerName;
  const lvl  = playerLevels[name] ?? '-';
  const team = 'KOEN';

  // ✅ 이번달(실시간) 합
  const thisTotal = (sumSglTotal + sumDblTotal);
  const thisWin   = (sumSglWin + sumDblWin);
  const thisLose  = (sumSglLose + sumDblLose);

  // ✅ “총 경기수/전체 전적” = (올해 월마감 누적) + (이번달 실시간)
  const total = sumAllTotal + thisTotal;
  const win   = sumAllWin + thisWin;
  const lose  = sumAllLose + thisLose;
  const rate  = total ? fmt1(win/total*100) : '0.0';

  const sglRate  = sumSglTotal ? fmt1(sumSglWin/sumSglTotal*100) : '0.0';
  const dblRate  = sumDblTotal ? fmt1(sumDblWin/sumDblTotal*100) : '0.0';

  $('#pf_name').textContent = name || '선수';
  $('#pf_meta').textContent = `${team} · ${lvl}부`;

  $('#pf_stats').innerHTML = `
    <div style="font-size:16px; line-height:1.85; margin-bottom:18px;">
      <div style="font-weight:900; color:#1e3a8a; margin-bottom:6px; font-size:18px;">📌 총 누적(올해 월마감 + 이번달)</div>
      <div>✅ 총 경기수 : <b style="color:#0f172a; font-size:17px;">${total}</b></div>
      <div>✅ 전체 전적 : <b style="color:#0f172a; font-size:17px;">${win}승 ${lose}패 (${rate}%)</b></div>
    </div>

    <div style="font-size:16px; line-height:1.85;">
      <div style="font-weight:900; color:#1e3a8a; margin-bottom:6px; font-size:18px;">📌 이번달(실시간)</div>
      <div>🎯 단식 전적 : <b style="color:#0f172a; font-size:17px;">${sumSglWin}승 ${sumSglLose}패 (${sglRate}%)</b></div>
      <div>🫂 복식 전적 : <b style="color:#0f172a; font-size:17px;">${sumDblWin}승 ${sumDblLose}패 (${dblRate}%)</b></div>
    </div>
  `;
}

/* =========================
   Render - Month cards
========================= */
function renderMonthCards(){
  const box = $('#monthList');
  box.innerHTML = '';
  const sortedMonths = months.slice().sort();

  if (!sortedMonths.length){
    box.innerHTML = `<div class="dim">올해 월마감 데이터가 없습니다.</div>`;
    return;
  }

  sortedMonths.forEach(m=>{
    const a = perMonthAll[m] || { total:0, win:0, lose:0, rate:0 };
    box.insertAdjacentHTML('beforeend', `
      <div class="month-card">
        <div class="month-head">
          <div class="m">${shortMonth(m)}</div>
        </div>
        <div class="month-stats">
          전체 ${a.total}경기, ${a.win}승, ${a.lose}패, 승률 ${fmt1(a.rate)}%
        </div>
      </div>
    `);
  });
}

/* =========================
   Render - Details (This Month)
========================= */
function renderDetails(){
  const oppBox = $('#opponentSingles');
  oppBox.innerHTML = '';

  const oppArr = Object.entries(oppMapSingle)
    .map(([name,v])=>({
      name, win:v.win, lose:v.lose, total:(v.win+v.lose),
      rate: (v.win+v.lose) ? (v.win/(v.win+v.lose)*100) : 0
    }))
    .sort((a,b)=> b.total - a.total || b.win - a.win)
    .slice(0,8);

  if (!oppArr.length){
    oppBox.innerHTML = `<div class="dim">이번달 단식 기록이 없습니다.</div>`;
  } else {
    oppArr.forEach(o=>{
      const lvl = playerLevels[o.name] ?? '-';
      oppBox.insertAdjacentHTML('beforeend', `
        <div class="item">
          <span class="tag">상대</span>
          <span>
            <a href="player.html?name=${encodeURIComponent(o.name)}" style="color:#1e40af; font-weight:900; text-decoration:none;">
              ${o.name}(${lvl})
            </a>
            &nbsp;&nbsp;${o.win}승 ${o.lose}패&nbsp;&nbsp;${fmt1(o.rate)}%
          </span>
        </div>
      `);
    });
  }

  const ptnBox = $('#partnerDoubles');
  ptnBox.innerHTML = '';

  const ptnArr = Object.entries(partnerMapDouble)
    .map(([name,v])=>({
      name, win:v.win, lose:v.lose, total:(v.win+v.lose),
      points: v.points ?? 0,
      rate: (v.win+v.lose) ? (v.win/(v.win+v.lose)*100) : 0
    }))
    .sort((a,b)=> b.total - a.total || b.points - a.points)
    .slice(0,8);

  if (!ptnArr.length){
    ptnBox.innerHTML = `<div class="dim">이번달 복식 기록이 없습니다.</div>`;
  } else {
    ptnArr.forEach(p=>{
      const lvl = playerLevels[p.name] ?? '-';
      ptnBox.insertAdjacentHTML('beforeend', `
        <div class="item">
          <span class="tag">파트너</span>
          <span>
            <a href="player.html?name=${encodeURIComponent(p.name)}" style="color:#1e40af; font-weight:900; text-decoration:none;">
              ${p.name}(${lvl})
            </a>
            &nbsp;&nbsp;${p.win}승 ${p.lose}패&nbsp;&nbsp;${fmt1(p.rate)}%
          </span>
        </div>
      `);
    });
  }
}

/* =========================
   Charts (지연 로딩)
========================= */
let chartsLoaded = false;
function buildCharts(){
  if (chartsLoaded) return;
  chartsLoaded = true;
  $('#canvasBox').style.display = 'block';

  const ms = months.slice().sort();

  safeChart(document.getElementById('chartRate'), {
    type:'line',
    data:{ labels: ms.map(shortMonth), datasets:[{ label:'월별 승률(올해, 월마감%)', data: ms.map(m=>perMonthAll[m]?.rate ?? 0), tension:.2 }]},
    options:{ responsive:true }
  });

  safeChart(document.getElementById('chartGames'), {
    type:'bar',
    data:{ labels: ms.map(shortMonth), datasets:[{ label:'월별 경기수(올해, 월마감)', data: ms.map(m=>perMonthAll[m]?.total ?? 0) }]},
    options:{ responsive:true }
  });

  safeChart(document.getElementById('chartModePie'), {
    type:'doughnut',
    data:{ labels:['단식(이번달)','복식(이번달)'], datasets:[{ data:[sumSglTotal, sumDblTotal] }]},
    options:{ responsive:true }
  });

  const oppArr = Object.entries(oppMapSingle).map(([name,v])=>({
    name, total:(v.win+v.lose),
    rate:(v.win+v.lose)?(v.win/(v.win+v.lose)*100):0
  })).sort((a,b)=>b.total-a.total).slice(0,8);

  safeChart(document.getElementById('chartOpp'), {
    type:'bar',
    data:{ labels: oppArr.map(o=>o.name), datasets:[{ label:'단식 상대별 승률(이번달%)', data: oppArr.map(o=>o.rate) }]},
    options:{ responsive:true }
  });

  const ptnArr = Object.entries(partnerMapDouble).map(([name,v])=>({
    name, total:(v.win+v.lose),
    rate:(v.win+v.lose)?(v.win/(v.win+v.lose)*100):0
  })).sort((a,b)=>b.total-a.total).slice(0,8);

  safeChart(document.getElementById('chartPartner'), {
    type:'bar',
    data:{ labels: ptnArr.map(o=>o.name), datasets:[{ label:'복식 파트너별 승률(이번달%)', data: ptnArr.map(o=>o.rate) }]},
    options:{ responsive:true }
  });

  safeChart(document.getElementById('chartPoints'), {
    type:'line',
    data:{ labels:['이번달'], datasets:[{ label:'복식 승점(이번달)', data:[thisMonthDoublePoints], tension:.2 }]},
    options:{ responsive:true }
  });
}

/* =========================
   Bootstrap
========================= */
await loadMembers();
await loadMonthlyReportsThisYear();
await loadMatchesThisMonthDetails();

renderProfile();
renderMonthCards();
renderDetails();

document.getElementById('btnLoadCharts').addEventListener('click', buildCharts);
</script>
</body>
</html>
