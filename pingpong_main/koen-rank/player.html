<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🏓 개인 탁구 성적</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb; --card:#ffffff;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 10px 30px rgba(2,6,23,.08);
}
*{box-sizing:border-box}
body{
  margin:0; font-family:"Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink); font-weight:600;
}
header{
  background:#fff; border-bottom:1px solid #e5e7eb;
  text-align:center; padding:14px 0; position:sticky; top:0; z-index:10;
}
h1{margin:4px 0 10px; color:var(--accent); font-size:clamp(18px,4vw,24px); font-weight:900;}
.btn{border:1px solid #d1d5db; border-radius:10px; padding:7px 12px; font-size:14px;
  background:#fff; cursor:pointer; font-weight:800; transition:.15s;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.row{display:flex;justify-content:center;gap:8px;margin-bottom:10px; flex-wrap:wrap;}
.wrap{max-width:1080px; margin:0 auto; padding:16px}
.grid{display:grid; gap:14px; grid-template-columns: repeat(12, 1fr);}
.card{background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:16px;}
.card h3{margin:0 0 10px; font-size:18px; color:#1e3a8a; font-weight:900;}
.hr{height:1px; background:#eef2f7; margin:12px 0}
.dim{color:var(--muted); font-weight:800; font-size:13px}
.big{font-size:16px; line-height:1.9; color:#334155; font-weight:800;}
.pill{
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 10px; border-radius:999px;
  background:#eef2ff; color:#3730a3; font-size:12px; font-weight:900;
}
.pill.ok{background:#dcfce7;color:#166534}
.pill.bad{background:#fee2e2;color:#991b1b}

.list{display:grid; gap:8px;}
.item{
  border:1px solid #e5e7eb; padding:10px 12px; border-radius:14px;
  background:#fff;
}
.item .top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.item .name{font-weight:900; color:#0f172a;}
.item .meta{font-size:13px; color:#475569; font-weight:800;}
.item .stat{font-size:14px; font-weight:900; color:#111827;}
.two-col{
  display:grid; gap:12px; grid-template-columns:repeat(12,1fr);
}
.col6{grid-column:span 6;}
@media (max-width:900px){ .col6{grid-column:span 12;} }

.note{
  margin-top:10px; font-size:12.5px; color:#64748b; font-weight:800; text-align:right;
}
.warn{
  background:#fff7ed; border:1px solid #fed7aa; color:#9a3412;
  padding:10px 12px; border-radius:12px; font-weight:900; font-size:13px;
}
</style>
</head>
<body>

<header>
  <h1 id="pageHeader">🏓 개인 성적</h1>
  <div class="row">
    <a href="index.html" class="btn primary">결과입력</a>
    <a href="monthly-report.html" class="btn primary">통합전적</a>
    <a href="monthly-report2.html" class="btn primary">ELO 랭킹</a>
  </div>
</header>

<main class="wrap">

<section class="grid">
  <div class="card" style="grid-column:span 12;">
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:54px;height:54px;border-radius:50%;background:#e0e7ff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#1e3a8a;">🏓</div>
      <div>
        <div id="pf_name" style="font-size:22px; font-weight:900;">-</div>
        <div id="pf_meta" style="font-size:14px; color:#475569; margin-top:4px; font-weight:900;">-</div>
      </div>
    </div>
    <div class="hr"></div>
    <div id="pf_stats" class="big"></div>
    <div id="errBox" style="display:none; margin-top:10px;" class="warn"></div>
  </div>
</section>

<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column:span 12;">
    <h3>🏆 올해 누적 성적</h3>
    <div id="yearSummary" class="big"></div>
  </div>
</section>

<!-- 2) 이번달 단식/복식 -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column:span 12;">
    <h3>📌 이번달 성적 (실시간)</h3>
    <div id="thisMonthSummary" class="big"></div>
    <div class="note">* 이번달은 matches(실시간) 기준입니다.</div>
  </div>
</section>

<!-- 3) 전체 vs 이번달 상대/파트너 요약 -->
<section class="grid" style="margin-top:12px;">
  <div class="card" style="grid-column:span 12;">
    <h3>🏅 상대·파트너 요약</h3>

   <div>
  <div class="pill">이번달</div>
  <div id="thisBestWorst" style="margin-top:10px;" class="big"></div>
</div>

    <div class="note">* 단식: 상대 / 복식: 파트너 기준입니다.</div>
  </div>
</section>


</main>

<script type="module">
/* =========================
   화면 디버그/에러 출력
========================= */
const $ = (s)=>document.querySelector(s);
function showErr(msg){
  const box = $("#errBox");
  if(!box) { alert(msg); return; }
  box.style.display = "block";
  box.textContent = msg;
}
function log(msg){
  console.log(msg);   // 콘솔에만 출력
}

/* =========================
   Firebase 모듈: 경로 자동 탐색
========================= */
let db;
let rtdb;

async function loadFirebase(){
  // player.html 위치: /pingpong_main/koen-rank/
  // firebase.js 위치: /pingpong_main/firebase.js
  const mod = await import("../firebase.js");
  db = mod.db;

  rtdb = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js");

  console.log("✅ firebase.js 로드 성공: ../firebase.js");
  console.log("✅ firebase-database 모듈 로드 성공");
}

/* =========================
   Utils
========================= */
const pad2 = n => String(n).padStart(2,'0');
const fmt1 = n => (Math.round(n*10)/10).toFixed(1);
function kstNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Seoul"}));
}
function yyyymm(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
}


const safeName = s => String(s??"").trim();
const winRate = (w,t)=> t ? (w/t*100) : 0;

function getMatchMonthKey(m){
  const mk = safeName(m?.monthKey);

  if (/^\d{4}-\d{2}$/.test(mk)) return mk;

  if (/^\d{4}-\d{1}$/.test(mk)) {
    const [y, mo] = mk.split("-");
    return `${y}-${pad2(mo)}`;
  }

  const raw = safeName(
    m?.date ||
    m?.matchDate ||
    m?.createdAt ||
    m?.time ||
    m?.timestamp ||
    ""
  );

  const found = raw.match(/(\d{4})[-./년\s]*(\d{1,2})/);
  if (!found) return "";

  return `${found[1]}-${pad2(found[2])}`;
}

function getMatchMode(m){
  const mode = safeName(m?.mode);

  if (["single", "singles", "단식"].includes(mode)) return "single";
  if (["double", "doubles", "복식"].includes(mode)) return "double";

  const A = Array.isArray(m?.namesA) ? m.namesA : [];
  const B = Array.isArray(m?.namesB) ? m.namesB : [];

  if (A.length === 1 && B.length === 1) return "single";
  if (A.length === 2 && B.length === 2) return "double";

  return "single";
}

/* =========================
   Query Param
========================= */
const params = new URLSearchParams(location.search);
const playerName = safeName(params.get("name") || "");

/* =========================
   요구사항 기준 데이터
========================= */


// members bu
let playerLevels = {};

let yearTotal = 0;
let yearWin = 0;
let yearLose = 0;



// 2) 이번달 실시간
let tmSglT=0, tmSglW=0, tmSglL=0;
let tmDblT=0, tmDblW=0, tmDblL=0;

// 3) 상대/파트너 맵

let tmOppSingles = {};
let tmPartnerDoubles = {};

/* =========================
   Load members
========================= */
async function loadMembers(){
  const snap = await rtdb.get(rtdb.ref(db,"members"));
  if(!snap.exists()) return;
  const data = snap.val() || {};
  Object.values(data).forEach(p=>{
    const nm = safeName(p?.name);
    if(!nm) return;
    playerLevels[nm] = Number(p?.bu ?? 99);
  });
}

async function loadYearSummary(){
  const snap = await rtdb.get(rtdb.ref(db,"monthlyReports"));

  if(!snap.exists()) return;

  const reports = snap.val() || {};

  yearTotal = 0;
  yearWin = 0;
  yearLose = 0;

  Object.entries(reports).forEach(([month,data]) => {

    if (!month.startsWith("2026-")) return;

    const players = data?.players || {};

    const row = Object.values(players)
      .find(x => safeName(x?.name) === playerName);

    if (!row) return;

    const w = Number(row.win ?? row.wins ?? 0);
    const l = Number(row.lose ?? row.losses ?? 0);

    yearWin += w;
    yearLose += l;
    yearTotal += (w + l);
  });
}

function renderYearSummary(){

  const rate = yearTotal
    ? fmt1(yearWin / yearTotal * 100)
    : "0.0";

  $("#yearSummary").innerHTML = `
    <div>🏓 총 경기 : <b>${yearTotal}</b></div>
    <div>✅ 전적 : <b>${yearWin}승 ${yearLose}패</b></div>
    <div>📈 승률 : <b>${rate}%</b></div>
  `;
}

async function fetchMatchesByMonth(monthKey){
  const q = rtdb.query(
    rtdb.ref(db,"matches"),
    rtdb.orderByChild("monthKey"),
    rtdb.equalTo(monthKey)
  );

  const snap = await rtdb.get(q);
  if(snap.exists()) return Object.values(snap.val() || {});

  const allSnap = await rtdb.get(rtdb.ref(db,"matches"));
  if(!allSnap.exists()) return [];

  return Object.values(allSnap.val() || {}).filter(m => {
    return getMatchMonthKey(m) === monthKey;
  });
}

function applyMatchToMaps(m, scope){
  if (!m || !["A","B"].includes(m?.winnerSide)) return;

  const mode = getMatchMode(m);
  const A = (m.namesA || []).map(safeName).filter(Boolean);
  const B = (m.namesB || []).map(safeName).filter(Boolean);

  const inA = A.includes(playerName);
  const inB = B.includes(playerName);
  if(!inA && !inB) return;

  const winA = (m.winnerSide === "A");
  const iWon = (winA && inA) || (!winA && inB);

  const oppMap = tmOppSingles;
const ptnMap = tmPartnerDoubles;

  // ✅ 전체 누적 단식/복식 카운트(2026-01~지난달)
  

  if(mode === "single"){
    if(scope==="TM"){
      tmSglT++; if(iWon) tmSglW++; else tmSglL++;
    }
    const opp = inA ? (B[0]||"") : (A[0]||"");
    if(!opp) return;
    if(!oppMap[opp]) oppMap[opp] = { win:0, lose:0 };
    if(iWon) oppMap[opp].win++; else oppMap[opp].lose++;
  } else if(mode === "double"){
    if(scope==="TM"){
      tmDblT++; if(iWon) tmDblW++; else tmDblL++;
    }
    let partner = "";
    if(inA) partner = A.find(n=>n!==playerName) || "";
    if(inB) partner = B.find(n=>n!==playerName) || "";
    if(!partner) return;
    if(!ptnMap[partner]) ptnMap[partner] = { win:0, lose:0 };
    if(iWon) ptnMap[partner].win++; else ptnMap[partner].lose++;
  }
}



async function loadThisMonthRealtime(curMonth){
  tmSglT=tmSglW=tmSglL=0;
  tmDblT=tmDblW=tmDblL=0;
  tmOppSingles = {};
  tmPartnerDoubles = {};

  const arr = await fetchMatchesByMonth(curMonth);
  arr.forEach(x=>applyMatchToMaps(x, "TM"));
}

/* =========================
   Render
========================= */
function linkPlayer(nm, color="#1e40af"){
  const lvl = playerLevels[nm] ?? "-";
  return `<a href="player.html?name=${encodeURIComponent(nm)}" style="color:${color};font-weight:900;text-decoration:none;">${nm}(${lvl})</a>`;
}
function pickMostWin(mapObj){
  let best=null;
  for(const [name,v] of Object.entries(mapObj)){
    if(!best || v.win > best.win) best = { name, ...v };
  }
  return best;
}
function pickMostLose(mapObj){
  let worst=null;
  for(const [name,v] of Object.entries(mapObj)){
    if(!worst || v.lose > worst.lose) worst = { name, ...v };
  }
  return worst;
}
function pickPartnerBest(mapObj){
  let best=null;
  for(const [name,v] of Object.entries(mapObj)){
    const t=v.win+v.lose; const r=t? v.win/t : 0;
    if(!best) best={name,...v,r};
    else{
      const bt=best.win+best.lose; const br=bt? best.win/bt : 0;
      if(v.win>best.win || (v.win===best.win && r>br)) best={name,...v,r};
    }
  }
  return best;
}
function pickPartnerWorst(mapObj){
  let worst=null;
  for(const [name,v] of Object.entries(mapObj)){
    const t=v.win+v.lose; const r=t? v.win/t : 0;
    if(!worst) worst={name,...v,r};
    else{
      const wt=worst.win+worst.lose; const wr=wt? worst.win/wt : 0;
      if(v.lose>worst.lose || (v.lose===worst.lose && r<wr)) worst={name,...v,r};
    }
  }
  return worst;
}

function renderBase(){
  const lvl = playerLevels[playerName] ?? "-";
  $("#pf_name").textContent = playerName || "선수";
  $("#pf_meta").textContent = `KOEN · ${lvl}부`;
}



function renderThisMonthSummary(curMonth){
  const sRate = tmSglT ? fmt1(tmSglW/tmSglT*100) : "0.0";
  const dRate = tmDblT ? fmt1(tmDblW/tmDblT*100) : "0.0";
  $("#thisMonthSummary").innerHTML = `
    <div>🗓️ 이번달 : <b>${curMonth}</b></div>
    <div>🎯 단식 : <b style="font-size:18px;color:#0f172a;">${tmSglW}승 ${tmSglL}패</b> (총 ${tmSglT}경기, 승률 <b>${sRate}%</b>)</div>
    <div>🫂 복식 : <b style="font-size:18px;color:#0f172a;">${tmDblW}승 ${tmDblL}패</b> (총 ${tmDblT}경기, 승률 <b>${dRate}%</b>)</div>
  `;
}

function renderBestWorst(){
  const fmtLine = (x, good="#0f6a00", bad="#d45500")=>{
    if(!x) return `<b style="color:#64748b;">-</b>`;
    const t = x.win + x.lose;
    const r = fmt1(winRate(x.win,t));
    const color = (x.win>=x.lose)?good:bad;
    return `${linkPlayer(x.name,color)} — <b>${x.win}승 ${x.lose}패</b> (${r}%)`;
  };

  
  const tBestOpp = pickMostWin(tmOppSingles);
  const tWorstOpp = pickMostLose(tmOppSingles);
  const tBestPtn = pickPartnerBest(tmPartnerDoubles);
  const tWorstPtn = pickPartnerWorst(tmPartnerDoubles);

  $("#thisBestWorst").innerHTML = `
    <div>🏅 단식 가장 많이 이긴 상대 : ${fmtLine(tBestOpp)}</div>
    <div>⚠️ 단식 가장 많이 진 상대 : ${fmtLine(tWorstOpp)}</div>
    <div style="height:8px;"></div>
    <div>🤝 복식 가장 잘 맞는 파트너 : ${fmtLine(tBestPtn)}</div>
    <div>😅 복식 가장 안 맞는 파트너 : ${fmtLine(tWorstPtn)}</div>
  `;
}



/* =========================
   Bootstrap
========================= */
try{
  if(!playerName){
    throw new Error("URL에 ?name=선수이름 이 없습니다. 예) player.html?name=강성용");
  }

await loadFirebase();
await loadMembers();

await loadYearSummary();

renderBase();

renderYearSummary();
await loadMembers();
renderBase();

const curMonth = yyyymm(kstNow());

await loadThisMonthRealtime(curMonth);

renderThisMonthSummary(curMonth);
renderBestWorst();
  

  
}catch(e){
  showErr("오류: " + (e?.message || String(e)));
  console.log(e);
}
</script>

</body>
</html>
