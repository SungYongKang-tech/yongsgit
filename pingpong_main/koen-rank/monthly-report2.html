<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 단식 Elo 랭킹</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08); --card:#fff;
}
body{margin:0;font-family:"Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-weight:600;}
header{background:#fff;border-bottom:1px solid #e5e7eb;text-align:center;padding:14px 0;position:sticky;top:0;z-index:10;}
h1{margin:4px 0 10px;color:var(--accent);font-size:clamp(18px,4vw,24px);font-weight:700;}
.btn{border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;font-size:14px;background:#fff;cursor:pointer;font-weight:600;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
main{max-width:900px;margin:0 auto;padding:10px 10px 60px;}
table{width:100%;border-collapse:collapse;background:var(--card);box-shadow:var(--shadow);border-radius:12px;overflow:hidden;font-size:15px;}
thead th{background:#f1f5f9;border-bottom:1px solid #e2e8f0;padding:10px 6px;text-align:center;color:#334155;font-weight:700;}
tbody td{border-bottom:1px solid #f1f5f9;padding:10px 6px;text-align:center;}
tbody tr:hover{background:#f9fafb}
.win{color:var(--ok);font-weight:800;}
.lose{color:var(--danger);font-weight:800;}
.totalNote{text-align:center;margin-top:12px;font-size:17px;font-weight:800;color:#0d47a1;background:#e3f2fd;display:inline-block;padding:6px 14px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08);}
.ruleNote{text-align:center;font-size:14px;color:#475569;margin-top:8px;margin-bottom:20px;}
.prevWrap{margin-top:16px;display:flex;flex-direction:column;gap:16px;}
.prevTitle{text-align:center;font-size:16px;color:#334155;font-weight:900;margin:18px 0 10px;}
.monthCard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 6px 18px rgba(2,6,23,.06);overflow:hidden;}
.monthCard .bar{background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:10px 12px;font-weight:900;color:#1e3a8a;text-align:center;}
.monthCard .inner{padding:10px 10px 14px;}
@media(max-width:640px){
  table{font-size:13px;} thead th, tbody td{padding:7px 1px;}
  .totalNote{font-size:15px;padding:5px 10px;}
}
</style>
</head>
<body>
<header>
  <h1 id="pageHeader">🏆 단식 Elo 랭킹</h1>
  <div style="display:flex;justify-content:center;gap:8px;">
    <a href="index.html" class="btn primary">🏓 경기결과 입력</a>
    <a href="monthly-report.html" class="btn primary">통합 전적</a>
  </div>
</header>

<main>
  <section id="singleSection"></section>
</main>

<script type="module">
import { db } from "../firebase.js";
import { ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const SHOW_RECENT_MATCHES = 10;

const titleRef = ref(db, "config/title");
get(titleRef).then(snap=>{
  const title = snap.exists() ? snap.val() : "우리회사";
  document.getElementById("pageHeader").textContent = `🏆 ${title} 단식 Elo 랭킹`;
});

let playerLevels = {};
let membersLoaded = false;
let matchesData = {};

onValue(ref(db, "members"), (snap)=>{
  const data = snap.val() || {};
  const map = {};

  Object.values(data).forEach(p=>{
    if(!p || !p.name) return;
    map[p.name] = Number(p.bu ?? 5);
  });

  playerLevels = map;
  membersLoaded = true;
  renderEloPage();
});

onValue(ref(db,"matches"), (snap)=>{
  matchesData = snap.val() || {};
  renderEloPage();
});

function initialEloByBu(bu){
  const n = Number(bu);
  if (!Number.isFinite(n)) return 1500;
  return 2000 - (n * 100);
}

function expectedScore(ratingA, ratingB){
  return 1 / (1 + Math.pow(10, (ratingB - ratingA) / 400));
}

function getK(games){
  return games < 10 ? 40 : 24;
}

function monthKeyOf(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function normalizeMonthKey(v){
  if(v == null) return "";
  const s = String(v).trim();
  const m = s.match(/^(\d{4})[-\/](\d{1,2})$/);
  if(!m) return s;
  const y = m[1];
  const mm = String(parseInt(m[2],10)).padStart(2,'0');
  return `${y}-${mm}`;
}

function formatChange(n){
  if(n > 0) return `<span class="win">▲ +${n}</span>`;
  if(n < 0) return `<span class="lose">▼ ${n}</span>`;
  return `<span style="color:#64748b;">0</span>`;
}

function rankIcon(i){
  if(i === 0) return "🥇";
  if(i === 1) return "🥈";
  if(i === 2) return "🥉";
  return i + 1;
}

function ensurePlayer(name, elo, games, monthStartElo, thisMonth){
  if(!name) return;
  if(elo[name] == null){
    elo[name] = initialEloByBu(playerLevels[name]);
  }
  if(games[name] == null){
    games[name] = 0;
  }
  if(monthStartElo[name] == null){
    monthStartElo[name] = elo[name];
  }
}

function renderEloPage(){
  if(!membersLoaded) return;

  const now = new Date();
  const thisMonth = monthKeyOf(now);

  const elo = {};
  const games = {};
  const wins = {};
  const losses = {};
  const monthStartElo = {};
  const recent = [];

  Object.keys(playerLevels).forEach(name=>{
    elo[name] = initialEloByBu(playerLevels[name]);
    games[name] = 0;
    wins[name] = 0;
    losses[name] = 0;
    monthStartElo[name] = elo[name];
  });

  const matches = Object.values(matchesData)
    .filter(m => m && m.mode === "single")
    .filter(m => (m.namesA || [])[0] && (m.namesB || [])[0])
    .filter(m => m.winnerSide === "A" || m.winnerSide === "B")
    .sort((a,b)=> Number(a.createdAt || 0) - Number(b.createdAt || 0));

  matches.forEach(m=>{
    const pA = m.namesA[0];
    const pB = m.namesB[0];
    const mk = normalizeMonthKey(m.monthKey);

    ensurePlayer(pA, elo, games, monthStartElo, thisMonth);
    ensurePlayer(pB, elo, games, monthStartElo, thisMonth);

    if(mk === thisMonth){
      if(monthStartElo[pA] == null) monthStartElo[pA] = elo[pA];
      if(monthStartElo[pB] == null) monthStartElo[pB] = elo[pB];
    }

    const beforeA = elo[pA];
    const beforeB = elo[pB];

    const scoreA = m.winnerSide === "A" ? 1 : 0;
    const expectedA = expectedScore(beforeA, beforeB);
    const expectedB = expectedScore(beforeB, beforeA);

    const changeA = Math.round(getK(games[pA]) * (scoreA - expectedA));
    const changeB = Math.round(getK(games[pB]) * ((1 - scoreA) - expectedB));

    elo[pA] += changeA;
    elo[pB] += changeB;

    games[pA]++;
    games[pB]++;

    if(scoreA === 1){
      wins[pA] = (wins[pA] || 0) + 1;
      losses[pB] = (losses[pB] || 0) + 1;
    }else{
      wins[pB] = (wins[pB] || 0) + 1;
      losses[pA] = (losses[pA] || 0) + 1;
    }

    recent.push({
      createdAt: Number(m.createdAt || 0),
      pA, pB,
      winner: scoreA === 1 ? pA : pB,
      loser: scoreA === 1 ? pB : pA,
      changeWinner: scoreA === 1 ? changeA : changeB,
      changeLoser: scoreA === 1 ? changeB : changeA,
      afterWinner: scoreA === 1 ? elo[pA] : elo[pB],
      afterLoser: scoreA === 1 ? elo[pB] : elo[pA]
    });
  });

  const arr = Object.keys(elo)
  .filter(name => (games[name] || 0) > 0)
  .map(name=>{
    const current = Math.round(elo[name]);
    const start = Math.round(monthStartElo[name] ?? initialEloByBu(playerLevels[name]));
    return {
      name,
      bu: playerLevels[name] ?? "-",
      elo: current,
      change: current - start,
      games: games[name] || 0,
      win: wins[name] || 0,
      lose: losses[name] || 0
    };
  }).sort((a,b)=> b.elo - a.elo || b.games - a.games || a.name.localeCompare(b.name, "ko"));

  renderTable(arr, matches.length, recent);
}

function renderTable(arr, totalSingleMatches, recent){
  const sec = document.getElementById("singleSection");

  const recentRows = recent
    .slice(-SHOW_RECENT_MATCHES)
    .reverse()
    .map(r=>`
      <tr>
        <td>${r.winner}</td>
        <td><span class="win">+${r.changeWinner}</span></td>
        <td>${r.loser}</td>
        <td><span class="lose">${r.changeLoser}</span></td>
      </tr>
    `).join("");

  sec.innerHTML = `
    <h2 style="text-align:center;font-size:22px;color:#1e3a8a;margin:20px 0 14px;font-weight:800;">
      🏆 단식 Elo 랭킹
    </h2>

    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>이름(부수)</th>
          <th>Elo</th>
          <th>이번달 변화</th>
          <th>경기</th>
        </tr>
      </thead>
      <tbody>
        ${arr.length === 0 ? `
          <tr><td colspan="5" style="padding:14px;color:#64748b;">선수 기록이 없습니다.</td></tr>
        ` : arr.map((p,i)=>`
          <tr style="${i < 3 ? 'background:#e0f2fe' : 'background:#f9fafb'}">
            <td>${rankIcon(i)}</td>
            <td>${p.name}(${p.bu})</td>
            <td><b>${p.elo}</b></td>
            <td>${formatChange(p.change)}</td>
            <td>${p.games}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>

    <div style="text-align:center;">
      <span class="totalNote">🔹 단식 Elo 반영 경기 수: <b>${totalSingleMatches} 경기</b></span>
    </div>
    <p class="ruleNote">
      ⚖️ 초기 Elo: <b>1부 1900 / 2부 1800 / 3부 1700 / 4부 1600 / 5부 1500 / 6부 1400</b><br>
      신규 선수와 10경기 미만 선수는 변동폭이 조금 크게 반영됩니다.
    </p>

    <div class="prevWrap">
      <div class="prevTitle">최근 Elo 변동</div>
      <div class="monthCard">
        <div class="bar">📈 최근 ${SHOW_RECENT_MATCHES}경기</div>
        <div class="inner">
          <table>
            <thead>
              <tr>
                <th>승자</th>
                <th>변동</th>
                <th>패자</th>
                <th>변동</th>
              </tr>
            </thead>
            <tbody>
              ${recentRows || `<tr><td colspan="4" style="padding:14px;color:#64748b;">최근 단식 경기가 없습니다.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
