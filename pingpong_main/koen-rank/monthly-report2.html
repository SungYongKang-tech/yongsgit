<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏓 월간 단식·복식 리그 리포트</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08); --card:#fff;
}
body{
  margin:0; font-family:"Pretendard","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink); font-weight:600;
}
header{
  background:#fff;border-bottom:1px solid #e5e7eb;
  text-align:center;padding:14px 0;position:sticky;top:0;z-index:10;
}
h1{margin:4px 0 10px;color:var(--accent);
  font-size:clamp(18px,4vw,24px);font-weight:700;}
.btn{border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;
  font-size:14px;background:#fff;cursor:pointer;font-weight:600;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
main{max-width:900px;margin:0 auto;padding:10px 10px 60px;}
table{width:100%;border-collapse:collapse;background:var(--card);
  box-shadow:var(--shadow);border-radius:12px;overflow:hidden;font-size:15px;}
thead th{background:#f1f5f9;border-bottom:1px solid #e2e8f0;
  padding:10px 6px;text-align:center;color:#334155;font-weight:700;}
tbody td{border-bottom:1px solid #f1f5f9;padding:10px 6px;text-align:center;}
tbody tr:hover{background:#f9fafb}
.win{color:var(--ok);font-weight:700;}
.lose{color:var(--danger);font-weight:700;}
.totalNote{
  text-align:center;margin-top:12px;
  font-size:17px;font-weight:800;
  color:#0d47a1;background:#e3f2fd;
  display:inline-block;padding:6px 14px;
  border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08);
}
.ruleNote{
  text-align:center;font-size:14px;color:#475569;
  margin-top:8px;margin-bottom:20px;
}
.prevWrap{
  margin-top:16px;
  display:flex; flex-direction:column; gap:16px;
}
.prevTitle{
  text-align:center;
  font-size:16px;
  color:#334155;
  font-weight:900;
  margin:18px 0 10px;
}
.monthCard{
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(2,6,23,.06);
  overflow:hidden;
}
.monthCard .bar{
  background:#f8fafc;
  border-bottom:1px solid #e5e7eb;
  padding:10px 12px;
  font-weight:900;
  color:#1e3a8a;
  text-align:center;
}
.monthCard .inner{
  padding:10px 10px 14px;
}
@media(max-width:640px){
  table{font-size:13px;} thead th, tbody td{padding:7px 1px;}
  .totalNote{font-size:15px;padding:5px 10px;}
}
</style>
</head>
<body>
<header>
  <h1 id="pageHeader">🏓 월간 단식·복식 리그 리포트</h1>
  <div style="display:flex;justify-content:center;gap:8px;">
    <a href="index.html" class="btn primary">🏓 경기결과 입력</a>
    <a href="monthly-report.html" class="btn primary">통합 전적</a>
  </div>
</header>

<main>
  <section id="singleSection"></section>
  <section id="doubleSection"></section>
</main>

<script type="module">
import { db } from "../firebase.js";
import { ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

/* =========================
   Title (config/title) 동일 적용
========================= */
const titleRef = ref(db, "config/title");
get(titleRef).then(snap=>{
  const title = snap.exists() ? snap.val() : "우리회사";
  document.getElementById("pageHeader").textContent = `🏓 ${title} 월간 단·복식 리포트`;
});

/* =========================
   Helpers
========================= */
function formatNum(n){ return (Math.round(n*10)/10).toFixed(1); }
function teamKey(arr){ return (arr||[]).slice().sort((a,b)=>a.localeCompare(b)).join(', '); }
function monthKeyOf(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function daysInMonth(year, monthIndex0){
  return new Date(year, monthIndex0 + 1, 0).getDate();
}
function recentMonthKeys(now, count=3){
  // count=3 => 이번달 + 이전2개월
  const out = [];
  for(let i=0;i<count;i++){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    out.push(monthKeyOf(d));
  }
  return out; // [this, prev1, prev2]
}
function minGamesSingleForMonth(monthKey, now){
  const [y,m] = monthKey.split("-").map(Number);
  const isThis = monthKey === monthKeyOf(now);
  const day = isThis ? now.getDate() : daysInMonth(y, m-1);
  return Math.ceil(day / 3);
}
function minGamesDoubleForMonth(monthKey, now){
  const [y,m] = monthKey.split("-").map(Number);
  const isThis = monthKey === monthKeyOf(now);
  const day = isThis ? now.getDate() : daysInMonth(y, m-1);
  return Math.ceil(day / 7);
}

/* =========================
   members -> name:bu 맵핑
========================= */
let playerLevels = {}; // { "홍길동": 7, ... }
const memberRef = ref(db, "members");
onValue(memberRef, (snap)=>{
  const data = snap.val() || {};
  const map = {};
  Object.values(data).forEach(p=>{
    if (!p || !p.name) return;
    map[p.name] = Number(p.bu ?? 99);
  });
  playerLevels = map;
});

/* =========================
   matches 읽어서 월별 단/복식 통계
   + 3개월 이전 match 정리(1회)
========================= */
let cleanedOldMatches = false;

onValue(ref(db,"matches"), async (snap)=>{
  const data = snap.val() || {};
  const now = new Date();

  // ✅ 최근 3개월(이번달+이전2개월)만 화면에 표시
  const keepMonths = recentMonthKeys(now, 3); // [this, prev1, prev2]
  const thisMonth = keepMonths[0];

  // ✅ DB 정리 기준: "3개월 이전" 삭제 (즉, 이번달+이전2개월 유지)
  // 예) 3월이면 12월 이하 삭제 (1~3월 유지)
  const cutoffDate = new Date(now.getFullYear(), now.getMonth() - 3, 1);
  const cutoffMonth = monthKeyOf(cutoffDate);

  if (!cleanedOldMatches) {
    cleanedOldMatches = true;
    Object.entries(data).forEach(([id, m]) => {
      if (m && m.monthKey && m.monthKey <= cutoffMonth) {
        remove(ref(db, `matches/${id}`));
      }
    });
  }

  // 월별 누적용
  const statsSingleByMonth = {}; // { "2026-03": {name:{win,lose}}, ... }
  const statsDoubleByMonth = {}; // { "2026-03": {team:{win,lose,points}}, ... }

  // 초기화
  keepMonths.forEach(mk=>{
    statsSingleByMonth[mk] = {};
    statsDoubleByMonth[mk] = {};
  });

  Object.values(data).forEach(m=>{
    if(!m || !m.monthKey) return;
    if(!keepMonths.includes(m.monthKey)) return;

    const mk = m.monthKey;

    // 단식
    if(m.mode === "single"){
      const statsSingle = statsSingleByMonth[mk];
      const names = [...(m.namesA||[]), ...(m.namesB||[])];

      names.forEach(n=>{ if(!statsSingle[n]) statsSingle[n] = {win:0,lose:0}; });

      if(m.winnerSide==='A'){
        (m.namesA||[]).forEach(n=>statsSingle[n].win++);
        (m.namesB||[]).forEach(n=>statsSingle[n].lose++);
      } else if(m.winnerSide==='B'){
        (m.namesB||[]).forEach(n=>statsSingle[n].win++);
        (m.namesA||[]).forEach(n=>statsSingle[n].lose++);
      }
    }

    // 복식
    if(m.mode === "double"){
      const statsDouble = statsDoubleByMonth[mk];
      const teamA = teamKey(m.namesA||[]);
      const teamB = teamKey(m.namesB||[]);
      [teamA, teamB].forEach(t=>{
        if(!t) return;
        if(!statsDouble[t]) statsDouble[t] = {win:0,lose:0,points:0};
      });

      if(!teamA || !teamB) return;

      // 승점: 승리 +2 / 패배 -1
      if(m.winnerSide==='A'){
        statsDouble[teamA].win++;  statsDouble[teamA].points += 2;
        statsDouble[teamB].lose++; statsDouble[teamB].points -= 1;
      } else if(m.winnerSide==='B'){
        statsDouble[teamB].win++;  statsDouble[teamB].points += 2;
        statsDouble[teamA].lose++; statsDouble[teamA].points -= 1;
      }
    }
  });

  // 월별 정렬된 배열로 변환
  function buildSingleArr(statsSingle){
    return Object.entries(statsSingle).map(([name,s])=>{
      const total = s.win + s.lose;
      const rate = total ? (s.win/total*100) : 0;
      return {name, total, win:s.win, lose:s.lose, rate};
    }).sort((a,b)=>b.rate-a.rate || b.win-a.win || b.total-a.total);
  }

  function buildDoubleArr(statsDouble){
    return Object.entries(statsDouble).map(([team,s])=>{
      const total = s.win + s.lose;
      const rate = total ? (s.win/total*100) : 0;

      const teamNames = team.split(",").map(n=>n.trim()).filter(Boolean);
      const levelSum = teamNames.reduce((sum,n)=> sum + (Number(playerLevels[n]) || 99), 0);

      return {team,total,win:s.win,lose:s.lose,rate,points:s.points,levelSum};
    }).sort((a,b)=>
      (b.points - a.points) ||
      (b.rate - a.rate) ||
      (b.total - a.total) ||
      (a.levelSum - b.levelSum)
    );
  }

  const singleByMonthArr = {};
  const doubleByMonthArr = {};
  keepMonths.forEach(mk=>{
    singleByMonthArr[mk] = buildSingleArr(statsSingleByMonth[mk] || {});
    doubleByMonthArr[mk] = buildDoubleArr(statsDoubleByMonth[mk] || {});
  });

  // 렌더: 이번달 + 이전달(최근달이 위)
  const prevMonths = keepMonths.slice(1); // [prev1, prev2] (이미 최신순)
  renderSinglesMonthStack(singleByMonthArr, thisMonth, prevMonths, now);
  renderDoublesMonthStack(doubleByMonthArr, thisMonth, prevMonths, now);
});

/* =========================
   Render - Singles (이번달 + 이전달들)
========================= */
function renderSinglesMonthStack(byMonthArr, thisMonth, prevMonths, now){
  const sec = document.getElementById("singleSection");

  // 이번달
  const arrThis = byMonthArr[thisMonth] || [];
  const totalMatchesThis = Math.round(arrThis.reduce((s,p)=>s+p.total,0)/2);
  const minGamesThis = minGamesSingleForMonth(thisMonth, now);

  const qualifiedThis = arrThis.filter(p=>p.total>=minGamesThis);
  const unqualifiedThis = arrThis.filter(p=>p.total<minGamesThis);

  // 이전달들(최근달이 맨 위)
  const prevHtml = prevMonths.map(mk=>{
    const arr = byMonthArr[mk] || [];
    const totalMatches = Math.round(arr.reduce((s,p)=>s+p.total,0)/2);
    const minGames = minGamesSingleForMonth(mk, now);

    const qualified = arr.filter(p=>p.total>=minGames);
    const unqualified = arr.filter(p=>p.total<minGames);

    return `
      <div class="monthCard">
        <div class="bar">📅 ${mk} 단식</div>
        <div class="inner">
          <table>
            <thead>
              <tr>
                <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th><th>승률</th>
              </tr>
            </thead>
            <tbody>
              ${(qualified.length===0 && unqualified.length===0) ? `
                <tr><td colspan="5" style="padding:14px;color:#64748b;">기록이 없습니다.</td></tr>
              ` : `
                ${qualified.map((p,i)=>`
                  <tr style="background:#e0f2fe">
                    <td>${i+1}</td>
                    <td>${p.name}(${playerLevels[p.name] ?? '-'})</td>
                    <td>${p.total}</td>
                    <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
                    <td>${formatNum(p.rate)}%</td>
                  </tr>`).join('')}
                ${unqualified.map(p=>`
                  <tr style="background:#f9fafb">
                    <td>–</td>
                    <td>${p.name}(${playerLevels[p.name] ?? '-'})</td>
                    <td>${p.total}</td>
                    <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
                    <td>${formatNum(p.rate)}%</td>
                  </tr>`).join('')}
              `}
            </tbody>
          </table>
          <div style="text-align:center;margin-top:10px;">
            <span class="totalNote">🔹 전체 경기 수: <b>${totalMatches} 경기</b></span>
          </div>
          <p class="ruleNote">⚖️ 기준: <b>3일에 1경기 이상 (${minGames}경기↑)</b> / 정렬: 승률 → 승수</p>
        </div>
      </div>
    `;
  }).join('');

  sec.innerHTML = `
    <h2 style="text-align:center;font-size:22px;color:#1e3a8a;margin:20px 0 14px;font-weight:800;">
      🏓 단식 리그 순위 (${thisMonth})
    </h2>
    <table>
      <thead>
        <tr>
          <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th><th>승률</th>
        </tr>
      </thead>
      <tbody>
        ${qualifiedThis.map((p,i)=>`
          <tr style="background:#e0f2fe">
            <td>${i+1}</td>
            <td>${p.name}(${playerLevels[p.name] ?? '-'})</td>
            <td>${p.total}</td>
            <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
            <td>${formatNum(p.rate)}%</td>
          </tr>`).join('')}
        ${unqualifiedThis.map(p=>`
          <tr style="background:#f9fafb">
            <td>–</td>
            <td>${p.name}(${playerLevels[p.name] ?? '-'})</td>
            <td>${p.total}</td>
            <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
            <td>${formatNum(p.rate)}%</td>
          </tr>`).join('')}
        ${(qualifiedThis.length===0 && unqualifiedThis.length===0) ? `
          <tr><td colspan="5" style="padding:14px;color:#64748b;">이번달 기록이 없습니다.</td></tr>
        ` : ``}
      </tbody>
    </table>
    <p class="totalNote">🔹 전체 경기 수: <b>${totalMatchesThis} 경기</b></p>
    <p class="ruleNote">⚖️ 순위 기준: <b>3일에 1경기 이상 (${minGamesThis}경기↑)</b> / 정렬: 승률 → 승수</p>

    <div class="prevWrap">
      <div class="prevTitle">이전달 성적 (최근달이 위)</div>
      ${prevHtml || `<div style="text-align:center;color:#64748b;">표시할 이전달 기록이 없습니다.</div>`}
    </div>
  `;
}

/* =========================
   Render - Doubles (이번달 + 이전달들)
========================= */
function renderDoublesMonthStack(byMonthArr, thisMonth, prevMonths, now){
  const sec = document.getElementById("doubleSection");

  const teamText = (teamStr) => {
    return teamStr.split(",").map(n=>{
      const name = n.trim();
      const lvl = (name && playerLevels[name] != null) ? playerLevels[name] : "-";
      return `${name}(${lvl})`;
    }).join(", ");
  };

  // 이번달
  const arrThis = byMonthArr[thisMonth] || [];
  const totalMatchesThis = Math.round(arrThis.reduce((s,p)=>s+p.total,0)/2);
  const minGamesThis = minGamesDoubleForMonth(thisMonth, now);

  const qualifiedThis = arrThis.filter(t => t.total >= minGamesThis);
  const unqualifiedThis = arrThis.filter(t => t.total < minGamesThis);

  // 이전달들(최근달이 맨 위)
  const prevHtml = prevMonths.map(mk=>{
    const arr = byMonthArr[mk] || [];
    const totalMatches = Math.round(arr.reduce((s,p)=>s+p.total,0)/2);
    const minGames = minGamesDoubleForMonth(mk, now);

    const qualified = arr.filter(t => t.total >= minGames);
    const unqualified = arr.filter(t => t.total < minGames);

    return `
      <div class="monthCard">
        <div class="bar">📅 ${mk} 복식</div>
        <div class="inner">
          <table>
            <thead>
              <tr>
                <th>순위</th><th>팀 구성(부수)</th><th>경기</th><th>승/패</th><th>승률</th><th>승점</th>
              </tr>
            </thead>
            <tbody>
              ${(qualified.length===0 && unqualified.length===0) ? `
                <tr><td colspan="6" style="padding:14px;color:#64748b;">기록이 없습니다.</td></tr>
              ` : `
                ${qualified.map((t,i)=>`
                  <tr style="background:#e0f2fe">
                    <td>${i+1}</td>
                    <td>${teamText(t.team)}</td>
                    <td>${t.total}</td>
                    <td><span class="win">${t.win}</span>/<span class="lose">${t.lose}</span></td>
                    <td>${formatNum(t.rate)}%</td>
                    <td>${t.points}</td>
                  </tr>`).join('')}
                ${unqualified.map(t=>`
                  <tr style="background:#f9fafb">
                    <td>–</td>
                    <td>${teamText(t.team)}</td>
                    <td>${t.total}</td>
                    <td><span class="win">${t.win}</span>/<span class="lose">${t.lose}</span></td>
                    <td>${formatNum(t.rate)}%</td>
                    <td>${t.points}</td>
                  </tr>`).join('')}
              `}
            </tbody>
          </table>
          <div style="text-align:center;margin-top:10px;">
            <span class="totalNote">🔹 전체 경기 수: <b>${totalMatches} 경기</b></span>
          </div>
          <p class="ruleNote">
            ⚖️ 기준: <b>7일에 1경기 이상 (${minGames}경기↑)</b> /
            정렬: 승점 → 승률 → 경기수 → 부수합(낮을수록↑)
          </p>
        </div>
      </div>
    `;
  }).join('');

  sec.innerHTML = `
    <h2 style="text-align:center;font-size:22px;color:#1e3a8a;margin:28px 0 14px;font-weight:800;">
      👥 복식 리그 순위 (${thisMonth})<br/>— 승점( 승리 +2 / 패배 −1 )
    </h2>
    <table>
      <thead>
        <tr>
          <th>순위</th><th>팀 구성(부수)</th><th>경기</th><th>승/패</th><th>승률</th><th>승점</th>
        </tr>
      </thead>
      <tbody>
        ${qualifiedThis.map((t,i)=>`
          <tr style="background:#e0f2fe">
            <td>${i+1}</td>
            <td>${teamText(t.team)}</td>
            <td>${t.total}</td>
            <td><span class="win">${t.win}</span>/<span class="lose">${t.lose}</span></td>
            <td>${formatNum(t.rate)}%</td>
            <td>${t.points}</td>
          </tr>`).join('')}
        ${unqualifiedThis.map(t=>`
          <tr style="background:#f9fafb">
            <td>–</td>
            <td>${teamText(t.team)}</td>
            <td>${t.total}</td>
            <td><span class="win">${t.win}</span>/<span class="lose">${t.lose}</span></td>
            <td>${formatNum(t.rate)}%</td>
            <td>${t.points}</td>
          </tr>`).join('')}
        ${(qualifiedThis.length===0 && unqualifiedThis.length===0) ? `
          <tr><td colspan="6" style="padding:14px;color:#64748b;">이번달 기록이 없습니다.</td></tr>
        ` : ``}
      </tbody>
    </table>
    <p class="totalNote">🔹 전체 경기 수: <b>${totalMatchesThis} 경기</b></p>
    <p class="ruleNote">
      ⚖️ 순위 기준: <b>7일에 1경기 이상 (${minGamesThis}경기↑)</b> /
      정렬: 승점 → 승률 → 경기수 → 부수합(낮을수록↑) /
      하늘색: 기준 충족
    </p>

    <div class="prevWrap">
      <div class="prevTitle">이전달 성적 (최근달이 위)</div>
      ${prevHtml || `<div style="text-align:center;color:#64748b;">표시할 이전달 기록이 없습니다.</div>`}
    </div>
  `;
}
</script>
</body>
</html>
