<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 단식 Elo 랭킹</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08); --card:#fff;
}
body{margin:0;font-family:"Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-weight:600;}
header{background:#fff;border-bottom:1px solid #e5e7eb;text-align:center;padding:14px 0;position:sticky;top:0;z-index:10;}
h1{margin:4px 0 10px;color:var(--accent);font-size:clamp(18px,4vw,24px);font-weight:700;}
.btn{border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;font-size:14px;background:#fff;cursor:pointer;font-weight:600;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
main{max-width:900px;margin:0 auto;padding:10px 10px 60px;}
table{width:100%;border-collapse:collapse;background:var(--card);box-shadow:var(--shadow);border-radius:12px;overflow:hidden;font-size:15px;}
thead th{background:#f1f5f9;border-bottom:1px solid #e2e8f0;padding:10px 6px;text-align:center;color:#334155;font-weight:700;}
tbody td{border-bottom:1px solid #f1f5f9;padding:10px 6px;text-align:center;}
tbody tr:hover{background:#f9fafb}
.win{color:var(--ok);font-weight:800;}
.lose{color:var(--danger);font-weight:800;}
.totalNote{text-align:center;margin-top:12px;font-size:17px;font-weight:800;color:#0d47a1;background:#e3f2fd;display:inline-block;padding:6px 14px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08);}
.ruleNote{text-align:center;font-size:14px;color:#475569;margin-top:8px;margin-bottom:20px;}
.prevWrap{margin-top:16px;display:flex;flex-direction:column;gap:16px;}
.prevTitle{text-align:center;font-size:16px;color:#334155;font-weight:900;margin:18px 0 10px;}
.monthCard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 6px 18px rgba(2,6,23,.06);overflow:hidden;}
.monthCard .bar{background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:10px 12px;font-weight:900;color:#1e3a8a;text-align:center;}
.monthCard .inner{padding:10px 10px 14px;}
@media(max-width:640px){
  table{font-size:13px;} thead th, tbody td{padding:7px 1px;}
  .totalNote{font-size:15px;padding:5px 10px;}
}

.helpBtn{
  border:0;
  background:#dbeafe;
  color:#1e40af;
  font-size:13px;
  font-weight:900;
  border-radius:999px;
  padding:5px 9px;
  cursor:pointer;
  vertical-align:middle;
  margin-left:6px;
}
.helpBox{
  display:none;
  background:#fff;
  border:1px solid #dbeafe;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(2,6,23,.08);
  padding:14px;
  margin:0 0 14px;
  color:#334155;
  font-size:14px;
  line-height:1.6;
}
.helpBox.show{display:block;}
.helpBox b{color:#1e3a8a;}
.helpBox ul{margin:8px 0 0 18px;padding:0;}

</style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:center;align-items:center;gap:8px;">
  <h1 id="pageHeader" style="margin:0;">🏆 단식 ELO 랭킹</h1>
  <button class="helpBtn" onclick="toggleHelp('eloHelp')">설명</button>
</div>
 <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
    <a href="index.html" class="btn primary">🏓 경기결과 입력</a>

    <a href="monthly-report.html" class="btn primary">통합 전적</a>

    <button class="btn primary" onclick="copyAIAnalysisData()">
        🤖 AI 분석자료
    </button>
</div>
</header>

<main>
  <section id="singleSection"></section>
</main>

<script type="module">
import { db } from "../firebase.js";
import { ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const SHOW_RECENT_MATCHES = 15;

const titleRef = ref(db, "config/title");
get(titleRef).then(snap=>{
  const title = snap.exists() ? snap.val() : "KOEN";
  document.getElementById("pageHeader").textContent = `🏆 ${title} 단식 ELO(엘로) 랭킹`;
});

let playerLevels = {};
let ratingsData = {};
let logsData = {};
let membersLoaded = false;

onValue(ref(db, "members"), (snap)=>{
  const data = snap.val() || {};
  const map = {};

  Object.values(data).forEach(p=>{
    if(!p || !p.name) return;
    map[p.name] = Number(p.bu ?? 5);
  });

  playerLevels = map;
  membersLoaded = true;
  renderEloPage();
});

onValue(ref(db, "eloRatings"), (snap)=>{
  ratingsData = snap.val() || {};
  renderEloPage();
});

onValue(ref(db, "eloLogs"), (snap)=>{
  logsData = snap.val() || {};
  renderEloPage();
});

function formatChange(n){
  if(n > 0) return `<span class="win">▲ +${n}</span>`;
  if(n < 0) return `<span class="lose">▼ ${n}</span>`;
  return `<span style="color:#64748b;">0</span>`;
}

function rankIcon(i){
  if(i === 0) return "🥇";
  if(i === 1) return "🥈";
  if(i === 2) return "🥉";
  return i + 1;
}

function monthKeyOf(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

window.toggleHelp = function(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.toggle("show");
};

function getThisMonthChange(name, currentElo){
  const thisMonth = monthKeyOf(new Date());

  const monthLogs = Object.values(logsData)
    .filter(l => l && l.monthKey === thisMonth)
    .filter(l => l.pA === name || l.pB === name)
    .sort((a,b)=>Number(a.createdAt || 0) - Number(b.createdAt || 0));

  if(monthLogs.length === 0) return 0;

  const first = monthLogs[0];
  const startElo = first.pA === name ? Number(first.beforeA) : Number(first.beforeB);

  return Math.round(currentElo - startElo);
}

window.copyAIAnalysisData = async function(){

    alert("AI 분석자료 생성 기능은 다음 업그레이드에서 구현됩니다.");

}

function initialEloByBu(bu){
  const n = Number(bu);
  if (!Number.isFinite(n)) return 1500;
  return 2000 - (n * 100);
}

function renderEloPage(){
  if(!membersLoaded) return;

  const arr = Object.values(ratingsData)
    .filter(r => r && r.name)
    .filter(r => playerLevels[r.name] !== undefined)
    .filter(r => Number(r.games || 0) > 0)
    .map(r=>{
      const current = Math.round(Number(r.elo || 0));
      return {
  name: r.name,
  bu: playerLevels[r.name] ?? "-",
  initialElo: initialEloByBu(playerLevels[r.name] ?? 5),
  elo: current,
  change: getThisMonthChange(r.name, current),
  games: Number(r.games || 0),
  win: Number(r.wins || 0),
  lose: Number(r.losses || 0)
};
    })
    .sort((a,b)=> b.elo - a.elo || b.games - a.games || a.name.localeCompare(b.name, "ko"));

  const recent = Object.values(logsData)
    .filter(l => l && l.mode === "single")
    .sort((a,b)=> Number(a.createdAt || 0) - Number(b.createdAt || 0));

  renderTable(arr, recent.length, recent);
}

function renderTable(arr, totalSingleMatches, recent){
  const sec = document.getElementById("singleSection");

  const recentRows = recent
    .slice(-SHOW_RECENT_MATCHES)
    .reverse()
    .map(r=>`
      <tr>
        <td>${r.winner}</td>
        <td><span class="win">+${r.winnerChange}</span></td>
        <td>${r.loser}</td>
        <td><span class="lose">${r.loserChange}</span></td>
      </tr>
    `).join("");

  sec.innerHTML = `
    

    <div id="eloHelp" class="helpBox">
     <b>🏆 단식 ELO 랭킹이란?</b>
<ul>
  <li><b>ELO(엘로)</b>는 체스, 탁구, 바둑, e스포츠 등 세계적으로 사용되는 실력 평가 시스템으로, 경기 결과를 통해 선수의 현재 실력을 점수로 나타냅니다.</li>

  <li>점수가 높을수록 현재 실력이 높은 선수이며, 순위는 현재 ELO 점수 순으로 결정됩니다.</li>

  <li>승리하면 점수가 오르고, 패배하면 점수가 내려갑니다.</li>

  <li>강한 선수를 이기면 점수가 크게 오르고, 약한 선수에게 지면 점수가 크게 내려갑니다.</li>

  <li>초기 ELO는 부수별로 <b>1부 1900점부터 14부 600점까지 100점 간격</b>으로 시작합니다.</li>

  <li>부수 차이에 따라 실제 경기에서 <b>1부수당 1점 핸디</b>를 주는 경우, ELO 계산에서도 <b>1부수당 30점</b>을 반영하여 기대승률을 보정합니다.</li>

  <li>신규 선수와 <b>10경기 미만 선수</b>는 실제 실력을 빠르게 반영하기 위해 점수 변동폭이 조금 더 크게 적용됩니다.</li>

  <li>부수가 변경되어도 <b>현재 ELO는 그대로 유지</b>되며, 이후 경기부터 새로운 부수를 기준으로 계산됩니다.</li>

  <li>0경기 선수와 탈퇴 선수는 랭킹에서 제외됩니다.</li>

  <li><b>이번달 변화</b>는 이번 달 첫 경기 직전 ELO와 현재 ELO의 차이를 의미하며, ▲는 상승, ▼는 하락을 나타냅니다.</li>

  <li>💡 <b>예시</b><br>
      5부 선수(초기 1500점)가 3부 선수(초기 1700점)를 이기면 큰 폭으로 점수가 상승합니다.<br>
      반대로 3부 선수가 5부 선수에게 지면 큰 폭으로 점수가 하락합니다.<br>
      <b>실제 변동폭은 현재 ELO, 경기 수, 부수 차이에 따라 달라집니다.</b>
  </li>
</ul>
    </div>

    <table>
      <thead>
        <tr>
         <th>순위</th>
<th>이름(부수)</th>
<th>초기 ELO</th>
<th>현재 ELO</th>
<th>이번달 변화</th>
<th>경기</th>
        </tr>
      </thead>
      <tbody>
        ${arr.length === 0 ? `
          <tr><td colspan="5" style="padding:14px;color:#64748b;">선수 기록이 없습니다.</td></tr>
        ` : arr.map((p,i)=>`
          <tr style="${i < 3 ? 'background:#e0f2fe' : 'background:#f9fafb'}">
            <td>${rankIcon(i)}</td>
<td>${p.name}(${p.bu})</td>
<td style="color:#64748b;">${p.initialElo}</td>
<td><b>${p.elo}</b></td>
<td>${formatChange(p.change)}</td>
<td>${p.games}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>

    <div style="text-align:center;">
      <span class="totalNote">🔹 단식 Elo 반영 경기 수: <b>${totalSingleMatches} 경기</b></span>
    </div>

    
    <div class="prevWrap">
      <div class="prevTitle">
        최근 Elo 변동
        <button class="helpBtn" onclick="toggleHelp('recentHelp')">설명</button>
      </div>

      <div id="recentHelp" class="helpBox">
        <b>📈 최근 15경기 ELO 변동이란?</b>
        <ul>
          <li>가장 최근에 저장된 단식 경기 15개의 점수 변화를 보여줍니다.</li>
          <li>승자는 보통 점수가 오르고, 패자는 점수가 내려갑니다.</li>
          <li>상대보다 약한 선수가 이기면 더 큰 점수를 얻습니다.</li>
          <li>상대보다 강한 선수가 이기면 점수는 조금만 오릅니다.</li>
          <li>이 표는 최근 경기 흐름을 빠르게 확인하기 위한 참고용입니다.</li>
        </ul>
      </div>

      <div class="monthCard">
        <div class="bar">📈 최근 ${SHOW_RECENT_MATCHES}경기</div>
        <div class="inner">
          <table>
            <thead>
              <tr>
                <th>승자</th>
                <th>변동</th>
                <th>패자</th>
                <th>변동</th>
              </tr>
            </thead>
            <tbody>
              ${recentRows || `<tr><td colspan="4" style="padding:14px;color:#64748b;">최근 단식 경기가 없습니다.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
