<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏓 월간 탁구리그 리포트</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08); --card:#fff;
}
body{
  margin:0;
  font-family:"Pretendard","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink); font-weight:600;
}
header{
  background:#fff; border-bottom:1px solid #e5e7eb;
  text-align:center; padding:14px 0; position:sticky; top:0; z-index:10;
}
h1{margin:4px 0 10px; color:var(--accent); font-size:clamp(18px,4vw,24px); font-weight:700;}
.btn{border:1px solid #d1d5db; border-radius:8px; padding:6px 10px; font-size:14px;
  background:#fff; cursor:pointer; font-weight:600; transition:.15s;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.row{display:flex;justify-content:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
main{max-width:900px;margin:0 auto;padding:10px 10px 60px;}
table{width:100%;border-collapse:collapse;background:var(--card);box-shadow:var(--shadow);
  border-radius:12px;overflow:hidden;font-size:15px;}
thead th{background:#f1f5f9;border-bottom:1px solid #e2e8f0;padding:10px 6px;
  text-align:center;color:#334155;font-weight:700;white-space:nowrap;}
tbody td{border-bottom:1px solid #f1f5f9;padding:10px 6px;text-align:center;}
tbody tr:hover{background:#f9fafb}
.win { color:#dc2626; font-weight:700; }
.lose { color:#2563eb; font-weight:700; }
.delta{font-weight:700;}
.delta.up { color:#dc2626; }
.delta.down { color:#2563eb; }

.summary{
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}
.card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);
  padding:18px 20px;display:flex;flex-direction:column;gap:8px;}
.card h3{margin:0 0 6px;font-size:18px;color:var(--accent);}
.card ul{margin:0;padding-left:22px;font-size:16px;line-height:1.5;}
.card li{margin:3px 0;}
.total{grid-column:1 / -1;text-align:center;font-size:19px;font-weight:700;
  color:var(--ink);background:#e8f0ff;border-radius:12px;padding:12px;}

@media(max-width:640px){
  table{font-size:13px;} thead th, tbody td{padding:7px 1px;}
  .card ul{font-size:15px;}
}
.btn.ok { background:#0d9488; color:#fff; border-color:#0d9488; }
.btn.ok:hover { background:#0f766e; }
</style>
</head>

<body>
<header>
  <h1 id="pageHeader">🏓 월간 탁구리그 리포트</h1>
  <div class="row">
    <button id="adminBtn" class="btn">⚙ 관리자모드</button>
    <a href="index.html" class="btn primary">경기결과 입력</a>
    <a href="monthly-report2.html" class="btn primary">단/복식 전적</a>
  </div>
</header>

<main>
  <table>
    <thead>
      <tr>
        <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th>
        <th>이전<br>승률</th><th>이달<br>승률</th><th>증감</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="summary" class="summary"></div>
</main>

<script type="module">
import { db } from "../firebase.js";
import { ref, get, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

/* =========================
   기본 설정
========================= */
const titleRef = ref(db, "config/title");
get(titleRef).then(snap=>{
  const title = snap.exists()?snap.val():"우리회사";
  document.getElementById("pageHeader").textContent = `🏓 ${title} 월간 통합리그`;
});

const matchRef = ref(db, "matches");
const playerRef = ref(db, "members");

let players = {};
let cleanedOldMatches = false;
let autoClosed = false;

onValue(playerRef, snap=>{ players = snap.val() || {}; });

function formatNum(n){ return (Math.round(n*10)/10).toFixed(1); }
const pad2 = (n)=>String(n).padStart(2,"0");
function monthKeyFromDate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }

// ✅ 올해 1월 ~ 지난달까지 monthKey를 "최신이 위"로 (예: 3월이면 2월,1월 / 4월이면 3월,2월,1월)
function monthsFromJanToPrevLatestFirst(now){
  const y = now.getFullYear();
  const thisM = now.getMonth()+1; // 1~12
  const last = thisM - 1;         // 지난달(0이면 없음)
  const arr = [];
  for(let m=last; m>=1; m--){
    arr.push(`${y}-${pad2(m)}`);
  }
  return arr;
}

/* =========================
   지난달 자동 마감(클라이언트 기반)
   - 누군가 이 페이지를 열면 지난달 리포트가 없을 때 생성
   - (완전 자동 00:01은 Netlify Scheduled Function 등 필요)
========================= */
async function autoClosePreviousMonth() {
  const now = new Date();
  const prevDate2 = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const prevMonth = monthKeyFromDate(prevDate2);

  const reportRef = ref(db, `monthlyReports/${prevMonth}/players`);
  const existing = await get(reportRef);
  if (existing.exists()) {
    console.log(`ℹ️ ${prevMonth} 월 리포트 이미 존재`);
    return;
  }

  console.log(`📦 ${prevMonth} 월 리포트 생성 시작...`);

  const matchSnap = await get(ref(db, 'matches'));
  const matchData = matchSnap.val() || {};
  const playerSnap = await get(ref(db, 'members'));
  const playerData = playerSnap.val() || {};

  const stats = {};
  Object.values(matchData).forEach(m => {
    if (m.monthKey !== prevMonth) return;

    const names = [...(m.namesA || []), ...(m.namesB || [])];
    names.forEach(n => { if (!stats[n]) stats[n] = { win: 0, lose: 0 }; });

    if (m.winnerSide === 'A') {
      (m.namesA || []).forEach(n => stats[n].win++);
      (m.namesB || []).forEach(n => stats[n].lose++);
    } else if (m.winnerSide === 'B') {
      (m.namesB || []).forEach(n => stats[n].win++);
      (m.namesA || []).forEach(n => stats[n].lose++);
    }
  });

  const reportArr = Object.entries(playerData).map(([id, p]) => {
    const d = stats[p.name] || { win: 0, lose: 0 };
    const total = d.win + d.lose;
    const rate = total ? (d.win / total * 100) : 0;
    return { name: p.name, level: Number(p.bu ?? 99), total, win: d.win, lose: d.lose, rate };
  }).filter(p => p.total > 0);

  if (reportArr.length === 0) {
    console.log(`⚠️ ${prevMonth} 월 경기 없음 — 마감 스킵`);
    return;
  }

  const reportObj = {};
  reportArr.forEach(p => {
    const safeKey = String(p.name).replace(/[.#$\[\]\/]/g, "_");
    reportObj[safeKey] = p;
  });

  await set(reportRef, reportObj);
  console.log(`✅ ${prevMonth} 월 리포트 생성 완료`);
}

/* =========================
   메인 로직
========================= */
onValue(matchRef, async (snap)=>{
  if (!autoClosed) {
    autoClosed = true;
    await autoClosePreviousMonth();
  }

  const data = snap.val() || {};
  const now = new Date();
  const thisMonth = monthKeyFromDate(new Date(now.getFullYear(), now.getMonth(), 1));
  const prevMonth = monthKeyFromDate(new Date(now.getFullYear(), now.getMonth()-1, 1));

  // 2개월 이전 삭제(1회만)
  const twoMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 2, 1);
  const oldMonth = monthKeyFromDate(twoMonthsAgo);

  if (!cleanedOldMatches) {
    cleanedOldMatches = true;
    Object.entries(data).forEach(([id, m]) => {
      if (m.monthKey && m.monthKey <= oldMonth) {
        remove(ref(db, `matches/${id}`));
      }
    });
  }

  // 이번달 통계
  const stats = {};
  Object.values(data).forEach(m=>{
    if(m.monthKey !== thisMonth) return;
    const names = [...(m.namesA||[]), ...(m.namesB||[])];
    names.forEach(n=>{ if(!stats[n]) stats[n]={win:0,lose:0}; });
    if(m.winnerSide==='A'){
      (m.namesA||[]).forEach(n=>stats[n].win++);
      (m.namesB||[]).forEach(n=>stats[n].lose++);
    }else if(m.winnerSide==='B'){
      (m.namesB||[]).forEach(n=>stats[n].win++);
      (m.namesA||[]).forEach(n=>stats[n].lose++);
    }
  });

  const curArr = Object.entries(players).map(([id,p])=>{
    const d = stats[p.name] || {win:0,lose:0};
    const total = d.win + d.lose;
    const rate = total ? (d.win/total*100) : 0;
    return {name:p.name, level:Number(p.bu ?? 99), total, win:d.win, lose:d.lose, rate};
  }).filter(p=>p.total>0).sort((a,b)=>b.rate-a.rate||b.total-a.total||a.level-b.level);

  // ✅ 하단에 보여줄 "이전달들" 로드 (올해 1월~지난달, 최신이 위)
  const monthsToShow = monthsFromJanToPrevLatestFirst(now);

  const monthsReports = []; // [{month, arr, map}, ...] 최신이 위
  let prevArr = [];
  let prevMap = {};

  for (const mk of monthsToShow) {
    const snapM = await get(ref(db, `monthlyReports/${mk}/players`));
    if(!snapM.exists()) continue;

    const arr = [];
    const map = {};
    Object.values(snapM.val()).forEach(p=>{
      const win = p.win ?? p.wins ?? 0;
      const lose = p.lose ?? p.losses ?? 0;
      const rate = p.rate ?? p.winRate ?? 0;
      const total = p.total ?? (win + lose);
      arr.push({ name: p.name, level: p.level, win, lose, total, rate });
      map[p.name] = rate;
    });

    monthsReports.push({ month: mk, arr, map });

    // ✅ 증감/요약은 "직전달(지난달)" 기준으로
    if (mk === prevMonth) {
      prevArr = arr;
      prevMap = map;
    }
  }

  const curAug = curArr.map(p=>{
    const prev = (prevMap[p.name] ?? null);
    const delta = (prev===null)?null:(p.rate - prev);
    return {...p, prev, delta};
  });

  render(curAug, thisMonth, monthsReports);
  summary(curAug, prevArr, prevMap);
});

/* =========================
   render
========================= */
function render(curArr, thisMonth, monthsReports) {
  const main = document.querySelector('main');
  const summaryBox = document.querySelector('#summary');

  main.innerHTML = `
    <h2 style="text-align:center;font-size:22px;color:#1e3a8a;margin:20px 0 14px;font-weight:800;">
      🏓 이달의 통합전적 (${thisMonth})
    </h2>
    <table id="tableCurrent">
      <thead>
        <tr>
          <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th>
          <th>이전<br>승률</th><th>이달<br>승률</th><th>증감</th>
        </tr>
      </thead>
      <tbody id="tbodyCurrent"></tbody>
    </table>
  `;
  main.appendChild(summaryBox);

  // ✅ 이달 순위 반영 기준: 2일에 1경기 이상(오늘 날짜 기반)
  const today = new Date();
  const day = today.getDate();
  let minGames = Math.ceil(day / 2);

  const qualified = curArr
    .filter(p => p.total >= minGames)
    .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

  const unqualified = curArr
    .filter(p => p.total < minGames)
    .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

  const tbody = document.querySelector('#tbodyCurrent');

  qualified.forEach((p, i) => {
    const cls = p.delta > 0 ? 'up' : p.delta < 0 ? 'down' : '';
    const sign = p.delta > 0 ? '▲' : p.delta < 0 ? '▼' : '–';
    const prevText = p.prev !== null ? `${formatNum(p.prev)}%` : '–';
    const deltaText = p.prev !== null ? `${sign} ${formatNum(Math.abs(p.delta))}%p` : '–';

    tbody.insertAdjacentHTML('beforeend', `
      <tr style="background:#e0f2fe;">
        <td>${i + 1}</td>
        <td>
          <a href="player.html?name=${encodeURIComponent(p.name)}"
             style="color:#2563eb; font-weight:700; text-decoration:none;">
            ${p.name}(${p.level})
          </a>
        </td>
        <td>${p.total}</td>
        <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
        <td>${prevText}</td>
        <td>${formatNum(p.rate)}%</td>
        <td class="delta ${cls}">${deltaText}</td>
      </tr>
    `);
  });

  unqualified.forEach(p => {
    const cls = p.delta > 0 ? 'up' : p.delta < 0 ? 'down' : '';
    const sign = p.delta > 0 ? '▲' : p.delta < 0 ? '▼' : '–';
    const prevText = p.prev !== null ? `${formatNum(p.prev)}%` : '–';
    const deltaText = p.prev !== null ? `${sign} ${formatNum(Math.abs(p.delta))}%p` : '–';

    tbody.insertAdjacentHTML('beforeend', `
      <tr style="background:#f9fafb;">
        <td>–</td>
        <td>
          <a href="player.html?name=${encodeURIComponent(p.name)}"
             style="color:#2563eb; font-weight:700; text-decoration:none;">
            ${p.name}(${p.level})
          </a>
        </td>
        <td>${p.total}</td>
        <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
        <td>${prevText}</td>
        <td>${formatNum(p.rate)}%</td>
        <td class="delta ${cls}">${deltaText}</td>
      </tr>
    `);
  });

  document.querySelector('#tableCurrent').insertAdjacentHTML('afterend', `
    <p id="ruleNote" style="
      text-align:center;color:#475569;font-size:12.5px;
      margin-top:6px;margin-bottom:14px;font-weight:500;">
      ⚠️ 순위 반영 기준: <b>2일에 1경기 이상 (오늘 기준 최소 ${minGames}경기)</b>
    </p>
  `);

  // ✅ 이전달들(올해 1월~지난달) 표를 "최신이 위"로 전부 출력
  if (monthsReports.length) {
    main.insertAdjacentHTML('beforeend', `
      <h2 style="text-align:center;font-size:21px;color:#334155;margin:30px 0 8px;
      border-top:2px solid #e2e8f0;padding-top:14px;">
        📚 이전 달 전적 (올해 1월 ~ 지난달)
      </h2>
    `);

    monthsReports.forEach(({month, arr}, idx) => {
      main.insertAdjacentHTML('beforeend', `
        <h3 style="text-align:center;font-size:18px;color:#334155;margin:18px 0 8px;">
          ${month} 전적
        </h3>
        <table class="tablePrev">
          <thead>
            <tr>
              <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th><th>승률</th>
            </tr>
          </thead>
          <tbody class="tbodyPrev"></tbody>
        </table>
      `);

      const tbs = main.querySelectorAll('.tbodyPrev');
      const tb = tbs[tbs.length - 1];

      const qualifiedPrev = arr
        .filter(p => p.total >= 15)
        .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

      const unqualifiedPrev = arr
        .filter(p => p.total < 15)
        .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

      qualifiedPrev.forEach((p, i) => {
        tb.insertAdjacentHTML('beforeend', `
          <tr style="background:#e0f2fe;">
            <td>${i + 1}</td>
            <td>
              <a href="player.html?name=${encodeURIComponent(p.name)}"
                 style="color:#2563eb; font-weight:700; text-decoration:none;">
                ${p.name}
              </a>
            </td>
            <td>${p.total}</td>
            <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
            <td>${formatNum(p.rate)}%</td>
          </tr>
        `);
      });

      unqualifiedPrev.forEach(p => {
        tb.insertAdjacentHTML('beforeend', `
          <tr style="background:#f9fafb;">
            <td>–</td>
            <td>
              <a href="player.html?name=${encodeURIComponent(p.name)}"
                 style="color:#2563eb; font-weight:700; text-decoration:none;">
                ${p.name}
              </a>
            </td>
            <td>${p.total}</td>
            <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
            <td>${formatNum(p.rate)}%</td>
          </tr>
        `);
      });

      const totalPrevMatches = Math.round(arr.reduce((sum, p) => sum + (p.total || 0), 0) / 2);
      main.insertAdjacentHTML('beforeend', `
        <p style="text-align:center;margin-top:8px;font-size:13px;color:#1e3a8a;font-weight:600;">
          🔹 ${month} 총 경기 수: <b>${totalPrevMatches} 경기</b>
        </p>
        <p style="text-align:center;color:#475569;font-size:12.5px;margin-top:4px;margin-bottom:14px;font-weight:500;">
          ⚠️ ${month} 순위 반영 기준: <b>15경기 이상</b>
        </p>
      `);
    });
  }
}

/* =========================
   summary (직전달 기준)
========================= */
function summary(arr, prevArr, prevMap){
  const box = document.querySelector('#summary');
  const totalMatches = Math.round(arr.reduce((s,p)=>s+(p.total||0),0)/2);

  const topPlay = arr.slice().sort((a,b)=>b.total-a.total).slice(0,3);
  const topWin  = arr.slice().sort((a,b)=>b.win-a.win).slice(0,3);

  // ✅ 직전달(prevArr/prevMap) 기준: 전달/이번달 각각 15경기 이상 & 승률 상승자
  const topDelta = arr.filter(p=>{
    const prevData = prevArr.find(x=>x.name===p.name);
    const prevTotal = prevData ? (prevData.total||0) : 0;
    return (p.delta > 0 && p.prev !== null && prevTotal >= 15 && p.total >= 15);
  }).sort((a,b)=>b.delta-a.delta).slice(0,3);

  // ✅ 직전달 기준: 70% 이상 2달 연속 & 15경기 이상 2달 연속
  const promote = arr.filter(p=>{
    const prev = prevMap[p.name];
    const prevData = prevArr.find(x=>x.name===p.name);
    const prevTotal = prevData ? (prevData.total||0) : 0;
    return (p.rate>=70 && p.total>=15 && prev!==undefined && prev>=70 && prevTotal>=15);
  }).slice(0,5);

  box.innerHTML = `
    <div class="total">총 경기 수: ${totalMatches} 경기</div>
    <div class="card"><h3>🎮 최다경기 TOP3</h3>
      <ul>${topPlay.map(p=>`<li>${p.name} (${p.total}경기)</li>`).join('')}</ul>
    </div>
    <div class="card"><h3>🏆 다승 TOP3</h3>
      <ul>${topWin.map(p=>`<li>${p.name} (${p.win}승)</li>`).join('')}</ul>
    </div>
    <div class="card"><h3>📈 기량상승 TOP3</h3>
      <ul>${topDelta.length ? topDelta.map(p=>`<li>${p.name} (+${formatNum(p.delta)}%p)</li>`).join('') : '<li>없음</li>'}</ul>
      <p style="margin:6px 0 0;font-size:14px;color:#475569;">(직전달·이번달 각각 15경기 이상 / 이번달 승률 상승자만)</p>
    </div>
    <div class="card"><h3>🚀 부수상향 권고</h3>
      <ul>${promote.length ? promote.map(p=>`<li>${p.name} (${formatNum(p.rate)}%)</li>`).join('') : '<li>없음</li>'}</ul>
      <p style="margin:6px 0 0;font-size:14px;color:#475569;">(직전달·이번달 각각 70% 이상 / 15경기 이상 두 달 연속 달성자)</p>
    </div>
  `;
}

/* =========================
   관리자모드
========================= */
document.getElementById("adminBtn").addEventListener("click", async ()=>{
  const pwRef = ref(db,"config/adminPassword");
  const snap = await get(pwRef);
  const saved = snap.exists()?snap.val():"1234";
  const input = prompt("관리자 비밀번호를 입력하세요.");
  if(!input) return;
  if(input !== saved) return alert("비밀번호가 올바르지 않습니다.");
  window.location.href = "admin.html";
});
</script>
</body>
</html>
