<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KOEN 탁구 사이트 이전 안내</title>

  <style>
    body{
      font-family:system-ui,Segoe UI,sans-serif;
      background:#f5f7fb;
      margin:0;
      padding:24px;
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
    }

    .card{
      max-width:520px;
      background:#fff;
      border:1px solid #e6e8ef;
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 28px rgba(0,0,0,.08);
      text-align:center;
    }

    h1{
      margin:0 0 12px;
      font-size:20px;
    }

    p{
      margin:8px 0;
      color:#334155;
      line-height:1.6;
    }

    .url{
      background:#f1f5f9;
      border-radius:10px;
      padding:12px;
      margin:14px 0;
      word-break:break-all;
      font-weight:bold;
    }

    .notice{
      background:#fff7ed;
      border:1px solid #fed7aa;
      border-radius:10px;
      padding:12px;
      margin-top:12px;
      color:#9a3412;
      font-weight:600;
    }

    a{
      display:inline-block;
      margin-top:18px;
      padding:12px 16px;
      border-radius:12px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      font-weight:700;
      transition:0.15s;
    }

    a:hover{
      background:#1e40af;
    }

    small{
      display:block;
      margin-top:12px;
      color:#64748b;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>📢 KOEN 탁구 사이트가 새롭게 통합되었습니다</h1>

    <p>
      기존 사이트는 <strong>2주 후 폐쇄 예정</strong>이며,<br>
      앞으로는 아래 새 사이트를 이용해 주세요.
    </p>

    <div class="url">
      https://sensational-tulumba-65e97e.netlify.app/pingpong_main/
    </div>

    <div class="notice">
      ⚠️ 2주 후 예전 사이트는 완전히 종료되며<br>
      새 사이트로만 접속 가능합니다.
    </div>

    <a href="/pingpong_main/">👉 새 사이트로 이동하기</a>

    <small>
      즐겨찾기(북마크)를 새 주소로 변경해 주세요.
    </small>
  </div>
</body>
</html>
