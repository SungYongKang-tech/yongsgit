<!DOCTYPE html>
<html lang="ko">
<body>
  <div class="container">
    <h2>전기차 충전 할인 계산기</h2>

    <input type="number" id="amount" placeholder="충전금액 입력 (₩)" />
    <button id="saveBtn" class="btn blue">저장</button>

    <div class="description">
      환경부카드는 월 최대 <b>30,000원</b>까지 할인됩니다.<br/>
      아래 카드에서 충전 내역을 확인하세요.
    </div>

    <div class="card-list"></div>
  </div>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: "Noto Sans KR", sans-serif;
      background: #eaf7ff;
      font-size: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #01579b;
      font-size: 5rem;
    }

    #amount {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #aaa;
      font-size: 3rem;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    .btn {
      padding: 16px;
      font-size: 3rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .btn.blue {
      background: #0288d1;
      color: white;
      width: 100%;
      margin-top: 10px;
      padding: 18px;
      font-size: 3rem;
      border-radius: 12px;
    }

    .description {
      text-align: center;
      margin: 20px 0;
      font-size: 2.7rem;
      color: #37474f;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }

    .card-date {
      font-size: 3rem;
      font-weight: 700;
      color: #0277bd;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 3rem;
    }

    .row label {
      font-weight: 700;
      color: #01579b;
    }

    .card-delete {
      margin-top: 18px;
      text-align: center;
      background: #ef5350;
      color: white;
      padding: 18px;
      font-size: 3rem;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getDatabase, ref, push, onValue, remove
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmVXt2ze1iJmmA_YI-sgH3tJmSvZomkOo",
      authDomain: "ionic6-3b7b2.firebaseapp.com",
      databaseURL: "https://ionic6-3b7b2-default-rtdb.firebaseio.com",
      projectId: "ionic6-3b7b2",
      storageBucket: "ionic6-3b7b2.appspot.com",
      messagingSenderId: "306251113324",
      appId: "1:306251113324:web:0559f88d362de423c18949"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const MAX_DISCOUNT = 30000;
    const RATE = 0.7;
    const PRICE_KWH = 341;
    const BATTERY = 77.4;

    const amountInput = document.getElementById("amount");
    const saveBtn = document.getElementById("saveBtn");
    const cardList = document.querySelector(".card-list");

    const currentMonth = new Date().toISOString().substring(0, 7);
    let totalDiscount = 0;

    startApp();

    function startApp() {
      const logRef = ref(db, `chargingLogs/${currentMonth}`);

      onValue(logRef, snap => {
        const data = snap.val();
        totalDiscount = 0;

        if (data) {
          Object.values(data).forEach(v => {
            totalDiscount += Number(v.discount || 0);
          });
        }

        renderCards(data);
      });
    }

    saveBtn.onclick = () => {
      const amount = Number(amountInput.value);

      if (!amount || amount <= 0) {
        alert("충전금액을 입력하세요.");
        return;
      }

      const timestamp = new Date().toISOString();
      const remainCap = Math.max(0, MAX_DISCOUNT - totalDiscount);
      const discount = Math.min(amount * RATE, remainCap);
      const remaining = Math.max(0, MAX_DISCOUNT - (totalDiscount + discount));

      const moreCharge = remaining / RATE;
      const moreKwh = moreCharge / PRICE_KWH;
      const pct = (moreKwh / BATTERY) * 100;

      const log = {
        timestamp,
        amount: Math.round(amount),
        discount: Math.round(discount),
        remaining: Math.round(remaining),
        moreCharge: Math.round(moreCharge),
        moreKwh: Number(moreKwh.toFixed(2)),
        batteryPercent: Number(pct.toFixed(1))
      };

      push(ref(db, `chargingLogs/${currentMonth}`), log);
      amountInput.value = "";
    };

    function renderCards(data) {
      cardList.innerHTML = "";

      const entries = Object.entries(data || {})
        .sort((a, b) => new Date(b[1].timestamp) - new Date(a[1].timestamp));

      entries.forEach(([key, log]) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div class="card-date">📅 ${log.timestamp.substring(5, 10)}</div>

          <div class="row"><label>💰 충전금액</label><span>${log.amount.toLocaleString()}원</span></div>
          <div class="row"><label>💸 할인적용</label><span>${log.discount.toLocaleString()}원</span></div>
          <div class="row"><label>🏦 남은 할인</label><span>${log.remaining.toLocaleString()}원</span></div>

          <hr style="margin:18px 0; border:none; border-top:2px solid #ddd;">

          <div class="row"><label>⚡ 추가충전 금액</label><span>${log.moreCharge.toLocaleString()}원</span></div>
          <div class="row"><label>🔋 추가 kWh</label><span>${log.moreKwh} kWh</span></div>
          <div class="row"><label>📈 충전 가능%</label><span>${log.batteryPercent}%</span></div>

          <div class="card-delete" data-key="${key}">삭제</div>
        `;

        cardList.appendChild(div);
      });

      document.querySelectorAll(".card-delete").forEach(btn => {
        btn.onclick = () => {
          remove(ref(db, `chargingLogs/${currentMonth}/${btn.dataset.key}`));
        };
      });
    }
  </script>
</body>
</html>
