<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건배사 추천</title>

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#2563eb;
      --accent-soft:#dbeafe;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --red:#ef4444;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f7fbff 0%, var(--bg) 100%);
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:18px 14px 30px;
    }

    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:28px;
      line-height:1.2;
    }

    .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .toolbar{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .search{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .search:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
    }

    .btn{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    .btn.primary{
      background:var(--accent);
      color:#fff;
    }

    .filters{
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:2px;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }

    .filters::-webkit-scrollbar{
      display:none;
    }

    .chip{
      white-space:nowrap;
      background:#fff;
      border:1px solid var(--line);
      color:#374151;
    }

    .chip.active{
      background:var(--accent-soft);
      color:#1d4ed8;
      border-color:#bfdbfe;
    }

    .result{
      color:var(--muted);
      font-size:14px;
      margin:12px 2px 8px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:190px;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .card:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 34px rgba(0,0,0,.10);
    }

    .word{
      font-size:28px;
      font-weight:900;
      letter-spacing:-0.03em;
      line-height:1.15;
      word-break:keep-all;
    }

    .phrase{
      font-size:16px;
      line-height:1.55;
      word-break:keep-all;
      flex:1;
      color:#1f2937;
    }

    .meta{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .tag{
      font-size:12px;
      color:#4b5563;
      background:#f3f4f6;
      padding:6px 9px;
      border-radius:999px;
    }

    .empty{
      grid-column:1 / -1;
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:18px;
      padding:30px 20px;
      text-align:center;
      color:var(--muted);
    }

    .footer-note{
      margin-top:16px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      text-align:center;
    }

    /* viewer */
    .viewer{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top, rgba(59,130,246,.20), transparent 35%),
        linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color:#fff;
      display:none;
      z-index:999;
    }

    .viewer.show{
      display:flex;
    }

    .viewer-inner{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px 16px 90px;
      gap:24px;
    }

    .viewer-word{
      font-size:clamp(68px, 20vw, 150px);
      font-weight:900;
      line-height:1.02;
      letter-spacing:-0.05em;
      word-break:keep-all;
      text-shadow:0 6px 20px rgba(0,0,0,.35);
    }

    .viewer-phrase{
      max-width:980px;
      font-size:clamp(28px, 8vw, 58px);
      line-height:1.5;
      font-weight:800;
      text-shadow:0 4px 14px rgba(0,0,0,.28);
      word-break:keep-all;
      white-space:pre-wrap;
    }

    .viewer-initial{
      color:var(--red);
      font-weight:900;
    }

    .viewer-rest{
      color:#fff;
    }

    .viewer-actions{
      position:absolute;
      top:14px;
      right:14px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      max-width:calc(100% - 28px);
    }

    .viewer-btn{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(8px);
    }

    .viewer-bottom{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      width:calc(100% - 24px);
    }

    .viewer-hint{
      position:absolute;
      left:50%;
      bottom:78px;
      transform:translateX(-50%);
      color:rgba(255,255,255,.70);
      font-size:13px;
      text-align:center;
      width:calc(100% - 24px);
    }

    @media (max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }

      h1{
        font-size:24px;
      }

      .word{
        font-size:30px;
      }

      .phrase{
        font-size:17px;
      }

      .viewer-inner{
        padding:18px 12px 96px;
        gap:20px;
      }

      .viewer-word{
        font-size:clamp(76px, 24vw, 132px);
      }

      .viewer-phrase{
        font-size:clamp(34px, 10.5vw, 54px);
        line-height:1.55;
      }

      .viewer-actions{
        top:10px;
        right:10px;
        gap:6px;
      }

      .viewer-btn{
        padding:10px 12px;
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>🍻 건배사 추천</h1>
      <div class="sub">
        원하는 건배사를 고르고, 누르면 큰 글씨로 바로 볼 수 있습니다.
      </div>

      <div class="toolbar">
        <input id="searchInput" class="search" type="text" placeholder="건배사, 뜻, 태그 검색" />

        <div class="top-actions">
          <button id="randomBtn" class="btn primary" type="button">랜덤 추천</button>
          <button id="resetBtn" class="btn" type="button">전체 보기</button>
        </div>

        <div id="filterBar" class="filters"></div>
      </div>
    </section>

    <div id="resultText" class="result">불러오는 중...</div>
    <section id="cardGrid" class="grid"></section>

    <div class="footer-note">
      데이터 파일: <b>data/cheers.json</b>
    </div>
  </div>

  <div id="viewer" class="viewer" aria-hidden="true">
    <div class="viewer-actions">
      <button id="copyBtn" class="viewer-btn" type="button">복사</button>
      <button id="closeViewerBtn" class="viewer-btn" type="button">닫기</button>
    </div>

    <div class="viewer-inner">
      <div id="viewerWord" class="viewer-word"></div>
      <div id="viewerPhrase" class="viewer-phrase"></div>
    </div>

    <div class="viewer-hint">
      ← → 방향키로 이전/다음 이동 가능
    </div>

    <div class="viewer-bottom">
      <button id="prevBtn" class="viewer-btn" type="button">이전</button>
      <button id="nextBtn" class="viewer-btn" type="button">다음</button>
      <button id="viewerRandomBtn" class="viewer-btn" type="button">랜덤</button>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const filterBar = document.getElementById('filterBar');
    const cardGrid = document.getElementById('cardGrid');
    const resultText = document.getElementById('resultText');
    const randomBtn = document.getElementById('randomBtn');
    const resetBtn = document.getElementById('resetBtn');

    const viewer = document.getElementById('viewer');
    const viewerWord = document.getElementById('viewerWord');
    const viewerPhrase = document.getElementById('viewerPhrase');
    const closeViewerBtn = document.getElementById('closeViewerBtn');
    const copyBtn = document.getElementById('copyBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const viewerRandomBtn = document.getElementById('viewerRandomBtn');

    let allCheers = [];
    let currentCategory = '전체';
    let currentItem = null;

    async function loadCheers() {
      try {
        const res = await fetch('./data/cheers.json');
        const raw = await res.json();

        allCheers = Array.isArray(raw)
          ? raw
              .filter(item => item && typeof item === 'object')
              .map((item, index) => ({
                id: Number(item.id ?? index + 1),
                word: item.word ?? '',
                phrase: item.phrase ?? '',
                category: item.category ?? '기타',
                tags: Array.isArray(item.tags) ? item.tags : [],
                status: item.status ?? 'approved'
              }))
          : [];

        renderFilters();
        renderCards();
      } catch (err) {
        console.error(err);
        resultText.textContent = '데이터를 불러오지 못했습니다.';
        cardGrid.innerHTML = '<div class="empty">data/cheers.json 파일을 확인해주세요.</div>';
      }
    }

    function getCategories() {
      const categories = [...new Set(
        allCheers
          .filter(item => item.status === 'approved')
          .map(item => item.category)
          .filter(Boolean)
      )];
      return ['전체', ...categories];
    }

    function renderFilters() {
      filterBar.innerHTML = '';

      getCategories().forEach(category => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (currentCategory === category ? ' active' : '');
        btn.textContent = category;

        btn.addEventListener('click', () => {
          currentCategory = category;
          renderFilters();
          renderCards();
        });

        filterBar.appendChild(btn);
      });
    }

    function getFilteredData() {
      const keyword = searchInput.value.trim().toLowerCase();

      return allCheers.filter(item => {
        if (item.status && item.status !== 'approved') return false;

        const inCategory = currentCategory === '전체' || item.category === currentCategory;

        const haystack = [
          item.word || '',
          item.phrase || '',
          item.category || '',
          ...(item.tags || [])
        ].join(' ').toLowerCase();

        const inSearch = !keyword || haystack.includes(keyword);
        return inCategory && inSearch;
      });
    }

    function renderCards() {
      const list = getFilteredData();
      resultText.textContent = list.length ? `총 ${list.length}개 표시` : '조건에 맞는 건배사가 없습니다.';

      if (!list.length) {
        cardGrid.innerHTML = '<div class="empty">조건에 맞는 건배사가 없습니다.</div>';
        return;
      }

      cardGrid.innerHTML = list.map(item => `
        <article class="card" data-id="${item.id}">
          <div class="word">${escapeHtml(item.word)}</div>
          <div class="phrase">${escapeHtml(item.phrase)}</div>
          <div class="meta">
            <span class="tag">${escapeHtml(item.category || '기타')}</span>
            ${(item.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
        </article>
      `).join('');

      cardGrid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const id = Number(card.dataset.id);
          const item = getFilteredData().find(x => x.id === id);
          openViewer(item);
        });
      });
    }

    function renderHighlightedPhrase(word = '', phrase = '') {
      const targets = [...String(word)];
      let targetIndex = 0;

      return [...String(phrase)].map(ch => {
        if (targetIndex < targets.length && ch === targets[targetIndex]) {
          targetIndex++;
          return `<span class="viewer-initial">${escapeHtml(ch)}</span>`;
        }
        return `<span class="viewer-rest">${escapeHtml(ch)}</span>`;
      }).join('');
    }

    function openViewer(item) {
      if (!item) return;
      currentItem = item;
      viewerWord.textContent = item.word || '';
      viewerPhrase.innerHTML = renderHighlightedPhrase(item.word, item.phrase);
      viewer.classList.add('show');
      viewer.setAttribute('aria-hidden', 'false');
    }

    function closeViewer() {
      viewer.classList.remove('show');
      viewer.setAttribute('aria-hidden', 'true');
    }

    function getCurrentFilteredIndex() {
      if (!currentItem) return -1;
      const list = getFilteredData();
      return list.findIndex(item => item.id === currentItem.id);
    }

    function showPrevItem() {
      const list = getFilteredData();
      if (!list.length) return;
      const currentIndex = getCurrentFilteredIndex();
      const nextIndex = currentIndex <= 0 ? list.length - 1 : currentIndex - 1;
      openViewer(list[nextIndex]);
    }

    function showNextItem() {
      const list = getFilteredData();
      if (!list.length) return;
      const currentIndex = getCurrentFilteredIndex();
      const nextIndex = currentIndex >= list.length - 1 ? 0 : currentIndex + 1;
      openViewer(list[nextIndex]);
    }

    function showRandomItem() {
      const list = getFilteredData();
      if (!list.length) return;

      if (list.length === 1) {
        openViewer(list[0]);
        return;
      }

      let randomItem = null;
      do {
        randomItem = list[Math.floor(Math.random() * list.length)];
      } while (currentItem && randomItem.id === currentItem.id);

      openViewer(randomItem);
    }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    searchInput.addEventListener('input', renderCards);

    randomBtn.addEventListener('click', () => {
      currentItem = null;
      showRandomItem();
    });

    viewerRandomBtn.addEventListener('click', showRandomItem);
    prevBtn.addEventListener('click', showPrevItem);
    nextBtn.addEventListener('click', showNextItem);

    resetBtn.addEventListener('click', () => {
      searchInput.value = '';
      currentCategory = '전체';
      renderFilters();
      renderCards();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    closeViewerBtn.addEventListener('click', closeViewer);

    viewer.addEventListener('click', (e) => {
      if (e.target === viewer) closeViewer();
    });

    document.addEventListener('keydown', (e) => {
      if (!viewer.classList.contains('show')) return;

      if (e.key === 'Escape') closeViewer();
      if (e.key === 'ArrowLeft') showPrevItem();
      if (e.key === 'ArrowRight') showNextItem();
    });

    copyBtn.addEventListener('click', async () => {
      if (!currentItem) return;

      const text = `${currentItem.word}\n${currentItem.phrase}`;

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = '복사됨';
        setTimeout(() => {
          copyBtn.textContent = '복사';
        }, 1200);
      } catch {
        alert('복사에 실패했습니다.');
      }
    });

    loadCheers();
  </script>
</body>
</html>
