<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건배사 추천</title>

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#2563eb;
      --accent-soft:#dbeafe;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --red:#ef4444;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f7fbff 0%, var(--bg) 100%);
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:18px 14px 30px;
    }

    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:28px;
      line-height:1.2;
    }

    .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .toolbar{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .search{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      background:#fff;
      outline:none;
    }

    .search:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
    }

    .btn{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    .btn.primary{
      background:var(--accent);
      color:#fff;
    }

    .btn.warn{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }

    .btn.danger{
      background:#fef2f2;
      color:#b91c1c;
      border:1px solid #fecaca;
    }

    .filters{
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:2px;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }

    .filters::-webkit-scrollbar{
      display:none;
    }

    .chip{
      white-space:nowrap;
      background:#fff;
      border:1px solid var(--line);
      color:#374151;
    }

    .chip.active{
      background:var(--accent-soft);
      color:#1d4ed8;
      border-color:#bfdbfe;
    }

    .result{
      color:var(--muted);
      font-size:14px;
      margin:12px 2px 8px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:190px;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .card:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 34px rgba(0,0,0,.10);
    }

    .word{
      font-size:28px;
      font-weight:900;
      letter-spacing:-0.03em;
      line-height:1.15;
      word-break:keep-all;
    }

    .phrase{
      font-size:16px;
      line-height:1.55;
      word-break:keep-all;
      flex:1;
      color:#1f2937;
    }

    .meta{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .tag{
      font-size:12px;
      color:#4b5563;
      background:#f3f4f6;
      padding:6px 9px;
      border-radius:999px;
    }

    .empty{
      grid-column:1 / -1;
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:18px;
      padding:30px 20px;
      text-align:center;
      color:var(--muted);
    }

    .footer-note{
      margin-top:16px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      text-align:center;
    }

    .viewer{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top, rgba(59,130,246,.20), transparent 35%),
        linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color:#fff;
      display:none;
      z-index:999;
    }

    .viewer.show{
      display:flex;
    }

    .viewer-inner{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px 16px 90px;
      gap:24px;
    }

    .viewer-word{
      font-size:clamp(68px, 20vw, 150px);
      font-weight:900;
      line-height:1.02;
      letter-spacing:-0.05em;
      word-break:keep-all;
      text-shadow:0 6px 20px rgba(0,0,0,.35);
    }

    .viewer-phrase{
      max-width:980px;
      font-size:clamp(28px, 8vw, 58px);
      line-height:1.5;
      font-weight:800;
      text-shadow:0 4px 14px rgba(0,0,0,.28);
      word-break:keep-all;
      white-space:pre-wrap;
    }

    .viewer-initial{
      color:var(--red);
      font-weight:900;
    }

    .viewer-rest{
      color:#fff;
    }

    .viewer-actions{
      position:absolute;
      top:14px;
      right:14px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      max-width:calc(100% - 28px);
    }

    .viewer-btn{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(8px);
    }

    .viewer-bottom{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      width:calc(100% - 24px);
    }

    .viewer-hint{
      position:absolute;
      left:50%;
      bottom:78px;
      transform:translateX(-50%);
      color:rgba(255,255,255,.70);
      font-size:13px;
      text-align:center;
      width:calc(100% - 24px);
    }

    .modal-back{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:16px;
    }

    .modal-back.show{
      display:flex;
    }

    .modal{
      width:min(560px, 100%);
      background:#fff;
      border-radius:22px;
      box-shadow:0 20px 60px rgba(0,0,0,.22);
      padding:18px;
    }

    .modal h2{
      margin:0 0 14px;
      font-size:20px;
    }

    .form-grid{
      display:grid;
      gap:12px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field label{
      font-size:14px;
      font-weight:700;
      color:#374151;
    }

    .field input,
    .field textarea,
    .field select{
      width:100%;
      border:1px solid #d1d5db;
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      font-family:inherit;
      outline:none;
      background:#fff;
    }

    .field textarea{
      min-height:96px;
      resize:vertical;
    }

    .color-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .modal-actions{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .small-note{
      color:#6b7280;
      font-size:12px;
      line-height:1.45;
    }

    @media (max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }

      h1{
        font-size:24px;
      }

      .word{
        font-size:30px;
      }

      .phrase{
        font-size:17px;
      }

      .viewer-inner{
        padding:18px 12px 96px;
        gap:20px;
      }

      .viewer-word{
        font-size:clamp(76px, 24vw, 132px);
      }

      .viewer-phrase{
        font-size:clamp(34px, 10.5vw, 54px);
        line-height:1.55;
      }

      .viewer-actions{
        top:10px;
        right:10px;
        gap:6px;
      }

      .viewer-btn{
        padding:10px 12px;
        font-size:13px;
      }

      .color-row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>🍻 건배사 추천</h1>
      <div class="sub">
        원하는 건배사를 고르고, 누르면 큰 글씨로 바로 볼 수 있습니다.
      </div>

      <div class="toolbar">
        <input id="searchInput" class="search" type="text" placeholder="건배사, 뜻, 태그 검색" />

        <div class="top-actions">
          <button id="randomBtn" class="btn primary" type="button">랜덤 추천</button>
          <button id="resetBtn" class="btn" type="button">전체 보기</button>
          <button id="exportBtn" class="btn warn" type="button">JSON 내보내기</button>
          <button id="clearLocalBtn" class="btn danger" type="button">수정내용 초기화</button>
        </div>

        <div id="filterBar" class="filters"></div>
      </div>
    </section>

    <div id="resultText" class="result">불러오는 중...</div>
    <section id="cardGrid" class="grid"></section>

    <div class="footer-note">
      데이터 파일: <b>data/cheers.json</b><br>
      수정/삭제는 브라우저에 저장됩니다. 필요하면 JSON 내보내기로 다시 파일 저장하세요.
    </div>
  </div>

  <div id="viewer" class="viewer" aria-hidden="true">
    <div class="viewer-actions">
      <button id="editBtn" class="viewer-btn" type="button">수정</button>
      <button id="deleteBtn" class="viewer-btn" type="button">삭제</button>
      <button id="copyBtn" class="viewer-btn" type="button">복사</button>
      <button id="closeViewerBtn" class="viewer-btn" type="button">닫기</button>
    </div>

    <div class="viewer-inner">
      <div id="viewerWord" class="viewer-word"></div>
      <div id="viewerPhrase" class="viewer-phrase"></div>
    </div>

    <div class="viewer-hint">
      ← → 방향키로 이전/다음 이동 가능
    </div>

    <div class="viewer-bottom">
      <button id="prevBtn" class="viewer-btn" type="button">이전</button>
      <button id="nextBtn" class="viewer-btn" type="button">다음</button>
      <button id="viewerRandomBtn" class="viewer-btn" type="button">랜덤</button>
    </div>
  </div>

  <div id="editModalBack" class="modal-back">
    <div class="modal">
      <h2>건배사 수정</h2>

      <div class="form-grid">
        <div class="field">
          <label for="editWord">건배사</label>
          <input id="editWord" type="text" />
        </div>

        <div class="field">
          <label for="editPhrase">설명</label>
          <textarea id="editPhrase"></textarea>
        </div>

        <div class="field">
          <label for="editCategory">분류</label>
          <select id="editCategory">
            <option value="웃긴형">웃긴형</option>
            <option value="무난형">무난형</option>
            <option value="감동형">감동형</option>
            <option value="직장형">직장형</option>
            <option value="응원형">응원형</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="field">
          <label for="editTags">태그 (쉼표로 구분)</label>
          <input id="editTags" type="text" placeholder="예: 회식, 유머, 팀워크" />
        </div>

        <div class="color-row">
          <div class="field">
            <label for="editHighlightColor">강조 글자 색</label>
            <input id="editHighlightColor" type="color" value="#ef4444" />
          </div>

          <div class="field">
            <label for="editViewerBg">큰화면 배경색</label>
            <input id="editViewerBg" type="color" value="#111827" />
          </div>
        </div>

        <div class="small-note">
          강조 글자 색은 두문자에 맞는 글자에 적용됩니다. 배경색은 큰화면 보기의 기본 배경색으로 적용됩니다.
        </div>
      </div>

      <div class="modal-actions">
        <button id="cancelEditBtn" class="btn" type="button">취소</button>
        <button id="saveEditBtn" class="btn primary" type="button">저장</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'cheers_app_custom_data_v1';

    const searchInput = document.getElementById('searchInput');
    const filterBar = document.getElementById('filterBar');
    const cardGrid = document.getElementById('cardGrid');
    const resultText = document.getElementById('resultText');
    const randomBtn = document.getElementById('randomBtn');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');
    const clearLocalBtn = document.getElementById('clearLocalBtn');

    const viewer = document.getElementById('viewer');
    const viewerWord = document.getElementById('viewerWord');
    const viewerPhrase = document.getElementById('viewerPhrase');
    const closeViewerBtn = document.getElementById('closeViewerBtn');
    const copyBtn = document.getElementById('copyBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const viewerRandomBtn = document.getElementById('viewerRandomBtn');
    const editBtn = document.getElementById('editBtn');
    const deleteBtn = document.getElementById('deleteBtn');

    const editModalBack = document.getElementById('editModalBack');
    const editWord = document.getElementById('editWord');
    const editPhrase = document.getElementById('editPhrase');
    const editCategory = document.getElementById('editCategory');
    const editTags = document.getElementById('editTags');
    const editHighlightColor = document.getElementById('editHighlightColor');
    const editViewerBg = document.getElementById('editViewerBg');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const saveEditBtn = document.getElementById('saveEditBtn');

    let allCheers = [];
    let currentCategory = '전체';
    let currentItem = null;

    async function loadCheers() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);

        if (saved) {
          const parsed = JSON.parse(saved);
          allCheers = normalizeData(parsed);
        } else {
          const res = await fetch('./data/cheers.json');
          const raw = await res.json();
          allCheers = normalizeData(raw);
          saveToLocal();
        }

        renderFilters();
        renderCards();
      } catch (err) {
        console.error(err);
        resultText.textContent = '데이터를 불러오지 못했습니다.';
        cardGrid.innerHTML = '<div class="empty">data/cheers.json 파일을 확인해주세요.</div>';
      }
    }

    function normalizeData(raw) {
      return Array.isArray(raw)
        ? raw
            .filter(item => item && typeof item === 'object')
            .map((item, index) => ({
              id: Number(item.id ?? index + 1),
              word: item.word ?? '',
              phrase: item.phrase ?? '',
              category: item.category ?? '기타',
              tags: Array.isArray(item.tags) ? item.tags : [],
              status: item.status ?? 'approved',
              highlightColor: item.highlightColor ?? '#ef4444',
              viewerBg: item.viewerBg ?? '#111827'
            }))
        : [];
    }

    function saveToLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allCheers, null, 2));
    }

    function getCategories() {
      const categories = [...new Set(
        allCheers
          .filter(item => item.status === 'approved')
          .map(item => item.category)
          .filter(Boolean)
      )];
      return ['전체', ...categories];
    }

    function renderFilters() {
      filterBar.innerHTML = '';

      getCategories().forEach(category => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (currentCategory === category ? ' active' : '');
        btn.textContent = category;

        btn.addEventListener('click', () => {
          currentCategory = category;
          renderFilters();
          renderCards();
        });

        filterBar.appendChild(btn);
      });
    }

    function getFilteredData() {
      const keyword = searchInput.value.trim().toLowerCase();

      return allCheers.filter(item => {
        if (item.status && item.status !== 'approved') return false;

        const inCategory = currentCategory === '전체' || item.category === currentCategory;

        const haystack = [
          item.word || '',
          item.phrase || '',
          item.category || '',
          ...(item.tags || [])
        ].join(' ').toLowerCase();

        const inSearch = !keyword || haystack.includes(keyword);
        return inCategory && inSearch;
      });
    }

    function renderCards() {
      const list = getFilteredData();
      resultText.textContent = list.length ? `총 ${list.length}개 표시` : '조건에 맞는 건배사가 없습니다.';

      if (!list.length) {
        cardGrid.innerHTML = '<div class="empty">조건에 맞는 건배사가 없습니다.</div>';
        return;
      }

      cardGrid.innerHTML = list.map(item => `
        <article class="card" data-id="${item.id}">
          <div class="word">${escapeHtml(item.word)}</div>
          <div class="phrase">${escapeHtml(item.phrase)}</div>
          <div class="meta">
            <span class="tag">${escapeHtml(item.category || '기타')}</span>
            ${(item.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
        </article>
      `).join('');

      cardGrid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const id = Number(card.dataset.id);
          const item = getFilteredData().find(x => x.id === id);
          openViewer(item);
        });
      });
    }

    function renderHighlightedPhrase(word = '', phrase = '', highlightColor = '#ef4444') {
      const targets = [...String(word)];
      let targetIndex = 0;

      return [...String(phrase)].map(ch => {
        if (targetIndex < targets.length && ch === targets[targetIndex]) {
          targetIndex++;
          return `<span class="viewer-initial" style="color:${escapeHtml(highlightColor)}">${escapeHtml(ch)}</span>`;
        }
        return `<span class="viewer-rest">${escapeHtml(ch)}</span>`;
      }).join('');
    }

    function applyViewerStyle(item) {
      const bg = item?.viewerBg || '#111827';
      viewer.style.background = `
        radial-gradient(circle at top, rgba(59,130,246,.20), transparent 35%),
        linear-gradient(180deg, ${bg} 0%, #111827 100%)
      `;
    }

    function openViewer(item) {
      if (!item) return;
      currentItem = item;
      viewerWord.textContent = item.word || '';
      viewerPhrase.innerHTML = renderHighlightedPhrase(item.word, item.phrase, item.highlightColor);
      applyViewerStyle(item);
      viewer.classList.add('show');
      viewer.setAttribute('aria-hidden', 'false');
    }

    function closeViewer() {
      viewer.classList.remove('show');
      viewer.setAttribute('aria-hidden', 'true');
    }

    function getCurrentFilteredIndex() {
      if (!currentItem) return -1;
      const list = getFilteredData();
      return list.findIndex(item => item.id === currentItem.id);
    }

    function showPrevItem() {
      const list = getFilteredData();
      if (!list.length) return;
      const currentIndex = getCurrentFilteredIndex();
      const nextIndex = currentIndex <= 0 ? list.length - 1 : currentIndex - 1;
      openViewer(list[nextIndex]);
    }

    function showNextItem() {
      const list = getFilteredData();
      if (!list.length) return;
      const currentIndex = getCurrentFilteredIndex();
      const nextIndex = currentIndex >= list.length - 1 ? 0 : currentIndex + 1;
      openViewer(list[nextIndex]);
    }

    function showRandomItem() {
      const list = getFilteredData();
      if (!list.length) return;

      if (list.length === 1) {
        openViewer(list[0]);
        return;
      }

      let randomItem = null;
      do {
        randomItem = list[Math.floor(Math.random() * list.length)];
      } while (currentItem && randomItem.id === currentItem.id);

      openViewer(randomItem);
    }

    function openEditModal() {
      if (!currentItem) return;

      editWord.value = currentItem.word || '';
      editPhrase.value = currentItem.phrase || '';
      editCategory.value = currentItem.category || '기타';
      editTags.value = (currentItem.tags || []).join(', ');
      editHighlightColor.value = currentItem.highlightColor || '#ef4444';
      editViewerBg.value = currentItem.viewerBg || '#111827';

      editModalBack.classList.add('show');
    }

    function closeEditModal() {
      editModalBack.classList.remove('show');
    }

    function saveEdit() {
      if (!currentItem) return;

      const idx = allCheers.findIndex(item => item.id === currentItem.id);
      if (idx === -1) return;

      allCheers[idx] = {
        ...allCheers[idx],
        word: editWord.value.trim(),
        phrase: editPhrase.value.trim(),
        category: editCategory.value,
        tags: editTags.value
          .split(',')
          .map(v => v.trim())
          .filter(Boolean),
        highlightColor: editHighlightColor.value,
        viewerBg: editViewerBg.value
      };

      currentItem = allCheers[idx];
      saveToLocal();
      renderFilters();
      renderCards();
      closeEditModal();
      openViewer(currentItem);
    }

    function deleteCurrentItem() {
      if (!currentItem) return;
      const ok = confirm(`"${currentItem.word}" 항목을 삭제하시겠습니까?`);
      if (!ok) return;

      allCheers = allCheers.filter(item => item.id !== currentItem.id);
      saveToLocal();
      closeViewer();
      renderFilters();
      renderCards();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(allCheers, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'cheers.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearLocalChanges() {
      const ok = confirm('브라우저에 저장된 수정/삭제 내용을 모두 지우고 원본 JSON으로 다시 불러오시겠습니까?');
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    searchInput.addEventListener('input', renderCards);

    randomBtn.addEventListener('click', () => {
      currentItem = null;
      showRandomItem();
    });

    viewerRandomBtn.addEventListener('click', showRandomItem);
    prevBtn.addEventListener('click', showPrevItem);
    nextBtn.addEventListener('click', showNextItem);
    editBtn.addEventListener('click', openEditModal);
    deleteBtn.addEventListener('click', deleteCurrentItem);

    resetBtn.addEventListener('click', () => {
      searchInput.value = '';
      currentCategory = '전체';
      renderFilters();
      renderCards();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    exportBtn.addEventListener('click', exportJson);
    clearLocalBtn.addEventListener('click', clearLocalChanges);

    closeViewerBtn.addEventListener('click', closeViewer);

    viewer.addEventListener('click', (e) => {
      if (e.target === viewer) closeViewer();
    });

    cancelEditBtn.addEventListener('click', closeEditModal);
    saveEditBtn.addEventListener('click', saveEdit);

    editModalBack.addEventListener('click', (e) => {
      if (e.target === editModalBack) closeEditModal();
    });

    document.addEventListener('keydown', (e) => {
      if (editModalBack.classList.contains('show') && e.key === 'Escape') {
        closeEditModal();
        return;
      }

      if (!viewer.classList.contains('show')) return;

      if (e.key === 'Escape') closeViewer();
      if (e.key === 'ArrowLeft') showPrevItem();
      if (e.key === 'ArrowRight') showNextItem();
    });

    copyBtn.addEventListener('click', async () => {
      if (!currentItem) return;

      const text = `${currentItem.word}\n${currentItem.phrase}`;

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = '복사됨';
        setTimeout(() => {
          copyBtn.textContent = '복사';
        }, 1200);
      } catch {
        alert('복사에 실패했습니다.');
      }
    });

    loadCheers();
  </script>
</body>
</html>
