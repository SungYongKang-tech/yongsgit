<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOEN 맛집 댓글 관리</title>
  <link rel="stylesheet" href="./style.css" />

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text-soft: #475569;
      --line: #e5e7eb;
      --line-soft: #cbd5e1;
      --blue: #2563eb;
      --blue-soft: #e0ecff;
      --green: #0f766e;
      --red: #ef4444;
      --gray: #475569;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 8px 20px rgba(15, 23, 42, 0.06);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .review-admin-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .review-admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .review-admin-title {
      flex: 1 1 480px;
      min-width: 0;
    }

    .review-admin-title h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      line-height: 1.25;
      word-break: keep-all;
    }

    .review-admin-title p {
      margin: 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
      word-break: keep-all;
    }

    .review-admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .top-btn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      min-height: 44px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease, transform 0.2s ease;
      white-space: nowrap;
    }

    .top-btn:hover {
      opacity: 0.92;
    }

    .top-btn:active {
      transform: translateY(1px);
    }

    .btn-refresh {
      background: var(--green);
      color: #fff;
    }

    .btn-back {
      background: var(--gray);
      color: #fff;
    }

    .info-box {
      background: var(--card);
      border-radius: 16px;
      padding: 15px 16px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 16px;
      font-size: 14px;
      color: #334155;
      line-height: 1.7;
      word-break: keep-all;
    }

    .review-table-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .review-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .review-table {
      width: 100%;
      min-width: 1200px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .review-table col.id-col { width: 140px; }
    .review-table col.name-col { width: 170px; }
    .review-table col.restaurant-col { width: 180px; }
    .review-table col.review-col { width: auto; }
    .review-table col.map-col { width: 200px; }
    .review-table col.action-col { width: 130px; }

    .review-table th,
    .review-table td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    .review-table th {
      background: #f8fafc;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .review-id {
      color: #334155;
      font-size: 13px;
      word-break: break-all;
      line-height: 1.5;
    }

    .review-name {
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      word-break: keep-all;
    }

    .restaurant-name {
      font-weight: 600;
      color: #1d4ed8;
      line-height: 1.45;
      word-break: keep-all;
    }

    .review-edit-input,
    .writer-name-input {
      width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
    }

    .review-edit-input {
      min-height: 84px;
      resize: vertical;
      line-height: 1.5;
    }

    .writer-name-input {
      min-height: 44px;
    }

    .review-row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .row-btn {
      border: none;
      border-radius: 8px;
      padding: 9px 10px;
      min-height: 40px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      min-width: 56px;
      transition: opacity 0.2s ease, transform 0.2s ease;
      white-space: nowrap;
    }

    .row-btn:hover {
      opacity: 0.92;
    }

    .row-btn:active {
      transform: translateY(1px);
    }

    .btn-edit {
      background: var(--blue);
      color: #fff;
    }

    .btn-delete {
      background: var(--red);
      color: #fff;
    }

    .empty-box,
    .loading-box {
      background: var(--card);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      color: #64748b;
      box-shadow: var(--shadow-soft);
      font-size: 15px;
      line-height: 1.7;
    }

    .path-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e2e8f0;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .mapped-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
    }

    .name-map-cell {
      min-width: 180px;
    }

    .name-map-actions {
      margin-top: 6px;
    }

    @media (max-width: 900px) {
      .review-admin-wrap {
        padding: 16px;
      }

      .review-admin-title h1 {
        font-size: 24px;
      }

      .review-table {
        min-width: 1120px;
      }
    }

    @media (max-width: 768px) {
      .review-admin-wrap {
        padding: 12px;
      }

      .review-admin-topbar {
        gap: 10px;
        margin-bottom: 14px;
      }

      .review-admin-title {
        flex: 1 1 100%;
      }

      .review-admin-title h1 {
        font-size: 22px;
        margin-bottom: 6px;
      }

      .review-admin-title p {
        font-size: 13px;
        line-height: 1.55;
      }

      .review-admin-actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .top-btn {
        width: 100%;
        font-size: 13px;
        padding: 10px 12px;
      }

      .info-box {
        font-size: 13px;
        padding: 13px 14px;
        margin-bottom: 14px;
      }

      .review-table {
        min-width: 980px;
      }

      .review-table th,
      .review-table td {
        font-size: 13px;
        padding: 10px 8px;
      }

      .review-edit-input,
      .writer-name-input {
        font-size: 13px;
        padding: 9px;
      }

      .review-edit-input {
        min-height: 76px;
      }

      .row-btn {
        font-size: 12px;
        padding: 8px 9px;
        min-height: 38px;
      }

      .empty-box,
      .loading-box {
        font-size: 14px;
        padding: 24px 16px;
      }
    }

    @media (max-width: 480px) {
      .review-admin-title h1 {
        font-size: 20px;
      }

      .review-admin-title p {
        font-size: 12px;
      }

      .review-admin-actions {
        grid-template-columns: 1fr;
      }

      .info-box {
        font-size: 12px;
        line-height: 1.6;
      }

      .review-table {
        min-width: 920px;
      }
    }
  </style>
</head>
<body>
  <div class="review-admin-wrap">
    <div class="review-admin-topbar">
      <div class="review-admin-title">
        <h1>💬 한줄후기 관리</h1>
        <p>
          작성자 ID별 이름을 따로 저장할 수 있습니다.<br />
          저장된 이름이 있으면 후기 안에 적힌 이름보다 우선해서 표시됩니다.
        </p>
      </div>

      <div class="review-admin-actions">
        <button id="refreshBtn" class="top-btn btn-refresh" type="button">새로고침</button>
        <a href="./admin.html" class="top-btn btn-back">관리자 페이지로</a>
      </div>
    </div>

    <div class="info-box">
      후기 데이터 저장 경로를 자동으로 찾아서 불러옵니다.<br />
      작성자 ID에 이름을 저장해두면 이후 같은 ID의 후기에는 그 이름이 우선 표시됩니다.
    </div>

    <div id="reviewContainer" class="loading-box">불러오는 중...</div>
  </div>

  <script type="module" src="./review-admin.js"></script>
</body>
</html>
