<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOEN 맛집 댓글 관리</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .review-admin-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .review-admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .review-admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review-table-wrap {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .review-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    .review-table th,
    .review-table td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    .review-table th {
      background: #f8fafc;
      font-weight: 700;
    }

    .review-table td textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .review-row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn-sm {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-edit {
      background: #2563eb;
      color: #fff;
    }

    .btn-delete {
      background: #ef4444;
      color: #fff;
    }

    .btn-back {
      background: #475569;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      display: inline-block;
    }

    .btn-refresh {
      background: #0f766e;
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .empty-box {
      padding: 30px;
      text-align: center;
      color: #64748b;
      background: #fff;
      border-radius: 16px;
    }

    .page-msg {
      margin-top: 12px;
      color: #0f172a;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .review-admin-wrap {
        padding: 14px;
      }

      .review-table-wrap {
        overflow-x: auto;
      }

      .review-table th,
      .review-table td {
        font-size: 13px;
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="review-admin-wrap">
    <div class="review-admin-topbar">
      <div>
        <h1>💬 한줄후기 관리</h1>
        <div class="page-msg">작성자(id, 이름/별명, 음식점, 한줄후기)을 확인하고 수정/삭제할 수 있습니다.</div>
      </div>

      <div class="review-admin-actions">
        <button id="refreshBtn" class="btn-refresh" type="button">새로고침</button>
        <a href="./admin.html" class="btn-back">관리자 페이지로</a>
      </div>
    </div>

    <div id="reviewContainer"></div>
  </div>

  <script type="module" src="./review-admin.js"></script>
</body>
</html>
