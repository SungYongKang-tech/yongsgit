<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOEN 맛집 댓글 관리</title>
  <link rel="stylesheet" href="./style.css" />

  <style>
    body {
      background: #f8fafc;
      margin: 0;
      font-family: Arial, sans-serif;
      color: #0f172a;
    }

    .review-admin-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .review-admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .review-admin-title h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
    }

    .review-admin-title p {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    .review-admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease;
    }

    .top-btn:hover {
      opacity: 0.9;
    }

    .btn-refresh {
      background: #0f766e;
      color: #fff;
    }

    .btn-back {
      background: #475569;
      color: #fff;
    }

    .info-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      margin-bottom: 16px;
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
    }

    .review-table-wrap {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .review-table-scroll {
      overflow-x: auto;
    }

    .review-table {
      width: 100%;
      min-width: 1200px;
      border-collapse: collapse;
    }

    .review-table th,
    .review-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    .review-table th {
      background: #f8fafc;
      font-weight: 700;
      color: #0f172a;
      white-space: nowrap;
    }

    .review-id {
      color: #334155;
      font-size: 13px;
      word-break: break-all;
    }

    .review-name {
      font-weight: 600;
      color: #0f172a;
      line-height: 1.4;
    }

    .restaurant-name {
      font-weight: 600;
      color: #1d4ed8;
      line-height: 1.4;
    }

    .review-edit-input,
    .writer-name-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
    }

    .review-edit-input {
      min-height: 72px;
      resize: vertical;
    }

    .writer-name-input {
      min-height: 42px;
    }

    .review-row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .row-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      min-width: 56px;
      transition: opacity 0.2s ease;
    }

    .row-btn:hover {
      opacity: 0.9;
    }

    .btn-edit {
      background: #2563eb;
      color: #fff;
    }

    .btn-delete {
      background: #ef4444;
      color: #fff;
    }

    .empty-box,
    .loading-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      color: #64748b;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      font-size: 15px;
      line-height: 1.7;
    }

    .path-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #0f172a;
      font-size: 12px;
      font-weight: 700;
    }

    .mapped-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e0ecff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
    }

    .name-map-cell {
      min-width: 180px;
    }

    .name-map-actions {
      margin-top: 6px;
    }

    @media (max-width: 768px) {
      .review-admin-wrap {
        padding: 14px;
      }

      .review-admin-title h1 {
        font-size: 22px;
      }

      .review-admin-title p {
        font-size: 13px;
      }

      .info-box {
        font-size: 13px;
      }

      .review-table {
        min-width: 1100px;
      }

      .review-table th,
      .review-table td {
        font-size: 13px;
        padding: 10px 8px;
      }

      .review-edit-input,
      .writer-name-input {
        font-size: 13px;
      }

      .row-btn {
        font-size: 12px;
        padding: 8px 9px;
      }
    }
  </style>
</head>
<body>
  <div class="review-admin-wrap">
    <div class="review-admin-topbar">
      <div class="review-admin-title">
        <h1>💬 한줄후기 관리</h1>
        <p>
          작성자 ID별 이름을 따로 저장할 수 있습니다.<br />
          저장된 이름이 있으면 후기 안에 적힌 이름보다 우선해서 표시됩니다.
        </p>
      </div>

      <div class="review-admin-actions">
        <button id="refreshBtn" class="top-btn btn-refresh" type="button">새로고침</button>
        <a href="./admin.html" class="top-btn btn-back">관리자 페이지로</a>
      </div>
    </div>

    <div class="info-box">
      후기 데이터 저장 경로를 자동으로 찾아서 불러옵니다.<br />
      작성자 ID에 이름을 저장해두면 이후 같은 ID의 후기에는 그 이름이 우선 표시됩니다.
    </div>

    <div id="reviewContainer" class="loading-box">불러오는 중...</div>
  </div>

  <script type="module" src="./review-admin.js"></script>
</body>
</html>
