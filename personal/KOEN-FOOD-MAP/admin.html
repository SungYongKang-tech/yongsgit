<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOEN 맛집 관리자</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <h1>🔐 KOEN 맛집 관리자</h1>

    <section id="loginSection" class="admin-panel">
      <h2>관리자 로그인</h2>
      <div class="admin-form-row">
        <input
          type="password"
          id="adminPassword"
          placeholder="관리자 비밀번호 입력"
        />
        <button id="loginBtn" type="button">입장</button>
      </div>
      <div id="loginMsg" class="admin-msg"></div>
    </section>

    <section id="adminSection" class="hidden">
      <div class="admin-topbar">
        <h2>맛집 관리</h2>
        <div class="admin-top-actions">
          <button id="reviewManageBtn" type="button">댓글 확인</button>
          <button id="newBtn" type="button">새 식당 추가</button>
          <button id="logoutBtn" type="button">로그아웃</button>
        </div>
      </div>
    
      <section class="admin-card">
        <h3>수정 요청 관리</h3>
           <div id="editRequestList"></div>
      </section>

      <div class="admin-layout">
        <aside class="admin-list-panel">
          <div class="admin-list-head">
            <strong>식당 목록</strong>
            <input
              type="text"
              id="adminSearch"
              placeholder="식당명 검색"
            />
          </div>
          <div id="restaurantList" class="admin-list"></div>
        </aside>

        <main class="admin-form-panel">
          <div class="admin-form-grid">
            <div class="admin-field">
              <label for="fId">ID</label>
              <input id="fId" type="number" readonly />
            </div>

            <div class="admin-field">
              <label for="fName">식당명</label>
              <input id="fName" type="text" />
            </div>

            <!-- 대분류 -->
            <div class="admin-field full">
              <label>대분류 선택</label>
              <div id="categorySelectRow" class="choice-row"></div>
              <div class="inline-add-row">
                <input id="fCategoryCustom" type="text" placeholder="대분류 직접 입력" />
                <button id="addCategoryBtn" type="button">추가</button>
              </div>
              <input id="fCategory" type="hidden" />
            </div>

            <!-- 중분류 -->
            <div class="admin-field full">
              <label>중분류 선택</label>
              <div id="subCategorySelectRow" class="choice-row"></div>
              <div class="inline-add-row">
                <input id="fSubCategoryCustom" type="text" placeholder="중분류 직접 입력" />
                <button id="addSubCategoryBtn" type="button">추가</button>
              </div>
              <input id="fSubCategory" type="hidden" />
            </div>

            <!-- 태그 -->
            <div class="admin-field full">
              <label>태그 선택</label>
              <div id="tagSelectRow" class="choice-row"></div>
              <div class="inline-add-row">
                <input id="fTagCustom" type="text" placeholder="태그 직접 입력" />
                <button id="addTagBtn" type="button">추가</button>
              </div>
              <div id="selectedTagsPreview" class="selected-preview"></div>
              <input id="fTags" type="hidden" />
            </div>

            <!-- 평점 -->
            <div class="admin-field full">
              <label>기본평점 선택</label>
              <div id="ratingSelectRow" class="choice-row"></div>
              <input id="fBaseRating" type="hidden" />
            </div>

            <div class="admin-field full">
              <label for="fMainMenus">대표 메뉴</label>
              <input
                id="fMainMenus"
                type="text"
                placeholder="쉼표로 구분, 예: 물냉면, 육전"
              />
            </div>

            <div class="admin-field">
              <label for="fMenuType">일반 메뉴</label>
              <input id="fMenuType" type="text" placeholder="예: 한우, 솥밥정식, 갈비찜" />
            </div>

            <div class="admin-field full">
              <label for="fAddress">전체 주소</label>
              <input
                id="fAddress"
                type="text"
                placeholder="예: 경남 진주시 하대동 106-20"
              />
            </div>

            <div class="admin-field">
              <label for="fAddressShort">짧은 주소</label>
              <input
                id="fAddressShort"
                type="text"
                placeholder="예: 하대동 106-20"
              />
            </div>

            <div class="admin-field">
              <label for="fMapQuery">지도 검색어</label>
              <input
                id="fMapQuery"
                type="text"
                placeholder="예: 경남 진주시 하대동 106-20 향원한우옥수숯불갈비"
              />
            </div>

            <div class="admin-field full">
              <label for="fDescription">설명</label>
              <textarea
                id="fDescription"
                rows="4"
                placeholder="예: 회식과 가족식사에 어울리는 대표 고깃집"
              ></textarea>
            </div>
          </div>

          <div class="admin-actions">
            <button id="saveBtn" type="button">저장</button>
            <button id="deleteBtn" type="button" class="danger">삭제</button>
          </div>

          <div id="saveMsg" class="admin-msg"></div>
        </main>
      </div>
    </section>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
