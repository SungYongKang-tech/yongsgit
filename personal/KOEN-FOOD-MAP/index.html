<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOEN 맛집</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">
    <h1>🍽️ KOEN 맛집</h1>

    <!-- 검색 -->
    <input id="searchInput" type="text" placeholder="식당명, 메뉴, 주소 검색" />

    <!-- 카테고리 -->
    <div id="categoryRow"></div>

    <!-- 태그 -->
    <div id="tagRow"></div>

    <!-- 리스트 -->
    <div id="cardGrid"></div>
  </div>

  <!-- 상세 모달 -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" type="button">닫기</button>

      <h2 id="modalName"></h2>

      <div>⭐ <span id="modalRating"></span></div>
      <div id="modalCategory"></div>
      <div id="modalAddress"></div>

      <h4>대표 메뉴</h4>
      <div id="modalMenus"></div>

      <h4>태그</h4>
      <div id="modalTags"></div>

      <h4>설명</h4>
      <div id="modalDesc"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
