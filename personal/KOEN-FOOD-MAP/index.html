<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOEN 맛집</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <!-- 제목 + 관리자 버튼 -->
    <div class="title-bar">
      <h1>🍽️ KOEN 맛집</h1>
      <a href="./admin.html" class="admin-link-btn">관리자</a>
    </div>

    <!-- 검색 -->
    <input
      id="searchInput"
      type="text"
      placeholder="식당명, 메뉴, 주소 검색"
      autocomplete="off"
    />

    <div id="extraFilterRow" class="extra-filter-row">
      <button id="myRatedBtn" type="button">내가 평가한 맛집</button>
      <button id="favoriteFilterBtn" type="button">찜한 맛집</button>
    </div>

    <div class="sort-row">
      <button id="sortDefaultBtn" type="button">기본순</button>
      <button id="sortRatingBtn" type="button">평점순</button>
      <button id="sortPopularBtn" type="button">인기순</button>
    </div>

    <!-- 카테고리 -->
    <div id="categoryRow"></div>

    <!-- 태그 -->
    <div id="tagRow"></div>

    <!-- 리스트 -->
    <div id="cardGrid"></div>
  </div>

  <!-- 상세 모달 -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <!-- 상단 버튼 -->
      <div class="modal-topbar">
        <div class="modal-top-actions">
          <button id="editRestaurantBtn" type="button">수정</button>
          <button id="closeModal" type="button">닫기</button>
        </div>
      </div>

      <!-- 보기 모드 -->
      <div id="viewMode">
        <h2 id="modalName"></h2>

        <div>⭐ <span id="modalRating"></span></div>
        <div id="modalCategory"></div>
        <div id="modalAddress"></div>

        <h4>대표 메뉴</h4>
        <div id="modalMenus"></div>

        <h4>태그</h4>
        <div id="modalTags"></div>

        <h4>설명</h4>
        <div id="modalDesc"></div>

        <div style="margin-top: 16px;">
          <button id="modalMapBtn" type="button">지도보기</button>
        </div>
      </div>

      <!-- 수정 모드 -->
      <div id="editMode" class="hidden">
        <h2>맛집 정보 수정</h2>

        <div class="edit-form">
          <label for="editName">식당명</label>
          <input id="editName" type="text" />

          <label for="editCategory">카테고리</label>
          <input id="editCategory" type="text" />

          <label for="editAddress">주소</label>
          <input id="editAddress" type="text" />

          <label for="editMenus">대표 메뉴 (쉼표로 구분)</label>
          <input id="editMenus" type="text" />

          <label>태그 선택</label>
          <div id="editTagPicker" class="tag-picker"></div>
          <input id="editTags" type="hidden" />

          <label for="editDesc">설명</label>
          <textarea id="editDesc" rows="4"></textarea>
        </div>

        <div class="edit-actions" style="margin-top: 16px;">
          <button id="saveRestaurantBtn" type="button">저장</button>
          <button id="cancelEditBtn" type="button">취소</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
