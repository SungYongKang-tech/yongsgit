<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta property="og:title" content="KOEN 맛집" />
<meta property="og:description" content="회사 근처 식당 정보 한눈에" />
<meta property="og:image" content="https://sensational-tulumba-65e97e.netlify.app/personal/koen-food-map/main.png" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sensational-tulumba-65e97e.netlify.app/personal/koen-food-map/" />
<meta property="og:site_name" content="KOEN 맛집" />
<meta property="og:locale" content="ko_KR" />

<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />


  <title>KOEN 맛집</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <!-- 제목 + 관리자 버튼 -->
    <div class="title-bar">
  <h1>🍽️ KOEN 맛집</h1>
  <div class="title-actions">
    <button id="openMyRequestBtn" type="button" class="request-link-btn secondary">내 요청</button>
    <button id="openRequestBtn" type="button" class="request-link-btn">수정요청</button>
    <a href="./admin.html" class="admin-link-btn">관리자</a>
  </div>
</div>

    <!-- 검색 -->
    <input
      id="searchInput"
      type="text"
      placeholder="식당명, 메뉴, 주소 검색"
      autocomplete="off"
    />

    <div id="extraFilterRow" class="extra-filter-row">
      <button id="myRatedBtn" type="button">내가 평가한 맛집</button>
      <button id="favoriteFilterBtn" type="button">찜한 맛집</button>
    </div>

    <div class="sort-row">
      <button id="sortDefaultBtn" type="button">기본순</button>
      <button id="sortRatingBtn" type="button">평점순</button>
      <button id="sortPopularBtn" type="button">인기순</button>
    </div>

    <h4 class="section-title">📂 카테고리</h4>
    <div id="categoryRow"></div>

    <h4 class="section-title">🏷️ 태그</h4>
    <div id="tagRow"></div>

    <div id="cardGrid"></div>
  </div>

  <!-- 상세 모달 -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-topbar">
        <div class="modal-top-actions">
          <button id="editRestaurantBtn" type="button">수정</button>
          <button id="closeModal" type="button">닫기</button>
        </div>
      </div>

      <div id="viewMode">
        <h2 id="modalName"></h2>
        <div>⭐ <span id="modalRating"></span></div>
        <div id="modalCategory"></div>
        <div id="modalAddress"></div>

        <h4>대표 메뉴</h4>
        <div id="modalMenus"></div>

        <h4>태그</h4>
        <div id="modalTags"></div>

        <h4>설명</h4>
        <div id="modalDesc"></div>

        <div style="margin-top: 16px;">
          <button id="modalMapBtn" type="button">지도보기</button>
        </div>
      </div>

      <div id="editMode" class="hidden">
        <h2>맛집 정보 수정</h2>

        <div class="edit-form">
          <label for="editName">식당명</label>
          <input id="editName" type="text" />

          <label for="editCategory">카테고리</label>
          <input id="editCategory" type="text" />

          <label for="editAddress">주소</label>
          <input id="editAddress" type="text" />

          <label for="editMenus">대표 메뉴 (쉼표로 구분)</label>
          <input id="editMenus" type="text" />

          <label>태그 선택</label>
          <div id="editTagPicker" class="tag-picker"></div>

          <div class="tag-add-row">
            <input
              id="editTagCustom"
              type="text"
              placeholder="새 태그 입력"
              autocomplete="off"
            />
            <button id="addEditTagBtn" type="button">태그 추가</button>
          </div>

          <input id="editTags" type="hidden" />

          <label for="editDesc">설명</label>
          <textarea id="editDesc" rows="4"></textarea>
        </div>

        <div class="edit-actions" style="margin-top: 16px;">
          <button id="saveRestaurantBtn" type="button">저장</button>
          <button id="cancelEditBtn" type="button">취소</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 수정요청 모달 -->
  <div id="requestModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-topbar">
        <div class="modal-top-actions">
          <button id="closeRequestModalBtn" type="button">닫기</button>
        </div>
      </div>

      <h2>수정 요청</h2>

      <div class="edit-form">
        <label for="requestRestaurant">식당명</label>
        <input id="requestRestaurant" type="text" placeholder="예: 교동짬뽕" />

        <label for="requestType">요청 유형</label>
        <select id="requestType">
          <option value="정보수정">정보수정</option>
          <option value="정보추가">정보추가</option>
          <option value="삭제요청">삭제요청</option>
          <option value="기타">기타</option>
        </select>

        <label for="requestWriter">작성자</label>
        <input id="requestWriter" type="text" placeholder="이름 또는 닉네임" />

        <label for="requestContent">요청 내용</label>
        <textarea id="requestContent" rows="5" placeholder="수정이 필요한 내용을 적어주세요."></textarea>
      </div>

      <div class="edit-actions" style="margin-top:16px;">
        <button id="submitRequestBtn" type="button">요청 등록</button>
      </div>
    </div>
  </div>

  <!-- 내 요청 보기 모달 -->
<div id="myRequestModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-topbar">
      <div class="modal-top-actions">
        <button id="closeMyRequestModalBtn" type="button">닫기</button>
      </div>
    </div>

    <h2>내 수정 요청</h2>
    <div id="myRequestList" class="my-request-list"></div>
  </div>
</div>

  <script type="module" src="./app.js"></script>
</body>
</html>
