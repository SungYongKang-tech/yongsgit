<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주행기록 목록</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=90120eccb060eed4b76790684d641951"></script>
  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #121c34;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --blue2: #1d4ed8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 10px 10px 14px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .btn {
      width: 100%;
      height: 40px;
      padding: 0 8px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.share {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
    }

    .panel {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.96));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      overflow: hidden;
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px 10px;
      background: rgba(30,41,59,0.6);
      cursor: pointer;
      transition: 0.15s ease;
    }

    .item.active {
      outline: 2px solid rgba(59,130,246,0.7);
      background: rgba(37,99,235,0.14);
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .item-head-left {
      min-width: 0;
      flex: 1;
      width: 100%;
    }

    .item-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .item-date {
      font-weight: 900;
      font-size: 14px;
    }

    .ride-name {
      font-size: 13px;
      font-weight: 800;
      color: #bfdbfe;
      background: rgba(37,99,235,0.18);
      border: 1px solid rgba(59,130,246,0.32);
      border-radius: 999px;
      padding: 3px 9px;
      max-width: 100%;
      word-break: break-word;
    }

    .item-toggle {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .item-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px 10px;
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.35;
      width: 100%;
    }

    .item-meta span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .detail-wrap {
      margin-top: 8px;
      display: none;
    }

    .item.expanded .detail-wrap {
      display: block;
    }

    .detail-inner {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 4px;
    }

    .map-wrap {
      margin-top: 4px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.5);
    }

    .ride-map {
      width: 100%;
      height: 420px;
    }

    .elevation-wrap {
      margin-top: 8px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.55);
      padding: 10px;
    }

    .elevation-title {
      font-size: 13px;
      font-weight: 800;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .elevation-canvas {
      width: 100%;
      height: 180px;
      display: block;
      background: linear-gradient(180deg, rgba(59,130,246,0.10), rgba(15,23,42,0.10));
      border-radius: 10px;
    }

    .elevation-meta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .elevation-meta span {
      font-size: 12px;
      font-weight: 700;
      color: #cbd5e1;
      text-align: center;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 0;
    }

    .title-inline-input {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      background: rgba(15,23,42,0.95);
      border: 1px solid rgba(59,130,246,0.45);
      border-radius: 999px;
      padding: 4px 10px;
      min-width: 90px;
      max-width: 100%;
      outline: none;
    }

    @media (max-width: 700px) {
      body {
        padding: 6px 6px 10px;
      }

      .wrap {
        max-width: 100%;
        gap: 8px;
      }

      .panel {
        padding: 10px;
        border-radius: 16px;
      }

      .title {
        font-size: 20px;
      }

      .item {
        padding: 9px;
      }

      .item-date {
        font-size: 13px;
      }

      .ride-name {
        font-size: 12px;
      }

      .item-meta {
        grid-template-columns: repeat(3, 1fr);
        gap: 4px 6px;
      }

      .item-meta span {
        font-size: 12px;
      }

      .ride-map {
        height: 320px;
      }

      .elevation-canvas {
        height: 150px;
      }

      .elevation-meta {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 420px) {
      .topbar {
        gap: 6px;
      }

      .btn {
        height: 38px;
        font-size: 12px;
        padding: 0 4px;
      }

      .title {
        font-size: 18px;
      }

      .item-meta {
        gap: 4px 4px;
      }

      .item-meta span {
        font-size: 11px;
      }

      .ride-map {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn" id="rideBtn">주행</button>
      <button class="btn" id="batteryBtn">배터리</button>
      <button class="btn share" id="shareBtn">공유</button>
      <button class="btn" id="deleteBtn">삭제</button>
      <button class="btn" id="saveBtn">저장</button>
      <button class="btn" id="adminBtn">관리자</button>
    </div>

    <div class="panel">
      <div class="title">주행기록 목록</div>
      <div class="list" id="rideList"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ2DvuwcyIctktubn7LlfJRP0hHfXfnCU",
      authDomain: "personal-51db3.firebaseapp.com",
      databaseURL: "https://personal-51db3-default-rtdb.firebaseio.com",
      projectId: "personal-51db3",
      storageBucket: "personal-51db3.firebasestorage.app",
      messagingSenderId: "146076749227",
      appId: "1:146076749227:web:2043208d688e60504816ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const SAVED_RIDES_KEY = "ebike_saved_rides_v1";
    const SHARE_EXPIRE_DAYS = 3;

    let selectedRideId = null;
    let expandedRideId = null;
    const mapInstances = new Map();

    async function ensureAuth() {
      if (auth.currentUser) return auth.currentUser;
      const cred = await signInAnonymously(auth);
      return cred.user;
    }

    function loadSavedRides() {
      try {
        const rides = JSON.parse(localStorage.getItem(SAVED_RIDES_KEY) || "[]");
        return Array.isArray(rides) ? rides : [];
      } catch (e) {
        return [];
      }
    }

    function saveSavedRides(rides) {
      localStorage.setItem(SAVED_RIDES_KEY, JSON.stringify(rides));
    }

    function getRideName(ride) {
      const name = String(ride?.title || "").trim();
      return name || "주행기록";
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hh = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const mm = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const ss = String(totalSec % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const week = ["일", "월", "화", "수", "목", "금", "토"];
      const w = week[d.getDay()];
      return `${y}-${m}-${day}(${w}) ${hh}:${mm}`;
    }

    function formatTimeOnly(value) {
      if (!value) return "--:--";
      const d = new Date(value);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function buildDetailHtml(ride) {
      const es = ride.elevationSummary || {};
      const hasElevation = Array.isArray(ride.elevationProfile) && ride.elevationProfile.length > 1;

      return `
        <div class="detail-wrap">
          <div class="detail-inner">
            <div class="map-wrap">
              <div class="ride-map" id="map-${ride.id}"></div>
            </div>

            <div class="elevation-wrap">
              <div class="elevation-title">고도표</div>
              ${
                hasElevation
                  ? `<canvas class="elevation-canvas" id="elevation-${ride.id}"></canvas>
                     <div class="elevation-meta">
                       <span>최저 ${Number(es.minElevation || 0)}m</span>
                       <span>최고 ${Number(es.maxElevation || 0)}m</span>
                       <span>상승 ${Number(es.gainM || 0)}m</span>
                       <span>하강 ${Number(es.lossM || 0)}m</span>
                     </div>`
                  : `<div class="empty" style="padding:12px 0;">고도 데이터 없음</div>`
              }
            </div>
          </div>
        </div>
      `;
    }

    function destroyMapInstance(rideId) {
      const existing = mapInstances.get(rideId);
      if (!existing) return;

      const mapEl = document.getElementById(`map-${rideId}`);
      if (mapEl) {
        mapEl.innerHTML = "";
      }

      mapInstances.delete(rideId);
    }

    function createMapForRide(ride) {
      const mapEl = document.getElementById(`map-${ride.id}`);
      if (!mapEl || !window.kakao || !kakao.maps) return;

      destroyMapInstance(ride.id);

      const path = Array.isArray(ride.path) ? ride.path : [];
      const defaultCenter = new kakao.maps.LatLng(35.180, 128.107);

      const map = new kakao.maps.Map(mapEl, {
        center: defaultCenter,
        level: 5
      });

      const linePath = path
        .filter(p => Array.isArray(p) && p.length >= 2)
        .map(([lat, lng]) => new kakao.maps.LatLng(lat, lng));

      let polyline = null;
      let startMarker = null;
      let endMarker = null;

      if (linePath.length > 0) {
        polyline = new kakao.maps.Polyline({
          map,
          path: linePath,
          strokeWeight: 6,
          strokeColor: "#3b82f6",
          strokeOpacity: 0.9,
          strokeStyle: "solid"
        });

        startMarker = new kakao.maps.Marker({
          map,
          position: linePath[0],
          title: "출발"
        });

        endMarker = new kakao.maps.Marker({
          map,
          position: linePath[linePath.length - 1],
          title: "도착"
        });

        const bounds = new kakao.maps.LatLngBounds();
        linePath.forEach((pos) => bounds.extend(pos));
        map.setBounds(bounds);
      } else {
        map.setCenter(defaultCenter);
        map.setLevel(5);
      }

      mapInstances.set(ride.id, {
        map,
        polyline,
        startMarker,
        endMarker
      });

      setTimeout(() => {
        map.relayout();
        if (linePath.length > 0) {
          const bounds = new kakao.maps.LatLngBounds();
          linePath.forEach((pos) => bounds.extend(pos));
          map.setBounds(bounds);
        }
      }, 120);
    }

    function drawElevationChart(ride) {
      const canvas = document.getElementById(`elevation-${ride.id}`);
      if (!canvas) return;

      const profile = Array.isArray(ride.elevationProfile) ? ride.elevationProfile : [];
      if (profile.length < 2) return;

      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const cssWidth = canvas.clientWidth || 300;
      const cssHeight = canvas.clientHeight || 180;

      canvas.width = Math.floor(cssWidth * dpr);
      canvas.height = Math.floor(cssHeight * dpr);

      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, cssWidth, cssHeight);

      const padding = { top: 14, right: 12, bottom: 24, left: 40 };
      const chartW = cssWidth - padding.left - padding.right;
      const chartH = cssHeight - padding.top - padding.bottom;

      const elevations = profile.map(p => Number(p.elevation || 0));
      const distances = profile.map(p => Number(p.distanceKm || 0));

      const minE = Math.min(...elevations);
      const maxE = Math.max(...elevations);
      const maxD = Math.max(...distances, 0.1);

      let rangeE = maxE - minE;
      if (rangeE < 10) rangeE = 10;

      const viewMinE = minE - rangeE * 0.15;
      const viewMaxE = maxE + rangeE * 0.15;

      const x = (d) => padding.left + (d / maxD) * chartW;
      const y = (e) => padding.top + ((viewMaxE - e) / (viewMaxE - viewMinE)) * chartH;

      ctx.strokeStyle = "rgba(148,163,184,0.25)";
      ctx.lineWidth = 1;

      for (let i = 0; i < 4; i++) {
        const gy = padding.top + (chartH / 3) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, gy);
        ctx.lineTo(padding.left + chartW, gy);
        ctx.stroke();
      }

      ctx.fillStyle = "#94a3b8";
      ctx.font = "11px Arial";
      ctx.textAlign = "right";
      ctx.fillText(`${Math.round(viewMaxE)}m`, padding.left - 6, padding.top + 4);
      ctx.fillText(`${Math.round((viewMinE + viewMaxE) / 2)}m`, padding.left - 6, padding.top + chartH / 2 + 4);
      ctx.fillText(`${Math.round(viewMinE)}m`, padding.left - 6, padding.top + chartH + 4);

      ctx.textAlign = "center";
      ctx.fillText("0km", padding.left, cssHeight - 6);
      ctx.fillText(`${maxD.toFixed(1)}km`, padding.left + chartW, cssHeight - 6);

      ctx.beginPath();
      ctx.moveTo(x(distances[0]), y(elevations[0]));
      for (let i = 1; i < profile.length; i++) {
        ctx.lineTo(x(distances[i]), y(elevations[i]));
      }
      ctx.strokeStyle = "#60a5fa";
      ctx.lineWidth = 2.5;
      ctx.stroke();

      ctx.lineTo(padding.left + chartW, padding.top + chartH);
      ctx.lineTo(padding.left, padding.top + chartH);
      ctx.closePath();

      const fill = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
      fill.addColorStop(0, "rgba(96,165,250,0.35)");
      fill.addColorStop(1, "rgba(96,165,250,0.03)");
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function renderList() {
      const rides = loadSavedRides();
      const rideList = document.getElementById("rideList");
      rideList.innerHTML = "";

      if (!rides.length) {
        rideList.innerHTML = '<div class="empty">저장된 주행기록이 없습니다</div>';
        return;
      }

      rides.forEach((ride) => {
        const item = document.createElement("div");
        item.className = "item";
        if (ride.id === selectedRideId) item.classList.add("active");
        if (ride.id === expandedRideId) item.classList.add("expanded");

        const rideName = getRideName(ride);
        const isExpanded = ride.id === expandedRideId;

        item.innerHTML = `
          <div class="item-head">
            <div class="item-head-left">
              <div class="item-title-row">
                <div class="item-date">${formatDate(ride.savedAt)}</div>
                <div class="ride-name" data-id="${ride.id}">${rideName}</div>
              </div>
              <div class="item-meta">
                <span>거리 ${(Number(ride.totalDistanceM || 0) / 1000).toFixed(2)}km</span>
                <span>운행 ${formatTimeOnly(ride.startTime)}~${formatTimeOnly(ride.endTime || ride.savedAt)}</span>
                <span>소요 ${formatDuration(Number(ride.elapsedMs || 0))}</span>
                <span>휴식 ${formatDuration(Number(ride.restMs || 0))}</span>
                <span>평균 ${Number(ride.avgSpeedKmh || 0).toFixed(1)}km/h</span>
                <span>최고 ${Number(ride.maxSpeedKmh || 0).toFixed(1)}km/h</span>
              </div>
            </div>
            <div class="item-toggle">${isExpanded ? "접기 ▲" : "펼치기 ▼"}</div>
          </div>
          ${isExpanded ? buildDetailHtml(ride) : ""}
        `;

        let pressTimer = null;
        let longPressed = false;

        const rideNameEl = item.querySelector(".ride-name");

        if (rideNameEl) {
          rideNameEl.addEventListener("click", (e) => {
            e.stopPropagation();
            if (longPressed) return;
          });

          const startPress = (e) => {
            e.stopPropagation();
            longPressed = false;

            pressTimer = setTimeout(() => {
              longPressed = true;
              startTitleEdit(ride.id);
            }, 600);
          };

          const cancelPress = () => {
            if (pressTimer) clearTimeout(pressTimer);
          };

          rideNameEl.addEventListener("mousedown", startPress);
          rideNameEl.addEventListener("mouseup", cancelPress);
          rideNameEl.addEventListener("mouseleave", cancelPress);

          rideNameEl.addEventListener("touchstart", startPress);
          rideNameEl.addEventListener("touchend", cancelPress);
          rideNameEl.addEventListener("touchcancel", cancelPress);
        }

        item.addEventListener("click", () => {
          toggleRide(ride.id);
        });

        rideList.appendChild(item);
      });

      if (expandedRideId) {
        const expandedRide = rides.find(r => r.id === expandedRideId);
        if (expandedRide) {
          createMapForRide(expandedRide);
          setTimeout(() => drawElevationChart(expandedRide), 80);
        }
      }
    }

    function toggleRide(id) {
      if (expandedRideId === id) {
        destroyMapInstance(id);
        expandedRideId = null;
        selectedRideId = id;
        renderList();
        return;
      }

      if (expandedRideId) {
        destroyMapInstance(expandedRideId);
      }

      selectedRideId = id;
      expandedRideId = id;
      renderList();
    }

    function saveRideTitleInline(id, title) {
      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === id);
      if (!ride) return;

      const cleaned = String(title || "").trim().slice(0, 30);
      ride.title = cleaned || "주행기록";
      saveSavedRides(rides);

      selectedRideId = id;
      renderList();
    }

    function startTitleEdit(id) {
      const nameEl = document.querySelector(`.ride-name[data-id="${id}"]`);
      if (!nameEl) return;

      const oldTitle = nameEl.textContent.trim();
      const input = document.createElement("input");
      input.type = "text";
      input.value = oldTitle;
      input.maxLength = 30;
      input.className = "title-inline-input";
      input.setAttribute("data-id", id);

      nameEl.replaceWith(input);
      input.focus();
      input.select();

      const finish = () => {
        saveRideTitleInline(id, input.value);
      };

      input.addEventListener("click", (e) => e.stopPropagation());
      input.addEventListener("blur", finish, { once: true });
      input.addEventListener("keydown", (e) => {
        e.stopPropagation();
        if (e.key === "Enter") {
          input.blur();
        }
        if (e.key === "Escape") {
          renderList();
        }
      });
    }

    async function shareSelectedRide() {
      if (!selectedRideId) {
        alert("공유할 기록을 먼저 선택해주세요.");
        return;
      }

      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === selectedRideId);

      if (!ride) {
        alert("선택한 기록을 찾을 수 없습니다.");
        return;
      }

      if (!Array.isArray(ride.path) || ride.path.length < 2) {
        alert("공유할 경로 데이터가 부족합니다.");
        return;
      }

      if (ride.path.length > 5000) {
        alert("좌표 수가 너무 많아 공유할 수 없습니다.");
        return;
      }

      try {
        await ensureAuth();

        const createdAt = Date.now();
        const expireAt = createdAt + SHARE_EXPIRE_DAYS * 24 * 60 * 60 * 1000;

        const shareData = {
          createdAt,
          expireAt,
          savedAt: ride.savedAt || new Date().toISOString(),
          title: getRideName(ride),
          totalDistanceM: Number(ride.totalDistanceM || 0),
          elapsedMs: Number(ride.elapsedMs || 0),
          avgSpeedKmh: Number(ride.avgSpeedKmh || 0),
          maxSpeedKmh: Number(ride.maxSpeedKmh || 0),
          startPoint: ride.startPoint || null,
          startTime: ride.startTime || null,
          endTime: ride.endTime || null,
          restMs: Number(ride.restMs || 0),
          path: ride.path,
          elevationProfile: Array.isArray(ride.elevationProfile) ? ride.elevationProfile : [],
          elevationSummary: ride.elevationSummary || null
        };

        const newRef = push(ref(db, "sharedRides"));
        await set(newRef, shareData);

        const shareUrl =
          `${location.origin}${location.pathname.replace("ride-history.html", "ride-view.html")}?id=${newRef.key}`;

        const shareTitle = `${getRideName(ride)} 공유`;
        const shareText =
          `${getRideName(ride)}\n` +
          `거리 ${(Number(ride.totalDistanceM || 0) / 1000).toFixed(2)}km\n` +
          `평균 ${Number(ride.avgSpeedKmh || 0).toFixed(1)}km/h\n` +
          `최고 ${Number(ride.maxSpeedKmh || 0).toFixed(1)}km/h`;

        if (navigator.share) {
          try {
            await navigator.share({
              title: shareTitle,
              text: shareText,
              url: shareUrl
            });
            return;
          } catch (shareErr) {
            if (shareErr && shareErr.name === "AbortError") {
              return;
            }
            console.warn("navigator.share 실패, 복사 방식으로 전환:", shareErr);
          }
        }

        try {
          await navigator.clipboard.writeText(shareUrl);
          alert(`공유 링크가 복사되었습니다.\n\n${shareUrl}`);
        } catch (e) {
          prompt("아래 링크를 복사해서 보내주세요.", shareUrl);
        }
      } catch (err) {
        console.error(err);
        alert("공유 링크 생성 중 오류가 발생했습니다.");
      }
    }

    function deleteSelectedRide() {
      if (!selectedRideId) {
        alert("삭제할 기록을 먼저 선택해주세요.");
        return;
      }

      if (!confirm("선택한 주행기록을 삭제할까요?")) return;

      if (expandedRideId) {
        destroyMapInstance(expandedRideId);
      }

      const rides = loadSavedRides().filter(r => r.id !== selectedRideId);
      saveSavedRides(rides);

      if (expandedRideId === selectedRideId) {
        expandedRideId = null;
      }

      selectedRideId = null;
      renderList();
    }

    function saveSelectedRidePlaceholder() {
      if (!selectedRideId) {
        alert("저장할 기록을 먼저 선택해주세요.");
        return;
      }

      alert("선택기록 저장 기능은 다음 단계에서 연결합니다.");
    }

    function openAdminPlaceholder() {
      alert("관리자 비밀번호 변경 기능은 다음 단계에서 연결합니다.");
    }

    document.getElementById("rideBtn").addEventListener("click", () => {
      location.href = "./ride-map(kakaomap).html";
    });

    document.getElementById("batteryBtn").addEventListener("click", () => {
      location.href = "./index.html";
    });

    document.getElementById("shareBtn").addEventListener("click", shareSelectedRide);
    document.getElementById("deleteBtn").addEventListener("click", deleteSelectedRide);
    document.getElementById("saveBtn").addEventListener("click", saveSelectedRidePlaceholder);
    document.getElementById("adminBtn").addEventListener("click", openAdminPlaceholder);

    window.addEventListener("resize", () => {
      if (!expandedRideId) return;

      const instance = mapInstances.get(expandedRideId);
      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === expandedRideId);

      setTimeout(() => {
        if (instance) {
          instance.map.relayout();

          const path = Array.isArray(ride?.path) ? ride.path : [];
          if (path.length > 0) {
            const bounds = new kakao.maps.LatLngBounds();
            path.forEach(([lat, lng]) => bounds.extend(new kakao.maps.LatLng(lat, lng)));
            instance.map.setBounds(bounds);
          }
        }

        if (ride) {
          drawElevationChart(ride);
        }
      }, 80);
    });

    renderList();
  </script>
</body>
</html>
