<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주행기록 목록</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #121c34;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 10px 10px 14px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .panel {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.96));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      overflow: hidden;
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(30,41,59,0.6);
      cursor: pointer;
      transition: 0.15s ease;
    }

    .item.active {
      outline: 2px solid rgba(59,130,246,0.7);
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .item-title {
      font-weight: 900;
      font-size: 14px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      line-height: 1.35;
    }

    .detail-panel {
      padding-bottom: 0;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px 8px;
      background: rgba(30,41,59,0.6);
      text-align: center;
      min-height: 62px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
      line-height: 1.2;
    }

    .value {
      font-size: 14px;
      font-weight: 900;
      word-break: break-word;
      line-height: 1.25;
    }

    .map-wrap {
      margin-left: -12px;
      margin-right: -12px;
      margin-bottom: 0;
      margin-top: 4px;
    }

    #map {
      width: 100%;
      height: 500px;
      border-radius: 0 0 18px 18px;
      overflow: hidden;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 0;
    }

    @media (max-width: 900px) {
      .detail-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 6px 6px 10px;
      }

      .wrap {
        max-width: 100%;
        gap: 8px;
      }

      .panel {
        padding: 10px;
        border-radius: 16px;
      }

      .title {
        font-size: 20px;
      }

      .sub {
        font-size: 12px;
        margin-bottom: 8px;
      }

      .item {
        padding: 9px;
      }

      .item-title {
        font-size: 13px;
      }

      .item-meta {
        font-size: 11px;
        gap: 6px 8px;
      }

      .detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 8px;
      }

      .card {
        min-height: 56px;
        padding: 7px 6px;
      }

      .label {
        font-size: 10px;
        margin-bottom: 3px;
      }

      .value {
        font-size: 13px;
      }

      .map-wrap {
        margin-left: -10px;
        margin-right: -10px;
      }

      #map {
        height: 400px;
        border-radius: 0 0 16px 16px;
      }
    }

    @media (max-width: 420px) {
      .btn {
        height: 38px;
        font-size: 13px;
        padding: 0 12px;
      }

      .title {
        font-size: 18px;
      }

      .detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        min-height: 52px;
        padding: 6px 5px;
      }

      .label {
        font-size: 9px;
      }

      .value {
        font-size: 12px;
      }

      #map {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn" id="backRideBtn">주행화면</button>
      <button class="btn" id="backBatteryBtn">배터리 계산기</button>
      <button class="btn" id="deleteBtn">선택기록 삭제</button>
    </div>

    <div class="panel">
      <div class="title">주행기록 목록</div>
      <div class="sub">저장된 주행기록을 눌러 전체 이동 경로와 기본 정보를 확인합니다</div>
      <div class="list" id="rideList"></div>
    </div>

    <div class="panel detail-panel">
      <div class="title" id="detailTitle">상세 정보</div>

      <div class="detail-grid">
        <div class="card">
          <div class="label">저장 일시</div>
          <div class="value" id="savedAtEl">-</div>
        </div>
        <div class="card">
          <div class="label">총 거리</div>
          <div class="value" id="distanceEl">-</div>
        </div>
        <div class="card">
          <div class="label">총 시간</div>
          <div class="value" id="durationEl">-</div>
        </div>
        <div class="card">
          <div class="label">평균 속도</div>
          <div class="value" id="avgSpeedEl">-</div>
        </div>
        <div class="card">
          <div class="label">최고 속도</div>
          <div class="value" id="maxSpeedEl">-</div>
        </div>
        <div class="card">
          <div class="label">출발 위치</div>
          <div class="value" id="startPointEl">-</div>
        </div>
        <div class="card">
          <div class="label">좌표 개수</div>
          <div class="value" id="pointCountEl">-</div>
        </div>
      </div>

      <div class="map-wrap">
        <div id="map"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const SAVED_RIDES_KEY = "ebike_saved_rides_v1";
    let selectedRideId = null;

    function loadSavedRides() {
      try {
        return JSON.parse(localStorage.getItem(SAVED_RIDES_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveSavedRides(rides) {
      localStorage.setItem(SAVED_RIDES_KEY, JSON.stringify(rides));
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hh = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const mm = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const ss = String(totalSec % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${day} ${hh}:${mm}`;
    }

    const map = L.map("map").setView([35.180, 128.107], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const polyline = L.polyline([], {
      color: "#3b82f6",
      weight: 6,
      opacity: 0.9,
      lineJoin: "round",
      lineCap: "round"
    }).addTo(map);

    let startMarker = null;
    let endMarker = null;

    const rideList = document.getElementById("rideList");
    const detailTitle = document.getElementById("detailTitle");
    const savedAtEl = document.getElementById("savedAtEl");
    const distanceEl = document.getElementById("distanceEl");
    const durationEl = document.getElementById("durationEl");
    const avgSpeedEl = document.getElementById("avgSpeedEl");
    const maxSpeedEl = document.getElementById("maxSpeedEl");
    const startPointEl = document.getElementById("startPointEl");
    const pointCountEl = document.getElementById("pointCountEl");

    function clearDetail() {
      detailTitle.textContent = "상세 정보";
      savedAtEl.textContent = "-";
      distanceEl.textContent = "-";
      durationEl.textContent = "-";
      avgSpeedEl.textContent = "-";
      maxSpeedEl.textContent = "-";
      startPointEl.textContent = "-";
      pointCountEl.textContent = "-";
      polyline.setLatLngs([]);

      if (startMarker) map.removeLayer(startMarker);
      if (endMarker) map.removeLayer(endMarker);
      startMarker = null;
      endMarker = null;

      map.setView([35.180, 128.107], 13);
      setTimeout(() => map.invalidateSize(), 50);
    }

    function renderList() {
      const rides = loadSavedRides();
      rideList.innerHTML = "";

      if (!rides.length) {
        rideList.innerHTML = '<div class="empty">저장된 주행기록이 없습니다</div>';
        clearDetail();
        return;
      }

      rides.forEach((ride) => {
        const item = document.createElement("div");
        item.className = "item";
        if (ride.id === selectedRideId) item.classList.add("active");

        item.innerHTML = `
          <div class="item-head">
            <div class="item-title">${formatDate(ride.savedAt)}</div>
          </div>
          <div class="item-meta">
            <span>거리 ${(ride.totalDistanceM / 1000).toFixed(2)} km</span>
            <span>시간 ${formatDuration(ride.elapsedMs)}</span>
            <span>평균 ${Number(ride.avgSpeedKmh || 0).toFixed(1)} km/h</span>
            <span>최고 ${Number(ride.maxSpeedKmh || 0).toFixed(1)} km/h</span>
          </div>
        `;

        item.addEventListener("click", () => showRide(ride.id));
        rideList.appendChild(item);
      });
    }

    function showRide(id) {
      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === id);
      if (!ride) return;

      selectedRideId = id;
      renderList();

      detailTitle.textContent = `상세 정보 · ${formatDate(ride.savedAt)}`;
      savedAtEl.textContent = formatDate(ride.savedAt);
      distanceEl.textContent = `${(ride.totalDistanceM / 1000).toFixed(2)} km`;
      durationEl.textContent = formatDuration(ride.elapsedMs);
      avgSpeedEl.textContent = `${Number(ride.avgSpeedKmh || 0).toFixed(1)} km/h`;
      maxSpeedEl.textContent = `${Number(ride.maxSpeedKmh || 0).toFixed(1)} km/h`;
      startPointEl.textContent = ride.startPoint
        ? `${ride.startPoint.lat.toFixed(5)}, ${ride.startPoint.lng.toFixed(5)}`
        : "-";
      pointCountEl.textContent = Array.isArray(ride.path) ? String(ride.path.length) : "0";

      polyline.setLatLngs(Array.isArray(ride.path) ? ride.path : []);

      if (startMarker) map.removeLayer(startMarker);
      if (endMarker) map.removeLayer(endMarker);
      startMarker = null;
      endMarker = null;

      if (ride.path && ride.path.length > 0) {
        startMarker = L.marker(ride.path[0]).addTo(map).bindPopup("출발");
        endMarker = L.marker(ride.path[ride.path.length - 1]).addTo(map).bindPopup("도착");

        setTimeout(() => {
          map.invalidateSize();
          map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
        }, 100);
      } else {
        map.setView([35.180, 128.107], 13);
        setTimeout(() => map.invalidateSize(), 100);
      }
    }

    document.getElementById("backRideBtn").addEventListener("click", () => {
      location.href = "./ride-map.html";
    });

    document.getElementById("backBatteryBtn").addEventListener("click", () => {
      location.href = "./index.html";
    });

    document.getElementById("deleteBtn").addEventListener("click", () => {
      if (!selectedRideId) {
        alert("삭제할 기록을 먼저 선택해주세요.");
        return;
      }

      if (!confirm("선택한 주행기록을 삭제할까요?")) return;

      const rides = loadSavedRides().filter(r => r.id !== selectedRideId);
      saveSavedRides(rides);
      selectedRideId = null;
      renderList();
    });

    renderList();
    const rides = loadSavedRides();
    if (rides.length) {
      showRide(rides[0].id);
    } else {
      clearDetail();
    }

    window.addEventListener("resize", () => {
      setTimeout(() => map.invalidateSize(), 80);
    });
  </script>
</body>
</html>
