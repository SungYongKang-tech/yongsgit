<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주행기록 목록</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #121c34;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --blue2: #1d4ed8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 10px 10px 14px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn.share {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
    }

    .panel {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.96));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      overflow: hidden;
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(30,41,59,0.6);
      cursor: pointer;
      transition: 0.15s ease;
    }

    .item.active {
      outline: 2px solid rgba(59,130,246,0.7);
      background: rgba(37,99,235,0.14);
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .item-head-left {
      min-width: 0;
      flex: 1;
    }

    .item-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .item-date {
      font-weight: 900;
      font-size: 14px;
    }

    .ride-name {
      font-size: 13px;
      font-weight: 800;
      color: #bfdbfe;
      background: rgba(37,99,235,0.18);
      border: 1px solid rgba(59,130,246,0.32);
      border-radius: 999px;
      padding: 3px 9px;
      max-width: 100%;
      word-break: break-word;
    }

    .item-toggle {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      line-height: 1.35;
    }

    .detail-wrap {
      margin-top: 8px;
      display: none;
    }

    .item.expanded .detail-wrap {
      display: block;
    }

    .detail-inner {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 10px;
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 16px;
      font-weight: 900;
      min-width: 0;
    }

    .name-edit-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .name-input {
      flex: 1;
      min-width: 180px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15,23,42,0.9);
      color: #fff;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }

    .save-name-btn {
      height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--blue), var(--blue2));
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px 8px;
      background: rgba(30,41,59,0.6);
      text-align: center;
      min-height: 62px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
      line-height: 1.2;
    }

    .value {
      font-size: 14px;
      font-weight: 900;
      word-break: break-word;
      line-height: 1.25;
    }

    .map-wrap {
      margin-top: 4px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .ride-map {
      width: 100%;
      height: 360px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 0;
    }

    @media (max-width: 900px) {
      .detail-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 6px 6px 10px;
      }

      .wrap {
        max-width: 100%;
        gap: 8px;
      }

      .panel {
        padding: 10px;
        border-radius: 16px;
      }

      .title {
        font-size: 20px;
      }

      .sub {
        font-size: 12px;
        margin-bottom: 8px;
      }

      .item {
        padding: 9px;
      }

      .item-date {
        font-size: 13px;
      }

      .ride-name {
        font-size: 12px;
      }

      .item-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 3칸씩 2줄 */
  gap: 4px 8px;
}

      .detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 8px;
      }

      .card {
        min-height: 56px;
        padding: 7px 6px;
      }

      .label {
        font-size: 10px;
        margin-bottom: 3px;
      }

      .value {
        font-size: 13px;
      }

      .ride-map {
        height: 300px;
      }
    }

    @media (max-width: 420px) {
      .btn {
        height: 38px;
        font-size: 13px;
        padding: 0 12px;
      }

      .title {
        font-size: 18px;
      }

      .detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        min-height: 52px;
        padding: 6px 5px;
      }

      .label {
        font-size: 9px;
      }

      .value {
        font-size: 12px;
      }

      .ride-map {
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn" id="backRideBtn">주행화면</button>
      <button class="btn" id="backBatteryBtn">배터리 계산기</button>
      <button class="btn share" id="shareBtn">선택기록 공유</button>
      <button class="btn" id="deleteBtn">선택기록 삭제</button>
    </div>

    <div class="panel">
      <div class="title">주행기록 목록</div>
      <div class="sub">기록을 누르면 상세정보와 지도가 펼쳐집니다. 제목도 직접 저장할 수 있습니다.</div>
      <div class="list" id="rideList"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ2DvuwcyIctktubn7LlfJRP0hHfXfnCU",
      authDomain: "personal-51db3.firebaseapp.com",
      databaseURL: "https://personal-51db3-default-rtdb.firebaseio.com",
      projectId: "personal-51db3",
      storageBucket: "personal-51db3.firebasestorage.app",
      messagingSenderId: "146076749227",
      appId: "1:146076749227:web:2043208d688e60504816ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const SAVED_RIDES_KEY = "ebike_saved_rides_v1";
    const SHARE_EXPIRE_DAYS = 3;

    let selectedRideId = null;
    let expandedRideId = null;
    const mapInstances = new Map();

    async function ensureAuth() {
      if (auth.currentUser) return auth.currentUser;
      const cred = await signInAnonymously(auth);
      return cred.user;
    }

    function loadSavedRides() {
      try {
        const rides = JSON.parse(localStorage.getItem(SAVED_RIDES_KEY) || "[]");
        return Array.isArray(rides) ? rides : [];
      } catch (e) {
        return [];
      }
    }

    function saveSavedRides(rides) {
      localStorage.setItem(SAVED_RIDES_KEY, JSON.stringify(rides));
    }

    function getRideName(ride) {
      const name = String(ride?.title || "").trim();
      return name || "주행기록";
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hh = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const mm = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const ss = String(totalSec % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${day} ${hh}:${mm}`;
    }

    function formatTimeOnly(value) {
  if (!value) return "--:--";
  const d = new Date(value);
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  return `${hh}:${mm}`;
}

    function getShareExpireText() {
      return `${SHARE_EXPIRE_DAYS}일`;
    }

    function buildDetailHtml(ride) {
      const safeName = escapeHtml(getRideName(ride));
      const safeDate = escapeHtml(formatDate(ride.savedAt));
      const safeDistance = `${(Number(ride.totalDistanceM || 0) / 1000).toFixed(2)} km`;
      const safeDuration = formatDuration(Number(ride.elapsedMs || 0));
      const safeAvg = `${Number(ride.avgSpeedKmh || 0).toFixed(1)} km/h`;
      const safeMax = `${Number(ride.maxSpeedKmh || 0).toFixed(1)} km/h`;
      const safeStartPoint = ride.startPoint
        ? `${ride.startPoint.lat.toFixed(5)}, ${ride.startPoint.lng.toFixed(5)}`
        : "-";
      const safePointCount = Array.isArray(ride.path) ? String(ride.path.length) : "0";

      return `
        <div class="detail-wrap">
          <div class="detail-inner">
            <div class="detail-top">
              <div class="detail-title">${safeDate} · ${safeName}</div>
            </div>

            <div class="name-edit-row">
              <input
                class="name-input"
                type="text"
                value="${safeName}"
                maxlength="30"
                placeholder="예: 출근, 퇴근, 제주 라이딩"
                data-role="title-input"
                data-ride-id="${ride.id}"
              />
              <button class="save-name-btn" data-role="save-title" data-ride-id="${ride.id}">제목 저장</button>
            </div>

            <div class="detail-grid">
              <div class="card">
                <div class="label">저장 일시</div>
                <div class="value">${safeDate}</div>
              </div>
              <div class="card">
                <div class="label">제목</div>
                <div class="value">${safeName}</div>
              </div>
              <div class="card">
                <div class="label">총 거리</div>
                <div class="value">${safeDistance}</div>
              </div>
              <div class="card">
                <div class="label">총 시간</div>
                <div class="value">${safeDuration}</div>
              </div>
              <div class="card">
                <div class="label">평균 속도</div>
                <div class="value">${safeAvg}</div>
              </div>
              <div class="card">
                <div class="label">최고 속도</div>
                <div class="value">${safeMax}</div>
              </div>
              <div class="card">
                <div class="label">출발 위치</div>
                <div class="value">${escapeHtml(safeStartPoint)}</div>
              </div>
              <div class="card">
                <div class="label">좌표 개수</div>
                <div class="value">${safePointCount}</div>
              </div>
              <div class="card">
                <div class="label">공유 만료</div>
                <div class="value">${getShareExpireText()}</div>
              </div>
            </div>

            <div class="map-wrap">
              <div class="ride-map" id="map-${ride.id}"></div>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function destroyMapInstance(rideId) {
      const existing = mapInstances.get(rideId);
      if (!existing) return;
      existing.map.remove();
      mapInstances.delete(rideId);
    }

    function createMapForRide(ride) {
      const mapEl = document.getElementById(`map-${ride.id}`);
      if (!mapEl) return;

      destroyMapInstance(ride.id);

      const map = L.map(mapEl).setView([35.180, 128.107], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      const path = Array.isArray(ride.path) ? ride.path : [];

      const polyline = L.polyline(path, {
        color: "#3b82f6",
        weight: 6,
        opacity: 0.9,
        lineJoin: "round",
        lineCap: "round"
      }).addTo(map);

      let startMarker = null;
      let endMarker = null;

      if (path.length > 0) {
        startMarker = L.marker(path[0]).addTo(map).bindPopup("출발");
        endMarker = L.marker(path[path.length - 1]).addTo(map).bindPopup("도착");

        setTimeout(() => {
          map.invalidateSize();
          if (polyline.getBounds().isValid()) {
            map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
          }
        }, 120);
      } else {
        setTimeout(() => {
          map.invalidateSize();
          map.setView([35.180, 128.107], 13);
        }, 120);
      }

      mapInstances.set(ride.id, { map, polyline, startMarker, endMarker });
    }

    function renderList() {
      const rides = loadSavedRides();
      const rideList = document.getElementById("rideList");
      rideList.innerHTML = "";

      if (!rides.length) {
        rideList.innerHTML = '<div class="empty">저장된 주행기록이 없습니다</div>';
        return;
      }

      rides.forEach((ride) => {
        const item = document.createElement("div");
        item.className = "item";
        if (ride.id === selectedRideId) item.classList.add("active");
        if (ride.id === expandedRideId) item.classList.add("expanded");

        const rideName = getRideName(ride);
        const isExpanded = ride.id === expandedRideId;

        item.innerHTML = `
          <div class="item-head">
            <div class="item-head-left">
              <div class="item-title-row">
                <div class="item-date">${formatDate(ride.savedAt)}</div>
                <div class="ride-name">${escapeHtml(rideName)}</div>
              </div>
              <div class="item-meta">
  <span>거리 ${(Number(ride.totalDistanceM || 0) / 1000).toFixed(2)} km</span>
  <span>운행 ${formatTimeOnly(ride.startTime)}~${formatTimeOnly(ride.endTime || ride.savedAt)}</span>
  <span>소요 ${formatDuration(Number(ride.elapsedMs || 0))}</span>
  <span>휴식 ${formatDuration(Number(ride.restMs || 0))}</span>
  <span>평균 ${Number(ride.avgSpeedKmh || 0).toFixed(1)} km/h</span>
  <span>최고 ${Number(ride.maxSpeedKmh || 0).toFixed(1)} km/h</span>
</div>
            </div>
            <div class="item-toggle">${isExpanded ? "접기 ▲" : "펼치기 ▼"}</div>
          </div>
          ${isExpanded ? buildDetailHtml(ride) : ""}
        `;

        item.addEventListener("click", (e) => {
          const role = e.target?.dataset?.role;
          if (role === "save-title") return;
          if (e.target?.closest(".name-input")) return;
          toggleRide(ride.id);
        });

        rideList.appendChild(item);
      });

      if (expandedRideId) {
        const expandedRide = rides.find(r => r.id === expandedRideId);
        if (expandedRide) {
          createMapForRide(expandedRide);

          const saveBtn = document.querySelector(`[data-role="save-title"][data-ride-id="${expandedRide.id}"]`);
          const inputEl = document.querySelector(`[data-role="title-input"][data-ride-id="${expandedRide.id}"]`);

          if (saveBtn && inputEl) {
            saveBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              saveRideTitle(expandedRide.id, inputEl.value);
            });

            inputEl.addEventListener("click", (e) => e.stopPropagation());
            inputEl.addEventListener("keydown", (e) => {
              e.stopPropagation();
              if (e.key === "Enter") {
                saveRideTitle(expandedRide.id, inputEl.value);
              }
            });
          }
        }
      }
    }

    function toggleRide(id) {
      if (expandedRideId === id) {
        destroyMapInstance(id);
        expandedRideId = null;
        selectedRideId = id;
        renderList();
        return;
      }

      if (expandedRideId) {
        destroyMapInstance(expandedRideId);
      }

      selectedRideId = id;
      expandedRideId = id;
      renderList();
    }

    function saveRideTitle(id, title) {
      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === id);
      if (!ride) return;

      const cleaned = String(title || "").trim().slice(0, 30);
      ride.title = cleaned || "주행기록";

      saveSavedRides(rides);
      selectedRideId = id;
      expandedRideId = id;
      renderList();
    }

    async function shareSelectedRide() {
      if (!selectedRideId) {
        alert("공유할 기록을 먼저 선택해주세요.");
        return;
      }

      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === selectedRideId);

      if (!ride) {
        alert("선택한 기록을 찾을 수 없습니다.");
        return;
      }

      if (!Array.isArray(ride.path) || ride.path.length < 2) {
        alert("공유할 경로 데이터가 부족합니다.");
        return;
      }

      if (ride.path.length > 5000) {
        alert("좌표 수가 너무 많아 공유할 수 없습니다.");
        return;
      }

      try {
        await ensureAuth();

        const createdAt = Date.now();
        const expireAt = createdAt + SHARE_EXPIRE_DAYS * 24 * 60 * 60 * 1000;

        const shareData = {
          createdAt,
          expireAt,
          savedAt: ride.savedAt || new Date().toISOString(),
          title: getRideName(ride),
          totalDistanceM: Number(ride.totalDistanceM || 0),
          elapsedMs: Number(ride.elapsedMs || 0),
          avgSpeedKmh: Number(ride.avgSpeedKmh || 0),
          maxSpeedKmh: Number(ride.maxSpeedKmh || 0),
          startPoint: ride.startPoint || null,
          path: ride.path
        };

        const newRef = push(ref(db, "sharedRides"));
        await set(newRef, shareData);

        const shareUrl =
          `${location.origin}${location.pathname.replace("ride-history.html", "ride-view.html")}?id=${newRef.key}`;

        try {
          await navigator.clipboard.writeText(shareUrl);
          alert(`공유 링크가 복사되었습니다.\n\n${shareUrl}\n\n${SHARE_EXPIRE_DAYS}일 후 만료됩니다.`);
        } catch (e) {
          prompt("아래 링크를 복사해서 보내주세요.", shareUrl);
        }
      } catch (err) {
        console.error(err);
        alert("공유 링크 생성 중 오류가 발생했습니다.");
      }
    }

    document.getElementById("backRideBtn").addEventListener("click", () => {
      location.href = "./ride-map.html";
    });

    document.getElementById("backBatteryBtn").addEventListener("click", () => {
      location.href = "./index.html";
    });

    document.getElementById("shareBtn").addEventListener("click", shareSelectedRide);

    document.getElementById("deleteBtn").addEventListener("click", () => {
      if (!selectedRideId) {
        alert("삭제할 기록을 먼저 선택해주세요.");
        return;
      }

      if (!confirm("선택한 주행기록을 삭제할까요?")) return;

      if (expandedRideId) {
        destroyMapInstance(expandedRideId);
      }

      const rides = loadSavedRides().filter(r => r.id !== selectedRideId);
      saveSavedRides(rides);

      if (expandedRideId === selectedRideId) {
        expandedRideId = null;
      }

      selectedRideId = null;
      renderList();
    });

    window.addEventListener("resize", () => {
      if (!expandedRideId) return;
      const instance = mapInstances.get(expandedRideId);
      if (!instance) return;
      setTimeout(() => instance.map.invalidateSize(), 80);
    });

    renderList();
  </script>
</body>
</html>
