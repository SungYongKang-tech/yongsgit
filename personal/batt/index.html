<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>배터리 계산기</title>

<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app {
  width:100%;
  max-width:420px;
}

.screen {
  background:#111827;
  padding:20px;
  border-radius:20px;
  margin-bottom:10px;
}

.title {
  text-align:center;
  font-size:18px;
  margin-bottom:10px;
}

.percent-label {
  text-align:center;
  font-size:14px;
  color:#94a3b8;
}

.percent {
  text-align:center;
  font-size:70px;
  font-weight:800;
}

.row {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:18px;
}

.numpad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

button {
  height:70px;
  font-size:24px;
  border:none;
  border-radius:15px;
  background:#1f2937;
  color:white;
}

button:active {
  background:#374151;
}

.clear {
  background:#ef4444;
}
</style>
</head>

<body>

<div class="app">

  <div class="screen">
    <div class="title">배터리 계산기</div>

    <div class="percent-label">남은 전력량</div>
    <div class="percent" id="percent">0.0%</div>

    <div class="row">
      <div>현재 전압</div>
      <div id="voltage">0.0V</div>
    </div>

    <div class="row">
      <div>이동가능 거리</div>
      <div id="distance">0.0Km</div>
    </div>

    <div class="row">
      <div>95% 충전시 소모시간</div>
      <div id="time">0시간 0분</div>
    </div>

    <div class="row">
      <div>충전완료 예상</div>
      <div id="endTime">--:--</div>
    </div>

  </div>

  <div class="numpad">
    <button data-key="1">1</button>
    <button data-key="2">2</button>
    <button data-key="3">3</button>
    <button data-key="4">4</button>
    <button data-key="5">5</button>
    <button data-key="6">6</button>
    <button data-key="7">7</button>
    <button data-key="8">8</button>
    <button data-key="9">9</button>
    <button class="clear" data-action="clear">C</button>
    <button data-key="0">0</button>
    <button data-key=".">.</button>
  </div>

</div>

<script>
const MIN_V = 42.0;
const MAX_V = 54.8;
const FULL_AH = 20;
const CHARGER_A = 3;

// 🔥 95% 기준
const TARGET_AH = FULL_AH * 0.95;

// 이동거리 (완충 기준)
const FULL_DISTANCE = 80;

let input = "";

const voltageEl = document.getElementById("voltage");
const percentEl = document.getElementById("percent");
const distanceEl = document.getElementById("distance");
const timeEl = document.getElementById("time");
const endTimeEl = document.getElementById("endTime");

function formatTime(h) {
  let min = Math.round(h * 60);
  let hh = Math.floor(min / 60);
  let mm = min % 60;
  return `${hh}시간 ${mm}분`;
}

function formatClock(date, hours) {
  let now = new Date();

  let h = date.getHours().toString().padStart(2,"0");
  let m = date.getMinutes().toString().padStart(2,"0");

  let isTomorrow =
    date.getDate() !== now.getDate() ||
    date.getMonth() !== now.getMonth() ||
    date.getFullYear() !== now.getFullYear();

  let timeText = isTomorrow ? `내일 ${h}:${m}` : `${h}:${m}`;

  return `${timeText} (${formatTime(hours)} 후)`;
}

function update() {
  if (input === "") {
    voltageEl.textContent = "0.0V";
    percentEl.textContent = "0.0%";
    distanceEl.textContent = "0.0Km";
    timeEl.textContent = "0시간 0분";
    endTimeEl.textContent = "--:--";
    percentEl.style.color = "white";
    return;
  }

  let v = parseFloat(input);
  if (isNaN(v)) return;

  let percent = ((v - MIN_V) / (MAX_V - MIN_V)) * 100;
  percent = Math.max(0, Math.min(100, percent));

  let currentAh = FULL_AH * (percent / 100);
  let needAh = Math.max(0, TARGET_AH - currentAh);
  let hours = needAh / CHARGER_A;

  let distance = FULL_DISTANCE * (percent / 100);

  // 🔴 잔량 색상
  if (percent <= 20) {
    percentEl.style.color = "#ef4444";
  } else if (percent <= 50) {
    percentEl.style.color = "#f59e0b";
  } else {
    percentEl.style.color = "#22c55e";
  }

  // ⏰ 종료시간 계산
  let now = new Date();
  let end = new Date(now.getTime() + hours * 60 * 60 * 1000);

  voltageEl.textContent = v.toFixed(1) + "V";
  percentEl.textContent = percent.toFixed(1) + "%";
  distanceEl.textContent = distance.toFixed(1) + "Km";
  timeEl.textContent = formatTime(hours);
  endTimeEl.textContent = formatClock(end, hours);
}

document.querySelectorAll("button").forEach(btn => {
  btn.onclick = () => {
    const key = btn.dataset.key;
    const action = btn.dataset.action;

    if (key) {
      if (key === "." && input.includes(".")) return;
      input += key;
      update();
    }

    if (action === "clear") {
      input = "";
      update();
    }
  };
});

update();
</script>

</body>
</html>
