<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>배터리 계산기</title>
  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #121c34;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --shadow: 0 18px 40px rgba(0,0,0,0.34);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: calc(18px + env(safe-area-inset-top)) 10px calc(14px + env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .screen {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.96));
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .title-wrap {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 27px;
      font-weight: 900;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }

    .model-name {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.45;
      word-break: break-word;
    }

    .header-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(59,130,246,0.14);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(59,130,246,0.18);
    }

    .badge.gray {
      background: rgba(148,163,184,0.12);
      color: #e2e8f0;
      border-color: rgba(148,163,184,0.16);
    }

    .top-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
      width: 176px;
    }
    .admin-btn {
      flex: 1 1 0;
      min-width: 0;
      height: 34px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    .admin-btn:active,
    .charge-btn:active,
    .preset-btn:active,
    .modal-actions button:active,
    button.key:active {
      transform: translateY(1px) scale(0.99);
    }

    .admin-btn:disabled,
    .charge-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(30,41,59,0.9), rgba(15,23,42,0.8));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 10px 10px;
      margin-bottom: 6px;
    }

    .percent-label {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .percent-row {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 10px;
    }

    .percent {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 0.95;
      transition: color 0.2s ease;
    }

    .percent-time {
      font-size: 26px;
      font-weight: 900;
      color: #93c5fd;
      line-height: 1.1;
      padding-bottom: 6px;
    }

    .battery-visual {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .battery-shell {
      flex: 1;
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .battery-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ef4444 0%, #f59e0b 45%, #22c55e 100%);
      transition: width 0.35s ease;
    }

    .battery-cap {
      width: 8px;
      height: 10px;
      border-radius: 3px;
      background: rgba(255,255,255,0.28);
    }

    .slider-input-wrap {
      margin-bottom: 10px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(15,23,42,0.85), rgba(2,6,23,0.7));
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .slider-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .slider-title {
      font-size: 14px;
      color: #e2e8f0;
      font-weight: 800;
    }

    .slider-value {
      font-size: 24px;
      font-weight: 900;
      color: var(--green);
      min-width: 68px;
      text-align: right;
    }

    .slider-track-wrap {
      position: relative;
      padding: 6px 0;
    }

    .slider-track-wrap::before {
      content: "";
      position: absolute;
      inset: 50% 0 auto 0;
      transform: translateY(-50%);
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(to right, #ef4444 0%, #ef4444 20%, #f97316 20%, #f97316 40%, #f59e0b 40%, #f59e0b 60%, #84cc16 60%, #84cc16 80%, #22c55e 80%, #22c55e 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      z-index: 0;
      pointer-events: none;
    }

    .slider-track-wrap .slider-segments {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .slider-track-wrap .slider-segments span {
      position: absolute;
      top: 50%;
      width: 2px;
      height: 20px;
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
      transform: translate(-50%, -50%);
    }

    .slider-track-wrap .slider-segments span:nth-child(1) { left: 20%; }
    .slider-track-wrap .slider-segments span:nth-child(2) { left: 40%; }
    .slider-track-wrap .slider-segments span:nth-child(3) { left: 60%; }
    .slider-track-wrap .slider-segments span:nth-child(4) { left: 80%; }

    #percentSlider {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 36px;
      margin: 0;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    #percentSlider:focus { outline: none; }

    #percentSlider::-webkit-slider-runnable-track,
    #percentSlider::-moz-range-track {
      height: 14px;
      background: transparent;
      border-radius: 999px;
    }

    #percentSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid #1d4ed8;
      margin-top: -7px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.32);
      cursor: pointer;
    }

    #percentSlider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid #1d4ed8;
      box-shadow: 0 4px 10px rgba(0,0,0,0.32);
      cursor: pointer;
    }

    .slider-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }

    .charge-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0 8px;
    }

    .charge-btn {
      height: 48px;
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .charge-btn.start { background: linear-gradient(180deg, #22c55e, #16a34a); }
    .charge-btn.start.charging { background: linear-gradient(180deg, #0ea5e9, #2563eb); }
    .charge-btn.stop { background: linear-gradient(180deg, #ef4444, #dc2626); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(30,41,59,0.78), rgba(15,23,42,0.72));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      min-width: 0;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
      line-height: 1.35;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
      word-break: break-word;
      letter-spacing: -0.3px;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 2px;
    }

    button.key {
      height: 52px;
      font-size: 25px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      color: white;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(55,65,81,0.98), rgba(31,41,55,0.98));
      box-shadow: 0 8px 18px rgba(0,0,0,0.26);
      font-weight: 900;
    }

    .clear {
      background: linear-gradient(180deg, #ef4444, #dc2626) !important;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,0.74);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, rgba(17,24,39,0.98), rgba(15,23,42,0.98));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      max-height: 90dvh;
      overflow: auto;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 20px;
      letter-spacing: -0.3px;
    }

    .preset-wrap {
      margin-bottom: 14px;
      padding: 12px;
      background: rgba(15,23,42,0.72);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .preset-title {
      font-size: 13px;
      color: #dbeafe;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .preset-btn {
      height: 44px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(37,99,235,0.2);
    }

    .field {
      margin-bottom: 13px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 7px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(15,23,42,0.92);
      color: #fff;
      padding: 0 13px;
      font-size: 15px;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(59,130,246,0.55);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.16);
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-actions button {
      height: 46px;
      border: none;
      border-radius: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    .save-btn { background: linear-gradient(180deg, #22c55e, #16a34a); color: #fff; }
    .close-btn { background: linear-gradient(180deg, #475569, #334155); color: #fff; }

    .small-note {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(18px);
      background: linear-gradient(180deg, #22c55e, #16a34a);
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 16px 28px rgba(0,0,0,0.34);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 2000;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 360px) {
      .title { font-size: 24px; }
      .percent { font-size: 46px; }
      .percent-time { font-size: 22px; }
      .stat-value { font-size: 19px; }
      button.key { height: 50px; font-size: 22px; }
      .top-actions { width: 160px; }
    }

    @media (max-height: 760px) {
      body { padding-top: 14px; }
      .screen { padding: 12px; }
      .hero-card { padding: 8px 6px; }
      .percent { font-size: 46px; }
      .percent-time { font-size: 24px; }
      .charge-btn { height: 44px; }
      .stat-card { padding: 8px; }
      .stat-value { font-size: 19px; }
      button.key { height: 50px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="screen">
    <div class="title-row">
      <div class="title-wrap">
        <div class="title">배터리 계산기</div>
        <div class="model-name" id="modelNameDisplay"></div>
        
      </div>
<div class="top-actions">
  <button class="admin-btn" id="rideMapBtn1">주행1</button>
  <button class="admin-btn" id="rideMapBtn2">주행2</button>
  <button class="admin-btn" id="shareBtn">공유</button>
  <button class="admin-btn" id="saveBtn">저장</button>
  <button class="admin-btn" id="openAdminBtn">관리자</button>
</div>
</div>
    <div class="slider-input-wrap" id="sliderInputWrap" style="display:none;">
      <div class="slider-top-row">
        <div class="slider-title">배터리 잔량 직접 선택</div>
        <div class="slider-value"><span id="sliderPercentValue">0</span>%</div>
      </div>

      <div class="slider-track-wrap">
        <div class="slider-segments">
          <span></span><span></span><span></span><span></span>
        </div>
        <input type="range" id="percentSlider" min="0" max="100" step="1" value="0" />
      </div>

      <div class="slider-scale">
        <span>0%</span><span>20%</span><span>40%</span><span>60%</span><span>80%</span><span>100%</span>
      </div>
    </div>

    <div class="hero-card">
      <div class="percent-label">남은 전력량 · 현재 시각</div>
      <div class="percent-row">
        <div class="percent" id="percent">0.0%</div>
        <div class="percent-time" id="currentTime">--:--</div>
      </div>

      <div class="battery-visual">
        <div class="battery-shell"><div class="battery-fill" id="batteryFill"></div></div>
        <div class="battery-cap"></div>
      </div>
    </div>

    <div class="charge-controls">
      <button class="charge-btn start" id="startChargeBtn">충전 시작</button>
      <button class="charge-btn stop" id="stopChargeBtn" disabled>충전 종료</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">현재 전압</div>
        <div class="stat-value" id="voltage">0.0V</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">이동가능 거리</div>
        <div class="stat-value" id="distance">0.0Km</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" id="timeLabel">95% 충전시 소모시간</div>
        <div class="stat-value" id="time">0시간 0분</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">충전 완료 시각</div>
        <div class="stat-value" id="endTime">--:--</div>
      </div>
    </div>
  </div>

  <div class="numpad" id="numpad">
    <button class="key" data-key="1">1</button>
    <button class="key" data-key="2">2</button>
    <button class="key" data-key="3">3</button>
    <button class="key" data-key="4">4</button>
    <button class="key" data-key="5">5</button>
    <button class="key" data-key="6">6</button>
    <button class="key" data-key="7">7</button>
    <button class="key" data-key="8">8</button>
    <button class="key" data-key="9">9</button>
    <button class="key clear" data-action="clear">C</button>
    <button class="key" data-key="0">0</button>
    <button class="key" data-key=".">.</button>
  </div>
</div>

<div class="modal-backdrop" id="adminModal">
  <div class="modal">
    <h2>관리자 설정</h2>

    <div class="preset-wrap">
      <div class="preset-title">모델 선택</div>
      <div class="field" style="margin-bottom:10px;">
        <label for="presetSelect">전기자전거 모델 선택</label>
        <select id="presetSelect">
          <option value="">직접 입력</option>
          <option value="extron">퀄리 엑스트론 프로 맥스</option>
          <option value="cube500">큐브 컴팩트 500</option>
          <option value="vectronS10">벡트론 S10</option>
        </select>
      </div>

      <div class="preset-title">기존 자전거 값 불러오기</div>
      <div class="preset-buttons">
        <button type="button" class="preset-btn" id="presetExtronBtn">퀄리 엑스트론</button>
        <button type="button" class="preset-btn" id="presetCubeBtn">큐브 컴팩트 500</button>
        <button type="button" class="preset-btn" id="presetVectronBtn">벡트론 S10</button>
      </div>
    </div>

    <div class="field">
      <label>전기자전거 모델명</label>
      <input type="text" id="modelNameInput" />
    </div>

    <div class="field">
      <label>입력 방식</label>
      <select id="inputTypeInput">
        <option value="voltage">전압 입력</option>
        <option value="slider">슬라이드 입력</option>
      </select>
    </div>

    <div class="field">
      <label>최소 전압 (0%)</label>
      <input type="number" step="0.1" id="minVInput" />
    </div>

    <div class="field">
      <label>최대 전압 (100%)</label>
      <input type="number" step="0.1" id="maxVInput" />
    </div>

    <div class="field">
      <label>배터리 용량 (Ah)</label>
      <input type="number" step="0.1" id="fullAhInput" />
    </div>

    <div class="field">
      <label>충전기 전류 (A)</label>
      <input type="number" step="0.1" id="chargerAInput" />
    </div>

    <div class="field">
      <label>목표 충전율 (%)</label>
      <input type="number" step="1" id="targetPercentInput" />
    </div>

    <div class="field">
      <label>1%당 이동 거리 (Km)</label>
      <input type="number" step="0.1" id="kmPerPercentInput" />
    </div>

    <div class="small-note">
      퀄리 엑스트론은 전압 입력, 큐브/벡트론은 슬라이드 입력으로 저장하면 메인 화면이 자동으로 바뀝니다.
    </div>

    <div class="modal-actions">
      <button class="close-btn" id="closeAdminBtn">닫기</button>
      <button class="save-btn" id="saveAdminBtn">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">저장되었습니다</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
  const STORAGE_KEY = "ebike_battery_settings_v9";
  const LAST_INPUT_KEY = "ebike_last_voltage";
  const LAST_SLIDER_KEY = "ebike_last_slider_percent";
  const CHARGING_STATE_KEY = "ebike_charging_state_v3";

  const DEFAULT_SETTINGS = {
    modelName: "전기자전거 모델",
    inputType: "voltage",
    minV: 42.0,
    maxV: 54.8,
    fullAh: 20,
    chargerA: 3,
    targetPercent: 95,
    kmPerPercent: 1.0
  };

  const PRESETS = {
    extron: {
      modelName: "퀄리 엑스트론 프로 맥스",
      inputType: "voltage",
      minV: 42.0,
      maxV: 54.6,
      fullAh: 20,
      chargerA: 3,
      targetPercent: 95,
      kmPerPercent: 1.1
    },
    cube500: {
      modelName: "큐브 컴팩트 스포츠 하이브리드 500",
      inputType: "slider",
      minV: 30.0,
      maxV: 42.0,
      fullAh: 13.4,
      chargerA: 2,
      targetPercent: 95,
      kmPerPercent: 1
    },
    vectronS10: {
      modelName: "벡트론 S10(500wh 배터리)",
      inputType: "slider",
      minV: 30.0,
      maxV: 42.0,
      fullAh: 13.4,
      chargerA: 2,
      targetPercent: 95,
      kmPerPercent: 1
    }
  };

  function loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      return { ...DEFAULT_SETTINGS, ...saved };
    } catch (e) {
      return { ...DEFAULT_SETTINGS };
    }
  }

  function saveSettings(settings) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
  }

  function loadChargingState() {
    try {
      const saved = JSON.parse(localStorage.getItem(CHARGING_STATE_KEY) || "null");
      return saved && typeof saved === "object"
        ? saved
        : { isCharging: false, startTs: null, basePercent: null };
    } catch (e) {
      return { isCharging: false, startTs: null, basePercent: null };
    }
  }

  function saveChargingState() {
    localStorage.setItem(CHARGING_STATE_KEY, JSON.stringify(chargingState));
  }

  let settings = loadSettings();
  let input = "";
  let sliderPercent = Number(localStorage.getItem(LAST_SLIDER_KEY) || 0);
  let chargingState = loadChargingState();
  let toastTimer;

  const modelNameDisplay = document.getElementById("modelNameDisplay");
  
  const batteryFill = document.getElementById("batteryFill");
  const voltageEl = document.getElementById("voltage");
  const percentEl = document.getElementById("percent");
  const distanceEl = document.getElementById("distance");
  const timeEl = document.getElementById("time");
  const endTimeEl = document.getElementById("endTime");
  const timeLabelEl = document.getElementById("timeLabel");
  const sliderInputWrap = document.getElementById("sliderInputWrap");
  const percentSlider = document.getElementById("percentSlider");
  const sliderPercentValue = document.getElementById("sliderPercentValue");
  const numpad = document.getElementById("numpad");
  const shareBtn = document.getElementById("shareBtn");
  const openAdminBtn = document.getElementById("openAdminBtn");
  const closeAdminBtn = document.getElementById("closeAdminBtn");
  const saveAdminBtn = document.getElementById("saveAdminBtn");
  const adminModal = document.getElementById("adminModal");
  const presetExtronBtn = document.getElementById("presetExtronBtn");
  const presetCubeBtn = document.getElementById("presetCubeBtn");
  const presetVectronBtn = document.getElementById("presetVectronBtn");
  const presetSelect = document.getElementById("presetSelect");
  const modelNameInput = document.getElementById("modelNameInput");
  const inputTypeInput = document.getElementById("inputTypeInput");
  const minVInput = document.getElementById("minVInput");
  const maxVInput = document.getElementById("maxVInput");
  const fullAhInput = document.getElementById("fullAhInput");
  const chargerAInput = document.getElementById("chargerAInput");
  const targetPercentInput = document.getElementById("targetPercentInput");
  const kmPerPercentInput = document.getElementById("kmPerPercentInput");
  const currentTimeEl = document.getElementById("currentTime");
  const saveBtn = document.getElementById("saveBtn");
  const toastEl = document.getElementById("toast");
  const startChargeBtn = document.getElementById("startChargeBtn");
  const stopChargeBtn = document.getElementById("stopChargeBtn");
  const rideMapBtn1 = document.getElementById("rideMapBtn1");
  const rideMapBtn2 = document.getElementById("rideMapBtn2");

  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
  }

  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  function formatTime(h) {
    if (!isFinite(h) || h <= 0) return "0시간 0분";
    const totalMinutes = Math.round(h * 60);
    const hh = Math.floor(totalMinutes / 60);
    const mm = totalMinutes % 60;
    return `${hh}시간 ${mm}분`;
  }

  function formatDateTime(date) {
    const now = new Date();
    const h = String(date.getHours()).padStart(2, "0");
    const m = String(date.getMinutes()).padStart(2, "0");
    const isTomorrow =
      date.getFullYear() !== now.getFullYear() ||
      date.getMonth() !== now.getMonth() ||
      date.getDate() !== now.getDate();
    return isTomorrow ? `내일 ${h}:${m}` : `${h}:${m}`;
  }

  function percentToVoltage(percent) {
    const minV = Number(settings.minV);
    const maxV = Number(settings.maxV);
    return minV + ((maxV - minV) * percent / 100);
  }

  function voltageToPercent(v) {
    const minV = Number(settings.minV);
    const maxV = Number(settings.maxV);
    const rawPercent = ((v - minV) / (maxV - minV)) * 100;
    return clamp(rawPercent, 0, 100);
  }

  function getManualPercent() {
    if (settings.inputType === "voltage") {
      const parsed = parseFloat(input);
      if (input === "" || isNaN(parsed)) return 0;
      return voltageToPercent(parsed);
    }
    return clamp(Number(sliderPercent), 0, 100);
  }

  function setManualPercent(percent) {
    const nextPercent = clamp(percent, 0, 100);
    if (settings.inputType === "voltage") {
      const voltage = percentToVoltage(nextPercent);
      input = voltage.toFixed(1);
      localStorage.setItem(LAST_INPUT_KEY, input);
    } else {
      sliderPercent = Math.round(nextPercent);
      percentSlider.value = sliderPercent;
      sliderPercentValue.textContent = sliderPercent;
      localStorage.setItem(LAST_SLIDER_KEY, String(sliderPercent));
    }
  }

  function getCurrentPercent() {
    const manualPercent = getManualPercent();
    if (!chargingState.isCharging || !chargingState.startTs || chargingState.basePercent == null) {
      return manualPercent;
    }
    const elapsedHours = Math.max(0, (Date.now() - chargingState.startTs) / 3600000);
    const addedPercent = (Number(settings.chargerA) * elapsedHours / Number(settings.fullAh)) * 100;
    return clamp(chargingState.basePercent + addedPercent, 0, 100);
  }

  function stopCharging(silent = false) {
    const currentPercent = getCurrentPercent();
    chargingState = { isCharging: false, startTs: null, basePercent: null };
    saveChargingState();
    setManualPercent(currentPercent);
    if (!silent) showToast("충전을 종료했습니다");
    update();
  }

  function startCharging() {
    const currentPercent = getManualPercent();
    if (currentPercent >= 100) {
      showToast("이미 100%입니다");
      return;
    }
    chargingState = {
      isCharging: true,
      startTs: Date.now(),
      basePercent: currentPercent
    };
    saveChargingState();
    showToast("충전을 시작했습니다");
    update();
  }

function updateLabels() {
  modelNameDisplay.textContent = settings.modelName || "전기자전거 모델";
  timeLabelEl.textContent = `${settings.targetPercent}% 충전시 소모시간`;
}

  function updateCurrentTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    currentTimeEl.textContent = `${h}:${m}`;
  }

  function updateInputModeUI() {
    const isVoltageMode = settings.inputType === "voltage";
    numpad.style.display = isVoltageMode ? "grid" : "none";
    sliderInputWrap.style.display = isVoltageMode ? "none" : "block";
  }

  function updateChargingButtons() {
    startChargeBtn.disabled = chargingState.isCharging;
    stopChargeBtn.disabled = !chargingState.isCharging;
    startChargeBtn.textContent = chargingState.isCharging ? "충전중" : "충전 시작";
    startChargeBtn.classList.toggle("charging", chargingState.isCharging);
  }

  function update() {
    updateCurrentTime();
    updateLabels();
    updateInputModeUI();
    updateChargingButtons();

    let percent = getCurrentPercent();
    let v = percentToVoltage(percent);

    if (settings.inputType === "voltage") {
      const manualV = parseFloat(input);
      if (input === "" && !chargingState.isCharging) {
        voltageEl.textContent = "0.0V";
        percentEl.textContent = "0.0%";
        distanceEl.textContent = "0.0Km";
        timeEl.textContent = "0시간 0분";
        endTimeEl.textContent = "--:--";
        percentEl.style.color = "#ffffff";
        batteryFill.style.width = "0%";
        return;
      }
      if (!chargingState.isCharging && !isNaN(manualV)) {
        v = manualV;
      }
    } else {
      sliderPercentValue.textContent = Math.round(percent);
      percentSlider.value = Math.round(percent);
    }

    const fullAh = Number(settings.fullAh);
    const chargerA = Number(settings.chargerA);
    const targetPercent = Number(settings.targetPercent);
    const kmPerPercent = Number(settings.kmPerPercent);

    const currentAh = fullAh * (percent / 100);
    const targetAh = fullAh * (targetPercent / 100);
    const needAh = Math.max(0, targetAh - currentAh);
    const hours = chargerA > 0 ? needAh / chargerA : 0;
    const distance = percent * kmPerPercent;

    if (percent <= 20) {
      percentEl.style.color = "#ef4444";
    } else if (percent <= 50) {
      percentEl.style.color = "#f59e0b";
    } else {
      percentEl.style.color = "#22c55e";
    }

    batteryFill.style.width = `${percent.toFixed(1)}%`;

    const now = new Date();
    const end = new Date(now.getTime() + hours * 60 * 60 * 1000);

    voltageEl.textContent = `${v.toFixed(1)}V`;
    percentEl.textContent = `${percent.toFixed(1)}%`;
    distanceEl.textContent = `${distance.toFixed(1)}Km`;
    timeEl.textContent = formatTime(hours);
    endTimeEl.textContent = formatDateTime(end);

    if (chargingState.isCharging && percent >= 100) {
      stopCharging(true);
      showToast("100% 충전 완료");
      percentEl.textContent = "100.0%";
      batteryFill.style.width = "100%";
    }
  }

  function fillAdminInputs() {
    modelNameInput.value = settings.modelName;
    inputTypeInput.value = settings.inputType || "voltage";
    minVInput.value = settings.minV;
    maxVInput.value = settings.maxV;
    fullAhInput.value = settings.fullAh;
    chargerAInput.value = settings.chargerA;
    targetPercentInput.value = settings.targetPercent;
    kmPerPercentInput.value = settings.kmPerPercent;
  }

  function applyPresetToInputs(preset) {
    modelNameInput.value = preset.modelName;
    inputTypeInput.value = preset.inputType;
    minVInput.value = preset.minV;
    maxVInput.value = preset.maxV;
    fullAhInput.value = preset.fullAh;
    chargerAInput.value = preset.chargerA;
    targetPercentInput.value = preset.targetPercent;
    kmPerPercentInput.value = preset.kmPerPercent;
  }

  function applyPreset(presetKey, showMessage = true) {
    const preset = PRESETS[presetKey];
    if (!preset) return;
    applyPresetToInputs(preset);
    settings = { ...preset };
    saveSettings(settings);
    stopCharging(true);
    update();
    if (showMessage) showToast(`${preset.modelName} 적용`);
  }

  async function shareAppLink() {
    const url = location.href;
    try {
      if (navigator.share) {
        await navigator.share({
          title: document.title || "배터리 계산기",
          text: "배터리 계산기 웹앱 주소입니다.",
          url
        });
        showToast("공유창이 열렸습니다");
        return;
      }
      await navigator.clipboard.writeText(url);
      showToast("주소가 복사되었습니다");
    } catch (err) {
      try {
        const temp = document.createElement("input");
        temp.value = url;
        document.body.appendChild(temp);
        temp.select();
        temp.setSelectionRange(0, 99999);
        document.execCommand("copy");
        document.body.removeChild(temp);
        showToast("주소가 복사되었습니다");
      } catch (e) {
        alert("주소 복사에 실패했습니다.");
      }
    }
  }

  shareBtn.addEventListener("click", async () => {
    if (navigator.vibrate) navigator.vibrate(20);
    await shareAppLink();
  });

  openAdminBtn.addEventListener("click", () => {
    fillAdminInputs();
    const matchedKey = Object.keys(PRESETS).find(key => PRESETS[key].modelName === settings.modelName);
    presetSelect.value = matchedKey || "";
    adminModal.classList.add("show");
  });

  closeAdminBtn.addEventListener("click", () => {
    adminModal.classList.remove("show");
  });

  adminModal.addEventListener("click", (e) => {
    if (e.target === adminModal) adminModal.classList.remove("show");
  });

  presetExtronBtn.addEventListener("click", () => {
    applyPreset("extron");
    presetSelect.value = "extron";
    if (navigator.vibrate) navigator.vibrate(15);
  });

  presetCubeBtn.addEventListener("click", () => {
    applyPreset("cube500");
    presetSelect.value = "cube500";
    if (navigator.vibrate) navigator.vibrate(15);
  });

  presetVectronBtn.addEventListener("click", () => {
    applyPreset("vectronS10");
    presetSelect.value = "vectronS10";
    if (navigator.vibrate) navigator.vibrate(15);
  });

  presetSelect.addEventListener("change", (e) => {
    const value = e.target.value;
    if (!value) return;
    applyPreset(value);
    if (navigator.vibrate) navigator.vibrate(15);
  });

  saveAdminBtn.addEventListener("click", () => {
    const next = {
      modelName: modelNameInput.value.trim() || DEFAULT_SETTINGS.modelName,
      inputType: inputTypeInput.value === "slider" ? "slider" : "voltage",
      minV: parseFloat(minVInput.value),
      maxV: parseFloat(maxVInput.value),
      fullAh: parseFloat(fullAhInput.value),
      chargerA: parseFloat(chargerAInput.value),
      targetPercent: parseFloat(targetPercentInput.value),
      kmPerPercent: parseFloat(kmPerPercentInput.value)
    };

    if (
      !isFinite(next.minV) ||
      !isFinite(next.maxV) ||
      !isFinite(next.fullAh) ||
      !isFinite(next.chargerA) ||
      !isFinite(next.targetPercent) ||
      !isFinite(next.kmPerPercent)
    ) {
      alert("숫자 항목을 다시 확인해주세요.");
      return;
    }

    if (next.maxV <= next.minV) {
      alert("최대 전압은 최소 전압보다 커야 합니다.");
      return;
    }

    if (next.fullAh <= 0 || next.chargerA <= 0 || next.kmPerPercent < 0) {
      alert("배터리 용량, 충전기 전류, 1%당 이동 거리 값을 다시 확인해주세요.");
      return;
    }

    if (next.targetPercent <= 0 || next.targetPercent > 100) {
      alert("목표 충전율은 1~100 사이여야 합니다.");
      return;
    }

    settings = next;
    saveSettings(settings);
    stopCharging(true);
    adminModal.classList.remove("show");
    update();
    showToast("저장되었습니다");
  });

  percentSlider.addEventListener("input", () => {
    sliderPercent = Number(percentSlider.value);
    sliderPercentValue.textContent = sliderPercent;
    localStorage.setItem(LAST_SLIDER_KEY, String(sliderPercent));
    if (navigator.vibrate) navigator.vibrate(10);
    update();
  });

  startChargeBtn.addEventListener("click", () => {
    if (navigator.vibrate) navigator.vibrate(20);
    startCharging();
  });

  stopChargeBtn.addEventListener("click", () => {
    if (navigator.vibrate) navigator.vibrate(20);
    stopCharging();
  });

  document.querySelectorAll(".key").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (navigator.vibrate) navigator.vibrate(20);

      const key = btn.dataset.key;
      const action = btn.dataset.action;

      if (key) {
        if (key === "." && input.includes(".")) return;
        input += key;
        localStorage.setItem(LAST_INPUT_KEY, input);
        update();
        return;
      }

      if (action === "clear") {
        input = "";
        localStorage.removeItem(LAST_INPUT_KEY);
        update();
      }
    });
  });

  rideMapBtn1.addEventListener("click", () => {
  location.href = "./ride-map(kakaomap).html";
});
rideMapBtn2.addEventListener("click", () => {
  location.href = "./ride-map.html";
});



  saveBtn.addEventListener("click", async () => {
    try {
      saveBtn.disabled = true;
      const canvas = await html2canvas(document.querySelector(".screen"), {
        backgroundColor: null,
        scale: window.devicePixelRatio > 1 ? 2 : 1
      });

      const link = document.createElement("a");
      const now = new Date();
      const fileName =
        `battery_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}.png`;

      link.download = fileName;
      link.href = canvas.toDataURL("image/png");
      link.click();

      if (navigator.vibrate) navigator.vibrate(50);
      showToast("저장되었습니다");
    } catch (error) {
      console.error(error);
      showToast("저장 실패");
    } finally {
      saveBtn.disabled = false;
    }
  });

  const lastInput = localStorage.getItem(LAST_INPUT_KEY);
  if (lastInput) input = lastInput;

  if (chargingState.isCharging) {
    const currentPercent = getCurrentPercent();
    if (currentPercent >= 100) stopCharging(true);
  }

  update();
  setInterval(updateCurrentTime, 60000);
  setInterval(update, 1000);
</script>
