<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>배터리 계산기</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100dvh;
      min-height: 100dvh;
      max-height: 100dvh;
      padding: 6px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .screen {
      background: #111827;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      flex: 0 0 auto;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .model-name {
      font-size: 20px;
      color: #94a3b8;
      line-height: 1.6;
      word-break: break-word;
    }

    .top-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .admin-btn {
      border: none;
      background: #334155;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 9px;
      border-radius: 9px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .admin-btn:active {
      transform: translateY(1px);
    }

    .admin-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-tab {
      flex: 1;
      height: 42px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #cbd5e1;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-tab.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    .percent-label {
      text-align: center;
      font-size: 18px;
      color: #94a3b8;
    }

    .percent {
      text-align: center;
      font-size: 48px;
      font-weight: 800;
      line-height: 1.02;
      margin-top: 2px;
      margin-bottom: 10px;
      transition: color 0.2s ease;
    }

    .percent-row {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 10px;
    }

    .percent-time {
      font-size: 48px;
      font-weight: 800;
      color: #22c55e;
    }

    .slider-input-wrap {
      margin-bottom: 12px;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
    }

    .slider-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .slider-title {
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 700;
    }

    .slider-value {
      font-size: 24px;
      font-weight: 900;
      color: #22c55e;
      min-width: 68px;
      text-align: right;
    }

    .slider-track-wrap {
      position: relative;
      padding: 4px 0;
    }

    .slider-track-wrap::before {
      content: "";
      position: absolute;
      inset: 50% 0 auto 0;
      transform: translateY(-50%);
      height: 14px;
      border-radius: 999px;
      background:
        linear-gradient(
          to right,
          #ef4444 0%,   #ef4444 20%,
          #f97316 20%,  #f97316 40%,
          #f59e0b 40%,  #f59e0b 60%,
          #84cc16 60%,  #84cc16 80%,
          #22c55e 80%,  #22c55e 100%
        );
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      z-index: 0;
      pointer-events: none;
    }

    .slider-track-wrap .slider-segments {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .slider-track-wrap .slider-segments span {
      position: absolute;
      top: 50%;
      width: 2px;
      height: 20px;
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
      transform: translate(-50%, -50%);
    }

    .slider-track-wrap .slider-segments span:nth-child(1) { left: 20%; }
    .slider-track-wrap .slider-segments span:nth-child(2) { left: 40%; }
    .slider-track-wrap .slider-segments span:nth-child(3) { left: 60%; }
    .slider-track-wrap .slider-segments span:nth-child(4) { left: 80%; }

    #percentSlider {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 36px;
      margin: 0;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    #percentSlider:focus {
      outline: none;
    }

    #percentSlider::-webkit-slider-runnable-track {
      height: 14px;
      background: transparent;
      border-radius: 999px;
    }

    #percentSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid #1d4ed8;
      margin-top: -7px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      cursor: pointer;
    }

    #percentSlider::-moz-range-track {
      height: 14px;
      background: transparent;
      border-radius: 999px;
    }

    #percentSlider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid #1d4ed8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      cursor: pointer;
    }

    .slider-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 4px 0;
      font-size: 20px;
      align-items: center;
    }

    .label {
      color: #cbd5e1;
      white-space: nowrap;
    }

    .value {
      text-align: right;
      font-weight: 700;
      word-break: break-word;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      flex: 1 1 auto;
      align-content: start;
      padding-top: 0px;
    }

    button.key {
      height: 65px;
      font-size: 22px;
      border: none;
      border-radius: 14px;
      color: white;
      cursor: pointer;
      background: linear-gradient(180deg, #374151, #1f2937);
      box-shadow:
        0 5px 0 #020617,
        0 7px 14px rgba(0,0,0,0.35);
      transition: all 0.08s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button.key:active {
      transform: translateY(3px) scale(0.98);
      box-shadow:
        0 2px 0 #020617,
        0 4px 8px rgba(0,0,0,0.25);
      background: linear-gradient(180deg, #1f2937, #111827);
    }

    .clear {
      background: linear-gradient(180deg, #ef4444, #dc2626) !important;
    }

    .clear:active {
      box-shadow:
        0 2px 0 #450a0a,
        0 4px 8px rgba(0,0,0,0.3) !important;
      background: linear-gradient(180deg, #dc2626, #b91c1c) !important;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 1000;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: #111827;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      max-height: 90dvh;
      overflow: auto;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .preset-wrap {
      margin-bottom: 16px;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
    }

    .preset-title {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .preset-buttons {
      display: flex;
      gap: 8px;
    }

    .preset-btn {
      flex: 1;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #1d4ed8;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .preset-btn:active {
      transform: translateY(1px);
    }

    .field {
      margin-bottom: 15px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 10px;
    }

    .field input,
    .field select {
      width: 100%;
      height: 42px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0f172a;
      color: #fff;
      padding: 0 12px;
      font-size: 15px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-actions button {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .save-btn {
      background: #16a34a;
      color: #fff;
    }

    .close-btn {
      background: #334155;
      color: #fff;
    }

    .small-note {
      color: #94a3b8;
      font-size: 15px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      background: #16a34a;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 2000;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-height: 700px) {
      .screen {
        padding: 10px;
      }

      .percent {
        font-size: 42px;
      }

      .row {
        font-size: 15px;
        margin: 15px 0;
      }

      button.key {
        height: 50px;
        font-size: 20px;
      }

      .numpad {
        gap: 7px;
      }

      .slider-value {
        font-size: 20px;
      }

      #percentSlider::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
        margin-top: -5px;
      }

      #percentSlider::-moz-range-thumb {
        width: 24px;
        height: 24px;
      }

      .preset-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="screen">
    <div class="title-row">
      <div class="title-wrap">
        <div class="title">배터리 계산기</div>
        <div class="model-name" id="modelNameDisplay"></div>
      </div>
      <div class="top-actions">
        <button class="admin-btn" id="shareBtn">공유</button>
        <button class="admin-btn" id="saveBtn">저장</button>
        <button class="admin-btn" id="openAdminBtn">관리자</button>
      </div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" id="voltageModeBtn">전압 입력</button>
      <button class="mode-tab" id="barModeBtn">슬라이더 입력</button>
    </div>

    <div class="slider-input-wrap" id="sliderInputWrap" style="display:none;">
      <div class="slider-top-row">
        <div class="slider-title">배터리 잔량 직접 선택</div>
        <div class="slider-value"><span id="sliderPercentValue">0</span>%</div>
      </div>

      <div class="slider-track-wrap">
        <div class="slider-segments">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <input
          type="range"
          id="percentSlider"
          min="0"
          max="100"
          step="1"
          value="0"
        />
      </div>

      <div class="slider-scale">
        <span>0%</span>
        <span>20%</span>
        <span>40%</span>
        <span>60%</span>
        <span>80%</span>
        <span>100%</span>
      </div>
    </div>

    <div class="percent-label">남은 전력량과 현재 시각</div>
    <div class="percent-row">
      <div class="percent" id="percent">0.0%</div>
      <div class="percent-time" id="currentTime">--:--</div>
    </div>

    <div class="row">
      <div class="label">현재 전압</div>
      <div class="value" id="voltage">0.0V</div>
    </div>

    <div class="row">
      <div class="label">이동가능 거리</div>
      <div class="value" id="distance">0.0Km</div>
    </div>

    <div class="row">
      <div class="label" id="timeLabel">95% 충전시 소모시간</div>
      <div class="value" id="time">0시간 0분</div>
    </div>

    <div class="row">
      <div class="label">충전 완료 시각</div>
      <div class="value" id="endTime">--:--</div>
    </div>
  </div>

  <div class="numpad" id="numpad">
    <button class="key" data-key="1">1</button>
    <button class="key" data-key="2">2</button>
    <button class="key" data-key="3">3</button>
    <button class="key" data-key="4">4</button>
    <button class="key" data-key="5">5</button>
    <button class="key" data-key="6">6</button>
    <button class="key" data-key="7">7</button>
    <button class="key" data-key="8">8</button>
    <button class="key" data-key="9">9</button>
    <button class="key clear" data-action="clear">C</button>
    <button class="key" data-key="0">0</button>
    <button class="key" data-key=".">.</button>
  </div>
</div>

<div class="modal-backdrop" id="adminModal">
  <div class="modal">
    <h2>관리자 설정</h2>

    <div class="preset-wrap">
      <div class="preset-title">모델 선택</div>

      <div class="field" style="margin-bottom:10px;">
        <label for="presetSelect">전기자전거 모델 선택</label>
        <select id="presetSelect">
          <option value="">직접 입력</option>
          <option value="extron">퀄리 엑스트론</option>
          <option value="cube500">큐브 컴팩트 500</option>
          <option value="vectronS10">벡트론 S10</option>
        </select>
      </div>

      <div class="preset-title">기존 자전거 값 불러오기</div>
      <div class="preset-buttons">
        <button type="button" class="preset-btn" id="presetExtronBtn">퀄리 엑스트론</button>
        <button type="button" class="preset-btn" id="presetCubeBtn">큐브 컴팩트 500</button>
        <button type="button" class="preset-btn" id="presetVectronBtn">벡트론 S10</button>
      </div>
    </div>

    <div class="field">
      <label>전기자전거 모델명</label>
      <input type="text" id="modelNameInput" />
    </div>

    <div class="field">
      <label>최소 전압 (0%)</label>
      <input type="number" step="0.1" id="minVInput" />
    </div>

    <div class="field">
      <label>최대 전압 (100%)</label>
      <input type="number" step="0.1" id="maxVInput" />
    </div>

    <div class="field">
      <label>배터리 용량 (Ah)</label>
      <input type="number" step="0.1" id="fullAhInput" />
    </div>

    <div class="field">
      <label>충전기 전류 (A)</label>
      <input type="number" step="0.1" id="chargerAInput" />
    </div>

    <div class="field">
      <label>목표 충전율 (%)</label>
      <input type="number" step="1" id="targetPercentInput" />
    </div>

    <div class="field">
      <label>1%당 이동 거리 (Km)</label>
      <input type="number" step="0.1" id="kmPerPercentInput" />
    </div>

    <div class="small-note">
      모델 선택 또는 프리셋 버튼을 누르면 전압과 배터리 값이 바로 반영됩니다. 필요하면 직접 수정 후 저장하시면 됩니다.
    </div>

    <div class="modal-actions">
      <button class="close-btn" id="closeAdminBtn">닫기</button>
      <button class="save-btn" id="saveAdminBtn">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">저장되었습니다</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
  const STORAGE_KEY = "ebike_battery_settings_v6";
  const LAST_INPUT_KEY = "ebike_last_voltage";

  const DEFAULT_SETTINGS = {
    modelName: "전기자전거 모델",
    minV: 42.0,
    maxV: 54.8,
    fullAh: 20,
    chargerA: 3,
    targetPercent: 95,
    kmPerPercent: 0.9
  };

  const PRESETS = {
    extron: {
      modelName: "퀄리 엑스트론",
      minV: 42.0,
      maxV: 54.6,
      fullAh: 20,
      chargerA: 3,
      targetPercent: 95,
      kmPerPercent: 0.9
    },
    cube500: {
      modelName: "큐브 컴팩트 스포츠 하이브리드 500",
      minV: 30.0,
      maxV: 42.0,
      fullAh: 13.4,
      chargerA: 2,
      targetPercent: 95,
      kmPerPercent: 0.8
    },
    vectronS10: {
      modelName: "벡트론 S10(500wh 배터리로 변경)",
      minV: 30.0,
      maxV: 42.0,
      fullAh: 13.4,
      chargerA: 2,
      targetPercent: 95,
      kmPerPercent: 0.8
    }
  };

  function loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      return { ...DEFAULT_SETTINGS, ...saved };
    } catch (e) {
      return { ...DEFAULT_SETTINGS };
    }
  }

  function saveSettings(settings) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
  }

  let settings = loadSettings();
  let inputMode = "voltage";
  let input = "";
  let sliderPercent = 0;

  const modelNameDisplay = document.getElementById("modelNameDisplay");
  const voltageEl = document.getElementById("voltage");
  const percentEl = document.getElementById("percent");
  const distanceEl = document.getElementById("distance");
  const timeEl = document.getElementById("time");
  const endTimeEl = document.getElementById("endTime");
  const timeLabelEl = document.getElementById("timeLabel");

  const voltageModeBtn = document.getElementById("voltageModeBtn");
  const barModeBtn = document.getElementById("barModeBtn");
  const sliderInputWrap = document.getElementById("sliderInputWrap");
  const percentSlider = document.getElementById("percentSlider");
  const sliderPercentValue = document.getElementById("sliderPercentValue");
  const numpad = document.getElementById("numpad");

  const shareBtn = document.getElementById("shareBtn");
  const openAdminBtn = document.getElementById("openAdminBtn");
  const closeAdminBtn = document.getElementById("closeAdminBtn");
  const saveAdminBtn = document.getElementById("saveAdminBtn");
  const adminModal = document.getElementById("adminModal");

  const presetExtronBtn = document.getElementById("presetExtronBtn");
  const presetCubeBtn = document.getElementById("presetCubeBtn");
  const presetVectronBtn = document.getElementById("presetVectronBtn");
  const presetSelect = document.getElementById("presetSelect");

  const modelNameInput = document.getElementById("modelNameInput");
  const minVInput = document.getElementById("minVInput");
  const maxVInput = document.getElementById("maxVInput");
  const fullAhInput = document.getElementById("fullAhInput");
  const chargerAInput = document.getElementById("chargerAInput");
  const targetPercentInput = document.getElementById("targetPercentInput");
  const kmPerPercentInput = document.getElementById("kmPerPercentInput");
  const currentTimeEl = document.getElementById("currentTime");
  const saveBtn = document.getElementById("saveBtn");
  const toastEl = document.getElementById("toast");

  let toastTimer;

  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove("show");
    }, 1600);
  }

  function formatTime(h) {
    if (!isFinite(h) || h <= 0) return "0시간 0분";
    const totalMinutes = Math.round(h * 60);
    const hh = Math.floor(totalMinutes / 60);
    const mm = totalMinutes % 60;
    return `${hh}시간 ${mm}분`;
  }

  function formatEndTime(date) {
    const now = new Date();
    const h = String(date.getHours()).padStart(2, "0");
    const m = String(date.getMinutes()).padStart(2, "0");

    const isTomorrow =
      date.getFullYear() !== now.getFullYear() ||
      date.getMonth() !== now.getMonth() ||
      date.getDate() !== now.getDate();

    return isTomorrow ? `내일 ${h}:${m}` : `${h}:${m}`;
  }

  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  function percentToVoltage(percent) {
    const minV = Number(settings.minV);
    const maxV = Number(settings.maxV);
    return minV + ((maxV - minV) * percent / 100);
  }

  function voltageToPercent(v) {
    const minV = Number(settings.minV);
    const maxV = Number(settings.maxV);
    const rawPercent = ((v - minV) / (maxV - minV)) * 100;
    return clamp(rawPercent, 0, 100);
  }

  function updateLabels() {
    modelNameDisplay.textContent = settings.modelName || "전기자전거 모델";
    timeLabelEl.textContent = `${settings.targetPercent}% 충전시 소모시간`;
  }

  function updateCurrentTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    currentTimeEl.textContent = `${h}:${m}`;
  }

  function updateInputModeUI() {
    const isVoltageMode = inputMode === "voltage";
    voltageModeBtn.classList.toggle("active", isVoltageMode);
    barModeBtn.classList.toggle("active", !isVoltageMode);
    numpad.style.display = isVoltageMode ? "grid" : "none";
    sliderInputWrap.style.display = isVoltageMode ? "none" : "block";
  }

  function update() {
    updateCurrentTime();
    updateLabels();

    let v = 0;
    let percent = 0;

    if (inputMode === "voltage") {
      if (input === "") {
        voltageEl.textContent = "0.0V";
        percentEl.textContent = "0.0%";
        distanceEl.textContent = "0.0Km";
        timeEl.textContent = "0시간 0분";
        endTimeEl.textContent = "--:--";
        percentEl.style.color = "#ffffff";
        sliderPercentValue.textContent = "0";
        percentSlider.value = 0;
        return;
      }

      v = parseFloat(input);
      if (isNaN(v)) return;

      percent = voltageToPercent(v);
      sliderPercent = Math.round(percent);
      percentSlider.value = sliderPercent;
      sliderPercentValue.textContent = sliderPercent;
    } else {
      percent = clamp(Number(sliderPercent), 0, 100);
      v = percentToVoltage(percent);
      sliderPercentValue.textContent = Math.round(percent);
    }

    const fullAh = Number(settings.fullAh);
    const chargerA = Number(settings.chargerA);
    const targetPercent = Number(settings.targetPercent);
    const kmPerPercent = Number(settings.kmPerPercent);

    const currentAh = fullAh * (percent / 100);
    const targetAh = fullAh * (targetPercent / 100);
    const needAh = Math.max(0, targetAh - currentAh);
    const hours = chargerA > 0 ? needAh / chargerA : 0;
    const distance = percent * kmPerPercent;

    if (percent <= 20) {
      percentEl.style.color = "#ef4444";
    } else if (percent <= 50) {
      percentEl.style.color = "#f59e0b";
    } else {
      percentEl.style.color = "#22c55e";
    }

    const now = new Date();
    const end = new Date(now.getTime() + hours * 60 * 60 * 1000);

    voltageEl.textContent = `${v.toFixed(1)}V`;
    percentEl.textContent = `${percent.toFixed(1)}%`;
    distanceEl.textContent = `${distance.toFixed(1)}Km`;
    timeEl.textContent = formatTime(hours);
    endTimeEl.textContent = formatEndTime(end);
  }

  function fillAdminInputs() {
    modelNameInput.value = settings.modelName;
    minVInput.value = settings.minV;
    maxVInput.value = settings.maxV;
    fullAhInput.value = settings.fullAh;
    chargerAInput.value = settings.chargerA;
    targetPercentInput.value = settings.targetPercent;
    kmPerPercentInput.value = settings.kmPerPercent;
  }

  function applyPresetToInputs(preset) {
    modelNameInput.value = preset.modelName;
    minVInput.value = preset.minV;
    maxVInput.value = preset.maxV;
    fullAhInput.value = preset.fullAh;
    chargerAInput.value = preset.chargerA;
    targetPercentInput.value = preset.targetPercent;
    kmPerPercentInput.value = preset.kmPerPercent;
  }

  function applyPreset(presetKey, showMessage = true) {
    const preset = PRESETS[presetKey];
    if (!preset) return;

    applyPresetToInputs(preset);
    settings = { ...preset };
    saveSettings(settings);

    if (inputMode === "slider") {
      const currentSlider = clamp(Number(percentSlider.value), 0, 100);
      sliderPercent = currentSlider;
      sliderPercentValue.textContent = currentSlider;
    }

    update();

    if (showMessage) {
      showToast(`${preset.modelName} 적용`);
    }
  }

  async function shareAppLink() {
    const url = location.href;

    try {
      if (navigator.share) {
        await navigator.share({
          title: document.title || "배터리 계산기",
          text: "배터리 계산기 웹앱 주소입니다.",
          url
        });
        showToast("공유창이 열렸습니다");
        return;
      }

      await navigator.clipboard.writeText(url);
      showToast("주소가 복사되었습니다");
    } catch (err) {
      try {
        const temp = document.createElement("input");
        temp.value = url;
        document.body.appendChild(temp);
        temp.select();
        temp.setSelectionRange(0, 99999);
        document.execCommand("copy");
        document.body.removeChild(temp);
        showToast("주소가 복사되었습니다");
      } catch (e) {
        alert("주소 복사에 실패했습니다.");
      }
    }
  }

  shareBtn.addEventListener("click", async () => {
    if (navigator.vibrate) navigator.vibrate(20);
    await shareAppLink();
  });

  openAdminBtn.addEventListener("click", () => {
    fillAdminInputs();

    const matchedKey = Object.keys(PRESETS).find(
      key => PRESETS[key].modelName === settings.modelName
    );
    presetSelect.value = matchedKey || "";

    adminModal.classList.add("show");
  });

  closeAdminBtn.addEventListener("click", () => {
    adminModal.classList.remove("show");
  });

  adminModal.addEventListener("click", (e) => {
    if (e.target === adminModal) {
      adminModal.classList.remove("show");
    }
  });

  presetExtronBtn.addEventListener("click", () => {
    applyPreset("extron");
    presetSelect.value = "extron";
    if (navigator.vibrate) navigator.vibrate(15);
  });

  presetCubeBtn.addEventListener("click", () => {
    applyPreset("cube500");
    presetSelect.value = "cube500";
    if (navigator.vibrate) navigator.vibrate(15);
  });

  presetVectronBtn.addEventListener("click", () => {
    applyPreset("vectronS10");
    presetSelect.value = "vectronS10";
    if (navigator.vibrate) navigator.vibrate(15);
  });

  presetSelect.addEventListener("change", (e) => {
    const value = e.target.value;
    if (!value) return;
    applyPreset(value);
    if (navigator.vibrate) navigator.vibrate(15);
  });

  saveAdminBtn.addEventListener("click", () => {
    const next = {
      modelName: modelNameInput.value.trim() || DEFAULT_SETTINGS.modelName,
      minV: parseFloat(minVInput.value),
      maxV: parseFloat(maxVInput.value),
      fullAh: parseFloat(fullAhInput.value),
      chargerA: parseFloat(chargerAInput.value),
      targetPercent: parseFloat(targetPercentInput.value),
      kmPerPercent: parseFloat(kmPerPercentInput.value)
    };

    if (
      !isFinite(next.minV) ||
      !isFinite(next.maxV) ||
      !isFinite(next.fullAh) ||
      !isFinite(next.chargerA) ||
      !isFinite(next.targetPercent) ||
      !isFinite(next.kmPerPercent)
    ) {
      alert("숫자 항목을 다시 확인해주세요.");
      return;
    }

    if (next.maxV <= next.minV) {
      alert("최대 전압은 최소 전압보다 커야 합니다.");
      return;
    }

    if (next.fullAh <= 0 || next.chargerA <= 0 || next.kmPerPercent < 0) {
      alert("배터리 용량, 충전기 전류, 1%당 이동 거리 값을 다시 확인해주세요.");
      return;
    }

    if (next.targetPercent <= 0 || next.targetPercent > 100) {
      alert("목표 충전율은 1~100 사이여야 합니다.");
      return;
    }

    settings = next;
    saveSettings(settings);

    if (inputMode === "slider") {
      const currentSlider = clamp(Number(percentSlider.value), 0, 100);
      sliderPercent = currentSlider;
      sliderPercentValue.textContent = currentSlider;
    }

    adminModal.classList.remove("show");
    update();
    showToast("저장되었습니다");
  });

  voltageModeBtn.addEventListener("click", () => {
    inputMode = "voltage";
    updateInputModeUI();
    update();
  });

  barModeBtn.addEventListener("click", () => {
    inputMode = "slider";

    if (input !== "" && !isNaN(parseFloat(input))) {
      sliderPercent = Math.round(voltageToPercent(parseFloat(input)));
    }

    percentSlider.value = sliderPercent;
    sliderPercentValue.textContent = sliderPercent;

    updateInputModeUI();
    update();
  });

  percentSlider.addEventListener("input", () => {
    sliderPercent = Number(percentSlider.value);
    sliderPercentValue.textContent = sliderPercent;

    if (navigator.vibrate) {
      navigator.vibrate(10);
    }

    update();
  });

  document.querySelectorAll(".key").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (navigator.vibrate) {
        navigator.vibrate(20);
      }

      const key = btn.dataset.key;
      const action = btn.dataset.action;

      if (key) {
        if (key === "." && input.includes(".")) return;
        input += key;
        localStorage.setItem(LAST_INPUT_KEY, input);
        update();
        return;
      }

      if (action === "clear") {
        input = "";
        localStorage.removeItem(LAST_INPUT_KEY);
        update();
      }
    });
  });

  saveBtn.addEventListener("click", async () => {
    try {
      saveBtn.disabled = true;

      const canvas = await html2canvas(document.querySelector(".screen"), {
        backgroundColor: null,
        scale: window.devicePixelRatio > 1 ? 2 : 1
      });

      const link = document.createElement("a");
      const now = new Date();
      const fileName =
        `battery_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}.png`;

      link.download = fileName;
      link.href = canvas.toDataURL("image/png");
      link.click();

      if (navigator.vibrate) {
        navigator.vibrate(50);
      }

      showToast("저장되었습니다");
    } catch (error) {
      console.error(error);
      showToast("저장 실패");
    } finally {
      saveBtn.disabled = false;
    }
  });

  const lastInput = localStorage.getItem(LAST_INPUT_KEY);
  if (lastInput) {
    input = lastInput;
  }

  updateInputModeUI();
  update();
  setInterval(updateCurrentTime, 60000);
  updateCurrentTime();
</script>

</body>
</html>
