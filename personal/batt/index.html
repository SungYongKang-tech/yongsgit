<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>배터리 계산기</title>

<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app {
  width:100%;
  max-width:400px;
}

.screen {
  text-align:center;
  margin-bottom:20px;
}

.voltage {
  font-size:60px;
  font-weight:800;
}

.percent {
  font-size:28px;
  margin-top:5px;
}

.time {
  font-size:20px;
  color:#94a3b8;
  margin-top:5px;
}

.numpad {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

button {
  height:70px;
  font-size:24px;
  border:none;
  border-radius:15px;
  background:#1f2937;
  color:white;
}

button:active {
  background:#374151;
}

.clear {
  background:#ef4444;
}
</style>
</head>

<body>

<div class="app">

  <div class="screen">
    <div class="voltage" id="voltage">0.0V</div>
    <div class="percent" id="percent">0.0%</div>
    <div class="time" id="time">0시간 0분</div>
  </div>

  <div class="numpad">
    <button data-key="1">1</button>
    <button data-key="2">2</button>
    <button data-key="3">3</button>
    <button data-key="4">4</button>
    <button data-key="5">5</button>
    <button data-key="6">6</button>
    <button data-key="7">7</button>
    <button data-key="8">8</button>
    <button data-key="9">9</button>
    <button class="clear" data-action="clear">C</button>
    <button data-key="0">0</button>
    <button data-key=".">.</button>
  </div>

</div>

<script>
const MIN_V = 42.0;
const MAX_V = 54.8;
const FULL_AH = 20;
const CHARGER_A = 3;

let input = "";

const voltageEl = document.getElementById("voltage");
const percentEl = document.getElementById("percent");
const timeEl = document.getElementById("time");

function formatTime(h) {
  let min = Math.round(h * 60);
  let hh = Math.floor(min / 60);
  let mm = min % 60;
  return `${hh}시간 ${mm}분`;
}

function update() {
  if (input === "") {
    voltageEl.textContent = "0.0V";
    percentEl.textContent = "0.0%";
    timeEl.textContent = "0시간 0분";
    return;
  }

  let v = parseFloat(input);
  if (isNaN(v)) return;

  let percent = ((v - MIN_V) / (MAX_V - MIN_V)) * 100;
  percent = Math.max(0, Math.min(100, percent));

  let currentAh = FULL_AH * (percent / 100);
  let needAh = FULL_AH - currentAh;
  let time = needAh / CHARGER_A;

  voltageEl.textContent = v.toFixed(1) + "V";
  percentEl.textContent = percent.toFixed(1) + "%";
  timeEl.textContent = formatTime(time);
}

document.querySelectorAll("button").forEach(btn => {
  btn.onclick = () => {
    const key = btn.dataset.key;
    const action = btn.dataset.action;

    if (key) {
      if (key === "." && input.includes(".")) return;
      input += key;
      update();
    }

    if (action === "clear") {
      input = "";
      update();
    }
  };
});

update();
</script>

</body>
</html>
