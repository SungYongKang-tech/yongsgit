<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="배터리 계산기" />

<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./192vicon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./192vicon.png" />
<link rel="icon" type="image/png" sizes="512x512" href="./512vicon.png" />

<title>배터리 계산기</title>

<style>
  :root{
    --bg1:#020617;
    --bg2:#0f172a;
    --panel:#111827;
    --panel2:#1f2937;
    --line:rgba(148,163,184,0.14);
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#22c55e;
    --danger:#ef4444;
    --shadow:0 14px 36px rgba(0,0,0,0.32);
  }

  * { box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(34,197,94,0.12), transparent 28%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
  }

  .app{
    width:100%;
    max-width:460px;
  }

  .screen{
    background:linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.98));
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    padding:18px 16px;
    margin-bottom:12px;
  }

  .title{
    text-align:center;
    font-size:18px;
    font-weight:700;
    color:#dbeafe;
    margin-bottom:14px;
  }

  .main-percent-label{
    text-align:center;
    font-size:15px;
    color:var(--muted);
    margin-bottom:6px;
  }

  .main-percent{
    text-align:center;
    font-size:clamp(54px, 16vw, 88px);
    font-weight:800;
    line-height:1;
    letter-spacing:-2px;
    margin-bottom:18px;
  }

  .info-list{
    display:grid;
    gap:10px;
  }

  .info-row{
    background:rgba(15,23,42,0.92);
    border:1px solid rgba(148,163,184,0.10);
    border-radius:16px;
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }

  .info-label{
    font-size:15px;
    color:var(--muted);
    white-space:nowrap;
  }

  .info-value{
    font-size:24px;
    font-weight:800;
    text-align:right;
    letter-spacing:-0.5px;
  }

  .numpad{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
  }

  button{
    border:none;
    cursor:pointer;
    border-radius:18px;
    font-weight:800;
    font-size:28px;
    min-height:72px;
    color:var(--text);
    background:linear-gradient(180deg, #1f2937, #111827);
    border:1px solid rgba(148,163,184,0.14);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
    -webkit-tap-highlight-color:transparent;
  }

  button:active{
    transform:scale(0.98);
    filter:brightness(1.08);
  }

  .btn-danger{
    background:linear-gradient(180deg, #ef4444, #dc2626);
  }

  .btn-wide{
    grid-column:span 2;
  }

  .hint{
    text-align:center;
    margin-top:10px;
    color:var(--muted);
    font-size:12px;
  }

  @media (max-width:420px){
    body{ padding:10px; }
    .screen{ padding:15px 13px; border-radius:22px; }
    .info-value{ font-size:21px; }
    .info-label{ font-size:14px; }
    button{ min-height:64px; font-size:24px; border-radius:16px; }
  }
</style>
</head>
<body>

<div class="app">
  <section class="screen">
    <div class="title">배터리 계산기</div>

    <div class="main-percent-label">남은 전력량</div>
    <div class="main-percent" id="percentDisplay">0.0%</div>

    <div class="info-list">
      <div class="info-row">
        <div class="info-label">현재 전압</div>
        <div class="info-value" id="voltageDisplay">0.0V</div>
      </div>

      <div class="info-row">
        <div class="info-label">이동가능 거리</div>
        <div class="info-value" id="distanceDisplay">0.0Km</div>
      </div>

      <div class="info-row">
        <div class="info-label">100% 충전시 소모시간</div>
        <div class="info-value" id="timeDisplay">0시간 0분</div>
      </div>
    </div>

    <div class="hint">전압 입력</div>
  </section>

  <section class="numpad">
    <button data-key="1">1</button>
    <button data-key="2">2</button>
    <button data-key="3">3</button>
    <button data-key="4">4</button>
    <button data-key="5">5</button>
    <button data-key="6">6</button>
    <button data-key="7">7</button>
    <button data-key="8">8</button>
    <button data-key="9">9</button>
    <button class="btn-danger" data-action="clear">C</button>
    <button data-key="0">0</button>
    <button data-key=".">.</button>
  </section>
</div>

<script>
  const MIN_V = 42.0;
  const MAX_V = 54.8;
  const FULL_AH = 20;
  const CHARGER_A = 3;

  // 이동가능 거리 기준값
  // 완충(100%) 시 주행 가능 거리. 필요하면 이 값만 바꾸면 됩니다.
  const FULL_DISTANCE_KM = 80;

  let inputValue = "";

  const voltageDisplay = document.getElementById("voltageDisplay");
  const percentDisplay = document.getElementById("percentDisplay");
  const distanceDisplay = document.getElementById("distanceDisplay");
  const timeDisplay = document.getElementById("timeDisplay");

  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  function formatTime(hoursFloat) {
    if (hoursFloat <= 0) return "0시간 0분";
    const totalMinutes = Math.round(hoursFloat * 60);
    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    return `${h}시간 ${m}분`;
  }

  function calculate(voltage) {
    const safeVoltage = clamp(voltage, MIN_V, MAX_V);
    const percent = ((safeVoltage - MIN_V) / (MAX_V - MIN_V)) * 100;
    const safePercent = clamp(percent, 0, 100);

    const currentAh = (safePercent / 100) * FULL_AH;
    const needAh = FULL_AH - currentAh;
    const chargeHours = needAh / CHARGER_A;
    const distanceKm = FULL_DISTANCE_KM * (safePercent / 100);

    return {
      voltage: safeVoltage,
      percent: safePercent,
      currentAh,
      needAh,
      chargeHours,
      distanceKm
    };
  }

  function renderEmpty() {
    voltageDisplay.textContent = "0.0V";
    percentDisplay.textContent = "0.0%";
    distanceDisplay.textContent = "0.0Km";
    timeDisplay.textContent = "0시간 0분";
  }

  function render() {
    if (inputValue === "") {
      renderEmpty();
      return;
    }

    let numeric = parseFloat(inputValue);
    if (Number.isNaN(numeric)) {
      renderEmpty();
      return;
    }

    const result = calculate(numeric);

    voltageDisplay.textContent = `${numeric.toFixed(1)}V`;
    percentDisplay.textContent = `${result.percent.toFixed(1)}%`;
    distanceDisplay.textContent = `${result.distanceKm.toFixed(1)}Km`;
    timeDisplay.textContent = formatTime(result.chargeHours);
  }

  function appendInput(char) {
    if (char === ".") {
      if (inputValue.includes(".")) return;
      if (inputValue === "") {
        inputValue = "0.";
      } else {
        inputValue += ".";
      }
      render();
      return;
    }

    if (inputValue === "0") {
      inputValue = char;
    } else {
      inputValue += char;
    }

    render();
  }

  function clearInput() {
    inputValue = "";
    renderEmpty();
  }

  document.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.key;
      const action = btn.dataset.action;

      if (key) {
        appendInput(key);
        return;
      }

      if (action === "clear") {
        clearInput();
      }
    });
  });

  renderEmpty();
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js")
        .catch(() => {});
    });
  }
</script>

</body>
</html>
