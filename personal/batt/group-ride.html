<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>그룹라이딩 설정</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=90120eccb060eed4b76790684d641951&libraries=services"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.5/kakao.min.js"></script>

<style>
  :root{
    --bg1:#0b1220;
    --bg2:#121c34;
    --card:rgba(15,23,42,0.88);
    --card2:rgba(30,41,59,0.9);
    --line:rgba(255,255,255,0.08);
    --text:#f8fafc;
    --muted:#94a3b8;
    --blue1:#3b82f6;
    --blue2:#1d4ed8;
    --green1:#22c55e;
    --green2:#16a34a;
    --red1:#ef4444;
    --red2:#dc2626;
    --dark1:#334155;
    --dark2:#1e293b;
    --shadow:0 8px 20px rgba(0,0,0,0.24);
    --radius:14px;
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    font-family:Arial, "Malgun Gothic", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
  }

  .app{
    height:100svh;
    display:flex;
    flex-direction:column;
    gap:6px;
    padding:
      calc(6px + env(safe-area-inset-top))
      6px
      calc(6px + env(safe-area-inset-bottom));
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:2px 2px 0;
  }

  .title{
    font-size:18px;
    font-weight:900;
    letter-spacing:-0.4px;
    line-height:1;
  }

  .status-pill{
    flex:0 0 auto;
    max-width:52%;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(51,65,85,0.96), rgba(30,41,59,0.96));
    font-size:11px;
    font-weight:900;
    color:#e2e8f0;
    box-shadow:var(--shadow);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .panel{
    background:linear-gradient(180deg, var(--card2), var(--card));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:6px;
  }

  .input-row{
    display:grid;
    grid-template-columns:1.2fr 1fr;
    gap:6px;
  }

  .input{
    width:100%;
    height:34px;
    border:none;
    outline:none;
    border-radius:10px;
    padding:0 10px;
    font-size:13px;
    font-weight:700;
    color:#fff;
    background:rgba(15,23,42,0.92);
    border:1px solid rgba(255,255,255,0.07);
  }

  .input::placeholder{
    color:#7c8aa0;
    font-weight:600;
  }

 .btn-row-4{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:4px;
  width:100%;
}

.btn{
  height:34px;
  min-width:0;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:11px;
  font-weight:900;
  cursor:pointer;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,0.08);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding:0 2px;
  letter-spacing:-0.4px;
}


  .btn.blue{ background:linear-gradient(180deg, var(--blue1), var(--blue2)); }
  .btn.green{ background:linear-gradient(180deg, var(--green1), var(--green2)); }
  .btn.red{ background:linear-gradient(180deg, var(--red1), var(--red2)); }
  .btn.dark{ background:linear-gradient(180deg, var(--dark1), var(--dark2)); }
  .btn.sky{ background:linear-gradient(180deg, #0ea5e9, #2563eb); }

  .map-card{
    flex:1;
    min-height:0;
    padding:0;
    overflow:hidden;
  }

  #map{
    width:100%;
    height:100%;
  }

  @media (max-width:430px){
  .title{ font-size:17px; }
  .status-pill{ font-size:10px; padding:6px 8px; }
  .input{ height:32px; font-size:12px; padding:0 8px; }

  .btn{
    height:31px;
    font-size:10px;
    padding:0 1px;
    letter-spacing:-0.5px;
  }

  .btn-row-4{
    gap:3px;
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <div class="title">그룹라이딩</div>
    <div class="status-pill" id="roomStatusEl">방 없음</div>
  </div>

  <div class="panel">
    <div class="input-row">
      <input id="nameInput" class="input" placeholder="이름(성 제외) 또는 닉네임" />
      <input id="roomInput" class="input" placeholder="방번호" />
    </div>
  </div>

  <div class="panel">
    <div class="btn-row-5">
      <button id="createRoomBtn" class="btn blue">방만들기</button>
      <button id="joinRoomBtn" class="btn green">방참가</button>
      <button id="leaveRoomBtn" class="btn red">방나가기</button>
      <button id="setDestBtn" class="btn dark">목적지</button>
      <button id="clearDestBtn" class="btn dark">목적지삭제</button>
    </div>
  </div>

  <div class="panel">
    <div class="btn-row-4">
      <button id="inviteBtn" class="btn sky">초대</button>
      <button id="moveRideBtn" class="btn sky">라이딩</button>
      <button id="fitMapBtn" class="btn dark">중심</button>
      <button id="myLocBtn" class="btn dark">내위치</button>
    </div>
  </div>

  
  <div class="panel map-card">
    <div id="map"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQ2DvuwcyIctktubn7LlfJRP0hHfXfnCU",
  authDomain: "personal-51db3.firebaseapp.com",
  databaseURL: "https://personal-51db3-default-rtdb.firebaseio.com",
  projectId: "personal-51db3",
  storageBucket: "personal-51db3.firebasestorage.app",
  messagingSenderId: "146076749227",
  appId: "1:146076749227:web:2043208d688e60504816ee"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

if (window.Kakao && !window.Kakao.isInitialized()) {
  try {
    window.Kakao.init("90120eccb060eed4b76790684d641951");
  } catch (e) {
    console.log("Kakao init 실패:", e);
  }
}

const nameInput = document.getElementById("nameInput");
const roomInput = document.getElementById("roomInput");
const roomStatusEl = document.getElementById("roomStatusEl");

let map;
let currentRoomId = "";
let isSettingDest = false;
let destMarker = null;
let myMarker = null;
let groupWatchId = null;
let myMemberColor = localStorage.getItem("ride_group_color") || "";
let autoJoinMode = false;

function updateRoomStatus() {
  roomStatusEl.textContent = currentRoomId ? `방 ${currentRoomId}` : "방 없음";
}

function normalizeDisplayName(raw = "") {
  return String(raw || "").trim().replace(/\s+/g, " ");
}

function validateDisplayName(name) {
  const n = normalizeDisplayName(name);

  if (!n) {
    alert("이름(성 제외) 또는 닉네임을 입력하세요");
    nameInput.focus();
    return false;
  }

  if (n.length < 2) {
    alert("이름 또는 닉네임은 2자 이상 입력하세요");
    nameInput.focus();
    return false;
  }

  if (n.length > 12) {
    alert("이름 또는 닉네임은 12자 이하로 입력하세요");
    nameInput.focus();
    return false;
  }

  return true;
}

function loadSavedGroupInfo() {
  const savedName = localStorage.getItem("ride_group_name") || "";
  const savedRoomId = localStorage.getItem("ride_group_room_id") || "";
  const savedEnabled = localStorage.getItem("ride_group_enabled") || "";

  if (savedName) nameInput.value = savedName;

  if (savedRoomId) {
    roomInput.value = savedRoomId;
    currentRoomId = savedRoomId;
  }

  if (savedEnabled === "on" && savedRoomId) {
    currentRoomId = savedRoomId;
  }

  updateRoomStatus();
}

function loadFromURL() {
  const params = new URLSearchParams(location.search);
  const room = (params.get("room") || "").trim();
  const auto = (params.get("auto") || "").trim();

  if (room) {
    roomInput.value = room;
    currentRoomId = room;
  }

  autoJoinMode = auto === "1";
  updateRoomStatus();
}

function buildDestinationMarkerImage() {
  if (!(window.kakao && window.kakao.maps)) return null;

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <path d="M14 1
               C7 1 2 6 2 13
               C2 22 14 35 14 35
               C14 35 26 22 26 13
               C26 6 21 1 14 1 Z"
            fill="#ef4444"
            stroke="#ffffff"
            stroke-width="2"/>
      <circle cx="14" cy="13" r="4" fill="#ffffff"/>
    </svg>`;
  const src = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);

  return new kakao.maps.MarkerImage(src, new kakao.maps.Size(28, 36), {
    offset: new kakao.maps.Point(14, 36)
  });
}

function buildMyMarkerImage() {
  if (!(window.kakao && window.kakao.maps)) return null;

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34">
      <circle cx="17" cy="17" r="12" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
      <circle cx="17" cy="17" r="4" fill="#ffffff"/>
    </svg>`;
  const src = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);

  return new kakao.maps.MarkerImage(src, new kakao.maps.Size(34, 34), {
    offset: new kakao.maps.Point(17, 17)
  });
}

function initMap() {
  map = new kakao.maps.Map(document.getElementById("map"), {
    center: new kakao.maps.LatLng(35.18, 128.10),
    level: 4
  });

  map.addOverlayMapTypeId(kakao.maps.MapTypeId.BICYCLE);

  kakao.maps.event.addListener(map, "click", async function(mouseEvent) {
    if (!isSettingDest) return;

    const latlng = mouseEvent.latLng;
    const lat = latlng.getLat();
    const lng = latlng.getLng();

    if (!currentRoomId) {
      alert("방 먼저 참가하세요");
      isSettingDest = false;
      return;
    }

    try {
      await update(ref(db, `rideRooms/${currentRoomId}/meta`), {
        destination: {
          lat,
          lng,
          name: "목적지",
          setAt: Date.now(),
          setBy: auth.currentUser ? auth.currentUser.uid : ""
        }
      });

      drawDest(lat, lng);
      isSettingDest = false;
      alert("목적지 지정 완료");
    } catch (err) {
      console.error(err);
      isSettingDest = false;
      alert("목적지 저장 실패");
    }
  });

  setTimeout(() => {
    if (map) map.relayout();
  }, 300);
}

function drawDest(lat, lng) {
  if (destMarker) destMarker.setMap(null);

  destMarker = new kakao.maps.Marker({
    map,
    position: new kakao.maps.LatLng(lat, lng),
    image: buildDestinationMarkerImage()
  });

  map.panTo(new kakao.maps.LatLng(lat, lng));
}

async function loadExistingDestination(roomId) {
  if (!roomId) return;

  try {
    const snap = await get(ref(db, `rideRooms/${roomId}/meta/destination`));
    const dest = snap.val();

    if (dest && typeof dest.lat === "number" && typeof dest.lng === "number") {
      drawDest(dest.lat, dest.lng);
    } else if (destMarker) {
      destMarker.setMap(null);
      destMarker = null;
    }
  } catch (err) {
    console.log("기존 목적지 불러오기 실패:", err);
  }
}

async function ensureAuth() {
  if (auth.currentUser) return;
  await signInAnonymously(auth);
}

function getStableColorFromName(name = "") {
  const colors = [
    "#2563eb", "#16a34a", "#dc2626", "#9333ea", "#ea580c",
    "#0891b2", "#ca8a04", "#db2777", "#4f46e5", "#059669"
  ];

  let hash = 0;
  const safe = String(name || "라이더");
  for (let i = 0; i < safe.length; i++) {
    hash = ((hash << 5) - hash) + safe.charCodeAt(i);
    hash |= 0;
  }
  return colors[Math.abs(hash) % colors.length];
}

function getMyMemberColor() {
  const currentName = nameInput.value.trim() || localStorage.getItem("ride_group_name") || "라이더";
  const desiredColor = getStableColorFromName(currentName);

  if (myMemberColor !== desiredColor) {
    myMemberColor = desiredColor;
    localStorage.setItem("ride_group_color", myMemberColor);
  }

  return myMemberColor;
}

function getMyMemberRef() {
  if (!currentRoomId || !auth.currentUser) return null;
  return ref(db, `rideRooms/${currentRoomId}/members/${auth.currentUser.uid}`);
}

async function ensureGroupMember() {
  if (!currentRoomId || !auth.currentUser) return;

  const memberRef = getMyMemberRef();
  if (!memberRef) return;

  const name = normalizeDisplayName(nameInput.value || localStorage.getItem("ride_group_name") || "라이더");

  await update(memberRef, {
    name,
    color: getMyMemberColor(),
    online: true,
    updatedAt: Date.now(),
    joinedAt: Date.now()
  });
}

async function updateMyGroupLocation(lat, lng, accuracy = 0) {
  if (!currentRoomId || !auth.currentUser) return;

  const memberRef = getMyMemberRef();
  if (!memberRef) return;

  const name = normalizeDisplayName(nameInput.value || localStorage.getItem("ride_group_name") || "라이더");

  await update(memberRef, {
    name,
    color: getMyMemberColor(),
    online: true,
    updatedAt: Date.now(),
    lat,
    lng,
    accuracy: Number.isFinite(accuracy) ? accuracy : 0,
    speed: 0
  });
}

async function setMyGroupOffline() {
  if (!currentRoomId || !auth.currentUser) return;

  const memberRef = getMyMemberRef();
  if (!memberRef) return;

  await update(memberRef, {
    online: false,
    updatedAt: Date.now()
  });
}

function startGroupWatching() {
  if (!navigator.geolocation) return;
  if (!currentRoomId) return;
  if (groupWatchId !== null) return;

  groupWatchId = navigator.geolocation.watchPosition(
    async (pos) => {
      const { latitude, longitude, accuracy } = pos.coords;

      try {
        await updateMyGroupLocation(latitude, longitude, accuracy);
      } catch (err) {
        console.log("그룹 위치 업로드 실패:", err);
      }

      const ll = new kakao.maps.LatLng(latitude, longitude);

      if (!myMarker) {
        myMarker = new kakao.maps.Marker({
          map,
          position: ll,
          image: buildMyMarkerImage()
        });
      } else {
        myMarker.setPosition(ll);
        myMarker.setMap(map);
      }
    },
    (err) => {
      console.log("그룹 위치 watch 오류:", err);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 10000
    }
  );
}

function stopGroupWatching() {
  if (groupWatchId !== null) {
    navigator.geolocation.clearWatch(groupWatchId);
    groupWatchId = null;
  }
}

async function uploadCurrentLocationOnce() {
  if (!navigator.geolocation || !currentRoomId) return;

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude, longitude, accuracy } = pos.coords;

      try {
        await updateMyGroupLocation(latitude, longitude, accuracy);
      } catch (err) {
        console.log("초기 위치 업로드 실패:", err);
      }

      const ll = new kakao.maps.LatLng(latitude, longitude);

      if (!myMarker) {
        myMarker = new kakao.maps.Marker({
          map,
          position: ll,
          image: buildMyMarkerImage()
        });
      } else {
        myMarker.setPosition(ll);
        myMarker.setMap(map);
      }
    },
    (err) => {
      console.log("초기 위치 확인 실패:", err);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }
  );
}

function randomRoom() {
  return "RIDE-" + Math.random().toString(36).slice(2, 6).toUpperCase();
}

function saveLocalInfo(name, room) {
  localStorage.setItem("ride_group_name", name);
  localStorage.setItem("ride_group_room_id", room);
  localStorage.setItem("ride_group_enabled", "on");
}

function buildInviteUrl() {
  const room = roomInput.value.trim() || currentRoomId;
  if (!room) return "";
  const base = `${location.origin}${location.pathname}`;
  return `${base}?room=${encodeURIComponent(room)}&auto=1`;
}

async function joinCurrentRoomAndMove() {
  try {
    await ensureAuth();

    const name = normalizeDisplayName(nameInput.value);
    const room = roomInput.value.trim();

    if (!validateDisplayName(name)) return;
    if (!room) return alert("방번호 입력");

    nameInput.value = name;
    currentRoomId = room;

    saveLocalInfo(name, room);
    updateRoomStatus();

    await ensureGroupMember();
    await loadExistingDestination(room);
    await uploadCurrentLocationOnce();
    startGroupWatching();

    location.href = "ride-map(kakaomap).html";
  } catch (err) {
    console.error(err);
    alert("방 참가 오류");
  }
}

async function shareInvite() {
  const room = roomInput.value.trim() || currentRoomId;
  if (!room) {
    alert("방 먼저 만드세요");
    return;
  }

  const inviteUrl = buildInviteUrl();

  try {
    await navigator.share({
      title: "그룹라이딩 초대",
      text: `방번호: ${room}\n이름 입력하고 바로 참가하세요`,
      url: inviteUrl
    });
  } catch (err) {
    // fallback
    navigator.clipboard.writeText(inviteUrl);
    alert("링크 복사됨");
  }
}

document.getElementById("createRoomBtn").onclick = async () => {
  try {
    await ensureAuth();

    const rawName = normalizeDisplayName(nameInput.value);
    if (!validateDisplayName(rawName)) return;

    let room = roomInput.value.trim();
    if (!room) room = randomRoom();

    await set(ref(db, `rideRooms/${room}`), {
      meta: {
        createdAt: Date.now(),
        createdBy: auth.currentUser.uid,
        title: `${rawName}의 그룹라이딩`,
        status: "open"
      }
    });

    currentRoomId = room;
    roomInput.value = room;
    nameInput.value = rawName;

    saveLocalInfo(rawName, room);
    updateRoomStatus();

    await ensureGroupMember();
    await loadExistingDestination(room);
    await uploadCurrentLocationOnce();
    startGroupWatching();

    alert(`방 생성 완료\n${room}`);
  } catch (err) {
    console.error(err);
    alert("방 생성 오류");
  }
};

document.getElementById("joinRoomBtn").onclick = async () => {
  await joinCurrentRoomAndMove();
};

document.getElementById("leaveRoomBtn").onclick = async () => {
  if (!currentRoomId) {
    alert("참가 중인 방이 없습니다");
    return;
  }

  if (!confirm("현재 방에서 나갈까요?")) return;

  try {
    await ensureAuth();
    await setMyGroupOffline();
    stopGroupWatching();

    currentRoomId = "";
    localStorage.removeItem("ride_group_enabled");

    updateRoomStatus();

    if (destMarker) {
      destMarker.setMap(null);
      destMarker = null;
    }

    if (myMarker) {
      myMarker.setMap(null);
      myMarker = null;
    }

    isSettingDest = false;

    alert("방에서 나갔습니다");
  } catch (err) {
    console.error(err);
    alert("방나가기 실패");
  }
};

document.getElementById("setDestBtn").onclick = async () => {
  const room = roomInput.value.trim() || currentRoomId;
  if (!room) return alert("방 먼저 만들기 또는 참가");

  currentRoomId = room;
  updateRoomStatus();

  await ensureAuth();
  isSettingDest = true;
  alert("지도에서 목적지 선택");
};

document.getElementById("clearDestBtn").onclick = async () => {
  if (!currentRoomId) return alert("방 없음");

  try {
    await update(ref(db, `rideRooms/${currentRoomId}/meta`), {
      destination: null
    });

    if (destMarker) {
      destMarker.setMap(null);
      destMarker = null;
    }

    isSettingDest = false;
    alert("목적지 삭제");
  } catch (err) {
    console.error(err);
    alert("목적지 삭제 실패");
  }
};

document.getElementById("inviteBtn").onclick = async () => {
  await shareInvite();
};

document.getElementById("moveRideBtn").onclick = async () => {
  const name = normalizeDisplayName(nameInput.value);
  const room = roomInput.value.trim() || currentRoomId;

  if (!validateDisplayName(name)) return;
  if (!room) return alert("방번호 확인");

  nameInput.value = name;
  saveLocalInfo(name, room);
  location.href = "ride-map(kakaomap).html";
};

document.getElementById("fitMapBtn").onclick = async () => {
  if (!map) return;

  if (destMarker) {
    map.panTo(destMarker.getPosition());
    return;
  }

  map.setCenter(new kakao.maps.LatLng(35.18, 128.10));
  map.setLevel(4);
};

document.getElementById("myLocBtn").onclick = () => {
  if (!navigator.geolocation || !map) return;

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const ll = new kakao.maps.LatLng(lat, lng);

      if (!myMarker) {
        myMarker = new kakao.maps.Marker({
          map,
          position: ll,
          image: buildMyMarkerImage()
        });
      } else {
        myMarker.setPosition(ll);
        myMarker.setMap(map);
      }

      map.panTo(ll);
      map.setLevel(3);
    },
    (err) => {
      console.log(err);
      alert("내 위치 확인 실패");
    },
    { enableHighAccuracy:true, maximumAge:0, timeout:10000 }
  );
};

nameInput.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    await joinCurrentRoomAndMove();
  }
});

window.addEventListener("resize", () => {
  if (!map) return;
  setTimeout(() => map.relayout(), 100);
});

window.addEventListener("pageshow", () => {
  if (!map) return;
  setTimeout(() => map.relayout(), 120);
});

loadSavedGroupInfo();
loadFromURL();
initMap();

window.addEventListener("load", async () => {
  if (!currentRoomId) return;

  try {
    await ensureAuth();
    await loadExistingDestination(currentRoomId);

    if (autoJoinMode) {
      setTimeout(() => {
        nameInput.focus();
      }, 200);
      return;
    }

    await ensureGroupMember();
    await uploadCurrentLocationOnce();
    startGroupWatching();
  } catch (err) {
    console.log("자동 그룹 복구 실패:", err);
  }
});

if (currentRoomId) {
  loadExistingDestination(currentRoomId);
}
</script>
</body>
</html>
