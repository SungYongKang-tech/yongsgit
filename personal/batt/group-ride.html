<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>그룹라이딩 설정</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=90120eccb060eed4b76790684d641951&libraries=services"></script>

<style>
  :root{
    --bg1:#0b1220;
    --bg2:#121c34;
    --card:rgba(15,23,42,0.82);
    --card2:rgba(30,41,59,0.86);
    --line:rgba(255,255,255,0.08);
    --text:#f8fafc;
    --muted:#94a3b8;
    --blue1:#3b82f6;
    --blue2:#1d4ed8;
    --green1:#22c55e;
    --green2:#16a34a;
    --red1:#ef4444;
    --red2:#dc2626;
    --shadow:0 10px 28px rgba(0,0,0,0.28);
    --radius:18px;
  }

  * { box-sizing:border-box; }

  html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    font-family:Arial, "Malgun Gothic", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
  }

  .app{
    height:100svh;
    display:flex;
    flex-direction:column;
    padding:
      calc(10px + env(safe-area-inset-top))
      10px
      calc(10px + env(safe-area-inset-bottom));
    gap:8px;
  }

  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:2px 4px;
  }

  .title-wrap{
    min-width:0;
  }

  .title{
    font-size:22px;
    font-weight:900;
    letter-spacing:-0.4px;
    line-height:1.1;
  }

  .subtitle{
    margin-top:2px;
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .status-pill{
    flex:0 0 auto;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(51,65,85,0.95), rgba(30,41,59,0.95));
    font-size:12px;
    font-weight:800;
    color:#e2e8f0;
    box-shadow:var(--shadow);
    white-space:nowrap;
  }

  .panel{
    background:linear-gradient(180deg, var(--card2), var(--card));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:10px;
  }

  .input-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:0;
  }

  .field-label{
    font-size:11px;
    color:var(--muted);
    font-weight:800;
    padding-left:2px;
  }

  .input{
    width:100%;
    height:40px;
    border:none;
    outline:none;
    border-radius:12px;
    padding:0 12px;
    font-size:14px;
    font-weight:700;
    color:#fff;
    background:rgba(15,23,42,0.88);
    border:1px solid rgba(255,255,255,0.07);
  }

  .input::placeholder{
    color:#7c8aa0;
    font-weight:600;
  }

  .btn-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .btn{
    height:42px;
    border:none;
    border-radius:14px;
    color:#fff;
    font-size:13px;
    font-weight:900;
    cursor:pointer;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,0.08);
    white-space:nowrap;
  }

  .btn.blue{
    background:linear-gradient(180deg, var(--blue1), var(--blue2));
  }

  .btn.green{
    background:linear-gradient(180deg, var(--green1), var(--green2));
  }

  .btn.red{
    background:linear-gradient(180deg, var(--red1), var(--red2));
  }

  .btn.dark{
    background:linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
  }

  .go-btn{
    height:46px;
    width:100%;
    border:none;
    border-radius:16px;
    color:#fff;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,0.08);
    background:linear-gradient(180deg, #0ea5e9, #2563eb);
  }

  .guide{
    font-size:12px;
    color:#cbd5e1;
    line-height:1.35;
    padding:0 2px;
  }

  .guide strong{
    color:#fff;
  }

  .map-card{
    flex:1;
    min-height:0;
    padding:0;
    overflow:hidden;
  }

  .map-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    padding:10px 12px 8px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    background:rgba(15,23,42,0.35);
  }

  .map-title{
    font-size:14px;
    font-weight:900;
  }

  .map-desc{
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .hint-chip{
    flex:0 0 auto;
    padding:6px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:800;
    color:#dbeafe;
    background:rgba(37,99,235,0.2);
    border:1px solid rgba(59,130,246,0.35);
  }

  #map{
    width:100%;
    height:100%;
    min-height:320px;
  }

  @media (max-width: 430px){
    .title{ font-size:20px; }
    .subtitle{ font-size:11px; }
    .input-grid{ grid-template-columns:1fr 1fr; }
    .btn{ font-size:12px; height:40px; }
    .go-btn{ font-size:14px; height:44px; }
    .field-label{ font-size:10px; }
    .input{ font-size:13px; padding:0 10px; }
    .map-top{ padding:9px 10px 7px; }
  }
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="title-wrap">
      <div class="title">그룹라이딩</div>
      <div class="subtitle">방 참가 · 목적지 지정 · 주행기록 연결</div>
    </div>
    <div class="status-pill" id="roomStatusEl">방 없음</div>
  </div>

  <div class="panel">
    <div class="input-grid">
      <div class="field">
        <div class="field-label">내 이름</div>
        <input id="nameInput" class="input" placeholder="이름" />
      </div>
      <div class="field">
        <div class="field-label">방 번호</div>
        <input id="roomInput" class="input" placeholder="자동생성 가능" />
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="btn-grid">
      <button id="createRoomBtn" class="btn blue">방 만들기</button>
      <button id="joinRoomBtn" class="btn green">방 참가</button>
      <button id="setDestBtn" class="btn dark">목적지 지정</button>
      <button id="clearDestBtn" class="btn red">목적지 지우기</button>
    </div>
  </div>

  <div class="panel" style="padding:10px 10px 12px;">
    <div class="guide">
      <strong>사용 방법</strong> : 이름 입력 → 방 만들기 또는 참가 → 목적지 지정 → 주행기록 화면으로 이동
    </div>
    <div style="margin-top:10px;">
      <button id="moveRideBtn" class="go-btn">🚴 주행기록으로 이동</button>
    </div>
  </div>

  <div class="panel map-card">
    <div class="map-top">
      <div style="min-width:0;">
        <div class="map-title">지도</div>
        <div class="map-desc">목적지는 지도에서 눌러 지정합니다</div>
      </div>
      <div class="hint-chip" id="destHintEl">대기중</div>
    </div>
    <div id="map"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQ2DvuwcyIctktubn7LlfJRP0hHfXfnCU",
  authDomain: "personal-51db3.firebaseapp.com",
  databaseURL: "https://personal-51db3-default-rtdb.firebaseio.com",
  projectId: "personal-51db3",
  storageBucket: "personal-51db3.firebasestorage.app",
  messagingSenderId: "146076749227",
  appId: "1:146076749227:web:2043208d688e60504816ee"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const nameInput = document.getElementById("nameInput");
const roomInput = document.getElementById("roomInput");
const roomStatusEl = document.getElementById("roomStatusEl");
const destHintEl = document.getElementById("destHintEl");

let map;
let currentRoomId = "";
let isSettingDest = false;
let destMarker = null;

function updateRoomStatus() {
  roomStatusEl.textContent = currentRoomId ? `방 ${currentRoomId}` : "방 없음";
}

function updateDestHint() {
  destHintEl.textContent = isSettingDest ? "지도 클릭" : "대기중";
}

function loadSavedGroupInfo() {
  const savedName = localStorage.getItem("ride_group_name") || "";
  const savedRoomId = localStorage.getItem("ride_group_room_id") || "";
  const savedEnabled = localStorage.getItem("ride_group_enabled") || "";

  if (savedName) nameInput.value = savedName;

  if (savedRoomId) {
    roomInput.value = savedRoomId;
    currentRoomId = savedRoomId;
  }

  if (savedEnabled === "on" && savedRoomId) {
    currentRoomId = savedRoomId;
  }

  updateRoomStatus();
}

function buildDestinationMarkerImage() {
  if (!(window.kakao && window.kakao.maps)) return null;

  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <path d="M14 1
               C7 1 2 6 2 13
               C2 22 14 35 14 35
               C14 35 26 22 26 13
               C26 6 21 1 14 1 Z"
            fill="#ef4444"
            stroke="#ffffff"
            stroke-width="2"/>
      <circle cx="14" cy="13" r="4" fill="#ffffff"/>
    </svg>`;
  const src = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);

  return new kakao.maps.MarkerImage(src, new kakao.maps.Size(28, 36), {
    offset: new kakao.maps.Point(14, 36)
  });
}

function initMap() {
  map = new kakao.maps.Map(document.getElementById("map"), {
    center: new kakao.maps.LatLng(35.18, 128.10),
    level: 4
  });

  map.addOverlayMapTypeId(kakao.maps.MapTypeId.BICYCLE);

  kakao.maps.event.addListener(map, "click", async function(mouseEvent) {
    if (!isSettingDest) return;

    const latlng = mouseEvent.latLng;
    const lat = latlng.getLat();
    const lng = latlng.getLng();

    if (!currentRoomId) {
      alert("방 먼저 참가하세요");
      isSettingDest = false;
      updateDestHint();
      return;
    }

    try {
      await update(ref(db, `rideRooms/${currentRoomId}/meta`), {
        destination: {
          lat,
          lng,
          name: "목적지",
          setAt: Date.now(),
          setBy: auth.currentUser ? auth.currentUser.uid : ""
        }
      });

      drawDest(lat, lng);
      isSettingDest = false;
      updateDestHint();
      alert("목적지 지정 완료");
    } catch (err) {
      console.error(err);
      isSettingDest = false;
      updateDestHint();
      alert("목적지 저장 실패");
    }
  });

  setTimeout(() => {
    if (map) map.relayout();
  }, 300);
}

function drawDest(lat, lng) {
  if (destMarker) destMarker.setMap(null);

  destMarker = new kakao.maps.Marker({
    map,
    position: new kakao.maps.LatLng(lat, lng),
    image: buildDestinationMarkerImage()
  });

  map.panTo(new kakao.maps.LatLng(lat, lng));
}

async function loadExistingDestination(roomId) {
  if (!roomId) return;

  try {
    const snap = await get(ref(db, `rideRooms/${roomId}/meta/destination`));
    const dest = snap.val();

    if (dest && typeof dest.lat === "number" && typeof dest.lng === "number") {
      drawDest(dest.lat, dest.lng);
    } else if (destMarker) {
      destMarker.setMap(null);
      destMarker = null;
    }
  } catch (err) {
    console.log("기존 목적지 불러오기 실패:", err);
  }
}

async function ensureAuth() {
  if (auth.currentUser) return;
  await signInAnonymously(auth);
}

function randomRoom() {
  return "RIDE-" + Math.random().toString(36).slice(2, 6).toUpperCase();
}

document.getElementById("createRoomBtn").onclick = async () => {
  try {
    await ensureAuth();

    const name = nameInput.value.trim();
    if (!name) return alert("이름을 입력하세요");

    let room = roomInput.value.trim();
    if (!room) room = randomRoom();

    await set(ref(db, `rideRooms/${room}`), {
      meta: {
        createdAt: Date.now(),
        createdBy: auth.currentUser.uid,
        title: `${name}의 그룹라이딩`,
        status: "open"
      }
    });

    currentRoomId = room;
    roomInput.value = room;

    localStorage.setItem("ride_group_name", name);
    localStorage.setItem("ride_group_room_id", room);
    localStorage.setItem("ride_group_enabled", "on");

    updateRoomStatus();
    await loadExistingDestination(room);

    alert(`방 생성 완료\n방 번호: ${room}`);
  } catch (err) {
    console.error(err);
    alert("방 생성 중 오류 발생");
  }
};

document.getElementById("joinRoomBtn").onclick = async () => {
  try {
    await ensureAuth();

    const name = nameInput.value.trim();
    const room = roomInput.value.trim();

    if (!name) return alert("이름을 입력하세요");
    if (!room) return alert("방 번호를 입력하세요");

    currentRoomId = room;

    localStorage.setItem("ride_group_name", name);
    localStorage.setItem("ride_group_room_id", room);
    localStorage.setItem("ride_group_enabled", "on");

    updateRoomStatus();
    await loadExistingDestination(room);

    alert("방 참가 완료");
  } catch (err) {
    console.error(err);
    alert("방 참가 중 오류 발생");
  }
};

document.getElementById("setDestBtn").onclick = async () => {
  const room = roomInput.value.trim() || currentRoomId;
  if (!room) return alert("방 먼저 만들거나 참가하세요");

  currentRoomId = room;
  updateRoomStatus();

  await ensureAuth();
  isSettingDest = true;
  updateDestHint();
  alert("지도에서 목적지를 눌러주세요");
};

document.getElementById("clearDestBtn").onclick = async () => {
  if (!currentRoomId) return alert("방 없음");

  try {
    await update(ref(db, `rideRooms/${currentRoomId}/meta`), {
      destination: null
    });

    if (destMarker) {
      destMarker.setMap(null);
      destMarker = null;
    }

    isSettingDest = false;
    updateDestHint();
    alert("목적지 삭제됨");
  } catch (err) {
    console.error(err);
    alert("목적지 삭제 실패");
  }
};

document.getElementById("moveRideBtn").onclick = () => {
  const name = nameInput.value.trim();
  const room = roomInput.value.trim() || currentRoomId;

  if (!name || !room) return alert("이름과 방 번호를 확인하세요");

  localStorage.setItem("ride_group_name", name);
  localStorage.setItem("ride_group_room_id", room);
  localStorage.setItem("ride_group_enabled", "on");

  location.href = "ride-map(kakaomap).html";
};

window.addEventListener("resize", () => {
  if (!map) return;
  setTimeout(() => map.relayout(), 120);
});

window.addEventListener("pageshow", () => {
  if (!map) return;
  setTimeout(() => map.relayout(), 150);
});

loadSavedGroupInfo();
initMap();
updateDestHint();

if (currentRoomId) {
  loadExistingDestination(currentRoomId);
}
</script>
</body>
</html>
