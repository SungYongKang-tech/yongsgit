<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주행기록 목록</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=90120eccb060eed4b76790684d641951"></script>
  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #121c34;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; }
    body {
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 10px 10px 14px;
    }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 10px; }
    .topbar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .btn {
      width: 100%; height: 40px; padding: 0 8px; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; background: linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; white-space: nowrap;
    }
    .btn.share { background: linear-gradient(180deg, #2563eb, #1d4ed8); }
    .panel {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.96));
      border: 1px solid var(--line); border-radius: 18px; padding: 12px; overflow: hidden;
    }
    .title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid var(--line); border-radius: 14px; padding: 8px 10px;
      background: rgba(30,41,59,0.6); cursor: pointer; transition: 0.15s ease;
    }
    .item.active { outline: 2px solid rgba(59,130,246,0.7); background: rgba(37,99,235,0.14); }
    .item-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .item-head-left { min-width: 0; flex: 1; width: 100%; }
    .item-title-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 4px; }
    .item-date { font-weight: 900; font-size: 14px; }
    .ride-name {
      font-size: 13px; font-weight: 800; color: #bfdbfe; background: rgba(37,99,235,0.18);
      border: 1px solid rgba(59,130,246,0.32); border-radius: 999px; padding: 3px 9px; max-width: 100%; word-break: break-word;
    }
    .item-toggle { color: var(--muted); font-size: 12px; font-weight: 800; white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
    .item-meta {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px 10px;
      margin-top: 6px; color: var(--muted); line-height: 1.35; width: 100%;
    }
    .item-meta span {
      display: flex; align-items: center; justify-content: center; width: 100%;
      text-align: center; font-size: 13px; font-weight: 700; white-space: nowrap;
    }
    .detail-wrap { margin-top: 8px; display: none; }
    .item.expanded .detail-wrap { display: block; }
    .detail-inner { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 4px; }
    .map-wrap {
      margin-top: 4px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.5);
    }
    .ride-map { width: 100%; height: 420px; }
    .chart-wrap {
      margin-top: 8px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.55); padding: 10px;
    }
    .chart-title { font-size: 13px; font-weight: 800; color: #cbd5e1; margin-bottom: 8px; }
    .chart-canvas {
      width: 100%; height: 180px; display: block; background: linear-gradient(180deg, rgba(59,130,246,0.10), rgba(15,23,42,0.10));
      border-radius: 10px;
    }
    .chart-meta { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
    .chart-meta span { font-size: 12px; font-weight: 700; color: #cbd5e1; text-align: center; }
    .empty { color: var(--muted); text-align: center; padding: 18px 0; }
    .title-inline-input {
      font-size: 13px; font-weight: 800; color: #fff; background: rgba(15,23,42,0.95);
      border: 1px solid rgba(59,130,246,0.45); border-radius: 999px; padding: 4px 10px; min-width: 90px; max-width: 100%; outline: none;
    }
    @media (max-width: 700px) {
      body { padding: 6px 6px 10px; }
      .wrap { max-width: 100%; gap: 8px; }
      .panel { padding: 10px; border-radius: 16px; }
      .title { font-size: 20px; }
      .item { padding: 9px; }
      .item-date { font-size: 13px; }
      .ride-name { font-size: 12px; }
      .item-meta { grid-template-columns: repeat(3, 1fr); gap: 4px 6px; }
      .item-meta span { font-size: 12px; }
      .ride-map { height: 320px; }
      .chart-canvas { height: 150px; }
      .chart-meta { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 420px) {
      .topbar { gap: 6px; }
      .btn { height: 38px; font-size: 12px; padding: 0 4px; }
      .title { font-size: 18px; }
      .item-meta { gap: 4px 4px; }
      .item-meta span { font-size: 11px; }
      .ride-map { height: 280px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn" id="rideBtn">주행</button>
      <button class="btn" id="batteryBtn">배터리</button>
      <button class="btn share" id="shareBtn">공유</button>
      <button class="btn" id="deleteBtn">삭제</button>
      <button class="btn" id="saveBtn">저장</button>
      <button class="btn" id="adminBtn">관리자</button>
    </div>

    <div class="panel">
      <div class="title">주행기록 목록</div>
      <div class="list" id="rideList"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getDatabase, ref, push, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ2DvuwcyIctktubn7LlfJRP0hHfXfnCU",
      authDomain: "personal-51db3.firebaseapp.com",
      databaseURL: "https://personal-51db3-default-rtdb.firebaseio.com",
      projectId: "personal-51db3",
      storageBucket: "personal-51db3.firebasestorage.app",
      messagingSenderId: "146076749227",
      appId: "1:146076749227:web:2043208d688e60504816ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const SAVED_RIDES_KEY = "ebike_saved_rides_v1";
    const SHARE_EXPIRE_DAYS = 3;
    const PRIVATE_RIDES_ROOT = "privateRides";
    const PASSWORD_HASH_PATH = "config/privateRidePasswordHash";
    const LINKED_HASH_STORAGE_KEY = "ride_private_linked_hash_v1";

    let selectedRideId = null;
    let expandedRideId = null;
    const mapInstances = new Map();

    async function ensureAuth() {
      if (auth.currentUser) return auth.currentUser;
      const cred = await signInAnonymously(auth);
      return cred.user;
    }

    function loadSavedRides() {
      try {
        const rides = JSON.parse(localStorage.getItem(SAVED_RIDES_KEY) || "[]");
        return Array.isArray(rides) ? rides : [];
      } catch (e) {
        console.error("loadSavedRides parse error:", e);
        return [];
      }
    }

    function saveSavedRides(rides) {
      localStorage.setItem(SAVED_RIDES_KEY, JSON.stringify(rides));
    }

    function getRideName(ride) {
      const name = String(ride?.title || "").trim();
      return name || "주행기록";
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(Number(ms || 0) / 1000));
      const hh = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const mm = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const ss = String(totalSec % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "-";
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const week = ["일", "월", "화", "수", "목", "금", "토"];
      const w = week[d.getDay()];
      return `${y}-${m}-${day}(${w}) ${hh}:${mm}`;
    }

    function formatTimeOnly(value) {
      if (!value) return "--:--";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "--:--";
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    async function sha256(text) {
      const data = new TextEncoder().encode(String(text || ""));
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function setLinkedHash(hash) {
      if (!hash) {
        localStorage.removeItem(LINKED_HASH_STORAGE_KEY);
        return;
      }
      localStorage.setItem(LINKED_HASH_STORAGE_KEY, hash);
    }

    function getLinkedHash() {
      return localStorage.getItem(LINKED_HASH_STORAGE_KEY) || "";
    }

    async function getSavedPasswordHash() {
      await ensureAuth();
      const snapshot = await get(ref(db, PASSWORD_HASH_PATH));
      return snapshot.exists() ? String(snapshot.val() || "") : "";
    }

    async function verifyPasswordAndGetHash(inputPassword) {
      const savedHash = await getSavedPasswordHash();
      if (!savedHash) {
        alert("저장 비밀번호가 아직 설정되지 않았습니다.\n관리자에서 먼저 설정하세요.");
        return "";
      }
      const inputHash = await sha256(inputPassword);
      return inputHash === savedHash ? inputHash : "";
    }

    function loadRideById(id) {
      return loadSavedRides().find(r => r.id === id);
    }

    function updateRideInLocal(updatedRide) {
      const rides = loadSavedRides();
      const idx = rides.findIndex(r => r.id === updatedRide.id);
      if (idx === -1) return;
      rides[idx] = updatedRide;
      saveSavedRides(rides);
    }

    function mergeCloudRidesIntoLocal(cloudRides) {
      const localRides = loadSavedRides();
      const byId = new Map(localRides.map(r => [r.id, r]));
      cloudRides.forEach(cloudRide => {
        const localId = cloudRide.localRideId || `cloud_${cloudRide.firebaseKey}`;
        byId.set(localId, {
          ...byId.get(localId),
          ...cloudRide,
          id: localId,
          title: cloudRide.title || byId.get(localId)?.title || "주행기록",
          firebaseSaved: true,
          firebaseKey: cloudRide.firebaseKey
        });
      });
      const mergedList = Array.from(byId.values()).sort((a, b) =>
        new Date(b.savedAt || 0).getTime() - new Date(a.savedAt || 0).getTime()
      );
      saveSavedRides(mergedList);
    }

    async function loadMyFirebaseRidesByHash(userHash, showEmptyMessage = false) {
      if (!userHash) return [];
      try {
        await ensureAuth();
        const snapshot = await get(ref(db, `${PRIVATE_RIDES_ROOT}/${userHash}`));
        if (!snapshot.exists()) {
          if (showEmptyMessage) alert("Firebase에 저장된 내 기록이 없습니다.");
          return [];
        }
        const raw = snapshot.val();
        const cloudRides = Object.entries(raw).map(([firebaseKey, value]) => ({
          ...value,
          firebaseSaved: true,
          firebaseKey
        }));
        mergeCloudRidesIntoLocal(cloudRides);
        renderList();
        return cloudRides;
      } catch (err) {
        console.error(err);
        alert("Firebase 목록 불러오기 중 오류가 발생했습니다.");
        return [];
      }
    }

    async function migratePrivateRides(oldHash, newHash) {
      if (!oldHash || !newHash || oldHash === newHash) return;
      const oldRef = ref(db, `${PRIVATE_RIDES_ROOT}/${oldHash}`);
      const newRef = ref(db, `${PRIVATE_RIDES_ROOT}/${newHash}`);
      const snapshot = await get(oldRef);
      if (!snapshot.exists()) return;
      await set(newRef, snapshot.val());
      await remove(oldRef);
    }

    function buildDetailHtml(ride) {
      const es = ride.elevationSummary || {};
      const hasElevation = Array.isArray(ride.elevationProfile) && ride.elevationProfile.length > 1;
      const hasSpeed = Array.isArray(ride.speedProfile) && ride.speedProfile.length > 1;
      const minSpeed = hasSpeed ? Math.min(...ride.speedProfile.map(p => Number(p.speedKmh || 0))) : 0;

      return `
        <div class="detail-wrap">
          <div class="detail-inner">
            <div class="map-wrap">
              <div class="ride-map" id="map-${ride.id}"></div>
            </div>

            <div class="chart-wrap">
              <div class="chart-title">고도표</div>
              ${
                hasElevation
                  ? `<canvas class="chart-canvas" id="elevation-${ride.id}"></canvas>
                     <div class="chart-meta">
                       <span>최저 ${Number(es.minElevation || 0)}m</span>
                       <span>최고 ${Number(es.maxElevation || 0)}m</span>
                       <span>상승 ${Number(es.gainM || 0)}m</span>
                       <span>하강 ${Number(es.lossM || 0)}m</span>
                     </div>`
                  : `<div class="empty" style="padding:12px 0;">고도 데이터 없음</div>`
              }
            </div>

            <div class="chart-wrap">
              <div class="chart-title">속도 그래프</div>
              ${
                hasSpeed
                  ? `<canvas class="chart-canvas" id="speed-${ride.id}"></canvas>
                     <div class="chart-meta">
                       <span>평균 ${Number(ride.avgSpeedKmh || 0).toFixed(1)}km/h</span>
                       <span>최고 ${Number(ride.maxSpeedKmh || 0).toFixed(1)}km/h</span>
                       <span>최저 ${Number(minSpeed || 0).toFixed(1)}km/h</span>
                       <span>샘플 ${ride.speedProfile.length}개</span>
                     </div>`
                  : `<div class="empty" style="padding:12px 0;">속도 데이터 없음</div>`
              }
            </div>
          </div>
        </div>
      `;
    }

    function destroyMapInstance(rideId) {
      const existing = mapInstances.get(rideId);
      if (!existing) return;
      const mapEl = document.getElementById(`map-${rideId}`);
      if (mapEl) mapEl.innerHTML = "";
      mapInstances.delete(rideId);
    }

    function createMapForRide(ride) {
      const mapEl = document.getElementById(`map-${ride.id}`);
      if (!mapEl || !window.kakao || !kakao.maps) return;

      destroyMapInstance(ride.id);

      const path = Array.isArray(ride.path) ? ride.path : [];
      const defaultCenter = new kakao.maps.LatLng(35.180, 128.107);
      const map = new kakao.maps.Map(mapEl, { center: defaultCenter, level: 5 });

      const linePath = path
        .filter(p => Array.isArray(p) && p.length >= 2)
        .map(([lat, lng]) => new kakao.maps.LatLng(lat, lng));

      let polyline = null;
      let startMarker = null;
      let endMarker = null;

      if (linePath.length > 0) {
        polyline = new kakao.maps.Polyline({
          map,
          path: linePath,
          strokeWeight: 6,
          strokeColor: "#3b82f6",
          strokeOpacity: 0.9,
          strokeStyle: "solid"
        });
        startMarker = new kakao.maps.Marker({ map, position: linePath[0], title: "출발" });
        endMarker = new kakao.maps.Marker({ map, position: linePath[linePath.length - 1], title: "도착" });
        const bounds = new kakao.maps.LatLngBounds();
        linePath.forEach(pos => bounds.extend(pos));
        map.setBounds(bounds);
      }

      mapInstances.set(ride.id, { map, polyline, startMarker, endMarker });

      setTimeout(() => {
        map.relayout();
        if (linePath.length > 0) {
          const bounds = new kakao.maps.LatLngBounds();
          linePath.forEach(pos => bounds.extend(pos));
          map.setBounds(bounds);
        }
      }, 120);
    }

    function smoothElevation(profile, windowSize = 5) {
      const result = [];
      for (let i = 0; i < profile.length; i++) {
        let sum = 0, count = 0;
        for (let j = -Math.floor(windowSize / 2); j <= Math.floor(windowSize / 2); j++) {
          const idx = i + j;
          if (idx >= 0 && idx < profile.length) {
            sum += Number(profile[idx].elevation || 0);
            count++;
          }
        }
        result.push({ ...profile[i], elevation: sum / count });
      }
      return result;
    }

    function drawChart({
      canvasId,
      profile,
      valueKey,
      lineColor,
      fillTop,
      fillBottom,
      unit
    }) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || profile.length < 2) return;

      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const cssWidth = canvas.clientWidth || 300;
      const cssHeight = canvas.clientHeight || 180;
      canvas.width = Math.floor(cssWidth * dpr);
      canvas.height = Math.floor(cssHeight * dpr);

      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, cssWidth, cssHeight);

      const padding = { top: 14, right: 12, bottom: 24, left: 40 };
      const chartW = cssWidth - padding.left - padding.right;
      const chartH = cssHeight - padding.top - padding.bottom;

      const values = profile.map(p => Number(p[valueKey] || 0));
      const distances = profile.map(p => Number(p.distanceKm || 0));
      const minV = Math.min(...values);
      const maxV = Math.max(...values);
      const maxD = Math.max(...distances, 0.1);

      let rangeV = maxV - minV;
      if (rangeV < 10) rangeV = 10;
      const viewMinV = valueKey === "speedKmh" ? Math.max(0, minV - rangeV * 0.15) : minV - rangeV * 0.15;
      const viewMaxV = maxV + rangeV * 0.15;

      const x = d => padding.left + (d / maxD) * chartW;
      const y = v => padding.top + ((viewMaxV - v) / (viewMaxV - viewMinV)) * chartH;

      ctx.strokeStyle = "rgba(148,163,184,0.25)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const gy = padding.top + (chartH / 3) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, gy);
        ctx.lineTo(padding.left + chartW, gy);
        ctx.stroke();
      }

      ctx.fillStyle = "#94a3b8";
      ctx.font = "11px Arial";
      ctx.textAlign = "right";
      ctx.fillText(`${Math.round(viewMaxV)}${unit}`, padding.left - 6, padding.top + 4);
      ctx.fillText(`${Math.round((viewMinV + viewMaxV) / 2)}${unit}`, padding.left - 6, padding.top + chartH / 2 + 4);
      ctx.fillText(`${Math.round(viewMinV)}${unit}`, padding.left - 6, padding.top + chartH + 4);

      ctx.textAlign = "center";
      ctx.fillText("0km", padding.left, cssHeight - 6);
      ctx.fillText(`${maxD.toFixed(1)}km`, padding.left + chartW, cssHeight - 6);

      ctx.beginPath();
      ctx.moveTo(x(distances[0]), y(values[0]));
      for (let i = 1; i < profile.length; i++) ctx.lineTo(x(distances[i]), y(values[i]));
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      ctx.lineTo(padding.left + chartW, padding.top + chartH);
      ctx.lineTo(padding.left, padding.top + chartH);
      ctx.closePath();

      const fill = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
      fill.addColorStop(0, fillTop);
      fill.addColorStop(1, fillBottom);
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function drawElevationChart(ride) {
      let profile = Array.isArray(ride.elevationProfile) ? ride.elevationProfile : [];
      profile = smoothElevation(profile, 5);
      drawChart({
        canvasId: `elevation-${ride.id}`,
        profile,
        valueKey: "elevation",
        lineColor: "#60a5fa",
        fillTop: "rgba(96,165,250,0.35)",
        fillBottom: "rgba(96,165,250,0.03)",
        unit: "m"
      });
    }

    function smoothSpeedProfile(profile, windowSize = 5) {
      const result = [];
      for (let i = 0; i < profile.length; i++) {
        let sum = 0, count = 0;
        for (let j = -Math.floor(windowSize / 2); j <= Math.floor(windowSize / 2); j++) {
          const idx = i + j;
          if (idx >= 0 && idx < profile.length) {
            sum += Number(profile[idx].speedKmh || 0);
            count++;
          }
        }
        result.push({
          ...profile[i],
          speedKmh: count ? (sum / count) : Number(profile[i].speedKmh || 0)
        });
      }
      return result;
    }

    function drawSpeedChart(ride) {
      let profile = Array.isArray(ride.speedProfile) ? ride.speedProfile : [];
      profile = smoothSpeedProfile(profile, 5);
      drawChart({
        canvasId: `speed-${ride.id}`,
        profile,
        valueKey: "speedKmh",
        lineColor: "#22c55e",
        fillTop: "rgba(34,197,94,0.30)",
        fillBottom: "rgba(34,197,94,0.03)",
        unit: "km/h"
      });
    }

    function renderList() {
      const rides = loadSavedRides();
      const rideList = document.getElementById("rideList");
      rideList.innerHTML = "";

      if (!rides.length) {
        rideList.innerHTML = '<div class="empty">저장된 주행기록이 없습니다</div>';
        return;
      }

      rides.forEach((ride) => {
        const item = document.createElement("div");
        item.className = "item";
        if (ride.id === selectedRideId) item.classList.add("active");
        if (ride.id === expandedRideId) item.classList.add("expanded");

        const rideName = getRideName(ride);
        const isExpanded = ride.id === expandedRideId;

        item.innerHTML = `
          <div class="item-head">
            <div class="item-head-left">
              <div class="item-title-row">
                <div class="item-date">${formatDate(ride.savedAt)}</div>

                <span>평균 ${Number(ride.avgSpeedKmh || 0).toFixed(1)}km/h</span>
                <span>최고 ${Number(ride.maxSpeedKmh || 0).toFixed(1)}km/h</span>

          </div>

        `;

        let pressTimer = null;
        let longPressed = false;
        const rideNameEl = item.querySelector(".ride-name");

        if (rideNameEl) {
          rideNameEl.addEventListener("click", (e) => {
            e.stopPropagation();
            if (longPressed) return;
          });

          const startPress = (e) => {
            e.stopPropagation();
            longPressed = false;
            pressTimer = setTimeout(() => {
              longPressed = true;
              startTitleEdit(ride.id);
            }, 600);
          };

          const cancelPress = () => {
            if (pressTimer) clearTimeout(pressTimer);
          };

          rideNameEl.addEventListener("mousedown", startPress);
          rideNameEl.addEventListener("mouseup", cancelPress);
          rideNameEl.addEventListener("mouseleave", cancelPress);
          rideNameEl.addEventListener("touchstart", startPress);
          rideNameEl.addEventListener("touchend", cancelPress);
          rideNameEl.addEventListener("touchcancel", cancelPress);
        }

        item.addEventListener("click", () => toggleRide(ride.id));
        rideList.appendChild(item);
      });

      if (expandedRideId) {
        const expandedRide = rides.find(r => r.id === expandedRideId);
        if (expandedRide) {
          createMapForRide(expandedRide);
          setTimeout(() => {
            drawElevationChart(expandedRide);
            drawSpeedChart(expandedRide);
          }, 80);
        }
      }
    }

    function toggleRide(id) {
      if (expandedRideId === id) {
        destroyMapInstance(id);
        expandedRideId = null;
        selectedRideId = id;
        renderList();
        return;
      }
      if (expandedRideId) destroyMapInstance(expandedRideId);
      selectedRideId = id;
      expandedRideId = id;
      renderList();
    }

    function saveRideTitleInline(id, title) {
      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === id);
      if (!ride) return;
      ride.title = String(title || "").trim().slice(0, 30) || "주행기록";
      saveSavedRides(rides);
      selectedRideId = id;
      renderList();
    }

    function startTitleEdit(id) {
      const nameEl = document.querySelector(`.ride-name[data-id="${id}"]`);
      if (!nameEl) return;
      const oldTitle = nameEl.textContent.trim();
      const input = document.createElement("input");
      input.type = "text";
      input.value = oldTitle;
      input.maxLength = 30;
      input.className = "title-inline-input";
      input.setAttribute("data-id", id);
      nameEl.replaceWith(input);
      input.focus();
      input.select();

      const finish = () => saveRideTitleInline(id, input.value);
      input.addEventListener("click", e => e.stopPropagation());
      input.addEventListener("blur", finish, { once: true });
      input.addEventListener("keydown", (e) => {
        e.stopPropagation();
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") renderList();
      });
    }

    function getPerpendicularDistance(point, lineStart, lineEnd) {
  const [x, y] = point;
  const [x1, y1] = lineStart;
  const [x2, y2] = lineEnd;

  const dx = x2 - x1;
  const dy = y2 - y1;

  if (dx === 0 && dy === 0) {
    const ddx = x - x1;
    const ddy = y - y1;
    return Math.sqrt(ddx * ddx + ddy * ddy);
  }

  const t = ((x - x1) * dx + (y - y1) * dy) / (dx * dx + dy * dy);
  const projX = x1 + t * dx;
  const projY = y1 + t * dy;

  const distX = x - projX;
  const distY = y - projY;
  return Math.sqrt(distX * distX + distY * distY);
}

function douglasPeucker(points, epsilon) {
  if (!Array.isArray(points) || points.length < 3) return points || [];

  let maxDistance = 0;
  let index = 0;

  for (let i = 1; i < points.length - 1; i++) {
    const distance = getPerpendicularDistance(points[i], points[0], points[points.length - 1]);
    if (distance > maxDistance) {
      index = i;
      maxDistance = distance;
    }
  }

  if (maxDistance > epsilon) {
    const left = douglasPeucker(points.slice(0, index + 1), epsilon);
    const right = douglasPeucker(points.slice(index), epsilon);
    return left.slice(0, -1).concat(right);
  }

  return [points[0], points[points.length - 1]];
}

function reduceProfileSimple(profile, maxPoints = 1200) {
  if (!Array.isArray(profile) || profile.length <= maxPoints) return Array.isArray(profile) ? profile : [];

  const step = Math.ceil(profile.length / maxPoints);
  const reduced = [];

  for (let i = 0; i < profile.length; i += step) {
    reduced.push(profile[i]);
  }

  const last = profile[profile.length - 1];
  if (reduced[reduced.length - 1] !== last) {
    reduced.push(last);
  }

  return reduced;
}

function reducePathDouglasPeucker(path, options = {}) {
  const {
    epsilon = 0.00003,   // 대략 3m 전후
    maxPoints = 2000
  } = options;

  if (!Array.isArray(path) || path.length <= 2) return Array.isArray(path) ? path : [];

  let reduced = douglasPeucker(path, epsilon);

  // 혹시 아직도 너무 많으면 마지막에 한 번 더 균등 축소
  if (reduced.length > maxPoints) {
    const step = Math.ceil(reduced.length / maxPoints);
    const trimmed = [];

    for (let i = 0; i < reduced.length; i += step) {
      trimmed.push(reduced[i]);
    }

    const last = reduced[reduced.length - 1];
    if (trimmed[trimmed.length - 1] !== last) {
      trimmed.push(last);
    }
    reduced = trimmed;
  }

  return reduced;
}


    async function shareSelectedRide() {
      if (!selectedRideId) {
        alert("공유할 기록을 먼저 선택해주세요.");
        return;
      }
      const ride = loadRideById(selectedRideId);
      if (!ride) {
        alert("선택한 기록을 찾을 수 없습니다.");
        return;
      }
      if (!Array.isArray(ride.path) || ride.path.length < 2) {
        alert("공유할 경로 데이터가 부족합니다.");
        return;
      }
      const reducedPath = reducePathDouglasPeucker(ride.path, {
  epsilon: 0.00003,
  maxPoints: 2000
});

if (!Array.isArray(reducedPath) || reducedPath.length < 2) {
  alert("공유용 경로 축소 처리에 실패했습니다.");
  return;
}
      try {
        await ensureAuth();
        const createdAt = Date.now();
        const expireAt = createdAt + SHARE_EXPIRE_DAYS * 24 * 60 * 60 * 1000;
        const shareData = {
          createdAt,
          expireAt,
          savedAt: ride.savedAt || new Date().toISOString(),
          title: getRideName(ride),
          totalDistanceM: Number(ride.totalDistanceM || 0),
          elapsedMs: Number(ride.elapsedMs || 0),
          avgSpeedKmh: Number(ride.avgSpeedKmh || 0),
          maxSpeedKmh: Number(ride.maxSpeedKmh || 0),
          startPoint: ride.startPoint || null,
          startTime: ride.startTime || null,
          endTime: ride.endTime || null,
          restMs: Number(ride.restMs || 0),
          path: reducedPath,
elevationProfile: reduceProfileSimple(ride.elevationProfile, 1000),
elevationSummary: ride.elevationSummary || null,
speedProfile: reduceProfileSimple(ride.speedProfile, 1000)
        };

        const newRef = push(ref(db, "sharedRides"));
        await set(newRef, shareData);

        const shareUrl = `${location.origin}${location.pathname.replace("ride-history.html", "ride-view.html")}?id=${newRef.key}`;
        const shareTitle = `${getRideName(ride)} 공유`;
        const shareText =
          `${getRideName(ride)}\n` +
          `거리 ${(Number(ride.totalDistanceM || 0) / 1000).toFixed(2)}km\n` +
          `평균 ${Number(ride.avgSpeedKmh || 0).toFixed(1)}km/h\n` +
          `최고 ${Number(ride.maxSpeedKmh || 0).toFixed(1)}km/h`;

        if (navigator.share) {
          try {
            await navigator.share({ title: shareTitle, text: shareText, url: shareUrl });
            return;
          } catch (shareErr) {
            if (shareErr && shareErr.name === "AbortError") return;
            console.warn("navigator.share 실패:", shareErr);
          }
        }

        try {
          await navigator.clipboard.writeText(shareUrl);
          alert(`공유 링크가 복사되었습니다.\n\n${shareUrl}`);
        } catch {
          prompt("아래 링크를 복사해서 보내주세요.", shareUrl);
        }
      } catch (err) {
        console.error(err);
        alert("공유 링크 생성 중 오류가 발생했습니다.");
      }
    }

    async function saveSelectedRideToFirebase() {
      if (!selectedRideId) {
        alert("저장할 기록을 먼저 선택해주세요.");
        return;
      }
      const ride = loadRideById(selectedRideId);
      if (!ride) {
        alert("선택한 기록을 찾을 수 없습니다.");
        return;
      }
      if (!Array.isArray(ride.path) || ride.path.length < 2) {
        alert("저장할 경로 데이터가 부족합니다.");
        return;
      }
      const pw = prompt("저장 비밀번호를 입력하세요.");
      if (pw === null) return;

      try {
        const userHash = await verifyPasswordAndGetHash(pw);
        if (!userHash) {
          alert("비밀번호가 맞지 않습니다.");
          return;
        }
        await ensureAuth();

        const payload = {
          savedAt: ride.savedAt || new Date().toISOString(),
          title: getRideName(ride),
          totalDistanceM: Number(ride.totalDistanceM || 0),
          elapsedMs: Number(ride.elapsedMs || 0),
          restMs: Number(ride.restMs || 0),
          avgSpeedKmh: Number(ride.avgSpeedKmh || 0),
          maxSpeedKmh: Number(ride.maxSpeedKmh || 0),
          startPoint: ride.startPoint || null,
          startTime: ride.startTime || null,
          endTime: ride.endTime || null,
          path: Array.isArray(ride.path) ? ride.path : [],
          elevationProfile: Array.isArray(ride.elevationProfile) ? ride.elevationProfile : [],
          elevationSummary: ride.elevationSummary || null,
          speedProfile: Array.isArray(ride.speedProfile) ? ride.speedProfile : [],
          localRideId: ride.id,
          updatedAt: Date.now()
        };

        let firebaseKey = ride.firebaseKey || null;
        if (firebaseKey) {
          await set(ref(db, `${PRIVATE_RIDES_ROOT}/${userHash}/${firebaseKey}`), payload);
        } else {
          const newRef = push(ref(db, `${PRIVATE_RIDES_ROOT}/${userHash}`));
          firebaseKey = newRef.key;
          await set(newRef, payload);
        }

        const updatedRide = { ...ride, firebaseSaved: true, firebaseKey };
        updateRideInLocal(updatedRide);
        setLinkedHash(userHash);
        selectedRideId = updatedRide.id;
        await loadMyFirebaseRidesByHash(userHash);
        alert("선택한 기록을 Firebase에 저장했습니다.");
      } catch (err) {
        console.error(err);
        alert("Firebase 저장 중 오류가 발생했습니다.");
      }
    }

    async function deleteSelectedRide() {
      if (!selectedRideId) {
        alert("삭제할 기록을 먼저 선택해주세요.");
        return;
      }
      const ride = loadRideById(selectedRideId);
      if (!ride) {
        alert("선택한 기록을 찾을 수 없습니다.");
        return;
      }
      if (!confirm("선택한 주행기록을 삭제할까요?")) return;

      try {
        if (ride.firebaseSaved && ride.firebaseKey) {
          const pw = prompt("Firebase 저장 기록입니다.\n삭제 비밀번호를 입력하세요.");
          if (pw === null) return;
          const userHash = await verifyPasswordAndGetHash(pw);
          if (!userHash) {
            alert("비밀번호가 맞지 않습니다.");
            return;
          }
          await ensureAuth();
          await remove(ref(db, `${PRIVATE_RIDES_ROOT}/${userHash}/${ride.firebaseKey}`));
          setLinkedHash(userHash);
        }

        if (expandedRideId) destroyMapInstance(expandedRideId);
        const rides = loadSavedRides().filter(r => r.id !== selectedRideId);
        saveSavedRides(rides);
        if (expandedRideId === selectedRideId) expandedRideId = null;
        selectedRideId = null;
        renderList();
        alert("삭제되었습니다.");
      } catch (err) {
        console.error(err);
        alert("삭제 중 오류가 발생했습니다.");
      }
    }

    async function openAdminPasswordManager() {
      try {
        await ensureAuth();
        const existingHash = await getSavedPasswordHash();

        if (!existingHash) {
          const newPw = prompt("처음 사용할 저장/삭제 비밀번호를 입력하세요.");
          if (newPw === null) return;
          const cleaned = String(newPw).trim();
          if (cleaned.length < 4) {
            alert("비밀번호는 4자리 이상으로 입력하세요.");
            return;
          }
          const confirmPw = prompt("새 비밀번호를 다시 입력하세요.");
          if (confirmPw === null) return;
          if (cleaned !== String(confirmPw).trim()) {
            alert("비밀번호가 서로 다릅니다.");
            return;
          }
          const newHash = await sha256(cleaned);
          await set(ref(db, PASSWORD_HASH_PATH), newHash);
          setLinkedHash(newHash);
          await loadMyFirebaseRidesByHash(newHash);
          alert("비밀번호가 설정되었고, 이 기기가 연결되었습니다.");
          return;
        }

        const currentPw = prompt("현재 비밀번호를 입력하세요.\n(이 기기를 연결하려면 현재 비밀번호 확인이 필요합니다)");
        if (currentPw === null) return;
        const currentHash = await verifyPasswordAndGetHash(currentPw);
        if (!currentHash) {
          alert("현재 비밀번호가 맞지 않습니다.");
          return;
        }
        setLinkedHash(currentHash);
        await loadMyFirebaseRidesByHash(currentHash, true);

        const doChange = confirm("비밀번호를 변경할까요?\n취소를 누르면 현재 비밀번호로 이 기기만 연결합니다.");
        if (!doChange) {
          alert("이 기기에서 Firebase 목록을 볼 수 있게 연결되었습니다.");
          return;
        }

        const newPw = prompt("새 비밀번호를 입력하세요.");
        if (newPw === null) return;
        const cleaned = String(newPw).trim();
        if (cleaned.length < 4) {
          alert("비밀번호는 4자리 이상으로 입력하세요.");
          return;
        }
        const confirmPw = prompt("새 비밀번호를 다시 입력하세요.");
        if (confirmPw === null) return;
        if (cleaned !== String(confirmPw).trim()) {
          alert("비밀번호가 서로 다릅니다.");
          return;
        }

        const newHash = await sha256(cleaned);
        await migratePrivateRides(currentHash, newHash);
        await set(ref(db, PASSWORD_HASH_PATH), newHash);
        setLinkedHash(newHash);
        await loadMyFirebaseRidesByHash(newHash);
        alert("비밀번호가 변경되었고, 기존 Firebase 기록도 새 비밀번호로 옮겼습니다.");
      } catch (err) {
        console.error(err);
        alert("관리자 처리 중 오류가 발생했습니다.");
      }
    }

      location.href = "./ride-map(kakaomap).html";
    });
    document.getElementById("batteryBtn").addEventListener("click", () => {
      location.href = "./index.html";
    });
    document.getElementById("shareBtn").addEventListener("click", shareSelectedRide);
    document.getElementById("deleteBtn").addEventListener("click", deleteSelectedRide);
    document.getElementById("saveBtn").addEventListener("click", saveSelectedRideToFirebase);
    document.getElementById("adminBtn").addEventListener("click", openAdminPasswordManager);

    window.addEventListener("resize", () => {
      if (!expandedRideId) return;
      const instance = mapInstances.get(expandedRideId);
      const rides = loadSavedRides();
      const ride = rides.find(r => r.id === expandedRideId);

      setTimeout(() => {
        if (instance) {
          instance.map.relayout();
          const path = Array.isArray(ride?.path) ? ride.path : [];
          if (path.length > 0) {
            const bounds = new kakao.maps.LatLngBounds();
            path.forEach(([lat, lng]) => bounds.extend(new kakao.maps.LatLng(lat, lng)));
            instance.map.setBounds(bounds);
          }
        }
        if (ride) {
          drawElevationChart(ride);
          drawSpeedChart(ride);
        }
      }, 80);
    });

      renderList();
      const linkedHash = getLinkedHash();
      if (linkedHash) await loadMyFirebaseRidesByHash(linkedHash);
    }

    initHistoryPage();
