<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>내 코스 관리</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=90120eccb060eed4b76790684d641951&libraries=services"></script>
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#121c34;
      --card:rgba(15,23,42,0.82);
      --card2:rgba(30,41,59,0.86);
      --line:rgba(255,255,255,0.08);
      --text:#f8fafc;
      --muted:#94a3b8;
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --green:#16a34a;
      --red:#dc2626;
      --amber:#d97706;
    }
    *{box-sizing:border-box}
    html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:linear-gradient(180deg,var(--bg2) 0%, var(--bg1) 100%);
  color:var(--text);
  font-family:Arial,sans-serif;
}

body{-webkit-tap-highlight-color:transparent;}

.app{
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:calc(6px + env(safe-area-inset-top)) 6px calc(52px + env(safe-area-inset-bottom));
  overflow:hidden;
}
    .topbar{display:grid;grid-template-columns:1fr auto auto;gap:4px;align-items:center}
    .title{
      font-size:19px;font-weight:900;letter-spacing:-0.3px;padding-left:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .top-btn,.chip,.action-btn,.bottom-action{
      border:1px solid var(--line);color:#fff;font-weight:800;cursor:pointer;
      background:linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
    }
    .top-btn{
      height:26px;min-width:58px;border-radius:9px;font-size:10px;padding:0 6px;white-space:nowrap;
    }
    .top-btn.primary,.chip.active,.action-btn.primary,.bottom-action.primary{
      background:linear-gradient(180deg,var(--blue),var(--blue2));
    }
    .action-btn.green,.bottom-action.green{background:linear-gradient(180deg,#22c55e,var(--green))}
    .action-btn.red,.bottom-action.red{background:linear-gradient(180deg,#ef4444,var(--red))}
    .action-btn.amber,.bottom-action.amber{background:linear-gradient(180deg,#f59e0b,var(--amber))}
    .top-btn:active,.chip:active,.action-btn:active,.bottom-action:active{transform:translateY(1px) scale(0.99)}

    .chips,.subchips{display:grid;gap:4px}
    .chips{grid-template-columns:repeat(2,1fr)}
    .subchips{grid-template-columns:repeat(2,1fr)}
    .chip{
  height:36px;
  border-radius:11px;
  font-size:14px;
  padding:0 14px;
  white-space:nowrap;
}

    .section{
  border:1px solid var(--line);
  border-radius:14px;
  background:linear-gradient(180deg,var(--card2),var(--card));
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

    .desktop-grid{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.map-panel{
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}
    .input{
  width:100%;
  height:36px;
  border-radius:11px;
  border:1px solid var(--line);
  background:rgba(15,23,42,0.9);
  color:#fff;
  padding:0 12px;
  outline:none;
  font-size:14px;
}
    .map-toolbar{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
    .map-toolbar-2{display:grid;grid-template-columns:1fr 1fr;gap:4px}
    .action-btn{
  flex:1 1 auto;          /* ← 핵심 (균등 분배) */
  min-width:0;            /* ← 넘침 방지 */
  height:36px;
  font-size:13px;
  padding:0 8px;
  white-space:nowrap;
}

    .map-wrap{
  width:100%;
  height:42dvh;
  min-height:280px;
  max-height:none;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--line);
  background:rgba(15,23,42,0.72);
  flex:0 0 auto;
}

#map{
  width:100%;
  height:100%;
}

.section.list-panel{
  flex:1;
  min-height:0;
  overflow:hidden;
}

.list{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:6px;
  align-content:start;
  padding-right:2px;
}

.card{
  border:1px solid var(--line);
  border-radius:12px;
  background:rgba(15,23,42,0.72);
  padding:7px 8px;
  display:flex;
  flex-direction:column;
  gap:2px;
  min-height:auto;
}

.card.selected{
  outline:2px solid rgba(37,99,235,0.65);
  background:rgba(37,99,235,0.14);
}

.card-title{
  font-size:12px;
  font-weight:900;
  line-height:1.3;
  word-break:keep-all;
}

.meta{
  font-size:11px;
  color:var(--muted);
  line-height:1.35;
  white-space:pre-line;
  word-break:keep-all;
}

.empty{
  grid-column:1 / -1;

}
    .empty{

    .bottom-bar{

.bottom-bar-inner{

}

.bottom-action{
  height:30px;
  border-radius:10px;
  font-size:11px;
  padding:0 4px;
}
    .bottom-placeholder{
      text-align:center;color:var(--muted);font-size:12px;padding:10px 0;
    }

    .helper{
      font-size:12px;color:var(--muted);padding:2px 2px 0 2px;
    }

}

.build-top-row{

<body>
  <div class="app">
    <div class="topbar">
      <div class="title">내 코스 관리</div>
      <button class="top-btn" id="backBtn">주행화면</button>
      <button class="top-btn primary" id="reloadBtn">새로고침</button>
    </div>

    <div class="chips">
      <button class="chip active" id="tabViewBtn">코스확인</button>
      <button class="chip" id="tabBuildBtn">코스만들기</button>
    </div>

    <div class="desktop-grid">
      <div class="section map-panel">
       <div class="build-top-row">
  <input class="input course-name-short" id="courseNameInput" placeholder="코스 이름" />

 <div class="toolbar-single-row">

  <button class="chip active" id="buildFromRideBtn">기록등록</button>
  <button class="chip" id="buildManualBtn">직접등록</button>

  <button class="action-btn amber" id="editToggleBtn">편집시작</button>
  <button class="action-btn" id="undoBtn">점삭제</button>
  <button class="action-btn red" id="clearManualBtn">전체지우기</button>
  <button class="action-btn green" id="saveManualBtn">코스저장</button>
  <button class="action-btn primary" id="fitMapBtn">전체보기</button>

</div>
    

  <div id="rideTools" style="display:block;">
    <div class="toolbar-single-row">
      <button class="action-btn primary" id="fitMapBtn2">전체보기</button>
      <button class="action-btn" id="fillRideNameBtn">이름자동입력</button>
    </div>
    <div class="helper">기록등록 탭에서 기록을 선택한 뒤 코스로 저장하세요.</div>
  </div>
</div>

        <div class="map-wrap">
          <div id="map"></div>
        </div>
      </div>

      <div class="section list-panel">
  <div class="list" id="listEl"></div>
</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div id="bottomBarContent"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ2DvuwcyIctktubn7LlfJRP0hHfXfnCU",
      authDomain: "personal-51db3.firebaseapp.com",
      databaseURL: "https://personal-51db3-default-rtdb.firebaseio.com",
      projectId: "personal-51db3",
      storageBucket: "personal-51db3.firebasestorage.app",
      messagingSenderId: "146076749227",
      appId: "1:146076749227:web:2043208d688e60504816ee"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const SAVED_RIDES_KEY = "ebike_saved_rides_v1";
    const SELECTED_COURSE_KEY = "ebike_selected_course_v1";
    const DEFAULT_CENTER = { lat: 35.180, lng: 128.107 };
    const COURSE_DELETE_PASSWORD = "1111";

    const backBtn = document.getElementById("backBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const tabViewBtn = document.getElementById("tabViewBtn");
    const tabBuildBtn = document.getElementById("tabBuildBtn");
    const buildFromRideBtn = document.getElementById("buildFromRideBtn");
    const buildManualBtn = document.getElementById("buildManualBtn");

    const listEl = document.getElementById("listEl");
    const bottomBarContent = document.getElementById("bottomBarContent");
    const courseNameInput = document.getElementById("courseNameInput");
    const editToggleBtn = document.getElementById("editToggleBtn");
    const undoBtn = document.getElementById("undoBtn");
    const clearManualBtn = document.getElementById("clearManualBtn");
    const saveManualBtn = document.getElementById("saveManualBtn");
    const fitMapBtn = document.getElementById("fitMapBtn");
    const fitMapBtn2 = document.getElementById("fitMapBtn2");
    const fillRideNameBtn = document.getElementById("fillRideNameBtn");
    const manualTools = document.getElementById("manualTools");
    const rideTools = document.getElementById("rideTools");
    const builderTools = document.getElementById("builderTools");

    let mainTab = "view";        // view | build
    let buildTab = "ride";       // ride | manual
    let map;
    let savedCoursePolyline = null;
    let manualPolyline = null;
    let manualMarkers = [];
    let selectedCourse = null;
    let selectedRide = null;
    let courses = [];
    let manualEditMode = false;
    let manualPoints = [];
    let userLocation = null;

    function getOwnerKey() {
      return "ksy_courses";
    }

    async function ensureAuth() {
      if (auth.currentUser) return auth.currentUser;
      const cred = await signInAnonymously(auth);
      return cred.user;
    }

    function ensureKakaoLoaded() {
      return !!(window.kakao && window.kakao.maps);
    }

    function toLatLng(lat, lng) {
      return new kakao.maps.LatLng(lat, lng);
    }

    function formatDateTime(ts) {
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${dd} ${hh}:${mm}`;
    }

    function formatEstimatedDurationBy20kmh(distanceKm) {
      const totalMinutes = Math.round((Number(distanceKm || 0) / 20) * 60);
      const hh = Math.floor(totalMinutes / 60);
      const mm = totalMinutes % 60;
      if (hh <= 0) return `${mm}분`;
      return `${hh}시간 ${mm}분`;
    }

    function loadSavedRides() {
      try {
        const rides = JSON.parse(localStorage.getItem(SAVED_RIDES_KEY) || "[]");
        return Array.isArray(rides) ? rides : [];
      } catch {
        return [];
      }
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function totalDistanceKmFromPoints(points) {
      if (!Array.isArray(points) || points.length < 2) return 0;
      let totalM = 0;
      for (let i = 1; i < points.length; i++) {
        totalM += haversine(points[i - 1].lat, points[i - 1].lng, points[i].lat, points[i].lng);
      }
      return totalM / 1000;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    

   function initMap() {
  if (!ensureKakaoLoaded()) {
    alert("카카오맵 로드 실패");
    return;
  }

  map = new kakao.maps.Map(document.getElementById("map"), {
    center: toLatLng(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng),
    level: 5
  });

  savedCoursePolyline = new kakao.maps.Polyline({
    map,
    path: [],
    strokeWeight: 4,
    strokeColor: "#a855f7",
    strokeOpacity: 0.95,
    strokeStyle: "solid"
  });

  manualPolyline = new kakao.maps.Polyline({
    map,
    path: [],
    strokeWeight: 6,
    strokeColor: "#ef4444",
    strokeOpacity: 0.95,
    strokeStyle: "solid"
  });

  kakao.maps.event.addListener(map, "click", (mouseEvent) => {
    if (!(mainTab === "build" && buildTab === "manual" && manualEditMode)) return;
    const latLng = mouseEvent.latLng;
    manualPoints.push({ lat: latLng.getLat(), lng: latLng.getLng() });
    redrawManualCourse();
    renderBottomBar();
  });

  updateMapOverlayByTab();

  setTimeout(() => {
    kakao.maps.event.trigger(map, "resize");
  }, 300);
}

    function fitMapToPoints(points) {
      if (!map || !Array.isArray(points) || !points.length) return;

      if (points.length === 1) {
        map.setCenter(toLatLng(points[0].lat, points[0].lng));
        map.setLevel(4);
        return;
      }

      const bounds = new kakao.maps.LatLngBounds();
      points.forEach(p => bounds.extend(toLatLng(p.lat, p.lng)));
      map.setBounds(bounds);
    }

    function updateMapOverlayByTab() {
  if (!map) return;

  map.removeOverlayMapTypeId(kakao.maps.MapTypeId.BICYCLE);

  if (mainTab === "build") {
    map.addOverlayMapTypeId(kakao.maps.MapTypeId.BICYCLE);
  }
}

    function clearManualMarkers() {
      manualMarkers.forEach(m => m.setMap(null));
      manualMarkers = [];
    }

    function redrawManualCourse() {
      if (!map || !manualPolyline) return;
      clearManualMarkers();

      const path = manualPoints.map(p => toLatLng(p.lat, p.lng));
      manualPolyline.setPath(path);

      manualPoints.forEach((p, idx) => {
        const marker = new kakao.maps.Marker({
          map,
          position: toLatLng(p.lat, p.lng),
          title: `점 ${idx + 1}`
        });
        manualMarkers.push(marker);
      });

      editToggleBtn.textContent = manualEditMode ? `편집중(${manualPoints.length})` : "편집시작";
    }

    function previewCourse(course) {
      selectedCourse = course || null;
      selectedRide = null;
      const points = selectedCourse?.points || [];
      savedCoursePolyline.setPath(points.map(p => toLatLng(p.lat, p.lng)));
      fitMapToPoints(points);
      renderList();
      renderBottomBar();
      setTimeout(() => kakao.maps.event.trigger(map, "resize"), 100);
    }

    function previewRide(ride) {
      selectedRide = ride || null;
      selectedCourse = null;
      const points = Array.isArray(ride?.path) ? ride.path.map(([lat, lng]) => ({ lat, lng })) : [];
      savedCoursePolyline.setPath(points.map(p => toLatLng(p.lat, p.lng)));
      fitMapToPoints(points);
      renderList();
      renderBottomBar();
      setTimeout(() => kakao.maps.event.trigger(map, "resize"), 100);
    }

    async function loadCoursesFromFirebase() {
      const ownerKey = getOwnerKey();
      const snap = await get(ref(db, `courses/${ownerKey}`));
      if (!snap.exists()) return [];

      const raw = snap.val();
      return Object.entries(raw)
        .map(([id, value]) => ({ id, ...value }))
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    }

    async function saveCourseToFirebase(payload) {
      const ownerKey = getOwnerKey();
      const courseId = payload.id || `course_${Date.now()}`;

      await set(ref(db, `courses/${ownerKey}/${courseId}`), {
        name: payload.name,
        source: payload.source,
        createdAt: payload.createdAt || Date.now(),
        updatedAt: payload.updatedAt || Date.now(),
        points: payload.points
      });

      return courseId;
    }

    async function deleteCourseFromFirebase(courseId) {
      const ownerKey = getOwnerKey();
      await remove(ref(db, `courses/${ownerKey}/${courseId}`));
    }

    function openCourseInRideMap(course) {
      if (!course || !Array.isArray(course.points) || !course.points.length) {
        alert("코스 데이터가 없습니다.");
        return;
      }

      localStorage.setItem(SELECTED_COURSE_KEY, JSON.stringify({
        id: course.id,
        name: course.name,
        points: course.points
      }));

      location.href = "./ride-map(kakaomap).html";
    }

    function renderCoursesList() {
  listEl.innerHTML = "";

  if (!courses.length) {
    listEl.innerHTML = `<div class="empty">저장된 코스 없음</div>`;
    return;
  }

  const sortedCourses = [...courses].sort((a, b) => {
  const distA = totalDistanceKmFromPoints(a.points || []);
  const distB = totalDistanceKmFromPoints(b.points || []);

  return distA - distB; // 짧은 거리 먼저
});

  sortedCourses.forEach(course => {
    const card = document.createElement("div");
    const isSelected = selectedCourse?.id === course.id;
    card.className = `card${isSelected ? " selected" : ""}`;

    const distKm = totalDistanceKmFromPoints(course.points || []).toFixed(1);
    const estimatedTime = formatEstimatedDurationBy20kmh(Number(distKm));
    const pointsCount = (course.points || []).length;
    const sourceText = course.source === "manual" ? "직접등록" : "기록등록";

    card.innerHTML = `
      <div class="card-title">${escapeHtml(course.name || "이름 없는 코스")}(${sourceText}, ${pointsCount}점)</div>
      <div class="meta">- ${distKm}Km, 약 ${estimatedTime}</div>
    `;

    card.addEventListener("click", () => previewCourse(course));
    listEl.appendChild(card);
  });
}

    function renderRidesList() {
      listEl.innerHTML = "";
      const rides = loadSavedRides();

      if (!rides.length) {
        listEl.innerHTML = `<div class="empty">저장된 기록 없음</div>`;
        return;
      }

      rides.forEach((ride) => {
        const points = Array.isArray(ride.path) ? ride.path.map(([lat, lng]) => ({ lat, lng })) : [];
        const distKm = ((ride.totalDistanceM || 0) / 1000).toFixed(1);
        const estimatedTime = formatEstimatedDurationBy20kmh(Number(distKm));
        const isSelected = selectedRide?.id === ride.id;

        const card = document.createElement("div");
        card.className = `card${isSelected ? " selected" : ""}`;
        card.innerHTML = `
          <div class="card-title">${formatDateTime(ride.endTime || Date.now())}</div>
          <div class="meta">기록등록 · ${points.length}점 · ${distKm}km · 약 ${estimatedTime}</div>
        `;

        card.addEventListener("click", () => previewRide(ride));
        listEl.appendChild(card);
      });
    }

    function renderManualInfo() {
      listEl.innerHTML = `
        <div class="card">
          <div class="card-title">직접 코스 만들기</div>
          <div class="meta">편집시작 후 지도 터치로 점을 추가하세요.</div>
        </div>
        <div class="card">
          <div class="card-title">현재 코스 정보</div>
          <div class="meta">현재 ${manualPoints.length}점 · ${totalDistanceKmFromPoints(manualPoints).toFixed(1)}km</div>
        </div>
      `;
    }

    function renderList() {
      if (mainTab === "view") {
        renderCoursesList();
      } else {
        if (buildTab === "ride") renderRidesList();
        else renderManualInfo();
      }
    }

    function renderBottomBar() {
      if (mainTab === "view") {
        if (!selectedCourse) {
          bottomBarContent.innerHTML = `
            <div class="section">
              <div class="bottom-placeholder">코스를 선택하면 보기 · 수정 · 삭제 · 주행열기 버튼이 나타납니다.</div>
            </div>
          `;
          return;
        }

        bottomBarContent.innerHTML = `
          <div class="bottom-bar-inner">
            <button class="bottom-action primary" id="bottomPreviewBtn">보기</button>
            <button class="bottom-action amber" id="bottomEditBtn">수정</button>
            <button class="bottom-action red" id="bottomDeleteBtn">삭제</button>
            <button class="bottom-action green" id="bottomRideBtn">주행열기</button>
          </div>
        `;

        document.getElementById("bottomPreviewBtn").addEventListener("click", () => {
          previewCourse(selectedCourse);
        });

        document.getElementById("bottomEditBtn").addEventListener("click", async () => {
          const newName = prompt("새 코스 이름을 입력하세요.", selectedCourse.name || "");
          if (newName === null) return;

          const trimmedName = newName.trim();
          if (!trimmedName) {
            alert("코스 이름을 입력하세요.");
            return;
          }

          try {
            await saveCourseToFirebase({
              id: selectedCourse.id,
              name: trimmedName,
              source: selectedCourse.source || "manual",
              points: selectedCourse.points || [],
              createdAt: selectedCourse.createdAt || Date.now(),
              updatedAt: Date.now()
            });
            selectedCourse.name = trimmedName;
            await refreshCourses();
            previewCourse(courses.find(c => c.id === selectedCourse.id) || selectedCourse);
            alert("코스 이름이 수정되었습니다.");
          } catch (e) {
            console.error(e);
            alert("이름 수정 오류");
          }
        });

        document.getElementById("bottomDeleteBtn").addEventListener("click", async () => {
          const pw = prompt(`"${selectedCourse.name}" 삭제 비밀번호를 입력하세요.`);
          if (pw === null) return;

          if (pw !== COURSE_DELETE_PASSWORD) {
            alert("비밀번호가 올바르지 않습니다.");
            return;
          }

          if (!confirm(`"${selectedCourse.name}" 코스를 삭제할까요?`)) return;

          try {
            await deleteCourseFromFirebase(selectedCourse.id);
            selectedCourse = null;
            savedCoursePolyline.setPath([]);
            await refreshCourses();
            renderBottomBar();
            alert("삭제되었습니다.");
          } catch (e) {
            console.error(e);
            alert("삭제 오류");
          }
        });

        document.getElementById("bottomRideBtn").addEventListener("click", () => {
          openCourseInRideMap(selectedCourse);
        });

        return;
      }

      if (buildTab === "ride") {
        if (!selectedRide) {
          bottomBarContent.innerHTML = `
            <div class="section">
              <div class="bottom-placeholder">기록을 선택하면 미리보기 · 이름입력 · 코스저장 버튼이 나타납니다.</div>
            </div>
          `;
          return;
        }

        bottomBarContent.innerHTML = `
          <div class="bottom-bar-inner">
            <button class="bottom-action primary" id="ridePreviewBtn">보기</button>
            <button class="bottom-action" id="rideNameBtn">이름입력</button>
            <button class="bottom-action green" id="rideSaveBtn">코스저장</button>
            <button class="bottom-action" id="rideFitBtn">전체보기</button>
          </div>
        `;

        document.getElementById("ridePreviewBtn").addEventListener("click", () => {
          previewRide(selectedRide);
        });

        document.getElementById("rideNameBtn").addEventListener("click", () => {
          courseNameInput.value = `라이딩 ${formatDateTime(selectedRide.endTime || Date.now())}`;
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        document.getElementById("rideSaveBtn").addEventListener("click", async () => {
          const points = Array.isArray(selectedRide.path) ? selectedRide.path.map(([lat, lng]) => ({ lat, lng })) : [];
          if (!points.length) {
            alert("경로 없음");
            return;
          }

          const name = (courseNameInput.value || "").trim() || `라이딩 ${formatDateTime(selectedRide.endTime || Date.now())}`;

          try {
            await saveCourseToFirebase({
              name,
              source: "ride",
              points,
              createdAt: Date.now(),
              updatedAt: Date.now()
            });
            alert("코스로 저장되었습니다.");
            mainTab = "view";
            selectedRide = null;
            activateTabs();
            await refreshCourses();
          } catch (e) {
            console.error(e);
            alert("저장 오류");
          }
        });

        document.getElementById("rideFitBtn").addEventListener("click", () => {
          const points = Array.isArray(selectedRide.path) ? selectedRide.path.map(([lat, lng]) => ({ lat, lng })) : [];
          fitMapToPoints(points);
        });

        return;
      }

      bottomBarContent.innerHTML = `
        <div class="bottom-bar-inner">
          <button class="bottom-action amber" id="manualEditBottomBtn">${manualEditMode ? `편집중(${manualPoints.length})` : "편집시작"}</button>
          <button class="bottom-action" id="manualUndoBottomBtn">점삭제</button>
          <button class="bottom-action red" id="manualClearBottomBtn">전체지우기</button>
          <button class="bottom-action green" id="manualSaveBottomBtn">코스저장</button>
        </div>
      `;

      document.getElementById("manualEditBottomBtn").addEventListener("click", toggleManualEdit);
      document.getElementById("manualUndoBottomBtn").addEventListener("click", undoManualPoint);
      document.getElementById("manualClearBottomBtn").addEventListener("click", clearManualPoints);
      document.getElementById("manualSaveBottomBtn").addEventListener("click", saveManualCourse);
    }

    function activateTabs() {
      tabViewBtn.classList.toggle("active", mainTab === "view");
      tabBuildBtn.classList.toggle("active", mainTab === "build");

      buildFromRideBtn.classList.toggle("active", buildTab === "ride");
      buildManualBtn.classList.toggle("active", buildTab === "manual");

      builderTools.style.display = mainTab === "build" ? "block" : "none";
      rideTools.style.display = (mainTab === "build" && buildTab === "ride") ? "block" : "none";
      manualTools.style.display = (mainTab === "build" && buildTab === "manual") ? "block" : "none";
      courseNameInput.style.display = mainTab === "build" ? "block" : "none";
    }

    async function refreshCourses() {
  try {
    courses = await loadCoursesFromFirebase();
    renderList();
    renderBottomBar();
  } catch (e) {
    console.error(e);
    alert("코스 불러오기 오류");
  }
}
    function toggleManualEdit() {
      manualEditMode = !manualEditMode;
      editToggleBtn.className = manualEditMode ? "action-btn red" : "action-btn amber";
      redrawManualCourse();
      renderBottomBar();
      renderList();
    }

    function undoManualPoint() {
      if (!manualPoints.length) {
        alert("삭제할 점이 없습니다.");
        return;
      }
      manualPoints.pop();
      redrawManualCourse();
      renderList();
      renderBottomBar();
    }

    function clearManualPoints() {
      if (!manualPoints.length) {
        alert("지울 점이 없습니다.");
        return;
      }
      if (!confirm("전체 지울까요?")) return;
      manualPoints = [];
      redrawManualCourse();
      renderList();
      renderBottomBar();
    }

    async function saveManualCourse() {
      if (manualPoints.length < 2) {
        alert("최소 2점 필요");
        return;
      }

      const name = (courseNameInput.value || "").trim() || `수동코스 ${formatDateTime(Date.now())}`;

      try {
        await saveCourseToFirebase({
          name,
          source: "manual",
          points: manualPoints.slice(),
          createdAt: Date.now(),
          updatedAt: Date.now()
        });

        manualPoints = [];
        redrawManualCourse();
        alert("코스로 저장되었습니다.");
        mainTab = "view";
        buildTab = "ride";
        activateTabs();
        await refreshCourses();
      } catch (e) {
        console.error(e);
        alert("저장 오류");
      }
    }

    backBtn.addEventListener("click", () => {
      location.href = "./ride-map(kakaomap).html";
    });

    reloadBtn.addEventListener("click", async () => {
      if (mainTab === "view") await refreshCourses();
      else {
        renderList();
        renderBottomBar();
      }
    });

    tabViewBtn.addEventListener("click", async () => {
  mainTab = "view";
  selectedRide = null;
  activateTabs();
  updateMapOverlayByTab();
  await refreshCourses();
});

   tabBuildBtn.addEventListener("click", () => {
  mainTab = "build";
  selectedCourse = null;
  activateTabs();
  updateMapOverlayByTab();
  renderList();
  renderBottomBar();
});

    buildFromRideBtn.addEventListener("click", () => {
  buildTab = "ride";
  selectedRide = null;
  activateTabs();
  renderList();
  renderBottomBar();
  setTimeout(() => kakao.maps.event.trigger(map, "resize"), 80);
});

    buildManualBtn.addEventListener("click", () => {
  buildTab = "manual";
  selectedRide = null;
  activateTabs();
  renderList();
  renderBottomBar();
  setTimeout(() => kakao.maps.event.trigger(map, "resize"), 80);
});

    editToggleBtn.addEventListener("click", toggleManualEdit);
    undoBtn.addEventListener("click", undoManualPoint);
    clearManualBtn.addEventListener("click", clearManualPoints);
    saveManualBtn.addEventListener("click", saveManualCourse);

    fitMapBtn.addEventListener("click", () => {
      if (manualPoints.length) {
        fitMapToPoints(manualPoints);
        return;
      }
      if (selectedCourse?.points?.length) {
        fitMapToPoints(selectedCourse.points);
        return;
      }
      map.setCenter(toLatLng(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng));
      map.setLevel(5);
    });

    fitMapBtn2.addEventListener("click", () => {
      if (selectedRide?.path?.length) {
        fitMapToPoints(selectedRide.path.map(([lat, lng]) => ({ lat, lng })));
        return;
      }
      map.setCenter(toLatLng(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng));
      map.setLevel(5);
    });

    fillRideNameBtn.addEventListener("click", () => {
      if (!selectedRide) {
        alert("기록을 먼저 선택하세요.");
        return;
      }
      courseNameInput.value = `라이딩 ${formatDateTime(selectedRide.endTime || Date.now())}`;
    });

    async function init() {
  await ensureAuth();
  initMap();
  activateTabs();
  updateMapOverlayByTab();
  await refreshCourses();
}

    window.addEventListener("load", init);
  </script>
</body>
</html>
