<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>내 코스 관리</title>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=90120eccb060eed4b76790684d641951&libraries=services"></script>

  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#121c34;
      --card:rgba(15,23,42,0.82);
      --card2:rgba(30,41,59,0.86);
      --line:rgba(255,255,255,0.08);
      --text:#f8fafc;
      --muted:#94a3b8;
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --green:#16a34a;
      --red:#dc2626;
      --amber:#d97706;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:linear-gradient(180deg,var(--bg2) 0%, var(--bg1) 100%);
      color:var(--text);
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    .app{
      width:100%;
      height:100dvh;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:calc(8px + env(safe-area-inset-top)) 8px calc(8px + env(safe-area-inset-bottom));
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .title{
      flex:1;
      font-size:22px;
      font-weight:900;
      letter-spacing:-0.4px;
      padding-left:4px;
      white-space:nowrap;
    }

    .top-btn{
      height:32px;
      min-width:70px;
      border:1px solid var(--line);
      border-radius:10px;
      background:linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color:#fff;
      font-size:12px;
      font-weight:800;
      padding:0 10px;
      cursor:pointer;
    }
    .top-btn.primary{background:linear-gradient(180deg,var(--blue),var(--blue2))}
    .top-btn.green{background:linear-gradient(180deg,#22c55e,var(--green))}
    .top-btn.red{background:linear-gradient(180deg,#ef4444,var(--red))}
    .top-btn.amber{background:linear-gradient(180deg,#f59e0b,var(--amber))}
    .top-btn:active,.chip:active,.action-btn:active{transform:translateY(1px) scale(0.99)}

    .chips{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:4px;
    }

    .chip{
      height:34px;
      border:1px solid var(--line);
      border-radius:10px;
      background:linear-gradient(180deg, rgba(30,41,59,0.95), rgba(15,23,42,0.92));
      color:#fff;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }
    .chip.active{background:linear-gradient(180deg,var(--blue),var(--blue2))}

    .content{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap:8px;
    }

    .panel{
      min-height:0;
      background:linear-gradient(180deg, var(--card2), var(--card));
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
    }

    .panel-title{
      font-size:15px;
      font-weight:900;
      color:#fff;
    }

    .sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .row{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .input, .select{
      width:100%;
      height:38px;
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(15,23,42,0.9);
      color:#fff;
      padding:0 12px;
      outline:none;
    }

    .list{
      flex:1;
      min-height:0;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:2px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(15,23,42,0.72);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .card-title{
      font-size:14px;
      font-weight:900;
      line-height:1.3;
    }

    .meta{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
      word-break:break-word;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:6px;
    }

    .action-btn{
      height:34px;
      border:1px solid var(--line);
      border-radius:10px;
      background:linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color:#fff;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      padding:0 6px;
    }
    .action-btn.primary{background:linear-gradient(180deg,var(--blue),var(--blue2))}
    .action-btn.green{background:linear-gradient(180deg,#22c55e,var(--green))}
    .action-btn.red{background:linear-gradient(180deg,#ef4444,var(--red))}
    .action-btn.amber{background:linear-gradient(180deg,#f59e0b,var(--amber))}

    .map-wrap{
      flex:1;
      min-height:280px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--line);
      background:rgba(15,23,42,0.72);
    }

    #map{
      width:100%;
      height:100%;
    }

    .status{
      min-height:20px;
      font-size:12px;
      color:#cbd5e1;
      padding:2px 2px 0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:4px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      color:#dbeafe;
      background:rgba(37,99,235,0.18);
    }

    @media (max-width: 900px){
      .content{
        grid-template-columns:1fr;
      }
      .top-btn{
        min-width:62px;
        font-size:11px;
        padding:0 8px;
      }
      .chips{
        grid-template-columns:repeat(2,1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">내 코스 관리</div>
      <button class="top-btn" id="backBtn">주행화면</button>
      <button class="top-btn primary" id="reloadBtn">새로고침</button>
    </div>

    <div class="chips">
      <button class="chip active" id="tabCoursesBtn">내 코스</button>
      <button class="chip" id="tabRidesBtn">기록에서 등록</button>
      <button class="chip" id="tabManualBtn">지도에서 만들기</button>
      <button class="chip" id="tabHelpBtn">사용방법</button>
    </div>

    <div class="content">
      <div class="panel" id="leftPanel">
        <div class="panel-title" id="leftTitle">저장된 내 코스</div>
        <div class="sub" id="leftSub">Firebase에 저장된 내 코스를 불러옵니다.</div>
        <div class="status" id="statusEl">준비중</div>
        <div class="list" id="listEl"></div>
      </div>

      <div class="panel" id="rightPanel">
        <div class="panel-title">코스 지도</div>
        <div class="row">
          <span class="badge" id="editorBadge">수동 코스 편집 꺼짐</span>
        </div>

        <div class="row">
          <input class="input" id="courseNameInput" placeholder="코스 이름 입력" />
        </div>

        <div class="row">
          <button class="action-btn amber" id="editToggleBtn">편집 시작</button>
          <button class="action-btn" id="undoBtn">마지막 점 삭제</button>
          <button class="action-btn red" id="clearManualBtn">전체 지우기</button>
        </div>

        <div class="row">
          <button class="action-btn green" id="saveManualBtn">수동 코스 저장</button>
          <button class="action-btn primary" id="previewSelectedBtn">선택 코스 보기</button>
          <button class="action-btn" id="fitMapBtn">전체 보기</button>
        </div>

        <div class="map-wrap">
          <div id="map"></div>
        </div>

        <div class="sub">
          지도에서 만들기 탭 상태에서 편집 시작 후 지도를 탭하면 점이 추가됩니다.
          저장된 코스를 선택한 뒤 안내시작을 누르면 주행 화면으로 이동합니다.
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      set,
      remove
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    /***********************
     * Firebase 설정
     * 아래를 본인 설정값으로 교체
     ***********************/
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const SAVED_RIDES_KEY = "ebike_saved_rides_v1";
    const SELECTED_COURSE_KEY = "ebike_selected_course_v1";
    const COURSE_USER_KEY = "ebike_course_user_key";
    const DEFAULT_CENTER = { lat: 35.180, lng: 128.107 };

    const backBtn = document.getElementById("backBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const tabCoursesBtn = document.getElementById("tabCoursesBtn");
    const tabRidesBtn = document.getElementById("tabRidesBtn");
    const tabManualBtn = document.getElementById("tabManualBtn");
    const tabHelpBtn = document.getElementById("tabHelpBtn");

    const leftTitle = document.getElementById("leftTitle");
    const leftSub = document.getElementById("leftSub");
    const listEl = document.getElementById("listEl");
    const statusEl = document.getElementById("statusEl");

    const courseNameInput = document.getElementById("courseNameInput");
    const editToggleBtn = document.getElementById("editToggleBtn");
    const undoBtn = document.getElementById("undoBtn");
    const clearManualBtn = document.getElementById("clearManualBtn");
    const saveManualBtn = document.getElementById("saveManualBtn");
    const previewSelectedBtn = document.getElementById("previewSelectedBtn");
    const fitMapBtn = document.getElementById("fitMapBtn");
    const editorBadge = document.getElementById("editorBadge");

    let currentTab = "courses";
    let map;
    let savedCoursePolyline = null;
    let manualPolyline = null;
    let manualMarkers = [];
    let selectedCourse = null;
    let courses = [];
    let manualEditMode = false;
    let manualPoints = [];

    function getUserKey() {
      let key = localStorage.getItem(COURSE_USER_KEY);
      if (!key) {
        key = "user_" + Math.random().toString(36).slice(2) + Date.now();
        localStorage.setItem(COURSE_USER_KEY, key);
      }
      return key;
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function ensureKakaoLoaded() {
      return !!(window.kakao && window.kakao.maps);
    }

    function toLatLng(lat, lng) {
      return new kakao.maps.LatLng(lat, lng);
    }

    function formatDateTime(ts) {
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${dd} ${hh}:${mm}`;
    }

    function loadSavedRides() {
      try {
        return JSON.parse(localStorage.getItem(SAVED_RIDES_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function totalDistanceKmFromPoints(points) {
      if (!Array.isArray(points) || points.length < 2) return 0;
      let totalM = 0;
      for (let i = 1; i < points.length; i++) {
        totalM += haversine(
          points[i - 1].lat, points[i - 1].lng,
          points[i].lat, points[i].lng
        );
      }
      return totalM / 1000;
    }

    function initMap() {
      if (!ensureKakaoLoaded()) {
        alert("카카오맵 로드 실패");
        return;
      }

      map = new kakao.maps.Map(document.getElementById("map"), {
        center: toLatLng(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng),
        level: 5
      });

      savedCoursePolyline = new kakao.maps.Polyline({
        map,
        path: [],
        strokeWeight: 7,
        strokeColor: "#00e5ff",
        strokeOpacity: 0.95,
        strokeStyle: "solid"
      });

      manualPolyline = new kakao.maps.Polyline({
        map,
        path: [],
        strokeWeight: 6,
        strokeColor: "#ef4444",
        strokeOpacity: 0.95,
        strokeStyle: "solid"
      });

      kakao.maps.event.addListener(map, "click", (mouseEvent) => {
        if (!manualEditMode) return;
        const latLng = mouseEvent.latLng;
        manualPoints.push({
          lat: latLng.getLat(),
          lng: latLng.getLng()
        });
        redrawManualCourse();
      });
    }

    function fitMapToPoints(points) {
      if (!map || !points || !points.length) return;

      if (points.length === 1) {
        map.setCenter(toLatLng(points[0].lat, points[0].lng));
        map.setLevel(4);
        return;
      }

      const bounds = new kakao.maps.LatLngBounds();
      points.forEach(p => bounds.extend(toLatLng(p.lat, p.lng)));
      map.setBounds(bounds);
    }

    function clearManualMarkers() {
      manualMarkers.forEach(m => m.setMap(null));
      manualMarkers = [];
    }

    function redrawManualCourse() {
      if (!map || !manualPolyline) return;

      clearManualMarkers();

      const path = manualPoints.map(p => toLatLng(p.lat, p.lng));
      manualPolyline.setPath(path);

      manualPoints.forEach((p, idx) => {
        const marker = new kakao.maps.Marker({
          map,
          position: toLatLng(p.lat, p.lng),
          title: `점 ${idx + 1}`
        });
        manualMarkers.push(marker);
      });

      editorBadge.textContent = manualEditMode
        ? `수동 코스 편집 켜짐 · ${manualPoints.length}개 점`
        : "수동 코스 편집 꺼짐";
    }

    function previewCourse(course) {
      if (!map || !savedCoursePolyline) return;
      selectedCourse = course || null;

      const points = selectedCourse?.points || [];
      savedCoursePolyline.setPath(points.map(p => toLatLng(p.lat, p.lng)));
      fitMapToPoints(points);
    }

    async function loadCoursesFromFirebase() {
      const userKey = getUserKey();
      const snap = await get(ref(db, `courses/${userKey}`));
      if (!snap.exists()) return [];

      const raw = snap.val();
      return Object.entries(raw)
        .map(([id, value]) => ({ id, ...value }))
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    }

    async function saveCourseToFirebase(payload) {
      const userKey = getUserKey();
      const courseId = payload.id || `course_${Date.now()}`;

      await set(ref(db, `courses/${userKey}/${courseId}`), {
        name: payload.name,
        source: payload.source,
        createdAt: payload.createdAt || Date.now(),
        updatedAt: Date.now(),
        points: payload.points
      });

      return courseId;
    }

    async function deleteCourseFromFirebase(courseId) {
      const userKey = getUserKey();
      await remove(ref(db, `courses/${userKey}/${courseId}`));
    }

    function openCourseInRideTracker(course) {
      if (!course || !Array.isArray(course.points) || !course.points.length) {
        alert("코스 데이터가 없습니다.");
        return;
      }

      localStorage.setItem(SELECTED_COURSE_KEY, JSON.stringify({
        id: course.id,
        name: course.name,
        points: course.points
      }));

      location.href = "./ride-tracker.html";
    }

    function renderCoursesTab() {
      leftTitle.textContent = "저장된 내 코스";
      leftSub.textContent = "Firebase에 저장된 내 코스를 불러옵니다.";
      listEl.innerHTML = "";

      if (!courses.length) {
        listEl.innerHTML = `
          <div class="card">
            <div class="card-title">저장된 코스가 없습니다</div>
            <div class="meta">기록에서 등록하거나 지도에서 직접 코스를 만들어 저장하세요.</div>
          </div>
        `;
        return;
      }

      courses.forEach(course => {
        const card = document.createElement("div");
        card.className = "card";

        const distKm = totalDistanceKmFromPoints(course.points || []).toFixed(1);

        card.innerHTML = `
          <div class="card-title">${escapeHtml(course.name || "이름 없는 코스")}</div>
          <div class="meta">
            방식: ${course.source === "manual" ? "지도 직접 생성" : "주행기록 등록"}<br>
            점 수: ${(course.points || []).length}개 · 예상거리: ${distKm}km<br>
            수정: ${formatDateTime(course.updatedAt || course.createdAt || Date.now())}
          </div>
          <div class="actions">
            <button class="action-btn primary" data-act="preview">보기</button>
            <button class="action-btn green" data-act="start">안내시작</button>
            <button class="action-btn red" data-act="delete">삭제</button>
          </div>
        `;

        const [previewBtn, startBtn, deleteBtn] = card.querySelectorAll("button");

        previewBtn.addEventListener("click", () => {
          previewCourse(course);
          setStatus(`코스 미리보기: ${course.name}`);
        });

        startBtn.addEventListener("click", () => {
          openCourseInRideTracker(course);
        });

        deleteBtn.addEventListener("click", async () => {
          if (!confirm(`"${course.name}" 코스를 삭제할까요?`)) return;
          try {
            await deleteCourseFromFirebase(course.id);
            setStatus(`삭제 완료: ${course.name}`);
            await refreshCourses();
          } catch (e) {
            console.error(e);
            alert("코스 삭제 중 오류가 발생했습니다.");
          }
        });

        listEl.appendChild(card);
      });
    }

    function renderRidesTab() {
      leftTitle.textContent = "기록에서 코스 등록";
      leftSub.textContent = "브라우저에 저장된 라이딩 기록을 내 코스로 Firebase에 저장합니다.";
      listEl.innerHTML = "";

      const rides = loadSavedRides();

      if (!rides.length) {
        listEl.innerHTML = `
          <div class="card">
            <div class="card-title">저장된 주행기록이 없습니다</div>
            <div class="meta">먼저 주행기록 화면에서 라이딩을 저장해 주세요.</div>
          </div>
        `;
        return;
      }

      rides.forEach((ride) => {
        const points = Array.isArray(ride.path) ? ride.path.map(([lat, lng]) => ({ lat, lng })) : [];
        const distKm = ((ride.totalDistanceM || 0) / 1000).toFixed(1);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${formatDateTime(ride.endTime || Date.now())}</div>
          <div class="meta">
            거리: ${distKm}km · 점 수: ${points.length}개<br>
            평균속도: ${(ride.avgSpeedKmh || 0).toFixed(1)}km/h · 최고속도: ${(ride.maxSpeedKmh || 0).toFixed(1)}km/h
          </div>
          <div class="actions">
            <button class="action-btn primary" data-act="preview">미리보기</button>
            <button class="action-btn green" data-act="save">코스 등록</button>
            <button class="action-btn" data-act="fill">이름 넣기</button>
          </div>
        `;

        const [previewBtn, saveBtn, fillBtn] = card.querySelectorAll("button");

        previewBtn.addEventListener("click", () => {
          previewCourse({
            id: ride.id,
            name: "기록 미리보기",
            points
          });
          setStatus("기록 경로 미리보기");
        });

        fillBtn.addEventListener("click", () => {
          courseNameInput.value = `라이딩 ${formatDateTime(ride.endTime || Date.now())}`;
          setStatus("이름 입력칸에 기록 제목을 넣었습니다.");
        });

        saveBtn.addEventListener("click", async () => {
          if (!points.length) {
            alert("이 기록에는 저장할 경로가 없습니다.");
            return;
          }

          const name = (courseNameInput.value || "").trim() || `라이딩 ${formatDateTime(ride.endTime || Date.now())}`;

          try {
            await saveCourseToFirebase({
              name,
              source: "ride",
              points,
              createdAt: Date.now()
            });
            setStatus(`코스 저장 완료: ${name}`);
            currentTab = "courses";
            activateTabButton();
            await refreshCourses();
          } catch (e) {
            console.error(e);
            alert("코스 저장 중 오류가 발생했습니다.");
          }
        });

        listEl.appendChild(card);
      });
    }

    function renderHelpTab() {
      leftTitle.textContent = "사용방법";
      leftSub.textContent = "내 코스 기능을 어떻게 쓰는지 정리했습니다.";
      listEl.innerHTML = `
        <div class="card">
          <div class="card-title">1. 실제로 탄 기록을 코스로 저장</div>
          <div class="meta">
            기록에서 등록 탭으로 이동 → 원하는 라이딩 선택 → 코스 등록<br>
            저장 후에는 내 코스 탭에서 안내시작 가능
          </div>
        </div>
        <div class="card">
          <div class="card-title">2. 지도에서 직접 코스 만들기</div>
          <div class="meta">
            지도에서 만들기 탭으로 이동 → 편집 시작 → 지도 탭으로 점 추가 → 수동 코스 저장
          </div>
        </div>
        <div class="card">
          <div class="card-title">3. 코스 안내 시작</div>
          <div class="meta">
            내 코스 탭 → 코스 선택 → 안내시작<br>
            선택한 코스는 localStorage에 넣고 주행화면으로 전달합니다.
          </div>
        </div>
      `;
    }

    function renderTab() {
      if (currentTab === "courses") renderCoursesTab();
      else if (currentTab === "rides") renderRidesTab();
      else if (currentTab === "manual") {
        leftTitle.textContent = "지도에서 직접 코스 만들기";
        leftSub.textContent = "오른쪽 지도에서 점을 찍고 수동 코스로 저장하세요.";
        listEl.innerHTML = `
          <div class="card">
            <div class="card-title">수동 코스 만들기</div>
            <div class="meta">
              1) 편집 시작<br>
              2) 지도 탭으로 점 추가<br>
              3) 마지막 점 삭제 / 전체 지우기 가능<br>
              4) 코스 이름 입력 후 수동 코스 저장
            </div>
          </div>
          <div class="card">
            <div class="card-title">현재 점 개수</div>
            <div class="meta">${manualPoints.length}개</div>
          </div>
        `;
      } else {
        renderHelpTab();
      }
    }

    function activateTabButton() {
      [tabCoursesBtn, tabRidesBtn, tabManualBtn, tabHelpBtn].forEach(btn => btn.classList.remove("active"));

      if (currentTab === "courses") tabCoursesBtn.classList.add("active");
      else if (currentTab === "rides") tabRidesBtn.classList.add("active");
      else if (currentTab === "manual") tabManualBtn.classList.add("active");
      else tabHelpBtn.classList.add("active");
    }

    async function refreshCourses() {
      setStatus("내 코스 불러오는 중...");
      try {
        courses = await loadCoursesFromFirebase();
        renderTab();
        setStatus(`내 코스 ${courses.length}개`);
      } catch (e) {
        console.error(e);
        setStatus("내 코스 불러오기 실패");
        alert("Firebase 코스 불러오기 중 오류가 발생했습니다.\n설정값과 DB 규칙을 확인해 주세요.");
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    backBtn.addEventListener("click", () => {
      location.href = "./ride-tracker.html";
    });

    reloadBtn.addEventListener("click", async () => {
      if (currentTab === "courses") {
        await refreshCourses();
      } else {
        renderTab();
        setStatus("화면을 새로고침했습니다.");
      }
    });

    tabCoursesBtn.addEventListener("click", async () => {
      currentTab = "courses";
      activateTabButton();
      await refreshCourses();
    });

    tabRidesBtn.addEventListener("click", () => {
      currentTab = "rides";
      activateTabButton();
      renderTab();
      setStatus("주행기록 목록을 불러왔습니다.");
    });

    tabManualBtn.addEventListener("click", () => {
      currentTab = "manual";
      activateTabButton();
      renderTab();
      setStatus("수동 코스 편집 화면입니다.");
    });

    tabHelpBtn.addEventListener("click", () => {
      currentTab = "help";
      activateTabButton();
      renderTab();
      setStatus("사용방법");
    });

    editToggleBtn.addEventListener("click", () => {
      manualEditMode = !manualEditMode;
      editToggleBtn.textContent = manualEditMode ? "편집 종료" : "편집 시작";
      editToggleBtn.className = manualEditMode ? "action-btn red" : "action-btn amber";
      editorBadge.textContent = manualEditMode
        ? `수동 코스 편집 켜짐 · ${manualPoints.length}개 점`
        : "수동 코스 편집 꺼짐";
      currentTab = "manual";
      activateTabButton();
      renderTab();
      setStatus(manualEditMode ? "지도 탭으로 점을 추가하세요." : "수동 편집 종료");
    });

    undoBtn.addEventListener("click", () => {
      if (!manualPoints.length) {
        alert("삭제할 점이 없습니다.");
        return;
      }
      manualPoints.pop();
      redrawManualCourse();
      renderTab();
      setStatus("마지막 점을 삭제했습니다.");
    });

    clearManualBtn.addEventListener("click", () => {
      if (!manualPoints.length) {
        alert("지울 점이 없습니다.");
        return;
      }
      if (!confirm("수동 코스 점들을 모두 지울까요?")) return;
      manualPoints = [];
      redrawManualCourse();
      renderTab();
      setStatus("수동 코스를 비웠습니다.");
    });

    saveManualBtn.addEventListener("click", async () => {
      if (manualPoints.length < 2) {
        alert("최소 2개 이상의 점이 필요합니다.");
        return;
      }

      const name = (courseNameInput.value || "").trim() || `수동 코스 ${formatDateTime(Date.now())}`;

      try {
        await saveCourseToFirebase({
          name,
          source: "manual",
          points: manualPoints.slice(),
          createdAt: Date.now()
        });

        setStatus(`수동 코스 저장 완료: ${name}`);
        manualPoints = [];
        redrawManualCourse();
        currentTab = "courses";
        activateTabButton();
        await refreshCourses();
      } catch (e) {
        console.error(e);
        alert("수동 코스 저장 중 오류가 발생했습니다.");
      }
    });

    previewSelectedBtn.addEventListener("click", () => {
      if (!selectedCourse) {
        alert("먼저 내 코스나 기록을 하나 선택해 주세요.");
        return;
      }
      previewCourse(selectedCourse);
      setStatus(`선택 코스 보기: ${selectedCourse.name}`);
    });

    fitMapBtn.addEventListener("click", () => {
      if (manualPoints.length) {
        fitMapToPoints(manualPoints);
        return;
      }
      if (selectedCourse?.points?.length) {
        fitMapToPoints(selectedCourse.points);
        return;
      }
      map.setCenter(toLatLng(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng));
      map.setLevel(5);
    });

    async function init() {
      initMap();
      activateTabButton();
      await refreshCourses();
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
