<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주행기록</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #121c34;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 0;
    }

    .app {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: calc(8px + env(safe-area-inset-top)) 0 calc(8px + env(safe-area-inset-bottom));
    }

    .screen {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .title-row,
    .summary-grid,
    .speed-grid,
    .bottom-panel,
    .toolbar {
      margin-left: 8px;
      margin-right: 8px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .title-wrap {
      min-width: 0;
      flex: 1;
      padding: 0 4px;
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }

    

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      width: 172px;
      flex-shrink: 0;
      padding-right: 4px;
    }

    .top-btn {
      height: 36px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    .top-btn.primary { background: linear-gradient(180deg, #2563eb, #1d4ed8); }
    .top-btn.green { background: linear-gradient(180deg, #22c55e, #16a34a); }
    .top-btn.amber { background: linear-gradient(180deg, #f59e0b, #d97706); }
    .top-btn.red { background: linear-gradient(180deg, #ef4444, #dc2626); }

    .top-btn:active,
    .chip-btn:active,
    .width-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .summary-grid,
    .speed-grid {
      display: grid;
      gap: 8px;
    }

    .summary-grid {
      grid-template-columns: 1fr 1fr 1fr 1fr;
      margin-bottom: 2px;
    }

    .speed-grid {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    .summary-card,
    .speed-card {
      background: linear-gradient(180deg, rgba(30,41,59,0.82), rgba(15,23,42,0.76));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px 6px;
      min-width: 0;
      text-align: center;
    }

    .summary-label,
    .speed-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
      line-height: 1.3;
    }

    .summary-value,
    .speed-value {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.3px;
      word-break: break-word;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .toolbar-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip-btn,
    .width-btn {
      height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(30,41,59,0.95), rgba(15,23,42,0.92));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }

    .chip-btn.active,
    .width-btn.active {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
    }

    .map-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      border-radius: 0;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      background: rgba(15,23,42,0.72);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .bottom-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .bottom-card {
      background: linear-gradient(180deg, rgba(30,41,59,0.82), rgba(15,23,42,0.76));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      text-align: center;
    }

    .bottom-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .bottom-value {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.2;
      word-break: break-word;
    }

    .leaflet-control-attribution {
      font-size: 10px !important;
    }

    .bike-marker {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
    }

    .start-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #22c55e;
      border: 3px solid #ffffff;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.22);
    }

    @media (max-width: 390px) {
      .title { font-size: 22px; }
      .top-actions { width: 160px; }
      .summary-value, .speed-value { font-size: 17px; }
      .bottom-value { font-size: 14px; }
      .chip-btn, .width-btn { font-size: 11px; padding: 0 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="title-row">
        <div class="title-wrap">
          <div class="title">주행기록</div>
       </div>

        <div class="top-actions">
          <button class="top-btn primary" id="batteryBtn">배터리</button>
          <button class="top-btn primary" id="historyBtn">기록목록</button>
          <button class="top-btn green" id="startBtn">시작</button>
          <button class="top-btn red" id="endBtn">종료</button>
        </div>
      </div>

      <div class="summary-grid">
  <div class="summary-card">
    <div class="summary-label">누적 거리</div>
    <div class="summary-value" id="distanceEl">0.00 km</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">출발 시각</div>
    <div class="summary-value" id="startTimeEl">--:--</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">주행 시간</div>
    <div class="summary-value" id="durationEl">00:00:00</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">휴식 시간</div>
    <div class="summary-value" id="restTimeEl">00:00:00</div>
  </div>
</div>

      <div class="speed-grid">
  <div class="speed-card">
    <div class="speed-label">현재 시각</div>
    <div class="speed-value" id="clockEl">--:--</div>
  </div>

  <div class="speed-card">
    <div class="speed-label">현재 속도</div>
    <div class="speed-value" id="currentSpeedEl">0.0 km/h</div>
  </div>

  <div class="speed-card">
    <div class="speed-label">평균 속도</div>
    <div class="speed-value" id="avgSpeedEl">0.0 km/h</div>
  </div>

  <div class="speed-card">
    <div class="speed-label">최고 속도</div>
    <div class="speed-value" id="maxSpeedEl">0.0 km/h</div>
  </div>
</div>

      <div class="toolbar">
        <div class="toolbar-group">
          <button class="chip-btn active" id="followBtn">중심고정 켜짐</button>
          <button class="chip-btn" id="zoomBtn">자동줌 꺼짐</button>
        </div>
        <div class="toolbar-group">
          <button class="width-btn" data-width="4">얇게</button>
          <button class="width-btn active" data-width="6">보통</button>
          <button class="width-btn" data-width="9">굵게</button>
        </div>
      </div>

      <div class="map-wrap">
        <div id="map"></div>
      </div>

      <div class="bottom-panel">
        <div class="bottom-card">
          <div class="bottom-label">출발 위치</div>
          <div class="bottom-value" id="startInfoEl">-</div>
        </div>
        <div class="bottom-card">
          <div class="bottom-label">현재 위치 정확도</div>
          <div class="bottom-value" id="accuracyEl">-</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const RIDE_STORAGE_KEY = "ebike_ride_tracker_v4";
    const SAVED_RIDES_KEY = "ebike_saved_rides_v1";
    const FOLLOW_STORAGE_KEY = "ebike_follow_map";
    const PATH_WIDTH_STORAGE_KEY = "ebike_path_width";
    const AUTO_ZOOM_STORAGE_KEY = "ebike_auto_zoom";

    const STOP_SPEED_KMH = 1.5;          // 이 속도 이하면 정지로 판단
    const AUTO_PAUSE_DELAY_MS = 15000;   // 15초 이상 정지면 자동 일시정지
    const MIN_MOVE_DISTANCE_M = 8;       // 이 거리 미만은 GPS 흔들림으로 간주
    const MAX_VALID_SPEED_KMH = 45;      // 자전거 비정상 속도 차단

    const initialData = {
  started: false,
  paused: false,
  pausedAt: null,
  startTime: null,
  pausedMs: 0,
  totalDistanceM: 0,
  path: [],
  startPoint: null,
  lastAccuracy: null,
  currentSpeedKmh: 0,
  maxSpeedKmh: 0,
  stopBeganAt: null,
  lastPoint: null,
  autoPaused: false
};

    function loadRideData() {
      try {
        const saved = JSON.parse(localStorage.getItem(RIDE_STORAGE_KEY) || "null");
        return saved ? { ...initialData, ...saved } : { ...initialData };
      } catch (e) {
        return { ...initialData };
      }
    }

    function saveRideData() {
      localStorage.setItem(RIDE_STORAGE_KEY, JSON.stringify(rideData));
    }

    function clearRideData() {
      rideData = { ...initialData };
      localStorage.removeItem(RIDE_STORAGE_KEY);
    }

    function loadSavedRides() {
      try {
        return JSON.parse(localStorage.getItem(SAVED_RIDES_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveRideSummary() {
      const elapsedMs = getElapsedMs();
      const elapsedHours = elapsedMs / 3600000;
      const avgSpeed = elapsedHours > 0 ? (rideData.totalDistanceM / 1000) / elapsedHours : 0;

      const rides = loadSavedRides();
      const item = {
        id: `ride_${Date.now()}`,
        savedAt: new Date().toISOString(),
        totalDistanceM: rideData.totalDistanceM,
        elapsedMs,
        avgSpeedKmh: avgSpeed,
        maxSpeedKmh: rideData.maxSpeedKmh || 0,
        startPoint: rideData.startPoint,
        path: rideData.path
      };

      rides.unshift(item);
      localStorage.setItem(SAVED_RIDES_KEY, JSON.stringify(rides));
    }

    let rideData = loadRideData();
    let watchId = null;
    let wakeLock = null;
    let wakeLockTimer = null;
    let followMap = localStorage.getItem(FOLLOW_STORAGE_KEY) !== "off";
    let pathWeight = Number(localStorage.getItem(PATH_WIDTH_STORAGE_KEY) || 6);
    let autoZoom = localStorage.getItem(AUTO_ZOOM_STORAGE_KEY) === "on";
    let lastPointTime = null;
    let currentAutoZoomLevel = 16;

    const distanceEl = document.getElementById("distanceEl");
    const durationEl = document.getElementById("durationEl");
    const clockEl = document.getElementById("clockEl");
    const accuracyEl = document.getElementById("accuracyEl");
    const startInfoEl = document.getElementById("startInfoEl");
    const currentSpeedEl = document.getElementById("currentSpeedEl");
    const avgSpeedEl = document.getElementById("avgSpeedEl");
    const maxSpeedEl = document.getElementById("maxSpeedEl");
    const startTimeEl = document.getElementById("startTimeEl");
    const restTimeEl = document.getElementById("restTimeEl");

    const batteryBtn = document.getElementById("batteryBtn");
    const historyBtn = document.getElementById("historyBtn");
    const startBtn = document.getElementById("startBtn");
    const endBtn = document.getElementById("endBtn");
    const followBtn = document.getElementById("followBtn");
    const zoomBtn = document.getElementById("zoomBtn");
    const widthButtons = document.querySelectorAll(".width-btn");

    const map = L.map("map", { zoomControl: true }).setView([35.180, 128.107], 15);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const polyline = L.polyline([], {
      color: "#3b82f6",
      weight: pathWeight,
      opacity: 0.9,
      lineJoin: "round",
      lineCap: "round"
    }).addTo(map);

    const bikeIcon = L.divIcon({
      className: "",
      html: '<div class="bike-marker">🚴‍♂️</div>',
      iconSize: [34, 34],
      iconAnchor: [17, 17]
    });

    const startIcon = L.divIcon({
      className: "",
      html: '<div class="start-marker"></div>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    let startMarker = null;
    let currentMarker = null;

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;

      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      clockEl.textContent = `${h}:${m}`;
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hh = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const mm = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const ss = String(totalSec % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function getElapsedMs() {
      if (!rideData.started || !rideData.startTime) return 0;

      if (rideData.paused && rideData.pausedAt) {
        return rideData.pausedAt - rideData.startTime - rideData.pausedMs;
      }

      return Date.now() - rideData.startTime - rideData.pausedMs;
    }

    function updateFollowButton() {
      followBtn.textContent = followMap ? "중심고정 켜짐" : "중심고정 꺼짐";
      followBtn.classList.toggle("active", followMap);
    }

    function updateZoomButton() {
      zoomBtn.textContent = autoZoom ? "자동줌 켜짐" : "자동줌 꺼짐";
      zoomBtn.classList.toggle("active", autoZoom);
    }

    function updateWidthButtons() {
      widthButtons.forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.width) === pathWeight);
      });
    }

    function updateStats() {
  distanceEl.textContent = `${(rideData.totalDistanceM / 1000).toFixed(2)} km`;
  durationEl.textContent = formatDuration(getElapsedMs());
  accuracyEl.textContent = rideData.lastAccuracy != null ? `±${Math.round(rideData.lastAccuracy)}m` : "-";

  currentSpeedEl.textContent = `${(rideData.currentSpeedKmh || 0).toFixed(1)} km/h`;

  const elapsedHours = getElapsedMs() / 3600000;
  const avgSpeed = elapsedHours > 0 ? (rideData.totalDistanceM / 1000) / elapsedHours : 0;
  avgSpeedEl.textContent = `${avgSpeed.toFixed(1)} km/h`;

  maxSpeedEl.textContent = `${(rideData.maxSpeedKmh || 0).toFixed(1)} km/h`;

  if (rideData.paused && rideData.autoPaused) {
    durationEl.textContent = formatDuration(getElapsedMs()) + " (일시정지)";
  }

  if (rideData.startPoint) {
    startInfoEl.textContent = `${rideData.startPoint.lat.toFixed(5)}, ${rideData.startPoint.lng.toFixed(5)}`;
  } else {
    startInfoEl.textContent = "-";
  }

  if (rideData.startTime) {
    const d = new Date(rideData.startTime);
    const h = String(d.getHours()).padStart(2, "0");
    const m = String(d.getMinutes()).padStart(2, "0");
    startTimeEl.textContent = `${h}:${m}`;
  } else {
    startTimeEl.textContent = "--:--";
  }

  let restMs = rideData.pausedMs;
  if (rideData.paused && rideData.pausedAt) {
    restMs += Date.now() - rideData.pausedAt;
  }
  restTimeEl.textContent = formatDuration(restMs);

  updateFollowButton();
  updateZoomButton();
  updateWidthButtons();
  formatClock();
}

    function redrawPath() {
      polyline.setLatLngs(rideData.path);
      polyline.setStyle({ weight: pathWeight });

      if (rideData.startPoint) {
        if (!startMarker) {
          startMarker = L.marker([rideData.startPoint.lat, rideData.startPoint.lng], { icon: startIcon }).addTo(map);
          startMarker.bindPopup("출발 위치");
        } else {
          startMarker.setLatLng([rideData.startPoint.lat, rideData.startPoint.lng]);
        }
      }

      if (rideData.path.length > 0) {
  const last = rideData.lastPoint || rideData.path[rideData.path.length - 1];

        if (!currentMarker) {
          currentMarker = L.marker(last, { icon: bikeIcon }).addTo(map);
          currentMarker.bindPopup("현재 위치");
        } else {
          currentMarker.setLatLng(last);
        }

        if (followMap) {
          const center = map.getCenter();
          const distFromCenter = haversine(center.lat, center.lng, last[0], last[1]);
          if (distFromCenter > 10) {
            map.panTo(last, { animate: true, duration: 0.5 });
          }
        }
      }

      if (rideData.path.length === 1) {
        map.setView(rideData.path[0], 17);
      }
    }

    async function requestWakeLockSafe() {
      try {
        if (!("wakeLock" in navigator)) return;
        if (!rideData.started || rideData.paused) return;
        if (wakeLock && !wakeLock.released) return;

        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch (e) {
        wakeLock = null;
      }
    }

    function startWakeLockKeeper() {
      stopWakeLockKeeper();
      wakeLockTimer = setInterval(() => {
        requestWakeLockSafe();
      }, 20000);
    }

    function stopWakeLockKeeper() {
      if (wakeLockTimer) {
        clearInterval(wakeLockTimer);
        wakeLockTimer = null;
      }
    }

    async function releaseWakeLock() {
      try {
        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
        }
      } catch (e) {
        wakeLock = null;
      }
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && rideData.started && !rideData.paused) {
        await requestWakeLockSafe();
      }
    });

    window.addEventListener("beforeunload", (e) => {
      if (rideData.started && !rideData.paused) {
        e.preventDefault();
        e.returnValue = "";
      }
    });

    function handlePosition(pos) {
  if (!rideData.started) return;

  const { latitude, longitude, accuracy } = pos.coords;
  rideData.lastAccuracy = accuracy;

  const point = [latitude, longitude];
  const now = Date.now();

  if (accuracy > 35) {
  rideData.currentSpeedKmh = 0;
  rideData.lastPoint = point;
  lastPointTime = now;
  updateStats();
  saveRideData();
  return;
}

  // 첫 위치
  if (rideData.path.length === 0) {
  rideData.path.push(point);
  rideData.startPoint = { lat: latitude, lng: longitude };
  rideData.lastPoint = point;
  lastPointTime = now;
  redrawPath();
  updateStats();
  saveRideData();
  return;
}

  const prev = rideData.path[rideData.path.length - 1];
  const dist = haversine(prev[0], prev[1], latitude, longitude);
  const dt = lastPointTime ? (now - lastPointTime) / 1000 : 0;

  let rawSpeed = 0;
  if (dt > 0) {
    rawSpeed = (dist / dt) * 3.6;
  }

  // GPS 튐 제거
  if (rawSpeed > MAX_VALID_SPEED_KMH || (dist > 100 && dt > 0 && dt < 2)) {
  rideData.currentSpeedKmh = 0;
  rideData.lastPoint = point;
  lastPointTime = now;
  updateStats();
  saveRideData();
  return;
}

  // 아주 작은 이동 + 저속 = 정지로 처리
  const isNearlyStopped =
    dist < MIN_MOVE_DISTANCE_M || rawSpeed < STOP_SPEED_KMH;

  if (isNearlyStopped) {
  rideData.currentSpeedKmh = 0;
  rideData.lastPoint = point;

  if (!rideData.stopBeganAt) {
    rideData.stopBeganAt = now;
  }

    // 일정 시간 지나면 자동 일시정지
    if (!rideData.autoPaused && now - rideData.stopBeganAt >= AUTO_PAUSE_DELAY_MS) {
      rideData.autoPaused = true;
      rideData.paused = true;
      rideData.pausedAt = now;
    }

    // 마커 위치는 현재 위치로만 갱신
    if (currentMarker) {
      currentMarker.setLatLng(point);
    } else {
      currentMarker = L.marker(point, { icon: bikeIcon }).addTo(map);
      currentMarker.bindPopup("현재 위치");
    }

    redrawPath();
    updateStats();
    saveRideData();
    return;
  }

  // 다시 움직이기 시작하면 자동 일시정지 해제
  rideData.stopBeganAt = null;

  if (rideData.autoPaused && rideData.paused && rideData.pausedAt) {
    rideData.pausedMs += now - rideData.pausedAt;
    rideData.pausedAt = null;
    rideData.paused = false;
    rideData.autoPaused = false;
  }

  const speedKmh = Math.max(0, rawSpeed);
rideData.currentSpeedKmh = speedKmh;
rideData.lastPoint = point;

  if (speedKmh > rideData.maxSpeedKmh) {
    rideData.maxSpeedKmh = speedKmh;
  }

  // 실제 이동으로 인정될 때만 거리 누적
  if (dist >= MIN_MOVE_DISTANCE_M && dist <= 300) {
    rideData.totalDistanceM += dist;
    rideData.path.push(point);
  }

  lastPointTime = now;

  redrawPath();

 if (autoZoom) {
  if (currentAutoZoomLevel === 17) {
    if (speedKmh >= 8) currentAutoZoomLevel = 16;
  } else if (currentAutoZoomLevel === 16) {
    if (speedKmh >= 23) currentAutoZoomLevel = 15;
    else if (speedKmh <= 3) currentAutoZoomLevel = 17;
  } else if (currentAutoZoomLevel === 15) {
    if (speedKmh >= 30) currentAutoZoomLevel = 14;
    else if (speedKmh <= 11) currentAutoZoomLevel = 16;
  } else if (currentAutoZoomLevel === 14) {
    if (speedKmh <= 24) currentAutoZoomLevel = 15;
  }

  if (map.getZoom() !== currentAutoZoomLevel) {
    map.setZoom(currentAutoZoomLevel);
  }
}

  updateStats();
  saveRideData();
}

    function handlePositionError(err) {
      if (err.code === 1) {
        alert("위치 권한을 허용해주세요");
      } else {
        console.log(err.message);
      }
    }

    function startWatching() {
      if (!navigator.geolocation) {
        alert("이 기기에서는 위치 기능을 사용할 수 없습니다.");
        return;
      }
      if (watchId !== null) return;

      watchId = navigator.geolocation.watchPosition(
        handlePosition,
        handlePositionError,
        {
          enableHighAccuracy: true,
          maximumAge: 1000,
          timeout: 10000
        }
      );
    }

    function stopWatching() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
    }

    function requestLocationPermission() {
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          rideData.lastAccuracy = accuracy;
          map.setView([latitude, longitude], 16);

          if (!currentMarker) {
            currentMarker = L.marker([latitude, longitude], { icon: bikeIcon }).addTo(map);
            currentMarker.bindPopup("현재 위치");
          } else {
            currentMarker.setLatLng([latitude, longitude]);
          }

          updateStats();
        },
        () => {},
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    async function startRide() {
      const isResume = rideData.started && rideData.paused;
      const msg = isResume
        ? "주행기록을 다시 시작할까요?"
        : "주행기록을 시작할까요?";

      if (!confirm(msg)) return;

      if (!rideData.started) {
        rideData.started = true;
        rideData.paused = false;
        rideData.startTime = Date.now();
        rideData.pausedAt = null;
        rideData.pausedMs = 0;
        rideData.currentSpeedKmh = 0;
        rideData.maxSpeedKmh = 0;
        lastPointTime = Date.now();
        rideData.stopBeganAt = null;
        rideData.autoPaused = false;
        rideData.lastPoint = null;
        currentAutoZoomLevel = 16;
    } else if (rideData.paused) {
  rideData.paused = false;
  if (rideData.pausedAt) {
    rideData.pausedMs += Date.now() - rideData.pausedAt;
  }
  rideData.pausedAt = null;
  rideData.stopBeganAt = null;
  rideData.autoPaused = false;
  lastPointTime = Date.now();
  currentAutoZoomLevel = 16;
}

      saveRideData();
      updateStats();
      startWatching();
      await requestWakeLockSafe();
      startWakeLockKeeper();

      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("portrait").catch(() => {});
      }
    }

    async function endRide() {
      if (!rideData.started) return;

      if (!confirm("주행을 종료할까요?")) return;

      const shouldSave = confirm("현재 주행기록을 저장할까요?");

      if (shouldSave && rideData.path.length > 0) {
        saveRideSummary();
      }

      stopWatching();
      rideData.stopBeganAt = null;
      rideData.autoPaused = false;
      rideData.lastPoint = null;
      currentAutoZoomLevel = 16;
      stopWakeLockKeeper();
      await releaseWakeLock();

      if (startMarker) {
        map.removeLayer(startMarker);
        startMarker = null;
      }
      if (currentMarker) {
        map.removeLayer(currentMarker);
        currentMarker = null;
      }

      polyline.setLatLngs([]);
      clearRideData();
      lastPointTime = null;
      updateStats();
      map.setView([35.180, 128.107], 15);
      requestLocationPermission();
    }

    batteryBtn.addEventListener("click", () => {
      location.href = "./index.html";
    });

    historyBtn.addEventListener("click", () => {
      location.href = "./ride-history.html";
    });

    startBtn.addEventListener("click", startRide);
    endBtn.addEventListener("click", endRide);

    followBtn.addEventListener("click", () => {
  followMap = !followMap;
  localStorage.setItem(FOLLOW_STORAGE_KEY, followMap ? "on" : "off");
  updateStats();

  if (followMap && (rideData.lastPoint || rideData.path.length > 0)) {
    map.panTo(rideData.lastPoint || rideData.path[rideData.path.length - 1], {
      animate: true,
      duration: 0.5
    });
  }
});

zoomBtn.addEventListener("click", () => {
  autoZoom = !autoZoom;
  localStorage.setItem(AUTO_ZOOM_STORAGE_KEY, autoZoom ? "on" : "off");
  updateZoomButton();
});

    widthButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        pathWeight = Number(btn.dataset.width);
        localStorage.setItem(PATH_WIDTH_STORAGE_KEY, String(pathWeight));
        polyline.setStyle({ weight: pathWeight });
        updateWidthButtons();
      });
    });

    async function init() {
      formatClock();
      redrawPath();
      updateStats();
      requestLocationPermission();

      if (rideData.started && !rideData.paused) {
        startWatching();
        await requestWakeLockSafe();
        startWakeLockKeeper();
      }
    }

    init();
    setInterval(updateStats, 1000);
    setInterval(formatClock, 60000);
  </script>
</body>
