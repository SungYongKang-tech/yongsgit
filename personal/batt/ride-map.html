<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>주행기록</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #121c34;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --shadow: 0 18px 40px rgba(0,0,0,0.34);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 34%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
    }

    .screen {
      background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.96));
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
      min-height: 0;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .title-wrap {
      min-width: 0;
      flex: 1;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.4px;
      margin-bottom: 5px;
    }

    .sub {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.4;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      width: 170px;
      flex-shrink: 0;
    }

    .top-btn {
      height: 36px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(51,65,85,0.98), rgba(30,41,59,0.98));
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    .top-btn.primary {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
    }

    .top-btn.green {
      background: linear-gradient(180deg, #22c55e, #16a34a);
    }

    .top-btn.amber {
      background: linear-gradient(180deg, #f59e0b, #d97706);
    }

    .top-btn.red {
      background: linear-gradient(180deg, #ef4444, #dc2626);
    }

    .top-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .summary-card {
      background: linear-gradient(180deg, rgba(30,41,59,0.78), rgba(15,23,42,0.72));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      min-width: 0;
      text-align: center;
    }

    .summary-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      line-height: 1.3;
    }

    .summary-value {
      font-size: 21px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.3px;
      word-break: break-word;
    }

    .map-wrap {
      flex: 1;
      min-height: 280px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--line);
      position: relative;
      background: rgba(15,23,42,0.72);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .bottom-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .bottom-card {
      background: linear-gradient(180deg, rgba(30,41,59,0.78), rgba(15,23,42,0.72));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      text-align: center;
    }

    .bottom-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .bottom-value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(15,23,42,0.7);
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 700;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(148,163,184,0.12);
      border: 1px solid rgba(148,163,184,0.16);
      color: #fff;
    }

    .status-chip.running {
      background: rgba(34,197,94,0.16);
      border-color: rgba(34,197,94,0.25);
      color: #dcfce7;
    }

    .status-chip.paused {
      background: rgba(245,158,11,0.16);
      border-color: rgba(245,158,11,0.25);
      color: #fef3c7;
    }

    .status-chip.stopped {
      background: rgba(239,68,68,0.16);
      border-color: rgba(239,68,68,0.25);
      color: #fee2e2;
    }

    .leaflet-control-attribution {
      font-size: 10px !important;
    }

    @media (max-width: 390px) {
      .title { font-size: 23px; }
      .top-actions { width: 156px; }
      .summary-value { font-size: 18px; }
      .bottom-value { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="title-row">
        <div class="title-wrap">
          <div class="title">주행기록</div>
          <div class="sub">지도 위에 지나온 경로와 누적 운행거리를 표시합니다</div>
        </div>

        <div class="top-actions">
          <button class="top-btn primary" id="backBtn">계산기</button>
          <button class="top-btn green" id="startBtn">시작</button>
          <button class="top-btn amber" id="pauseBtn">일시정지</button>
          <button class="top-btn red" id="endBtn">종료</button>
        </div>
      </div>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">누적 거리</div>
          <div class="summary-value" id="distanceEl">0.00 km</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">주행 시간</div>
          <div class="summary-value" id="durationEl">00:00:00</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">현재 시각</div>
          <div class="summary-value" id="clockEl">--:--</div>
        </div>
      </div>

      <div class="status-bar">
        <div id="statusText">위치 권한 허용 후 시작 버튼을 눌러주세요</div>
        <div class="status-chip stopped" id="statusChip">대기</div>
      </div>

      <div class="map-wrap">
        <div id="map"></div>
      </div>

      <div class="bottom-panel">
        <div class="bottom-card">
          <div class="bottom-label">출발 위치</div>
          <div class="bottom-value" id="startInfoEl">-</div>
        </div>
        <div class="bottom-card">
          <div class="bottom-label">현재 위치 정확도</div>
          <div class="bottom-value" id="accuracyEl">-</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const RIDE_STORAGE_KEY = "ebike_ride_tracker_v1";

    const initialData = {
      started: false,
      paused: false,
      startTime: null,
      pausedAt: null,
      pausedMs: 0,
      watchIdActive: false,
      totalDistanceM: 0,
      path: [],
      startPoint: null,
      lastAccuracy: null
    };

    function loadRideData() {
      try {
        const saved = JSON.parse(localStorage.getItem(RIDE_STORAGE_KEY) || "null");
        return saved ? { ...initialData, ...saved } : { ...initialData };
      } catch (e) {
        return { ...initialData };
      }
    }

    function saveRideData() {
      localStorage.setItem(RIDE_STORAGE_KEY, JSON.stringify({
        ...rideData,
        watchIdActive: false
      }));
    }

    function clearRideData() {
      rideData = { ...initialData };
      localStorage.removeItem(RIDE_STORAGE_KEY);
    }

    let rideData = loadRideData();
    let watchId = null;
    let wakeLock = null;

    const distanceEl = document.getElementById("distanceEl");
    const durationEl = document.getElementById("durationEl");
    const clockEl = document.getElementById("clockEl");
    const accuracyEl = document.getElementById("accuracyEl");
    const startInfoEl = document.getElementById("startInfoEl");
    const statusText = document.getElementById("statusText");
    const statusChip = document.getElementById("statusChip");

    const backBtn = document.getElementById("backBtn");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const endBtn = document.getElementById("endBtn");

    const map = L.map("map", {
      zoomControl: true
    }).setView([35.180, 128.107], 15);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const polyline = L.polyline([], {
      color: "#3b82f6",
      weight: 6,
      opacity: 0.9,
      lineJoin: "round",
      lineCap: "round"
    }).addTo(map);

    let startMarker = null;
    let currentMarker = null;

    function clamp(n, min, max) {
      return Math.min(Math.max(n, min), max);
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      clockEl.textContent = `${h}:${m}`;
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hh = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const mm = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const ss = String(totalSec % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function getElapsedMs() {
      if (!rideData.started || !rideData.startTime) return 0;

      const now = Date.now();

      if (rideData.paused && rideData.pausedAt) {
        return rideData.pausedAt - rideData.startTime - rideData.pausedMs;
      }

      return now - rideData.startTime - rideData.pausedMs;
    }

    function updateStatusUI() {
      if (!rideData.started) {
        statusText.textContent = "위치 권한 허용 후 시작 버튼을 눌러주세요";
        statusChip.textContent = "대기";
        statusChip.className = "status-chip stopped";
        return;
      }

      if (rideData.paused) {
        statusText.textContent = "주행 기록이 일시정지 상태입니다";
        statusChip.textContent = "일시정지";
        statusChip.className = "status-chip paused";
        return;
      }

      statusText.textContent = "주행 경로를 기록 중입니다";
      statusChip.textContent = "기록중";
      statusChip.className = "status-chip running";
    }

    function updateStats() {
      distanceEl.textContent = `${(rideData.totalDistanceM / 1000).toFixed(2)} km`;
      durationEl.textContent = formatDuration(getElapsedMs());
      accuracyEl.textContent = rideData.lastAccuracy != null ? `±${Math.round(rideData.lastAccuracy)}m` : "-";

      if (rideData.startPoint) {
        startInfoEl.textContent = `${rideData.startPoint.lat.toFixed(5)}, ${rideData.startPoint.lng.toFixed(5)}`;
      } else {
        startInfoEl.textContent = "-";
      }

      updateStatusUI();
      formatClock();
    }

    function redrawPath() {
      polyline.setLatLngs(rideData.path);

      if (rideData.startPoint) {
        if (!startMarker) {
          startMarker = L.marker([rideData.startPoint.lat, rideData.startPoint.lng]).addTo(map);
          startMarker.bindPopup("출발 위치");
        } else {
          startMarker.setLatLng([rideData.startPoint.lat, rideData.startPoint.lng]);
        }
      }

      if (rideData.path.length > 0) {
        const last = rideData.path[rideData.path.length - 1];

        if (!currentMarker) {
          currentMarker = L.marker(last).addTo(map);
          currentMarker.bindPopup("현재 위치");
        } else {
          currentMarker.setLatLng(last);
        }
      }

      if (rideData.path.length === 1) {
        map.setView(rideData.path[0], 17);
      } else if (rideData.path.length > 1) {
        map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
      }
    }

    function requestWakeLock() {
      if (!("wakeLock" in navigator)) return;
      navigator.wakeLock.request("screen")
        .then(lock => { wakeLock = lock; })
        .catch(() => {});
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") requestWakeLock();
    });

    function handlePosition(pos) {
      if (!rideData.started || rideData.paused) return;

      const { latitude, longitude, accuracy } = pos.coords;

      rideData.lastAccuracy = accuracy;

      if (accuracy > 35) {
        updateStats();
        saveRideData();
        return;
      }

      const point = [latitude, longitude];

      if (rideData.path.length === 0) {
        rideData.path.push(point);
        rideData.startPoint = { lat: latitude, lng: longitude };
      } else {
        const prev = rideData.path[rideData.path.length - 1];
        const dist = haversine(prev[0], prev[1], latitude, longitude);

        if (dist >= 5 && dist <= 300) {
          rideData.totalDistanceM += dist;
          rideData.path.push(point);
        }
      }

      redrawPath();
      updateStats();
      saveRideData();
    }

    function handlePositionError(err) {
      statusText.textContent = `위치 추적 실패: ${err.message}`;
    }

    function startWatching() {
      if (!navigator.geolocation) {
        alert("이 기기에서는 위치 기능을 사용할 수 없습니다.");
        return;
      }

      if (watchId !== null) return;

      watchId = navigator.geolocation.watchPosition(
        handlePosition,
        handlePositionError,
        {
          enableHighAccuracy: true,
          maximumAge: 1000,
          timeout: 10000
        }
      );
    }

    function stopWatching() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
    }

    function startRide() {
      if (!rideData.started) {
        rideData.started = true;
        rideData.paused = false;
        rideData.startTime = Date.now();
        rideData.pausedAt = null;
        rideData.pausedMs = 0;
      } else if (rideData.paused) {
        rideData.paused = false;
        if (rideData.pausedAt) {
          rideData.pausedMs += Date.now() - rideData.pausedAt;
        }
        rideData.pausedAt = null;
      }

      saveRideData();
      updateStats();
      startWatching();
      requestWakeLock();
    }

    function pauseRide() {
      if (!rideData.started || rideData.paused) return;
      rideData.paused = true;
      rideData.pausedAt = Date.now();
      saveRideData();
      updateStats();
      stopWatching();
    }

    function endRide() {
      if (!confirm("현재 주행기록을 종료하고 초기화할까요?")) return;

      stopWatching();

      if (startMarker) {
        map.removeLayer(startMarker);
        startMarker = null;
      }

      if (currentMarker) {
        map.removeLayer(currentMarker);
        currentMarker = null;
      }

      polyline.setLatLngs([]);
      clearRideData();
      updateStats();
      map.setView([35.180, 128.107], 15);
    }

    backBtn.addEventListener("click", () => {
      location.href = "./index.html";
    });

    startBtn.addEventListener("click", startRide);
    pauseBtn.addEventListener("click", pauseRide);
    endBtn.addEventListener("click", endRide);

    function init() {
      formatClock();
      redrawPath();
      updateStats();

      if (rideData.started && !rideData.paused) {
        startWatching();
        requestWakeLock();
      }
    }

    init();
    setInterval(updateStats, 1000);
    setInterval(formatClock, 60000);
  </script>
</body>
</html>
