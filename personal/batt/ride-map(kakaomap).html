async function ensureAuth(){

function getStableColorFromName(name = "") {
  const colors = [
    "#2563eb", "#16a34a", "#dc2626", "#9333ea", "#ea580c",
    "#0891b2", "#ca8a04", "#db2777", "#4f46e5", "#059669"
  ];
  let hash = 0;
  const safe = String(name || "라이더");
  for (let i = 0; i < safe.length; i++) {
    hash = ((hash << 5) - hash) + safe.charCodeAt(i);
    hash |= 0;
  }
  return colors[Math.abs(hash) % colors.length];
}

function getMyMemberColor() {
  if (!myMemberColor) {
    myMemberColor = getStableColorFromName(myGroupName || "나");
    localStorage.setItem("ride_group_color", myMemberColor);
  }
  return myMemberColor;
}

function getMyMemberRef() {
  if (!groupEnabled || !currentRoomId || !auth.currentUser) return null;
  return ref(db, `rideRooms/${currentRoomId}/members/${auth.currentUser.uid}`);
}

async function ensureGroupMember() {
  if (!groupEnabled || !currentRoomId || !auth.currentUser) return;
  const memberRef = getMyMemberRef();
  if (!memberRef) return;

  const snap = await get(memberRef);
  const baseData = {
    name: myGroupName || "라이더",
    color: getMyMemberColor(),
    online: true,
    updatedAt: Date.now()
  };

  if (!snap.exists()) {
    await update(memberRef, {
      ...baseData,
      joinedAt: Date.now(),
      isHost: false
    });
  } else {
    await update(memberRef, baseData);
  }

  try {
    await onDisconnect(memberRef).update({
      online: false,
      updatedAt: Date.now()
    });
  } catch (e) {
    console.log("onDisconnect 설정 실패:", e);
  }
}

async function updateMyGroupLocation(lat, lng, accuracy, speedKmh) {
  if (!groupEnabled || !currentRoomId || !auth.currentUser) return;

  const memberRef = getMyMemberRef();
  if (!memberRef) return;

  try {
    await update(memberRef, {
      name: myGroupName || "라이더",
      color: getMyMemberColor(),
      online: true,
      updatedAt: Date.now(),
      lat,
      lng,
      accuracy: Number.isFinite(accuracy) ? accuracy : 0,
      speed: Number.isFinite(speedKmh) ? speedKmh : 0
    });
  } catch (e) {
    console.log("그룹 위치 업로드 실패:", e);
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function getPerpendicularDistance(point, lineStart, lineEnd) {
  const [x, y] = point;
  const [x1, y1] = lineStart;
  const [x2, y2] = lineEnd;
  const dx = x2 - x1;
  const dy = y2 - y1;

  if (dx === 0 && dy === 0) {
    const ddx = x - x1;
    const ddy = y - y1;
    return Math.sqrt(ddx * ddx + ddy * ddy);
  }

  const t = ((x - x1) * dx + (y - y1) * dy) / (dx * dx + dy * dy);
  const projX = x1 + t * dx;
  const projY = y1 + t * dy;
  const distX = x - projX;
  const distY = y - projY;
  return Math.sqrt(distX * distX + distY * distY);
}

function douglasPeucker(points, epsilon) {
  if (!Array.isArray(points) || points.length < 3) {
    return Array.isArray(points) ? points.slice() : [];
  }

  let maxDistance = 0;
  let index = 0;

  for (let i = 1; i < points.length - 1; i++) {
    const distance = getPerpendicularDistance(points[i], points[0], points[points.length - 1]);
    if (distance > maxDistance) {
      maxDistance = distance;
      index = i;
    }
  }

  if (maxDistance > epsilon) {
    const left = douglasPeucker(points.slice(0, index + 1), epsilon);
    const right = douglasPeucker(points.slice(index), epsilon);
    return left.slice(0, -1).concat(right);
  }

  return [points[0], points[points.length - 1]];
}

function reducePathDouglasPeucker(path, options = {}) {
  const { epsilon = 0.00003, maxPoints = 2000 } = options;
  if (!Array.isArray(path) || path.length <= 2) return Array.isArray(path) ? path.slice() : [];

  let reduced = douglasPeucker(path, epsilon);

  if (reduced.length > maxPoints) {
    const step = Math.ceil(reduced.length / maxPoints);
    const trimmed = [];
    for (let i = 0; i < reduced.length; i += step) {
      trimmed.push(reduced[i]);
    }
    const last = reduced[reduced.length - 1];
    const finalLast = trimmed[trimmed.length - 1];
    if (!finalLast || finalLast[0] !== last[0] || finalLast[1] !== last[1]) {
      trimmed.push(last);
    }
    reduced = trimmed;
  }

  return reduced;
}

function reduceProfileSimple(profile, maxPoints = 1000) {
  if (!Array.isArray(profile) || profile.length <= maxPoints) {
    return Array.isArray(profile) ? profile.slice() : [];
  }
  const step = Math.ceil(profile.length / maxPoints);
  const reduced = [];
  for (let i = 0; i < profile.length; i += step) reduced.push(profile[i]);
  const last = profile[profile.length - 1];
  if (reduced[reduced.length - 1] !== last) reduced.push(last);
  return reduced;
}

function sampleRidePath(path, maxSamples = MAX_ELEVATION_SAMPLES) {
  const safePath = Array.isArray(path) ? path : [];
  if (safePath.length <= maxSamples) return safePath.slice();

  const sampled = [];
  const lastIndex = safePath.length - 1;
  for (let i = 0; i < maxSamples; i++) {
    const idx = Math.round((i / (maxSamples - 1)) * lastIndex);
    sampled.push(safePath[idx]);
  }
  return sampled;
}

function getAdaptiveElevationSampleCount(path) {
  const safePath = Array.isArray(path) ? path : [];
  if (safePath.length < 2) return 60;

  let totalDistanceM = 0;
  for (let i = 1; i < safePath.length; i++) {
    totalDistanceM += haversine(
      safePath[i - 1][0], safePath[i - 1][1],
      safePath[i][0], safePath[i][1]
    );
  }

  const totalKm = totalDistanceM / 1000;
  if (totalKm < 8) return 60;
  if (totalKm < 20) return 80;
  if (totalKm < 50) return 120;
  return 160;
}

function cleanPathForElevation(path, minStepM = ELEVATION_MIN_STEP_M) {
  const safePath = Array.isArray(path) ? path : [];
  if (safePath.length <= 2) return safePath.slice();

  const cleaned = [safePath[0]];
  let lastKept = safePath[0];

  for (let i = 1; i < safePath.length; i++) {
    const curr = safePath[i];
    const d = haversine(lastKept[0], lastKept[1], curr[0], curr[1]);
    if (d >= minStepM) {
      cleaned.push(curr);
      lastKept = curr;
    }
  }

  const lastOriginal = safePath[safePath.length - 1];
  const lastCleaned = cleaned[cleaned.length - 1];
  if (lastOriginal && lastCleaned &&
      (lastOriginal[0] !== lastCleaned[0] || lastOriginal[1] !== lastCleaned[1])) {
    cleaned.push(lastOriginal);
  }
  return cleaned;
}

function smoothElevationProfile(profile, windowSize = ELEVATION_SMOOTH_WINDOW) {
  if (!Array.isArray(profile) || profile.length < 3) return profile || [];
  const half = Math.floor(windowSize / 2);

  return profile.map((point, i) => {
    let sum = 0;
    let count = 0;
    for (let j = i - half; j <= i + half; j++) {
      if (profile[j]) {
        sum += Number(profile[j].elevation || 0);
        count++;
      }
    }
    return { ...point, elevation: Number((sum / count).toFixed(1)) };
  });
}

function buildDistanceProfile(points) {
  const profile = [];
  let cumulativeM = 0;

  for (let i = 0; i < points.length; i++) {
    const [lat, lng] = points[i];
    if (i > 0) {
      const [prevLat, prevLng] = points[i - 1];
      cumulativeM += haversine(prevLat, prevLng, lat, lng);
    }
    profile.push({ lat, lng, distanceKm: Number((cumulativeM / 1000).toFixed(2)) });
  }
  return profile;
}

async function fetchElevationProfile(path) {
  const cleanedPath = cleanPathForElevation(path, ELEVATION_MIN_STEP_M);
  const adaptiveSampleCount = getAdaptiveElevationSampleCount(cleanedPath);
  const sampledPath = sampleRidePath(cleanedPath, adaptiveSampleCount);

  if (!sampledPath.length) return { profile: [], summary: null };

  const distanceProfile = buildDistanceProfile(sampledPath);
  const res = await fetch(OPEN_ELEVATION_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      locations: distanceProfile.map((p) => ({
        latitude: p.lat,
        longitude: p.lng
      }))
    })
  });

  if (!res.ok) throw new Error("고도 조회 실패");

  const data = await res.json();
  const results = Array.isArray(data.results) ? data.results : [];

  let profile = distanceProfile.map((p, i) => ({
    distanceKm: p.distanceKm,
    elevation: Number(results[i]?.elevation ?? 0)
  }));

  if (!profile.length) return { profile: [], summary: null };

  profile = smoothElevationProfile(profile, ELEVATION_SMOOTH_WINDOW);

  let minElevation = profile[0].elevation;
  let maxElevation = profile[0].elevation;
  let gain = 0;
  let loss = 0;

  for (let i = 1; i < profile.length; i++) {
    const current = profile[i].elevation;
    const prev = profile[i - 1].elevation;
    const diff = current - prev;
    if (current < minElevation) minElevation = current;
    if (current > maxElevation) maxElevation = current;
    if (diff >= ELEVATION_DIFF_THRESHOLD_M) gain += diff;
    else if (diff <= -ELEVATION_DIFF_THRESHOLD_M) loss += Math.abs(diff);
  }

  return {
    profile,
    summary: {
      minElevation: Math.round(minElevation),
      maxElevation: Math.round(maxElevation),
      gainM: Math.round(gain),
      lossM: Math.round(loss)
    }
  };
}

async function saveRideSummary() {
  const elapsedMs = getElapsedMs();
  const elapsedHours = elapsedMs / 3600000;
  const avgSpeed = elapsedHours > 0 ? (rideData.totalDistanceM / 1000) / elapsedHours : 0;

  const safePath = Array.isArray(rideData.path) && rideData.path.length > 0
    ? rideData.path.slice()
    : rideData.lastPoint
      ? [rideData.lastPoint]
      : rideData.startPoint
        ? [[rideData.startPoint.lat, rideData.startPoint.lng]]
        : [];

  let elevationProfile = [];
  let elevationSummary = null;

  try {
    if (safePath.length > 1) {
      const elevationData = await fetchElevationProfile(safePath);
      elevationProfile = elevationData.profile || [];
      elevationSummary = elevationData.summary || null;
    }
  } catch (e) {
    console.error("고도 데이터 조회 실패:", e);
    alert("고도 데이터 조회 실패\n네트워크 또는 고도 서버 응답 문제일 수 있습니다.");
  }

  const reducedPath = reducePathDouglasPeucker(safePath, {
    epsilon: 0.00003,
    maxPoints: 2000
  });

  if (!Array.isArray(reducedPath) || reducedPath.length < 1) {
    alert("저장할 경로 데이터가 부족합니다.");
    return;
  }

  const reducedElevationProfile = reduceProfileSimple(elevationProfile, 1000);
  const reducedSpeedProfile = reduceProfileSimple(Array.isArray(speedProfile) ? speedProfile.slice() : [], 1000);

  const rides = loadSavedRides();
  const item = {
    id: `ride_${Date.now()}`,
    savedAt: new Date().toISOString(),
    startTime: rideData.startTime || null,
    endTime: Date.now(),
    totalDistanceM: rideData.totalDistanceM,
    elapsedMs,
    restMs: rideData.pausedMs + (rideData.paused && rideData.pausedAt ? Date.now() - rideData.pausedAt : 0),
    avgSpeedKmh: avgSpeed,
    maxSpeedKmh: rideData.maxSpeedKmh || 0,
    startPoint: rideData.startPoint,
    path: reducedPath,
    elevationProfile: reducedElevationProfile,
    elevationSummary,
    speedProfile: reducedSpeedProfile
  };

  rides.unshift(item);
  localStorage.setItem(SAVED_RIDES_KEY, JSON.stringify(rides));
  alert(`저장 완료\n좌표: ${safePath.length}개 → ${reducedPath.length}개\n고도: ${reducedElevationProfile.length}개`);
}

function formatClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");
  clockEl.textContent = `${h}:${m}`;
}

function formatDuration(ms) {
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const hh = String(Math.floor(totalSec / 3600)).padStart(2, "0");
  const mm = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
  const ss = String(totalSec % 60).padStart(2, "0");
  return `${hh}:${mm}:${ss}`;
}

function getElapsedMs() {

  return Date.now() - rideData.startTime - rideData.pausedMs;

function renderGroupMarkers() {
  if (!map || !ensureKakaoLoaded()) return;

  const myUid = auth.currentUser?.uid || null;
  const validIds = new Set();

  Object.entries(groupMembers || {}).forEach(([memberId, member]) => {
    if (!member || memberId === myUid) return;
    if (!member.online) return;
    if (typeof member.lat !== "number" || typeof member.lng !== "number") return;

    validIds.add(memberId);
    const pos = toLatLng(member.lat, member.lng);
    if (!pos) return;

    if (!groupMarkers[memberId]) {
      groupMarkers[memberId] = new kakao.maps.Marker({
        map,
        position: pos,
        image: buildGroupMarkerImage(member.name || "?", member.color || "#2563eb"),
        title: `${member.name || "라이더"}`
      });
    } else {
      groupMarkers[memberId].setPosition(pos);
      groupMarkers[memberId].setMap(map);
      groupMarkers[memberId].setImage(buildGroupMarkerImage(member.name || "?", member.color || "#2563eb"));
    }
  });

  Object.keys(groupMarkers).forEach((memberId) => {
    if (!validIds.has(memberId)) {
      groupMarkers[memberId].setMap(null);
      delete groupMarkers[memberId];
    }
  });
}

function fitPathToView() {
  if (!map || !ensureKakaoLoaded()) return;

  let hasAny = false;
  const bounds = new kakao.maps.LatLngBounds();

  if (rideData.path && rideData.path.length > 0) {
    rideData.path.forEach(([lat, lng]) => {
      const ll = toLatLng(lat, lng);
      if (ll) {
        bounds.extend(ll);
        hasAny = true;
      }
    });
  }

  if (navigationState.routePath && navigationState.routePath.length > 0) {
    navigationState.routePath.forEach((p) => {
      const ll = toLatLng(p.lat, p.lng);
      if (ll) {
        bounds.extend(ll);
        hasAny = true;
      }
    });
  }

  Object.values(groupMembers || {}).forEach((member) => {
    if (!member || !member.online) return;
    if (typeof member.lat !== "number" || typeof member.lng !== "number") return;
    const ll = toLatLng(member.lat, member.lng);
    if (ll) {
      bounds.extend(ll);
      hasAny = true;
    }
  });

  if (groupDestination && typeof groupDestination.lat === "number" && typeof groupDestination.lng === "number") {
    const ll = toLatLng(groupDestination.lat, groupDestination.lng);
    if (ll) {
      bounds.extend(ll);
      hasAny = true;
    }
  }

  if (hasAny) {
    map.setBounds(bounds);
  } else {
    const current = getCurrentPositionObject();
    if (current) {
      map.setCenter(toLatLng(current.lat, current.lng));
      map.setLevel(3);
    } else {
      map.setLevel(4);
      map.setCenter(toLatLng(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng));
    }
  }
}

function redrawPath() {
  if (!map || !ensureKakaoLoaded()) return;

  if (recommendedPolyline) {
    const recPath = (navigationState.routePath || [])
      .map(p => toLatLng(p.lat, p.lng))
      .filter(Boolean);
    recommendedPolyline.setPath(recPath);
    recommendedPolyline.setOptions({ strokeWeight: 8 });
  }

  if (ridePolyline) {
    const ridePath = rideData.path
      .map(([lat, lng]) => toLatLng(lat, lng))
      .filter(Boolean);

    ridePolyline.setPath(ridePath);
    ridePolyline.setOptions({ strokeWeight: 7 });
    ridePolyline.setMap(null);
    ridePolyline.setMap(map);
  }

  if (rideData.startPoint) drawStartMarker();

  if (rideData.path.length > 0) {
    const last = rideData.lastPoint || rideData.path[rideData.path.length - 1];
    drawCurrentMarker(last[0], last[1]);

    if (followMap) {
      const pos = toLatLng(last[0], last[1]);
      if (pos) map.panTo(pos);
    }
  } else if (rideData.lastPoint) {
    drawCurrentMarker(rideData.lastPoint[0], rideData.lastPoint[1]);
  }

  renderGroupMarkers();
  renderGroupDestination();
}

async function requestWakeLockSafe() {
  try {
    if (!("wakeLock" in navigator)) return;
    if (!rideData.started || rideData.paused) return;
    if (wakeLock && !wakeLock.released) return;

    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => {
      wakeLock = null;
    });
  } catch {
    wakeLock = null;
  }
}

function startWakeLockKeeper() {
  stopWakeLockKeeper();
  wakeLockTimer = setInterval(() => {
    requestWakeLockSafe();
  }, 20000);
}

function stopWakeLockKeeper() {
  if (wakeLockTimer) {
    clearInterval(wakeLockTimer);
    wakeLockTimer = null;
  }
}

async function releaseWakeLock() {
  try {
    if (wakeLock) {
      await wakeLock.release();
      wakeLock = null;
    }
  } catch {
    wakeLock = null;
  }
}

function addSpeedSample(totalDistanceM, currentSpeedKmh) {
  const now = Date.now();
  const timeDiff = now - lastSpeedSampleAt;
  const distDiff = totalDistanceM - lastSpeedSampleDistanceM;
  if (timeDiff < 3000 && distDiff < 20) return;

  speedProfile.push({
    distanceKm: +(totalDistanceM / 1000).toFixed(3),
    speedKmh: +Math.max(0, currentSpeedKmh || 0).toFixed(1),
    time: now
  });

  lastSpeedSampleAt = now;
  lastSpeedSampleDistanceM = totalDistanceM;
}

async function handlePosition(pos) {
  if (!rideData.started) return;

  const now = Date.now();
  lastGpsTime = now;

  const { latitude, longitude, accuracy } = pos.coords;
  rideData.lastAccuracy = accuracy;
  const point = [latitude, longitude];

  if (accuracy > MAX_GPS_ACCURACY_M) {
  rideData.currentSpeedKmh = 0;
  drawCurrentMarker(latitude, longitude);

 

  if (followMap && map) {
    const ll = toLatLng(latitude, longitude);
    if (ll) map.panTo(ll);
  }

  updateStats();
  saveRideData();
  return;
}

  if (rideData.path.length === 0) {
    rideData.path.push(point);
    rideData.startPoint = { lat: latitude, lng: longitude };
    rideData.lastPoint = point;
    lastPointTime = now;

    if (speedProfile.length === 0) {
      speedProfile.push({ distanceKm: 0, speedKmh: 0, time: now });
    }

    
redrawPath();
updateStats();
saveRideData();
return;
  }

  const prev = rideData.path[rideData.path.length - 1];
  const dist = haversine(prev[0], prev[1], latitude, longitude);
  const dt = lastPointTime ? (now - lastPointTime) / 1000 : 0;

  let rawSpeed = 0;
  if (typeof pos.coords.speed === "number" && pos.coords.speed >= 0) {
    rawSpeed = pos.coords.speed * 3.6;
  } else if (dt > 0) {
    rawSpeed = (dist / dt) * 3.6;
  }

  if (rawSpeed > MAX_VALID_SPEED_KMH || (dist > 100 && dt > 0 && dt < 2)) {
    rideData.currentSpeedKmh = 0;
    rideData.lastPoint = point;
    lastPointTime = now;
    await updateMyGroupLocation(latitude, longitude, accuracy, 0);
updateStats();
saveRideData();
return;
  }

  const isNearlyStopped = dist < MIN_MOVE_DISTANCE_M && rawSpeed < STOP_SPEED_KMH;

  if (isNearlyStopped) {
    rideData.currentSpeedKmh = 0;
    rideData.lastPoint = point;

    if (!rideData.stopBeganAt) rideData.stopBeganAt = now;

    if (!rideData.autoPaused && now - rideData.stopBeganAt >= AUTO_PAUSE_DELAY_MS) {
      rideData.autoPaused = true;
      rideData.paused = true;
      rideData.pausedAt = now;
    }

   
await updateMyGroupLocation(latitude, longitude, accuracy, 0);
redrawPath();
updateStats();
saveRideData();
return;
  }

  rideData.stopBeganAt = null;

  if (rideData.autoPaused && rideData.paused && rideData.pausedAt) {
    rideData.pausedMs += now - rideData.pausedAt;
    rideData.pausedAt = null;
    rideData.paused = false;
    rideData.autoPaused = false;
    rideData.stopBeganAt = null;
  }

  const speedKmh = Math.max(0, rawSpeed);
  rideData.currentSpeedKmh = speedKmh;
  rideData.lastPoint = point;

  if (speedKmh > rideData.maxSpeedKmh) rideData.maxSpeedKmh = speedKmh;

  if (dist >= MIN_MOVE_DISTANCE_M && dist <= 500) {
    rideData.totalDistanceM += dist;
    rideData.path.push(point);
  } else if (dist > 500) {
    rideData.path.push(point);
  }

  addSpeedSample(rideData.totalDistanceM, rideData.currentSpeedKmh);
  lastPointTime = now;

  await updateMyGroupLocation(latitude, longitude, accuracy, speedKmh);

  redrawPath();

  if (map) {
    if (autoZoom) {
      if (speedKmh < 8) currentAutoZoomLevel = 2;
      else if (speedKmh < 18) currentAutoZoomLevel = 3;
      else if (speedKmh < 28) currentAutoZoomLevel = 4;
      else currentAutoZoomLevel = 5;
      map.setLevel(currentAutoZoomLevel);
    }

    if (followMap) {
      const pos2 = toLatLng(latitude, longitude);
      if (pos2) map.panTo(pos2);
    }
  }

 updateStats();
saveRideData();
}

function handlePositionError(err) {
  console.log("GPS 오류:", err);
  if (err.code === 1) {
    alert("위치 권한을 허용해주세요");
    return;
  }
  if (!rideData.started) return;

  stopWatching();
  setTimeout(() => {
    startWatching();
    requestLocationPermission();
  }, 1000);
}
function startGroupWatching() {
  if (!navigator.geolocation) return;
  if (!groupEnabled || !currentRoomId) return;
  if (groupWatchId !== null) return;

  groupWatchId = navigator.geolocation.watchPosition(
    async (pos) => {
      const { latitude, longitude, accuracy, speed } = pos.coords;

      lastGroupPosition = [latitude, longitude];

      const speedKmh =
        typeof speed === "number" && speed >= 0
          ? speed * 3.6
          : 0;

      await updateMyGroupLocation(latitude, longitude, accuracy, speedKmh);

      renderFriendStrip();
    },
    (err) => {
      console.log("그룹 위치 watch 오류:", err);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 10000
    }
  );
}

function stopGroupWatching() {
  if (groupWatchId !== null) {
    navigator.geolocation.clearWatch(groupWatchId);
    groupWatchId = null;
  }
}

function startWatching() {
  if (!navigator.geolocation) {
    alert("이 기기에서는 위치 기능을 사용할 수 없습니다.");
    return;
  }
  if (watchId !== null) return;

  watchId = navigator.geolocation.watchPosition(
    handlePosition,
    handlePositionError,
    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
  );
}

function stopWatching() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
}

function requestLocationPermission() {
  if (!navigator.geolocation || !map || !ensureKakaoLoaded()) return;

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      if (!ensureKakaoLoaded() || !map) return;

      const { latitude, longitude, accuracy } = pos.coords;
      rideData.lastAccuracy = accuracy;
      rideData.lastPoint = [latitude, longitude];

      const center = toLatLng(latitude, longitude);
      if (center) {
        if (!hasInitialCentered) {
          map.setCenter(center);
          if (autoZoom && map) {
            map.setLevel(2);
            currentAutoZoomLevel = 2;
          }
          hasInitialCentered = true;
        } else if (followMap) {
          map.setCenter(center);
        }
        drawCurrentMarker(latitude, longitude);
      }

     
       updateStats();
      saveRideData();
    },
    (err) => {
      console.log("현재 위치 요청 실패:", err);
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
  );
}

async function startRide() {
  const isResume = rideData.started && rideData.paused;
  const msg = isResume ? "주행기록을 다시 시작할까요?" : "주행기록을 시작할까요?";
  if (!confirm(msg)) return;

  if (!rideData.started) {
    rideData = {
      ...initialData,
      started: true,
      paused: false,
      startTime: Date.now()
    };

    speedProfile = [{ distanceKm: 0, speedKmh: 0, time: Date.now() }];
    lastSpeedSampleAt = 0;
    lastSpeedSampleDistanceM = 0;
    lastPointTime = Date.now();
    lastGpsTime = Date.now();
    currentAutoZoomLevel = 2;
    hasInitialCentered = false;

    if (ridePolyline) ridePolyline.setPath([]);
    if (startMarker) { startMarker.setMap(null); startMarker = null; }
    if (currentMarker) { currentMarker.setMap(null); currentMarker = null; }

    redrawPath();
  } else if (rideData.paused) {
    rideData.paused = false;
    if (rideData.pausedAt) rideData.pausedMs += Date.now() - rideData.pausedAt;
    rideData.pausedAt = null;
    rideData.stopBeganAt = null;
    rideData.autoPaused = false;
    lastPointTime = Date.now();
    lastGpsTime = Date.now();
    currentAutoZoomLevel = 2;
  }

  saveRideData();
  updateStats();
  startWatching();
  requestLocationPermission();
  await requestWakeLockSafe();
  startWakeLockKeeper();

  if (groupEnabled && currentRoomId) {
    await ensureGroupMember();
  }

  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("portrait").catch(() => {});
  }
}

async function endRide() {
  if (!rideData.started) return;
  if (!confirm("주행을 종료할까요?")) return;

  const shouldSave = confirm("현재 주행기록을 저장할까요?");
  const canSave = rideData.path.length > 0 || !!rideData.lastPoint || !!rideData.startPoint;
  if (shouldSave && canSave) {
    await saveRideSummary();
  }

  stopWatching();
  rideData.stopBeganAt = null;
  rideData.autoPaused = false;
  rideData.lastPoint = null;
  currentAutoZoomLevel = 2;
  lastPointTime = null;
  lastGpsTime = 0;
  stopWakeLockKeeper();
  await releaseWakeLock();
  await setMyGroupOffline();

  if (startMarker) { startMarker.setMap(null); startMarker = null; }
  if (currentMarker) { currentMarker.setMap(null); currentMarker = null; }
  if (ridePolyline) ridePolyline.setPath([]);

  clearRideData();
  speedProfile = [];
  lastSpeedSampleAt = 0;
  lastSpeedSampleDistanceM = 0;
  clearNavigation();
  updateStats();

  if (map) hasInitialCentered = false;
  requestLocationPermission();
}

batteryBtn.addEventListener("click", () => {
  location.href = "./index.html";
});

historyBtn.addEventListener("click", () => {
  location.href = "./ride-history.html";
});

courseBtn.addEventListener("click", () => {
  location.href = "./my-course.html";
});

groupRideBtn.addEventListener("click", () => {
  location.href = "./group-ride.html";
});

startBtn.addEventListener("click", startRide);
endBtn.addEventListener("click", endRide);

followBtn.addEventListener("click", () => {
  followMap = !followMap;
  localStorage.setItem(FOLLOW_STORAGE_KEY, followMap ? "on" : "off");
  updateStats();

  if (followMap && map && ensureKakaoLoaded() && (rideData.lastPoint || rideData.path.length > 0)) {
    const p = rideData.lastPoint || rideData.path[rideData.path.length - 1];
    const pos = toLatLng(p[0], p[1]);
    if (pos) {
      map.panTo(pos);
      if (autoZoom) map.setLevel(currentAutoZoomLevel);
    }
  }
});

zoomBtn.addEventListener("click", () => {
  autoZoom = !autoZoom;
  localStorage.setItem(AUTO_ZOOM_STORAGE_KEY, autoZoom ? "on" : "off");
  updateZoomButton();

  if (autoZoom && followMap && map && ensureKakaoLoaded() && (rideData.lastPoint || rideData.path.length > 0)) {
    const p = rideData.lastPoint || rideData.path[rideData.path.length - 1];
    const pos = toLatLng(p[0], p[1]);
    if (pos) {
      map.setLevel(currentAutoZoomLevel);
      map.panTo(pos);
    }
  }
});

fitBtn.addEventListener("click", () => {
  fitPathToView();
});

clearRouteBtn.addEventListener("click", () => {
  if (!navigationState.routePath || navigationState.routePath.length === 0) {
    alert("지울 코스가 없습니다.");
    return;
  }

  if (!confirm("표시된 코스를 지울까요?")) return;
  clearNavigation();
  updateStats();
});

function startGpsReconnectMonitor() {
  if (gpsReconnectTimer) clearInterval(gpsReconnectTimer);

  gpsReconnectTimer = setInterval(() => {
    if (!rideData.started || rideData.paused) return;
    if (document.visibilityState !== "visible") return;

    const now = Date.now();
    const diff = now - lastGpsTime;

    if (lastGpsTime > 0 && diff > 10000) {
      console.log("GPS 수신 지연 → watch 재시작");
      stopWatching();

      setTimeout(() => {
        startWatching();
        requestLocationPermission();
      }, 1000);

      lastGpsTime = now;
    }
  }, 3000);
}

function applySelectedCourseIfExists() {
  try {
    const raw = localStorage.getItem(SELECTED_COURSE_KEY);
    if (!raw) return;

    const course = JSON.parse(raw);
    if (!course || !Array.isArray(course.points) || !course.points.length) return;

    navigationState.routePath = course.points.slice();
    navigationState.courseMode = true;
    navigationState.courseName = course.name || "내 코스";

    saveNavigationState();
    localStorage.removeItem(SELECTED_COURSE_KEY);
  } catch (e) {
    console.error("선택 코스 적용 실패:", e);
  }
}

async function init() {
  formatClock();

  let tries = 0;
  while (!ensureKakaoLoaded() && tries < 30) {
    await new Promise(resolve => setTimeout(resolve, 200));
    tries++;
  }

  if (!ensureKakaoLoaded()) {
    alert("카카오맵 SDK 로드 실패.");
    return;
  }

  if (!rideData.started && rideData.path && rideData.path.length > 0) {
    rideData.path = [];
    rideData.totalDistanceM = 0;
    rideData.startPoint = null;
    rideData.lastPoint = null;
    rideData.currentSpeedKmh = 0;
    rideData.maxSpeedKmh = 0;
    saveRideData();
  }

  initKakaoMap();
  applySelectedCourseIfExists();
  redrawPath();
  updateStats();
  requestLocationPermission();
  startGpsReconnectMonitor();

  await ensureAuth();

 if (groupEnabled && currentRoomId) {
  await ensureGroupMember();
  subscribeGroupData();
  startGroupWatching();
}

  if (rideData.started && !rideData.paused) {
    startWatching();
    await requestWakeLockSafe();
    startWakeLockKeeper();
  }
}

window.addEventListener("load", init);

window.addEventListener("resize", () => {
  if (!map || !ensureKakaoLoaded()) return;
  setTimeout(() => { map.relayout(); }, 100);
});

window.addEventListener("pageshow", () => {
  if (!map || !ensureKakaoLoaded()) return;
  setTimeout(() => {
    map.relayout();
    redrawPath();
  }, 150);
});

setInterval(updateStats, 1000);
setInterval(formatClock, 60000);
</script>
