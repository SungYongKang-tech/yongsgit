<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>🏓 탁구 경기 입력 · 순위</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08); --card:#fff;
}
*{ box-sizing:border-box; }
body{
  margin:0;
  font-family:"Pretendard","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink); font-weight:600;
}
header{
  background:#fff; border-bottom:1px solid #e5e7eb;
  text-align:center; padding:14px 10px; position:sticky; top:0; z-index:10;
}
h1{ margin:4px 0 10px; color:var(--accent); font-size:clamp(18px,4vw,24px); font-weight:700; }
.row{ display:flex; justify-content:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.btn{
  border:1px solid #d1d5db; border-radius:8px; padding:8px 11px;
  font-size:14px; background:#fff; cursor:pointer; font-weight:700; transition:.15s;
}
.btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
.btn.ok{ background:#0d9488; color:#fff; border-color:#0d9488; }
.btn.danger{ background:var(--danger); color:#fff; border-color:var(--danger); }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
main{ max-width:900px; margin:0 auto; padding:12px 10px 70px; }
.card{ background:var(--card); border-radius:12px; box-shadow:var(--shadow); padding:18px 20px; margin-bottom:16px; }
.card h2, .card h3{ margin:0 0 12px; color:var(--accent); }
.grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.field{ display:flex; flex-direction:column; gap:6px; }
label{ font-size:13px; color:#475569; }
select,input{
  width:100%; border:1px solid #d1d5db; border-radius:10px;
  padding:11px 10px; background:#fff; font-size:15px; font-weight:700; color:var(--ink);
}
.notice{
  padding:10px 12px; border-radius:12px; background:#fff7ed; color:#9a3412;
  border:1px solid #fed7aa; font-size:14px; line-height:1.5; margin-bottom:14px; display:none;
}
.tileGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(105px,1fr)); gap:8px; }
.playerTile{
  border:1px solid #dbe3ef; background:#fff; border-radius:14px; padding:12px 8px;
  min-height:64px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.04);
  cursor:pointer; font-weight:800; color:#0f172a;
}
.playerTile small{ display:block; margin-top:4px; color:#64748b; font-weight:700; }
.playerTile.selectedWin{ background:#fee2e2; border-color:#fca5a5; color:#b91c1c; }
.playerTile.selectedLose{ background:#dbeafe; border-color:#93c5fd; color:#1d4ed8; }
.pickGrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0; }
.pickBox{ border:1px solid #e2e8f0; border-radius:12px; padding:12px; background:#f8fafc; min-height:92px; }
.pickBox.winBox{ background:#fff1f2; border-color:#fecdd3; }
.pickBox.loseBox{ background:#eff6ff; border-color:#bfdbfe; }
.pickTitle{ display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:8px; font-weight:900; }
.pickNames{ display:flex; flex-wrap:wrap; gap:6px; }
.namePill{ border-radius:999px; background:#fff; border:1px solid #e2e8f0; padding:7px 9px; font-size:14px; font-weight:900; }
.winText{ color:#dc2626; } .loseText{ color:#2563eb; }
.summary{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:16px; }
.statCard{ background:#e8f0ff; border-radius:12px; padding:14px; text-align:center; font-weight:800; }
.statCard span{ display:block; color:var(--muted); font-size:13px; margin-bottom:4px; }
table{ width:100%; border-collapse:collapse; background:var(--card); box-shadow:var(--shadow); border-radius:12px; overflow:hidden; font-size:15px; }
thead th{ background:#f1f5f9; border-bottom:1px solid #e2e8f0; padding:10px 6px; text-align:center; color:#334155; font-weight:800; white-space:nowrap; }
tbody td{ border-bottom:1px solid #f1f5f9; padding:10px 6px; text-align:center; }
tbody tr:hover{ background:#f9fafb; }
.win{ color:#dc2626; font-weight:800; } .lose{ color:#2563eb; font-weight:800; }
.empty{ text-align:center; color:var(--muted); padding:20px; background:#fff; border-radius:12px; box-shadow:var(--shadow); }
#logs{ margin-top:18px; background:#fff; border-radius:12px; box-shadow:var(--shadow); padding:12px; }
.log-item{ border-bottom:1px solid #e5e7eb; padding:10px 36px 10px 4px; position:relative; }
.log-item:last-child{ border-bottom:none; }
.log-time{ display:block; font-size:14px; color:#334155; margin-bottom:4px; font-weight:800; }
.log-match{ font-size:15px; font-weight:800; line-height:1.45; }
.log-win{ color:#dc2626; font-weight:900; }
.delete-btn{ position:absolute; right:6px; top:8px; border:0; background:transparent; color:#94a3b8; cursor:pointer; font-size:16px; }
.delete-btn:hover{ color:#ef4444; }
.adminPanel{ display:none; }
.playerList{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:8px; margin-top:12px; }
.playerChip{ display:flex; justify-content:space-between; align-items:center; gap:8px; border:1px solid #e2e8f0; border-radius:10px; padding:9px 10px; background:#f8fafc; }
.playerChip button{ border:0; background:transparent; color:var(--danger); font-weight:900; cursor:pointer; }
.small{ font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.45; }
@media(max-width:640px){
  main{ padding:10px 8px 60px; } .card{ padding:14px 12px; }
  .grid,.pickGrid{ grid-template-columns:1fr; } table{ font-size:13px; }
  thead th, tbody td{ padding:8px 2px; } .tileGrid{ grid-template-columns:repeat(auto-fill,minmax(86px,1fr)); }
}


/* =========================
   📱 휴대폰 현장 입력 최적화
========================= */
html{ -webkit-text-size-adjust:100%; }
body{ padding-bottom:92px; }
header{
  padding:10px 10px 8px;
  box-shadow:0 3px 14px rgba(15,23,42,.06);
}
h1{
  font-size:19px;
  margin:2px 0 8px;
  line-height:1.25;
}
.row{
  gap:6px;
  margin-bottom:6px;
}
.btn{
  min-height:42px;
  border-radius:12px;
  padding:9px 12px;
  font-size:15px;
}
main{
  max-width:520px;
  padding:10px 10px 105px;
}
.card{
  border-radius:18px;
  padding:14px 12px;
  margin-bottom:12px;
}
.card h2{
  font-size:19px;
  margin-bottom:10px;
}
.card h3{
  font-size:17px;
}
input, select{
  min-height:48px;
  font-size:16px;
  border-radius:14px;
}
.pickGrid{
  grid-template-columns:1fr;
  gap:8px;
  margin:10px 0;
}
.pickBox{
  min-height:auto;
  border-radius:16px;
  padding:10px;
}
.pickTitle{
  margin-bottom:6px;
  font-size:15px;
}
.namePill{
  padding:8px 10px;
  font-size:15px;
}
.tileGrid{
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:9px;
}
.playerTile{
  min-height:72px;
  border-radius:18px;
  padding:12px 6px;
  font-size:18px;
  line-height:1.2;
  touch-action:manipulation;
}
.playerTile small{
  font-size:13px;
  margin-top:6px;
}
.playerTile.selectedLose{
  background:#fff7ed;
  border-color:#fb923c;
  color:#9a3412;
  box-shadow:0 0 0 2px rgba(251,146,60,.25) inset;
}
.playerTile.selectedWin{
  background:#fee2e2;
  border-color:#ef4444;
  color:#b91c1c;
  box-shadow:0 0 0 3px rgba(239,68,68,.28) inset;
}
#saveMatchBtn{
  position:fixed;
  left:12px;
  right:12px;
  bottom:14px;
  z-index:50;
  width:calc(100% - 24px);
  max-width:496px;
  margin:auto;
  min-height:58px;
  border-radius:18px;
  font-size:19px;
  box-shadow:0 10px 26px rgba(37,99,235,.35);
}
#clearSelected{
  min-height:34px;
  padding:6px 9px;
  font-size:13px;
}
.summary{
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.statCard{
  border-radius:16px;
  padding:12px 8px;
  font-size:15px;
}
table{
  font-size:13px;
  border-radius:16px;
}
thead th, tbody td{
  padding:8px 3px;
}
#logs{
  border-radius:16px;
  padding:8px 10px;
}
.log-item{
  padding:10px 34px 10px 2px;
}
.log-time{
  font-size:13px;
}
.log-match{
  font-size:15px;
}
.delete-btn{
  font-size:18px;
  top:10px;
}
.playerList{
  grid-template-columns:1fr;
}
.playerChip{
  border-radius:14px;
  padding:12px;
  font-size:16px;
}
.notice{
  position:fixed;
  left:12px;
  right:12px;
  bottom:82px;
  z-index:60;
  margin:0 auto;
  max-width:496px;
  text-align:center;
  box-shadow:0 10px 24px rgba(0,0,0,.15);
}
.mobileHint{
  position:sticky;
  top:76px;
  z-index:8;
  background:#eff6ff;
  color:#1e40af;
  border:1px solid #bfdbfe;
  border-radius:16px;
  padding:10px 12px;
  margin-bottom:10px;
  font-size:14px;
  line-height:1.45;
  text-align:center;
}
@media(max-width:380px){
  .playerTile{ font-size:16px; min-height:66px; }
  .btn{ font-size:14px; padding:8px 9px; }
  .summary{ grid-template-columns:1fr 1fr; }
}

</style>
</head>
<body>
<header>
  <h1 id="pageHeader">🏓 탁구 경기 입력 · 순위</h1>
  <div class="row">
    <button id="showMainBtn" class="btn primary">경기입력</button>
    <button id="adminBtn" class="btn">⚙ 관리자모드</button>
    <a href="Report.html" class="btn ok">Report 보기</a>
  </div>
</header>

<main>
  <div id="notice" class="notice"></div>

  <section id="mainPanel">
    <div class="mobileHint">선수 2명 또는 4명을 먼저 누르고, 선택된 선수 중 승자를 다시 누른 뒤 아래 <b>승패 저장</b>을 누르세요.</div>
    <div class="card">
      <h2>경기 입력</h2>
      <div class="field">
        <label>메모</label>
        <input id="memo" placeholder="선택사항" />
      </div>

      <div class="pickGrid">
        <div class="pickBox">
          <div class="pickTitle">
            <span>선택 선수 <small id="autoTypeText" style="color:#64748b;">0명</small></span>
            <button id="clearSelected" class="btn">전체 비우기</button>
          </div>
          <div id="selectedNames" class="pickNames"></div>
        </div>
        <div class="pickBox winBox">
          <div class="pickTitle"><span class="winText">승자 선택</span></div>
          <div id="winnerNames" class="pickNames"></div>
        </div>
      </div>

      <div class="row" style="justify-content:flex-start;">
        <button id="saveMatchBtn" class="btn primary">승패 저장</button>
      </div>

      <h3 style="margin-top:14px;color:#334155;">선수 타일</h3>
      <div id="playerTiles" class="tileGrid"></div>
      <p class="small">휴대폰에서 바로 입력하기 좋게 2열 타일로 표시됩니다. 2명 선택은 단식, 4명 선택은 복식입니다. 선택된 선수 중 승자를 다시 누르면 빨간색으로 표시됩니다.</p>
    </div>

    <div id="summary" class="summary"></div>

    <h2 style="text-align:center;font-size:22px;color:#1e3a8a;margin:20px 0 14px;font-weight:800;">🏆 통합 순위</h2>
    <div id="rankingWrap"></div>

    <h2 style="text-align:center;font-size:22px;color:#1e3a8a;margin:24px 0 14px;font-weight:800;">📝 최근 경기</h2>
    <div id="logs"></div>
  </section>

  <section id="adminPanel" class="adminPanel">
    <div class="card">
      <h2>관리자 선수입력</h2>
      <div class="grid">
        <div class="field"><label>선수 이름</label><input id="playerName" placeholder="예: 강성용" /></div>
        <div class="field"><label>부수</label><input id="playerBu" type="number" placeholder="예: 5" /></div>
      </div>
      <div class="row" style="justify-content:flex-start;margin-top:12px;">
        <button id="addPlayerBtn" class="btn primary">선수 추가</button>
        <button id="closeAdminBtn" class="btn">닫기</button>
      </div>
      <p class="small">여기서 입력한 선수들이 경기입력 화면에 타일로 표시됩니다.</p>
      <div id="playerList" class="playerList"></div>
    </div>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, get, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0prJtmZ25JTLsG9R9JRCapCtOqH2PGaA",
  authDomain: "pingpongfriend-19295.firebaseapp.com",
  databaseURL: "https://pingpongfriend-19295-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pingpongfriend-19295",
  storageBucket: "pingpongfriend-19295.firebasestorage.app",
  messagingSenderId: "201223495919",
  appId: "1:201223495919:web:b8f20c2cfec45043d8fb1a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const membersRef = ref(db, "members");
const matchesRef = ref(db, "matches");
const titleRef = ref(db, "config/title");

let players = {};
let matches = {};
let isAdmin = false;
let selectedNames = [];
let winnerNames = [];

const $ = (id) => document.getElementById(id);
function escapeHtml(str){ return String(str ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function pad2(n){ return String(n).padStart(2,"0"); }
function getKSTDate(date = new Date()){ return new Date(date.toLocaleString("en-US", { timeZone:"Asia/Seoul" })); }
function todayKey(){ const d=getKSTDate(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function monthKey(){ const d=getKSTDate(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function safeNameKey(name){ return String(name).trim().replace(/[.#$[\]/]/g,"_"); }
function formatRate(n){ return `${(Math.round(n*10)/10).toFixed(1)}%`; }
function playerArray(){
  return Object.entries(players || {})
    .map(([id,p]) => ({ id, name:p?.name || "", bu:Number(p?.bu ?? 99), active:p?.active !== false }))
    .filter(p => p.name && p.active)
    .sort((a,b) => a.bu - b.bu || a.name.localeCompare(b.name,"ko"));
}
function showNotice(msg){ const box=$("notice"); box.style.display="block"; box.textContent=msg; setTimeout(()=>{ box.style.display="none"; },2500); }

async function loadTitle(){
  const snap = await get(titleRef);
  const title = snap.exists() ? snap.val() : "우리회사";
  $("pageHeader").textContent = `🏓 ${title} 탁구 경기 입력 · 순위`;
}
loadTitle();

function getAutoType(){
  if (selectedNames.length === 2) return "single";
  if (selectedNames.length === 4) return "double";
  return "";
}
function requiredWinnerCount(){
  const type = getAutoType();
  if (type === "single") return 1;
  if (type === "double") return 2;
  return 0;
}
function togglePlayer(name){
  // 이미 선택된 선수는, 2명 또는 4명이 채워진 뒤에는 승자 표시로 동작
  if (selectedNames.includes(name)) {
    if (selectedNames.length === 2 || selectedNames.length === 4) {
      toggleWinner(name);
      return;
    }
    selectedNames = selectedNames.filter(x => x !== name);
    winnerNames = winnerNames.filter(x => x !== name);
  } else {
    if (selectedNames.length >= 4) return alert("선수는 최대 4명까지 선택할 수 있습니다. 전체 비우기 후 다시 선택하세요.");
    selectedNames.push(name);
    // 단식에서 복식으로 인원이 바뀌거나 선수 구성이 바뀌면 승자 선택은 초기화
    winnerNames = winnerNames.filter(x => selectedNames.includes(x));
  }
  renderPicked();
  renderTiles();
}
function toggleWinner(name){
  if (!selectedNames.includes(name)) return;
  const need = requiredWinnerCount();
  if (!need) return alert("먼저 선수를 2명 또는 4명 선택하세요.");

  if (winnerNames.includes(name)) {
    winnerNames = winnerNames.filter(x => x !== name);
  } else {
    if (winnerNames.length >= need) return alert(`승자는 ${need}명만 선택합니다.`);
    winnerNames.push(name);
  }
  renderPicked();
  renderTiles();
}
function renderPicked(){
  const type = getAutoType();
  const typeText = type === "single" ? "단식 자동" : type === "double" ? "복식 자동" : `${selectedNames.length}명`;
  $("autoTypeText").textContent = typeText;

  $("selectedNames").innerHTML = selectedNames.length
    ? selectedNames.map(n => `<button type="button" class="namePill ${winnerNames.includes(n) ? "winText" : ""}" data-winner="${escapeHtml(n)}">${escapeHtml(n)}${winnerNames.includes(n) ? " 승" : ""}</button>`).join("")
    : `<span class="small">선수 타일에서 경기자를 선택하세요.</span>`;

  $("winnerNames").innerHTML = winnerNames.length
    ? winnerNames.map(n => `<span class="namePill winText">${escapeHtml(n)}</span>`).join("")
    : `<span class="small">선택 선수 중 승자를 누르세요.</span>`;

  const need = requiredWinnerCount();
  const saveBtn = $("saveMatchBtn");
  if (!type) saveBtn.textContent = "선수 2명 또는 4명 선택";
  else if (winnerNames.length !== need) saveBtn.textContent = `${type === "double" ? "복식" : "단식"} 승자 ${need}명 선택`;
  else saveBtn.textContent = `${type === "double" ? "복식" : "단식"} 승패 저장`;

  document.querySelectorAll("[data-winner]").forEach(btn => {
    btn.addEventListener("click", () => toggleWinner(btn.dataset.winner));
  });
}
function renderTiles(){
  const arr = playerArray();
  if (!arr.length) {
    $("playerTiles").innerHTML = `<div class="empty" style="grid-column:1/-1;">관리자모드에서 선수를 먼저 입력하세요.</div>`;
    return;
  }
  $("playerTiles").innerHTML = arr.map(p => {
    const cls = winnerNames.includes(p.name) ? "selectedWin" : selectedNames.includes(p.name) ? "selectedLose" : "";
    const mark = winnerNames.includes(p.name) ? "🏆 승자" : selectedNames.includes(p.name) ? "✅ 경기자" : `${p.bu}부`;
    return `<button class="playerTile ${cls}" data-name="${escapeHtml(p.name)}">${escapeHtml(p.name)}<small>${mark}</small></button>`;
  }).join("");
  document.querySelectorAll(".playerTile").forEach(btn => {
    btn.addEventListener("click", () => togglePlayer(btn.dataset.name));
  });
}

$("clearSelected").addEventListener("click", () => { selectedNames=[]; winnerNames=[]; renderPicked(); renderTiles(); });
renderPicked();

function validateMatch(){
  const type = getAutoType();
  if (!type) return "선수는 2명 또는 4명만 선택해야 합니다. 2명은 단식, 4명은 복식입니다.";
  const need = requiredWinnerCount();
  if (winnerNames.length !== need) return `${type === "double" ? "복식" : "단식"}은 승자 ${need}명을 선택해야 합니다.`;
  if (!winnerNames.every(n => selectedNames.includes(n))) return "승자는 선택된 선수 안에서만 고를 수 있습니다.";
  return "";
}
async function saveMatch(){
  const err = validateMatch();
  if (err) return alert(err);
  const type = getAutoType();
  const loserNames = selectedNames.filter(n => !winnerNames.includes(n));
  const now = Date.now();
  const item = {
    type,
    mode:type,
    winnerNames:[...winnerNames],
    loserNames:[...loserNames],
    namesA:[...winnerNames],       // Report.html 호환용: A팀 = 승리 선수
    namesB:[...loserNames],        // Report.html 호환용: B팀 = 패배 선수
    winnerSide:"A",               // Report.html에서 승률 계산되도록 고정
    loserSide:"B",
    memo:$("memo").value.trim(),
    dateKey:todayKey(),
    monthKey:monthKey(),
    createdAt:now
  };
  await set(push(matchesRef), item);
  selectedNames=[]; winnerNames=[]; $("memo").value=""; renderPicked(); renderTiles();
  showNotice(`${type === "double" ? "복식" : "단식"} 승패가 저장되었습니다. Report.html에도 승률이 반영됩니다.`);
}
$("saveMatchBtn").addEventListener("click", saveMatch);

function buildStats(){
  const stats = {};
  Object.values(players || {}).forEach(p => {
    if (!p?.name) return;
    stats[p.name] = { name:p.name, bu:Number(p.bu ?? 99), total:0, win:0, lose:0, singleTotal:0, singleWin:0, singleLose:0, doubleTotal:0, doubleWin:0, doubleLose:0 };
  });
  Object.values(matches || {}).forEach(m => {
    const type = m.type === "double" ? "double" : "single";
    const winNames = Array.isArray(m.winnerNames) ? m.winnerNames : (m.winnerSide === "A" ? (m.namesA || []) : (m.namesB || []));
    const loseNames = Array.isArray(m.loserNames) ? m.loserNames : (m.winnerSide === "A" ? (m.namesB || []) : (m.namesA || []));
    [...winNames, ...loseNames].forEach(name => {
      if (!stats[name]) stats[name] = { name, bu:99, total:0, win:0, lose:0, singleTotal:0, singleWin:0, singleLose:0, doubleTotal:0, doubleWin:0, doubleLose:0 };
    });
    winNames.forEach(name => { stats[name].total++; stats[name].win++; if (type === "double") { stats[name].doubleTotal++; stats[name].doubleWin++; } else { stats[name].singleTotal++; stats[name].singleWin++; } });
    loseNames.forEach(name => { stats[name].total++; stats[name].lose++; if (type === "double") { stats[name].doubleTotal++; stats[name].doubleLose++; } else { stats[name].singleTotal++; stats[name].singleLose++; } });
  });
  return Object.values(stats).map(p => ({ ...p, rate:p.total ? p.win / p.total * 100 : 0 }))
    .sort((a,b) => b.rate - a.rate || b.win - a.win || b.total - a.total || a.bu - b.bu || a.name.localeCompare(b.name,"ko"));
}
function renderSummary(arr){
  const played = arr.filter(p => p.total > 0);
  const totalMatches = Object.keys(matches || {}).length;
  const top = played[0];
  const topWin = played.slice().sort((a,b) => b.win - a.win || b.rate - a.rate)[0];
  $("summary").innerHTML = `
    <div class="statCard"><span>총 경기</span>${totalMatches}경기</div>
    <div class="statCard"><span>참여 선수</span>${played.length}명</div>
    <div class="statCard"><span>현재 1위</span>${top ? `${escapeHtml(top.name)} ${formatRate(top.rate)}` : "-"}</div>
    <div class="statCard"><span>다승 1위</span>${topWin ? `${escapeHtml(topWin.name)} ${topWin.win}승` : "-"}</div>`;
}
function renderRanking(){
  const arr = buildStats();
  renderSummary(arr);
  const played = arr.filter(p => p.total > 0);
  if (!played.length) { $("rankingWrap").innerHTML = `<div class="empty">아직 입력된 경기 결과가 없습니다.</div>`; return; }
  const rows = played.map((p,i) => `
    <tr ${i === 0 ? 'style="background:#e0f2fe;"' : ""}>
      <td>${i+1}</td><td>${escapeHtml(p.name)}(${p.bu})</td><td>${p.total}</td>
      <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
      <td>${formatRate(p.rate)}</td><td>${p.singleTotal ? `${p.singleWin}/${p.singleLose}` : "-"}</td><td>${p.doubleTotal ? `${p.doubleWin}/${p.doubleLose}` : "-"}</td>
    </tr>`).join("");
  $("rankingWrap").innerHTML = `<table><thead><tr><th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th><th>승률</th><th>단식</th><th>복식</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function renderPlayerList(){
  const arr = playerArray();
  if (!arr.length) { $("playerList").innerHTML = `<div class="empty">등록된 선수가 없습니다.</div>`; return; }
  $("playerList").innerHTML = arr.map(p => `<div class="playerChip"><span>${escapeHtml(p.name)}(${p.bu})</span><button data-id="${p.id}" title="삭제">삭제</button></div>`).join("");
  document.querySelectorAll(".playerChip button").forEach(btn => btn.addEventListener("click", async () => {
    if (!confirm("이 선수를 목록에서 삭제할까요?")) return;
    await remove(ref(db, `members/${btn.dataset.id}`)); showNotice("선수가 삭제되었습니다.");
  }));
}

function renderLogs(){
  const logs = $("logs");
  if (!logs) return;
  const arr = Object.entries(matches || {})
    .map(([id,m]) => ({ id, ...m }))
    .sort((a,b) => Number(b.createdAt || 0) - Number(a.createdAt || 0))
    .slice(0, 20);

  if (!arr.length) {
    logs.innerHTML = `<div style="text-align:center;color:#999;padding:8px;">최근 경기 없음</div>`;
    return;
  }

  logs.innerHTML = arr.map(m => {
    const d = new Date(Number(m.createdAt || Date.now()));
    const kst = getKSTDate(d);
    const time = `${kst.getFullYear()}-${pad2(kst.getMonth()+1)}-${pad2(kst.getDate())} ${pad2(kst.getHours())}:${pad2(kst.getMinutes())}`;
    const modeText = (m.mode || m.type) === "double" ? "복식" : "단식";
    const winners = Array.isArray(m.winnerNames) ? m.winnerNames : (m.winnerSide === "A" ? (m.namesA || []) : (m.namesB || []));
    const losers = Array.isArray(m.loserNames) ? m.loserNames : (m.winnerSide === "A" ? (m.namesB || []) : (m.namesA || []));
    return `
      <div class="log-item">
        <span class="log-time">${time} [${modeText}]</span>
        <div class="log-match"><span class="log-win">${winners.map(escapeHtml).join("/")} 승</span> vs ${losers.map(escapeHtml).join("/")}</div>
        <button class="delete-btn" data-del="${escapeHtml(m.id)}" title="삭제">🗑️</button>
      </div>`;
  }).join("");

  document.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", async () => {
    const snap = await get(ref(db,"config/deletePassword"));
    const saved = snap.exists() ? String(snap.val()).trim() : "1234";
    const input = prompt("삭제 비밀번호를 입력하세요.");
    if (input === null) return;
    if (String(input).trim() !== saved) return alert("비밀번호가 올바르지 않습니다.");
    if (!confirm("이 경기결과를 삭제할까요?")) return;
    await remove(ref(db, `matches/${btn.dataset.del}`));
    showNotice("경기결과가 삭제되었습니다.");
  }));
}

onValue(membersRef, snap => { players = snap.val() || {}; renderPlayerList(); renderTiles(); renderRanking(); renderLogs(); });
onValue(matchesRef, snap => { matches = snap.val() || {}; renderRanking(); renderLogs(); });

async function openAdmin(){
  if (!isAdmin) {
    const snap = await get(ref(db,"config/adminPassword"));
    const saved = snap.exists() ? String(snap.val()) : "1234";
    const input = prompt("관리자 비밀번호를 입력하세요.");
    if (!input) return;
    if (input !== saved) return alert("비밀번호가 올바르지 않습니다.");
    isAdmin = true;
  }
  $("mainPanel").style.display="none"; $("adminPanel").style.display="block";
}
function closeAdmin(){ $("adminPanel").style.display="none"; $("mainPanel").style.display="block"; }
$("adminBtn").addEventListener("click", openAdmin);
$("showMainBtn").addEventListener("click", closeAdmin);
$("closeAdminBtn").addEventListener("click", closeAdmin);
$("addPlayerBtn").addEventListener("click", async () => {
  const name = $("playerName").value.trim();
  const bu = Number($("playerBu").value || 99);
  if (!name) return alert("선수 이름을 입력하세요.");
  if (playerArray().some(p => p.name === name)) return alert("이미 등록된 선수입니다.");
  await set(ref(db, `members/${safeNameKey(name)}`), { name, bu:Number.isFinite(bu) ? bu : 99, active:true, createdAt:Date.now() });
  $("playerName").value=""; $("playerBu").value=""; showNotice("선수가 추가되었습니다.");
});
</script>
