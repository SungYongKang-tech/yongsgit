<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>🏓 탁구 경기 입력</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb; --card:#fff;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08);
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-weight:600;}
header{background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10;text-align:center;padding:10px 8px;}
h1{margin:2px 0 8px;color:var(--accent);font-size:clamp(18px,4vw,23px);font-weight:700;}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;}
.btn{border:1px solid #ccc;border-radius:8px;padding:6px 10px;font-size:14px;cursor:pointer;background:#fff;font-weight:700;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.ok{background:var(--ok);color:#fff;border-color:var(--ok);}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger);}
main{max-width:960px;margin:0 auto;padding:10px 8px 50px;}
.card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:8px;margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:4px;}

.chip{
    border:1px solid #ccc;
    border-radius:10px;
    padding:9px 10px;
    min-height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    background:#fff;
    color:#111;
    cursor:pointer;
    font-weight:700;
    line-height:1.2;
    touch-action:manipulation;
}

.chip.selected{border:1px solid var(--accent)!important;background:#efef07!important;color:#111!important;}
.matchBox{margin:6px 0 4px;text-align:center;font-size:18px;font-weight:800;line-height:1.3;min-height:22px;color:#111;}
.sidePick{display:flex;gap:6px;justify-content:center;margin:4px 0 2px;}
.sideBtn{display:none;flex:1;max-width:320px;border:0;border-radius:12px;padding:10px 8px;font-size:17px;font-weight:900;cursor:pointer;color:#fff;box-shadow:0 5px 16px rgba(0,0,0,.12);}
.sideBtn.left{background:#2563eb;}
.sideBtn.right{background:#ef4444;}
.subActions{display:flex;justify-content:center;gap:6px;margin-top:3px;}
.notice{position:fixed;left:12px;right:12px;bottom:18px;z-index:60;display:none;max-width:520px;margin:0 auto;padding:10px 12px;border-radius:12px;background:#111827;color:#fff;font-size:14px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.2);}

h2{font-size:18px;text-align:center;color:#1e3a8a;margin:18px 0 10px;font-weight:800;}

.empty{text-align:center;color:var(--muted);padding:16px;background:#fff;border-radius:12px;box-shadow:var(--shadow);}
#logs{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:8px 10px;}
.log-item{border-bottom:1px solid #e5e7eb;padding:9px 34px 9px 2px;position:relative;}
.log-item:last-child{border-bottom:none;}
.log-time{display:block;font-size:13px;color:#334155;margin-bottom:4px;font-weight:800;}
.log-match{font-size:15px;font-weight:800;line-height:1.45;}
.log-win{color:#dc2626;font-weight:900;}
.delete-btn{position:absolute;right:6px;top:8px;border:0;background:transparent;color:#94a3b8;cursor:pointer;font-size:17px;}
.adminPanel{display:none;}
.grid{display:grid;grid-template-columns:1fr 90px;gap:8px;}
input{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:9px 10px;background:#fff;font-size:15px;font-weight:700;color:var(--ink);}
.adminActions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.adminActions .btn{flex:1;min-width:90px;}
.playerList{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-start;margin-top:12px;}

.playerChip{
    border:1px solid #cbd5e1;
    border-radius:10px;
    padding:8px 12px;      /* 위아래 여백 */
    min-height:42px;       /* 최소 높이 */
    display:flex;
    align-items:center;    /* 세로 가운데 */
    justify-content:center;
    background:#fff;
    color:#111;
    font-size:15px;
    font-weight:800;
    line-height:1.3;
    cursor:pointer;
    touch-action:manipulation;
}

.playerChip.selected{background:#efef07!important;color:#111!important;border-color:#2563eb!important;outline:2px solid #2563eb;}
.resetBox{margin-top:14px;padding-top:12px;border-top:1px dashed #cbd5e1;}
.resetBox p{margin:0 0 8px;color:#64748b;font-size:13px;font-weight:700;line-height:1.4;}

.chip.bu1{background:#dc2626;color:#fff;border-color:#dc2626;}
.chip.bu2{background:#dc2626;color:#fff;border-color:#dc2626;}
.chip.bu3{background:#dc2626;color:#fff;border-color:#dc2626;}
.chip.bu4{background:#f97316;color:#fff;border-color:#f97316;}
.chip.bu5{background:#facc15;color:#111;border-color:#eab308;}
.chip.bu6{background:#22c55e;color:#fff;border-color:#16a34a;}
.chip.bu7{background:#06b6d4;color:#fff;border-color:#0891b2;}
.chip.bu8{background:#3b82f6;color:#fff;border-color:#2563eb;}
.chip.bu9{background:#6366f1;color:#fff;border-color:#4f46e5;}
.chip.bu10{background:#8b5cf6;color:#fff;border-color:#7c3aed;}
.chip.bu11{background:#ec4899;color:#fff;border-color:#db2777;}
.chip.bu12{background:#94a3b8;color:#fff;border-color:#64748b;}

@media(max-width:380px){.chip{font-size:15px;min-width:45px;padding:3px 4px;}.btn{font-size:12.5px;padding:5px 7px;}.sideBtn{font-size:15px;}}
</style>
</head>
<body>
<header>
  <h1 id="pageHeader">🏓 탁구 경기 입력</h1>
  <div class="row">
    <button id="showMainBtn" class="btn primary">경기입력</button>
    <button id="adminBtn" class="btn">⚙ 관리자</button>
    <a href="Report.html" class="btn ok">Report</a>
  </div>
</header>
<main>
  <div id="notice" class="notice"></div>

  <section id="mainPanel">
    <div class="card">
      <div id="playerTiles" class="chips"></div>
      <div id="matchDisplay" class="matchBox"></div>
      <div class="sidePick">
        <button id="leftWinBtn" class="sideBtn left"></button>
        <button id="rightWinBtn" class="sideBtn right"></button>
      </div>
      <div class="subActions">
        <button id="clearSelected" class="btn">비우기</button>
      </div>
    </div>

      <h2>📝 최근 경기</h2>
    <div id="logs"></div>
  </section>

  <section id="adminPanel" class="adminPanel">
    <div class="card">
      <h2>관리자 선수입력</h2>
      <div class="grid">
        <input id="playerName" placeholder="선수 이름" />
        <input id="playerBu" type="number" placeholder="부수" />
      </div>
      <div class="adminActions">
        <button id="addPlayerBtn" class="btn primary">추가</button>
        <button id="deleteSelectedPlayerBtn" class="btn danger">선택삭제</button>
        <button id="closeAdminBtn" class="btn">닫기</button>
      </div>
      <div id="playerList" class="playerList"></div>

      <div class="resetBox">
        <p>경기리셋은 경기 기록만 삭제합니다. 전체리셋은 선수와 경기 기록을 모두 삭제합니다.</p>
        <div class="adminActions">
          <button id="resetMatchesBtn" class="btn danger">경기리셋</button>
          <button id="resetAllBtn" class="btn danger">전체리셋</button>
        </div>
      </div>
    </div>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, get, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0prJtmZ25JTLsG9R9JRCapCtOqH2PGaA",
  authDomain: "pingpongfriend-19295.firebaseapp.com",
  databaseURL: "https://pingpongfriend-19295-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pingpongfriend-19295",
  storageBucket: "pingpongfriend-19295.firebasestorage.app",
  messagingSenderId: "201223495919",
  appId: "1:201223495919:web:b8f20c2cfec45043d8fb1a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const membersRef = ref(db, "members");
const matchesRef = ref(db, "matches");
const titleRef = ref(db, "config/title");

let players = {};
let matches = {};
let isAdmin = false;
let selectedNames = [];
let selectedAdminPlayerId = null;

const $ = (id) => document.getElementById(id);
function escapeHtml(str){ return String(str ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function pad2(n){ return String(n).padStart(2,"0"); }
function getKSTDate(date = new Date()){ return new Date(date.toLocaleString("en-US", { timeZone:"Asia/Seoul" })); }
function todayKey(){ const d=getKSTDate(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function monthKey(){ const d=getKSTDate(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function safeNameKey(name){ return String(name).trim().replace(/[.#$[\]/]/g,"_"); }
function formatRate(n){ return `${(Math.round(n*10)/10).toFixed(1)}%`; }
function showNotice(msg){ const box=$("notice"); box.style.display="block"; box.textContent=msg; setTimeout(()=>{ box.style.display="none"; },1800); }
function playerArray(){
  return Object.entries(players || {})
    .map(([id,p]) => ({ id, name:p?.name || "", bu:Number(p?.bu ?? 99), active:p?.active !== false }))
    .filter(p => p.name && p.active)
    .sort((a,b) => a.bu - b.bu || a.name.localeCompare(b.name,"ko"));
}

async function loadTitle(){
  const snap = await get(titleRef);
  const title = snap.exists() ? snap.val() : "탁구 친선";
  $("pageHeader").textContent = `🏓 ${title} 경기 입력`;
}
loadTitle();

function getMode(){
  if (selectedNames.length === 2) return "single";
  if (selectedNames.length === 4) return "double";
  return "";
}
function getSides(){
  if (selectedNames.length === 2) return { left:[selectedNames[0]], right:[selectedNames[1]] };
  if (selectedNames.length === 4) return { left:selectedNames.slice(0,2), right:selectedNames.slice(2,4) };
  return { left:[], right:[] };
}
function togglePlayer(name){
  const idx = selectedNames.indexOf(name);
  if (idx >= 0) selectedNames.splice(idx, 1);
  else {
    if (selectedNames.length >= 4) return showNotice("최대 4명까지 선택");
    selectedNames.push(name);
  }
  renderTiles();
  renderMatchDisplay();
}
function renderTiles(){
  const arr = playerArray();
  if (!arr.length) {
    $("playerTiles").innerHTML = `<div class="empty" style="width:100%;">관리자에서 선수를 입력하세요.</div>`;
    return;
  }
  $("playerTiles").innerHTML = arr.map(p => {
    const selected = selectedNames.includes(p.name) ? "selected" : "";
const bu = Math.min(p.bu, 12);
const buClass = `bu${bu}`;

return `
<button
    class="chip ${buClass} ${selected}"
    data-name="${escapeHtml(p.name)}">
    ${escapeHtml(p.name)}(${p.bu})
</button>`;
  }).join("");
  document.querySelectorAll(".chip").forEach(btn => btn.addEventListener("click", () => togglePlayer(btn.dataset.name)));
}
function renderMatchDisplay(){
  const mode = getMode();
  const { left, right } = getSides();
  const leftBtn = $("leftWinBtn");
  const rightBtn = $("rightWinBtn");

  if (!selectedNames.length) {
    $("matchDisplay").innerHTML = "";
    leftBtn.style.display = "none";
    rightBtn.style.display = "none";
    return;
  }

  if (!mode) {
    $("matchDisplay").innerHTML = selectedNames.map(escapeHtml).join(" , ");
    leftBtn.style.display = "none";
    rightBtn.style.display = "none";
    return;
  }

  const leftText = left.map(escapeHtml).join(", ");
  const rightText = right.map(escapeHtml).join(", ");
  $("matchDisplay").innerHTML = `${leftText} <span style="color:#64748b;">vs</span> ${rightText}`;
  leftBtn.textContent = `${leftText} 승`;
  rightBtn.textContent = `${rightText} 승`;
  leftBtn.style.display = "block";
  rightBtn.style.display = "block";
}
async function saveByWinner(side){
  const mode = getMode();
  if (!mode) return showNotice("2명 또는 4명 선택");
  const { left, right } = getSides();
  const winners = side === "left" ? left : right;
  const losers = side === "left" ? right : left;
  const now = Date.now();
  const item = {
    type: mode,
    mode,
    winnerNames: [...winners],
    loserNames: [...losers],
    namesA: [...winners],
    namesB: [...losers],
    winnerSide: "A",
    loserSide: "B",
    dateKey: todayKey(),
    monthKey: monthKey(),
    createdAt: now
  };
  await set(push(matchesRef), item);
  selectedNames = [];
  renderTiles();
  renderMatchDisplay();
  showNotice("저장되었습니다");
}
$("leftWinBtn").addEventListener("click", () => saveByWinner("left"));
$("rightWinBtn").addEventListener("click", () => saveByWinner("right"));
$("clearSelected").addEventListener("click", () => { selectedNames=[]; renderTiles(); renderMatchDisplay(); });



function renderLogs(){
  const arr = Object.entries(matches || {}).map(([id,m]) => ({ id, ...m })).sort((a,b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));
  if (!arr.length) { $("logs").innerHTML = `<div style="text-align:center;color:#999;padding:8px;">최근 경기 없음</div>`; return; }
  $("logs").innerHTML = arr.map(m => {
    const d = new Date(Number(m.createdAt || Date.now()));
    const kst = getKSTDate(d);
    const time = `${kst.getFullYear()}-${pad2(kst.getMonth()+1)}-${pad2(kst.getDate())} ${pad2(kst.getHours())}:${pad2(kst.getMinutes())}`;
    const modeText = (m.mode || m.type) === "double" ? "복식" : "단식";
    const winners = Array.isArray(m.winnerNames) ? m.winnerNames : (m.winnerSide === "A" ? (m.namesA || []) : (m.namesB || []));
    const losers = Array.isArray(m.loserNames) ? m.loserNames : (m.winnerSide === "A" ? (m.namesB || []) : (m.namesA || []));
    return `<div class="log-item"><span class="log-time">${time} [${modeText}]</span><div class="log-match"><span class="log-win">${winners.map(escapeHtml).join("/")} 승</span> vs ${losers.map(escapeHtml).join("/")}</div><button class="delete-btn" data-del="${escapeHtml(m.id)}">🗑️</button></div>`;
  }).join("");
  document.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", async () => {
    const snap = await get(ref(db,"config/deletePassword"));
    const saved = snap.exists() ? String(snap.val()).trim() : "1111";
    const input = prompt("삭제 비밀번호를 입력하세요.");
    if (input === null) return;
    if (String(input).trim() !== saved) return alert("비밀번호가 올바르지 않습니다.");
    if (!confirm("이 경기결과를 삭제할까요?")) return;
    await remove(ref(db, `matches/${btn.dataset.del}`));
    showNotice("삭제되었습니다");
  }));
}
function renderPlayerList(){
  const arr = playerArray();
  if (!arr.length) {
    selectedAdminPlayerId = null;
    $("playerList").innerHTML = `<div class="empty" style="width:100%;">등록된 선수가 없습니다.</div>`;
    return;
  }

  if (selectedAdminPlayerId && !arr.some(p => p.id === selectedAdminPlayerId)) {
    selectedAdminPlayerId = null;
  }

  $("playerList").innerHTML = arr.map(p => {
    const selected = p.id === selectedAdminPlayerId ? "selected" : "";
    const bu = Math.min(p.bu, 12);
    return `<button class="playerChip chip bu${bu} ${selected}" data-id="${escapeHtml(p.id)}">
      ${escapeHtml(p.name)}(${p.bu})
    </button>`;
  }).join("");

  document.querySelectorAll(".playerChip").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedAdminPlayerId = selectedAdminPlayerId === btn.dataset.id ? null : btn.dataset.id;
      renderPlayerList();
    });
  });
}

async function verifyAdminPassword(message="관리자 비밀번호를 입력하세요."){
  const snap = await get(ref(db,"config/adminPassword"));
  const saved = snap.exists() ? String(snap.val()).trim() : "1111";
  const input = prompt(message);
  if (input === null) return false;
  if (String(input).trim() !== saved) {
    alert("비밀번호가 올바르지 않습니다.");
    return false;
  }
  return true;
}

async function deleteSelectedPlayer(){
  if (!selectedAdminPlayerId) return alert("삭제할 선수를 먼저 선택하세요.");
  const arr = playerArray();
  const p = arr.find(x => x.id === selectedAdminPlayerId);
  const name = p ? p.name : "선택한 선수";
  if (!confirm(`${name} 선수를 삭제할까요?`)) return;
  await remove(ref(db, `members/${selectedAdminPlayerId}`));
  selectedAdminPlayerId = null;
  showNotice("선수 삭제 완료");
}

async function resetMatches(){
  if (!(await verifyAdminPassword("경기리셋 관리자 비밀번호를 입력하세요."))) return;
  if (!confirm("경기 기록을 전부 삭제할까요? 선수 명단은 유지됩니다.")) return;
  await remove(matchesRef);
  selectedNames = [];
  renderTiles();
  renderMatchDisplay();
  showNotice("경기 기록이 리셋되었습니다");
}

async function resetAll(){
  if (!(await verifyAdminPassword("전체리셋 관리자 비밀번호를 입력하세요."))) return;
  if (!confirm("전체 리셋할까요? 선수 명단과 경기 기록이 모두 삭제됩니다.")) return;
  if (!confirm("정말 삭제합니다. 되돌릴 수 없습니다.")) return;
  await remove(matchesRef);
  await remove(membersRef);
  selectedNames = [];
  selectedAdminPlayerId = null;
  renderTiles();
  renderMatchDisplay();
  showNotice("전체 리셋 완료");
}

onValue(membersRef, snap => {
    players = snap.val() || {};
    renderPlayerList();
    renderTiles();
});

onValue(matchesRef, snap => {
    matches = snap.val() || {};
    renderLogs();
});

renderMatchDisplay();

async function openAdmin(){
  if (!isAdmin) {
    if (!(await verifyAdminPassword())) return;
    isAdmin = true;
  }
  $("mainPanel").style.display="none"; $("adminPanel").style.display="block";
}
function closeAdmin(){ $("adminPanel").style.display="none"; $("mainPanel").style.display="block"; }
$("adminBtn").addEventListener("click", openAdmin);
$("showMainBtn").addEventListener("click", closeAdmin);
$("closeAdminBtn").addEventListener("click", closeAdmin);
$("deleteSelectedPlayerBtn").addEventListener("click", deleteSelectedPlayer);
$("resetMatchesBtn").addEventListener("click", resetMatches);
$("resetAllBtn").addEventListener("click", resetAll);
$("addPlayerBtn").addEventListener("click", async () => {
  const name = $("playerName").value.trim();
  const bu = Number($("playerBu").value || 99);
  if (!name) return alert("선수 이름을 입력하세요.");
  if (playerArray().some(p => p.name === name)) return alert("이미 등록된 선수입니다.");
  await set(ref(db, `members/${safeNameKey(name)}`), { name, bu:Number.isFinite(bu) ? bu : 99, active:true, createdAt:Date.now() });
  $("playerName").value=""; $("playerBu").value=""; showNotice("추가되었습니다");
});
</script>
</body>
</html>
