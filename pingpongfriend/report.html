<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>🏓 통합 순위</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
  --ink:#0f172a;
  --muted:#64748b;
  --bg:#f5f7fb;
  --card:#fff;
  --line:#e5e7eb;
  --soft:#f1f5f9;
  --accent:#2563eb;
  --accent2:#1e40af;
  --ok:#16a34a;
  --danger:#ef4444;
  --gold:#f59e0b;
  --silver:#94a3b8;
  --bronze:#b45309;
  --shadow:0 8px 28px rgba(15,23,42,.08);
}

*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  font-family:"Pretendard","Noto Sans KR",sans-serif;
  background:linear-gradient(180deg,#eff6ff 0%,var(--bg) 220px);
  color:var(--ink);
  font-weight:600;
}

header{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:10;
  text-align:center;
  padding:12px 8px 10px;
}

h1{
  margin:2px 0 9px;
  color:var(--accent);
  font-size:clamp(19px,4.8vw,25px);
  font-weight:900;
  letter-spacing:-.4px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
  justify-content:center;
}

.btn{
  border:1px solid #cbd5e1;
  border-radius:999px;
  padding:7px 13px;
  font-size:14px;
  cursor:pointer;
  background:#fff;
  font-weight:800;
  text-decoration:none;
  color:#111827;
  box-shadow:0 2px 8px rgba(15,23,42,.05);
}
.btn.primary{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

main{
  max-width:760px;
  margin:0 auto;
  padding:12px 10px 60px;
}

.summary{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:9px;
  margin:4px 0 12px;
}

.statCard{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(226,232,240,.9);
  border-radius:16px;
  padding:12px 8px;
  text-align:center;
  font-weight:900;
  font-size:16px;
  box-shadow:0 6px 18px rgba(15,23,42,.06);
  min-height:66px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:3px;
}
.statCard span{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
}
.statCard strong{
  color:var(--accent2);
  font-weight:950;
}

.podium{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin:12px 0 14px;
}
.podiumCard{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:10px 6px;
  text-align:center;
  min-height:86px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:4px;
}
.podiumCard .medal{font-size:22px;line-height:1;}
.podiumCard .name{font-size:15px;font-weight:950;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.podiumCard .score{font-size:12px;color:var(--muted);font-weight:800;}
.podiumCard.first{border-color:#fde68a;background:linear-gradient(180deg,#fffbeb,#fff);}
.podiumCard.second{border-color:#cbd5e1;background:linear-gradient(180deg,#f8fafc,#fff);}
.podiumCard.third{border-color:#fed7aa;background:linear-gradient(180deg,#fff7ed,#fff);}

.sectionTitle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin:10px 0 8px;
  color:#1e3a8a;
  font-size:17px;
  font-weight:950;
  padding:0 2px;
}
.sectionTitle small{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.tableWrap{
  background:var(--card);
  box-shadow:var(--shadow);
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(226,232,240,.8);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
thead th{
  background:#f8fafc;
  border-bottom:1px solid #e2e8f0;
  padding:10px 3px;
  text-align:center;
  color:#334155;
  font-weight:950;
  white-space:nowrap;
  font-size:13px;
}
tbody td{
  border-bottom:1px solid #f1f5f9;
  padding:10px 3px;
  text-align:center;
  font-weight:850;
}
tbody tr:last-child td{border-bottom:none;}
tbody tr:nth-child(even){background:#fbfdff;}

.rankCell{
  width:42px;
  font-weight:950;
  color:#334155;
}
.nameCell{
  text-align:left;
  padding-left:8px;
  max-width:120px;
}
.nameText{
  display:inline-block;
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  vertical-align:middle;
}
.rateCell{
  color:#1e40af;
  font-weight:950;
}
.win{color:#dc2626;font-weight:950;}
.lose{color:#2563eb;font-weight:950;}
.rank1{background:#e0f2fe!important;}
.rank2{background:#f8fafc!important;}
.rank3{background:#fff7ed!important;}

.rankBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:28px;
  height:28px;
  border-radius:999px;
  background:#e2e8f0;
  color:#334155;
  font-size:13px;
}
.rank1 .rankBadge{background:#fef3c7;color:#92400e;}
.rank2 .rankBadge{background:#e2e8f0;color:#334155;}
.rank3 .rankBadge{background:#fed7aa;color:#9a3412;}

.empty{
  text-align:center;
  color:var(--muted);
  padding:24px 16px;
  background:#fff;
  border-radius:16px;
  box-shadow:var(--shadow);
  font-weight:800;
}

@media(max-width:420px){
  main{padding-left:8px;padding-right:8px;}
  .summary{gap:7px;}
  .statCard{font-size:14px;padding:10px 5px;min-height:60px;}
  .statCard span{font-size:11.5px;}
  .podium{gap:6px;}
  .podiumCard{padding:9px 4px;min-height:82px;}
  .podiumCard .name{font-size:13px;}
  .podiumCard .score{font-size:11px;}
  table{font-size:13px;}
  thead th,tbody td{padding:9px 1px;}
  .btn{font-size:13px;padding:6px 11px;}
  .nameCell{padding-left:4px;max-width:92px;}
  .rankCell{width:36px;}
  .rankBadge{min-width:25px;height:25px;font-size:12px;}
}
</style>
</head>
<body>
<header>
  <h1 id="pageHeader">🏓 통합 순위</h1>
  <div class="row">
    <a href="index.html" class="btn primary">경기입력</a>
  </div>
</header>

<main>
  <div id="summary" class="summary"></div>
  <div id="podium" class="podium"></div>
  <div class="sectionTitle">
    <span>🏆 전체 순위</span>
    <small id="rankCount">0명</small>
  </div>
  <div id="rankingWrap"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0prJtmZ25JTLsG9R9JRCapCtOqH2PGaA",
  authDomain: "pingpongfriend-19295.firebaseapp.com",
  databaseURL: "https://pingpongfriend-19295-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pingpongfriend-19295",
  storageBucket: "pingpongfriend-19295.firebasestorage.app",
  messagingSenderId: "201223495919",
  appId: "1:201223495919:web:b8f20c2cfec45043d8fb1a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const membersRef = ref(db, "members");
const matchesRef = ref(db, "matches");
const titleRef = ref(db, "config/title");

let players = {};
let matches = {};

const $ = (id) => document.getElementById(id);
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function formatRate(n){ return `${(Math.round(n * 10) / 10).toFixed(1)}%`; }

async function loadTitle(){
  const snap = await get(titleRef);
  const title = snap.exists() ? snap.val() : "탁구";
  document.title = `🏓 ${title} 통합 순위`;
  $("pageHeader").textContent = `🏓 ${title} 통합 순위`;
}
loadTitle();

function buildStats(){
  const stats = {};

  Object.values(players || {}).forEach(p => {
    if (!p?.name) return;
    if (p.active === false) return;
    stats[p.name] = { name:p.name, bu:Number(p.bu ?? 99), total:0, win:0, lose:0 };
  });

  Object.values(matches || {}).forEach(m => {
    const winners = Array.isArray(m.winnerNames)
      ? m.winnerNames
      : (m.winnerSide === "A" ? (m.namesA || []) : (m.namesB || []));

    const losers = Array.isArray(m.loserNames)
      ? m.loserNames
      : (m.winnerSide === "A" ? (m.namesB || []) : (m.namesA || []));

    [...winners, ...losers].forEach(name => {
      if (!stats[name]) stats[name] = { name, bu:99, total:0, win:0, lose:0 };
    });

    winners.forEach(name => { stats[name].total++; stats[name].win++; });
    losers.forEach(name => { stats[name].total++; stats[name].lose++; });
  });

  return Object.values(stats)
    .map(p => ({ ...p, rate:p.total ? p.win / p.total * 100 : 0 }))
    .filter(p => p.total > 0)
    .sort((a,b) => b.rate - a.rate || b.win - a.win || b.total - a.total || a.bu - b.bu || a.name.localeCompare(b.name,"ko"));
}

function renderSummary(arr){
  const totalMatches = Object.keys(matches || {}).length;
  const top = arr[0];
  const topWin = arr.slice().sort((a,b) => b.win - a.win || b.rate - a.rate || a.bu - b.bu)[0];
  const mostPlayed = arr.slice().sort((a,b) => b.total - a.total || b.win - a.win || a.bu - b.bu)[0];
  const mostLose = arr.slice().sort((a,b) => b.lose - a.lose || b.total - a.total || a.bu - b.bu)[0];

  $("summary").innerHTML = `
    <div class="statCard"><span>총 경기</span><strong>${totalMatches}</strong>경기</div>
    <div class="statCard"><span>참여 선수</span><strong>${arr.length}</strong>명</div>
    <div class="statCard"><span>현재 1위</span>${top ? `<strong>${escapeHtml(top.name)}</strong> ${formatRate(top.rate)}` : "-"}</div>
    <div class="statCard"><span>다승 1위</span>${topWin ? `<strong>${escapeHtml(topWin.name)}</strong> ${topWin.win}승` : "-"}</div>
    <div class="statCard"><span>최다 경기</span>${mostPlayed ? `<strong>${escapeHtml(mostPlayed.name)}</strong> ${mostPlayed.total}경기` : "-"}</div>
    <div class="statCard"><span>최다 패</span>${mostLose ? `<strong>${escapeHtml(mostLose.name)}</strong> ${mostLose.lose}패` : "-"}</div>`;
}

function renderPodium(arr){
  const top3 = arr.slice(0,3);
  if (!top3.length) {
    $("podium").innerHTML = "";
    return;
  }

  const medals = ["🥇", "🥈", "🥉"];
  const classes = ["first", "second", "third"];
  $("podium").innerHTML = top3.map((p,i) => `
    <div class="podiumCard ${classes[i]}">
      <div class="medal">${medals[i]}</div>
      <div class="name">${escapeHtml(p.name)}</div>
      <div class="score">${p.win}승 ${p.lose}패 · ${formatRate(p.rate)}</div>
    </div>`).join("");
}

function renderRanking(arr){
  $("rankCount").textContent = `${arr.length}명`;

  if (!arr.length) {
    $("rankingWrap").innerHTML = `<div class="empty">아직 입력된 경기 결과가 없습니다.</div>`;
    return;
  }

  const rows = arr.map((p,i) => {
    const rankClass = i === 0 ? "rank1" : i === 1 ? "rank2" : i === 2 ? "rank3" : "";
    const badge = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : String(i + 1);
    return `
      <tr class="${rankClass}">
        <td class="rankCell"><span class="rankBadge">${badge}</span></td>
        <td class="nameCell"><span class="nameText">${escapeHtml(p.name)}(${p.bu})</span></td>
        <td>${p.total}</td>
        <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
        <td class="rateCell">${formatRate(p.rate)}</td>
      </tr>`;
  }).join("");

  $("rankingWrap").innerHTML = `
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>순위</th>
            <th>이름</th>
            <th>경기</th>
            <th>승/패</th>
            <th>승률</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function render(){
  const arr = buildStats();
  renderSummary(arr);
  renderPodium(arr);
  renderRanking(arr);
}

onValue(membersRef, snap => { players = snap.val() || {}; render(); });
onValue(matchesRef, snap => { matches = snap.val() || {}; render(); });
</script>
</body>
</html>
