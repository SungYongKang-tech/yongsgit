<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏓 월간 탁구리그 리포트</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08); --card:#fff;
}
body{
  margin:0;
  font-family:"Pretendard","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink); font-weight:600;
}
header{
  background:#fff; border-bottom:1px solid #e5e7eb;
  text-align:center; padding:14px 0; position:sticky; top:0; z-index:10;
}
h1{
  margin:4px 0 10px;
  color:var(--accent);
  font-size:clamp(18px,4vw,24px);
  font-weight:700;
}
.btn{
  border:1px solid #d1d5db;
  border-radius:8px;
  padding:6px 10px;
  font-size:14px;
  background:#fff;
  cursor:pointer;
  font-weight:600;
  transition:.15s;
}
.btn.primary{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}
.row{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
main{
  max-width:900px;
  margin:0 auto;
  padding:10px 10px 60px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:var(--card);
  box-shadow:var(--shadow);
  border-radius:12px;
  overflow:hidden;
  font-size:15px;
}
thead th{
  background:#f1f5f9;
  border-bottom:1px solid #e2e8f0;
  padding:10px 6px;
  text-align:center;
  color:#334155;
  font-weight:700;
  white-space:nowrap;
}
tbody td{
  border-bottom:1px solid #f1f5f9;
  padding:10px 6px;
  text-align:center;
}
tbody tr:hover{ background:#f9fafb; }
.win { color:#dc2626; font-weight:700; }
.lose { color:#2563eb; font-weight:700; }
.delta{ font-weight:700; }
.delta.up { color:#dc2626; }
.delta.down { color:#2563eb; }

.summary{
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}
.card{
  background:var(--card);
  border-radius:12px;
  box-shadow:var(--shadow);
  padding:18px 20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.card h3{
  margin:0 0 6px;
  font-size:18px;
  color:var(--accent);
}
.card ul{
  margin:0;
  padding-left:22px;
  font-size:16px;
  line-height:1.5;
}
.card li{ margin:3px 0; }
.total{
  grid-column:1 / -1;
  text-align:center;
  font-size:19px;
  font-weight:700;
  color:var(--ink);
  background:#e8f0ff;
  border-radius:12px;
  padding:12px;
}
.notice-box{
  max-width:900px;
  margin:14px auto 0;
  padding:10px 14px;
  border-radius:12px;
  background:#fff7ed;
  color:#9a3412;
  border:1px solid #fed7aa;
  font-size:14px;
  line-height:1.5;
  box-shadow:0 4px 16px rgba(0,0,0,.05);
}
@media(max-width:640px){
  table{ font-size:13px; }
  thead th, tbody td{ padding:7px 1px; }
  .card ul{ font-size:15px; }
}
.btn.ok { background:#0d9488; color:#fff; border-color:#0d9488; }
.btn.ok:hover { background:#0f766e; }
</style>
</head>

<body>
<header>
  <h1 id="pageHeader">🏓 월간 탁구리그 리포트</h1>
  <div class="row">
    <button id="adminBtn" class="btn">⚙ 관리자모드</button>
    <a href="index.html" class="btn primary">경기결과 입력</a>
    <a href="monthly-report2.html" class="btn primary">단/복식 전적</a>
  </div>
</header>

<main id="mainContent">
  <table>
    <thead>
      <tr>
        <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th>
        <th>이전<br>승률</th><th>이달<br>승률</th><th>증감</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="summary" class="summary"></div>
</main>

<div id="noticeBox" class="notice-box" style="display:none;"></div>

<script type="module">
import { db } from "../firebase.js";
import { ref, get, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

/* =========================
   기본 설정
========================= */
const titleRef = ref(db, "config/title");
get(titleRef).then(snap => {
  const title = snap.exists() ? snap.val() : "우리회사";
  document.getElementById("pageHeader").textContent = `🏓 ${title} 월간 통합리그`;
});

const matchRef = ref(db, "matches");
const playerRef = ref(db, "members");

let players = {};
let cleanedOldMatches = false;
let autoClosed = false;

onValue(playerRef, snap => {
  players = snap.val() || {};
});

function formatNum(n){
  return (Math.round(n * 10) / 10).toFixed(1);
}
const pad2 = (n) => String(n).padStart(2, "0");

/* =========================
   KST 기준 날짜/월 처리
========================= */
function getKSTDate(date = new Date()){
  return new Date(date.toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
}

function monthKeyFromDate(date = new Date()){
  const kst = getKSTDate(date);
  return `${kst.getFullYear()}-${pad2(kst.getMonth() + 1)}`;
}

function monthKeyFromCreatedAt(createdAt){
  if (createdAt === undefined || createdAt === null || createdAt === "") return "";
  const d = new Date(createdAt);
  if (isNaN(d.getTime())) return "";
  return monthKeyFromDate(d);
}

function getEffectiveMonthKey(match){
  const createdAtMonth = monthKeyFromCreatedAt(match?.createdAt);
  if (createdAtMonth) return createdAtMonth;
  return match?.monthKey || "";
}

function monthsFromJanToPrevLatestFirst(nowKST){
  const y = nowKST.getFullYear();
  const thisM = nowKST.getMonth() + 1;
  const last = thisM - 1;
  const arr = [];
  for(let m = last; m >= 1; m--){
    arr.push(`${y}-${pad2(m)}`);
  }
  return arr;
}

function showNotice(message){
  const box = document.getElementById("noticeBox");
  box.style.display = "block";
  box.innerHTML = message;
}

/* =========================
   월간 리포트 생성 함수
   - monthlyReports/{monthKey}/players 를 항상 재계산
========================= */
function buildMonthlyReportFromMatches(matchData, playerData, targetMonth){
  const stats = {};

  Object.values(matchData || {}).forEach(m => {
    const mk = getEffectiveMonthKey(m);
    if (mk !== targetMonth) return;

    const namesA = Array.isArray(m.namesA) ? m.namesA : [];
    const namesB = Array.isArray(m.namesB) ? m.namesB : [];
    const allNames = [...namesA, ...namesB];

    allNames.forEach(name => {
      if (!stats[name]) stats[name] = { win: 0, lose: 0 };
    });

    if (m.winnerSide === "A") {
      namesA.forEach(name => stats[name].win++);
      namesB.forEach(name => stats[name].lose++);
    } else if (m.winnerSide === "B") {
      namesB.forEach(name => stats[name].win++);
      namesA.forEach(name => stats[name].lose++);
    }
  });

  const reportArr = Object.entries(playerData || {})
    .map(([id, p]) => {
      const name = p?.name || "";
      const d = stats[name] || { win: 0, lose: 0 };
      const total = d.win + d.lose;
      const rate = total ? (d.win / total * 100) : 0;

      return {
        name,
        level: Number(p?.bu ?? 99),
        total,
        win: d.win,
        lose: d.lose,
        rate
      };
    })
    .filter(p => p.name && p.total > 0);

  const reportObj = {};
  reportArr.forEach(p => {
    const safeKey = String(p.name).replace(/[.#$[\]/]/g, "_");
    reportObj[safeKey] = p;
  });

  return { reportArr, reportObj };
}

/* =========================
   지난달 리포트 자동 재생성
   - 기존에 있어도 덮어씀
========================= */
async function autoClosePreviousMonth(){
  const nowKST = getKSTDate();
  const prevMonthDate = new Date(nowKST.getFullYear(), nowKST.getMonth() - 1, 1);
  const prevMonth = monthKeyFromDate(prevMonthDate);

  const matchSnap = await get(ref(db, "matches"));
  const matchData = matchSnap.val() || {};

  const playerSnap = await get(ref(db, "members"));
  const playerData = playerSnap.val() || {};

  const { reportArr, reportObj } = buildMonthlyReportFromMatches(matchData, playerData, prevMonth);

  if (reportArr.length === 0) {
    console.log(`⚠️ ${prevMonth} 월 경기 없음 — 마감 스킵`);
    return;
  }

  await set(ref(db, `monthlyReports/${prevMonth}/players`), reportObj);
  console.log(`✅ ${prevMonth} 월 리포트 재생성 완료`);
}

/* =========================
   현재월 통계
========================= */
function buildCurrentStats(matchData, playerData, targetMonth){
  const stats = {};

  Object.values(matchData || {}).forEach(m => {
    const mk = getEffectiveMonthKey(m);
    if (mk !== targetMonth) return;

    const namesA = Array.isArray(m.namesA) ? m.namesA : [];
    const namesB = Array.isArray(m.namesB) ? m.namesB : [];
    const allNames = [...namesA, ...namesB];

    allNames.forEach(name => {
      if (!stats[name]) stats[name] = { win: 0, lose: 0 };
    });

    if (m.winnerSide === "A") {
      namesA.forEach(name => stats[name].win++);
      namesB.forEach(name => stats[name].lose++);
    } else if (m.winnerSide === "B") {
      namesB.forEach(name => stats[name].win++);
      namesA.forEach(name => stats[name].lose++);
    }
  });

  return Object.entries(playerData || {})
    .map(([id, p]) => {
      const d = stats[p.name] || { win: 0, lose: 0 };
      const total = d.win + d.lose;
      const rate = total ? (d.win / total * 100) : 0;
      return {
        name: p.name,
        level: Number(p.bu ?? 99),
        total,
        win: d.win,
        lose: d.lose,
        rate
      };
    })
    .filter(p => p.total > 0)
    .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);
}

/* =========================
   메인 로직
========================= */
onValue(matchRef, async (snap) => {
  try {
    if (!autoClosed) {
      autoClosed = true;
      await autoClosePreviousMonth();
    }

    const data = snap.val() || {};
    const nowKST = getKSTDate();

    const thisMonth = monthKeyFromDate(nowKST);
    const prevMonth = monthKeyFromDate(new Date(nowKST.getFullYear(), nowKST.getMonth() - 1, 1));

    // 2개월 이전 삭제(1회만) - createdAt 기준 우선
    const twoMonthsAgoDate = new Date(nowKST.getFullYear(), nowKST.getMonth() - 2, 1);
    const oldMonth = monthKeyFromDate(twoMonthsAgoDate);

    if (!cleanedOldMatches) {
      cleanedOldMatches = true;
      Object.entries(data).forEach(([id, m]) => {
        const mk = getEffectiveMonthKey(m);
        if (mk && mk <= oldMonth) {
          remove(ref(db, `matches/${id}`));
        }
      });
    }

    // 이번달 통계
    const curArr = buildCurrentStats(data, players, thisMonth);

    // 이전달들 리포트 로드
    const monthsToShow = monthsFromJanToPrevLatestFirst(nowKST);
    const monthsReports = [];
    let prevArr = [];
    let prevMap = {};

    for (const mk of monthsToShow) {
      let arr = [];
      let map = {};

      // 직전달은 matches 기준으로 다시 한번 보정해서 화면 표시
      if (mk === prevMonth) {
        const rebuilt = buildMonthlyReportFromMatches(data, players, mk).reportArr;
        arr = rebuilt
          .slice()
          .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);
        rebuilt.forEach(p => { map[p.name] = p.rate; });
      } else {
        const snapM = await get(ref(db, `monthlyReports/${mk}/players`));
        if (!snapM.exists()) continue;

        Object.values(snapM.val()).forEach(p => {
          const win = p.win ?? p.wins ?? 0;
          const lose = p.lose ?? p.losses ?? 0;
          const rate = p.rate ?? p.winRate ?? 0;
          const total = p.total ?? (win + lose);
          arr.push({
            name: p.name,
            level: Number(p.level ?? 99),
            win,
            lose,
            total,
            rate
          });
          map[p.name] = rate;
        });

        arr.sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);
      }

      monthsReports.push({ month: mk, arr, map });

      if (mk === prevMonth) {
        prevArr = arr;
        prevMap = map;
      }
    }

    const curAug = curArr.map(p => {
      const prev = (prevMap[p.name] ?? null);
      const delta = (prev === null) ? null : (p.rate - prev);
      return { ...p, prev, delta };
    });

    render(curAug, thisMonth, monthsReports, nowKST);
    summary(curAug, prevArr, prevMap);

    showNotice(
      `현재 화면은 <b>한국시간 기준</b>으로 계산되며, 지난달 전적은 페이지를 열 때마다 <b>matches 기준으로 다시 계산</b>해 monthlyReports에 반영되도록 수정했습니다.`
    );
  } catch (err) {
    console.error(err);
    showNotice(`오류가 발생했습니다: ${err.message}`);
  }
});

/* =========================
   render
========================= */
function render(curArr, thisMonth, monthsReports, nowKST) {
  const main = document.getElementById("mainContent");
  const summaryBox = document.getElementById("summary");

  main.innerHTML = `
    <h2 style="text-align:center;font-size:22px;color:#1e3a8a;margin:20px 0 14px;font-weight:800;">
      🏓 이달의 통합전적 (${thisMonth})
    </h2>
    <table id="tableCurrent">
      <thead>
        <tr>
          <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th>
          <th>이전<br>승률</th><th>이달<br>승률</th><th>증감</th>
        </tr>
      </thead>
      <tbody id="tbodyCurrent"></tbody>
    </table>
  `;
  main.appendChild(summaryBox);

  const day = nowKST.getDate();
  const minGames = Math.ceil(day / 2);

  const qualified = curArr
    .filter(p => p.total >= minGames)
    .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

  const unqualified = curArr
    .filter(p => p.total < minGames)
    .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

  const tbody = document.getElementById("tbodyCurrent");

  qualified.forEach((p, i) => {
    const cls = p.delta > 0 ? "up" : p.delta < 0 ? "down" : "";
    const sign = p.delta > 0 ? "▲" : p.delta < 0 ? "▼" : "–";
    const prevText = p.prev !== null ? `${formatNum(p.prev)}%` : "–";
    const deltaText = p.prev !== null ? `${sign} ${formatNum(Math.abs(p.delta))}%p` : "–";

    tbody.insertAdjacentHTML("beforeend", `
      <tr style="background:#e0f2fe;">
        <td>${i + 1}</td>
        <td>
          <a href="player.html?name=${encodeURIComponent(p.name)}"
             style="color:#2563eb; font-weight:700; text-decoration:none;">
            ${p.name}(${p.level})
          </a>
        </td>
        <td>${p.total}</td>
        <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
        <td>${prevText}</td>
        <td>${formatNum(p.rate)}%</td>
        <td class="delta ${cls}">${deltaText}</td>
      </tr>
    `);
  });

  unqualified.forEach(p => {
    const cls = p.delta > 0 ? "up" : p.delta < 0 ? "down" : "";
    const sign = p.delta > 0 ? "▲" : p.delta < 0 ? "▼" : "–";
    const prevText = p.prev !== null ? `${formatNum(p.prev)}%` : "–";
    const deltaText = p.prev !== null ? `${sign} ${formatNum(Math.abs(p.delta))}%p` : "–";

    tbody.insertAdjacentHTML("beforeend", `
      <tr style="background:#f9fafb;">
        <td>–</td>
        <td>
          <a href="player.html?name=${encodeURIComponent(p.name)}"
             style="color:#2563eb; font-weight:700; text-decoration:none;">
            ${p.name}(${p.level})
          </a>
        </td>
        <td>${p.total}</td>
        <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
        <td>${prevText}</td>
        <td>${formatNum(p.rate)}%</td>
        <td class="delta ${cls}">${deltaText}</td>
      </tr>
    `);
  });

  document.getElementById("tableCurrent").insertAdjacentHTML("afterend", `
    <p id="ruleNote" style="
      text-align:center;color:#475569;font-size:12.5px;
      margin-top:6px;margin-bottom:14px;font-weight:500;">
      ⚠️ 순위 반영 기준: <b>2일에 1경기 이상 (오늘 기준 최소 ${minGames}경기)</b>
    </p>
  `);

  if (monthsReports.length) {
    main.insertAdjacentHTML("beforeend", `
      <h2 style="text-align:center;font-size:21px;color:#334155;margin:30px 0 8px;
      border-top:2px solid #e2e8f0;padding-top:14px;">
        📚 이전 달 전적
      </h2>
    `);

    monthsReports.forEach(({ month, arr }) => {
      main.insertAdjacentHTML("beforeend", `
        <h3 style="text-align:center;font-size:18px;color:#334155;margin:18px 0 8px;">
          ${month} 전적
        </h3>
        <table class="tablePrev">
          <thead>
            <tr>
              <th>순위</th><th>이름(부수)</th><th>경기</th><th>승/패</th><th>승률</th>
            </tr>
          </thead>
          <tbody class="tbodyPrev"></tbody>
        </table>
      `);

      const tbs = main.querySelectorAll(".tbodyPrev");
      const tb = tbs[tbs.length - 1];

      const qualifiedPrev = arr
        .filter(p => p.total >= 15)
        .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

      const unqualifiedPrev = arr
        .filter(p => p.total < 15)
        .sort((a, b) => b.rate - a.rate || b.total - a.total || a.level - b.level);

      qualifiedPrev.forEach((p, i) => {
        tb.insertAdjacentHTML("beforeend", `
          <tr style="background:#e0f2fe;">
            <td>${i + 1}</td>
            <td>
              <a href="player.html?name=${encodeURIComponent(p.name)}"
                 style="color:#2563eb; font-weight:700; text-decoration:none;">
                ${p.name}${p.level !== undefined ? `(${p.level})` : ""}
              </a>
            </td>
            <td>${p.total}</td>
            <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
            <td>${formatNum(p.rate)}%</td>
          </tr>
        `);
      });

      unqualifiedPrev.forEach(p => {
        tb.insertAdjacentHTML("beforeend", `
          <tr style="background:#f9fafb;">
            <td>–</td>
            <td>
              <a href="player.html?name=${encodeURIComponent(p.name)}"
                 style="color:#2563eb; font-weight:700; text-decoration:none;">
                ${p.name}${p.level !== undefined ? `(${p.level})` : ""}
              </a>
            </td>
            <td>${p.total}</td>
            <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
            <td>${formatNum(p.rate)}%</td>
          </tr>
        `);
      });

      const totalPrevMatches = Math.round(arr.reduce((sum, p) => sum + (p.total || 0), 0) / 2);

      main.insertAdjacentHTML("beforeend", `
        <p style="text-align:center;margin-top:8px;font-size:13px;color:#1e3a8a;font-weight:600;">
          🔹 ${month} 총 경기 수: <b>${totalPrevMatches} 경기</b>
        </p>
        <p style="text-align:center;color:#475569;font-size:12.5px;margin-top:4px;margin-bottom:14px;font-weight:500;">
          ⚠️ ${month} 순위 반영 기준: <b>15경기 이상</b>
        </p>
      `);
    });
  }
}

/* =========================
   summary
========================= */
function summary(arr, prevArr, prevMap){
  const box = document.getElementById("summary");
  const totalMatches = Math.round(arr.reduce((s, p) => s + (p.total || 0), 0) / 2);

  const topPlay = arr.slice().sort((a, b) => b.total - a.total).slice(0, 3);
  const topWin  = arr.slice().sort((a, b) => b.win - a.win).slice(0, 3);

  const topDelta = arr.filter(p => {
    const prevData = prevArr.find(x => x.name === p.name);
    const prevTotal = prevData ? (prevData.total || 0) : 0;
    return (p.delta > 0 && p.prev !== null && prevTotal >= 15 && p.total >= 15);
  }).sort((a, b) => b.delta - a.delta).slice(0, 3);

  const promote = arr.filter(p => {
    const prev = prevMap[p.name];
    const prevData = prevArr.find(x => x.name === p.name);
    const prevTotal = prevData ? (prevData.total || 0) : 0;
    return (p.rate >= 70 && p.total >= 15 && prev !== undefined && prev >= 70 && prevTotal >= 15);
  }).slice(0, 5);

  box.innerHTML = `
    <div class="total">총 경기 수: ${totalMatches} 경기</div>
    <div class="card">
      <h3>🎮 최다경기 TOP3</h3>
      <ul>${topPlay.map(p => `<li>${p.name} (${p.total}경기)</li>`).join("")}</ul>
    </div>
    <div class="card">
      <h3>🏆 다승 TOP3</h3>
      <ul>${topWin.map(p => `<li>${p.name} (${p.win}승)</li>`).join("")}</ul>
    </div>
    <div class="card">
      <h3>📈 기량상승 TOP3</h3>
      <ul>${topDelta.length ? topDelta.map(p => `<li>${p.name} (+${formatNum(p.delta)}%p)</li>`).join("") : "<li>없음</li>"}</ul>
      <p style="margin:6px 0 0;font-size:14px;color:#475569;">(직전달·이번달 각각 15경기 이상 / 이번달 승률 상승자만)</p>
    </div>
    <div class="card">
      <h3>🚀 부수상향 권고</h3>
      <ul>${promote.length ? promote.map(p => `<li>${p.name} (${formatNum(p.rate)}%)</li>`).join("") : "<li>없음</li>"}</ul>
      <p style="margin:6px 0 0;font-size:14px;color:#475569;">(직전달·이번달 각각 70% 이상 / 15경기 이상 두 달 연속 달성자)</p>
    </div>
  `;
}

========================= */
document.getElementById("adminBtn").addEventListener("click", async () => {
  const pwRef = ref(db, "config/adminPassword");
  const snap = await get(pwRef);
  const saved = snap.exists() ? snap.val() : "1234";
  const input = prompt("관리자 비밀번호를 입력하세요.");
  if (!input) return;
  if (input !== saved) return alert("비밀번호가 올바르지 않습니다.");
  window.location.href = "admin.html";
});
</script>
