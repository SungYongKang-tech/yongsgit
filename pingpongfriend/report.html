<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>🏓 통합 순위</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#0f172a; --muted:#64748b; --bg:#f5f7fb; --card:#fff;
  --accent:#2563eb; --ok:#16a34a; --danger:#ef4444;
  --shadow:0 8px 28px rgba(0,0,0,.08);
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);font-weight:600;}
header{background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10;text-align:center;padding:10px 8px;}
h1{margin:2px 0 8px;color:var(--accent);font-size:clamp(18px,4vw,23px);font-weight:800;}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;}
.btn{border:1px solid #ccc;border-radius:8px;padding:6px 10px;font-size:14px;cursor:pointer;background:#fff;font-weight:700;text-decoration:none;color:#111;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
main{max-width:760px;margin:0 auto;padding:10px 8px 50px;}
.summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:8px 0 12px;}
.statCard{background:#e8f0ff;border-radius:12px;padding:10px 6px;text-align:center;font-weight:900;font-size:15px;box-shadow:0 3px 12px rgba(0,0,0,.04);}
.statCard span{display:block;color:var(--muted);font-size:12px;margin-bottom:3px;font-weight:800;}
table{width:100%;border-collapse:collapse;background:var(--card);box-shadow:var(--shadow);border-radius:12px;overflow:hidden;font-size:14px;}
thead th{background:#f1f5f9;border-bottom:1px solid #e2e8f0;padding:9px 2px;text-align:center;color:#334155;font-weight:900;white-space:nowrap;}
tbody td{border-bottom:1px solid #f1f5f9;padding:9px 2px;text-align:center;font-weight:800;}
tbody tr:last-child td{border-bottom:none;}
.win{color:#dc2626;font-weight:900;}.lose{color:#2563eb;font-weight:900;}
.empty{text-align:center;color:var(--muted);padding:18px;background:#fff;border-radius:12px;box-shadow:var(--shadow);}
.nameCell{text-align:left;padding-left:8px;}
.rank1{background:#e0f2fe;}
@media(max-width:420px){table{font-size:13px;}thead th,tbody td{padding:8px 1px}.btn{font-size:13px;padding:5px 8px;}}
</style>
</head>
<body>
<header>
  <h1 id="pageHeader">🏓 통합 순위</h1>
  <div class="row">
    <a href="index.html" class="btn primary">경기입력</a>
  </div>
</header>
<main>
  <div id="summary" class="summary"></div>
  <div id="rankingWrap"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0prJtmZ25JTLsG9R9JRCapCtOqH2PGaA",
  authDomain: "pingpongfriend-19295.firebaseapp.com",
  databaseURL: "https://pingpongfriend-19295-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pingpongfriend-19295",
  storageBucket: "pingpongfriend-19295.firebasestorage.app",
  messagingSenderId: "201223495919",
  appId: "1:201223495919:web:b8f20c2cfec45043d8fb1a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const membersRef = ref(db, "members");
const matchesRef = ref(db, "matches");
const titleRef = ref(db, "config/title");

let players = {};
let matches = {};
const $ = (id) => document.getElementById(id);
function escapeHtml(str){ return String(str ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function formatRate(n){ return `${(Math.round(n * 10) / 10).toFixed(1)}%`; }

async function loadTitle(){
  const snap = await get(titleRef);
  const title = snap.exists() ? snap.val() : "탁구";
  document.title = `🏓 ${title} 통합 순위`;
  $("pageHeader").textContent = `🏓 ${title} 통합 순위`;
}
loadTitle();

function buildStats(){
  const stats = {};

  Object.values(players || {}).forEach(p => {
    if (!p?.name) return;
    if (p.active === false) return;
    stats[p.name] = { name:p.name, bu:Number(p.bu ?? 99), total:0, win:0, lose:0 };
  });

  Object.values(matches || {}).forEach(m => {
    const winners = Array.isArray(m.winnerNames)
      ? m.winnerNames
      : (m.winnerSide === "A" ? (m.namesA || []) : (m.namesB || []));

    const losers = Array.isArray(m.loserNames)
      ? m.loserNames
      : (m.winnerSide === "A" ? (m.namesB || []) : (m.namesA || []));

    [...winners, ...losers].forEach(name => {
      if (!stats[name]) stats[name] = { name, bu:99, total:0, win:0, lose:0 };
    });

    winners.forEach(name => { stats[name].total++; stats[name].win++; });
    losers.forEach(name => { stats[name].total++; stats[name].lose++; });
  });

  return Object.values(stats)
    .map(p => ({ ...p, rate:p.total ? p.win / p.total * 100 : 0 }))
    .filter(p => p.total > 0)
    .sort((a,b) => b.rate - a.rate || b.win - a.win || b.total - a.total || a.bu - b.bu || a.name.localeCompare(b.name,"ko"));
}

function render(){
  const arr = buildStats();
  const totalMatches = Object.keys(matches || {}).length;
  const top = arr[0];
  const topWin = arr.slice().sort((a,b) => b.win - a.win || b.rate - a.rate || a.bu - b.bu)[0];

  $("summary").innerHTML = `
    <div class="statCard"><span>총 경기</span>${totalMatches}경기</div>
    <div class="statCard"><span>참여 선수</span>${arr.length}명</div>
    <div class="statCard"><span>현재 1위</span>${top ? `${escapeHtml(top.name)} ${formatRate(top.rate)}` : "-"}</div>
    <div class="statCard"><span>다승 1위</span>${topWin ? `${escapeHtml(topWin.name)} ${topWin.win}승` : "-"}</div>`;

  if (!arr.length) {
    $("rankingWrap").innerHTML = `<div class="empty">아직 입력된 경기 결과가 없습니다.</div>`;
    return;
  }

  const rows = arr.map((p,i) => `
    <tr class="${i === 0 ? "rank1" : ""}">
      <td>${i + 1}</td>
      <td class="nameCell">${escapeHtml(p.name)}(${p.bu})</td>
      <td>${p.total}</td>
      <td><span class="win">${p.win}</span>/<span class="lose">${p.lose}</span></td>
      <td>${formatRate(p.rate)}</td>
    </tr>`).join("");

  $("rankingWrap").innerHTML = `
    <table>
      <thead><tr><th>순위</th><th>이름</th><th>경기</th><th>승/패</th><th>승률</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

onValue(membersRef, snap => { players = snap.val() || {}; render(); });
onValue(matchesRef, snap => { matches = snap.val() || {}; render(); });
</script>
</body>
</html>
