<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>탁구대회 도움말</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#e9f4ff,#fff7ec);
  padding:15px;
}

.wrap{
  max-width:430px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
  margin:0 0 15px;
  font-size:28px;
  color:#1565c0;
  text-align:center;
}

.tab{
  margin-bottom:15px;
  padding:15px;
  border-radius:18px;
  background:#f8fbff;
  border:1px solid #dbeafe;
}

.tab h2{
  margin:0 0 10px;
  font-size:20px;
  color:#0d47a1;
}

.tab ul{
  margin:0;
  padding-left:20px;
  line-height:1.8;
  font-size:14px;
}

.back-btn{
  width:100%;
  margin-top:20px;
  border:none;
  background:#1565c0;
  color:#fff;
  padding:15px;
  border-radius:18px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">

    <h1>🏓 도움말</h1>

    <div class="tab">
      <h2>① 경기생성</h2>
      <ul>
        <li>팀 등록 및 선수 편성</li>
        <li>조 편성 자동 생성</li>
        <li>관리자 비밀번호 필요</li>
      </ul>
    </div>

    <div class="tab">
      <h2>② 예선리그전</h2>
      <ul>
        <li>조별 경기 진행</li>
        <li>점수 입력 및 순위 확인</li>
        <li>승/패 자동 계산</li>
      </ul>
    </div>

    <div class="tab">
      <h2>③ 본선 토너먼트</h2>
      <ul>
        <li>4강/결승 자동 반영</li>
        <li>우승팀 결정</li>
      </ul>
    </div>

    <div class="tab">
      <h2>④ 순위 계산 방식</h2>
      <ul>
        <li>승수 우선</li>
        <li>세트 득실차</li>
        <li>승자승 적용</li>
      </ul>
    </div>

    <button class="back-btn" onclick="history.back()">
      ← 메인으로 돌아가기
    </button>

  </div>
</div>

</body>
</html>
