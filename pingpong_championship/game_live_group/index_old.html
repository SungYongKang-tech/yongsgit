<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조별리그 진행 - 남동노조위원장기 탁구대회</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d9e2ec;
      --text:#1f2933;
      --muted:#52606d;
      --primary:#1565c0;
      --primary-dark:#0d47a1;
      --green:#2e7d32;
      --red:#c62828;
      --orange:#ef6c00;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:16px;
      --male-bg:#eef4ff;
      --male-text:#1565c0;
      --female-bg:#ffebee;
      --female-text:#c62828;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, "Malgun Gothic", sans-serif;
    }
    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:14px;
    }
    h1,h2,h3,h4{margin:0 0 10px}
    .topbar{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .title-area{
      display:flex;
      flex-direction:column;
      gap:4px;
       text-align:center;
  width:100%;
    }
    .title-area small{color:var(--muted)}
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    button{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
      font-weight:700;
    }
    button:hover{background:var(--primary-dark)}
    button.secondary{background:#607d8b}
    button.green{background:var(--green)}
    button.orange{background:var(--orange)}
    button.red{background:var(--red)}
    button.ghost{
      background:#edf4ff;
      color:#0d47a1;
      border:1px solid #c8dcff;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
    }

    .status-box{
      padding:12px;
      border-radius:12px;
      border:1px solid #d8e6fb;
      background:#f8fbff;
      white-space:pre-line;
      font-size:14px;
    }

    .chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .chip{
      border:1px solid #cfd8e3;
      background:#fff;
      color:#334e68;
      padding:8px 12px;
      border-radius:999px;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
    }
    .chip.active{
      background:#e8f1ff;
      border-color:#b6d0ff;
      color:#0d47a1;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .match-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .match-card{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }

    .summary-btn{
      width:100%;
      text-align:left;
      padding:12px 14px;
      background:#fff;
      color:var(--text);
      border:none;
      border-bottom:1px solid transparent;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:700;
    }
    .summary-btn:hover{ background:#f9fbff; }

    .summary-left{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      line-height:1.45;
    }
    .summary-right{
      color:var(--primary-dark);
      white-space:nowrap;
      font-size:13px;
    }

    .detail-panel{
      display:none;
      padding:12px;
      border-top:1px solid var(--line);
      background:#fbfdff;
    }
    .detail-panel.open{ display:block; }

    .detail-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:12px;
    }

    .mini-box{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px;
    }

    .mini-box h4{
      font-size:14px;
      margin-bottom:8px;
    }

    .player-list{
      margin:0;
      padding-left:0;
      list-style:none;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:6px;
    }

    .player-list li{
      margin:0;
      font-size:13px;
      line-height:1.35;
      padding:5px 6px;
      border-radius:8px;
      text-align:center;
      font-weight:700;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .player-male{
      background:var(--male-bg);
      color:var(--male-text);
    }

    .player-female{
      background:var(--female-bg);
      color:var(--female-text);
    }

    .submatch-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .submatch-card{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px;
    }

    .submatch-title{
      font-weight:800;
      font-size:14px;
      color:var(--primary-dark);
      margin-bottom:8px;
    }

    .submatch-row{
      display:grid;
      grid-template-columns:92px 1fr;
      gap:8px;
      align-items:start;
      margin-bottom:6px;
    }

    .submatch-row:last-child{
      margin-bottom:0;
    }

    .submatch-label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      padding-top:4px;
    }

    .submatch-value{
      font-size:14px;
      line-height:1.45;
    }

    .biz-pair,
    .name-pair,
    .result-pair{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:6px;
    }

    .name-pair select{
      width:auto;
      min-width:92px;
      flex:1 1 120px;
    }

    .score-choice-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      align-items:center;
    }

    .score-choice{
      border:1px solid #cfd8e3;
      background:#fff;
      color:#334e68;
      padding:6px 8px;
      border-radius:8px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    .score-choice.active{
      background:#e8f1ff;
      border-color:#b6d0ff;
      color:#0d47a1;
    }

    .readonly-text{
      font-size:14px;
      line-height:1.4;
      min-width:70px;
    }

    .name-colored{
      display:inline-flex;
      align-items:center;
      gap:4px;
      flex-wrap:wrap;
    }

    .player-pill{
      display:inline-block;
      padding:4px 7px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      line-height:1.2;
    }

    .player-pill.male{
      background:var(--male-bg);
      color:var(--male-text);
    }

    .player-pill.female{
      background:var(--female-bg);
      color:var(--female-text);
    }

    .sub-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:flex-end;
      margin-top:12px;
    }

    .result-bar{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }

    .result-item{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px;
      text-align:center;
    }

    .result-item .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      font-weight:700;
    }

    .result-item .value{
      font-size:18px;
      font-weight:800;
    }

    .standings-wrap{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .table-wrap{ overflow:auto; }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
      background:#fff;
    }
    th, td{
      border:1px solid var(--line);
      padding:8px;
      text-align:center;
      vertical-align:middle;
    }
    th{
      background:#f7fafc;
      font-weight:700;
      white-space:nowrap;
    }

    select{
      width:100%;
      border:1px solid #cbd2d9;
      border-radius:10px;
      padding:8px;
      font-size:14px;
      background:#fff;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
    }

    .empty{
      color:var(--muted);
      text-align:center;
      padding:22px 10px;
      border:1px dashed #cbd2d9;
      border-radius:12px;
      background:#fff;
    }


    .advancer-wrap{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .advancer-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:12px;
    }

    .advancer-card h4{
      margin:0 0 8px;
      font-size:16px;
    }

    .advancer-desc{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-bottom:10px;
      white-space:pre-line;
    }

    .advancer-line{
      margin-bottom:10px;
    }

    .advancer-label{
      font-size:13px;
      font-weight:800;
      margin-bottom:6px;
      color:var(--primary-dark);
    }

    .team-pick-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }

    .team-pick{
      border:1px solid #cfd8e3;
      background:#fff;
      color:#334e68;
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .team-pick.active{
      background:#e8f1ff;
      border-color:#b6d0ff;
      color:#0d47a1;
    }

    .team-pick:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .advancer-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-top:10px;
    }

    .advancer-save{
      background:var(--green);
    }

    .advancer-save:hover{
      background:#256b2a;
    }

    .advancer-current{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
      margin-top:8px;
      white-space:pre-line;
    }

    .footer-note{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
    }

    @media (max-width: 768px){
      .wrap{ padding:8px; }

      .topbar{
        gap:8px;
        margin-bottom:10px;
      }

      .title-area h1{
        font-size:20px;
        line-height:1.3;
      }

      .title-area small{
        font-size:12px;
      }

      .card{
        padding:10px;
        margin-bottom:10px;
        border-radius:12px;
        box-shadow:none;
      }

      .meta-grid,
      .detail-grid,
      .standings-wrap{
        grid-template-columns:1fr;
        gap:10px;
      }

      .actions{
        width:100%;
        flex-direction:column;
        gap:6px;
      }

      .actions button{
        width:100%;
        padding:9px 10px;
        font-size:13px;
      }

      .chip-row{
        gap:6px;
        margin-top:8px;
      }

      .chip{
        padding:7px 10px;
        font-size:12px;
      }

      .section-title{
        display:block;
        margin-bottom:8px;
      }

      .section-title h2{
        font-size:18px;
        margin-bottom:4px;
      }

      .match-list{ gap:8px; }

      .match-card{
        border-radius:10px;
        box-shadow:none;
      }

      .summary-btn{
        padding:10px;
        gap:8px;
        align-items:flex-start;
      }

      .summary-left{
        display:block;
        line-height:1.45;
        font-size:13px;
        flex:1;
        min-width:0;
      }

      .summary-right{
        font-size:12px;
        white-space:nowrap;
      }

      .detail-panel{ padding:10px; }

      .mini-box{
        padding:8px 10px;
        border-radius:10px;
        box-shadow:none;
      }

      .mini-box h4{
        font-size:14px;
        margin-bottom:6px;
      }

      .player-list{
        grid-template-columns:repeat(4, minmax(0,1fr));
        gap:4px;
      }

      .player-list li{
        font-size:11px;
        padding:4px 4px;
      }

      .submatch-card{
        padding:9px;
        border-radius:10px;
      }

      .submatch-title{
        font-size:13px;
        margin-bottom:6px;
      }

      .submatch-row{
        grid-template-columns:74px 1fr;
        gap:6px;
        margin-bottom:5px;
      }

      .submatch-label{
        font-size:11px;
      }

      .submatch-value{
        font-size:13px;
      }

      .name-pair select{
        min-width:72px;
        flex:1 1 90px;
        font-size:12px;
        padding:6px 7px;
      }

      .score-choice{
        font-size:11px;
        padding:5px 7px;
      }

      .player-pill{
        font-size:11px;
        padding:3px 6px;
      }

      .readonly-text{
        font-size:12px;
        min-width:0;
      }

      .result-bar{
        grid-template-columns:1fr 1fr;
        gap:8px;
        margin-top:10px;
      }

      .result-item{
        padding:8px;
        border-radius:10px;
      }

      .result-item .label{
        font-size:11px;
        margin-bottom:4px;
      }

      .result-item .value{
        font-size:16px;
      }

      .sub-actions{
        gap:6px;
        margin-top:10px;
      }

      .sub-actions button{
        width:100%;
        padding:9px 10px;
        font-size:13px;
      }

      .status-box{
        padding:10px;
        border-radius:10px;
        font-size:13px;
      }

      .empty{
        padding:16px 10px;
        border-radius:10px;
        font-size:13px;
      }

      .hint,

      .advancer-wrap{
        grid-template-columns:1fr;
        gap:10px;
        margin-top:10px;
      }

      .advancer-card{
        padding:10px;
        border-radius:10px;
      }

      .advancer-card h4{
        font-size:15px;
        margin-bottom:6px;
      }

      .advancer-desc,
      .advancer-current{
        font-size:11px;
      }

      .advancer-label{
        font-size:12px;
      }

      .team-pick{
        padding:6px 9px;
        font-size:11px;
      }

      .footer-note{
        font-size:11px;
      }
    }
    
  .submatch-card.compact{
  padding:10px;
}

.compact-side{
  display:inline-flex;
  align-items:center;
  gap:4px;
  flex-wrap:wrap;
}

.compact-side.winner{
  font-weight:900;
  color:#111;
}

.compact-divider{
  flex:0 0 auto;
  font-weight:700;
}

.inline-player-selects{
    width:auto;
    flex-wrap:nowrap;
    gap:2px;
  }

.inline-player-selects select{
    min-width:50px;
    max-width:62px;
    font-size:11px;
    padding:4px 2px;
}

.score-select{
  min-width:74px;
  width:auto;
  padding:6px 8px;
  border:1px solid #cbd2d9;
  border-radius:8px;
  font-size:13px;
  font-weight:700;
  background:#fff;
}

.inline-save-btn{
  padding:7px 10px;
  font-size:13px;
  border-radius:8px;
  background:var(--green);
}

.inline-save-btn:hover{
  background:#256b2a;
}

.line-score{
  font-weight:900;
  font-size:16px;
  color:#111;
  min-width:40px;
  text-align:right;
  white-space:nowrap;
}


.match-title-left{
  flex:1 1 auto;
  min-width:0;
  font-size:15px;
  font-weight:800;
  color:var(--primary-dark);
  line-height:1.2;
  white-space:nowrap;
}
.match-title-row{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:6px;
}

.match-bottom-line{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:6px;
  margin-top:6px;
}

@media (max-width:768px){
    .match-title-row{
    gap:4px;
    margin-bottom:4px;
  }

  .match-title-left{
    font-size:13px;
  }

  .match-score-right{
    min-width:40px;
    font-size:15px;
  }

.match-player-line{
  display:flex;
  align-items:center;
  flex-wrap:nowrap;
  gap:4px;
  line-height:1.3;
  overflow:hidden;
}

.match-player-line .compact-side.winner{
  font-weight:900;
}


  .submatch-card.compact{
    padding:8px;
  }

  .match-top-line{
    gap:4px;
    margin-bottom:4px;
    flex-wrap:nowrap;
  }

  .match-title-left{
    font-size:13px;
    line-height:1.2;
    white-space:nowrap;
    flex:1 1 auto;
    min-width:0;
  }

  .match-top-right{
    display:flex;
    align-items:center;
    gap:4px;
    flex:0 0 auto;
    width:auto;
  }

  .match-score-right{
    font-size:15px;
    white-space:nowrap;
  }

  
 .inline-player-selects select{
  width:auto;
  min-width:56px;
  max-width:62px;
  padding:4px 2px;
  font-size:11px;
}

.inline-player-selects{
  gap:1px;
}

.compact-divider{
  margin:0 2px;
}

  .score-select{
    min-width:68px;
    font-size:12px;
    padding:5px 6px;
  }

  .inline-save-btn{
    padding:7px 8px;
    font-size:12px;
  }

  .line-score{
    font-size:15px;
    min-width:36px;
  }

  .match-player-line{
    flex-wrap:nowrap;
    gap:3px;
  }
}
.submatch-card.unsaved{
  border:2px solid #ef6c00 !important;
  box-shadow:0 0 0 2px rgba(239,108,0,0.15);
}
.score-select.unsaved-score,
.line-score.unsaved-score,
.match-score-right.unsaved-score{
  border:2px solid #ef6c00 !important;
  border-radius:8px;
  box-shadow:0 0 0 2px rgba(239,108,0,0.12);
  background:#fff7ed;
}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-area">
        <h1 id="pageTitle">조별리그 진행</h1>
        <small id="pageSub">대회 정보를 불러오는 중입니다.</small>
      </div>
      <div class="actions">
        <button type="button" class="secondary" id="btnRefresh">새로고침</button>
        <button type="button" class="ghost" id="btnToggleAdmin">관리자 잠금해제</button>
        <button type="button" class="red" id="btnResetAllResults" style="display:none;">전체 경기결과 초기화</button>
        <button type="button" class="green" id="btnTournamentPage">토너먼트 페이지</button>
      </div>
    </div>

    <div class="card">
      <div class="meta-grid">
        <div>
          <h2>대회 정보</h2>
          <div class="status-box" id="metaStatus">대회 데이터를 불러오는 중입니다...</div>
        </div>
        <div>
          <h2>현재 상태</h2>
          <div class="status-box" id="adminStatus">관전자 모드입니다.</div>
          <div class="chip-row" style="margin-top:12px;">
            <button type="button" class="chip active" id="tabA">A조</button>
            <button type="button" class="chip" id="tabB">B조</button>
            <button type="button" class="chip" id="tabStandings">조순위</button>
          </div>
        </div>
      </div>
    </div>

    <section class="card" id="groupSection">
      <div class="section-title">
        <h2 id="groupTitle">A조 경기</h2>
        <div class="hint">한줄요약을 누르면 해당 경기만 펼쳐집니다.</div>
      </div>
      <div id="matchList" class="match-list"></div>
    </section>

    <section class="card" id="standingsSection" style="display:none;">
      <div class="section-title">
        <h2>조순위</h2>
        <div class="hint">정렬 기준: 승수 → 세트득실 → 승자승</div>
      </div>
      <div class="standings-wrap">
        <div>
          <h3>A조</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>순위</th>
                  <th>팀명</th>
                  <th>승</th>
                  <th>패</th>
                  <th>세트득실</th>
                </tr>
              </thead>
              <tbody id="standingA"></tbody>

    function escapeHtml(value) {
      return String(value ?? "")

    function getSelectablePlayers(teamId, matchTypeName) {

      return [...men, ...women];

    function getPlayerGenderClass(teamId, playerName) {

      if (Array.isArray(team.men) && team.men.includes(playerName)) return "male";
      if (Array.isArray(team.women) && team.women.includes(playerName)) return "female";

    function renderPlayerPills(teamId, players) {

    }

    function renderPlayerList(teamId) {

      const men = Array.isArray(team.men) ? team.men : [];
      const women = Array.isArray(team.women) ? team.women : [];

      return all.map(name => {
        const cls = men.includes(name) ? "player-male" : "player-female";

    function getGroupMatches(groupName) {
      const all = Object.values(tournamentData?.groupMatches || {});
      return all
        .filter(m => m.group === groupName)
        .sort((a, b) => (a.order || 0) - (b.order || 0));
    }

    function getSummaryText(match) {
      const scoreA = Number(match.teamMatchScoreA || 0);
      const scoreB = Number(match.teamMatchScoreB || 0);
      const hasAny = Object.values(match.matches || {}).some(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);
        return (a > 0 || b > 0) || (m.winner && m.winner !== "");
      });

      let state = "경기전";
      if (hasAny) state = "진행중";
      if (match.status === "done") state = "종료";

      let resultPart = state;
      if (hasAny) resultPart = `${scoreA} : ${scoreB} | ${state}`;

      return `${match.group}조 ${match.order}경기 | ${match.teamAName} vs ${match.teamBName} | ${resultPart}`;
    }

    function computeMatchAggregate(matchObj) {
      const cloned = JSON.parse(JSON.stringify(matchObj));
      const subMatches = cloned.matches || {};
      let teamScoreA = 0;
      let teamScoreB = 0;
      let setDiffA = 0;
      let setDiffB = 0;

      Object.values(subMatches).forEach(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);

        if (!Number.isNaN(a) && !Number.isNaN(b) && (a > 0 || b > 0)) {
          setDiffA += (a - b);
          setDiffB += (b - a);

          if (a > b) {
            m.winner = "A";
            teamScoreA += 1;
          } else if (b > a) {
            m.winner = "B";
            teamScoreB += 1;
          } else {
            m.winner = "";
          }
        } else {
          m.winner = "";
        }
      });

      cloned.teamMatchScoreA = teamScoreA;
      cloned.teamMatchScoreB = teamScoreB;
      cloned.setDiffA = setDiffA;
      cloned.setDiffB = setDiffB;

      if (teamScoreA > teamScoreB) cloned.winnerTeamId = cloned.teamA;
      else if (teamScoreB > teamScoreA) cloned.winnerTeamId = cloned.teamB;
      else cloned.winnerTeamId = "";

      const allFilled = Object.values(subMatches).every(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);
        return (a > 0 || b > 0) && a !== b;
      });

      cloned.status = allFilled
        ? "done"
        : (teamScoreA > 0 || teamScoreB > 0 || setDiffA !== 0 || setDiffB !== 0 ? "playing" : "ready");

      return cloned;
    }

    function bindMatchCardEvents() {
  document.querySelectorAll("[data-open-id]").forEach(btn => {
    btn.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();

      const id = btn.getAttribute("data-open-id");
      const panel = document.getElementById(`detail_${id}`);
      if (!panel) return;

      const isOpen = panel.classList.contains("open");

      document.querySelectorAll(".detail-panel.open").forEach(el => {
        el.classList.remove("open");
      });
      document.querySelectorAll("[data-open-id] .summary-right").forEach(el => {
        el.textContent = "▼ 펼치기";
      });

      if (!isOpen) {
        panel.classList.add("open");
        const right = btn.querySelector(".summary-right");
        if (right) right.textContent = "▲ 접기";
        openMatchId = id;
      } else {
        openMatchId = null;
      }
    };
  });

  document.querySelectorAll(".inline-player-selects select").forEach(sel => {
  sel.onchange = () => {
    if (!isAdmin) return;

    const name = sel.getAttribute("name") || "";
    const m = name.match(/^(.+?)_(m\d)_[AB]_\d+$/);
    if (!m) return;

    const matchId = m[1];
    const defKey = m[2];

    syncSubMatchPlayersToMemory(matchId, defKey);
    markUnsaved(matchId, defKey);
  };
});

  document.querySelectorAll("[data-score-select='true']").forEach(sel => {
  sel.onchange = () => {
    if (!isAdmin) return;

    const matchId = sel.getAttribute("data-match-id");
    const defKey = sel.getAttribute("data-def-key");
    const value = sel.value;

    const target = tournamentData.groupMatches?.[matchId]?.matches?.[defKey];
    if (!target) return;

    syncSubMatchPlayersToMemory(matchId, defKey);

    if (!value) {
      target.setScoreA = 0;
      target.setScoreB = 0;
    } else {
      const [a, b] = value.split(":").map(Number);
      target.setScoreA = a;
      target.setScoreB = b;
    }

    const computed = computeMatchAggregate(tournamentData.groupMatches[matchId]);
    tournamentData.groupMatches[matchId] = computed;

    markUnsaved(matchId, defKey);
    markUnsavedScore(matchId, defKey);
  };
});

  if (isAdmin) {
    document.querySelectorAll("[data-subsave-id]").forEach(btn => {
      btn.onclick = () => {
        const matchId = btn.getAttribute("data-subsave-id");
        const defKey = btn.getAttribute("data-def-key");
        saveSingleSubMatch(matchId, defKey);
      };
    });
  }
}


function syncSubMatchPlayersToMemory(matchId, defKey) {
  const match = tournamentData.groupMatches?.[matchId];
  if (!match) return;

  const def = MATCH_TYPES.find(x => x.key === defKey);
  if (!def) return;

  const sub = match.matches?.[defKey];
  if (!sub) return;

  const teamAPlayers = [];
  const teamBPlayers = [];

  for (let i = 0; i < def.count; i++) {
    const aSel = document.querySelector(`[name="${matchId}_${def.key}_A_${i}"]`);
    const bSel = document.querySelector(`[name="${matchId}_${def.key}_B_${i}"]`);

    if (aSel && aSel.value) teamAPlayers.push(aSel.value);
    if (bSel && bSel.value) teamBPlayers.push(bSel.value);
  }

  sub.teamAPlayers = teamAPlayers;
  sub.teamBPlayers = teamBPlayers;
}

   function readSingleSubMatchInputs(matchId, defKey) {
  const original = tournamentData.groupMatches[matchId];
  const cloned = JSON.parse(JSON.stringify(original));
  const def = MATCH_TYPES.find(x => x.key === defKey);
  if (!def) throw new Error("대진 정보를 찾을 수 없습니다.");

  const sub = cloned.matches[defKey];
  const teamAPlayers = [];
  const teamBPlayers = [];

  for (let i = 0; i < def.count; i++) {
    const aSel = document.querySelector(`[name="${matchId}_${def.key}_A_${i}"]`);
    const bSel = document.querySelector(`[name="${matchId}_${def.key}_B_${i}"]`);

    if (aSel && aSel.value) teamAPlayers.push(aSel.value);
    if (bSel && bSel.value) teamBPlayers.push(bSel.value);
  }

  sub.teamAPlayers = teamAPlayers;
  sub.teamBPlayers = teamBPlayers;

  return cloned;
}

async function saveSingleSubMatch(matchId, defKey) {
  try {
    const cloned = readSingleSubMatchInputs(matchId, defKey);
    const liveSub = tournamentData.groupMatches?.[matchId]?.matches?.[defKey];

    if (!liveSub) {
      throw new Error("저장할 경기 정보가 없습니다.");
    }

    cloned.matches[defKey].setScoreA = Number(liveSub.setScoreA || 0);
    cloned.matches[defKey].setScoreB = Number(liveSub.setScoreB || 0);

    const def = MATCH_TYPES.find(x => x.key === defKey);

if (
  cloned.matches[defKey].teamAPlayers.length !== def.count ||
  cloned.matches[defKey].teamBPlayers.length !== def.count
) {
  throw new Error("선수 선택을 모두 완료한 뒤 저장해 주세요.");
}if (!cloned.matches[defKey].teamAPlayers.length || !cloned.matches[defKey].teamBPlayers.length) {
      throw new Error("양 팀 선수 선택 후 저장해 주세요.");
    }

    const finalComputed = computeMatchAggregate(cloned);

    await update(
      ref(db, `tournaments/${tournamentId}/groupMatches/${matchId}`),
      finalComputed
    );

    tournamentData.groupMatches[matchId] = finalComputed;
renderCurrentView();

setTimeout(() => {
  clearUnsaved(matchId, defKey);
  clearUnsavedScore(matchId, defKey);
}, 50);

alert("저장되었습니다.");
  } catch (err) {
    console.error(err);
    alert(err.message || "저장 중 오류가 발생했습니다.");
  }
}



    function makeEmptySubMatches() {
      const result = {};

      MATCH_TYPES.forEach(def => {
        result[def.key] = {
          order: Number(def.key.replace("m", "")),
          type: def.name,
          teamAPlayers: [],
          teamBPlayers: [],
          winner: "",
          setScoreA: 0,
          setScoreB: 0
        };
      });

      return result;
    }

      }

        console.error(err);

      }
    }

    function compareStandingRows(x, y) {
  if (y.win !== x.win) return y.win - x.win;
  if (y.setDiff !== x.setDiff) return y.setDiff - x.setDiff;
  return 0;
}

    function getTieKey(row) {
  return `${row.win}|${row.setDiff}`;
}

function buildTieGroups(rows) {
  const groups = [];
  let current = [];

  rows.forEach((row, idx) => {
    if (idx === 0) {
      current = [row];
      return;
    }

    const prev = rows[idx - 1];
    if (getTieKey(prev) === getTieKey(row)) {
      current.push(row);
    } else {
      groups.push(current);
      current = [row];
    }
  });

  if (current.length) groups.push(current);
  return groups;
}

   function applyDisplayRanks(rows) {
  let currentRank = 1;

  rows.forEach((row, idx) => {
    if (idx === 0) {
      row.displayRank = 1;
      return;
    }

    const prev = rows[idx - 1];
    if (getTieKey(prev) === getTieKey(row)) {
      row.displayRank = currentRank;
    } else {
      currentRank = idx + 1;
      row.displayRank = currentRank;
    }
  });

  return rows;
}

    function computeStandings(groupName) {
      const groupTeamIds = tournamentData.groups?.[groupName] || [];
      const matches = getGroupMatches(groupName);

      const stats = {};
      groupTeamIds.forEach(teamId => {
        const team = getTeam(teamId);
        stats[teamId] = {
          teamId,
          teamName: team?.name || teamId,
          win: 0,
          lose: 0,
          matchScoreFor: 0,
          matchScoreAgainst: 0,
          setDiff: 0,
          headToHead: {}
        };
      });

      matches.forEach(match => {
        if (match.status !== "done") return;

        const a = match.teamA;
        const b = match.teamB;
        const scoreA = Number(match.teamMatchScoreA || 0);
        const scoreB = Number(match.teamMatchScoreB || 0);
        const setDiffA = Number(match.setDiffA || 0);
        const setDiffB = Number(match.setDiffB || 0);

        if (!stats[a] || !stats[b]) return;

        stats[a].matchScoreFor += scoreA;
        stats[a].matchScoreAgainst += scoreB;
        stats[a].setDiff += setDiffA;

        stats[b].matchScoreFor += scoreB;
        stats[b].matchScoreAgainst += scoreA;
        stats[b].setDiff += setDiffB;

        if (scoreA > scoreB) {
          stats[a].win += 1;
          stats[b].lose += 1;
          stats[a].headToHead[b] = 1;
          stats[b].headToHead[a] = -1;
        } else if (scoreB > scoreA) {
          stats[b].win += 1;
          stats[a].lose += 1;
          stats[b].headToHead[a] = 1;
          stats[a].headToHead[b] = -1;
        }
      });

      const arr = Object.values(stats);
      arr.sort(compareStandingRows);
      return applyDisplayRanks(arr);
    }

    function getManualSelection(groupName) {
      return tournamentData?.groupAdvancers?.[groupName] || {};
    }

    function needsManualAdvancerSelection(rows) {
  if (!rows || rows.length < 2) return false;

  // 1위가 2팀 이상 공동이면 수동 선택 필요
  if (rows[0].displayRank === rows[1].displayRank) return true;

  // 2위가 공동이면 역시 수동 선택 필요
  if (rows.length >= 3 && rows[1].displayRank === rows[2].displayRank) return true;

  return false;
}

    function getManualCandidates(rows) {
  if (!rows || !rows.length) return [];

  const candidates = [];
  const firstRank = rows[0].displayRank;

  rows.forEach(row => {
    if (row.displayRank === firstRank || row.displayRank === 2) {
      candidates.push(row);
    }
  });

  // 중복 제거
  return candidates.filter((row, idx, arr) =>
    arr.findIndex(x => x.teamId === row.teamId) === idx
  );
}

    function renderAdvancerControls() {
      const groups = ["A", "B"];
      const cards = [];

      groups.forEach(groupName => {
        const rows = computeStandings(groupName);
        if (!needsManualAdvancerSelection(rows)) return;

        const candidates = getManualCandidates(rows);
        const saved = getManualSelection(groupName);

        cards.push(`
          <div class="advancer-card">
            <h4>${groupName}조 본선 진출팀 확정</h4>
            <div class="advancer-desc">오프라인 추첨을 마친 뒤 1위와 2위를 차례로 선택해 주세요.
예선 표시는 공동순위 그대로 유지되고, 여기서 선택한 결과만 4강 생성에 반영됩니다.</div>

            <div class="advancer-line">
              <div class="advancer-label">1위 선택</div>
              <div class="team-pick-row">
                ${candidates.map(row => `
                  <button type="button" class="team-pick ${saved.firstTeamId === row.teamId ? "active" : ""}" data-adv-group="${groupName}" data-adv-rank="first" data-team-id="${row.teamId}">${escapeHtml(row.teamName)}</button>
                `).join("")}
              </div>
            </div>

            <div class="advancer-line">
              <div class="advancer-label">2위 선택</div>
              <div class="team-pick-row">
                ${candidates.map(row => `
                  <button type="button" class="team-pick ${saved.secondTeamId === row.teamId ? "active" : ""}" data-adv-group="${groupName}" data-adv-rank="second" data-team-id="${row.teamId}" ${saved.firstTeamId === row.teamId ? "disabled" : ""}>${escapeHtml(row.teamName)}</button>
                `).join("")}
              </div>
            </div>

            <div class="advancer-actions">
              <button type="button" class="advancer-save" data-save-advancers="${groupName}">저장</button>
            </div>

            <div class="advancer-current">현재 저장값
1위: ${escapeHtml(getTeam(saved.firstTeamId)?.name || "-")}
2위: ${escapeHtml(getTeam(saved.secondTeamId)?.name || "-")}</div>
          </div>
        `);
      });

      advancerArea.innerHTML = cards.length
        ? cards.join("")
        : `<div class="empty" style="grid-column:1 / -1;">현재는 공동순위로 인해 별도 추첨 입력이 필요한 조가 없습니다.</div>`;
    }

    async function saveGroupAdvancers(groupName) {
      if (!isAdmin) {
        alert("관리자만 저장할 수 있습니다.");
        return;
      }

      const wrap = advancerArea.querySelector(`.advancer-card button[data-save-advancers="${groupName}"]`)?.closest('.advancer-card') || advancerArea;
      const firstBtn = wrap.querySelector(`.team-pick[data-adv-group="${groupName}"][data-adv-rank="first"].active`);
      const secondBtn = wrap.querySelector(`.team-pick[data-adv-group="${groupName}"][data-adv-rank="second"].active`);

      const firstTeamId = firstBtn?.getAttribute('data-team-id') || "";
      const secondTeamId = secondBtn?.getAttribute('data-team-id') || "";

      if (!firstTeamId || !secondTeamId) {
        alert(`${groupName}조 1위와 2위를 모두 선택해 주세요.`);
        return;
      }
      if (firstTeamId === secondTeamId) {
        alert("같은 팀을 1위와 2위로 동시에 선택할 수 없습니다.");
        return;
      }

      try {
        await update(ref(db, `tournaments/${tournamentId}/groupAdvancers/${groupName}`), {
          firstTeamId,
          secondTeamId
        });

        tournamentData.groupAdvancers = tournamentData.groupAdvancers || {};
        tournamentData.groupAdvancers[groupName] = { firstTeamId, secondTeamId };
        renderStandings();
        alert(`${groupName}조 본선 진출팀이 저장되었습니다.`);
      } catch (err) {
        console.error(err);
        alert(err.message || "본선 진출팀 저장 중 오류가 발생했습니다.");
      }
    }

    function renderStandings() {
      renderStandingTable("A", standingA);
      renderStandingTable("B", standingB);
      renderAdvancerControls();
    }

    function renderStandingTable(groupName, tbody) {
      const rows = computeStandings(groupName);
      tbody.innerHTML = "";

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="5">데이터 없음</td></tr>`;
        return;
      }

      rows.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
  <td>${row.displayRank}</td>
  <td>${escapeHtml(row.teamName)}</td>
  <td>${row.win}</td>
  <td>${row.lose}</td>
  <td>${row.setDiff}</td>
`;
        tbody.appendChild(tr);
      });
    }

    function renderCurrentView() {
      tabA.classList.toggle("active", currentGroup === "A");
      tabB.classList.toggle("active", currentGroup === "B");
      tabStandings.classList.remove("active");

      groupSection.style.display = "";
      standingsSection.style.display = "none";

      renderGroupMatches();
      renderStandings();
      setAdminStatusText();
    }

    function showStandingsView() {
      tabA.classList.remove("active");
      tabB.classList.remove("active");
      tabStandings.classList.add("active");

      groupSection.style.display = "none";
      standingsSection.style.display = "";
      renderStandings();
      setAdminStatusText();
    }

    function bindTopEvents() {
      btnRefresh.addEventListener("click", () => loadTournament());

      btnToggleAdmin.addEventListener("click", () => {
        if (isAdmin) {
          isAdmin = false;
          localStorage.removeItem(ADMIN_STORAGE_KEY);
          openMatchId = null;
          renderCurrentView();
          return;
        }

        const input = prompt("관리자 비밀번호를 입력하세요.");
        if (input === null) return;

        const { admin } = getPasswordConfig();
        if (input === admin) {
          isAdmin = true;
          localStorage.setItem(ADMIN_STORAGE_KEY, "true");
          renderCurrentView();
        } else {
          alert("비밀번호가 올바르지 않습니다.");
        }
      });

      btnResetAllResults.addEventListener("click", resetAllGroupResults);

      btnTournamentPage.addEventListener("click", () => {
        const target = `../game_live_tournament/`;
        location.href = target;
      });

      tabA.addEventListener("click", () => {
        currentGroup = "A";
        renderCurrentView();
      });

      tabB.addEventListener("click", () => {
        currentGroup = "B";
        renderCurrentView();
      });

      tabStandings.addEventListener("click", () => {
        showStandingsView();
      });
    }

    function applyMeta() {
  const meta = tournamentData?.meta || {};
  const dateText =
    meta.startDate && meta.endDate
      ? (meta.startDate === meta.endDate
          ? meta.startDate
          : `${meta.startDate} ~ ${meta.endDate}`)
      : (meta.startDate || meta.endDate || meta.date || "-");

  pageTitle.textContent = meta.title || "조별리그 진행";
  pageSub.textContent =
    dateText !== "-"
      ? `${dateText} 조별리그 운영 화면`
      : "조별리그 운영 화면";

  metaStatus.textContent =
    `대회명: ${meta.title || "-"}\n대회일자: ${dateText}\n대회 ID: ${tournamentId}`;
}

    advancerArea.addEventListener("click", (event) => {
      const pickBtn = event.target.closest(".team-pick");
      if (pickBtn) {
        if (!isAdmin) {
          alert("관리자만 선택할 수 있습니다.");
          return;
        }
        if (pickBtn.disabled) return;

        const groupName = pickBtn.getAttribute("data-adv-group");
        const rankType = pickBtn.getAttribute("data-adv-rank");
        const card = pickBtn.closest(".advancer-card");

        card.querySelectorAll(`.team-pick[data-adv-group="${groupName}"][data-adv-rank="${rankType}"]`).forEach(btn => {
          btn.classList.toggle("active", btn === pickBtn);
        });

        const firstActive = card.querySelector(`.team-pick[data-adv-group="${groupName}"][data-adv-rank="first"].active`);
        const firstTeamId = firstActive?.getAttribute("data-team-id") || "";

        card.querySelectorAll(`.team-pick[data-adv-group="${groupName}"][data-adv-rank="second"]`).forEach(btn => {
          const disabled = !!firstTeamId && btn.getAttribute("data-team-id") === firstTeamId;
          btn.disabled = disabled;
          if (disabled) btn.classList.remove("active");
        });
        return;
      }

      const saveBtn = event.target.closest("[data-save-advancers]");
      if (saveBtn) {
        saveGroupAdvancers(saveBtn.getAttribute("data-save-advancers"));
      }
    });

    async function loadTournament() {
      try {
        if (!tournamentId) {
          tournamentId = await resolveTournamentId();
        }

        if (!tournamentId) {
          metaStatus.textContent = "불러올 대회 ID가 없습니다.";
          matchList.innerHTML = `<div class="empty">대회 데이터를 찾을 수 없습니다.</div>`;
          return;
        }

        const snap = await get(ref(db, `tournaments/${tournamentId}`));
        if (!snap.exists()) {
          metaStatus.textContent = `대회 데이터를 찾을 수 없습니다.\nID: ${tournamentId}`;
          matchList.innerHTML = `<div class="empty">대회 데이터가 존재하지 않습니다.</div>`;
          return;
        }

        tournamentData = snap.val();
       
        applyMeta();
        renderCurrentView();
        bindRealtime();
      } catch (err) {
        console.error(err);
        metaStatus.textContent = `불러오기 실패\n${err.message || err}`;
      }
    }

    let realtimeBound = false;
    function bindRealtime() {
      if (realtimeBound) return;
      realtimeBound = true;

      const dataRef = ref(db, `tournaments/${tournamentId}`);
      onValue(dataRef, snap => {
        if (!snap.exists()) return;
        tournamentData = snap.val();
        applyMeta();

        if (tabStandings.classList.contains("active")) {
          showStandingsView();
        } else {
          renderCurrentView();
        }
      });
    }

    const cheerRef = ref(db, "cheers/group");

function addCheer(){
  const name = document.getElementById("cheerName").value.trim();
  const msg = document.getElementById("cheerMsg").value.trim();

  if(!name || !msg){
    alert("닉네임 / 내용을 입력하세요");
    return;
  }

  push(cheerRef, {
    name,
    msg,
    time: Date.now()
  });

  document.getElementById("cheerMsg").value = "";
}

onValue(cheerRef, snap => {
  const list = document.getElementById("cheerList");
  list.innerHTML = "";

  const data = snap.val();
  if(!data) return;

  Object.entries(data)
    .sort((a,b)=> b[1].time - a[1].time)
    .forEach(([key,val])=>{
      const div = document.createElement("div");
      div.style.padding="6px";
      div.style.borderBottom="1px solid #eee";

      let adminBtn = "";
      if(isAdmin){
        adminBtn = `<span style="color:red; cursor:pointer;" onclick="delCheer('${key}')">삭제</span>`;
      }

      div.innerHTML = `
        <b>${val.name}</b> : ${val.msg}
        ${adminBtn}
      `;

      list.appendChild(div);
    });
});

function delCheer(key){
  if(confirm("삭제할까요?")){
    remove(ref(db, "cheers/group/"+key));
  }
}

    bindTopEvents();
    loadTournament();
