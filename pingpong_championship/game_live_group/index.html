<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조별리그 진행 - 남동노조위원장기 탁구대회</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d9e2ec;
      --text:#1f2933;
      --muted:#52606d;
      --primary:#1565c0;
      --primary-dark:#0d47a1;
      --green:#2e7d32;
      --red:#c62828;
      --orange:#ef6c00;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, "Malgun Gothic", sans-serif;
    }
    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:14px;
    }
    h1,h2,h3,h4{margin:0 0 10px}
    .topbar{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .title-area{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .title-area small{
      color:var(--muted);
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    button{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
      font-weight:700;
    }
    button:hover{background:var(--primary-dark)}
    button.secondary{background:#607d8b}
    button.green{background:var(--green)}
    button.orange{background:var(--orange)}
    button.red{background:var(--red)}
    button.ghost{
      background:#edf4ff;
      color:#0d47a1;
      border:1px solid #c8dcff;
    }
    button.disabled-look{
      opacity:.55;
      cursor:not-allowed;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
    }

    .status-box{
      padding:12px;
      border-radius:12px;
      border:1px solid #d8e6fb;
      background:#f8fbff;
      white-space:pre-line;
      font-size:14px;
    }

    .chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .chip{
      border:1px solid #cfd8e3;
      background:#fff;
      color:#334e68;
      padding:8px 12px;
      border-radius:999px;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
    }
    .chip.active{
      background:#e8f1ff;
      border-color:#b6d0ff;
      color:#0d47a1;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .match-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .match-card{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }

    .summary-btn{
      width:100%;
      text-align:left;
      padding:12px 14px;
      background:#fff;
      color:var(--text);
      border:none;
      border-bottom:1px solid transparent;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:700;
    }
    .summary-btn:hover{
      background:#f9fbff;
    }
    .summary-left{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      line-height:1.45;
    }
    .summary-left .muted{
      color:var(--muted);
      font-weight:600;
    }
    .summary-right{
      color:var(--primary-dark);
      white-space:nowrap;
      font-size:13px;
    }

    .detail-panel{
      display:none;
      padding:14px;
      border-top:1px solid var(--line);
      background:#fbfdff;
    }
    .detail-panel.open{
      display:block;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:12px;
    }

    .mini-box{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:12px;
    }

    .player-list{
  margin:0;
  padding-left:0;
  list-style:none;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px 10px;
}
.player-list li{
  margin:0;
  font-size:14px;
  line-height:1.4;
  padding:4px 6px;
  border-radius:8px;
  background:#f7fafc;
}

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
      background:#fff;
    }
    th, td{
      border:1px solid var(--line);
      padding:8px;
      text-align:center;
      vertical-align:middle;
    }
    th{
      background:#f7fafc;
      font-weight:700;
      white-space:nowrap;
    }

    select, input[type="number"]{
      width:100%;
      border:1px solid #cbd2d9;
      border-radius:10px;
      padding:8px;
      font-size:14px;
      background:#fff;
    }

    .readonly-text{
      font-size:14px;
      line-height:1.4;
      min-width:90px;
    }

    .sub-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:flex-end;
      margin-top:12px;
    }

    .result-bar{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }
    .result-item{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px;
      text-align:center;
    }
    .result-item .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      font-weight:700;
    }
    .result-item .value{
      font-size:18px;
      font-weight:800;
    }

    .standings-wrap{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
    }

    .empty{
      color:var(--muted);
      text-align:center;
      padding:22px 10px;
      border:1px dashed #cbd2d9;
      border-radius:12px;
      background:#fff;
    }

    .footer-note{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
    }

    @media (max-width: 768px){
  .wrap{
    padding:8px;
  }

  .topbar{
    gap:8px;
    margin-bottom:10px;
  }

  .title-area h1{
    font-size:20px;
    line-height:1.3;
  }

  .title-area small{
    font-size:12px;
  }

  .card{
    padding:10px;
    margin-bottom:10px;
    border-radius:12px;
    box-shadow:none;
  }

  .meta-grid,
  .detail-grid,
  .standings-wrap{
    grid-template-columns:1fr;
    gap:10px;
  }

  .actions{
    width:100%;
    flex-direction:column;
    gap:6px;
  }

  .actions button{
    width:100%;
    padding:9px 10px;
    font-size:13px;
  }

  .chip-row{
    gap:6px;
    margin-top:8px;
  }

  .chip{
    padding:7px 10px;
    font-size:12px;
  }

  .section-title{
    display:block;
    margin-bottom:8px;
  }

  .section-title h2{
    font-size:18px;
    margin-bottom:4px;
  }

  .match-list{
    gap:8px;
  }

  .match-card{
    border-radius:10px;
    box-shadow:none;
  }

  .summary-btn{
    padding:10px;
    gap:8px;
    align-items:flex-start;
  }

  .summary-left{
    display:block;
    line-height:1.45;
    font-size:13px;
    flex:1;
    min-width:0;
  }

  .summary-right{
    font-size:12px;
    white-space:nowrap;
  }

  .detail-panel{
    padding:10px;
  }

  .mini-box{
    padding:8px 10px;
    border-radius:10px;
    box-shadow:none;
  }

  .mini-box h4{
    font-size:14px;
    margin-bottom:6px;
  }

  .player-list{
    padding-left:16px;
  }

  .player-list li{
    font-size:13px;
    margin:3px 0;
  }

  .table-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }

  table{
    min-width:720px;
    font-size:12px;
  }

  th, td{
    padding:6px;
  }

  select,
  input[type="number"]{
    padding:7px 8px;
    font-size:13px;
    border-radius:8px;
  }

  .readonly-text{
    font-size:12px;
    min-width:70px;
  }

  .result-bar{
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
  }

  .result-item{
    padding:8px;
    border-radius:10px;
  }

  .result-item .label{
    font-size:11px;
    margin-bottom:4px;
  }

  .result-item .value{
    font-size:16px;
  }

  .sub-actions{
    gap:6px;
    margin-top:10px;
  }

  .sub-actions button{
    width:100%;
    padding:9px 10px;
    font-size:13px;
  }

  .status-box{
    padding:10px;
    border-radius:10px;
    font-size:13px;
  }

  .empty{
    padding:16px 10px;
    border-radius:10px;
    font-size:13px;
  }

  .hint,
  .footer-note{
    font-size:11px;
  }
}

.score-inputs{
  display:grid;
  grid-template-columns:48px 16px 48px;
  justify-content:center;
  align-items:center;
  gap:4px;
}
.score-inputs input{
  text-align:center;
  padding:6px 4px;
}
.score-sep{
  text-align:center;
  font-weight:700;
  color:var(--muted);
}
@media (max-width: 768px){
  .player-list{
    grid-template-columns:1fr 1fr;
    gap:4px 8px;
  }

  .player-list li{
    font-size:12px;
    padding:4px 5px;
  }

  .table-wrap{
    overflow:visible;
  }

  .match-input-table{
    width:100%;
    min-width:0;
    display:block;
    background:transparent;
  }

  .match-input-table thead{
    display:none;
  }

  .match-input-table tbody{
    display:block;
  }

  .match-input-table tr{
    display:block;
    margin-bottom:8px;
    padding:8px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
  }

  .match-input-table td{
    display:block;
    width:100%;
    border:none;
    border-bottom:1px dashed #e1e8f0;
    padding:6px 4px;
    text-align:left;
  }

  .match-input-table td:last-child{
    border-bottom:none;
  }

  .match-input-table td::before{
    content:attr(data-label);
    display:block;
    margin-bottom:4px;
    font-size:11px;
    font-weight:700;
    color:var(--muted);
  }

  .match-input-table td[data-label="종목"]{
    font-weight:700;
    color:var(--primary-dark);
    background:#f8fbff;
    border-radius:8px;
    padding:8px;
    margin-bottom:4px;
  }

  .match-input-table td[data-label="종목"]::before{
    margin-bottom:2px;
  }

  .score-inputs{
    grid-template-columns:42px 14px 42px;
    justify-content:start;
  }

  .score-inputs input{
    font-size:12px;
    padding:5px 4px;
  }

  select{
    font-size:12px;
    padding:6px 7px;
  }

  .readonly-text{
    font-size:12px;
    min-width:0;
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-area">
        <h1 id="pageTitle">조별리그 진행</h1>
        <small id="pageSub">대회 정보를 불러오는 중입니다.</small>
      </div>
      <div class="actions">
        <button type="button" class="secondary" id="btnRefresh">새로고침</button>
        <button type="button" class="ghost" id="btnToggleAdmin">관리자 잠금해제</button>
        <button type="button" class="red" id="btnResetAllResults" style="display:none;">전체 경기결과 초기화</button>
        <button type="button" class="green" id="btnTournamentPage">토너먼트 페이지</button>
      </div>
    </div>

    <div class="card">
      <div class="meta-grid">
        <div>
          <h2>대회 정보</h2>
          <div class="status-box" id="metaStatus">대회 데이터를 불러오는 중입니다...</div>
        </div>
        <div>
          <h2>현재 상태</h2>
          <div class="status-box" id="adminStatus">관전자 모드입니다.</div>
          <div class="chip-row" style="margin-top:12px;">
            <button type="button" class="chip active" id="tabA">A조</button>
            <button type="button" class="chip" id="tabB">B조</button>
            <button type="button" class="chip" id="tabStandings">조순위</button>
          </div>
        </div>
      </div>
    </div>

    <section class="card" id="groupSection">
      <div class="section-title">
        <h2 id="groupTitle">A조 경기</h2>
        <div class="hint">한줄요약을 누르면 해당 경기만 펼쳐집니다.</div>
      </div>
      <div id="matchList" class="match-list"></div>
    </section>

    <section class="card" id="standingsSection" style="display:none;">
      <div class="section-title">
        <h2>조순위</h2>
        <div class="hint">정렬 기준: 승수 → 세트득실 → 승자승</div>
      </div>
      <div class="standings-wrap">
        <div>
          <h3>A조</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>순위</th>
                  <th>팀</th>
                  <th>승</th>
                  <th>패</th>
                  <th>단체전득점</th>
                  <th>단체전실점</th>
                  <th>세트득실</th>
                </tr>
              </thead>
              <tbody id="standingA"></tbody>
            </table>
          </div>
        </div>
        <div>
          <h3>B조</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>순위</th>
                  <th>팀</th>
                  <th>승</th>
                  <th>패</th>
                  <th>단체전득점</th>
                  <th>단체전실점</th>
                  <th>세트득실</th>
                </tr>
              </thead>
              <tbody id="standingB"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="footer-note">토너먼트 페이지에서는 각 조 1, 2위를 읽어 4강 대진을 생성하면 됩니다.</div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpXivPM_KJlY8yN1X0_oQH8P-MpyOwNo8",
      authDomain: "koen-championship.firebaseapp.com",
      projectId: "koen-championship",
      storageBucket: "koen-championship.firebasestorage.app",
      messagingSenderId: "652507559896",
      appId: "1:652507559896:web:9bf6bf5c97f4b4dbb024ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, "https://koen-championship-default-rtdb.asia-southeast1.firebasedatabase.app");

    const ADMIN_STORAGE_KEY = "koen_group_admin_unlocked";
    const ADMIN_PASSWORD = "1111";

    const MATCH_TYPES = [
      { key: "m1", name: "여자복식", count: 2 },
      { key: "m2", name: "남자복식", count: 2 },
      { key: "m3", name: "남자복식", count: 2 },
      { key: "m4", name: "여자단식", count: 1 },
      { key: "m5", name: "남자단식", count: 1 }
    ];

    let tournamentId = "";
    let tournamentData = null;
    let currentGroup = "A";
    let openMatchId = null;
    let isAdmin = localStorage.getItem(ADMIN_STORAGE_KEY) === "true";

    const pageTitle = document.getElementById("pageTitle");
    const pageSub = document.getElementById("pageSub");
    const metaStatus = document.getElementById("metaStatus");
    const adminStatus = document.getElementById("adminStatus");

    const btnRefresh = document.getElementById("btnRefresh");
    const btnToggleAdmin = document.getElementById("btnToggleAdmin");
    const btnResetAllResults = document.getElementById("btnResetAllResults");
    const btnTournamentPage = document.getElementById("btnTournamentPage");

    const tabA = document.getElementById("tabA");
    const tabB = document.getElementById("tabB");
    const tabStandings = document.getElementById("tabStandings");

    const groupSection = document.getElementById("groupSection");
    const standingsSection = document.getElementById("standingsSection");
    const groupTitle = document.getElementById("groupTitle");
    const matchList = document.getElementById("matchList");

    const standingA = document.getElementById("standingA");
    const standingB = document.getElementById("standingB");

    function qs(name) {
      return new URLSearchParams(location.search).get(name);
    }

    async function resolveTournamentId() {
      const fromQuery = qs("tournamentId");
      if (fromQuery) return fromQuery;

      const localSaved = localStorage.getItem("currentTournamentId");
      if (localSaved) return localSaved;

      const snap = await get(ref(db, "currentTournamentId"));
      if (snap.exists()) return snap.val();

      return "";
    }

    function setAdminStatusText() {
      if (isAdmin) {
        adminStatus.textContent = "관리자 모드입니다. 선수 선택, 점수 입력, 저장이 가능합니다.";
        btnToggleAdmin.textContent = "관리자 잠금해제 해제";
        btnResetAllResults.style.display = "";
      } else {
        adminStatus.textContent = "관전자 모드입니다. 상세 결과 조회만 가능합니다.";
        btnToggleAdmin.textContent = "관리자 잠금해제";
        btnResetAllResults.style.display = "none";
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getTeam(teamId) {
      return tournamentData?.teams?.[teamId] || null;
    }

    function getAllPlayers(teamId) {
      const team = getTeam(teamId);
      if (!team) return [];
      if (Array.isArray(team.allPlayers) && team.allPlayers.length) return team.allPlayers;
      return [...(team.men || []), ...(team.women || [])];
    }

    function getSelectablePlayers(teamId, matchTypeName) {
      const team = getTeam(teamId);
      if (!team) return [];

      const men = Array.isArray(team.men) ? team.men : [];
      const women = Array.isArray(team.women) ? team.women : [];

      if (matchTypeName.includes("여자")) return women;
      if (matchTypeName.includes("남자")) return men;

      return [...men, ...women];
    }

    function getGroupMatches(groupName) {
      const all = Object.values(tournamentData?.groupMatches || {});
      return all
        .filter(m => m.group === groupName)
        .sort((a, b) => (a.order || 0) - (b.order || 0));
    }

    function getSummaryText(match) {
      const scoreA = Number(match.teamMatchScoreA || 0);
      const scoreB = Number(match.teamMatchScoreB || 0);
      const hasAny = Object.values(match.matches || {}).some(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);
        return (a > 0 || b > 0) || (m.winner && m.winner !== "");
      });

      let state = "경기전";
      if (hasAny) state = "진행중";
      if (match.status === "done") state = "종료";

      let resultPart = state;
      if (hasAny) resultPart = `${scoreA} : ${scoreB} | ${state}`;

      return `${match.group}조 ${match.order}경기 | ${match.teamAName} vs ${match.teamBName} | ${resultPart}`;
    }

    function computeMatchAggregate(matchObj) {
      const cloned = JSON.parse(JSON.stringify(matchObj));
      const subMatches = cloned.matches || {};
      let teamScoreA = 0;
      let teamScoreB = 0;
      let setDiffA = 0;
      let setDiffB = 0;

      Object.values(subMatches).forEach(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);

        if (!Number.isNaN(a) && !Number.isNaN(b) && (a > 0 || b > 0)) {
          setDiffA += (a - b);
          setDiffB += (b - a);

          if (a > b) {
            m.winner = "A";
            teamScoreA += 1;
          } else if (b > a) {
            m.winner = "B";
            teamScoreB += 1;
          } else {
            m.winner = "";
          }
        } else {
          m.winner = "";
        }
      });

      cloned.teamMatchScoreA = teamScoreA;
      cloned.teamMatchScoreB = teamScoreB;
      cloned.setDiffA = setDiffA;
      cloned.setDiffB = setDiffB;

      if (teamScoreA > teamScoreB) cloned.winnerTeamId = cloned.teamA;
      else if (teamScoreB > teamScoreA) cloned.winnerTeamId = cloned.teamB;
      else cloned.winnerTeamId = "";

      const allFilled = Object.values(subMatches).every(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);
        return (a > 0 || b > 0) && a !== b;
      });

      cloned.status = allFilled
        ? "done"
        : (teamScoreA > 0 || teamScoreB > 0 || setDiffA !== 0 || setDiffB !== 0 ? "playing" : "ready");

      return cloned;
    }

    function createPlayerSelectHtml(teamId, matchTypeName, selectedValue, selectCount, inputNameBase, disabled) {
      const players = getSelectablePlayers(teamId, matchTypeName);
      let html = "";

      for (let i = 0; i < selectCount; i++) {
        const current = Array.isArray(selectedValue)
          ? (selectedValue[i] || "")
          : (i === 0 ? (selectedValue || "") : "");

        html += `
          <select name="${inputNameBase}_${i}" ${disabled ? "disabled" : ""}>
            <option value="">선택</option>
            ${players.map(p => `
              <option value="${escapeHtml(p)}" ${current === p ? "selected" : ""}>
                ${escapeHtml(p)}
              </option>
            `).join("")}
          </select>
        `;
      }
      return html;
    }

    function playerText(arr) {
      if (!Array.isArray(arr) || !arr.length) return "-";
      return arr.join(", ");
    }

    function renderReadonlyPlayerCell(players) {
      return `<div class="readonly-text">${escapeHtml(playerText(players))}</div>`;
    }

    function renderEditablePlayerCell(teamId, matchTypeName, players, count, baseName) {
      return createPlayerSelectHtml(teamId, matchTypeName, players, count, baseName, false);
    }

    function renderMatchCard(match) {
      const isOpen = openMatchId === match.id;
      const detailClass = isOpen ? "detail-panel open" : "detail-panel";

      const teamAPlayers = getAllPlayers(match.teamA);
      const teamBPlayers = getAllPlayers(match.teamB);

      const teamAList = teamAPlayers.map(name => `<li>${escapeHtml(name)}</li>`).join("");
      const teamBList = teamBPlayers.map(name => `<li>${escapeHtml(name)}</li>`).join("");

      const rows = MATCH_TYPES.map(def => {
        const sub = match.matches?.[def.key] || {
          type: def.name,
          teamAPlayers: [],
          teamBPlayers: [],
          setScoreA: 0,
          setScoreB: 0,
          winner: ""
        };

        const winnerText = sub.winner === "A"
          ? match.teamAName
          : sub.winner === "B"
            ? match.teamBName
            : "-";

        const leftCell = isAdmin
          ? renderEditablePlayerCell(match.teamA, def.name, sub.teamAPlayers || [], def.count, `${match.id}_${def.key}_A`)
          : renderReadonlyPlayerCell(sub.teamAPlayers || []);

        const rightCell = isAdmin
          ? renderEditablePlayerCell(match.teamB, def.name, sub.teamBPlayers || [], def.count, `${match.id}_${def.key}_B`)
          : renderReadonlyPlayerCell(sub.teamBPlayers || []);

        const scoreCell = isAdmin
  ? `
    <div class="score-inputs">
      <input type="number" min="0" step="1" name="${match.id}_${def.key}_setA" value="${Number(sub.setScoreA || 0)}" />
      <span class="score-sep">:</span>
      <input type="number" min="0" step="1" name="${match.id}_${def.key}_setB" value="${Number(sub.setScoreB || 0)}" />
    </div>
  `
  : `<div class="readonly-text">${Number(sub.setScoreA || 0)} : ${Number(sub.setScoreB || 0)}</div>`;
        return `
  <tr>
    <td data-label="종목">${def.name}</td>
    <td data-label="${escapeHtml(match.teamAName)}">${leftCell}</td>
    <td data-label="세트 점수">${scoreCell}</td>
    <td data-label="${escapeHtml(match.teamBName)}">${rightCell}</td>
    <td data-label="승자">${escapeHtml(winnerText)}</td>
  </tr>
`;
      }).join("");

      const card = document.createElement("div");
      card.className = "match-card";
      card.innerHTML = `
        <button type="button" class="summary-btn" data-open-id="${escapeHtml(match.id)}">
          <div class="summary-left">
            <span>${escapeHtml(getSummaryText(match))}</span>
          </div>
          <div class="summary-right">${isOpen ? "▲ 접기" : "▼ 펼치기"}</div>
        </button>

        <div class="${detailClass}" id="detail_${escapeHtml(match.id)}">
          <div class="detail-grid">
            <div class="mini-box">
              <h4>${escapeHtml(match.teamAName)} 선수명단</h4>
              <ul class="player-list">${teamAList || "<li>-</li>"}</ul>
            </div>
            <div class="mini-box">
              <h4>${escapeHtml(match.teamBName)} 선수명단</h4>
              <ul class="player-list">${teamBList || "<li>-</li>"}</ul>
            </div>
          </div>

          <div class="table-wrap">
            <table class="match-input-table">
              <thead>
                <tr>
                  <th>종목</th>
                  <th>${escapeHtml(match.teamAName)}</th>
                  <th>세트 점수</th>
                  <th>${escapeHtml(match.teamBName)}</th>
                  <th>승자</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>

          <div class="result-bar">
            <div class="result-item">
              <div class="label">단체전 스코어</div>
              <div class="value">${Number(match.teamMatchScoreA || 0)} : ${Number(match.teamMatchScoreB || 0)}</div>
            </div>
            <div class="result-item">
              <div class="label">${escapeHtml(match.teamAName)} 세트득실</div>
              <div class="value">${Number(match.setDiffA || 0)}</div>
            </div>
            <div class="result-item">
              <div class="label">${escapeHtml(match.teamBName)} 세트득실</div>
              <div class="value">${Number(match.setDiffB || 0)}</div>
            </div>
            <div class="result-item">
              <div class="label">단체전 승리팀</div>
              <div class="value">${escapeHtml(match.winnerTeamId === match.teamA ? match.teamAName : match.winnerTeamId === match.teamB ? match.teamBName : "-")}</div>
            </div>
          </div>

          <div class="sub-actions">
            ${isAdmin ? `<button type="button" class="orange" data-preview-id="${escapeHtml(match.id)}">입력값 계산</button>` : ""}
            ${isAdmin ? `<button type="button" class="green" data-save-id="${escapeHtml(match.id)}">저장</button>` : ""}
          </div>
        </div>
      `;
      return card;
    }

    function renderGroupMatches() {
      const matches = getGroupMatches(currentGroup);
      groupTitle.textContent = `${currentGroup}조 경기`;
      matchList.innerHTML = "";

      if (!matches.length) {
        matchList.innerHTML = `<div class="empty">${currentGroup}조 경기가 없습니다.</div>`;
        return;
      }

      matches.forEach(match => {
        matchList.appendChild(renderMatchCard(match));
      });

      bindMatchCardEvents();
    }

    function bindMatchCardEvents() {
      document.querySelectorAll("[data-open-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-open-id");
          openMatchId = openMatchId === id ? null : id;
          renderCurrentView();
        });
      });

      if (isAdmin) {
        document.querySelectorAll("[data-preview-id]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-preview-id");
            previewMatch(id);
          });
        });

        document.querySelectorAll("[data-save-id]").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-save-id");
            saveMatch(id);
          });
        });
      }
    }

    function readMatchInputs(matchId) {
      const original = tournamentData.groupMatches[matchId];
      const cloned = JSON.parse(JSON.stringify(original));

      MATCH_TYPES.forEach(def => {
        const sub = cloned.matches[def.key];

        const teamAPlayers = [];
        const teamBPlayers = [];

        for (let i = 0; i < def.count; i++) {
          const aSel = document.querySelector(`[name="${matchId}_${def.key}_A_${i}"]`);
          const bSel = document.querySelector(`[name="${matchId}_${def.key}_B_${i}"]`);
          if (aSel && aSel.value) teamAPlayers.push(aSel.value);
          if (bSel && bSel.value) teamBPlayers.push(bSel.value);
        }

        const setAInput = document.querySelector(`[name="${matchId}_${def.key}_setA"]`);
        const setBInput = document.querySelector(`[name="${matchId}_${def.key}_setB"]`);

        sub.teamAPlayers = teamAPlayers;
        sub.teamBPlayers = teamBPlayers;
        sub.setScoreA = Number(setAInput?.value || 0);
        sub.setScoreB = Number(setBInput?.value || 0);
      });

      return computeMatchAggregate(cloned);
    }

    function previewMatch(matchId) {
      try {
        const computed = readMatchInputs(matchId);
        tournamentData.groupMatches[matchId] = computed;
        renderCurrentView();
      } catch (err) {
        console.error(err);
        alert(err.message || "계산 중 오류가 발생했습니다.");
      }
    }

    async function saveMatch(matchId) {
      try {
        const computed = readMatchInputs(matchId);

        await update(ref(db, `tournaments/${tournamentId}/groupMatches/${matchId}`), computed);
        tournamentData.groupMatches[matchId] = computed;

        renderCurrentView();
        alert("저장되었습니다.");
      } catch (err) {
        console.error(err);
        alert(err.message || "저장 중 오류가 발생했습니다.");
      }
    }

    function makeEmptySubMatches() {
      const result = {};

      MATCH_TYPES.forEach(def => {
        result[def.key] = {
          order: Number(def.key.replace("m", "")),
          type: def.name,
          teamAPlayers: [],
          teamBPlayers: [],
          winner: "",
          setScoreA: 0,
          setScoreB: 0
        };
      });

      return result;
    }

    async function resetAllGroupResults() {
      if (!isAdmin) return;

      const ok = confirm("조별리그 전체 경기결과를 모두 초기화하시겠습니까?");
      if (!ok) return;

      try {
        const updates = {};
        const allMatches = Object.values(tournamentData?.groupMatches || {});

        allMatches.forEach(match => {
          updates[`tournaments/${tournamentId}/groupMatches/${match.id}`] = {
            ...match,
            status: "ready",
            teamMatchScoreA: 0,
            teamMatchScoreB: 0,
            setDiffA: 0,
            setDiffB: 0,
            winnerTeamId: "",
            matches: makeEmptySubMatches()
          };
        });

        await update(ref(db), updates);

        Object.keys(tournamentData.groupMatches || {}).forEach(matchId => {
          const match = tournamentData.groupMatches[matchId];
          tournamentData.groupMatches[matchId] = {
            ...match,
            status: "ready",
            teamMatchScoreA: 0,
            teamMatchScoreB: 0,
            setDiffA: 0,
            setDiffB: 0,
            winnerTeamId: "",
            matches: makeEmptySubMatches()
          };
        });

        openMatchId = null;
        renderCurrentView();
        alert("전체 경기결과가 초기화되었습니다.");
      } catch (err) {
        console.error(err);
        alert(err.message || "초기화 중 오류가 발생했습니다.");
      }
    }

    function computeStandings(groupName) {
      const groupTeamIds = tournamentData.groups?.[groupName] || [];
      const matches = getGroupMatches(groupName);

      const stats = {};
      groupTeamIds.forEach(teamId => {
        const team = getTeam(teamId);
        stats[teamId] = {
          teamId,
          teamName: team?.name || teamId,
          win: 0,
          lose: 0,
          matchScoreFor: 0,
          matchScoreAgainst: 0,
          setDiff: 0,
          headToHead: {}
        };
      });

      matches.forEach(match => {
        if (match.status !== "done") return;

        const a = match.teamA;
        const b = match.teamB;
        const scoreA = Number(match.teamMatchScoreA || 0);
        const scoreB = Number(match.teamMatchScoreB || 0);
        const setDiffA = Number(match.setDiffA || 0);
        const setDiffB = Number(match.setDiffB || 0);

        if (!stats[a] || !stats[b]) return;

        stats[a].matchScoreFor += scoreA;
        stats[a].matchScoreAgainst += scoreB;
        stats[a].setDiff += setDiffA;

        stats[b].matchScoreFor += scoreB;
        stats[b].matchScoreAgainst += scoreA;
        stats[b].setDiff += setDiffB;

        if (scoreA > scoreB) {
          stats[a].win += 1;
          stats[b].lose += 1;
          stats[a].headToHead[b] = 1;
          stats[b].headToHead[a] = -1;
        } else if (scoreB > scoreA) {
          stats[b].win += 1;
          stats[a].lose += 1;
          stats[b].headToHead[a] = 1;
          stats[a].headToHead[b] = -1;
        }
      });

      const arr = Object.values(stats);

      arr.sort((x, y) => {
        if (y.win !== x.win) return y.win - x.win;
        if (y.setDiff !== x.setDiff) return y.setDiff - x.setDiff;

        const hh = x.headToHead?.[y.teamId] || 0;
        if (hh !== 0) return hh === 1 ? -1 : 1;

        return x.teamName.localeCompare(y.teamName, "ko");
      });

      return arr;
    }

    function renderStandings() {
      renderStandingTable("A", standingA);
      renderStandingTable("B", standingB);
    }

    function renderStandingTable(groupName, tbody) {
      const rows = computeStandings(groupName);
      tbody.innerHTML = "";

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7">데이터 없음</td></tr>`;
        return;
      }

      rows.forEach((row, idx) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${escapeHtml(row.teamName)}</td>
          <td>${row.win}</td>
          <td>${row.lose}</td>
          <td>${row.matchScoreFor}</td>
          <td>${row.matchScoreAgainst}</td>
          <td>${row.setDiff}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderCurrentView() {
      tabA.classList.toggle("active", currentGroup === "A");
      tabB.classList.toggle("active", currentGroup === "B");
      tabStandings.classList.remove("active");

      groupSection.style.display = "";
      standingsSection.style.display = "none";

      renderGroupMatches();
      renderStandings();
      setAdminStatusText();
    }

    function showStandingsView() {
      tabA.classList.remove("active");
      tabB.classList.remove("active");
      tabStandings.classList.add("active");

      groupSection.style.display = "none";
      standingsSection.style.display = "";
      renderStandings();
      setAdminStatusText();
    }

    function bindTopEvents() {
      btnRefresh.addEventListener("click", () => loadTournament());

      btnToggleAdmin.addEventListener("click", () => {
        if (isAdmin) {
          isAdmin = false;
          localStorage.removeItem(ADMIN_STORAGE_KEY);
          openMatchId = null;
          renderCurrentView();
          return;
        }

        const input = prompt("관리자 비밀번호를 입력하세요.");
        if (input === null) return;

        if (input === ADMIN_PASSWORD) {
          isAdmin = true;
          localStorage.setItem(ADMIN_STORAGE_KEY, "true");
          renderCurrentView();
        } else {
          alert("비밀번호가 올바르지 않습니다.");
        }
      });

      btnResetAllResults.addEventListener("click", resetAllGroupResults);

      btnTournamentPage.addEventListener("click", () => {
        const target = `../game_live_tournament/?tournamentId=${encodeURIComponent(tournamentId)}`;
        location.href = target;
      });

      tabA.addEventListener("click", () => {
        currentGroup = "A";
        renderCurrentView();
      });

      tabB.addEventListener("click", () => {
        currentGroup = "B";
        renderCurrentView();
      });

      tabStandings.addEventListener("click", () => {
        showStandingsView();
      });
    }

    function applyMeta() {
      const meta = tournamentData?.meta || {};
      pageTitle.textContent = meta.title || "조별리그 진행";
      pageSub.textContent = meta.date ? `${meta.date} 조별리그 운영 화면` : "조별리그 운영 화면";
      metaStatus.textContent =
        `대회명: ${meta.title || "-"}\n대회일자: ${meta.date || "-"}\n대회 ID: ${tournamentId}`;
    }

    async function loadTournament() {
      try {
        if (!tournamentId) {
          tournamentId = await resolveTournamentId();
        }

        if (!tournamentId) {
          metaStatus.textContent = "불러올 대회 ID가 없습니다.";
          matchList.innerHTML = `<div class="empty">대회 데이터를 찾을 수 없습니다.</div>`;
          return;
        }

        const snap = await get(ref(db, `tournaments/${tournamentId}`));
        if (!snap.exists()) {
          metaStatus.textContent = `대회 데이터를 찾을 수 없습니다.\nID: ${tournamentId}`;
          matchList.innerHTML = `<div class="empty">대회 데이터가 존재하지 않습니다.</div>`;
          return;
        }

        tournamentData = snap.val();
        localStorage.setItem("currentTournamentId", tournamentId);
        applyMeta();
        renderCurrentView();
        bindRealtime();
      } catch (err) {
        console.error(err);
        metaStatus.textContent = `불러오기 실패\n${err.message || err}`;
      }
    }

    let realtimeBound = false;
    function bindRealtime() {
      if (realtimeBound) return;
      realtimeBound = true;

      const dataRef = ref(db, `tournaments/${tournamentId}`);
      onValue(dataRef, snap => {
        if (!snap.exists()) return;
        tournamentData = snap.val();
        applyMeta();

        if (tabStandings.classList.contains("active")) {
          showStandingsView();
        } else {
          renderCurrentView();
        }
      });
    }

    bindTopEvents();
    loadTournament();
  </script>
</body>
</html>
