    .qr-modal-box{

    .hero{

}

.help-btn{

.top-bar{

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    get,
    update
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDpXivPM_KJlY8yN1X0_oQH8P-MpyOwNo8",
    authDomain: "koen-championship.firebaseapp.com",
    projectId: "koen-championship",
    storageBucket: "koen-championship.firebasestorage.app",
    messagingSenderId: "652507559896",
    appId: "1:652507559896:web:9bf6bf5c97f4b4dbb024ad"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(
    app,
    "https://koen-championship-default-rtdb.asia-southeast1.firebasedatabase.app"
  );

    const SHARE_URL = "https://sensational-tulumba-65e97e.netlify.app/pingpong_championship/";
    const MASTER_ADMIN_PASSWORD = "771225";
    
    async function getPasswordConfig() {
  const snap = await get(ref(db, "passwordConfig"));

  if (!snap.exists()) {
    return {
      mainPassword: "",
      normalPassword: ""
    };
  }

  const data = snap.val();

  return {
    mainPassword: data.mainPassword || "",
    normalPassword: data.normalPassword || ""
  };
}

  window.openAdmin = async function(){
  const masterPw = prompt("관리 설정 비밀번호를 입력하세요.");
  if (masterPw === null) return;

  if (masterPw !== MASTER_ADMIN_PASSWORD) {
    alert("비밀번호가 올바르지 않습니다.");
    return;
  }

  const config = await getPasswordConfig();

  const mainPassword = prompt(
    "메인 비밀번호\n- 경기생성 입장\n- 전체 초기화",
    config.mainPassword
  );
  if (mainPassword === null) return;

  const normalPassword = prompt(
    "일반 비밀번호\n- 스코어 입력\n- 사진 수정",
    config.normalPassword
  );
  if (normalPassword === null) return;

  if (!mainPassword.trim() || !normalPassword.trim()) {
    alert("둘 다 입력해야 합니다.");
    return;
  }

  await update(ref(db, "passwordConfig"), {
    mainPassword: mainPassword.trim(),
    normalPassword: normalPassword.trim(),
    updatedAt: Date.now()
  });

  alert("비밀번호 저장 완료");
}

  window.goGameMake = async function(){
  const config = await getPasswordConfig();

  if (!config.mainPassword) {
    alert("먼저 관리 버튼에서 메인 비밀번호를 설정하세요.");
    return;
  }

  const pw = prompt("메인 비밀번호를 입력하세요.");
  if (pw === null) return;

  if (pw === config.mainPassword) {
    location.href = "./game-make.html";
  } else {
    alert("비밀번호가 틀렸습니다.");
  }
}

   window.copyPageUrl = async function(){
      try{
        await navigator.clipboard.writeText(SHARE_URL);
        alert("링크가 복사되었습니다.");
      }catch(err){
        const temp = document.createElement("textarea");
        temp.value = SHARE_URL;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("링크가 복사되었습니다.");
      }
    }

    window.sharePage = async function(){
      try{
        if (navigator.share) {
          await navigator.share({
            title: "제14회 남동노조위원장기 탁구대회",
            text: "남동노조위원장기 탁구대회 페이지입니다.",
            url: SHARE_URL
          });
        } else {
          await window.copyPageUrl();
        }
      }catch(err){
        // 공유창 닫기 등은 조용히 무시
      }
    }

    window.openQrModal = function(){
      document.getElementById("qrModal").classList.add("show");
    }

    window.closeQrModal = function(){
      document.getElementById("qrModal").classList.remove("show");
    }

   window.showInstallGuide = function(){
  alert(
`📱 홈 화면 추가 방법

1. 크롬 우측 상단 ⋮ 클릭
2. "홈 화면에 추가" 선택
3. 아이콘 생성 후 실행

👉 앱처럼 빠르게 사용할 수 있습니다`
  );
}
  </script>
