<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>남동노조위원장기 탁구대회</title>
  <meta name="description" content="제14회 남동노조위원장기 탁구대회 경기생성, 예선리그전, 본선 토너먼트 페이지입니다." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="제14회 남동노조위원장기 탁구대회" />
  <meta property="og:description" content="경기생성, 예선리그전, 본선 토너먼트 진행 페이지" />
  <meta property="og:image" content="https://sensational-tulumba-65e97e.netlify.app/pingpong_championship/pingpong_championship.png" />
  <meta property="og:url" content="https://sensational-tulumba-65e97e.netlify.app/pingpong_championship/" />
  <meta property="og:site_name" content="남동노조위원장기 탁구대회" />

  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="제14회 남동노조위원장기 탁구대회" />
  <meta name="twitter:description" content="경기생성, 예선리그전, 본선 토너먼트 진행 페이지" />
  <meta name="twitter:image" content="https://sensational-tulumba-65e97e.netlify.app/pingpong_championship/pingpong_championship.png" />

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d9e2ec;
      --text:#1f2933;
      --muted:#52606d;
      --primary:#1565c0;
      --primary-dark:#0d47a1;
      --green:#2e7d32;
      --orange:#ef6c00;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, "Malgun Gothic", sans-serif;
      background:linear-gradient(180deg, #f7faff 0%, #eef3f9 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:100%;
      max-width:760px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px 22px;
    }

    .title{
      text-align:center;
      margin-bottom:24px;
    }

    .title h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.3;
    }

    .title p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .menu{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:24px;
    }

    .menu a{
      text-decoration:none;
      color:inherit;
      display:block;
    }

    .menu-btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:20px 18px;
      text-align:left;
      cursor:pointer;
      background:#fff;
      border:1px solid var(--line);
      transition:.18s ease;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .menu-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 22px rgba(21,101,192,.12);
      border-color:#bfd4f5;
    }

    .menu-btn .main{
      font-size:20px;
      font-weight:800;
    }

    .menu-btn .sub{
      font-size:14px;
      color:var(--muted);
      line-height:1.5;
    }

    .btn-make .main{ color:var(--primary-dark); }
    .btn-group .main{ color:var(--green); }
    .btn-tournament .main{ color:var(--orange); }

    .share-card{
      cursor:default;
      align-items:center;
      text-align:center;
    }

    .share-card:hover{
      transform:none;
      box-shadow:none;
      border-color:var(--line);
    }

    .qr-img{
      width:180px;
      max-width:100%;
      margin:16px auto 12px;
      border-radius:16px;
      border:1px solid var(--line);
      padding:8px;
      background:#fff;
      display:block;
    }

    .share-inner-btn{
      margin-top:10px;
      padding:14px;
    }

    .share-inner-btn .main{
      font-size:17px;
    }

    @media (max-width: 640px){
      .card{
        padding:22px 16px;
      }
      .title h1{
        font-size:24px;
      }
      .menu-btn .main{
        font-size:18px;
      }
      .share-inner-btn .main{
        font-size:16px;
      }
      .qr-img{
        width:170px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">
        <h1>제14회 남동노조위원장기</h1>
        <h1>탁구대회</h1>
      </div>

      <div class="menu">
        <button type="button" class="menu-btn btn-make" onclick="goGameMake()">
          <div class="main">경기생성</div>
          <div class="sub">팀 등록, 조 편성, 자동 대진 생성 후 대회를 시작합니다.</div>
        </button>

        <a href="./game_live_group/">
          <button type="button" class="menu-btn btn-group">
            <div class="main">예선리그전</div>
            <div class="sub">조별리그 경기 진행, 선수 입력, 경기 결과 및 순위를 확인합니다.</div>
          </button>
        </a>

        <a href="./game_live_tournament/">
          <button type="button" class="menu-btn btn-tournament">
            <div class="main">본선 토너먼트</div>
            <div class="sub">4강 및 결승 경기 결과를 입력하고 본선 대진을 관리합니다.</div>
          </button>
        </a>

        <div class="menu-btn share-card">
          <div class="main" style="color:#1565c0;">공유하기</div>
          <div class="sub">QR 스캔 또는 링크 공유로 대회 페이지에 접속할 수 있습니다.</div>

          <img
            src="./pingpong_championship_qr_koen.png"
            alt="QR코드"
            class="qr-img"
          >

          <button
            type="button"
            class="menu-btn btn-make share-inner-btn"
            onclick="sharePage()"
          >
            <div class="main">공유하기</div>
            <div class="sub">카카오톡, 문자, 앱으로 공유</div>
          </button>

          <button
            type="button"
            class="menu-btn btn-group share-inner-btn"
            onclick="copyPageUrl()"
          >
            <div class="main">링크 복사</div>
            <div class="sub">주소를 복사하여 직접 전달</div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SHARE_URL = "https://sensational-tulumba-65e97e.netlify.app/pingpong_championship/";

    function goGameMake(){
      const pw = prompt("비밀번호를 입력하세요.");

      if (pw === "7777") {
        location.href = "./game_make/";
      } else if (pw !== null) {
        alert("비밀번호가 틀렸습니다.");
      }
    }

    async function copyPageUrl(){
      try{
        await navigator.clipboard.writeText(SHARE_URL);
        alert("링크가 복사되었습니다.");
      }catch(err){
        const temp = document.createElement("textarea");
        temp.value = SHARE_URL;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("링크가 복사되었습니다.");
      }
    }

    async function sharePage(){
      try{
        if (navigator.share) {
          await navigator.share({
            title: "제14회 남동노조위원장기 탁구대회",
            text: "남동노조위원장기 탁구대회 페이지입니다.",
            url: SHARE_URL
          });
        } else {
          await copyPageUrl();
        }
      }catch(err){
        // 사용자가 공유창을 닫은 경우 조용히 종료
      }
    }
  </script>
</body>
</html>
