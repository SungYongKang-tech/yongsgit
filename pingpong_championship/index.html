  <style>
    :root{
      --bg1:#e9f4ff;
      --bg2:#fff7ec;
      --card:#ffffff;
      --text:#16202a;
      --muted:#556270;
      --line:#d8e4ef;
      --shadow:0 10px 28px rgba(15,23,42,.10);

      --blue1:#1976d2;
      --blue2:#42a5f5;

      --green1:#2e7d32;
      --green2:#66bb6a;

      --orange1:#ef6c00;
      --orange2:#ffb74d;

      --purple1:#7b1fa2;
      --purple2:#ba68c8;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
    }

    body{
  min-height:100vh;
  font-family:Arial, "Malgun Gothic", sans-serif;
  color:var(--text);

  background:
    radial-gradient(circle at top left, #fef3c7 0%, transparent 28%),
    radial-gradient(circle at top right, #dbeafe 0%, transparent 30%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);

  display:flex;
  justify-content:center;

  align-items:flex-start;

  padding:4px 10px 10px;
}

    .wrap{
      width:100%;
      max-width:430px;
    }

    .card{
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.65);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:16px 14px 14px;
    }

    .hero{
      text-align:center;
      margin-bottom:12px;
    }

    .hero-badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(90deg, var(--purple1), var(--purple2));
      margin-bottom:8px;
      letter-spacing:.2px;
    }

    .hero h1{
      margin:0;
      font-size:30px;
      line-height:1.18;
      font-weight:900;
      letter-spacing:-.4px;
      color:#0f172a;
    }

    .hero h1 span{
      display:block;
    }

    .hero p{
      margin:8px 0 0;
      font-size:14px;
      font-weight:700;
      color:var(--muted);
      line-height:1.35;
    }

    .menu{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:10px;
    }

    .menu a{
      text-decoration:none;
      color:inherit;
      display:block;
    }

    .big-btn{
      width:100%;
      border:none;
      border-radius:22px;
      padding:16px 16px;
      color:#fff;
      cursor:pointer;
      text-align:left;
      box-shadow:0 10px 24px rgba(0,0,0,.10);
      transition:transform .15s ease, box-shadow .15s ease;
      display:flex;
      flex-direction:column;
      gap:5px;
    }

    .big-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 26px rgba(0,0,0,.14);
    }

    .big-btn .main{
  font-size:24px;
  font-weight:900;
  line-height:1.15;
  letter-spacing:-.3px;

  text-shadow:
    0 2px 4px rgba(0,0,0,0.25);

  -webkit-text-stroke:0.3px rgba(255,255,255,0.25);
}

    .big-btn .sub{
      font-size:14px;
      line-height:1.35;
      font-weight:700;
      color:rgba(255,255,255,.94);
    }

    .btn-make{
      background:linear-gradient(135deg, var(--blue1), var(--blue2));
    }

    .btn-group{
      background:linear-gradient(135deg, var(--green1), var(--green2));
    }

    .btn-tournament{
      background:linear-gradient(135deg, var(--orange1), var(--orange2));
    }

    .share-box{
      margin-top:12px;
      background:linear-gradient(135deg, #ffffff, #f8fbff);
      border:1px solid var(--line);
      border-radius:22px;
      padding:12px;
      box-shadow:0 6px 16px rgba(15,23,42,.05);
    }

    .share-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .share-title{
      font-size:20px;
      font-weight:900;
      color:#7b1fa2;
      line-height:1.1;
    }

    .share-sub{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      line-height:1.3;
      margin-top:3px;
    }

    .share-grid{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:10px;
      align-items:stretch;
    }

    .qr-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:120px;
    }

    .qr-img{
      width:100%;
      max-width:100px;
      display:block;
      border-radius:12px;
      cursor:pointer;
      transition:transform .18s ease;
    }

    .qr-img:hover{
      transform:scale(1.05);
    }

    .share-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .mini-btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:12px 12px;
      color:#fff;
      cursor:pointer;
      text-align:left;
      display:flex;
      flex-direction:column;
      gap:3px;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      transition:transform .15s ease;
    }

    .mini-btn:hover{
      transform:translateY(-1px);
    }

    .mini-btn .main{
  font-size:18px;
  font-weight:900;
  line-height:1.15;

  text-shadow:
    0 2px 4px rgba(0,0,0,0.28);

  -webkit-text-stroke:0.25px rgba(255,255,255,0.25);
}

    .mini-btn .sub{
      font-size:12px;
      line-height:1.25;
      font-weight:700;
      color:rgba(255,255,255,.92);
    }

    .mini-share{
      background:linear-gradient(135deg, #8e24aa, #ce93d8);
    }

    .mini-copy{
      background:linear-gradient(135deg, #00897b, #4db6ac);
    }

    .tip{
      margin-top:8px;
      font-size:12px;
      font-weight:800;
      color:#6b7280;
      text-align:center;
    }

    .qr-modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.78);
      z-index:9999;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .qr-modal.show{
      display:flex;
    }

    .qr-modal-box{
      background:#fff;
      border-radius:24px;
      padding:18px;
      text-align:center;
      max-width:92vw;
      box-shadow:0 18px 40px rgba(0,0,0,.32);
    }

    .qr-modal-title{
      font-size:20px;
      font-weight:900;
      margin:0 0 12px;
      color:#7b1fa2;
    }

    .qr-modal-img{
      width:min(78vw, 360px);
      max-height:72vh;
      display:block;
      margin:0 auto;
      border-radius:18px;
    }

    .qr-modal-tip{
      margin-top:12px;
      font-size:13px;
      color:#6b7280;
      font-weight:800;
    }

    .hero{
  position:relative;
  text-align:center;
  margin-bottom:12px;
}

.help-btn{
  position:absolute;
  top:0;
  right:0;
  border:none;
  background:linear-gradient(135deg,#7b1fa2,#ba68c8);
  color:#fff;
  padding:8px 14px;
  border-radius:14px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(123,31,162,.25);
}

.help-btn:hover{
  transform:translateY(-1px);
}

.admin-btn{
  right:92px;
  background:linear-gradient(135deg,#37474f,#607d8b);
  box-shadow:0 6px 14px rgba(55,71,79,.25);
}



    @media (max-width: 390px){
      .card{
        padding:14px 12px 12px;
      }

      .hero h1{
        font-size:27px;
      }

      .hero p{
        font-size:13px;
      }

      .big-btn{
        padding:14px 14px;
        border-radius:20px;
      }

      .big-btn .main{
        font-size:22px;
      }

      .big-btn .sub{
        font-size:13px;
      }

      .share-grid{
        grid-template-columns:110px 1fr;
        gap:8px;
      }

      .qr-card{
        min-height:110px;
      }

      .qr-img{
        max-width:92px;
      }

      .mini-btn{
        padding:11px 10px;
      }

      .mini-btn .main{
        font-size:17px;
      }
    }

.top-bar{
  position:sticky;
  top:0;
  z-index:10;
  padding-top:4px;
}

.top-btn{
  border:none;
  padding:6px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
}

.admin-btn{
  background:linear-gradient(135deg,#37474f,#607d8b);
}

.help-btn2{
  background:linear-gradient(135deg,#7b1fa2,#ba68c8);
}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

<div class="top-bar">
  <button class="top-btn admin-btn" onclick="openAdmin()">⚙ 관리</button>
  <button class="top-btn help-btn2" onclick="location.href='./help.html'">📖 도움말</button>
</div>

      <div class="hero">
        <div class="hero-badge">KOEN TABLE TENNIS</div>
        <h1>
          <span>제14회</span>
          <span>남동노조위원장기 탁구대회</span>
        </h1>
        <p>경기생성 · 예선리그전 · 본선 토너먼트(임시자료 업로드상태)</p>
        
      </div>

      <div class="menu">
        <button type="button" class="big-btn btn-make" onclick="goGameMake()">
          <div class="main">경기생성</div>
          <div class="sub">팀 등록, 조 편성, 자동 대진 생성(관리자 전용)</div>
        </button>

        <a href="./game_live_group/">
          <button type="button" class="big-btn btn-group">
            <div class="main">예선리그전</div>
            <div class="sub">조별 경기 진행, 결과 입력, 순위 확인</div>
          </button>
        </a>

        <a href="./game_live_tournament/">
          <button type="button" class="big-btn btn-tournament">
            <div class="main">본선 토너먼트</div>
            <div class="sub">4강, 결승 진행 및 본선 대진 관리</div>
          </button>
        </a>
      </div>

      <div class="share-box">
        <div class="share-head">
          <div>
            <div class="share-title">공유하기</div>
            <div class="share-sub">QR을 누르면 크게 볼 수 있습니다</div>
          </div>
        </div>

        <div class="share-grid">
          <div class="qr-card">
            <img
              src="./pingpong_championship_qr_koen.png"
              alt="QR코드"
              class="qr-img"
              onclick="openQrModal()"
            >
          </div>

          <div class="share-actions">
            <button type="button" class="mini-btn mini-share" onclick="sharePage()">
              <div class="main">공유하기</div>
              <div class="sub">카카오톡, 문자, 앱 공유</div>
            </button>

            <button type="button" class="mini-btn mini-copy" onclick="copyPageUrl()">
              <div class="main">링크 복사</div>
              <div class="sub">주소를 복사해 직접 전달</div>
            </button>
          </div>
        </div>

       
      </div>
    </div>
  </div>

  <div id="qrModal" class="qr-modal" onclick="closeQrModal()">
    <div class="qr-modal-box" onclick="event.stopPropagation()">
      <div class="qr-modal-title">대회 페이지 QR코드</div>
      <img src="./pingpong_championship_qr_koen.png" alt="확대 QR코드" class="qr-modal-img">
      <div class="qr-modal-tip">바깥 영역을 누르면 닫힙니다</div>
    </div>
  </div>

  <div class="modal-backdrop" id="helpModalBackdrop">
  ...
</div>

  <script>
    const SHARE_URL = "https://sensational-tulumba-65e97e.netlify.app/pingpong_championship/";
    const MASTER_ADMIN_PASSWORD = "771225";
    const STORAGE_KEYS = {
      common: "koen_pingpong_pw_common",
      admin: "koen_pingpong_pw_admin"
    };

    function getPasswordConfig() {
      return {
        common: localStorage.getItem(STORAGE_KEYS.common) || "0000",
        admin: localStorage.getItem(STORAGE_KEYS.admin) || "1111"
      };
    }

    function savePasswordConfig({ common, admin }) {
      localStorage.setItem(STORAGE_KEYS.common, common);
      localStorage.setItem(STORAGE_KEYS.admin, admin);
    }

    function openAdmin(){
      const masterPw = prompt("관리 비밀번호를 입력하세요.");
      if (masterPw === null) return;
      if (masterPw !== MASTER_ADMIN_PASSWORD) {
        alert("관리 비밀번호가 올바르지 않습니다.");
        return;
      }

      const config = getPasswordConfig();

      const common = prompt("경기생성 / 전체 삭제 비밀번호", config.common);
      if (common === null) return;

      const admin = prompt("관리자 잠금해제 비밀번호", config.admin);
      if (admin === null) return;

      savePasswordConfig({
        common: common.trim() || config.common,
        admin: admin.trim() || config.admin
      });

      alert("비밀번호 설정이 저장되었습니다.");
    }

    function goGameMake(){
      const { common } = getPasswordConfig();
      const pw = prompt("비밀번호를 입력하세요.");
      if (pw === common) {
        location.href = "./game_make/";
      } else if (pw !== null) {
        alert("비밀번호가 틀렸습니다.");
      }
    }

    async function copyPageUrl(){
      try{
        await navigator.clipboard.writeText(SHARE_URL);
        alert("링크가 복사되었습니다.");
      }catch(err){
        const temp = document.createElement("textarea");
        temp.value = SHARE_URL;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("링크가 복사되었습니다.");
      }
    }

    async function sharePage(){
      try{
        if (navigator.share) {
          await navigator.share({
            title: "제14회 남동노조위원장기 탁구대회",
            text: "남동노조위원장기 탁구대회 페이지입니다.",
            url: SHARE_URL
          });
        } else {
          await copyPageUrl();
        }
      }catch(err){
        // 공유창 닫기 등은 조용히 무시
      }
    }

    function openQrModal(){
      document.getElementById("qrModal").classList.add("show");
    }

    function closeQrModal(){
      document.getElementById("qrModal").classList.remove("show");
    }
  </script>
</body>
