<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>남동노조위원장기 탁구대회</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d9e2ec;
      --text:#1f2933;
      --muted:#52606d;
      --primary:#1565c0;
      --primary-dark:#0d47a1;
      --green:#2e7d32;
      --orange:#ef6c00;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, "Malgun Gothic", sans-serif;
      background:linear-gradient(180deg, #f7faff 0%, #eef3f9 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:100%;
      max-width:760px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px 22px;
    }

    .title{
      text-align:center;
      margin-bottom:24px;
    }

    .title h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.3;
    }

    .title p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .menu{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:24px;
    }

    .menu a{
      text-decoration:none;
      color:inherit;
      display:block;
    }

    .menu-btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:20px 18px;
      text-align:left;
      cursor:pointer;
      background:#fff;
      border:1px solid var(--line);
      transition:.18s ease;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .menu-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 22px rgba(21,101,192,.12);
      border-color:#bfd4f5;
    }

    .menu-btn .main{
      font-size:20px;
      font-weight:800;
    }

    .menu-btn .sub{
      font-size:14px;
      color:var(--muted);
      line-height:1.5;
    }

    .btn-make .main{ color:var(--primary-dark); }
    .btn-group .main{ color:var(--green); }
    .btn-tournament .main{ color:var(--orange); }

    @media (max-width: 640px){
      .card{
        padding:22px 16px;
      }
      .title h1{
        font-size:24px;
      }
      .menu-btn .main{
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">
        <h1>제14회 남동노조위원장기</h1>
        <h1>탁구대회</h1>
      </div>

      <div class="menu">
        <button type="button" class="menu-btn btn-make" onclick="goGameMake()">
          <div class="main">경기생성</div>
          <div class="sub">팀 등록, 조 편성, 자동 대진 생성 후 대회를 시작합니다.</div>
        </button>

        <a href="./game_live_group/">
          <button type="button" class="menu-btn btn-group">
            <div class="main">예선리그전</div>
            <div class="sub">조별리그 경기 진행, 선수 입력, 경기 결과 및 순위를 확인합니다.</div>
          </button>
        </a>

        <a href="./game_live_tournament/">
          <button type="button" class="menu-btn btn-tournament">
            <div class="main">본선 토너먼트</div>
            <div class="sub">4강 및 결승 경기 결과를 입력하고 본선 대진을 관리합니다.</div>
          </button>
        </a>
      </div>
    </div>
  </div>

  <script>
    function goGameMake(){
      const pw = prompt("비밀번호를 입력하세요.");

      if (pw === "7777") {
        location.href = "./game_make/";
      } else if (pw !== null) {
        alert("비밀번호가 틀렸습니다.");
      }
    }
  </script>
</body>
</html>
