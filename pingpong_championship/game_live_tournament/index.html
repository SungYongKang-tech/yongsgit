<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>토너먼트 진행 - 남동노조위원장기 탁구대회</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d9e2ec;
      --text:#1f2933;
      --muted:#52606d;
      --primary:#1565c0;
      --primary-dark:#0d47a1;
      --green:#2e7d32;
      --red:#c62828;
      --orange:#ef6c00;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:16px;
      --male-bg:#eef4ff;
      --male-text:#1565c0;
      --female-bg:#ffebee;
      --female-text:#c62828;
      --gold:#f9a825;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, "Malgun Gothic", sans-serif;
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:14px;
    }

    h1,h2,h3,h4{margin:0 0 10px}

    .topbar{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .title-area{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .title-area small{color:var(--muted)}

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    button{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
      font-weight:700;
    }

    button:hover{background:var(--primary-dark)}
    button.secondary{background:#607d8b}
    button.green{background:var(--green)}
    button.orange{background:var(--orange)}
    button.red{background:var(--red)}
    button.ghost{
      background:#edf4ff;
      color:#0d47a1;
      border:1px solid #c8dcff;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:14px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
    }

    .status-box{
      padding:12px;
      border-radius:12px;
      border:1px solid #d8e6fb;
      background:#f8fbff;
      white-space:pre-line;
      font-size:14px;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
    }

    .empty{
      color:var(--muted);
      text-align:center;
      padding:22px 10px;
      border:1px dashed #cbd2d9;
      border-radius:12px;
      background:#fff;
    }

    .champion-box{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px;
      border-radius:14px;
      background:#fff8e1;
      border:1px solid #f2d27d;
      font-weight:800;
      color:#7a5400;
      margin-top:12px;
    }

    .bracket-card{
      overflow:auto;
    }

    .bracket-wrap{
      min-width:900px;
      display:grid;
      grid-template-columns:1fr 140px 1fr;
      gap:18px;
      align-items:center;
      padding:6px 0;
    }

    .round-col{
      display:flex;
      flex-direction:column;
      gap:30px;
    }

    .final-col{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
    }

    .match-node{
      position:relative;
      background:#fff;
      border:2px solid var(--line);
      border-radius:14px;
      padding:12px;
      cursor:pointer;
      min-height:92px;
      transition:.15s ease;
      box-shadow:0 4px 12px rgba(15,23,42,.05);
    }

    .match-node:hover{
      transform:translateY(-1px);
      border-color:#9ec5ff;
    }

    .match-node.active{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(21,101,192,.12);
      background:#f8fbff;
    }

    .match-node.done{
      border-color:#a5d6a7;
      background:#fbfff9;
    }

    .node-title{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:8px;
    }

    .node-team{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:4px 0;
      font-size:15px;
      font-weight:700;
    }

    .node-team.winner{
      color:var(--primary-dark);
      font-weight:900;
    }

    .node-score{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      min-width:26px;
      text-align:right;
    }

    .connector-col{
  position:relative;
  min-height:360px;
}

.connector-top-h,
.connector-bot-h,
.connector-mid-v,
.connector-final-h{
  position:absolute;
  background:#9fb3c8;
}

.connector-top-h{
  left:0;
  top:88px;
  width:72px;
  height:2px;
}

.connector-bot-h{
  left:0;
  bottom:88px;
  width:72px;
  height:2px;
}

.connector-mid-v{
  left:72px;
  top:88px;
  bottom:88px;
  width:2px;
}

.connector-final-h{
  left:72px;
  top:50%;
  width:68px;
  height:2px;
  transform:translateY(-50%);
}

    .detail-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .detail-title{
      font-size:20px;
      font-weight:800;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:12px;
    }

    .mini-box{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px;
    }

    .mini-box h4{
      font-size:14px;
      margin-bottom:8px;
    }

    .player-list{
      margin:0;
      padding-left:0;
      list-style:none;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:6px;
    }

    .player-list li{
      margin:0;
      font-size:13px;
      line-height:1.35;
      padding:5px 6px;
      border-radius:8px;
      text-align:center;
      font-weight:700;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .player-male{
      background:var(--male-bg);
      color:var(--male-text);
    }

    .player-female{
      background:var(--female-bg);
      color:var(--female-text);
    }

    .submatch-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .submatch-card.compact{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:12px;
    }

    .compact-side{
      display:inline-flex;
      align-items:center;
      gap:4px;
      flex-wrap:wrap;
    }

    .compact-side.winner{
      font-weight:900;
      color:#111;
    }

    .compact-divider{
      font-weight:700;
      color:var(--muted);
    }

    .player-pill{
      display:inline-block;
      padding:4px 7px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      line-height:1.2;
    }

    .player-pill.male{
      background:var(--male-bg);
      color:var(--male-text);
    }

    .player-pill.female{
      background:var(--female-bg);
      color:var(--female-text);
    }

    .inline-player-selects{
      display:inline-flex;
      align-items:center;
      gap:4px;
      flex-wrap:wrap;
    }

    .inline-player-selects select{
      width:auto;
      min-width:88px;
      max-width:120px;
      padding:6px 8px;
      font-size:13px;
    }

    select{
      border:1px solid #cbd2d9;
      border-radius:10px;
      padding:8px;
      font-size:14px;
      background:#fff;
    }

    .score-select{
      min-width:86px;
      width:auto;
      padding:6px 8px;
      border:1px solid #cbd2d9;
      border-radius:8px;
      font-size:13px;
      font-weight:700;
      background:#fff;
    }

    .inline-save-btn{
      padding:7px 12px;
      font-size:13px;
      border-radius:8px;
      background:var(--green);
    }

    .inline-save-btn:hover{
      background:#256b2a;
    }

    .line-score{
      font-weight:900;
      font-size:16px;
      color:#111;
      min-width:40px;
      text-align:center;
      white-space:nowrap;
    }

    
        

    .result-bar{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }

    .result-item{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      padding:10px;
      text-align:center;
    }

    .result-item .label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      font-weight:700;
    }

    .result-item .value{
      font-size:18px;
      font-weight:800;
    }

    .winner-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 10px;
      border-radius:999px;
      background:#fff8e1;
      color:#7a5400;
      font-weight:800;
      font-size:12px;
      border:1px solid #f2d27d;
    }

    @media (max-width: 768px){
  .wrap{ padding:8px; }

  .topbar{
    gap:8px;
    margin-bottom:10px;
  }

  .title-area h1{
    font-size:20px;
    line-height:1.3;
  }

  .title-area small{
    font-size:12px;
  }

  .card{
    padding:10px;
    margin-bottom:10px;
    border-radius:12px;
    box-shadow:none;
  }

  .meta-grid,
  .detail-grid{
    grid-template-columns:1fr;
    gap:10px;
  }

  .actions{
    width:100%;
    flex-direction:column;
    gap:6px;
  }

  .actions button{
    width:100%;
    padding:9px 10px;
    font-size:13px;
  }

  .bracket-wrap{
    min-width:0;
    grid-template-columns:1fr;
    gap:10px;
  }

  .connector-col{
    display:none;
  }

  .round-col,
  .final-col{
    gap:10px;
  }

  .match-node{
    min-height:auto;
    padding:8px;
    border-radius:10px;
  }

  .node-title{
    font-size:11px;
    margin-bottom:6px;
  }

  .node-team{
    font-size:12px;
    padding:3px 0;
  }

  .node-score{
    font-size:12px;
  }

  .winner-badge{
    font-size:11px;
    padding:4px 8px;
  }

  .player-list{
    grid-template-columns:repeat(4, minmax(0,1fr));
    gap:4px;
  }

  .player-list li{
    font-size:11px;
    padding:4px 4px;
  }

  .inline-player-selects select{
    min-width:72px;
    max-width:92px;
    font-size:12px;
    padding:5px 6px;
  }

  .score-select{
    min-width:74px;
    font-size:12px;
    padding:5px 6px;
  }

  .inline-save-btn{
    padding:8px 10px;
    font-size:13px;
  }

 

  .match-title-left{
    font-size:13px;
  }

  

  .match-score-right{
    font-size:16px;
  }

  .match-player-line{
    font-size:13px;
    gap:5px;
  }

  .result-bar{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .result-item .value{
    font-size:16px;
  }
}
.match-title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  margin-bottom:6px;
}

.match-bottom-line{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:6px;
  margin-top:6px;
}

.match-title-left{
  font-size:15px;
  font-weight:800;
  color:var(--primary-dark);
  line-height:1.2;
  white-space:nowrap;
  flex:1 1 auto;
  min-width:0;
}

.match-score-right{
  display:flex;
  align-items:center;
  font-size:18px;
  font-weight:900;
  white-space:nowrap;
  flex:0 0 auto;
}

.match-player-line{
  display:flex;
  align-items:center;
  flex-wrap:nowrap;
  gap:4px;
  line-height:1.3;
  overflow:hidden;
}

@media (max-width:768px){
  .match-title-row{
    margin-bottom:4px;
  }

  .match-bottom-line{
    gap:4px;
    margin-top:4px;
  }

  .match-title-left{
    font-size:13px;
    line-height:1.2;
  }

  .match-score-right{
    font-size:15px;
  }

  .match-player-line{
    gap:3px;
  }

  .inline-player-selects select{
    min-width:72px;
    max-width:none;
    font-size:12px;
    padding:5px 6px;
  }

  .score-select{
    min-width:68px;
    font-size:12px;
    padding:5px 6px;
  }

  .inline-save-btn{
    padding:7px 8px;
    font-size:12px;
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-area">
        <h1 id="pageTitle">토너먼트 진행</h1>
        <small id="pageSub">대회 정보를 불러오는 중입니다.</small>
      </div>
      <div class="actions">
        <button type="button" class="secondary" id="btnRefresh">새로고침</button>
        <button type="button" class="ghost" id="btnToggleAdmin">관리자 잠금해제</button>
        <button type="button" class="orange" id="btnCreateBracket">4강 대진 생성</button>
        <button type="button" class="red" id="btnResetTournament" style="display:none;">전체 토너먼트 초기화</button>
        <button type="button" class="green" id="btnGroupPage">조별리그 페이지</button>
      </div>
    </div>

    <div class="card">
      <div class="meta-grid">
        <div>
          <h2>대회 정보</h2>
          <div class="status-box" id="metaStatus">대회 데이터를 불러오는 중입니다...</div>
        </div>
        <div>
          <h2>현재 상태</h2>
          <div class="status-box" id="adminStatus">관전자 모드입니다.</div>
          <div class="champion-box" id="championBox" style="display:none;"></div>
        </div>
      </div>
    </div>

    <section class="card bracket-card">
      <div class="detail-header">
        <h2>토너먼트 브라켓</h2>
        <div class="hint">경기 박스를 누르면 아래 상세 입력창이 바뀝니다.</div>
      </div>
      <div id="bracketArea"></div>
    </section>

    <section class="card" id="detailSection">
      <div id="detailArea"></div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpXivPM_KJlY8yN1X0_oQH8P-MpyOwNo8",
      authDomain: "koen-championship.firebaseapp.com",
      projectId: "koen-championship",
      storageBucket: "koen-championship.firebasestorage.app",
      messagingSenderId: "652507559896",
      appId: "1:652507559896:web:9bf6bf5c97f4b4dbb024ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, "https://koen-championship-default-rtdb.asia-southeast1.firebasedatabase.app");

    const ADMIN_STORAGE_KEY = "koen_tournament_admin_unlocked";
    const ADMIN_PASSWORD = "1111";

    const MATCH_TYPES = [
  { key: "m1", name: "여자복식", count: 2 },
  { key: "m2", name: "남자복식1", count: 2 },
  { key: "m3", name: "남자복식2", count: 2 },
  { key: "m4", name: "여자단식", count: 1 },
  { key: "m5", name: "남자단식", count: 1 }
];

    const SCORE_OPTIONS = [
      { a: 3, b: 0, text: "3:0", winner: "A" },
      { a: 3, b: 1, text: "3:1", winner: "A" },
      { a: 3, b: 2, text: "3:2", winner: "A" },
      { a: 0, b: 3, text: "0:3", winner: "B" },
      { a: 1, b: 3, text: "1:3", winner: "B" },
      { a: 2, b: 3, text: "2:3", winner: "B" }
    ];

    const TOURNAMENT_MATCH_KEYS = [
      { id: "semifinal1", label: "4강 1경기" },
      { id: "semifinal2", label: "4강 2경기" },
      { id: "final", label: "결승" }
    ];

    let tournamentId = "";
    let tournamentData = null;
    let selectedMatchId = "semifinal1";
    let isAdmin = localStorage.getItem(ADMIN_STORAGE_KEY) === "true";
    let realtimeBound = false;

    const pageTitle = document.getElementById("pageTitle");
    const pageSub = document.getElementById("pageSub");
    const metaStatus = document.getElementById("metaStatus");
    const adminStatus = document.getElementById("adminStatus");
    const championBox = document.getElementById("championBox");

    const btnRefresh = document.getElementById("btnRefresh");
    const btnToggleAdmin = document.getElementById("btnToggleAdmin");
    const btnCreateBracket = document.getElementById("btnCreateBracket");
    const btnResetTournament = document.getElementById("btnResetTournament");
    const btnGroupPage = document.getElementById("btnGroupPage");

    const bracketArea = document.getElementById("bracketArea");
    const detailArea = document.getElementById("detailArea");

    function qs(name) {
      return new URLSearchParams(location.search).get(name);
    }

    async function resolveTournamentId() {
      const fromQuery = qs("tournamentId");
      if (fromQuery) return fromQuery;

      const localSaved = localStorage.getItem("currentTournamentId");
      if (localSaved) return localSaved;

      const snap = await get(ref(db, "currentTournamentId"));
      if (snap.exists()) return snap.val();

      return "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setAdminStatusText() {
      if (isAdmin) {
        adminStatus.textContent = "관리자 모드입니다. 점수 선택, 선수 선택, 저장이 가능합니다.";
        btnToggleAdmin.textContent = "관리자 잠금해제 해제";
        btnResetTournament.style.display = "";
      } else {
        adminStatus.textContent = "관전자 모드입니다. 브라켓과 상세 결과를 조회할 수 있습니다.";
        btnToggleAdmin.textContent = "관리자 잠금해제";
        btnResetTournament.style.display = "none";
      }
    }

    function applyMeta() {
      const meta = tournamentData?.meta || {};
      pageTitle.textContent = meta.title || "토너먼트 진행";
      pageSub.textContent = meta.date ? `${meta.date} 토너먼트 운영 화면` : "토너먼트 운영 화면";
      metaStatus.textContent =
        `대회명: ${meta.title || "-"}\n대회일자: ${meta.date || "-"}\n대회 ID: ${tournamentId}`;
    }

    function getTeam(teamId) {
      return tournamentData?.teams?.[teamId] || null;
    }

    function getSelectablePlayers(teamId, matchTypeName) {
      const team = getTeam(teamId);
      if (!team) return [];

      const men = Array.isArray(team.men) ? team.men : [];
      const women = Array.isArray(team.women) ? team.women : [];

      if (matchTypeName.includes("여자")) return women;
      if (matchTypeName.includes("남자")) return men;
      return [...men, ...women];
    }

    function getPlayerGenderClass(teamId, playerName) {
      const team = getTeam(teamId);
      if (!team || !playerName) return "";
      if (Array.isArray(team.men) && team.men.includes(playerName)) return "male";
      if (Array.isArray(team.women) && team.women.includes(playerName)) return "female";
      return "";
    }

    function renderPlayerPills(teamId, players) {
      if (!Array.isArray(players) || !players.length) return `<span>-</span>`;
      return players.map(name => {
        const cls = getPlayerGenderClass(teamId, name);
        return `<span class="player-pill ${cls}">${escapeHtml(name)}</span>`;
      }).join(" ");
    }

    function renderPlayerList(teamId) {
      const team = getTeam(teamId);
      if (!team) return "";

      const men = Array.isArray(team.men) ? team.men : [];
      const women = Array.isArray(team.women) ? team.women : [];
      const all = [...men, ...women];

      return all.map(name => {
        const cls = men.includes(name) ? "player-male" : "player-female";
        return `<li class="${cls}">${escapeHtml(name)}</li>`;
      }).join("");
    }

    function createInlinePlayerSelectHtml(teamId, matchTypeName, selectedValue, selectCount, inputNameBase, disabled) {
      const players = getSelectablePlayers(teamId, matchTypeName);
      let html = `<span class="inline-player-selects">`;

    function computeMatchAggregate(matchObj) {
      const cloned = JSON.parse(JSON.stringify(matchObj));
      const subMatches = cloned.matches || {};
      let teamScoreA = 0;
      let teamScoreB = 0;
      let setDiffA = 0;
      let setDiffB = 0;

      Object.values(subMatches).forEach(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);

        if (!Number.isNaN(a) && !Number.isNaN(b) && (a > 0 || b > 0)) {
          setDiffA += (a - b);
          setDiffB += (b - a);

          if (a > b) {
            m.winner = "A";
            teamScoreA += 1;
          } else if (b > a) {
            m.winner = "B";
            teamScoreB += 1;
          } else {
            m.winner = "";
          }
        } else {
          m.winner = "";
        }
      });

      cloned.teamMatchScoreA = teamScoreA;
      cloned.teamMatchScoreB = teamScoreB;
      cloned.setDiffA = setDiffA;
      cloned.setDiffB = setDiffB;

      if (teamScoreA > teamScoreB) cloned.winnerTeamId = cloned.teamA;
      else if (teamScoreB > teamScoreA) cloned.winnerTeamId = cloned.teamB;
      else cloned.winnerTeamId = "";

      const allFilled = Object.values(subMatches).every(m => {
        const a = Number(m.setScoreA || 0);
        const b = Number(m.setScoreB || 0);
        return (a > 0 || b > 0) && a !== b;
      });

      cloned.status = allFilled
        ? "done"
        : (teamScoreA > 0 || teamScoreB > 0 || setDiffA !== 0 || setDiffB !== 0 ? "playing" : "ready");

      return cloned;
    }

    function computeStandings(groupName) {
      const groupTeamIds = tournamentData.groups?.[groupName] || [];
      const matches = Object.values(tournamentData?.groupMatches || {})
        .filter(m => m.group === groupName)
        .sort((a, b) => (a.order || 0) - (b.order || 0));

      const stats = {};
      groupTeamIds.forEach(teamId => {
        const team = getTeam(teamId);
        stats[teamId] = {
          teamId,
          teamName: team?.name || teamId,
          win: 0,
          lose: 0,
          setDiff: 0,
          headToHead: {}
        };
      });

      matches.forEach(match => {
        if (match.status !== "done") return;

        const a = match.teamA;
        const b = match.teamB;
        const scoreA = Number(match.teamMatchScoreA || 0);
        const scoreB = Number(match.teamMatchScoreB || 0);
        const setDiffA = Number(match.setDiffA || 0);
        const setDiffB = Number(match.setDiffB || 0);

        if (!stats[a] || !stats[b]) return;

        stats[a].setDiff += setDiffA;
        stats[b].setDiff += setDiffB;

        if (scoreA > scoreB) {
          stats[a].win += 1;
          stats[b].lose += 1;
          stats[a].headToHead[b] = 1;
          stats[b].headToHead[a] = -1;
        } else if (scoreB > scoreA) {
          stats[b].win += 1;
          stats[a].lose += 1;
          stats[b].headToHead[a] = 1;
          stats[a].headToHead[b] = -1;
        }
      });

      const arr = Object.values(stats);
      arr.sort((x, y) => {
        if (y.win !== x.win) return y.win - x.win;
        if (y.setDiff !== x.setDiff) return y.setDiff - x.setDiff;
        const hh = x.headToHead?.[y.teamId] || 0;
        if (hh !== 0) return hh === 1 ? -1 : 1;
        return x.teamName.localeCompare(y.teamName, "ko");
      });
      return arr;
    }

    function bindDetailEvents() {
  document.querySelectorAll(".inline-player-selects select").forEach(sel => {

      const defKey = m[2];

    });

  document.querySelectorAll("[data-score-select='true']").forEach(sel => {

      const target = tournamentData.tournamentMatches?.[matchId]?.matches?.[defKey];
      if (!target) return;

      syncTournamentSubMatchPlayersToMemory(matchId, defKey);

      if (!value) {
        target.setScoreA = 0;
        target.setScoreB = 0;
      } else {
        const [a, b] = value.split(":").map(Number);
        target.setScoreA = a;
        target.setScoreB = b;
      }

    function syncTournamentSubMatchPlayersToMemory(matchId, defKey) {
  const match = tournamentData.tournamentMatches?.[matchId];
  if (!match) return;

  const def = MATCH_TYPES.find(x => x.key === defKey);
  if (!def) return;

  const sub = match.matches?.[defKey];
  if (!sub) return;

  const teamAPlayers = [];
  const teamBPlayers = [];

  for (let i = 0; i < def.count; i++) {
    const aSel = document.querySelector(`[name="${matchId}_${def.key}_A_${i}"]`);
    const bSel = document.querySelector(`[name="${matchId}_${def.key}_B_${i}"]`);

    if (aSel && aSel.value) teamAPlayers.push(aSel.value);
    if (bSel && bSel.value) teamBPlayers.push(bSel.value);
  }

  sub.teamAPlayers = teamAPlayers;
  sub.teamBPlayers = teamBPlayers;
}

    function readSingleSubMatchInputs(matchId, defKey) {
      const original = tournamentData.tournamentMatches[matchId];
      const cloned = JSON.parse(JSON.stringify(original));
      const def = MATCH_TYPES.find(x => x.key === defKey);
      if (!def) throw new Error("대진 정보를 찾을 수 없습니다.");

      const sub = cloned.matches[defKey];
      const teamAPlayers = [];
      const teamBPlayers = [];

      for (let i = 0; i < def.count; i++) {
        const aSel = document.querySelector(`[name="${matchId}_${def.key}_A_${i}"]`);
        const bSel = document.querySelector(`[name="${matchId}_${def.key}_B_${i}"]`);
        if (aSel && aSel.value) teamAPlayers.push(aSel.value);
        if (bSel && bSel.value) teamBPlayers.push(bSel.value);
      }

      sub.teamAPlayers = teamAPlayers;
      sub.teamBPlayers = teamBPlayers;
      return cloned;
    }

    async function saveSingleSubMatch(matchId, defKey) {
      try {
        const cloned = readSingleSubMatchInputs(matchId, defKey);
        const liveSub = tournamentData.tournamentMatches?.[matchId]?.matches?.[defKey];

        if (!liveSub) {
          throw new Error("저장할 경기 정보가 없습니다.");
        }

        cloned.matches[defKey].setScoreA = Number(liveSub.setScoreA || 0);
        cloned.matches[defKey].setScoreB = Number(liveSub.setScoreB || 0);

        const def = MATCH_TYPES.find(x => x.key === defKey);
const teamAPlayers = cloned.matches[defKey].teamAPlayers;
const teamBPlayers = cloned.matches[defKey].teamBPlayers;

if (teamAPlayers.length !== def.count || teamBPlayers.length !== def.count) {
  throw new Error("선수 선택을 모두 완료한 뒤 저장해 주세요.");
}

if (new Set(teamAPlayers).size !== teamAPlayers.length) {
  throw new Error("왼쪽 팀에 같은 선수가 중복 선택되었습니다.");
}

if (new Set(teamBPlayers).size !== teamBPlayers.length) {
  throw new Error("오른쪽 팀에 같은 선수가 중복 선택되었습니다.");
}

        const finalComputed = computeMatchAggregate(cloned);

        await update(ref(db, `tournaments/${tournamentId}/tournamentMatches/${matchId}`), finalComputed);
        tournamentData.tournamentMatches[matchId] = finalComputed;

        await syncFinalMatchFromSemis();
        renderAll();
        alert("저장되었습니다.");
      } catch (err) {
        console.error(err);
        alert(err.message || "저장 중 오류가 발생했습니다.");
      }
    }

    function buildTournamentMatchData(id, label, teamAId, teamBId) {
      const teamA = getTeam(teamAId);
      const teamB = getTeam(teamBId);

      return {
        id,
        label,
        teamA: teamAId || "",
        teamB: teamBId || "",
        teamAName: teamA?.name || "",
        teamBName: teamB?.name || "",
        status: "ready",
        teamMatchScoreA: 0,
        teamMatchScoreB: 0,
        setDiffA: 0,
        setDiffB: 0,
        winnerTeamId: "",

      };

    async function createBracketFromGroups() {
      if (!isAdmin) {
        alert("관리자만 생성할 수 있습니다.");
        return;
      }

      try {
        const standingA = computeStandings("A");
        const standingB = computeStandings("B");

        if (standingA.length < 2 || standingB.length < 2) {
          throw new Error("조별리그 순위 데이터가 부족합니다.");
        }

        const a1 = standingA[0].teamId;
        const a2 = standingA[1].teamId;
        const b1 = standingB[0].teamId;
        const b2 = standingB[1].teamId;

        const tournamentMatches = {
          semifinal1: buildTournamentMatchData("semifinal1", "4강 1경기", a1, b2),
          semifinal2: buildTournamentMatchData("semifinal2", "4강 2경기", b1, a2),
          final: buildTournamentMatchData("final", "결승", "", "")
        };

        await update(ref(db, `tournaments/${tournamentId}`), { tournamentMatches });

        tournamentData.tournamentMatches = tournamentMatches;
        selectedMatchId = "semifinal1";
        renderAll();
        alert("4강 대진이 생성되었습니다.");
      } catch (err) {
        console.error(err);
        alert(err.message || "대진 생성 중 오류가 발생했습니다.");
      }
    }

    async function syncFinalMatchFromSemis() {
      const sf1 = getTournamentMatch("semifinal1");
      const sf2 = getTournamentMatch("semifinal2");
      const currentFinal = getTournamentMatch("final");

      if (!currentFinal) return;

      const winner1 = sf1?.winnerTeamId || "";
      const winner2 = sf2?.winnerTeamId || "";

      const finalTeamA = winner1 ? getTeam(winner1) : null;
      const finalTeamB = winner2 ? getTeam(winner2) : null;

      const nextFinal = JSON.parse(JSON.stringify(currentFinal));
      const teamChanged =
        nextFinal.teamA !== winner1 ||
        nextFinal.teamB !== winner2;

      nextFinal.teamA = winner1;
      nextFinal.teamB = winner2;
      nextFinal.teamAName = finalTeamA?.name || "";
      nextFinal.teamBName = finalTeamB?.name || "";

      if (teamChanged) {
        nextFinal.status = "ready";
        nextFinal.teamMatchScoreA = 0;
        nextFinal.teamMatchScoreB = 0;
        nextFinal.setDiffA = 0;
        nextFinal.setDiffB = 0;
        nextFinal.winnerTeamId = "";
        nextFinal.matches = makeEmptySubMatches();
      }

      await update(ref(db, `tournaments/${tournamentId}/tournamentMatches/final`), nextFinal);
      tournamentData.tournamentMatches.final = nextFinal;
    }

    async function resetTournament() {
      if (!isAdmin) return;

      const ok = confirm("토너먼트 전체 경기결과를 모두 초기화하시겠습니까?");
      if (!ok) return;

      try {
        const tm = tournamentData?.tournamentMatches || {};
        const updates = {};

        Object.values(tm).forEach(match => {
          updates[`tournaments/${tournamentId}/tournamentMatches/${match.id}`] = {
            ...match,
            status: "ready",
            teamMatchScoreA: 0,
            teamMatchScoreB: 0,
            setDiffA: 0,
            setDiffB: 0,
            winnerTeamId: "",
            matches: makeEmptySubMatches()
          };
        });

        await update(ref(db), updates);

        Object.keys(tm).forEach(key => {
          const match = tm[key];
          tournamentData.tournamentMatches[key] = {
            ...match,
            status: "ready",
            teamMatchScoreA: 0,
            teamMatchScoreB: 0,
            setDiffA: 0,
            setDiffB: 0,
            winnerTeamId: "",
            matches: makeEmptySubMatches()
          };
        });

        await syncFinalMatchFromSemis();
        renderAll();
        alert("전체 토너먼트가 초기화되었습니다.");
      } catch (err) {
        console.error(err);
        alert(err.message || "초기화 중 오류가 발생했습니다.");
      }
    }

    function renderAll() {
      setAdminStatusText();
      updateChampionBox();
      renderBracket();
      renderDetail();
    }

    function bindTopEvents() {
      btnRefresh.addEventListener("click", () => loadTournament());

      btnToggleAdmin.addEventListener("click", () => {
        if (isAdmin) {
          isAdmin = false;
          localStorage.removeItem(ADMIN_STORAGE_KEY);
          renderAll();
          return;
        }

        const input = prompt("관리자 비밀번호를 입력하세요.");
        if (input === null) return;

        if (input === ADMIN_PASSWORD) {
          isAdmin = true;
          localStorage.setItem(ADMIN_STORAGE_KEY, "true");
          renderAll();
        } else {
          alert("비밀번호가 올바르지 않습니다.");
        }
      });

      btnCreateBracket.addEventListener("click", createBracketFromGroups);
      btnResetTournament.addEventListener("click", resetTournament);

      btnGroupPage.addEventListener("click", () => {
        const target = `../game_live_group/?tournamentId=${encodeURIComponent(tournamentId)}`;
        location.href = target;
      });
    }

    async function loadTournament() {
      try {
        if (!tournamentId) {
          tournamentId = await resolveTournamentId();
        }

        if (!tournamentId) {
          metaStatus.textContent = "불러올 대회 ID가 없습니다.";
          bracketArea.innerHTML = `<div class="empty">대회 데이터를 찾을 수 없습니다.</div>`;
          detailArea.innerHTML = "";
          return;
        }

        const snap = await get(ref(db, `tournaments/${tournamentId}`));
        if (!snap.exists()) {
          metaStatus.textContent = `대회 데이터를 찾을 수 없습니다.\nID: ${tournamentId}`;
          bracketArea.innerHTML = `<div class="empty">대회 데이터가 존재하지 않습니다.</div>`;
          detailArea.innerHTML = "";
          return;
        }

        tournamentData = snap.val();
        localStorage.setItem("currentTournamentId", tournamentId);
        applyMeta();

        if (!getTournamentMatch(selectedMatchId)) {
          selectedMatchId = "semifinal1";
        }

        renderAll();
        bindRealtime();
      } catch (err) {
        console.error(err);
        metaStatus.textContent = `불러오기 실패\n${err.message || err}`;
      }
    }

    function bindRealtime() {
      if (realtimeBound) return;
      realtimeBound = true;

      const dataRef = ref(db, `tournaments/${tournamentId}`);
      onValue(dataRef, snap => {
        if (!snap.exists()) return;
        tournamentData = snap.val();
        applyMeta();

        if (!getTournamentMatch(selectedMatchId)) {
          selectedMatchId = "semifinal1";
        }

        renderAll();
      });
    }

    bindTopEvents();
    loadTournament();
  </script>
</body>
</html>
