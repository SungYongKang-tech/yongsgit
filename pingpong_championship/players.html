<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>선수현황 | 남동노조위원장기 탁구대회</title>

  <style>
    :root{
      --bg1:#e9f4ff;
      --bg2:#fff7ec;
      --card:#ffffff;
      --text:#16202a;
      --muted:#64748b;
      --line:#d8e4ef;
      --shadow:0 10px 28px rgba(15,23,42,.10);
      --blue:#1565c0;
      --green:#2e7d32;
      --red:#c62828;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, "Malgun Gothic", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #fef3c7 0%, transparent 28%),
        radial-gradient(circle at top right, #dbeafe 0%, transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      padding:10px;
    }

    .wrap{
      width:100%;
      max-width:880px;
      margin:0 auto;
    }

    .top-card{
      background:rgba(255,255,255,.96);
      border:1px solid rgba(255,255,255,.7);
      border-radius:24px;
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .top-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }

    h1{
      margin:0;
      font-size:28px;
      font-weight:900;
      letter-spacing:-.4px;
    }

    .back-btn{
      border:none;
      border-radius:14px;
      padding:9px 13px;
      background:linear-gradient(135deg,#37474f,#607d8b);
      color:#fff;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
    }

    .top-actions{
  display:flex;
  gap:6px;
  align-items:center;
}

.photo-edit-btn{
  border:none;
  border-radius:14px;
  padding:9px 13px;
  background:linear-gradient(135deg,#1565c0,#26c6da);
  color:#fff;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
  white-space:nowrap;
}

    .summary{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      line-height:1.45;
    }

    .team-card{
      background:rgba(255,255,255,.96);
      border:1px solid rgba(255,255,255,.75);
      border-radius:24px;
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .team-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }

    .team-title{
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .team-name{
      font-size:25px;
      font-weight:900;
      color:#0f172a;
      letter-spacing:-.3px;
    }

    .team-group{
      font-size:13px;
      font-weight:900;
      color:#64748b;
    }

    .team-count{
      font-size:13px;
      font-weight:900;
      color:#1565c0;
      background:#e3f2fd;
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
    }

    .team-photo{
      width:100%;
      border-radius:20px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#f8fafc;
      margin-bottom:12px;
      min-height:132px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .team-photo img{
      width:100%;
      display:block;
      max-height:300px;
      object-fit:cover;
    }

    .no-photo{
      color:#94a3b8;
      font-size:14px;
      font-weight:900;
      padding:36px 10px;
      text-align:center;
    }

    .section-label{
      font-size:15px;
      font-weight:900;
      margin:12px 0 8px;
      color:#334155;
    }

    .players-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
    }

    .player-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(135deg,#ffffff,#f8fbff);
      padding:10px;
      display:flex;
      gap:10px;
      align-items:center;
      min-height:88px;
      cursor:pointer;
    }

    .player-photo{
      width:60px;
      height:60px;
      border-radius:16px;
      overflow:hidden;
      background:#e2e8f0;
      border:1px solid #dbe4ee;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .player-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .player-placeholder{
      font-size:24px;
      font-weight:900;
      color:#64748b;
    }

    .player-info{
      min-width:0;
      flex:1;
    }

    .player-name{
      font-size:18px;
      font-weight:900;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .player-meta{
      margin-top:5px;
      display:flex;
      gap:5px;
      flex-wrap:wrap;
    }

    .badge{
      font-size:11px;
      font-weight:900;
      padding:4px 7px;
      border-radius:999px;
      background:#eef2ff;
      color:#3730a3;
    }

    .badge.men{
      background:#dbeafe;
      color:#1d4ed8;
    }

    .badge.women{
      background:#ffe4e6;
      color:#be123c;
    }

    .loading,
    .empty{
      text-align:center;
      padding:30px 10px;
      color:#64748b;
      font-weight:900;
      background:rgba(255,255,255,.9);
      border-radius:20px;
      border:1px solid var(--line);
    }

    .photo-modal{
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:rgba(0,0,0,.78);
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .photo-modal.show{
      display:flex;
    }

    .modal-box{
      width:100%;
      max-width:560px;
      background:#fff;
      border-radius:22px;
      padding:14px;
      text-align:center;
      box-shadow:0 18px 40px rgba(0,0,0,.32);
    }

    .modal-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
    }

    .modal-img{
      width:100%;
      max-height:72vh;
      object-fit:contain;
      border-radius:16px;
      background:#f1f5f9;
    }

    .modal-tip{
      margin-top:10px;
      font-size:13px;
      font-weight:800;
      color:#64748b;
    }

    @media (max-width:520px){
      body{padding:8px;}

      h1{font-size:25px;}

      .team-card{
        padding:12px;
        border-radius:22px;
      }

      .team-name{font-size:23px;}

      .players-grid{
        grid-template-columns:1fr;
      }

      .player-card{
        min-height:78px;
      }

      .player-photo{
        width:56px;
        height:56px;
      }

      .player-name{
        font-size:17px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top-card">
      <div class="top-row">
        <h1>선수현황</h1>
        <div class="top-actions">
          <button class="photo-edit-btn" onclick="goPhotoManager()">사진 수정</button>
          <button class="back-btn" onclick="location.href='./'">← 메인</button>
        </div>
      </div>
      <div class="summary" id="pageSummary">
        대회 정보를 불러오는 중입니다.
      </div>
    </div>

    <div id="content">
      <div class="loading">선수 정보를 불러오는 중입니다...</div>
    </div>
  </div>

  <div id="photoModal" class="photo-modal" onclick="closePhotoModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div id="modalTitle" class="modal-title"></div>
      <img id="modalImg" class="modal-img" src="" alt="사진">
      <div class="modal-tip">바깥 영역을 누르면 닫힙니다</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      get
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpXivPM_KJlY8yN1X0_oQH8P-MpyOwNo8",
      authDomain: "koen-championship.firebaseapp.com",
      projectId: "koen-championship",
      storageBucket: "koen-championship.firebasestorage.app",
      messagingSenderId: "652507559896",
      appId: "1:652507559896:web:9bf6bf5c97f4b4dbb024ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(
      app,
      "https://koen-championship-default-rtdb.asia-southeast1.firebasedatabase.app"
    );

    const TEAM_DISPLAY_ORDER = [
      "영흥", "여수", "삼천포", "강릉",
      "영동", "본사", "분당", "고성"
    ];

    const contentEl = document.getElementById("content");
    const pageSummary = document.getElementById("pageSummary");

    let tournamentId = "";
    let tournamentData = null;

    const DEFAULT_COMMON_PASSWORD = "0000";

const STORAGE_KEYS = {
  common: "koen_pingpong_pw_common"
};

function getCommonPassword(){
  return localStorage.getItem(STORAGE_KEYS.common) || DEFAULT_COMMON_PASSWORD;
}

    function sanitizeKey(v) {
      return String(v || "").trim().replace(/[.#$/[\]]/g, "_");
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(str) {
      return escapeHtml(str).replaceAll("`", "&#96;");
    }

    async function resolveTournamentId() {
      const params = new URLSearchParams(location.search);
      const fromQuery = params.get("tournamentId") || params.get("tid");

      if (fromQuery) return fromQuery;

      const snap = await get(ref(db, "currentTournamentId"));
      if (snap.exists()) return snap.val();

      return "current_tournament";
    }

    async function loadTournament() {
      tournamentId = await resolveTournamentId();

      const snap = await get(ref(db, `tournaments/${tournamentId}`));

      if (!snap.exists()) {
        throw new Error("대회 데이터를 찾을 수 없습니다.");
      }

      tournamentData = snap.val();
    }

    function getTeamList() {
      const teamsObj = tournamentData?.teams || {};
      let list = Object.values(teamsObj);

      list.sort((a, b) => {
        const aOrder = TEAM_DISPLAY_ORDER.indexOf(a.name);
        const bOrder = TEAM_DISPLAY_ORDER.indexOf(b.name);

        if (aOrder !== -1 && bOrder !== -1) return aOrder - bOrder;
        if (aOrder !== -1) return -1;
        if (bOrder !== -1) return 1;

        const n1 = Number(String(a.id || "").replace("team", ""));
        const n2 = Number(String(b.id || "").replace("team", ""));
        return n1 - n2;
      });

      return list;
    }

    function getPlayerSlots(team) {
      const men = Array.isArray(team.men) ? team.men : [];
      const women = Array.isArray(team.women) ? team.women : [];

      const slots = [];

      men.forEach((name, idx) => {
        slots.push({
          slotKey: `men_${idx}`,
          playerName: String(name || "").trim(),
          gender: "men",
          genderLabel: "남자",
          orderLabel: `남자 ${idx + 1}`
        });
      });

      women.forEach((name, idx) => {
        slots.push({
          slotKey: `women_${idx}`,
          playerName: String(name || "").trim(),
          gender: "women",
          genderLabel: "여자",
          orderLabel: `여자 ${idx + 1}`
        });
      });

      return slots;
    }

    function getTeamPhoto(teamName) {
      const teamKey = sanitizeKey(teamName);
      const data = tournamentData?.photoAssets?.teamPhotos?.[teamKey];

      if (!data) return null;

      return {
        url: data.thumbUrl || data.secureUrl || "",
        fullUrl: data.secureUrl || data.thumbUrl || ""
      };
    }

    function getPlayerPhoto(teamName, slotKey) {
      const teamKey = sanitizeKey(teamName);
      const slotSafeKey = sanitizeKey(slotKey);

      const data =
        tournamentData?.photoAssets?.playerPhotos?.[teamKey]?.[slotSafeKey];

      if (!data || data.hidden) return null;

      return {
        url: data.thumbUrl || data.secureUrl || "",
        fullUrl: data.secureUrl || data.thumbUrl || ""
      };
    }

    function render() {
      const meta = tournamentData?.meta || {};
      const teams = getTeamList();

      const totalPlayers = teams.reduce((sum, team) => {
        return sum + getPlayerSlots(team).length;
      }, 0);

      pageSummary.textContent =
        `${meta.title || "대회"} / ${meta.startDate || "-"} ~ ${meta.endDate || "-"} / 총 ${teams.length}팀, 선수 ${totalPlayers}명`;

      if (!teams.length) {
        contentEl.innerHTML = `<div class="empty">등록된 팀이 없습니다.</div>`;
        return;
      }

      contentEl.innerHTML = teams.map(team => renderTeamCard(team)).join("");
    }

    function renderTeamCard(team) {
      const teamName = team.name || "-";
      const group = team.group || "-";
      const slots = getPlayerSlots(team);
      const teamPhoto = getTeamPhoto(teamName);

      const menSlots = slots.filter(v => v.gender === "men");
      const womenSlots = slots.filter(v => v.gender === "women");

      return `
        <section class="team-card">
          <div class="team-head">
            <div class="team-title">
              <div class="team-name">${escapeHtml(teamName)}</div>
              <div class="team-group">${escapeHtml(group)}조</div>
            </div>
            <div class="team-count">${slots.length}명</div>
          </div>

          <div
            class="team-photo"
            ${teamPhoto?.fullUrl ? `onclick="openPhotoModal('${escapeAttr(teamName)} 단체사진','${escapeAttr(teamPhoto.fullUrl)}')"` : ""}
          >
            ${
              teamPhoto?.url
                ? `<img src="${escapeAttr(teamPhoto.url)}" alt="${escapeAttr(teamName)} 단체사진">`
                : `<div class="no-photo">단체사진 미등록</div>`
            }
          </div>

          ${renderPlayerSection(teamName, "남자 선수", menSlots)}
          ${renderPlayerSection(teamName, "여자 선수", womenSlots)}
        </section>
      `;
    }

    function renderPlayerSection(teamName, title, slots) {
      if (!slots.length) return "";

      return `
        <div class="section-label">${escapeHtml(title)}</div>
        <div class="players-grid">
          ${slots.map(slot => renderPlayerCard(teamName, slot)).join("")}
        </div>
      `;
    }

    function renderPlayerCard(teamName, slot) {
      const photo = getPlayerPhoto(teamName, slot.slotKey);
      const displayName = slot.playerName || slot.orderLabel || "이름 미입력";
      const firstChar = displayName.slice(0, 1) || "?";

      return `
        <div
          class="player-card"
          ${photo?.fullUrl ? `onclick="openPhotoModal('${escapeAttr(teamName)} ${escapeAttr(displayName)}','${escapeAttr(photo.fullUrl)}')"` : ""}
        >
          <div class="player-photo">
            ${
              photo?.url
                ? `<img src="${escapeAttr(photo.url)}" alt="${escapeAttr(displayName)} 사진">`
                : `<div class="player-placeholder">${escapeHtml(firstChar)}</div>`
            }
          </div>

          <div class="player-info">
            <div class="player-name">${escapeHtml(displayName)}</div>
            <div class="player-meta">
              <span class="badge ${slot.gender}">${escapeHtml(slot.genderLabel)}</span>
              <span class="badge">${escapeHtml(slot.orderLabel)}</span>
            </div>
          </div>
        </div>
      `;
    }

    window.openPhotoModal = function(title, url) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalImg").src = url;
      document.getElementById("photoModal").classList.add("show");
    };

    window.closePhotoModal = function() {
      document.getElementById("photoModal").classList.remove("show");
      document.getElementById("modalImg").src = "";
    };

    window.goPhotoManager = function(){
  const pw = prompt("일반 비밀번호를 입력하세요.");
  if (pw === null) return;

  const commonPw = getCommonPassword();

  if (pw !== commonPw) {
    alert("비밀번호가 올바르지 않습니다.");
    return;
  }

  sessionStorage.setItem("koen_photo_access_ok", "true");
  sessionStorage.setItem("koen_photo_access_tournamentId", tournamentId);

  const url = `./game_make/photo-manager.html?tournamentId=${encodeURIComponent(tournamentId)}`;
  location.href = url;
};

    async function init() {
      try {
        await loadTournament();
        render();
      } catch (err) {
        console.error(err);
        contentEl.innerHTML = `<div class="empty">${escapeHtml(err.message || "선수 정보를 불러오지 못했습니다.")}</div>`;
        pageSummary.textContent = "대회 정보를 불러오지 못했습니다.";
      }
    }

    init();
  </script>
</body>
</html>
