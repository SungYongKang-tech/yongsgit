<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대회 사진 관리</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#d9e2ec;
      --text:#1f2933;
      --muted:#52606d;
      --primary:#1565c0;
      --primary2:#0d47a1;
      --danger:#c62828;
      --ok:#2e7d32;
      --shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, "Malgun Gothic", sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:12px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .title-area h1{
      margin:0 0 4px;
      font-size:22px;
    }
    .title-area small{
      color:var(--muted);
      font-size:12px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:12px;
    }
    .grid{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:12px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }
    label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }
    input, select{
      width:100%;
      border:1px solid #cbd2d9;
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
      color:var(--text);
    }
    button{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
      font-weight:700;
    }
    button:hover{background:var(--primary2)}
    button.secondary{background:#607d8b}
    button.green{background:var(--ok)}
    button.danger{background:var(--danger)}
    .hint{
      font-size:12px;
      color:var(--muted);
    }
    .status-box{
      margin-top:8px;
      padding:10px 12px;
      border-radius:12px;
      background:#f8fbff;
      border:1px solid #d8e6fb;
      font-size:13px;
      white-space:pre-line;
    }
    .team-buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .team-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:10px 8px;
      border-radius:12px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }
    .team-btn.active{
      background:#eef4ff;
      color:#0d47a1;
      border-color:#bfd7ff;
    }
    .photo-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .preview-card{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fcfdff;
    }
    .preview-title{
      font-size:14px;
      font-weight:800;
      margin-bottom:8px;
    }
    .image-preview{
      width:100%;
      aspect-ratio:1/1;
      border:1px solid var(--line);
      border-radius:14px;
      background:#eef2f6;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#7b8794;
      font-size:13px;
      margin-bottom:10px;
    }
    .team-photo-preview{
      aspect-ratio:16/10;
    }
    .image-preview img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .players-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .players-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
    }
    .player-card{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fcfdff;
    }
    .player-name{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .player-meta{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }
    .empty{
      padding:20px;
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:12px;
      background:#fafcff;
    }
    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }
      .photo-box{
        grid-template-columns:1fr;
      }
      .players-grid{
        grid-template-columns:1fr 1fr;
      }
    }
    @media (max-width: 640px){
      .wrap{
        padding:8px;
      }
      .card{
        padding:10px;
        border-radius:12px;
      }
      .team-buttons{
        grid-template-columns:1fr 1fr;
      }
      .players-grid{
        grid-template-columns:1fr;
      }
      .title-area h1{
        font-size:18px;
      }
      button{
        width:100%;
      }
      .row button{
        width:auto;
        flex:1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-area">
        <h1>대회 사진 관리</h1>
        <small id="pageSummary">대회 데이터를 불러오는 중입니다.</small>
      </div>
      <div class="row">
        <button type="button" class="secondary" id="btnReload">새로고침</button>
        <button type="button" id="btnBack">이전으로</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <div class="field">
          <label>대회 ID</label>
          <input id="tournamentIdInput" type="text" readonly />
        </div>

        <div class="field">
          <label>사업소 선택</label>
          <div class="team-buttons" id="teamButtons"></div>
        </div>

        <div class="status-box" id="leftStatus">사업소를 선택해 주세요.</div>
      </section>

      <section>
        <div class="card">
          <div class="photo-box">
            <div class="preview-card">
              <div class="preview-title" id="teamPhotoTitle">사업소 전체사진</div>
              <div class="image-preview team-photo-preview" id="teamPhotoPreview">사진 없음</div>
              <div class="field">
                <label>사업소 전체사진 업로드</label>
                <input type="file" id="teamPhotoFile" accept="image/*" capture="environment" />
              </div>
              <div class="row">
                <button type="button" class="green" id="btnUploadTeamPhoto">전체사진 저장</button>
              </div>
              <div class="hint">휴대폰에서는 촬영 또는 앨범에서 선택 가능합니다.</div>
            </div>

            <div class="preview-card">
              <div class="preview-title">선수 사진 등록 안내</div>
              <div class="status-box" id="rightGuide">
                1. 사업소를 선택합니다.
                2. 아래 선수 카드에서 해당 선수의 사진을 선택합니다.
                3. 저장하면 이름과 매칭된 사진이 등록됩니다.
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="players-header">
            <h2 id="playersTitle" style="margin:0;">선수 사진</h2>
          </div>
          <div class="players-grid" id="playersGrid"></div>
        </div>
      </section>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      remove
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpXivPM_KJlY8yN1X0_oQH8P-MpyOwNo8",
      authDomain: "koen-championship.firebaseapp.com",
      projectId: "koen-championship",
      storageBucket: "koen-championship.firebasestorage.app",
      messagingSenderId: "652507559896",
      appId: "1:652507559896:web:9bf6bf5c97f4b4dbb024ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, "https://koen-championship-default-rtdb.asia-southeast1.firebasedatabase.app");

    const CLOUD_NAME = "여기에_본인_cloud_name";
    const UPLOAD_PRESET = "여기에_unsigned_preset명";
    const PHOTO_SUPERADMIN_PASSWORD = "4321";

    const TEAM_FOLDER_MAP = {
      "영흥": "younghung",
      "여수": "yeosoo",
      "삼천포": "samchunpo",
      "강릉": "gangnung",
      "영동": "youngdong",
      "본사": "main-office",
      "분당": "bundang",
      "고성": "gosung"
    };

    const TEAM_DISPLAY_ORDER = [
      "영흥", "여수", "삼천포", "강릉",
      "영동", "본사", "분당", "고성"
    ];

    const params = new URLSearchParams(location.search);
    const tournamentId = params.get("tournamentId") || "current_tournament";

    const tournamentIdInput = document.getElementById("tournamentIdInput");
    const pageSummary = document.getElementById("pageSummary");
    const teamButtons = document.getElementById("teamButtons");
    const leftStatus = document.getElementById("leftStatus");
    const teamPhotoTitle = document.getElementById("teamPhotoTitle");
    const teamPhotoPreview = document.getElementById("teamPhotoPreview");
    const teamPhotoFile = document.getElementById("teamPhotoFile");
    const btnUploadTeamPhoto = document.getElementById("btnUploadTeamPhoto");
    const playersTitle = document.getElementById("playersTitle");
    const playersGrid = document.getElementById("playersGrid");
    const btnReload = document.getElementById("btnReload");
    const btnBack = document.getElementById("btnBack");

    let tournamentData = null;
    let selectedTeamName = "";
    let selectedTeamFolder = "";

    function safeTrim(v) {
      return (v || "").trim();
    }

    function sanitizeKey(v) {
      return String(v || "").trim().replace(/[.#$/[\]]/g, "_");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function makeThumbUrl(url) {
      if (!url) return "";
      return url.replace("/upload/", "/upload/w_300,h_300,c_fill,g_face,r_max/");
    }

    function makeTeamThumbUrl(url) {
      if (!url) return "";
      return url.replace("/upload/", "/upload/w_900,h_560,c_fill/");
    }

    function renderPreview(el, url, altText, isTeam = false) {
      if (!url) {
        el.textContent = "사진 없음";
        return;
      }
      el.innerHTML = `<img src="${url}" alt="${escapeHtml(altText)}" />`;
      if (isTeam) {
        el.classList.add("team-photo-preview");
      }
    }

    function getTeamListFromTournament() {
      const teamsObj = tournamentData?.teams || {};
      const list = Object.values(teamsObj);

      list.sort((a, b) => {
        const n1 = Number(String(a.id || "").replace("team", ""));
        const n2 = Number(String(b.id || "").replace("team", ""));
        return n1 - n2;
      });

      return list;
    }

    function getTeamByName(teamName) {
      return getTeamListFromTournament().find(t => t.name === teamName) || null;
    }

    function getPlayersOfTeam(teamName) {
      const team = getTeamByName(teamName);
      if (!team) return [];
      return [
        ...(Array.isArray(team.men) ? team.men : []),
        ...(Array.isArray(team.women) ? team.women : [])
      ].map(v => safeTrim(v)).filter(Boolean);
    }

    async function verifyAccess() {
      const input = prompt("최종 관리자 비밀번호를 입력하세요.");
      if (input === null) {
        alert("접근이 취소되었습니다.");
        history.back();
        return false;
      }
      if (input !== PHOTO_SUPERADMIN_PASSWORD) {
        alert("비밀번호가 올바르지 않습니다.");
        history.back();
        return false;
      }
      return true;
    }

    async function loadTournament() {
      tournamentIdInput.value = tournamentId;

      const snap = await get(ref(db, `tournaments/${tournamentId}`));
      if (!snap.exists()) {
        throw new Error("대회 데이터를 찾을 수 없습니다.");
      }

      tournamentData = snap.val();
      const title = tournamentData?.meta?.title || "대회";
      pageSummary.textContent = `${title} / 선수 사진 및 사업소 사진 관리`;
    }

    function renderTeamButtons() {
      const existingNames = getTeamListFromTournament().map(t => t.name).filter(Boolean);

      const orderedTeams = TEAM_DISPLAY_ORDER.filter(name => existingNames.includes(name));

      teamButtons.innerHTML = orderedTeams.map(name => `
        <button
          type="button"
          class="team-btn ${selectedTeamName === name ? "active" : ""}"
          data-team="${escapeHtml(name)}"
        >${escapeHtml(name)}</button>
      `).join("");

      teamButtons.querySelectorAll(".team-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          selectedTeamName = btn.dataset.team;
          selectedTeamFolder = TEAM_FOLDER_MAP[selectedTeamName] || "";
          renderTeamButtons();
          await renderSelectedTeam();
        });
      });

      if (!selectedTeamName && orderedTeams.length) {
        selectedTeamName = orderedTeams[0];
        selectedTeamFolder = TEAM_FOLDER_MAP[selectedTeamName] || "";
        renderTeamButtons();
      }
    }

    async function loadTeamPhoto(teamName) {
      const snap = await get(ref(db, `tournaments/${tournamentId}/photoAssets/teamPhotos/${sanitizeKey(teamName)}`));
      return snap.exists() ? snap.val() : null;
    }

    async function loadPlayerPhoto(teamName, playerName) {
      const snap = await get(ref(db, `tournaments/${tournamentId}/photoAssets/playerPhotos/${sanitizeKey(teamName)}/${sanitizeKey(playerName)}`));
      return snap.exists() ? snap.val() : null;
    }

    async function renderSelectedTeam() {
      if (!selectedTeamName) return;

      teamPhotoTitle.textContent = `${selectedTeamName} 사업소 전체사진`;
      playersTitle.textContent = `${selectedTeamName} 선수 사진`;
      leftStatus.textContent = `${selectedTeamName} 정보를 불러오는 중입니다.`;

      const teamPhoto = await loadTeamPhoto(selectedTeamName);
      renderPreview(
        teamPhotoPreview,
        teamPhoto?.thumbUrl || teamPhoto?.secureUrl || "",
        `${selectedTeamName} 전체사진`,
        true
      );

      const players = getPlayersOfTeam(selectedTeamName);

      if (!players.length) {
        playersGrid.innerHTML = `<div class="empty">등록된 선수가 없습니다.</div>`;
        leftStatus.textContent = `${selectedTeamName} / 선수 0명`;
        return;
      }

      const cards = [];
      for (const playerName of players) {
        const photo = await loadPlayerPhoto(selectedTeamName, playerName);

        cards.push(`
          <div class="player-card" data-player="${escapeHtml(playerName)}">
            <div class="player-name">${escapeHtml(playerName)}</div>
            <div class="player-meta">${escapeHtml(selectedTeamName)} / 폴더: ${escapeHtml(selectedTeamFolder)}</div>
            <div class="image-preview">
              ${
                photo?.thumbUrl || photo?.secureUrl
                  ? `<img src="${photo.thumbUrl || photo.secureUrl}" alt="${escapeHtml(playerName)}" />`
                  : `사진 없음`
              }
            </div>
            <div class="field">
              <label>${escapeHtml(playerName)} 사진 업로드</label>
              <input type="file" class="player-file" accept="image/*" capture="environment" />
            </div>
            <div class="row">
              <button type="button" class="green btn-save-player">저장</button>
              <button type="button" class="danger btn-hide-player">숨김</button>
            </div>
          </div>
        `);
      }

      playersGrid.innerHTML = cards.join("");
      bindPlayerButtons();

      leftStatus.textContent = `${selectedTeamName} / 선수 ${players.length}명 / Cloudinary 폴더: ${selectedTeamFolder}`;
    }

    async function uploadToCloudinary(file, folderPath, publicId) {
      if (!file) {
        throw new Error("사진 파일을 선택해 주세요.");
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);
      formData.append("folder", folderPath);
      formData.append("public_id", publicId);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      if (!res.ok) {
        throw new Error(data?.error?.message || "Cloudinary 업로드 실패");
      }

      return data;
    }

    btnUploadTeamPhoto.addEventListener("click", async () => {
      try {
        if (!selectedTeamName || !selectedTeamFolder) {
          throw new Error("사업소를 먼저 선택해 주세요.");
        }

        const file = teamPhotoFile.files?.[0];
        const folderPath = `26 pingpong championship/${selectedTeamFolder}`;
        const publicId = `${selectedTeamFolder}_group_${Date.now()}`;

        leftStatus.textContent = `${selectedTeamName} 전체사진 업로드 중입니다...`;

        const result = await uploadToCloudinary(file, folderPath, publicId);

        const payload = {
          teamName: selectedTeamName,
          folderName: selectedTeamFolder,
          publicId: result.public_id,
          secureUrl: result.secure_url,
          thumbUrl: makeTeamThumbUrl(result.secure_url),
          updatedAt: Date.now()
        };

        await update(ref(db), {
          [`tournaments/${tournamentId}/photoAssets/teamPhotos/${sanitizeKey(selectedTeamName)}`]: payload
        });

        teamPhotoFile.value = "";
        await renderSelectedTeam();
        leftStatus.textContent = `${selectedTeamName} 전체사진 저장 완료`;
      } catch (err) {
        alert(err.message || String(err));
      }
    });

    function bindPlayerButtons() {
      document.querySelectorAll(".player-card").forEach(card => {
        const playerName = card.dataset.player;
        const fileInput = card.querySelector(".player-file");
        const btnSave = card.querySelector(".btn-save-player");
        const btnHide = card.querySelector(".btn-hide-player");

        btnSave.addEventListener("click", async () => {
          try {
            if (!selectedTeamName || !selectedTeamFolder) {
              throw new Error("사업소를 먼저 선택해 주세요.");
            }

            const file = fileInput.files?.[0];
            const cleanPlayerName = safeTrim(playerName);

            const folderPath = `26 pingpong championship/${selectedTeamFolder}`;
            const publicId = `${cleanPlayerName}_${Date.now()}`;

            leftStatus.textContent = `${selectedTeamName} / ${cleanPlayerName} 사진 업로드 중입니다...`;

            const result = await uploadToCloudinary(file, folderPath, publicId);

            const payload = {
              teamName: selectedTeamName,
              folderName: selectedTeamFolder,
              playerName: cleanPlayerName,
              publicId: result.public_id,
              secureUrl: result.secure_url,
              thumbUrl: makeThumbUrl(result.secure_url),
              updatedAt: Date.now(),
              hidden: false
            };

            await update(ref(db), {
              [`tournaments/${tournamentId}/photoAssets/playerPhotos/${sanitizeKey(selectedTeamName)}/${sanitizeKey(cleanPlayerName)}`]: payload
            });

            await renderSelectedTeam();
            leftStatus.textContent = `${selectedTeamName} / ${cleanPlayerName} 사진 저장 완료`;
          } catch (err) {
            alert(err.message || String(err));
          }
        });

        btnHide.addEventListener("click", async () => {
          try {
            const cleanPlayerName = safeTrim(playerName);
            if (!confirm(`${cleanPlayerName} 선수 사진을 화면에서 숨길까요?`)) return;

            await remove(ref(db, `tournaments/${tournamentId}/photoAssets/playerPhotos/${sanitizeKey(selectedTeamName)}/${sanitizeKey(cleanPlayerName)}`));
            await renderSelectedTeam();
            leftStatus.textContent = `${selectedTeamName} / ${cleanPlayerName} 사진 숨김 처리 완료`;
          } catch (err) {
            alert(err.message || String(err));
          }
        });
      });
    }

    btnReload.addEventListener("click", async () => {
      try {
        await loadTournament();
        renderTeamButtons();
        await renderSelectedTeam();
      } catch (err) {
        alert(err.message || String(err));
      }
    });

    btnBack.addEventListener("click", () => {
      history.back();
    });

    (async function init() {
      try {
        const ok = await verifyAccess();
        if (!ok) return;

        await loadTournament();
        renderTeamButtons();
        await renderSelectedTeam();
      } catch (err) {
        alert(err.message || String(err));
      }
    })();
  </script>
</body>
</html>
