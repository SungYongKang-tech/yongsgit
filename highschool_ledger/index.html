<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>고등 동기회 모임 내역서</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  padding: 12px;
  font-family: "Noto Sans KR", sans-serif;
  background: #f5f7fb;
}

h1 {
  text-align: center;
  font-size: 34px;
  margin: 20px 0 28px;
}

.login-box {
  max-width: 420px;
  margin: 40px auto;
  background: white;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}

.login-box input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  margin-bottom: 10px;
  box-sizing: border-box;
}

.login-box button {
  width: 100%;
  background: #2563eb;
  color: white;
}

#app {
  display: none;
}

.summary {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.summary div {
  flex: 1;
  background: white;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  font-weight: bold;
}

.excel-upload {
  display: none;
  gap: 10px;
  margin-bottom: 15px;
}

.excel-upload input {
  flex: 1;
  background: white;
  border: 1px solid #aaa;
  padding: 12px;
  font-size: 16px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.editBtn {
  background: #16a34a;
  color: white;
}

.bottomBtn {
  background: #2563eb;
  color: white;
}

.deleteBtn {
  background: #ef4444;
  color: white;
}

.addBtn {
  background: #16a34a;
  color: white;
  width: 100%;
}

.action-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #222;
  padding: 6px;
  text-align: center;
  font-size: 14px;
}

thead {
  position: sticky;
  top: 0;
  z-index: 20;
}

thead th {
  background: #ffff99;
  position: sticky;
  top: 0;
  z-index: 21;
}



td.editable {
  background: #fff;
}

td.locked {
  background: #f5f5f5;
}

.num {
  text-align: right;
}

tfoot {
  display: none;
}

tfoot td {
  background: #eef6ff;
}

tfoot input {
  width: 100%;
  border: none;
  padding: 8px;
  font-size: 14px;
  box-sizing: border-box;
  background: #fff;
}

@media (max-width: 700px) {
  h1 { font-size: 24px; }

  th, td {
    font-size: 12px;
    padding: 4px;
  }

  .excel-upload,
  .action-bar {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<h1>고등 동기회 모임 내역서</h1>

<div id="viewLogin" class="login-box">
  <h2>조회 비밀번호</h2>
  <input type="password" id="viewPwInput" placeholder="보기 비밀번호 입력">
  <button onclick="checkViewPassword()">장부 보기</button>
</div>

<div id="app">

  <div class="action-bar">
    <button class="editBtn" onclick="checkEditPassword()">수정모드</button>
    <button class="bottomBtn" onclick="scrollToBottom()">맨 하단으로</button>
  </div>

  <div class="summary">
    <div>총수입<br><span id="sumIncome">0</span>원</div>
    <div>총지출<br><span id="sumExpense">0</span>원</div>
    <div>잔액<br><span id="sumBalance">0</span>원</div>
  </div>

  <div class="excel-upload" id="excelUploadBox">
    <input type="file" id="excelFile" accept=".xlsx,.xls" onchange="uploadExcel(event)">
    <button class="deleteBtn" onclick="deleteAll()">전체 삭제</button>
  </div>

  <table>
    <thead>
  <tr>
    <th>날짜</th>
    <th>구분</th>
    <th>수입</th>
    <th>지출</th>
    <th>잔액</th>
    <th>미수금<br>동호</th>
    <th>미수금<br>기영</th>
    <th>미수금<br>희근</th>
    <th>회비</th>
    <th>삭제</th>
  </tr>
</thead>

    <tbody id="tbody"></tbody>

    <tfoot id="addRowFoot">
      <tr>
        <td><input id="addDate" placeholder="날짜"></td>
        <td><input id="addCategory" placeholder="구분"></td>
        <td><input id="addIncome" placeholder="수입"></td>
        <td><input id="addExpense" placeholder="지출"></td>
        <td></td>
        <td><input id="addDongho" placeholder="동호"></td>
        <td><input id="addGiyoung" placeholder="기영"></td>
        <td><input id="addHeegeun" placeholder="희근"></td>
        <td><input id="addFee" placeholder="회비"></td>
        <td><button class="addBtn" onclick="addRow()">등록</button></td>
      </tr>
    </tfoot>
  </table>

</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAX9JAF_qfHszEsx0YZIPyQ1ygfVm8K8IY",
  authDomain: "gido-645c1.firebaseapp.com",
  databaseURL: "https://gido-645c1-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gido-645c1",
  storageBucket: "gido-645c1.firebasestorage.app",
  messagingSenderId: "799221874446",
  appId: "1:799221874446:web:e07459a899690da41f615f"
});

const db = firebase.database();
const refPath = "고등동기회/회비내역";

let data = {};
let canView = false;
let isEditor = false;

const el = id => document.getElementById(id);

function toNum(v) {
  return Number(String(v || 0).replace(/[^\d.-]/g, "")) || 0;
}

function comma(n) {
  return toNum(n).toLocaleString();
}

function passwordMatch(input, saved) {
  const inputText = String(input || "").trim();
  const savedText = String(saved || "").trim();
  return inputText === savedText;
}

function checkViewPassword() {
  const inputPw = el("viewPwInput").value.trim();

  db.ref("settings/viewPassword").once("value").then(snap => {
    if (passwordMatch(inputPw, snap.val())) {
      canView = true;
      el("viewLogin").style.display = "none";
      el("app").style.display = "block";
      startListen();
    } else {
      alert("보기 비밀번호가 틀렸습니다.");
    }
  }).catch(err => {
    alert("Firebase 비밀번호 읽기 실패: " + err.message);
  });
}

function checkEditPassword() {
  const inputPw = prompt("수정 비밀번호를 입력하세요.");
  if (!inputPw) return;

  db.ref("settings/editPassword").once("value").then(snap => {
    if (passwordMatch(inputPw, snap.val())) {
      isEditor = true;
      el("excelUploadBox").style.display = "flex";
      el("addRowFoot").style.display = "table-footer-group";
      alert("수정모드가 활성화되었습니다.");
      render();
    } else {
      alert("수정 비밀번호가 틀렸습니다.");
    }
  });
}

function startListen() {
  db.ref(refPath).on("value", snap => {
    data = snap.val() || {};
    render();
  });
}

function excelDateToText(v) {
  if (!v) return "";

  if (typeof v === "number") {
    const date = XLSX.SSF.parse_date_code(v);
    if (!date) return "";

    const yy = String(date.y).slice(2);
    const mm = String(date.m).padStart(2, "0");
    const dd = String(date.d).padStart(2, "0");

    return `${yy}.${mm}.${dd}`;
  }

  return String(v).trim();
}

function uploadExcel(event) {
  if (!isEditor) {
    alert("수정모드에서만 업로드할 수 있습니다.");
    return;
  }

  const file = event.target.files[0];
  if (!file) return;

  const replace = confirm("기존 데이터를 삭제하고 엑셀 데이터로 새로 불러올까요?\n\n확인: 기존 데이터 삭제 후 업로드\n취소: 기존 데이터에 추가");

  const reader = new FileReader();

  reader.onload = async function(e) {
    const excelData = new Uint8Array(e.target.result);
    const workbook = XLSX.read(excelData, { type: "array" });

    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];

    const rows = XLSX.utils.sheet_to_json(sheet, {
      header: 1,
      defval: "",
      raw: true
    });

    const ref = db.ref(refPath);

    if (replace) {
      await ref.remove();
    }

    let count = 0;

    rows.forEach((row, index) => {
      if (index < 3) return;

      const date = excelDateToText(row[0]);
      const category = String(row[1] || "").trim();

      const income = toNum(row[2]);
      const expense = toNum(row[3]);

      const unpaidDongho = toNum(row[5]);
      const unpaidGiyoung = toNum(row[6]);
      const unpaidHeegeun = toNum(row[7]);
      const fee = toNum(row[8]);

      if (!date || !category) return;

      ref.push({
        date,
        category,
        income,
        expense,
        unpaidDongho,
        unpaidGiyoung,
        unpaidHeegeun,
        fee,
        createdAt: Date.now() + index
      });

      count++;
    });

    alert(count + "건 업로드 완료!");
    event.target.value = "";
  };

  reader.readAsArrayBuffer(file);
}

function render() {
  const tbody = el("tbody");
  tbody.innerHTML = "";

  const rows = Object.entries(data)
    .sort((a, b) => (a[1].createdAt || 0) - (b[1].createdAt || 0));

  let balance = 0;
  let totalIncome = 0;
  let totalExpense = 0;

  rows.forEach(([key, row], index) => {
    const income = toNum(row.income);
    const expense = toNum(row.expense);

    totalIncome += income;
    totalExpense += expense;
    balance += income - expense;

    const editableAttr = isEditor ? `contenteditable="true"` : "";
    const editableClass = isEditor ? "editable" : "locked";

    const deleteCell = isEditor
      ? `<td><button class="deleteBtn" onclick="deleteRow('${key}')">X</button></td>`
      : `<td></td>`;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="${editableClass}" ${editableAttr} onblur="updateCell('${key}', 'date', this.innerText)">${row.date || ""}</td>
      <td class="${editableClass}" ${editableAttr} onblur="updateCell('${key}', 'category', this.innerText)">${row.category || ""}</td>

      <td class="num ${editableClass}" ${editableAttr} onblur="updateCell('${key}', 'income', this.innerText)">${income ? comma(income) : ""}</td>
      <td class="num ${editableClass}" ${editableAttr} onblur="updateCell('${key}', 'expense', this.innerText)">${expense ? comma(expense) : ""}</td>
      <td class="num">${comma(balance)}</td>

      <td class="num ${editableClass}" ${editableAttr} onblur="updateCell('${key}', 'unpaidDongho', this.innerText)">${row.unpaidDongho ? comma(row.unpaidDongho) : ""}</td>
      <td class="num ${editableClass}" ${editableAttr} onblur="updateCell('${key}', 'unpaidGiyoung', this.innerText)">${row.unpaidGiyoung ? comma(row.unpaidGiyoung) : ""}</td>
      <td class="num ${editableClass}" ${editableAttr} onblur="updateCell('${key}', 'unpaidHeegeun', this.innerText)">${row.unpaidHeegeun ? comma(row.unpaidHeegeun) : ""}</td>

      <td>${row.fee || index + 1}</td>
      ${deleteCell}
    `;

    tbody.appendChild(tr);
  });

  el("sumIncome").textContent = comma(totalIncome);
  el("sumExpense").textContent = comma(totalExpense);
  el("sumBalance").textContent = comma(balance);
}

function updateCell(key, field, value) {
  if (!isEditor) return;

  const patch = {};

  if (
    field === "income" ||
    field === "expense" ||
    field === "unpaidDongho" ||
    field === "unpaidGiyoung" ||
    field === "unpaidHeegeun" ||
    field === "fee"
  ) {
    patch[field] = toNum(value);
  } else {
    patch[field] = value.trim();
  }

  db.ref(`${refPath}/${key}`).update(patch);
}

function deleteRow(key) {
  if (!isEditor) {
    alert("수정모드에서만 삭제할 수 있습니다.");
    return;
  }

  if (!confirm("삭제할까요?")) return;
  db.ref(`${refPath}/${key}`).remove();
}

function deleteAll() {
  if (!isEditor) {
    alert("수정모드에서만 삭제할 수 있습니다.");
    return;
  }

  if (!confirm("전체 삭제할까요?")) return;
  db.ref(refPath).remove();
}

function scrollToBottom() {
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}

function addRow() {
  if (!isEditor) {
    alert("수정모드에서만 추가할 수 있습니다.");
    return;
  }

  const row = {
    date: el("addDate").value.trim(),
    category: el("addCategory").value.trim(),
    income: toNum(el("addIncome").value),
    expense: toNum(el("addExpense").value),
    unpaidDongho: toNum(el("addDongho").value),
    unpaidGiyoung: toNum(el("addGiyoung").value),
    unpaidHeegeun: toNum(el("addHeegeun").value),
    fee: toNum(el("addFee").value),
    createdAt: Date.now()
  };

  if (!row.date || !row.category) {
    alert("날짜와 구분은 입력해야 합니다.");
    return;
  }

  db.ref(refPath).push(row);

  [
    "addDate",
    "addCategory",
    "addIncome",
    "addExpense",
    "addDongho",
    "addGiyoung",
    "addHeegeun",
    "addFee"
  ].forEach(id => el(id).value = "");

  setTimeout(() => {
    scrollToBottom();
  }, 300);
}
</script>

</body>
</html>
