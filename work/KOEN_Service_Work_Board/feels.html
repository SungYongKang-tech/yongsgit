<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>체감온도 계산기</title>
  <link rel="stylesheet" href="./style.css"/>

  <style>
    body {
      background: linear-gradient(180deg, #eef7ff 0%, #f8fafc 100%);
    }

    .feel-wrap {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 16px;
    }

    .feel-hero {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      border-radius: 22px;
      padding: 22px 18px;
      margin-bottom: 14px;
      box-shadow: 0 10px 28px rgba(37, 99, 235, 0.25);
    }

    .feel-hero h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 900;
    }

    .feel-hero p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .feel-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .feel-card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
    }

    .feel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .feel-field {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 14px;
    }

    .feel-field label {
      display: block;
      font-size: 13px;
      font-weight: 900;
      color: #475569;
      margin-bottom: 8px;
    }

    .feel-field input {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 14px;
      background: white;
      font-size: 24px;
      font-weight: 900;
      text-align: center;
      color: #111827;
      box-shadow: inset 0 0 0 1px #d1d5db;
    }

    .feel-unit {
      margin-top: 6px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
    }

    .calc-main-btn {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 16px;
      background: #111827;
      color: white;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .calc-main-btn:active {
      transform: scale(0.99);
    }

    .result-card {
      margin-top: 16px;
      padding: 18px;
      border-radius: 20px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      text-align: center;
    }

    .result-label {
      font-size: 13px;
      font-weight: 900;
      color: #64748b;
      margin-bottom: 8px;
    }

    .result-temp {
      font-size: 44px;
      font-weight: 1000;
      color: #111827;
      letter-spacing: -1px;
    }

    .result-level {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 82px;
      height: 34px;
      margin-top: 8px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 900;
    }

    .level-normal {
      background: #e5e7eb;
      color: #374151;
    }

    .level-interest {
      background: #bbf7d0;
      color: #166534;
    }

    .level-caution {
      background: #fef08a;
      color: #854d0e;
    }

    .level-warning {
      background: #fed7aa;
      color: #c2410c;
    }

    .level-danger {
      background: #fecaca;
      color: #b91c1c;
    }

    .feel-note {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: #eff6ff;
      color: #1e40af;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 700;
    }

    .quick-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .quick-btn {
      width: 100%;
      height: 38px;
      border: 0;
      border-radius: 12px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    @media (max-width: 420px) {
      .feel-wrap {
        padding: 10px;
      }

      .feel-hero h1 {
        font-size: 23px;
      }

      .feel-card {
        padding: 14px;
      }

      .feel-grid {
        gap: 8px;
      }

      .feel-field {
        padding: 10px;
        border-radius: 16px;
      }

      .feel-field input {
        height: 44px;
        font-size: 21px;
      }

      .result-temp {
        font-size: 38px;
      }
    }
  </style>
</head>

<body>
  <div class="feel-wrap">
    <div class="feel-hero">
      <div class="feel-top-row">
        <h1>체감온도 계산기</h1>
        <a class="home-btn" href="./index.html">업무공유</a>
      </div>
      <p>외부 온도와 습도를 입력하면 기상청 체감온도표 기준으로 결과를 표시합니다.</p>
    </div>

    <div class="feel-card">
      <div class="feel-grid">
        <div class="feel-field">
          <label for="tempInput">온도</label>
          <input id="tempInput" type="number" inputmode="numeric" placeholder="34"/>
          <div class="feel-unit">℃ / 28~40</div>
        </div>

        <div class="feel-field">
          <label for="humiInput">습도</label>
          <input id="humiInput" type="number" inputmode="numeric" placeholder="70"/>
          <div class="feel-unit">% / 40~90</div>
        </div>
      </div>

      <button class="calc-main-btn" id="calcBtn" type="button">체감온도 계산</button>

      <div class="quick-row">
        <button class="quick-btn" type="button" data-t="32" data-h="70">32℃ / 70%</button>
        <button class="quick-btn" type="button" data-t="34" data-h="70">34℃ / 70%</button>
        <button class="quick-btn" type="button" data-t="36" data-h="80">36℃ / 80%</button>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-label">계산 결과</div>
        <div class="result-temp" id="resultTemp">-</div>
        <div class="result-level level-normal" id="resultLevel">대기</div>
      </div>

      <div class="feel-note">
        ※ 입력한 습도는 표 기준에 맞춰 가장 가까운 5% 단위로 계산됩니다.<br>
        예: 72% 입력 → 70% 기준 계산
      </div>
    </div>
  </div>

<script>
const feelsTable = {
  28:{40:26.6,45:27.1,50:27.6,55:28.0,60:28.4,65:28.9,70:29.3,75:29.7,80:30.0,85:30.4,90:30.8},
  29:{40:27.6,45:28.1,50:28.6,55:29.0,60:29.4,65:29.9,70:30.3,75:30.7,80:31.1,85:31.4,90:31.8},
  30:{40:28.5,45:29.0,50:29.5,55:30.0,60:30.4,65:30.9,70:31.3,75:31.7,80:32.1,85:32.5,90:32.9},
  31:{40:29.5,45:30.0,50:30.5,55:31.0,60:31.4,65:31.9,70:32.3,75:32.7,80:33.1,85:33.5,90:33.9},
  32:{40:30.4,45:31.0,50:31.5,55:32.0,60:32.4,65:32.9,70:33.3,75:33.7,80:34.1,85:34.5,90:34.9},
  33:{40:31.4,45:32.0,50:32.5,55:33.0,60:33.5,65:33.9,70:34.3,75:34.8,80:35.2,85:35.6,90:36.0},
  34:{40:32.4,45:32.9,50:33.5,55:34.0,60:34.5,65:34.9,70:35.4,75:35.8,80:36.2,85:36.6,90:37.0},
  35:{40:33.3,45:33.9,50:34.5,55:35.0,60:35.5,65:35.9,70:36.4,75:36.8,80:37.2,85:37.7,90:38.1},
  36:{40:34.3,45:34.9,50:35.4,55:36.0,60:36.5,65:36.9,70:37.4,75:37.8,80:38.3,85:38.7,90:39.1},
  37:{40:35.3,45:35.9,50:36.4,55:37.0,60:37.5,65:38.0,70:38.4,75:38.9,80:39.3,85:39.7,90:40.2},
  38:{40:36.2,45:36.9,50:37.4,55:38.0,60:38.5,65:39.0,70:39.5,75:39.9,80:40.4,85:40.8,90:41.2},
  39:{40:37.2,45:37.8,50:38.4,55:39.0,60:39.5,65:40.0,70:40.5,75:40.9,80:41.4,85:41.8,90:42.3},
  40:{40:38.2,45:38.8,50:39.4,55:40.0,60:40.5,65:41.0,70:41.5,75:42.0,80:42.4,85:42.9,90:43.3}
};

const tempInput = document.getElementById("tempInput");
const humiInput = document.getElementById("humiInput");
const resultTemp = document.getElementById("resultTemp");
const resultLevel = document.getElementById("resultLevel");

function getLevel(value) {
  if (value >= 38) return { text: "위험", className: "level-danger" };
  if (value >= 35) return { text: "경고", className: "level-warning" };
  if (value >= 33) return { text: "주의", className: "level-caution" };
  if (value >= 31) return { text: "관심", className: "level-interest" };
  return { text: "보통", className: "level-normal" };
}

function showResult(feels) {
  const level = getLevel(feels);

  resultTemp.textContent = `${feels.toFixed(1)}℃`;
  resultLevel.textContent = level.text;
  resultLevel.className = `result-level ${level.className}`;
}

function showError(message) {
  resultTemp.textContent = "확인 필요";
  resultLevel.textContent = message;
  resultLevel.className = "result-level level-danger";
}

function calcFeelsTemp() {
  const temp = Math.round(Number(tempInput.value));
  const humi = Math.round(Number(humiInput.value) / 5) * 5;

  if (!tempInput.value || !humiInput.value) {
    showError("값 입력");
    return;
  }

  if (!feelsTable[temp] || feelsTable[temp][humi] == null) {
    showError("범위 초과");
    return;
  }

  showResult(feelsTable[temp][humi]);
}

document.getElementById("calcBtn").addEventListener("click", calcFeelsTemp);

[tempInput, humiInput].forEach((input) => {
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") calcFeelsTemp();
  });
});

document.querySelectorAll(".quick-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    tempInput.value = btn.dataset.t;
    humiInput.value = btn.dataset.h;
    calcFeelsTemp();
  });
});
</script>

</body>
</html>
