<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>체감온도 계산기</title>
  <link rel="stylesheet" href="./style.css"/>
</head>

<body>
  <div class="top">
    <div class="wrap">
      <div class="titleRow">
        <h1>체감온도 계산기</h1>
        <div class="copyGroup">
          <a class="copyBtn" href="./index.html">업무공유</a>
        </div>
      </div>
      <div class="sub">온도와 습도를 입력하면 체감온도를 계산합니다.</div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="section">
        <div class="label">온도(℃)</div>
        <input id="tempInput" type="number" placeholder="예: 32"/>
      </div>

      <div class="section">
        <div class="label">습도(%)</div>
        <input id="humiInput" type="number" placeholder="예: 70"/>
      </div>

      <button class="copyBtn" id="calcBtn" type="button">체감온도 계산</button>

      <div class="section" style="margin-top:16px">
        <div class="label">결과</div>
        <div id="resultBox" style="font-size:24px;font-weight:800;">-</div>
      </div>
    </div>
  </div>

<script>
const feelsTable = {
  28:{40:26.6,45:27.1,50:27.6,55:28.0,60:28.4,65:28.9,70:29.3,75:29.7,80:30.0,85:30.4,90:30.8},
  29:{40:27.6,45:28.1,50:28.6,55:29.0,60:29.4,65:29.9,70:30.3,75:30.7,80:31.1,85:31.4,90:31.8},
  30:{40:28.5,45:29.0,50:29.5,55:30.0,60:30.4,65:30.9,70:31.3,75:31.7,80:32.1,85:32.5,90:32.9},
  31:{40:29.5,45:30.0,50:30.5,55:31.0,60:31.4,65:31.9,70:32.3,75:32.7,80:33.1,85:33.5,90:33.9},
  32:{40:30.4,45:31.0,50:31.5,55:32.0,60:32.4,65:32.9,70:33.3,75:33.7,80:34.1,85:34.5,90:34.9},
  33:{40:31.4,45:32.0,50:32.5,55:33.0,60:33.5,65:33.9,70:34.3,75:34.8,80:35.2,85:35.6,90:36.0},
  34:{40:32.4,45:32.9,50:33.5,55:34.0,60:34.5,65:34.9,70:35.4,75:35.8,80:36.2,85:36.6,90:37.0},
  35:{40:33.3,45:33.9,50:34.5,55:35.0,60:35.5,65:35.9,70:36.4,75:36.8,80:37.2,85:37.7,90:38.1},
  36:{40:34.3,45:34.9,50:35.4,55:36.0,60:36.5,65:36.9,70:37.4,75:37.8,80:38.3,85:38.7,90:39.1},
  37:{40:35.3,45:35.9,50:36.4,55:37.0,60:37.5,65:38.0,70:38.4,75:38.9,80:39.3,85:39.7,90:40.2},
  38:{40:36.2,45:36.9,50:37.4,55:38.0,60:38.5,65:39.0,70:39.5,75:39.9,80:40.4,85:40.8,90:41.2},
  39:{40:37.2,45:37.8,50:38.4,55:39.0,60:39.5,65:40.0,70:40.5,75:40.9,80:41.4,85:41.8,90:42.3},
  40:{40:38.2,45:38.8,50:39.4,55:40.0,60:40.5,65:41.0,70:41.5,75:42.0,80:42.4,85:42.9,90:43.3}
};

function getLevel(v) {
  if (v >= 38) return "위험";
  if (v >= 35) return "경고";
  if (v >= 33) return "주의";
  if (v >= 31) return "관심";
  return "보통";
}

document.getElementById("calcBtn").addEventListener("click", () => {
  const temp = Math.round(Number(document.getElementById("tempInput").value));
  const humi = Math.round(Number(document.getElementById("humiInput").value) / 5) * 5;

  const resultBox = document.getElementById("resultBox");

  if (!feelsTable[temp] || feelsTable[temp][humi] == null) {
    resultBox.textContent = "입력 범위: 온도 25~32℃, 습도 25~100%";
    return;
  }

  const feels = feelsTable[temp][humi];
  const level = getLevel(feels);

  resultBox.textContent = `${feels.toFixed(1)}℃ / ${level}`;
});
</script>

</body>
</html>
