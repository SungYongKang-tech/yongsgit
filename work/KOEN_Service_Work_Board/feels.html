<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>체감온도 계산기</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #eef7ff;
      color: #111827;
    }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 10px;
    }

    .top-card {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.25);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .home-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      color: white;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .result-card {
      margin-top: 10px;
      background: white;
      border-radius: 20px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    }

    .result-title {
      font-size: 13px;
      font-weight: 900;
      color: #64748b;
      margin-bottom: 4px;
    }

    .result-temp {
      font-size: 56px;
      line-height: 1;
      font-weight: 1000;
      letter-spacing: -1px;
      color: #111827;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .input-box {
      background: rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 10px;
    }

    .input-box label {
      display: block;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 6px;
      opacity: 0.95;
    }

    .input-box input {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 13px;
      background: white;
      color: #111827;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
    }

    .sample-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .sample-btn {
      width: 100%;
      height: 38px;
      border: 0;
      border-radius: 13px;
      background: rgba(255,255,255,0.22);
      color: white;
      font-size: 13px;
      font-weight: 900;
    }

    .sample-btn:active {
      transform: scale(0.98);
    }

    @media (max-height: 720px) {
      .page { padding: 7px; }
      .top-card { padding: 12px; border-radius: 18px; }
      h1 { font-size: 20px; }
      .input-box { padding: 8px; }
      .input-box input { height: 42px; font-size: 22px; }
      .result-card { padding: 12px; }
      .result-temp { font-size: 48px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top-card">
      <div class="title-row">
        <h1>체감온도 계산기</h1>
        <a class="home-btn" href="./index.html">업무공유</a>
      </div>

      <div class="result-card">
        <div class="result-title">체감온도</div>
        <div class="result-temp" id="resultTemp">-</div>
      </div>

      <div class="input-row">
        <div class="input-box">
          <label for="tempInput">온도（℃）</label>
          <input id="tempInput" type="number" inputmode="decimal">
        </div>

        <div class="input-box">
          <label for="humiInput">습도（%）</label>
          <input id="humiInput" type="number" inputmode="decimal">
        </div>
      </div>

      <div class="sample-row">
        <button type="button" class="sample-btn" data-temp="26" data-humi="60">26℃ / 60%</button>
        <button type="button" class="sample-btn" data-temp="28" data-humi="70">28℃ / 70%</button>
        <button type="button" class="sample-btn" data-temp="30" data-humi="70">30℃ / 70%</button>
        <button type="button" class="sample-btn" data-temp="32" data-humi="80">32℃ / 80%</button>
      </div>
    </div>
  </div>

<script>
const tempInput = document.getElementById("tempInput");
const humiInput = document.getElementById("humiInput");
const resultTemp = document.getElementById("resultTemp");

const feelsTable = {
  25:{40:23.8,45:24.2,50:24.6,55:25.1,60:25.5,65:25.9,70:26.2,75:26.6,80:27.0,85:27.3,90:27.7},
  26:{40:24.7,45:25.2,50:25.6,55:26.0,60:26.5,65:26.9,70:27.2,75:27.6,80:28.0,85:28.4,90:28.7},
  27:{40:25.7,45:26.1,50:26.6,55:27.0,60:27.5,65:27.9,70:28.2,75:28.6,80:29.0,85:29.4,90:29.7},
  28:{40:26.6,45:27.1,50:27.6,55:28.0,60:28.4,65:28.9,70:29.3,75:29.7,80:30.0,85:30.4,90:30.8},
  29:{40:27.6,45:28.1,50:28.6,55:29.0,60:29.4,65:29.9,70:30.3,75:30.7,80:31.1,85:31.4,90:31.8},
  30:{40:28.5,45:29.0,50:29.5,55:30.0,60:30.4,65:30.9,70:31.3,75:31.7,80:32.1,85:32.5,90:32.9},
  31:{40:29.5,45:30.0,50:30.5,55:31.0,60:31.4,65:31.9,70:32.3,75:32.7,80:33.1,85:33.5,90:33.9},
  32:{40:30.4,45:31.0,50:31.5,55:32.0,60:32.4,65:32.9,70:33.3,75:33.7,80:34.1,85:34.5,90:34.9},
  33:{40:31.4,45:32.0,50:32.5,55:33.0,60:33.5,65:33.9,70:34.3,75:34.8,80:35.2,85:35.6,90:36.0},
  34:{40:32.4,45:32.9,50:33.5,55:34.0,60:34.5,65:34.9,70:35.4,75:35.8,80:36.2,85:36.6,90:37.0},
  35:{40:33.3,45:33.9,50:34.5,55:35.0,60:35.5,65:35.9,70:36.4,75:36.8,80:37.2,85:37.7,90:38.1},
  36:{40:34.3,45:34.9,50:35.4,55:36.0,60:36.5,65:36.9,70:37.4,75:37.8,80:38.3,85:38.7,90:39.1},
  37:{40:35.3,45:35.9,50:36.4,55:37.0,60:37.5,65:38.0,70:38.4,75:38.9,80:39.3,85:39.7,90:40.2},
  38:{40:36.2,45:36.9,50:37.4,55:38.0,60:38.5,65:39.0,70:39.5,75:39.9,80:40.4,85:40.8,90:41.2},
  39:{40:37.2,45:37.8,50:38.4,55:39.0,60:39.5,65:40.0,70:40.5,75:40.9,80:41.4,85:41.8,90:42.3},
  40:{40:38.2,45:38.8,50:39.4,55:40.0,60:40.5,65:41.0,70:41.5,75:42.0,80:42.4,85:42.9,90:43.3}
};

function findBounds(value, list) {
  if (value < list[0] || value > list[list.length - 1]) return null;

  for (let i = 0; i < list.length - 1; i++) {
    if (value >= list[i] && value <= list[i + 1]) {
      return [list[i], list[i + 1]];
    }
  }

  return [value, value];
}

function lerp(a, b, ratio) {
  return a + (b - a) * ratio;
}

function getFeelsByInterpolation(temp, humi) {
  const temps = Object.keys(feelsTable).map(Number).sort((a, b) => a - b);
  const humis = Object.keys(feelsTable[temps[0]]).map(Number).sort((a, b) => a - b);

  const tempBounds = findBounds(temp, temps);
  const humiBounds = findBounds(humi, humis);

  if (!tempBounds || !humiBounds) return null;

  const [t1, t2] = tempBounds;
  const [h1, h2] = humiBounds;

  const q11 = feelsTable[t1][h1];
  const q12 = feelsTable[t1][h2];
  const q21 = feelsTable[t2][h1];
  const q22 = feelsTable[t2][h2];

  const tempRatio = t1 === t2 ? 0 : (temp - t1) / (t2 - t1);
  const humiRatio = h1 === h2 ? 0 : (humi - h1) / (h2 - h1);

  const r1 = lerp(q11, q21, tempRatio);
  const r2 = lerp(q12, q22, tempRatio);

  return lerp(r1, r2, humiRatio);
}

function calcFeelsTemp() {
  const temp = Number(tempInput.value);
  const humi = Number(humiInput.value);

  if (!tempInput.value || !humiInput.value) {
    resultTemp.textContent = "-";
    return;
  }

  const feels = getFeelsByInterpolation(temp, humi);

  if (feels === null) {
    resultTemp.textContent = "범위 확인";
    return;
  }

  resultTemp.textContent = `${feels.toFixed(1)}℃`;
}

[tempInput, humiInput].forEach((input) => {
  input.addEventListener("input", calcFeelsTemp);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      calcFeelsTemp();
      input.blur();
    }
  });
});

document.querySelectorAll(".sample-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    tempInput.value = btn.dataset.temp;
    humiInput.value = btn.dataset.humi;
    calcFeelsTemp();
  });
});
</script>

</body>
</html>
