<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>체감온도 계산기</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #eef7ff;
      color: #111827;
    }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 10px;
    }

    .top-card {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.25);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .home-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      color: white;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .input-box {
      background: rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 10px;
    }

    .input-box label {
      display: block;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 6px;
      opacity: 0.95;
    }

    .input-box input {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 13px;
      background: white;
      color: #111827;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
    }

    .unit {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 800;
      opacity: 0.85;
      text-align: center;
    }

    .calc-btn {
      width: 100%;
      height: 46px;
      margin-top: 10px;
      border: 0;
      border-radius: 15px;
      background: #111827;
      color: white;
      font-size: 16px;
      font-weight: 900;
    }

    .result-card {
      margin-top: 10px;
      background: white;
      border-radius: 20px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    }

    .result-title {
      font-size: 13px;
      font-weight: 900;
      color: #64748b;
      margin-bottom: 4px;
    }

    .result-temp {
      font-size: 46px;
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: -1px;
      color: #111827;
    }

    .result-level {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 86px;
      height: 34px;
      margin-top: 8px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 900;
    }

    .detail {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 800;
      color: #64748b;
      line-height: 1.4;
    }

    .level-normal {
      background: #e5e7eb;
      color: #374151;
    }

    .level-interest {
      background: #bbf7d0;
      color: #166534;
    }

    .level-caution {
      background: #fef08a;
      color: #854d0e;
    }

    .level-warning {
      background: #fed7aa;
      color: #c2410c;
    }

    .level-danger {
      background: #fecaca;
      color: #b91c1c;
    }

    .mini-note {
      margin-top: 8px;
      padding: 8px;
      border-radius: 14px;
      background: #eff6ff;
      color: #1e40af;
      font-size: 11px;
      line-height: 1.4;
      font-weight: 700;
    }

    @media (max-height: 720px) {
      .page {
        padding: 7px;
      }

      .top-card {
        padding: 12px;
        border-radius: 18px;
      }

      h1 {
        font-size: 20px;
      }

      .input-box {
        padding: 8px;
      }

      .input-box input {
        height: 42px;
        font-size: 22px;
      }

      .calc-btn {
        height: 42px;
      }

      .result-card {
        padding: 12px;
      }

      .result-temp {
        font-size: 40px;
      }

      .mini-note {
        display: none;
      }
    }
    .sample-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.sample-btn {
  width: 100%;
  height: 38px;
  border: 0;
  border-radius: 13px;
  background: rgba(255,255,255,0.22);
  color: white;
  font-size: 13px;
  font-weight: 900;
}

.sample-btn:active {
  transform: scale(0.98);
}
  </style>
</head>

<body>
  <div class="page">
    <div class="top-card">
      <div class="title-row">
        <h1>체감온도 계산기</h1>
        <a class="home-btn" href="./index.html">업무공유</a>
      </div>

      <div class="result-card">
      <div class="result-title">체감온도</div>
      <div class="result-temp" id="resultTemp">-</div>
           
    </div>

      <div class="input-row">
        <div class="input-box">
          <label for="tempInput">온도（℃）</label>
          <input id="tempInput" type="number" inputmode="decimal" >
         
        </div>

        <div class="input-box">
          <label for="humiInput">습도（%）</label>
          <input id="humiInput" type="number" inputmode="decimal" >
         
        </div>
      </div>

      <div class="sample-row">
  <button type="button" class="sample-btn" data-temp="30" data-humi="60">30℃ / 60%</button>
  <button type="button" class="sample-btn" data-temp="32" data-humi="70">32℃ / 70%</button>
  <button type="button" class="sample-btn" data-temp="34" data-humi="70">34℃ / 70%</button>
  <button type="button" class="sample-btn" data-temp="36" data-humi="80">36℃ / 80%</button>
</div>
    </div>

    

    <div class="mini-note">
      ※ 수식 계산 방식이라 34.5℃ / 습도 72%처럼 표에 없는 값도 계산됩니다.
    </div>
  </div>

<script>
const tempInput = document.getElementById("tempInput");
const humiInput = document.getElementById("humiInput");
const resultTemp = document.getElementById("resultTemp");

function calculateFeelsLike(t, h) {
  return -8.784695
    + 1.61139411 * t
    + 2.338549 * h
    - 0.14611605 * t * h
    - 0.012308094 * t * t
    - 0.016424828 * h * h
    + 0.002211732 * t * t * h
    + 0.00072546 * t * h * h
    - 0.000003582 * t * t * h * h;
}

function calcFeelsTemp() {
  const temp = Number(tempInput.value);
  const humi = Number(humiInput.value);

  if (!tempInput.value || !humiInput.value) {
    resultTemp.textContent = "-";
    return;
  }

  if (temp < 20 || temp > 45 || humi < 0 || humi > 100) {
    resultTemp.textContent = "범위 확인";
    return;
  }

  const feels = calculateFeelsLike(temp, humi);
  resultTemp.textContent = `${feels.toFixed(1)}℃`;
}

[tempInput, humiInput].forEach((input) => {
  input.addEventListener("input", calcFeelsTemp);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      calcFeelsTemp();
      input.blur();
    }
  });
});

document.querySelectorAll(".sample-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    tempInput.value = btn.dataset.temp;
    humiInput.value = btn.dataset.humi;
    calcFeelsTemp();
  });
});
</script>

</body>
</html>
