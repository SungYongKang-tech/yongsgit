<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="KOEN테니스" />
  <meta property="og:description" content="남동발전 테니스동호회 전용 웹사이트입니다!" />
  <meta property="og:image" content="https://sensational-tulumba-65e97e.netlify.app/tennis/Novak%20Djokovic.png" />
  <meta property="og:type" content="website" />
<link rel="manifest" href="/tennis/manifest.json" />
<meta name="theme-color" content="#0d47a1" />

  <title>KOEN 테니스</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 24px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #0d47a1;
      font-size: 24px;
      margin: 10px 0;
      text-align: center;
    }

    .thumbnail {
      width: 100%;
      max-width: 320px;
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .link-button {
      display: block;
      padding: 12px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      color: white;
      transition: transform 0.1s ease, filter 0.15s ease;
      outline: none;
    }
    .link-button:hover { filter: brightness(1.06); }
    .link-button:active { transform: scale(0.97); }
    .link-button:focus-visible {
      box-shadow: 0 0 0 3px rgba(13,71,161,0.25), 0 0 0 6px rgba(13,71,161,0.12);
    }

    /* 🎨 서로 다른 색상 */
    .btn-blue    { background-color: #1976d2; }
    .btn-green   { background-color: #388e3c; }
    .btn-orange  { background-color: #f57c00; }
    .btn-purple  { background-color: #7b1fa2; }
    .btn-pink    { background-color: #c2185b; }
    .btn-teal    { background-color: #00796b; }
    .btn-cyan    { background-color: #0097a7; }

    @media (max-width: 480px) {
      h1 { font-size: 20px; }
      .link-button { font-size: 15px; padding: 10px; }
    }

    #splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0d47a1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#splash img {
  width: 120px;
  margin-bottom: 16px;
}

#splash h2 {
  color: white;
}

  </style>
</head>
<body>
<div id="splash">
  <img src="/tennis/512tennis.png" alt="로고" />
  <h2>KOEN 테니스</h2>
</div>

  <h1>KOEN 테니스</h1>

  <img
    src="https://sensational-tulumba-65e97e.netlify.app/tennis/Novak%20Djokovic.png"
    alt="KOEN 테니스 썸네일"
    class="thumbnail"
  />

  <div class="button-container">
    <a class="link-button btn-teal" href="/tennis/admin/index.html" target="_blank" rel="noopener noreferrer">
      관리자 전용
    </a>

    <a class="link-button btn-blue" href="/tennis/lesson/index.html" target="_blank" rel="noopener noreferrer">
      레슨자 전용
    </a>

    <a class="link-button btn-purple" href="/tennis/team-make/index.html" target="_blank" rel="noopener noreferrer">
      단체전 선수구성
    </a>

    <a class="link-button btn-pink" href="/tennis/team-live/index.html" target="_blank" rel="noopener noreferrer">
      단체전 진행(실시간)
    </a>

    <!-- ⚠️ 폴더명이 league 인지 leage 인지 확인 필요 -->
    <a class="link-button btn-cyan" href="/tennis/tennis_rank/index.html" target="_blank" rel="noopener noreferrer">
      KOEN 테니스 리그 & 성적관리
    </a>
  </div>
</body>
</html>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/tennis/service-worker.js")
      .then(() => console.log("SW 등록 성공"))
      .catch(err => console.log("SW 실패", err));
  }

  window.addEventListener("load", () => {
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
    }, 2000); // 👉 여기 숫자(ms) 조절 (2000 = 2초)
  });
</script>
