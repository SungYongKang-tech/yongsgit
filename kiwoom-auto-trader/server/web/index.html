<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>키움 주식 조회</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="app">

    <div class="left-panel">
      <header>
        <div id="testModeBanner" class="test-mode-banner">
          ⚠ 테스트모드 실행 중 · 실제 주문 아님 · 장외 가상매매 허용
        </div>

        <div id="apiWarningBanner" class="api-warning-banner" style="display:none;">
  ⚠ API 요청 제한으로 자동갱신이 일시 중지되었습니다. 1~3분 후 다시 조회하세요.
</div>
<div id="apiStatusBar" class="api-status-bar">
  API 대기중
</div>
<div id="tradeToast" class="trade-toast" style="display:none;"></div>

        <h1>키움 주식 조회</h1>
        <p>키움 REST API 현재가 조회 테스트</p>
      </header>

      <section class="search-card">
        <label for="stockCode">종목코드</label>
        <div class="search-row">
          <input
            id="stockCode"
            type="text"
            value="005930"
            placeholder="예: 005930"
          />
          <button id="searchBtn">조회</button>
        </div>
        <div class="suggest-list" id="suggestList"></div>
      </section>

      <section class="result-card" id="resultCard">
        <div class="empty">종목코드를 입력하고 조회하세요.</div>
      </section>

      <section class="watch-card">
        <div class="watch-title-row">
          <h2>관심종목</h2>

          <div class="watch-actions">
            <button id="loadWatchBtn">조회</button>
            <button id="autoRefreshBtn">자동OFF</button>
            <button id="testModeBtn">테스트OFF</button>
          </div>
        </div>

        <div class="sort-row">
          <button class="sort-btn active" data-sort="default">기본순</button>
          <button class="sort-btn" data-sort="rate">상승률순</button>
          <button class="sort-btn" data-sort="volume">거래량순</button>
          <button class="sort-btn" data-sort="price">현재가순</button>
        </div>

        <div class="alert-setting-row">
          <input
            id="alertRateInput"
            type="number"
            value="5"
            step="0.1"
            placeholder="상승률 기준 %"
          />
          <button id="saveAlertRateBtn">알림기준 저장</button>
        </div>

        <div class="entry-setting-row">
          <input
            id="entryRateInput"
            type="number"
            value="3"
            step="0.1"
            placeholder="진입후보 상승률 %"
          />
          <button id="saveEntryRateBtn">진입기준 저장</button>
        </div>

        <div class="volume-setting-row">
          <input
            id="volumeThresholdInput"
            type="number"
            value="1000000"
            step="100000"
            placeholder="거래량 기준"
          />
          <button id="saveVolumeThresholdBtn">거래량기준 저장</button>
        </div>

        <div class="entry-box" id="entryBox">
          <div class="empty">진입후보 종목이 없습니다.</div>
        </div>

        <div class="alert-box" id="alertBox">
          <div class="empty">알림 조건에 맞는 종목이 없습니다.</div>
        </div>

        <div class="watch-add-row">
          <input
            id="addStockCode"
            type="text"
            placeholder="종목명 또는 코드 추가 예: 삼성전자"
          />
          <button id="addStockBtn">추가</button>
        </div>

        <div class="watch-list" id="watchList"></div>
      </section>
    </div>

    <div class="right-panel">
      <section class="hold-card">
        <h2>보유종목 계산</h2>

        <div class="emergency-row">
          <button id="emergencyStopBtn">긴급 전체중지</button>
          <button id="resetHoldingsBtn" class="small-btn danger">
            보유초기화
          </button>
        </div>

        <div class="trade-time-row">
          <input id="tradeStartTime" type="time" value="09:00" />
          <span>~</span>
          <input id="tradeEndTime" type="time" value="15:30" />
          <button id="saveTradeTimeBtn">거래시간 저장</button>
        </div>

        <div class="hold-sort-row">
          <button class="hold-sort-btn active" data-hold-sort="default">
            기본순
          </button>
          <button class="hold-sort-btn" data-hold-sort="profit">
            손익순
          </button>
          <button class="hold-sort-btn" data-hold-sort="rate">
            수익률순
          </button>
          <button class="hold-sort-btn" data-hold-sort="eval">
            평가금액순
          </button>
        </div>

        <div class="summary-box" id="holdSummary">
          <div>
            <span>총 평가금액</span>
            <strong>0원</strong>
          </div>
          <div>
            <span>총 손익</span>
            <strong>0원</strong>
          </div>
        </div>

        <div class="hold-rank-box" id="holdRankBox">
          <div class="empty">보유종목 수익/손실 요약이 없습니다.</div>
        </div>

        <div class="trade-stat-box" id="tradeStatBox">
  <div class="empty">자동매매 통계가 없습니다.</div>
</div>


        <div class="hold-add-row">
          <input id="holdCode" type="text" placeholder="종목명 또는 코드" />
          <input id="buyPrice" type="number" placeholder="매수가" />
          <input id="holdQty" type="number" placeholder="수량" />
          <input id="targetPrice" type="number" placeholder="목표가" />
          <input id="secondTargetPrice" type="number" placeholder="2차목표가" />
          <input id="trailingStopRate" type="number" placeholder="트레일링%" />
          <input id="stopLossPrice" type="number" placeholder="손절가" />
          <button id="addHoldBtn">추가</button>
        </div>

        <div id="holdList" class="hold-list"></div>

        <div class="trade-log-box">
          <div class="trade-log-title-row">
            <div class="trade-log-title">가상매매 로그</div>
            <button id="clearTradeLogBtn" class="small-btn danger">
              로그삭제
            </button>
          </div>

          <div id="tradeLogList" class="trade-log-list">
            <div class="empty">아직 발생한 매매 신호가 없습니다.</div>
          </div>
        </div>
      </section>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
