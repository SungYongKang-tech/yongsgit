<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성과분석 대시보드</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .card {
      background: #1f2937;
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    .label {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 8px;
  text-align: center;
}

.value {
  font-size: 22px;
  font-weight: bold;
  text-align: right;
}

    .plus {
      color: #f87171;
    }

    .minus {
      color: #60a5fa;
    }

    .section {
      margin-top: 18px;
    }

    .section h2 {
      font-size: 18px;
      margin: 0 0 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #374151;
      text-align: center;
    }

    th {
      color: #d1d5db;
      background: #111827;
    }

    .empty {
      color: #9ca3af;
      padding: 20px;
      text-align: center;
      background: #1f2937;
      border-radius: 12px;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 19px;
      }

      .value {
        font-size: 20px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px 6px;
      }
       .label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    text-align: center;
  }

  .value {
    font-size: 18px;
    text-align: right;
  }

  body {
  padding: 8px;
}

.card {
  padding: 8px;
  border-radius: 12px;
}

.grid {
  gap: 6px;
}

.label {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
}

.value {
  font-size: 18px;
}

.tab-row {
  margin: 8px 0 6px;
  padding: 6px 0;
}

.stock-card {
  padding: 10px;
  border-radius: 14px;
}

.info-box {
  padding: 8px;
}

.info-value {
  font-size: 14px;
}



    }

    .tab-row {
  display: flex;
  gap: 8px;
  margin: 18px 0 12px;
  position: sticky;
  top: 0;
  background: #111827;
  padding: 8px 0;
  z-index: 10;
}

.tab-btn {
  flex: 1;
  background: #374151;
  color: #d1d5db;
  border-radius: 12px;
  padding: 12px 8px;
  font-size: 14px;
}

.tab-btn.active {
  background: #2563eb;
  color: white;
}

.tab-panel {
  display: none;
}

.tab-panel.active {
  display: block;
}

.mobile-card-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.stock-card {
  background: #1f2937;
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
}

.stock-card-header {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}

.stock-name {
  font-size: 17px;
  font-weight: bold;
}

.stock-sub {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 3px;
}

.stock-rate {
  font-size: 20px;
  font-weight: bold;
  text-align: right;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.info-box {
  background: #111827;
  border-radius: 10px;
  padding: 10px;
}

.info-label {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 5px;
}

.info-value {
  font-size: 15px;
  font-weight: bold;
}

.status-pill {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  background: #374151;
}

.status-on {
  background: #7f1d1d;
  color: #fecaca;
}

.status-wait {
  background: #1e3a8a;
  color: #bfdbfe;
}

@media (min-width: 800px) {
  .tab-row {
    max-width: 720px;
  }
}
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 성과분석 대시보드</h1>
    <button onclick="location.href='/'">← 메인</button>
  </div>

  <div class="grid">
    <div class="card">
  <div class="label">현재 총자산</div>
  <div class="value" id="currentAsset">-</div>
</div>

<div class="card">
  <div class="label">오늘 수익</div>
  <div class="value" id="todayProfit">-</div>
</div>

<div class="card">
  <div class="label">오늘 수익률</div>
  <div class="value" id="todayProfitRate">-</div>
</div>

<div class="card">
  <div class="label">실현손익</div>
  <div class="value" id="totalRealizedProfit">-</div>
</div>

<div class="card">
  <div class="label">평가손익</div>
  <div class="value" id="totalUnrealizedProfit">-</div>
</div>

<div class="card">
  <div class="label">누적 수익</div>
  <div class="value" id="totalAssetProfit">-</div>
</div>

<div class="card">
  <div class="label">누적 수익률</div>
  <div class="value" id="totalAssetProfitRate">-</div>
</div>

    <div class="card">
      <div class="label">총 매도 거래수</div>
      <div class="value" id="totalTrades">-</div>
    </div>

    <div class="card">
      <div class="label">승률</div>
      <div class="value" id="winRate">-</div>
    </div>

    <div class="card">
      <div class="label">누적 손익</div>
      <div class="value" id="totalProfit">-</div>
    </div>

    <div class="card">
      <div class="label">평균 수익률</div>
      <div class="value" id="avgProfitRate">-</div>
    </div>

    <div class="card">
      <div class="label">평균 수익 거래</div>
      <div class="value" id="avgWinRate">-</div>
    </div>

    <div class="card">
      <div class="label">평균 손실 거래</div>
      <div class="value" id="avgLossRate">-</div>
    </div>

    <div class="card">
      <div class="label">현재 보유 종목 수</div>
      <div class="value" id="holdingCount">-</div>
    </div>

    <div class="card">
      <div class="label">보유 평가손익</div>
      <div class="value" id="holdingProfit">-</div>
    </div>
  </div>

  <div class="tab-row">
  <button class="tab-btn active" onclick="showTab('holdings')">보유종목</button>
  <button class="tab-btn" onclick="showTab('sells')">매도내역</button>
</div>




<div id="holdingsTab" class="tab-panel">
  <div class="section">
    <h2>현재 보유 종목</h2>
    <div id="holdingBox" class="empty">보유 종목 불러오는 중...</div>
  </div>
</div>

<div id="sellsTab" class="tab-panel">
  <div class="section">
    <h2>최근 매도 내역</h2>
    <div id="recentSellsBox" class="empty">데이터 불러오는 중...</div>
  </div>
</div>

  <script>
    function formatWon(value) {
      const num = Number(value || 0);
      const sign = num > 0 ? "+" : "";
      return sign + num.toLocaleString() + "원";
    }

    function formatPlainWon(value) {
  const num = Number(value || 0);
  return num.toLocaleString() + "원";
}

    function formatRate(value) {
      const num = Number(value || 0);
      const sign = num > 0 ? "+" : "";
      return sign + num.toFixed(2) + "%";
    }

    function showTab(name) {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  document.querySelectorAll(".tab-panel").forEach(panel => {
    panel.classList.remove("active");
  });

  if (name === "holdings") {
    document.querySelector(".tab-btn:nth-child(1)")
      ?.classList.add("active");

    document.getElementById("holdingsTab")
      ?.classList.add("active");
  }

  if (name === "sells") {
    document.querySelector(".tab-btn:nth-child(2)")
      ?.classList.add("active");

    document.getElementById("sellsTab")
      ?.classList.add("active");
  }
}

    function setValue(id, value, type) {
      const el = document.getElementById(id);
      if (!el) return;

      el.textContent = value;

      const num = Number(String(value).replace(/[^0-9.-]/g, ""));
      el.classList.remove("plus", "minus");

      if (type === "money" || type === "rate") {
        if (num > 0) el.classList.add("plus");
        if (num < 0) el.classList.add("minus");
      }
    }

    function renderHoldings(list) {
  const box = document.getElementById("holdingBox");

  if (!box) return;

  if (!Array.isArray(list) || list.length === 0) {
    box.className = "empty";
    box.innerHTML = "현재 보유 종목이 없습니다.";
    return;
  }

  box.className = "mobile-card-list";

  const sortedList = [...list].sort(
  (a, b) => Number(b.profitRate || 0) - Number(a.profitRate || 0)
);

box.innerHTML = sortedList.map((item, index) => {
    const profitRate = Number(item.profitRate || 0);
    const profit = Number(item.profit || 0);
    const drawdownFromHigh = Number(item.drawdownFromHigh || 0);
    const highestProfitRate = Number(item.highestProfitRate || 0);

    const trailingClass = item.trailingActive ? "status-on" : "status-wait";
    const trailingTitle = item.trailingActive ? "트레일링 작동중" : "트레일링 대기중";
    const trailingDetail = item.trailingActive
      ? `고점대비 ${formatRate(drawdownFromHigh)}`
      : `최고수익 ${formatRate(highestProfitRate)}`;

    return `
      <div class="stock-card">
        <div class="stock-card-header">
          <div>
            <div class="stock-name">#${index + 1} ${item.name || "-"}</div>
            <div class="stock-sub">${item.code || ""}</div>
            <div class="stock-sub">${item.strategyName || item.strategyPreset || "-"} / 점수 ${item.discoverScore || "-"}</div>
          </div>

          <div class="stock-rate ${profitRate >= 0 ? "plus" : "minus"}">
            ${formatRate(profitRate)}
          </div>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-label">매수가</div>
            <div class="info-value">${Number(item.buyPrice || 0).toLocaleString()}원</div>
          </div>

          <div class="info-box">
            <div class="info-label">현재가</div>
            <div class="info-value">${Number(item.currentPrice || 0).toLocaleString()}원</div>
          </div>

          <div class="info-box">
            <div class="info-label">평가손익</div>
            <div class="info-value ${profit >= 0 ? "plus" : "minus"}">${formatWon(profit)}</div>
          </div>

          <div class="info-box">
            <div class="info-label">최고수익률</div>
            <div class="info-value ${highestProfitRate >= 0 ? "plus" : "minus"}">${formatRate(highestProfitRate)}</div>
          </div>

          <div class="info-box">
            <div class="info-label">보유수량</div>
            <div class="info-value">${Number(item.qty || 0).toLocaleString()}주</div>
          </div>

          <div class="info-box">
            <div class="info-label">트레일링 기준</div>
            <div class="info-value">${item.trailingStopRate || 0}%</div>
          </div>
        </div>

        <div class="status-pill ${trailingClass}">
          ${trailingTitle} · ${trailingDetail}
        </div>
      </div>
    `;
  }).join("");
}

    function renderRecentSells(list) {
  const box = document.getElementById("recentSellsBox");

  if (!Array.isArray(list) || list.length === 0) {
    box.className = "empty";
    box.innerHTML = "아직 매도 거래 내역이 없습니다.";
    return;
  }

  box.className = "mobile-card-list";

  box.innerHTML = list.map(item => {
    const profitRate = Number(item.profitRate || 0);
    const profit = Number(item.profit || 0);

    return `
      <div class="stock-card">
        <div class="stock-card-header">
          <div>
            <div class="stock-name">${item.name || "-"}</div>
            <div class="stock-sub">${item.code || ""}</div>
            <div class="stock-sub">${item.date || "-"} / ${item.strategyName || item.strategyPreset || "-"}</div>
          </div>

          <div class="stock-rate ${profitRate >= 0 ? "plus" : "minus"}">
            ${formatRate(profitRate)}
          </div>
        </div>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-label">실현손익</div>
            <div class="info-value ${profit >= 0 ? "plus" : "minus"}">${formatWon(profit)}</div>
          </div>

          <div class="info-box">
            <div class="info-label">매도사유</div>
            <div class="info-value">${item.reason || item.type || "-"}</div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

    async function loadPerformanceSummary() {
      try {
        const res = await fetch("/api/performance-summary");
        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "성과 데이터를 불러오지 못했습니다.");
        }

        const s = data.summary || {};

        setValue("totalTrades", `${s.totalTrades || 0}건`);
        setValue("winRate", formatRate(s.winRate), "rate");
        setValue("totalProfit", formatWon(s.totalProfit), "money");
        setValue("avgProfitRate", formatRate(s.avgProfitRate), "rate");
        setValue("avgWinRate", formatRate(s.avgWinRate), "rate");
        setValue("avgLossRate", formatRate(s.avgLossRate), "rate");
        setValue("holdingCount", `${s.holdingCount || 0}개`);
        setValue("holdingProfit", formatWon(s.holdingProfit), "money");
        setValue("currentAsset", formatPlainWon(s.currentAsset));
        setValue("totalAssetProfit", formatWon(s.totalAssetProfit), "money");
        setValue("totalAssetProfitRate", formatRate(s.totalAssetProfitRate), "rate");
        setValue("todayProfit", formatWon(s.todayProfit), "money");
        setValue("todayProfitRate", formatRate(s.todayProfitRate), "rate");
        setValue("totalRealizedProfit", formatWon(s.totalRealizedProfit), "money");
        setValue("totalUnrealizedProfit", formatWon(s.totalUnrealizedProfit), "money");
        renderHoldings(data.holdings || []);
        renderRecentSells(data.recentSells || []);
      } catch (err) {
        console.error(err);
        document.getElementById("recentSellsBox").innerHTML =
          "성과분석 데이터를 불러오지 못했습니다.";
      }
    }

    loadPerformanceSummary();
    setInterval(loadPerformanceSummary, 30000);
  </script>
</body>
</html>
